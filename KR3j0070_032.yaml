body:
  text: 日知録卷三十二崑山顧炎武撰而孟子望道而未之見集注而讀為如古字通用朱子答門人引詩垂帶而厲春秋星隕如雨為證詩埀帶而厲箋云而亦如也春秋莊七年夜中星隕如雨注如而也今考之又得二十餘事易君子以蒞衆用晦而明虞翻解而如也書顧命其能而亂四方傳釋為如孟子九一而助趙岐解而如也夫然後之中國踐天子位焉而居堯之宫逼堯之子是篡也劉剡曰而當讀作如今按而主癰疽與侍人瘠環是無義無命也而字亦當讀如左傳隱七年㰱如忘服䖍曰如而也僖二十六年室如懸罄注如而也昭四年牛謂叔孫見仲而何注而何如何史記賈生傳化變而嬗韋昭曰而如也如蟬之蛻化也戰國䇿威王不應而此者三韓非子嗣公知之故而駕鹿吕氏春秋靜郭君泫而曰不可近本為不通者添作泫泣而曰又曰而固賢者也用之未晚也荀子黤然而雷擊之如牆厭之說苑越諸發曰意而安之願假冠以見意如不安願無變國俗又曰而有用我者吾其為東周乎新序引鄒陽書白頭而新傾蓋而故後漢督郵斑碑柔逺而邇皆當作如戰國䇿昭奚恤曰請而不得有說色非故如何也絺疵曰是非反如何也大戴禮使有司日省如時考之又曰然如曰禮云禮云又曰安如易樂而湛又曰不賞不罰如民咸盡力又曰知一而不可以解也春秋繁露施其時而成之法其命如循之淮南子嘗一哈水如甘苦知矣漢樂府艾如張後漢濟陰太守孟郁修堯廟碑無為如治髙如不危滿如不溢太尉劉寬碑去鞭拊如獲其情弗用刑如弭其姦郭輔碑其少也孝友而悅學其長也寬舒如好施易王弼注革而大亨以正非當如何皆當作而漢書地理志遼西郡肥如莽曰肥而左傳襄十二年夫婦所生若而人注云若如人說文需從雨而聲蓋即讀而為如也唐人詩多用而今亦作如今今江西人言如何亦曰而何左傳襄三年齊侯與士丐盟于耐外水經注云即地理志曰如水矣耐如聲相似聲古而字即讀為如故耎字說文曰從大而周禮旅師而用之以質劑注而讀為若聲之誤也陸德明音義云而音若儀禮鄉飲酒禮公如大夫入注如讀為若奈何奈何二字始於五子之歌為人上者奈何不敬左傳河魚腹疾奈何曲禮曰國君去其國止之曰奈何去社稷也大夫曰奈何去宗廟也士曰奈何去墳墓也楚辭九歌大司命愁人兮奈何九辨君不知兮可奈何此奈何二字之祖左傳華元之歌曰牛則有皮犀兕尚多棄甲則那直言之曰那長言之曰奈何一也又書如五器鄭康成讀如為乃箇反論語吾末如之何也已矣音亦與奈同按古人曰如曰若曰奈其義則一音不必同六朝人多書奈為那三國志注文欽與郭淮書曰所向全勝要那後無繼何宋書劉敬宣傳牢之曰平𤣥之後令我那驃騎何唐人詩多以無奈為無那語急公羊傳隱元年母欲立之已殺之如勿與而已矣注如即不如齊人語也按此不必齊人語左傳僖二十二年宋子魚曰若愛重傷則如勿傷愛其二毛則如服焉成二年衛孫良夫曰若知不能則如無出昭十三年蔡朝吳曰二三子若能死亡則如違之以待所濟若求安定則如與之以濟所欲二十一年宋華多僚曰君若愛司馬則如亡定五年楚子西曰不能如辭八年衛王孫賈曰然則如叛之漢書翟義傳義曰欲令都尉自送則如勿收邪左傳正義曰古人語然猶不敢之言敢也莊二十二年敢辱髙位以速官謗注敢不敢也昭二年敢辱大館注敢不敢儀禮聘禮辭曰非禮也敢對曰非禮也敢注敢言不敢古人多以語急而省其文者詩亦不夷懌懌下省一乎字書弗慎厥德雖悔可追可上省一不字我生不有命在天不上省一豈字在今爾安百姓何擇非人何敬非刑何度非及人下刑下及下各省一乎字孟子雖褐寬博吾不惴焉不上省一豈字禮記幼壯孝弟耆耋好禮不從流俗修身以俟死者不在此位也好學不倦好禮不變旄期稱道不亂者不在此位也幼上好上各省一非字公羊傳隱公七年母弟稱弟母兄稱兄注母弟同母弟母兄同母兄不言同母言母弟者若謂不如言如矣齊人語也嵗天之行謂之嵗書以閏月定四時成嵗嵗二月東巡狩是也人之行謂之年書維吕命王享國百年左傳季隗曰我二十五年矣僖公二十三年絳縣人有與疑年使之年師曠曰七十三年矣襄公三十年於是昭公十九年矣襄公三十一年史記蓋太公之卒百有餘年是也今人多謂年為嵗周禮太史注中數曰嵗朔數曰年自今年冬至至明年冬至嵗也自今年正月朔至明年正月朔年也古人但曰年幾何不言嵗也自太史公始變之秦始皇本紀曰年十三嵗今人以嵗初之日而增年古人以嵗盡之日而後增之史記倉公傳臣意年盡三年年三十九嵗也月半今人謂十五為月半蓋古經已有之儀禮士喪禮月半不殷奠禮記祭義朔月月半君巡牲周禮大司樂王大食三侑注大食朔月月半以樂侑食時也晉溫嶠與陶侃書尅後月半大舉然亦有以上下弦為月半者劉熙釋名弦月半之名也其形一旁曲一旁直若張弓施弦也望月滿之名也月大十六日小十五日日在東月在西遙相望也是則所謂月半者弦也禮經之所謂月半者望也弦曰半以月體而言之也望曰半以日數而言之也岑參詩凉州三月半猶未脫春衣韓愈詩南方二月半春物亦已少李商隱詩白日當天三月半巳吳才老韻補古巳午之巳亦謂如已矣之已漢律歷志振美於辰巳盛於巳史記巳者言陽氣之已盡也鄭𤣥夢孔子告之曰起起今年嵗在辰明年嵗在巳洪容齊三筆亦引歷書為證愚按古人讀已為矣之證不止此淮南子斗指已巳則生已定也說文已巳也四月陽氣已出陰氣已藏萬物見成文章故已為蛇象形釋名巳巳也陽氣畢布巳也詩似續妣祖箋云似讀巳午之巳巳續妣祖者謂巳成其宫廟也五經文字起從辰巳之巳白虎通太陽見於已巳者物必起晉書樂志四月之辰謂之巳巳者起也物至此時畢盡而起也詩江有汜亦讀為矣釋名水决復入為汜汜已也如出有所為畢已復還而入也以享以祀亦讀為矣說文祭無已也從示已聲公羊傳何休注言祀者無已長久之辭釋名商曰祀祀已也新氣升故氣已也今人以辰巳之巳讀為士音宋毛晃曰陽氣生於子終於巳已者終已也象陽氣既極回復之形故又為終巳之義今俗以有鉤為終已之已無鉤為辰巳之巳是未知字義也季春之月辰為建巳為除故用三月上巳祓除不祥古人謂病愈為已亦此意也韓詩曰鄭國之俗三月上巳之溱洧二水之上招魂續魄秉蘭草祓不祥於後漢書周舉傳三月上巳大將軍梁商大㑹賓客宴雒水袁紹傳三月上已大㑹賓從於薄落津周公謹癸辛雜識以為戊巳之巳者非戊巳之巳篆作辰巳之巳篆作象蛇形𨽻書則混而相類止以直筆上缺為已上滿為巳里榖梁傳古者三百步為里今以三百六十步為里而尺又大於古四之一今之六十二里遂當古之百里榖梁傳鞍去國五百里今自歷城至臨淄僅三百三十里左傳黃人謂自郢及我九百里今自江陵至光州僅七百里邾子謂吳二千里不三月不至今自蘇州至鄒縣僅一千五百里孟子不逺千里而來千里而見王今自鄒至齊至梁亦不過五六百里又謂舜卒鳴條文王生岐周相去千有餘里今自安邑至岐山亦不過八百里史記張儀說魏王言從鄭至梁二百餘里今自鄭州至開封僅一百四十里戚夫人歌相離三千里當誰使告汝貢禹上書言自痛去家三千里自今琅邪至長安亦但二千餘里趙則二千里而近是則荀子所謂日中而趨百里者不過六十餘里而千里之馬亦日馳五六百里耳王制古者百里當今百二十一里六十步四尺二寸二分殆未然仞說文仞伸臂一尋八尺家語孔子所謂舒肘知尋從人刃聲書為山九仞孔傳八尺曰仞正義曰考工記匠人有畎遂溝洫皆廣深等而澮云廣二尋深二仞則澮亦廣深等仞與尋同故知八尺曰仞左傳昭三十二年仞溝洫注度深曰仞王肅聖證論及注家語皆云八尺曰仞與孔義同鄭𤣥云七尺曰仞與孔義異王逸注楚辭大招亦云七尺論語夫子之牆數仞注包云七尺孟子掘井九軔與仞同注八尺朱子乃兩從之堂髙數仞趙注亦云八尺當以八尺為是若小爾雅云四尺漢書應劭注云五尺六寸則益非矣不淑人死謂之不淑禮記如何不淑是也生離亦謂之不淑詩中谷有蓷遇人之不淑矣是也失德亦謂之不淑詩君子偕老子之不淑云如之何是也國亡亦謂之不淑逸周書王乃升汾之阜以望商邑曰嗚呼不淑是也不弔古人言不弔者猶曰不仁左傳成十三年穆為不弔襄十三年君子以吳為不弔十四年有君不弔昭七年兄弟之不睦於是乎不弔二十六年帥羣不弔之人以行亂于王室皆是不仁之意襄二十三年敢告不弔及詩之不弔昊天不弔不祥書之弗弔天降喪于殷則以為哀閔之辭杜氏注皆以為不相弔恤而於羣不弔之人則曰弔至也於義不通惟成七年中國不振旅蠻夷入伐而莫之或恤無弔者也夫乃當謂大國無恤鄰之義耳亡亡有三義有以死而名之中庸事亡如事存是也有以出奔於外而名之晉公子稱亡人是也有但以不在而名之詩豫美亡此論語孔子時其亡也而往拜之是也漢書袁盎傳不以在亡為辭謂託故而辭以不在宋栁子厚詩在亡均寂寞史髙定子傳制置使未知在亡則以在亡為存亡非漢書之意也乾沒史記酷吏傳張湯始為小吏乾沒徐廣曰乾沒隨勢沈浮也服䖍曰乾沒射成敗也如淳曰豫居物以待之得利為乾失利為沒三國志傅嘏傳豈敢寄命洪流以徼乾沒裴松之注有所徼射不計乾燥之與沈沒而為之也晉書潘嶽傳其母數誚之曰爾當知足而乾沒不已乎張駿傳從事劉慶諌曰霸王不以喜怒興師不以乾沒取勝盧循傳姊夫徐道覆素有膽決知劉裕已還欲乾沒一戰魏書宋維傳維見乂元乂寵勢日隆便至乾沒北史王劭傳贊為河朔清流而乾沒榮利梁書止足傳序其進也光寵夷易故愚夫之所乾沒晉鼙舞歌明君篇昧死射乾沒覺露則滅族抱朴子忘髮膚之明戒尋乾沒於難冀乾沒大抵是徼幸取利之意史記春申君傳沒利於前而易患於後也即此意辱儀禮注以白造緇曰辱故老子謂楊朱曰大白若辱姦廣韻姦古顔切私也詐也亦作姧今本誤姧作奸非也奸音干犯也左氏僖公七年傳曰君以禮與信屬諸侯而以姦終之曰子父不奸之謂禮一傳之中二字各出而義不同釋名姦奸也言奸正法也以奸釋姦其為兩字審矣又奸字亦可訓為干祿之干漢書荆燕吳傳齊人田生以畫奸澤史記作干然則奸但與干通用而不可以為姦也後人於案牘文移中以姦字畫多省作奸字此如繁之為煩衝之為冲驛之為馹臺之為台皆借用之字訛訛字古作訛僞字古亦音訛詩小雅民之訛言箋云僞也小人好詐僞為交易之言正義曰謂以善言為惡以惡言為善交而換易其辭爾雅注世以妖言為訛太平御覽引武王之書鑰曰昏謹守深察訛泰昌元年八月御史張潑言京師姧宄叢集游手成羣有謂之把棍者有謂之拏訛頭者偵知一人作姧則尾隨其後陷人於罪從而嚇詐金錢謂之拏訛頭即漢律所謂恐愒受賕請將巡城改為中差一年一代誰何詩室人交遍摧我韓詩作䜅玉篇作䜃丁回切謫也六韜令我壘上誰何不絶史記賈誼過秦論陳利兵而誰何誰䜅同何呵同韓非子王出而何之賈誼傳其在大譴大何之域者漢書五行志主公車大誰卒注大誰主問非常之人云姓名是誰何也此解未當焦氏易林當年少寡獨與孤處雞鳴犬吠無敢誰者說苑民知十已則尚與之爭曰不如吾也百巳則疵其過千巳則誰而不信楊雄衛尉針二世妄宿敗於望夷閻樂矯搜㦸者不誰史記衛綰傳嵗餘不譙呵綰漢書作不孰何綰難曉疑譙訛為誰誰又轉為孰也周禮射人不敬者苛罰之注苛謂詰問之按此苛亦呵字信東觀餘論引晉武帝王右軍陶隱居帖及謝宣城傳謂凡言信者皆謂使人楊用修又引古樂府有信數寄書無信長相憶為證良是然此語起於東漢以下楊太尉夫人袁氏答曹公卞夫人書云輒付往信古詩為焦仲卿妻作自可斷來信徐徐更謂之魏杜摰贈母邱儉詩聞有韓衆藥信來給一丸以使人為信始見於此若古人所謂信者乃符驗之别名墨子大將使人行守操信符史記刺客傳今行而無信則秦未可親也漢書石顯傳乃時歸誠取一信以為驗西域傳丐奴使持單于一信到國國傳送食後漢書齊武王傳得司徒劉公一信願先下周禮掌節注猶信也行者所執之信此如今人言印信信牌之信不得謂為使人也故梁武帝賜到溉連珠曰研磨墨以騰文筆飛豪毫同以書信而今人遂有書信之名出爾雅男子謂姊妹之子為出傳中凡言出者皆是外甥左氏莊二十二年陳厲公蔡出也僖七年申侯申出也成十三年康公我之自出注晉外甥襄二十五年我周之自出注言陳周之甥又桓公之亂蔡人欲立其出二十九年晉平公把出也三十一年莒去疾奔齊齊出也展輿吳出也昭四年徐子吳出也公羊文十四年傳接菑晉出也貜且齊出也史記秦本紀晉襄公之弟名雍秦出也漢書五行志王子鼂楚之出也而公羊襄五年傳蓋舅出也則以舅甥為舅出矣後漢書光武十王傳竇太后及憲等東海出也鰥寡鰥者無妻之稱但有妻而于役者則亦可謂之鰥詩何草不𤣥何人不矜矜讀為鰥是也寡者無夫之稱但有夫而獨守者則亦可謂之寡越絶書獨婦山者句踐將伐吳徙寡婦獨山上以為死士示得專一陳琳詩邊城多健少內舍多寡婦是也鮑照行路難來時聞君婦閨中孀居獨宿有貞名亦是此義婦人以夫亡為寡夫亦以婦亡為寡左傳襄二十七年齊崔杼生成及彊而寡小爾雅曰凡無妻無夫通謂之寡焦氏易林久鰥無偶思配織女求其非望自令寡處丁中唐髙祖武德六年三月人始生為黃四嵗為小十六為中二十一為丁六十為老𤣥宗天寶三載十二月癸丑詔曰比者成童之嵗即挂輕徭既冠之年便當正役憫其勞苦用軫於懷自今宜以十八已上為中男二十三已上成丁杜子美新安吏詩府帖昨夜下次選中男行是十八以上皆發之也然史文多有言丁中者舉丁中可以該黃小矣遼史耶律學古傳多張旗幟雜丁黃為疑兵蓋中小皆雜用之而史文代以黃字黃者四嵗以下何可雜之兵間邪阿𨽻釋漢殽坑碑陰云其間四十人皆字其名而繫以阿字如劉興阿興潘京阿京之類必編户民未嘗表其德書石者欲其整齊而强加之猶今閭巷之婦以阿挈其姓也成陽靈臺碑陰有主吏仲東阿東又云惟仲阿東年在元冠幼有中質又可見其年少而未有字抱朴子禰衡游許下自公卿國士以下衡初不稱其官皆名之云阿某或以姓呼之為某兒三國志吕蒙傳注魯肅拊蒙背曰非復吳下阿蒙世說注阮籍謂王渾曰與卿語不如與阿戎語渾子戎皆見其小時之稱也亦有以阿挈其字者世說桓公謂殷淵源為阿源謝太傅謂王修齡為阿齡謂王子敬為阿敬婦人以阿挈姓則隋獨孤后謂雲昭訓為阿雲唐蕭淑妃謂武后為阿武韋后降為庶人稱阿韋劉從諌妻裴氏稱阿裴吳湘娶顔悅女其母焦氏稱阿顔阿焦是也亦可以自稱其親焦仲卿妻詩堂上啓阿母阿母謂阿女是也亦可為不定何人之辭古詩道逢鄉里人家中有阿誰三國志龎統傳先主謂曰向者之論阿誰為失晉書沈充傳敦作色曰小人阿誰是也亦有作何誰者晉劉實崇讓論不知何誰最賢不知何誰最不肖阿者助語之辭古人以為慢應聲老子唯之與阿相去幾何今南人讀為入聲非魏志東胡傳東方人名我為阿么一為數之本故可以大名之一年之稱元年長子之稱元子是也又為數之初故可以小名之骰子之謂一為么是也爾雅么幼注曰豕子最後生者俗呼為么豚故後人有么䯢之稱說文么小也象子初生之形幼字從么亦取此義漢書食貨志王莽作錢貨六品小錢么錢幼錢中錢壯錢大錢貝貨五品大貝壯貝么貝小貝及不盈寸二分者布貨十品大布次布弟布壯布中布差布厚布幼布么布小布隋書律厯志凡日不全為餘積以成餘者曰杪度不全為分積以成分者曰其有不成杪曰麼不成篾曰么班彪王命論么䯢尚不及數子蔡雍短人賦其餘尫么晉陸機文賦猶絃么而徽急故雖和而不悲郭璞螢火贊熠熠宵行蟲之微么盧諶蟋蟀賦享神氣之么卉竝用此字唐書楊炎傳盧杞貌么陋宋史嶽飛傳楊么本名楊太太年幼楚人謂小為么故曰楊么俗作么非元元者本也本官曰元官本籍曰元籍本來曰元來唐宋人多此語後人以原字代之不知何解原者再也爾雅原再也易原筮周禮馬質禮記月令原蠶文王世子末有原漢原廟之原皆作再字解漢書注師古曰原重也言已有正廟更重立也與本來之義全不相同或以為洪武中臣下有稱元任官者嫌於元朝之官故改此字古人亦有稱原官者後漢張衡應間曩滯日官今又原之注爾雅曰原再也衡為太史令去官五載復為太史令故曰原之然則原官乃再官之義也寫寫說文曰置物也詩駕言出游以寫我憂既見君子我心寫兮傳曰寫輸寫也周禮稻人以澮寫水儀禮特牲饋食禮主人出寫嗇于房禮記曲禮器之溉者不寫其餘皆寫注傳之器中韓非子衛靈公召師滑而告之曰有鼓新聲者其狀似鬼神子為聽而寫之國語王命工以良金寫范蠡之狀而朝禮之史記秦始皇紀寫放其宫室作之咸陽北坂上蘇秦傳宋王無道為木人以寫寡人新序葉公子髙好龍鉤以寫龍鑿以寫龍屋室雕文以寫龍周髀經笠以寫天上林賦肸蠁布寫漢書賈捐之傳淮南王盜寫虎符今人以書為寫蓋以此本傳於彼本猶之以此器傳於彼器也說文謄移書也徐氏曰謂移寫之也始自特牲饋食禮卒筮寫卦注卦者主畫地識爻爻備以方寫之漢書藝文志孝武置寫書之官河間獻王傳從民得善書必為好寫與之留其真路溫舒傳取澤中蒲截以為牒編用寫書霍光傳山又坐寫祕書師丹傳吏私寫其草淮南子說山訓竊簡而寫法律孔安國尚書序更以竹簡寫之至後漢而有圖寫李恂傳繕寫盧植傳之稱傳之至今矣今人謂馬去鞍曰寫貨物去舟車亦曰寫與器之溉者不寫義同後漢書皇甫規傳旋車完封寫之權門晉書潘嶽傳發槅寫鞍皆有所憩說文作卸舍車解馬也讀若汝南人寫書之寫行李古者謂行人為行李亦曰行理左傳僖三十年行李之往來共其乏困襄八年亦不使一介行李告于寡君皆作李昭十三年行理之命無月不至作理國語周之秩官有之曰敵國賓至關尹以告行理以節逆之賈逵曰理吏也小行人也漢李翕析里橋郙閣頌行理咨嗟至唐時謂官府𨗳從之人亦曰行李舊唐書溫造傳左拾遺舒元褒言元和長慶中中丞行李不過半坊今乃逺至兩坊謂之籠街喝道勑曰憲官之職在指佞觸邪不在行李豈其不敢稱鹵簿而别為是名邪耗今人以音問為耗起自後漢書章德竇皇后紀家既廢壞數呼相工問息耗注引薛氏韓詩章句曰耗惡也息耗猶言善惡也量移唐朝人得罪貶竄逺方遇赦改近地謂之量移舊唐書𤣥宗紀開元二十年十一月庚午祀后土于脽上大赦天下左降官量移近處二十七年二月己巳加尊號大赦天下左降官量移近處量移字始見於此李白贈京兆韋參軍量移東陽詩云潮水還歸海流人却到吳相逢問愁苦淚盡日南珠白居易貶江州司馬自題云一旦失恩先左降三年隨例未量移量讀平聲及遷忠州刺史又云流落多年應是命量移逺郡未成官故韓愈自潮州刺史量移袁州有遇赦移官罪未除之句而宋史盧多遜貶崖州詔曰縱經大赦不在量移之限今人乃稱遷職為量移誤矣罘罳罘罳字雖從网其實屏也漢書文帝紀七年六月癸酉未央宫東闕罘罳災師古曰罘罳謂連闕曲閣也以覆重刻垣墉之處其形罘罳然一曰屏也崔豹古今注曰罘罳屏之遺象也臣朝君行至門內屏外復應思惟罘罳復思也釋名罘罳在門外罘復也罳思也臣將入請事於此復重思之也漢西京罘罳合板為之亦築土為之每門闕殿舍前皆有焉於今郡國㕔前亦樹之今人謂之影壁考工記匠人宫隅之制七雉城隅之制九雉注宫隅城隅謂角浮思也廣雅罘罳謂之屏越絶書巫門外罘罳者春申君去吳假君所思處也春申君相楚使其子為假君治吳魚豢魏略黃初三年築諸門闕外罘罳參考諸書當從屏說又五行志劉向以為東闕所以朝諸侯之門也罘罳在其外諸侯之象也則其為屏明甚而或在門內或在門外則制各不同耳鹽鐵論祠堂屏閣垣闕罘罳董賢傳外為徼道周垣數里門闕罘罳甚盛王莽傳遣使壞渭陵延陵園門罘罳曰毋使民復思也後漢書靈帝紀中平四年三月己亥南宫內殿罘罳自壞杜子美大雲寺贊公房詩紫鴿下罘罳酉陽雜俎曰今人多呼殿榱桷護雀網為罘罳非也禮記明堂位疏屏天子之廟飾也注云屏謂之樹爾雅釋宫文今桴思也刻之為雲氣蟲獸如今闕上為之矣正義曰漢時謂屏為桴思解者以為天子外屏人臣至屏俯伏思念其事案匠人注云城隅謂闕桴思也漢時東闕桴思災以此諸文參之則桴思小樓也故城隅闕上皆有之然則屏上亦為屋以覆屏牆故稱屏曰桴思亦引廣雅及劉熙釋名為證作書者段成式蓋唐時有呼護雀網為罘罳之目故史言甘露之變宦者扶上升輿決殿後罘罳疾趨北出而溫庭筠亦有罘罳晝捲閶闔夜開之句矣罘罳字有作桴思者禮記明堂位注有作浮思者考工記注竝見上有作罦罳者博雅罦罳謂之屏有作復思者水經注象魏之上加復思以易觀又云譙城南有曹嵩冡冡北有廟堂榱櫨及柱皆雕鏤雲矩上復思已碎有作覆思者宋玉大言賦大笑至兮摧覆思言一笑而垣屏為之傾倒也若摧護雀網亦不足大也陳氏禮書曰古者門皆有屏天子設之於外諸侯設之於內禮臺門而旅樹旅道也當道而設屏此外門之屏也治朝在路門之外天子當寧而立寧在門屏之間此路門之屏也國語曰王背屏而立夫人向屏此寢門內之屏也魯廟疏屏天子之廟飾此廟門之屏也月令天子田獵整設于屏外此田防之屏也晉天文志屏四星在端門之內近右執法然則先王設屏非茍然也場屋場屋者於廣場之中而為屋不必皆開科試士之地也隋書音樂志每嵗正月萬國來朝留至十五日於端門外建國門內綿亘八里列為戲場百官起棚夾路從昏逹旦以縱觀之至晦而罷故戲場亦謂之場屋唐元微之連昌宫辭夜半月髙絃索鳴賀老琵琶定場屋豆戰國䇿張儀說韓王曰五榖所生非麥而豆民之所食大抵豆飯藿羹姚宏注曰史記作飯菽而麥下文亦作菽古語但稱菽漢以後方謂之豆今按本草有赤小豆大豆之名本草不皆神農所著越絶書丙貨之户曰赤豆為下物石五十已貨之户曰大豆為下物石二十越絶書亦非子貢所作漢書楊惲傳種一頃豆落而為萁陘今井陘之陘古書有作鈃者穆天子傳至於鈃山之下注今在常山石邑縣鈃音邢是也有作研者漢書地理志上黨郡有石研闕是也有作岍者晉書石勒載記使石季龍擊託候部掘咄哪于岍北大破之是也有作硜者晉書胡奮傳頓軍硜北是也有作􅠌者楊子法言山􅠌之蹊是也有作徑者李尤函谷關賦於北則有蕭居天井壺口石徑貫越代朔以臨北庭是也豸莊子在宥篇災及草木禍及止蟲止當作豸古止豸通用左傳宣十七年庶有豸乎豸止也關關者所以拒門之木說文關以木橫持門戶也左傳臧孫紇斬鹿門之關吕氏春秋孔子之徑舉國門之關而不肯以力聞賈誼新書豫讓曰我事中行之君與帷而衣之與關而枕之魯連子譬若門關舉之以便則可以一指持中而舉之非便則兩手不能關非益加重手非加罷也被所起者非舉勢也皆謂拒門之木後人因之遂謂門為關也周禮司關注關界上之門史記謂拒門之木為關漢書楊惲傳有奔車抵殿門門關折馬死趙廣漢傳斬其門關而去宋書少帝紀突走出昌門追者以門關踣之王鎮惡傳軍人緣城得入門猶未及下關唐書李訓傳閽者欲扄鎖之為中人所叱執關而不能下宙說文宙舟輿所極覆也此解未明淮南子覽冥訓燕雀佼之以為不能與之爭於宇宙之間髙誘注宙棟梁也似合宙字從宀本是宫室之象後人借為往古來今之號耳說文上下四方曰宇古往今來曰宙石炭今人為石炭為墨按水經注冰井臺井深十五丈藏冰及石墨焉石墨可書又然之難盡亦謂之石炭是知石炭石墨一物也有精粗爾史記外戚世家竇少君為其主入山作炭後漢書黨錮傳夏馥入林慮山中親突煙炭皆此物也北人凡入聲字皆轉為平故呼墨為煤而俗竟作煤字非也玉篇煤炱煤也韻㑹煤炱灰集屋者吕氏春秋孔子窮於陳蔡之間七日不嘗粒晝寢顔回索米得而㸑之幾熟孔子望見顔回攫其甑中而食之選間食熟謁孔子而進食孔子起曰今者夢見先君食潔而後饋顔回對曰不可嚮者煤室入甑中棄食不祥回攫而飯之髙誘曰煤室煙塵之煤也素問黑如炲者死注炲謂炲煤也唐張祜詩古牆丹雘盡深棟墨煤生李商隱詩敵國軍營漂木柿方吠反按說文當作柿削木札朴也後漢書方術楊方傳風吹札柿前朝神廟鎖煙煤溫庭筠詩煙煤朝奠處風雨夜歸時是煤乃梁上煙煤之名非石炭也崔銑彰德志作烸志曰安陽縣龍山出石炭入穴取之無窮取深數百丈必先見水水盡然後炭可取也炭有數品其堅者謂之石軟者謂之烸氣愈臭者然之愈難盡水可以煎礬終不若晉絳者云按玉篇廣韻竝無烸字終葵考工記大圭長三尺杼上終葵首注終葵椎也為椎於其杼上明無所屈也禮記玉藻終葵椎也方言齊人謂椎為終葵馬融廣成頌翬揮同終葵揚關斧博雅作柊揆蓋古人以椎逐鬼若大儺之為耳今人於户上畫鍾馗像云唐時人能捕鬼者𤣥宗嘗夢見之事載沈存中補筆談未必然也五代史吳越世家嵗除畫工獻鍾馗擊鬼圖魏書堯暄本名鍾葵字辟邪則古人固以鍾葵為辟邪之物矣又有淮南王他子名鍾葵有楊鍾葵丘鍾葵李鍾葵慕容鍾葵喬鍾葵北史庶人諒傳作喬鍾馗又恩幸傳未有宫鍾馗馗字兩見而楊義臣傳仍作喬鍾葵段鍾葵于徑字鍾葵張白澤本字鍾葵唐書有王武俊將張鍾葵通鑑作終蔡則以此為名者甚多豈以其形似而名之抑取辟邪之義與左傳定四年分康叔以殷民七族有終葵氏是又不可知其立名之意也魁今人所奉魁星不知始自何年以奎為文章之府故立廟祀之乃不能像奎而改奎為魁又不能像魁而取之字形為鬼舉足而起其斗不知奎為北方𤣥武七宿之一魁為北斗之第一星所主不同而二字之音亦異今以文而祀乃不于奎而于魁宜乎今之應試而獲中者皆不識字之人與又今人以榜前五名為五魁漢書酷吏傳所置皆其魁宿游俠傳閭里之俠原涉為魁師古曰魁者斗之所用盛而杓之本也天文北斗魁為首末為杓淮南子注斗第一星至第四為魁第五星至第七為杓故言根本者皆云魁說文魁羮斗也趙宧光曰斗首曰魁因借凡首皆謂之魁其見於經者書𦙍征之殱厥渠魁記曲禮之不為魁主人能則執兵而陪其後然則五魁之名豈佳語哉或曰里有里魁市有市魁皆長帥之意要非雅俊之目吕氏春秋有魁士名人此用魁字之始列國語幽王蕩以為魁陵糞土溝瀆韋昭解小阜曰魁子以君之力曾不能損魁父之丘史記趙世家嬴姓將大敗周人於范魁之西鮑宣傳白首耆白魁壘之士楊雄傳甘泉賦冠倫魁能陸機感丘賦羅魁封之纍纍又文選潘嶽笙賦統大魁以為笙李周翰曰大魁謂匏中也又儀禮士冠禮素積白屨以魁柎之注魁蜃蛤近時人好以魁命名亦取五魁之義古人以魁命名者絶少左傳有􅈶魁壘盧蒲就魁吕氏春秋齊王殺燕將張魁桑梓容齊隨筆謂小雅維桑與梓必恭敬止竝無鄉里之說而後人文字乃作鄉里事用愚考之張衡南都賦云永世克孝懷桑梓焉真人南巡覩舊里焉蔡雍作光武濟南宫碑云來在濟陽顧見神宫追惟桑梓褒述之義陳琳為袁紹檄云梁孝王先帝母弟墳陵尊顯松柏桑梓猶宜肅恭漢人之文必有所據齊魯韓三家之詩不傳未可知其說也胡三省通鑑注桑梓謂其故鄉祖父之所樹者以後魏鍾會與蔣斌書桑梓之敬古今所敦晉左思魏都賦畢昴之所應虞夏之餘人先王之桑梓列聖之遺塵陸機思親賦悲桑梓之悠曠愧蒸嘗之弗營贈弟士龍詩迫彼窀穸載驅東路繼其桑梓肆力邱墓贈顧彥先詩眷言懷桑梓無乃將為魚百年歌辭官致祿歸桑梓潘尼贈陸機出為吳王郎中令詩祁祁大邦惟桑與梓贈滎陽太守吳子仲詩埀覆豈他鄉回光臨桑梓潘嶽為賈謐作贈陸機詩旋反桑梓帝弟作弼陸雲答張士然詩感念桑梓域髣佛眼中人九愍望龍門而屢顧攀維桑而祗泣嵗暮賦䖍孝敬於神邱兮結祗慕於維桑閻式復羅尚書人懷桑梓劉琨上愍帝表蒸嘗之敬在心桑梓之情未克袁宏三國名臣贊子布擅名遭世方擾撫翼桑梓息肩江表宋武帝復彭沛下邳三郡租詔彭城桑梓本鄉加隆攸在文帝復丹徒租詔丹徒桑梓綢繆大業攸始謝靈運孝感賦戀邱墳而縈心憶桑梓而零淚會吟行東方就旅逸梁鴻去桑梓何承天鐃歌願言桑梓思舊遊鮑照從過舊宫詩嚴恭履桑梓加敬覽枌榆梁武帝幸蘭陵詔朕自違桑梓五十餘載劉峻辨命論居先王之桑梓竊名號於中縣江淹擬陸平原詩明發眷桑梓永歎懷密親則又從南都賦之文而承用之矣按古人桑梓之說不過敬老之意說苑常樅謂老子曰過喬木而趨子知之乎老子曰過喬木而趨非謂敬老邪常樅曰嘻是已此於詩為興體言桑梓猶當飬敬而況父母為人子之所瞻依草馬爾雅馬屬牡曰隲牝曰騇郭璞注以牡為􅀈馬牝為草馬魏志杜畿𫝊為河東太守課民畜牸牛草馬晉書凉武昭王𫝊家有騧草馬生白額駒魏書蠕蠕傅賜阿哪壞父草馬五百匹吐谷渾𫝊吐谷渾嘗得波斯草馬放入海因生驄駒隋書許善心𫝊賜草馬二十匹廣韻牝馬曰騲顔氏家訓有云騲隲今人則以牡為兒馬牝為騍馬而唯牝驢乃言草驢草驢女猫今人謂牝驢為草驢北齊書楊愔𫝊選人魯漫漢在元子思坊騎秃尾草驢是北齊時已有此語山東河北人謂牝猫為女猫隋書外戚獨孤陀𫝊猫女可來無住宫中是隋時已有此語雌雄牝牡飛曰雌雄走曰牝牡雉鳴求其牡詩人以為不倫之刺然亦有不一者周禮疏引詩雄狐綏綏走亦曰雄書牝雞無晨飛亦曰牝今按經𫝊之文不止於此如詩爾牧來思以薪以蒸以雌以雄左傳干乘三去三去之餘獲其雄狐莊子猿猵狚音旦以為雌焦氏易林雄犬夜鳴雄羆在後晉書五行志吳郡婁縣人家聞地中有犬子聲掘之得雌雄各一木蘭詩雄兔腳撲朔雌兔眼迷離皆走而稱雌雄者也爾雅鷯鶉其雄鶛牝痺山海經帶山有鳥焉其狀如烏五采而赤文名曰鵸䳜是自為牝牡陽山有鳥焉其狀如雌雉而五采以文是自為牝牡名曰象蛇則飛而稱牝牡者也龍亦可稱雌雄左傳帝賜之乘龍河漢各二各有雌雄是也蟲亦可稱雌雄列子純雌其名大腰純雄其名稚蜂是也介蟲亦可稱雌雄莊子注司馬云雄者黿類雌者鱉類是也人亦可稱雌雄管子楚人攻宋鄭令其人有喪雌雄莊子魯哀公之言哀駘他曰且而雌雄合乎前是也虹亦可稱雌雄詩疏虹雙出色鮮盛者為雄雄曰虹暗者為雌雌曰霓是也容齊三筆引宋玉賦雄風雌風及師曠古有雄雷雌雷之說干支亦可稱雌雄史記索隱嵗雄在閼逄雌在攝提格月雄在畢雌在訾日雄在甲雌在子是也金亦可稱雌雄王子年拾遺記禹鑄九鼎擇雌金為陰鼎雄金為陽鼎是也石亦可稱雌雄後漢郡國志夜郎出雄黃雌黃是也符契亦可稱雌雄隋書髙祖紀頒木魚符於總管刺史雌一雄一唐六典太府寺置木契九十五隻雄付少府將作監雌留太府寺是也箭亦可稱雌雄遼史儀衛志木箭內箭為雄外箭為雌皇帝行幸則用之還宫勘箭官執雌箭東上閣門使執雄箭是也亦可稱牝牡宋沈括筆談大駕鹵薄中有勘箭如古之勘契也其牡謂之雄牡箭牝謂之仗箭本胡法也熙寧中罷之草木亦可稱牡周禮牡橭牡蘜注謂蘜之不華者檀弓牡麻爾雅牡菣牡􅀢牡茅儀禮注牡蒲史記封禪書牡荆本草牡桂是也車箱亦可稱牝考工記牝服正義云車較即今人謂之平鬲皆有孔內軨子於其中而又向下服故謂之牝服是也管鑰亦可稱牝牡漢書五行志長安章城門門牡自亡月令注鍵牡閉牝也正義凡鎖器入者謂之牡受者謂之牝是也棺蓋亦可稱牝牡禮記喪大記君蓋用漆正義用漆者塗合牝牡之中也是也瓦亦可稱牝廣韻􅂒牝瓦是也五藏亦可稱牝牡靈樞經肝心脾為牡藏肺腎為牝藏是也齒牙亦可稱牡說文牙牡齒是也徐曰此於齒為牡也九經字樣作牡齒病亦可稱牡史記倉公𫝊牡疝是也星亦可稱牝牡天文志太白在南嵗在北名曰牝牡是也法苑珠林虞喜天文論漢太初厯于一月甲子夜半冬至嵗雄在閼逢雌在攝提格月雄在畢雌在觜日雄在子大抵以十干為嵗陽故謂之雄十二支為嵗陰故謂之雌但畢觜為月雌雄不可曉今之言陰陽者未嘗用雌雄二字也郎顗𫝊引易雌雄祕歷今亡此書五行亦可稱牝牡左傳水火之牡也是也銅亦可稱牝牡抱朴于灌銅當以在火中向赤時有凸起者牡銅凹陷者牝銅是也若淮南子云北斗之神有雌雄月從一辰雄左行雌右行而隋書經籍志有孝經雌雄圖三卷五代史四夷附録髙麗王建進孝經雌圖一卷載日食星變不經之說則近於誕矣後周有典牝典牡上士中士以牝牡名官日知録卷三十二
