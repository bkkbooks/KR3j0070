body:
  text: 日知録卷二十一崑山顧炎武撰作詩之㫖舜曰詩言志此詩之本也王制命太師陳詩以觀民風此詩之用也荀子論小雅曰疾今之政以思徃者其言有文焉其聲有哀焉此詩之情也故詩者王者之迹也建安以下洎乎齊梁所謂辭人之賦麗以滛而於作詩之㫖失之遠矣唐白居易與元微之書曰年齒漸長閱事漸多每與人言多詢時務每讀書史多求理道始知文章合爲時而著歌詩合爲事而作又自叙其詩關於美刺者謂之諷諭詩自比於梁鴻五噫之作而謂好其詩者鄧魴唐衢俱死吾與足下又困躓豈六義四始之風天將破壊不可支持邪又不知天意不欲使下人病苦聞於上邪嗟乎可謂知立言之㫖者矣晋葛洪抱朴子曰古詩刺過失故有益而貴今詩純虛譽故有損而賤詩不必人人皆作古人之會君臣朋友不必人人作詩人各有能有不能不作詩何害若一人先倡而意已盡則亦無庸更續是以虞廷之上臯陶𢋫歌而禹益無聞古之聖人不肯爲雷同之辭駢拇之作也栢梁之宴金谷之集必欲人人以詩鳴而蕪累之言始多於世矣堯命厯而無歌文王演易而不作詩不聞後世之人議其劣於舜與周公也孔子以斯文自任上接文王之綂乃其事在六經而所自爲歌止於龜山彼婦諸作何寥寥也其不能與夫我則不暇與宋邵博聞見後録曰李習之與韓退之孟東野善習之於文退之所敬也退之與東野唱酬傾一時習之獨無詩退之不議也石林詩話人之才力有限李翶皇甫湜皆韓退之髙弟而二人獨不傳其詩不應散亡無一篇存者計或非其所長故不作耳二人以非其所長而不作賢於世之不能而强為之者也尹師魯與歐陽永叔梅聖俞善師魯於文永叔所敬也永叔與聖俞唱酬傾一時師魯獨無詩永叔不議也五子之歌適得五章以爲人各一章此又後人之見耳渭陽秦世子送舅氏也而晉公子無一言尹吉甫作崧高之詩以贈申伯烝民之詩以贈仲山甫韓弈之詩以贈韓侯而三人者不聞其有答是知古人之詩不以無和答爲嫌詩題三百篇之詩人大率詩成取其中一字二字三四字以名篇故十五國並無一題雅頌中間一有之若常武美宣王也若勺若賚若般皆廟之樂也其後人取以名之者一篇曰巷伯自此而外無有也雨無正篇韓詩篇首有雨無其極傷我稼穡二句五言之興始自漢魏而十九首並無題郊祀歌鐃歌曲各以篇首字爲題又如王曹皆有七哀而不必同其情六子皆有雜詩而不必同其義則亦猶之十九首也唐人以詩取士始有命題分韻之法而詩學衰矣杜子美詩多取篇中字名之如不見李生乆則以不見名篇近聞犬戎遠遁逃則以近聞名篇徃在西京時則以徃在名篇歴歴開元事則以歴歴名篇自平宫中吕太一則以自平名篇客從南溟來則以客從名篇皆取首二字爲題全無意義頗得古人之體古人之詩有詩而後有題今人之詩有題而後有詩有詩而後有題者其詩本乎情有題而後有詩者其詩狥乎物古人用韵無過十字三百篇之詩句多則必轉韻古人但謂之音不謂之韻今姑從俗名之耳魏晉以上亦然宋齊以下韻學漸興人文趨巧於是有强用一韻到底者終不及古人之變化自然也古人用韻無過十字者獨閟宫之四章乃用十二字使就此一韻引而伸之非不可以成章而於義必有不達故末四句轉一韻是知以韻從我者古人之詩也以我從韻者今人之詩也自杜拾遺韓吏部未免此病也葉少藴石林詩話曰長篇最難魏晉以前詩無過十韻者葢使人以意逆志初不以序事傾盡爲工至老杜述懷北征諸篇窮極筆力如太史公紀傳此固古今絶唱然八哀八篇本非集中高作而世多尊稱之不敢議如李邕蘓源明詩中極多累句余嘗痛刋去僅各取其半方爲盡善然此不可爲不知者言也詩主性情不貴竒巧唐以下人有强用一韻中字幾盡者有用險韻者有次人韻者皆是立意以此見巧便非詩之正格且如孔子作易彖象傳其用韻有多有少未嘗一律亦有無韻者可知古人作文之法一韻無字則及他韻他韻不恊則竟單行聖人無必無固於文見之矣詩有無韻之句詩以義為主音從之必盡一韻無可用之字然後旁通他韻又不得於他韻則寜無韻茍其義之至當而不可以他字易則無韻不害漢以上徃徃有之暮投石壕村有吏夜捉人杜甫石壕吏詩兩韻也至當不可易下句云老翁踰墻走老婦出門看則無韻矣亦至當不可易古辭紫騮馬歌中有舂榖持作飯採葵持作羮二句無韻李太白天馬歌中有白雲在青天邱陵遠崔嵬二句無韻野田黄雀行首二句逰莫逐炎洲翠棲莫近呉宫燕無韻行行且游獵篇首二句邉城兒生年不讀一字書無韻五經中多有用韻古人之文化工也自然而合於音則雖無韻之文而往往有韻茍其不然則雖有韻之文而時亦不用韻終不以韻而害意也三百篇之詩有韻之文也乃一章之中有二三句不用韻者如瞻彼洛矣維水泱泱之類是矣一篇之中有全章不用韻者如思齊之四章五章召旻之四章是矣又有全篇無韻者周頌清廟維天之命昊天有成命時邁武諸篇是矣說者以爲當有餘聲然以餘聲相恊而不入正文此則所謂不以韻而害意者也孔子賛易十篇其彖象傳雜卦五篇用韻然其中無韻者亦十之一文言繫辭說卦序卦五篇不用韻然亦間有一二如鼓之以雷霆潤之以風雨日月運行一寒一暑乾道成男坤道成女君子知微知彰知柔知剛萬夫之望此所謂化工之文自然而合者固未嘗有心於用韻也尚書之體本不用韻而大禹謨帝德廣運乃聖乃神乃武乃文皇天眷命奄有四海爲天下君伊訓聖謨洋洋嘉言孔彰惟上帝不常作善降之百祥作不善降之百殃爾惟德㒺小萬邦惟慶爾惟不德㒺大墜厥宗太誓我武惟揚侵于之疆取彼凶殘我伐用張于湯有光洪範無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直皆用韻又如曲禮行前朱鳥而後𤣥武左青龍而右白虎招揺在上急繕其怒禮運𤣥酒在室醴醆在戸粢醍在堂澄酒在下陳其犠牲備其鼎俎列其琴瑟管磬鐘皷修其祝嘏以降上神與其先祖以正君臣以篤父子以睦兄弟以齊上下夫婦有所是謂承天之祜樂記夫古者天地順而四時當民有德而五榖昌疾疢不作而無妖祥此之謂大當然後聖人作爲父子君臣以爲紀綱中庸故君子不可以不修身思修身不可以不事親思事親不可以不知人思知人不可以不知天孟子師行而糧食饑者弗食勞者弗息睊睊胥讒民乃作慝方命虐民飲食若流流連荒亡爲諸侯憂凡此之類在秦漢以前諸子書並有之太史公作賛亦時一用韻而漢人樂府詩反有不用韻者易韻易之有韻自文王始也凡卦辭之繁者時用韻蒙之瀆告解之復夙震之虩啞艮之身人是也至周公則辭愈繁而愈多用韻疑古卜辭當用韻若春秋傳所載懿氏之鏘姜卿京驪姬之渝羭蕕臭伯姬之􅎺貺償相姬旗師丘孤弧姑逋家虛鄢陵之䠞目孫文子之陵雄衛侯之羊亡竇踰又如國語所載晉獻公之骨猾捽史記所載漢文帝之庚王光漢書元后傳所載晉史之雄乘崩興皆韻也故孔子作彖象傳用韻葢本經有韻而傳亦韻此見聖人述而不作以古爲師而不苟也郭璞註爾雅釋訓篇本經有韻註亦用韻彖象傳猶今之箋註者析字分句以爲訓也繫辭文言以下猶今之箋註於字句明白之後取一章一篇全書之義而通論之也故其體不同古詩用韻之法古詩用韻之法大約有三首句次句連用韻隔第三句而於第四句用韻者關雎之首章是也凡漢以下詩及唐人律詩之首句用韻者源於此一起卽隔句用韻者卷耳之首章是也凡漢以下詩及唐人律詩之首句不用韻者源於此自首至末句句用韻者若考槃清人還著十畝之間月出素冠諸篇又如卷耳之二章三章四章車攻之一章二章三章七章長發之一章二章三章四章五章是也凡漢以下詩若魏文帝燕歌行之類源於此自是而變則轉韻矣轉韻之始亦有連用隔用之别而錯綜變化不可以一體拘於是有上下各自爲韻若兎罝及采薇之首章魚麗之前三章卷阿之首章者有首末自爲一韻中間自爲一韻若車攻之五章者有隔半章自爲韻若生民之卒章者有首提二韻而下分二節承之若有瞽之篇者此皆詩之變格亦莫非出於自然非有意爲之也古人不忌重韻杜子美作飲中八仙歌用三前二船二眠二天宋人疑古無此體遂欲分爲八章以爲必分爲八而後可以重押韻無害也不知柏梁臺詩三之三治二哉二時二來二材已先之矣東川有杜鶻西川無杜鶻涪萬無杜鶻雲安有杜鶻求其說而不得則疑以爲題下注不知古人未嘗忌重韻也故有四韻成章而唯用二字者胡爲乎株林從夏南匪適株林從夏南是也有二韻成章而惟用一字者大人占之維熊維羆男子之祥維虺維蛇女子之祥是也有三韻成章而惟用一字者苟日新日日新又日新是也湯濩曰儀禮祭侯辭惟若寜侯母或若女不寜侯左傳虞叔引諺匹夫無罪懐璧其罪曹子臧引志聖逹節次守節下失節晏子引諺非宅是卜惟隣是卜老子道可道非常道名可名非常名史記天官書欲終日有雨有雲有風有日月當其時者深而多實無雲有風日當其時淺而多實有雲風無日當其時深而少實皆古人以本字自爲韻者也如采薇首章連用二玁狁之故句正月一章連用二自口字十月之交首章連用二而微字車牽三章連用二庶幾字文王有聲首章連用二有聲字召旻卒章連用二百里字又如行露首章起用露字末用露字又如簡兮卒章連用三人字那連用三聲字其重一字者不可勝述漢以下亦然如陌上桑詩三頭字二隅字二餘字二夫字二鬚字羅敷字在下句末三見焦仲卿妻作三語字三言字二由字二母字二取字二子字二歸字二之字二君字二門字又二言字蘓武骨肉縁枝葉一首二人字結髮爲夫婦一首二時字陳思王棄婦詞二庭字二靈字二鳴字二成字二寧字阮籍詠懐詩灼灼西隤日一首二歸字張協襍詩黑蜧躍重淵一首二生字謝靈運君子有所思行二歸字梁武帝撰孔子正言竟述懐詩二反字任昉哭范僕射詩二生字三情字沈約鍾山詩二足字然則重韻之有忌其在隋唐之代乎諸葛孔明梁父吟云問是誰家墓田疆古冶子又云誰能爲此謀國相齊晏子用二子字古人但取文理明當而已初不避重字也今本或改作田疆古冶氏失之矣潘岳秋興賦宵耿介而不寐兮獨展轉於華省悟時嵗之遒盡兮慨俛首而自省用二省字初唐詩最爲嚴整而盧照鄰長安古意别有豪華稱將相轉日囘天不相譲意氣由來排灌夫專權判不容蕭相用二相字今人謂必字同而義異者方可重用若此詩之二相固無異義也且詩曰王命南仲往城于方其下文又曰天子命我城彼朔方有何異義哉李太白高陽歌二杯字廬山謡二長字杜子美織女詩二中字奉先縣詠懐二卒字兩當縣呉十侍御江上宅二白字八哀詩張九齡一首二省字二境字園人送𤓰二草字寄狄明府二濟字宿鑿石浦二繫字韓退之此日足可惜詩二光字二鳴字二更字二城字二狂字二江字王摩詰故太子太師徐公輓歌重用二名字施之律詩則爲非體詩有以意轉而韻須重者如今夕何夕見此良人子兮子兮如此良人何嚶其鳴矣求其友聲相彼鳥兮猶求友聲有杕之杜其葉萋萋王事靡盬我心傷悲卉木萋止女心悲止於論皷鐘於樂辟廱於論皷鐘於樂辟廱又若公無渡河公竟渡河此皆承上文而轉者不容别換一字七言之始昔人謂招魂大招去其些只卽是七言詩余考七言之興自漢以前固多有之如靈樞經刺節眞邪篇凡刺小邪日以大補其不足乃無害視其所在迎之界凡刺寒邪日以温徐徃徐來致其神門戸已閉氣不分虛實得調其氣存宋玉神女賦羅紈綺繢盛文章極服妙絲照萬方此皆七言之祖素問八正神明論神乎神耳不聞目明心開而志先慧然獨悟口弗能言傑視獨見適若昏昭然獨明若風吹雲故曰神三部九候爲之原九鍼之論不必存其文絶似荀子成相篇一言緇衣三章章四句非也敝字一句還字一句若曰敝予還予則言之不順矣且何必一言之不可爲詩也呉志歴陽山石文楚九州渚呉九州都楚字一句吳字一句亦是一言之詩古人未有之格語助之外止用四字成詩而四字皆韻古未之有也始見於莊子父邪母邪天乎人乎是也三章章各二句而合爲一韻古未之有也始見於孟嘗君傳長鋏歸來乎食無魚長鋏歸來乎出無車長鋏歸來乎無以爲家是也古人不用長句成篇古詩有八言者胡瞻爾庭有縣貆兮是也有九言者凛乎若朽索之馭六馬是也然無用爲全章者不特以其不便於歌也長則意多冗字多懈其於文也亦難之矣以是知古人之文可止則止不肯以一意之冗一字之懈而累吾作詩之本義也正義引顔延之云詩體無九言者將由聲度闡緩不恊金石知此義者不特句法也章法可知矣七言排律所以從來少作作亦不工者何也意多冗也字多懈也爲七言者必使其不可裁而後工也此漢人所以難之也詩用疊字詩用疊字最難衛詩河水洋洋北流活活施罛濊濊鱣鮪發發葭菼掲掲庶姜孽孽連用六疊字可謂複而不厭賾而不亂矣古詩青青河畔草鬱鬱園中柳盈盈樓上女皎皎當窓牖娥娥紅粉粧纎纎出素手連用六疊字亦極自然下此卽無人可繼屈原九章悲囘風紛容容之無經兮㒺芒芒之無紀軋洋洋之無從兮馳逶移之焉止漂翻翻其上下兮翼遥遥其左右汜潏潏其前後兮伴張弛之信期連用六疊字宋玉九辯乘精氣之搏搏兮騖諸神之湛湛驂白霓之習習兮歴羣靈之豊豊左朱雀之茇茇兮右蒼龍之躣躣屬雷師之闐闐兮通飛亷之衙衙前輕輬之鏘鏘兮後輜乘之從從載雲旗之委蛇兮扈屯騎之容容連用十一疊字後人辭賦亦罕及之者次韻今人作詩動必次韻以此爲難以此爲巧吾謂其易而拙也且以律詩言之平聲通用三十韻之中任用一韻而必無他韻可易一韻數百字之中任押五字而必無他字可易名爲易其實難矣先定五字而以上文凑足之文或未順則曰牽於韻爾意或未滿則曰束於韻爾用事遣辭小見新巧卽可擅塲名爲難其實易矣夫其巧於和人者其胸中本無詩而拙於自言者也故難易巧拙之論破而次韻之風可少衰也嚴滄浪詩話曰和韻最害人詩古人酬唱不次韻此風始盛於元白皮陸本朝諸賢乃以此而闘工遂至往復有八九和者按唐元稹上令狐相公啓曰稹與同門生白居易友善居易雅能爲詩就中愛驅駕文字窮極聲韻或爲千言或爲五百言律詩以相投寄小生自審不能有以過之往往戱排舊韻别創新詞名爲次韻葢欲以難相挑耳江湖間爲詩者或相倣斆或力不足則至於顚倒語言重復首尾韻同意等不異前篇亦目爲元和詩體而司文者考變雅之由往往歸咎於稹是知元白作詩次韻之初本自以爲戱而當時即已取譏於人今人乃爲之而不厭又元白之所鄙而不屑者矣歐陽公集古録論唐薛苹倡和詩曰唐書薛苹河中寳鼎人長於詩其間馮宿馮定李紳皆唐顯人靈澈以詩名後世然詩皆不及苹葢倡者得於自然和者牽於强作可謂知言朱子答謝成之書謂淵明詩所以爲髙正在不待安排胸中自然流出東坡乃篇篇句句依韻而和之雖其高才似不費力然已失其自然之趣矣凡詩不束於韻而能盡其意勝於爲韻束而意不盡且或無其意而牽入他意以足其韻者千萬也故韻律之道疏宻適中爲上不然則寜疏無宻文能發意則韻雖疎不害栢梁臺詩漢武栢梁臺詩本出三秦記云是元封三年作而考之於史則多不符按史記及漢書孝景紀中六年夏四月梁王薨諸侯王表梁孝王武立三十五年薨孝景後元年其王買嗣七年薨建元五年平王㐮嗣四十年薨文三王傳同又按孝武紀元鼎二年春起柏梁臺是爲梁平王之二十二年而孝王之薨至此已二十九年又七年始爲元封三年又按平王㐮元朔中以與太母争樽公卿請廢爲庶人天子曰梁王㐮無良師傅故陷不義乃削梁八城梁餘尚有十城漢書言削五縣僅有八城又按平王㐮之十年爲元朔二年來朝其三十六年爲太初四年來朝皆不當元封時又按百官公卿表郎中令武帝太初元年更名光禄勲典客景帝中六年更名大行令武帝太初元年更名大鴻臚治粟內史景帝後元年更名大農令武帝太初元年更名大司農中尉武帝太初元年更名執金吾内史景帝二年分置左內史右內史武帝太初元年更名京兆尹左內史更名左馮翊主爵中尉景帝中六年更名都尉武帝太初元年更名右扶風凡此六官皆太初以後之名不應預書於元封之時又按孝武紀太初元年冬十一月乙酉栢梁臺災夏五月正厯以正月爲歳首定官名則是栢梁旣災之後又半歳而始改官名而大司馬大將軍青則薨於元封之五年距此已二年矣反覆考證無一合者葢是後人擬作剽取武帝以來官名及梁孝王世家乘輿駟馬之事以合之而不悟時代之乖舛也按世家梁孝王二十九年表孝景前七年十月入朝景帝使使持節乘輿駟馬迎梁王於闕下臣瓉曰天子副車駕駟馬此一時異數平王安得有此詩體代降三百篇之不能不降而楚辭楚辭之不能不降而漢魏漢魏之不能不降而六朝六朝之不能不降而唐也勢也用一代之體則必似一代之文而後爲合格詩文之所以代變有不得不變者一代之文沿襲已乆不容人人皆道此語今且千數百年矣而猶取古人之陳言一一而摹倣之以是爲詩可乎故不似則失其所以爲詩似則失其所以爲我李杜之詩所以獨高於唐人者以其未嘗不似而未嘗似也知此者可與言詩也已矣書法詩格南北朝以前金石之文無不皆八分書者是今之眞書不足爲字也姚鉉之唐文粹吕祖謙之皇朝文鑑眞德秀之文章正宗凡近體之詩皆不収是今之律詩不足爲詩也今人將繇眞書以窺八分繇律詩以學古體是從事於古人之所賤者而求其所最工豈不難哉鄞人薛千仞岡曰自唐人之近體興而詩一大變後學之士可兼爲而不可專攻者也近日之弊無人不詩無詩不律無律不七言又曰七言律法度貴嚴對偶貴整音節貴響不易作也今初學後生無不爲七言律似反以此爲入門之路其終身不得窺此道藩籬無怪也詩人改古事陳思王上書絶纓盜馬之臣赦楚趙以濟其難註謂赦盜馬秦穆公事秦亦趙姓故互文以避上秦字也趙至與嵇茂齊書梁生適越登岳長謡梁鴻本適呉而以爲越者呉爲越所滅也謝靈運詩弦高犒晋師仲連郤秦軍弦高所犒者秦師而改爲晋以避下秦字則舛而陋矣李太白行路難詩華亭鶴唳詎可聞上蔡蒼鷹安足道杜子美諸將詩昨日玉魚蒙塟地早時金盌出人間改黄犬爲蒼鷹改玉盌爲金盌亦同此病自漢以來作文者即有囘避假借之法太史公伯夷傳伯夷叔齊雖賢得夫子而名益彰顔淵雖篤學附驥尾而行益顯本當是附夫子耳避上文雷同改作驥尾使後人為之豈不為人譏笑庾子山賦誤庾子山枯樹賦云建章三月火按史記武帝太初元年冬十一月乙酉柏梁臺災春二月起建章宫西京賦柏梁既災越巫陳方建章是經用厭火祥是災者柏梁非建章而三月火又秦之阿房非漢也哀江南賦云栩陽亭有離别之賦夜聽擣衣曲云栩陽離别賦按漢書藝文志别栩陽賦五篇詳其上下文例當是人姓名姓别名栩陽也以爲離别之别又非也于仲文詩誤隋于仲文詩景差方入楚樂毅始遊燕按漢書高帝紀徙齊楚大族昭氏屈氏景氏懐氏齊田氏五姓關中與利田宅景駒注文頴曰楚族景氏駒名王逸楚辭章句三閭之職掌王族三姓曰昭屈景然則景差亦楚之同姓也而仲文以爲入楚豈非梁陳已下之人但事辭章而不詳典據故邪梁武帝天監元年詔曰雉兎有刑姜宣致貶此用孟子殺其麋鹿者如殺人之罪而不知宣王乃田氏非姜後也與此一類李太白詩誤李太白詩漢家秦地月流影照明妃一上玉關道天涯去不歸按史記言囟奴左方王將直上谷以東右方王將直上郡以西而單于之庭直代雲中漢書言呼韓邪單于自請畱居光禄塞下又言天子遣使送單于出朔方雞鹿塞今在河套内後單于竟北歸庭乃知漢與囟奴徃來之道大抵從雲中五原朔方明妃之行亦必出此故江淹之賦李陵但云情往上郡心畱鴈門而玉關與西域相通自是公主嫁烏孫所經太白誤矣顔氏家訓謂文章地理必須惬當其論梁簡文鴈門太守行而言日逐康居大宛月氐蕭子暉隴頭水而云北注黄龍東流白馬沈存中論白樂天長恨歌峨眉山下少人行謂峨睂在嘉州非幸蜀路文人之病葢有同者梁徐悱登琅邪城詩甘泉警烽候上谷抵樓蘭上谷在居庸之北而樓蘭為西域之國在玉門關外即此一句之中文理已自不通其不切琅邪城又無論也郭璞賦誤郭璞江賦總括漢泗兼包淮湘淮泗並不入江豈因孟子而誤邪陸機文誤陸機漢高帝功臣頌侯公伏軾皇媪來歸乃不考史書之誤漢儀注高帝母兵起時死小黄後於小黄作陵廟本紀五年即皇帝位於汜水之陽追尊先媪爲昭靈夫人則其先亡可知而十年有太上皇后崩乃太上皇崩之誤文重書而未删也侯公說羽羽乃與漢約中分天下九月歸太公吕后並無皇媪字春秋以上言文不言字如左傳於文止戈爲武故文反正爲乏於文皿蟲爲蠱及論語史闕文中庸書同文之類並不言字易女子貞不字十年乃字詩牛羊腓字之左傳其僚無子使字敬叔皆訓爲乳書康誥于父不能字厥子左傳樂王鮒字而敬小事大大字小亦取愛飬之義惟儀禮士冠禮賓字之禮記郊特牲冠而字之敬其名也與文字之義稍近亦未嘗謂文爲字也以文爲字乃始於史記秦始皇琅邪臺石刻曰同書文字說文序云依類象形謂之文形聲相益謂之字文者象物之本字者孳乳而生孝經援神契亦有此語周禮外史掌達書名於四方註云古曰名今曰字儀禮聘禮註云名書文也今謂之字三國志注孫亮時有山隂朱育依體像類造作異字干名以上此則字之名自秦而立自漢而顯也與許氏說文序此十四篇五百四十部九千三百五十三文解說凡十三萬三千四百四十一字以篆書謂之文𨽻書謂之字張揖上博雅表凡萬八千一百五十文唐𤣥度九經字様序凡七十六部四百廿一文則通謂之文三代以上言文不言字李斯程邈出文降而爲字矣二漢以上言音不言韻周顒沈約出音降而爲韻矣古文古時文字不一如漢汾隂宫鼎其葢銘曰汾隂供官銅鼎葢二十枚二十字作十十鼎銘曰汾隂供官銅鼎二十枚二十字作牛其末曰第二十三二十字作廿一器之銘三見而三不同自唐以後文字日繁不得不歸一律而古書之不復通者多矣說文自𨽻書以來其能發明六書之指使三代之文尚存於今日而得以識古人制作之本者許叔重說文之功爲大後之學者一㸃一畫莫不奉之爲規矩而愚以爲亦有不盡然者且以六經之文左氏公羊榖梁之傳毛萇孔安國鄭衆馬融諸儒之訓而未必盡合况叔重生於東京之中世所本者不過劉歆賈逵杜林徐廵等十餘人之說楊愼六書索隠序曰說文有孔子說楚莊王說左氏說韓非說淮南子說司馬相如說董仲舒說京房說衛宏說揚雄說劉歆說桑欽說杜林說賈逵說傅毅說官溥說譚長說王育說戸說張林說黄顥說周盛說逯安說歐陽僑說寗嚴說爰禮說徐廵說莊都說張徹說而以爲盡得古人之意然與否與一也五經未遇蔡邕等正定之先傳寫人人各異今其書所收率多異字而以今經校之則說文爲短又一書之中有兩引而其文各異者如汜下引詩江有汜洍下引詩江有洍逑下引書旁逑孱功僝下引書旁救僝功卺下引詩赤舄己巳掔下引詩赤舄掔掔後之讀者將何所從二也鄭𤣥常駮許愼五經異義顔氏家訓亦云說文中有援引經傳與今乖者未之敢從流傳旣乆豈無脫漏即徐鉉亦謂篆書堙替日乆錯亂遺脫不可悉究今謂此書所闕者必古人所無别指一字以當之如說文無劉字後人以鎦字當之無由字以甹字當之無免字以絻字當之改經典而就說文支離囘互三也今舉其一二評之如秦宋薛皆國名也秦從禾以地宜禾亦已迂矣宋从木爲居薛从辛爲辠此何理也費誓之費改爲䉾訓爲惡米武王載斾之斾改爲坺訓爲臿土威爲姑也爲女隂殹爲擊聲困爲故廬普爲日無色此何理也貉之爲言惡也視犬之字如畫狗狗叩也豈孔子之言乎訓有則曰不宜有也春秋書日有食之訓郭則曰齊之郭氏善善不能進惡惡不能退是以亡國不幾於勦說而失其本指乎居為法古用爲卜中童爲男有辠㐮為解衣耕弔爲人持弓會敺禽辱爲失耕時臾爲束縛捽抴罰爲持刀罵詈勞爲火燒門宰爲辠人在屋下執事㝠爲十六日月始虧刑爲刀守并不幾於穿鑿而遠於情理乎武􅀢師之而制字荆公廣之而作書不可謂非濫觴於許氏者矣若夫訓參爲啇星此天文之不合者也訓亳爲京兆杜陵亭此地理之不合者也書中所引樂浪事数十條而他經籍反多闕畧此采摭之失其當者也今之學者能取其大而棄其小擇其是而違其非乃可謂善學說文者與後周書黎景熈其從祖廣太武時爲尚書郎善古學嘗從吏部尚書崔𤣥伯受字義又從司徒崔浩學楷篆自是家傳其法景熈亦傳習之頗與許氏有異可見魏晋以來傳受亦各不同王莽傳劉之爲字卯金刃也正月剛卯金刀之利皆不得行食貨志亦云又曰受命之日丁卯丁火漢氏之德也卯劉姓所以爲字也光武告天祝文引䜟記曰卯金修德爲天子公孫述引援神契曰西太守乙卯金謂西方太守而乙絶卯金也是古未嘗無劉字也趙䆠光曰說文無劉字但作鎦今按漢書卯金刀之䜟及古印流傳者劉姓不下數十百面並作劉無鎦字魏明帝太和初公卿奏言夫歌以詠德舞以象事於文文武爲斌臣等謹製樂舞名曰章斌之舞魏去叔重未遠是古未嘗無斌字也徐鉉較定說文前列斌字云是俗書說文原本次第不可見今以四聲列者徐鉉等所定也切字鉉等所加也趙古則六書本義曰漢以前未有反切許氏說文鄭氏箋註但曰讀若某而已今說文反切乃朱翺以孫愐唐韻所加旁引後儒之言如杜預裴光遠李陽氷之類亦鉉等加也又云諸家不収今附之字韻末者瀰下亦鉉等加也眸字下云說文直作牟趙宧光曰詳此則本書雜出衆人之手審矣安得不蕪穢也凡参訂經傳必以本人名冠之方不混於前人耳始字說文以爲女之初也已不必然而徐鉉釋之以至哉坤元萬物資始不知經文乃是大哉乾元萬物資始若用此觧必從男乃合耳說文長箋萬厯末吳中趙凡夫宧光作說文長箋將自古相傳之五經肆意刋改好行小慧以求異於先儒乃以靑靑子衿為滛奔之詩而謂衿即衾字詩中元有衾字抱衾與裯錦衾爛兮如此類者非一其實四書尚未能成誦而引論語虎兕出於柙誤作孟子虎豹出亏兕下然其於六書之指不無管闚而適當喜新尚異之時此書乃盛行於世及今不辯恐他日習非勝是為後學之害不淺矣故舉其尤剌謬者十餘條正之舊唐書文宗紀開成二年宰臣判國子監祭酒鄭覃進石壁九經一百六十卷九經者易書詩三禮春秋三傳又有孝經論語爾雅其實乃十二經又有張參五經文字唐𤣥度九經字様皆刻之於石今現在西安府學凡夫乃指此為蜀本石經又云張参五經文字唐𤣥升九經字様亦附蜀本之後但可作蜀經字法今此石經末有年月一行諸臣姓名十行大書開成二年丁巳歳凡夫豈未之見而妄指為孟蜀邪又云孫愐唐韻文殷二韻三聲皆分獨上聲合一咸嚴洽業二韻平入則分上去則合按今廣韻即孫愐之遺文殷上聲之合則有之咸嚴洽業則四聲並分無併合者切者兩字相摩以得其音取其切近今改為盜竊之竊於古未聞豈凡夫所以自名其學者邪𤓰分字見史記虞卿傳漢書賈誼傳戰國䇿注分其地如破𤓰然鹽鐵論隔絶羗胡𤓰分其地竈突字見漢書霍光傳今云𤓰當作瓜突當作突然則鮑昭蕪城賦所謂竟𤓰剖而豆分魏𤣥同䟽所謂𤓰分瓦裂者古人皆不識字邪按張參五經文字云突徒兀反作突者訛顧野王陳人也而以爲晉之虎頭颼下頭顧長康為虎將軍陸龜䝉唐人也而以爲宋之象山乙下山陸九淵號象先生王筠梁人也而以爲晉蜺下雌梁書王筠傳沈約以郊居賦示筠讀至霓連踡約撫手欣忭今引此事謂之晋王筠約既梁人安得與晋人語哉王禹偁宋人也而以爲南朝稱下此眞所謂不學墻面者與晉獻帝醉虞侍中命扶之扶下按晉書虞嘯父傳為孝武帝所親愛侍飲大醉拜不能起帝顧曰扶虞侍中嘯父曰臣位未及扶醉不及亂非分之賜所不敢當帝甚悅傳首明有孝武帝字引書者未會全讀但見中間有貢獻之獻適與帝字相接遂以爲獻帝而不悟晉之無獻帝也萬厯間人看書不看首尾只看中間兩三行凡夫著書之人乃猶如此恂字箋漢宣帝諱而不知宣帝諱詢荀悅曰詢之字曰謀非恂也衍字箋漢平帝諱而不知平帝諱衎荀悅曰衎之字曰樂師古曰衎音口旱反非衍也後漢書劉虞傳故吏尾敦於路刼虞首歸葬之註尾姓敦名引之云後漢尾敦路刼劉虞首歸之莽若以敦路為人名而又以葬為莽是劉幽州之首竟歸之於王莽也左氏成六年傳韓獻子曰易覯則民愁民愁則墊隘說文􅀢墊二字兩引之而一作阨者古隘阨二字通用也箋乃云未詳何出野下引左傳身横九野不知其當爲九畝又榖梁傳之文而非左氏也鵲鶪醜其飛也㚇㚇下此爾雅釋鳥文箋乃曰訓辭未詳然非後人語驠馬白州也驠下本之爾雅釋畜白州驠註州竅也謂馬之白尻者箋乃云未詳疑誤中國之稱夏尚矣今以爲起於唐之夏州其説之荒唐悠謬可發一笑姑未遑逺徵即以尚書論語言之其所稱夏吾不知唐虞三代其時已有夏州乎又按夏州本朔方郡赫連勃勃建都於此自號曰夏後魏滅之而置夏州亦不始於唐也云唐中晚詩文始見簿字前此無之譜下不知孟子言孔子先簿正祭器史記李廣傳急責廣之莫府對簿張湯傳使使八軰簿責湯孫寳傳御史大夫張忠署寳主簿後漢輿服志毎出太僕奉駕上鹵簿馮異傳光武署異爲主簿而劉公幹詩已云沈迷簿領書回回自昬亂矣眊字云字不見經若言五經則不載者多矣何獨眊字若傳記史書則此字亦非隱僻晉語被羽先升註繫於背若今將軍負眊矣劉畧劉備性好結眊呉志甘寧傳負眊帶鈴梁劉孝儀和昭明太子詩山風亂采眊初景麗文轅禰衡爲皷吏作漁陽撾摻摻乃操字操下按後漢書衡方爲漁陽參撾蹀𨄌而前註引文士傳作漁陽參搥王僧孺詩云散度廣陵音參冩漁陽曲自註云參音七紺反乃曲奏之名後人添手作摻後周庾信詩玉堦風轉急長城雲應闇新綬始欲縫細錦行湏篸聲煩廣陵散杵急漁陽摻隋煬帝詩今夜長城下雲昬月應暗誰見倡樓前心悲不成摻唐李頎詩忽然更作漁陽摻黄雲蕭條白日暗正音七紺反今以爲操字而又倒其文不知漢人書操固有借作摻者而非此也叩京兆藍田鄉箋云地近京口故从口叩下夫藍田乃今之西安府屬而京口則今之鎮江府此所謂風馬牛不相及者凡此書中㑹意之解皆京口之類也寸十分也漢書律厯志一黍爲一分十分爲一寸本無可疑而増其文曰析寸爲分當言十分尺之一寸下夫古人之書豈可意爲増改哉五經古文趙古則六書本義序曰魏晉及唐能書者軰出但㸃畫波折逞其姿媚而文字破碎然猶頼六經之篆未易至天寶間詔以𨽻法冩六經於是其道盡廢以愚考之其説殆不然按漢書藝文志曰尚書古文經四十六卷又曰孝經古孔氏一篇皆出孔氏壁中又曰有中古文易經而不言其所出後傳儒林傳言東萊費直傳易授琅邪王横本以古字號古文易又曰禮古經五十六卷春秋古經十二篇論語古二十一篇但言古不言文而赤睂之亂則已焚燒無遺後漢書杜林傳曰林前於西州得漆書古文尚書一卷常寳愛之雖遭艱困握持不離身出以示衛宏徐巡曰林流離兵亂常恐斯經將絶何意東海衛子濟南徐生復能傳之是道竟不墜於地也古文雖不合時務然願諸生無悔所學宏巡益重之於是古文遂行是東京古人之傳惟尚書而已晉書衛恒傳言魏初傳古文者出於邯郸淳至正始中立三字石經轉失淳法因科斗之名遂效其形後漢書儒林傳誤以三體書法為熹平所刋未知所立㡬經而唐初魏徴等作隋書經籍志但有三字石經尚書五卷三字石經春秋三卷註云梁有十二卷則他經亦不存矣册府元龜唐𤣥宗天寳三載詔曰朕欽惟載籍討論墳典以爲先王令範莫越於唐虞上古遺書實稱於訓誥雖百篇奥義前代或亡而六體竒文舊規猶在但以古先所制有異於當今傳冩浸訛有疑於後學永言刋革必在從宜尚書應是古體文字竝依今字繕冩施行其舊本仍藏之書府是𤣥宗所改亦止於古文尚書而不聞有他經也夫諸經古文之亡其已乆矣今謂五經皆有古文而𤣥宗改之以今豈其然乎孔安國書序曰科斗書廢已乆時人無能知者以所聞伏生之書攷論文義定其可知者爲𨽻古定正義曰就古文體而從𨽻定之故曰𨽻古以雖𨽻而猶古也更以竹簡冩之是則西漢之時所云古文者不過𨽻書之近古而共王所得科斗文字乆已不傳𤣥宗所謂六體竒文葢正始之書法也宋晁公武古文尚書序曰余抵少城作石經考異之餘因得此古文全編於學宫乃延士張􅡃倣吕氏所鏤本書丹刻諸石方將配孝經周易經文之古者附於石經之列末書乾道庚寅今其石當已不存而摹本亦未見傳之人間也世無好古之人雖金石其能保與今有廣信楊時喬所刻周易古文恐亦後人以意為之不必有所受也急就篇漢魏以後童子皆讀史游急就篇晉夏侯湛抵疑鄉曲之徒一介之士曽諷急就習甲子魏書崔浩表言太宗即位元年勑臣解急就章劉芳撰急就篇續注音義證三卷陸暐擬急就篇爲悟蒙章又書家亦多冩急就篇晁氏讀書記曰自昔善小學者多書急就章故有鍾繇皇象衛夫人王羲之所書傳于世魏書崔浩傳浩既工書人多託冩急就章從少至老初不憚勞所書葢以百數儒林傳劉蘭始入小學書急就篇家人覺其聰敏北齊書李繪六歲未入學伺伯姊筆讀之閒輙竊用未㡬遂通急就章李鉉九歲入學書急就篇月餘便通自唐以下其學漸㣲明初武官誥勅用二十八宿編號永樂中字盡奉㫖用漢急就章字千字文千字文元有二本梁書周興嗣傳曰高祖以三橋舊宅爲光宅寺勅興嗣與陸倕製碑及成俱奏高祖用興嗣所製者自是銅表銘栅塘碣北伐檄次韻王羲之書千字竝使興嗣爲之蕭子範傳曰子範除大司馬南平王户曹屬從事中即使製千字文其辭甚美命記室蔡薳注釋之舊唐書經籍志千字文一卷蕭子範撰又一卷周興嗣撰是興嗣所次者一千字文而子範所製者又一千字文也陳書沈衆傳是時梁武帝制千字詩衆為之注解是乂不獨興嗣子範二人矣乃隋書經籍志云千字文一卷梁給事郎周興嗣撰千字文一卷梁國子祭酒蕭子雲注梁書本傳謂子範作之而蔡薳爲之注釋今以爲子雲注子雲乃子範之弟則異矣宋史李至傳言千字文乃梁武帝得鍾繇書破碑千餘字命周興嗣次韻而成山堂考索同本傳以爲王羲之而此又以爲鍾繇則又異矣隋書舊唐書志又有演千字文五卷不著何人作隋書文苑傳秦王俊令潘徽為萬字文淳化帖有漢章帝書百餘字皆周興嗣千字文中語東觀餘論曰此書非章帝然亦前代人作但錄書者集成千字中語耳歐陽公疑以爲漢時學書者多爲此語而後村劉氏遂謂千字文非梁人作誤矣黄魯直䟦章草千字文曰章草言可以通章奏耳非章帝書也草書褚先生補史記三王世家曰至其次序分絶文字之上下簡之參差長短皆有意人莫之能知謹論次其真草詔書編于左方是則褚先生親見簡䇿之文而孝武時詔即已用草書也魏志劉廙傳轉五官將文學文帝器之令廙通草書則漢魏之間箋啟之文有用草書者矣晉書郄鍳傳帝以鍳有器望萬機動静輙問之乃詔特草上表疏以從簡易故草書之可通於章奏者謂之章草趙彦衛雲麓漫鈔言宣和中陜右人發地得木簡字皆章草乃永初二年發夫討畔羌檄米元章帖言章草乃章奏之章今攷之既用於檄則理容概施於章奏葢小學家流自古以降日趋於簡便故大篆變小篆小篆變𨽻比其乆也復以𨽻爲繁則章奏文移悉以章草從事亦自然之勢張懐瓘書斷曰章草者漢黄門令史游所作也王愔云漢元帝時史游作急就章解散𨽻體漢俗簡惰漸以行之是也此又一説故雖曰草而𨽻筆仍在良繇去𨽻未遠故也右軍作草猶是其典刑故不勝爲冗筆逮張旭懐素軰出則此法掃地矣北齊趙仲將學渉羣書善草𨽻雖與弟書字皆楷正云草不可不解若施之於人似相輕易若與當家中卑幼又恐其疑是以必湏𨽻筆唐席豫性謹雖與子弟書疏及吏曹簿領未嘗草書謂人曰不敬他人是自不敬也或曰此事甚細卿何介意豫曰細猶不謹而况巨邪栁仲郢手鈔九經三史下及魏晉南北諸史皆楷小精真無行字宋劉安世終身不作草字書尺牘未嘗使人代張觀平生書必爲楷字無一行草類其爲人古人之謹重如此舊唐書王君廓爲幽州都督李𤣥道爲長史君廓入朝𤣥道附書與其從甥房𤣥齡君廓私發之不識草字疑其謀已懼而奔叛𤣥道坐流嶲州夫草書之釁乃至是邪金石錄金石錄有宋公䜌餗鼎銘云按史記世家宋公無名䜌者莫知其爲何人今考左傳宋元公之太子欒嗣位爲景公漢書古今人表有宋景公兜欒而史記宋世家元公卒子景公頭曼立是兜欒之音訛爲頭曼而宋公䜌即景公也宗均之誤爲宋不必證之碑及黨錮傳即南蠻傳云㑹援病卒謁者宗均聽悉受降爲置吏司羣蠻遂平事與本傳合而南蠻傳作宗本傳作宋其誤顯然註未及正黨錮傳註宗資字叔都南陽安衆人祖父均自有傳房彦謙高祖法夀自宋歸魏封壯武侯子孫承襲魏隋唐三書皆同獨碑作莊武按漢膠東國有壯武縣文帝封宋昌爲壯武侯正義曰括地志云壯武故城在萊州即墨縣西六十里後漢志壯武故夷國左傳隱元年紀人伐夷是也賈復傳封膠東侯食郁秩壯武等六縣晉張華亦封壯武侯字竝作壯獨此碑與左傳杜氏註作莊鑄印作減筆字太原府徐溝縣有同戈驛其名本取洞渦水此水出樂平縣西四十里陡泉嶺經平定州壽陽榆次至徐溝縣入汾今徐溝縣北五里洞渦河其陽有洞渦村是也水經洞渦水出沾縣北山西過榆次縣南又西到晉陽縣南西入於汾酈道元注劉琨之爲并州也劉淵引兵邀擊之合戰于洞渦即是水也舊唐書昭宗紀天復元年四月氏叔琮營于洞渦驛五代史唐本紀同新唐書地理志太原郡有府十八其一曰洞渦宋史曹彬傳爲前軍都監戰洞渦河北漢世家李繼勲敗繼㤙兵於洞渦河唯魏書地形志晉陽下云同過水出木𤓰嶺一出沾嶺一出大亷山一出原洞祠下五水合道故曰同過西南入汾則又作同過字異有又按上文止四水或脱漏後人減筆借書同戈字而今鑄印遂作同戈以減借之字登於印文又不但馬文淵所言成皋印㸃畫之訛而已今驛多用古地名者洪武九年四月壬辰以天下驛傳之名多因俚俗命翰林考古正之如揚州府曰廣陵驛鎮江府曰京口驛凡改者二百三十二徐溝無古地名故以水名之畫古人圖畫皆指事爲之使觀者可法可戒上自三代之時則周明堂之四門墉有堯舜之容桀紂之象有周公相成王負斧扆南面以朝諸侯之圖孔子家語楚有先王之廟及公卿祠堂圖畫天地山川神靈琦瑋僪佹及古賢聖怪物行事王逸楚辭章句秦漢以下見於史者如周公負成王圖霍光傳成慶畫景十三王傳所猶言成慶圖非成慶畫也紂醉踞妲己圖叙傳屏風圖畫列女宋𢎞傳戴逵畫南都賦圖世説之類未有無因而作逮乎隋唐尚沿其意唐藝文志所列漢王元昌畫漢賢王圖閻立德畫文成公主降蕃圖玉華宫圖闘雞圖閻立本畫秦府十八學士圖凌煙閣功臣二十四人圖范長壽畫風俗圖醉道士圖王定畫本草訓戒圖貞觀尚方令檀智敏畫游春戯藝圖振武校尉殷􅛴韋無沗畫皇朝九聖圖高祖及諸王圖太宗自定輦上圖開元十八學士圖開元人董蕚畫鞶車圖開元人字重照曹元廓畫後周北齊梁陳隋武德貞觀永徽間朝臣圖高祖太宗諸子圖秦府學士圖凌煙圖武后左尚方令楊昇畫望賢宫圖安祿山真張萱畫伎女圖乳母將嬰児圖按羯皷圖鞦韆圖竝開元館畫直談皎畫武惠妃舞圖佳麗寒食圖佳麗伎女圖韓幹畫龍朔功臣圖姚宋及安祿山圖相馬圖𤣥宗試馬圖寧王調馬打毬圖大梁人大府寺丞陳宏畫安祿山圖𤣥宗馬射圖上黨十九瑞圖永王府長史王象畫鹵簿圖田琦畫洪崖子橘木圖德平子汝南太守竇師綸畫內庫瑞錦對雉闘羊翔鳯游麟圖字希言太宗秦王府諮議相國錄事參軍封陵陽公韋鶠畫天竺胡僧渡水放牧圖鑾子周昉畫撲蝶按筝楊真人降真五星等圖字景𤣥各一卷唐文粹有王藹記漢公卿祖二疏圖舒元輿記桃源圖通鑑蜀嘉州司馬劉賛獻陳後主三閣圖皆指事象物之作王維傳人有得奏樂圖不知其名維視之曰此霓裳第三疊第一拍也好事者集樂工按之無差自實體難工空摹易善於是白描山水之畫興而古人之意亡矣宋邵博聞見後錄云觀漢李翕王稚子高貫方墓碑多刻山林人物乃知顧愷之陸探㣲宗處士軰尚有其遺法至呉道𤣥絶藝入神然始用巧思而古意少減矣况其下者此可為知者道也宋徽宗崇寧三年立畫學考畫之等以不倣前人而物之情態形色俱若自然筆韻高簡為工此近於空摹之格至今尚之謝在杭五襍俎曰自唐以前名畫未有無故事者葢有故事便湏立意結構事事考訂人物衣冠制度宫室規模大畧城郭山川形勢向背皆不得草草下筆非若今人任意師心鹵莽滅裂動輙託之冩意而止也余觀張僧繇展子䖍閻立本軰皆畫神佛變相星曜真形至如石勒竇建德安祿山有何足畫而皆冩其故實其他如懿宗射貴妃上馬後主幸晉陽華清宫避暑不一而足上之則神農播種堯民擊壌老子度關宣尼十哲下之則商山采芝二疏祖道元逹鏁諫葛洪移居如此題目今人郤不肯畫而古人爲之轉相沿倣葢繇所重在此習以成風要亦相傳法度易於循習耳古器洪氏隨筆謂彞器之傳春秋以來固已重之如郜鼎紀甗之類歴歴可數不知三代逸書之目湯有典寳武有分器而春官有典庸器之職祭祀出而陳之則固前乎此矣故夏后氏之璜封父之繁弱宻湏之皷闕鞏之甲班諸魯公唐叔之國而赤刀𢎞璧天球河圖之屬陳設於成王之顧命者又天子之世守也然而來去不恒成虧有數是以寳珪出河左傳昭二十四年九鼎淪泗武庫之劍穿屋而飛越絶書亦載湛盧去呉事殿前之鐘感山而響銅人入夢鐘虡生毛則知歴世乆遠能爲神怪亦理之所必有者隋書文帝開皇九年四月毁平陳所得秦漢三大鐘越二大皷十一年正月丁酉以平陳所得古器多為禍變悉命毁之而大金國志載海陵正隆三年詔毁平遼宋所得古器亦如隋文之言葢皆恣睢不學之主而古器之銷亡為可惜矣讀李易安題金石錄引王涯元載之事以爲有聚有散乃理之常人亡人得又胡足道未嘗不歎其言之逹而元裕之好問作故物譜獨以爲不然其説曰三代鼎鐘其初出於聖人之制今其欵識故在不曰永用享則曰子子孫孫永寳用豈聖人者超然遠覧而不能忘情於一物邪自莊周列禦冦之説出遂以天地爲逆旅形骸爲外物雖聖哲之能事有不滿一吷者况外物之外者乎然而彼固未能寒而忘衣饑而忘食也則聖人之道所謂備物以致用守器以為智者其可非也邪已上櫽括元氏之文春秋之於寳玉大弓竊之書得之書知此者可以得聖人之意矣日知錄卷二十一
