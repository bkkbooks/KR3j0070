body:
  text: 日知録卷二十五崑山顧炎武撰重黎左傳蔡墨對魏獻子言少昊氏有四叔曰重曰該曰修曰熙使重為句芒該為蓐收修及熙為玄冥顓頊氏有子曰犁為祝融犂即黎字異文是重黎為二人一出於少昊一出於顓頊而史記楚世家則曰帝顓頊髙陽者黃帝之孫昌意之子也髙陽生稱稱生卷章卷章生重黎太史公自序則曰重黎氏世序天地其在周程伯休甫其後也晉書宣帝紀其先出自帝高陽之子重黎為夏官祝融宋書載晉尚書令衛瓘尚書左僕射山濤右僕射魏舒尚書劉實司空張華等奏乃云大晉之德始自重黎實佐顓頊至於夏商世序天地其在於周不失其緒似以重黎為一人不容一代乃有兩祖亦昔人相沿之謬劉昭後漢天文志曰司馬遷以世黎氏之後為太史今則已覺其謬矣索隱引劉氏曰少昊氏之後曰重顓頊氏之後曰重黎對彼重則單稱黎若自言當家則稱重黎楚及司馬氏皆重黎之後非關少昊之重此順非而曲為之説巫咸古之聖人或上而為君或下而為相其知周乎萬物而道濟天下固非後人之所能測也而傳者猥以一節概之黃帝古聖人也而後人以為醫師伯益古賢臣也而世有百蟲將軍之號以彼事迹章章在經籍者且猶如此若乃堯之臣名羿而有窮之君亦名羿堯之典樂名夔而木石之怪亦為夔湯居亳而亳戎之國亦名湯夫茍以其名而疑之則道德之用微而謬悠之説作若巫咸者可異焉書君奭篇在大戊時則有若伊陟臣扈格於上帝巫咸乂王家在祖乙時則有若巫賢孔安國傳賢咸子巫氏巫史記殷本記帝祖乙立殷復興咸任職咸當為賢字之誤書序伊陟相太戊亳有祥桑榖共生於朝伊陟贊於巫咸作咸乂四篇孔安國傳曰巫咸臣名馬融曰巫男巫也名咸殷之巫也孔頴逹正義曰君奭傳曰巫氏也當以巫為氏名咸鄭玄云巫咸謂之巫官按君奭咸子巫賢父子並為大臣必不世作巫官故孔言巫氏是也則巫咸之為商賢相明矣史記正義謂巫咸及子賢冡皆在蘇州常熟縣西海隅山上蓋二子本吳人云越絶書云虞山者巫咸所出也是未可知而後之言天官者宗焉言卜筮者宗焉言巫鬼者宗焉言天官則史記天官書所云昔之傳天數者髙辛之前重黎於唐虞羲和有夏昆吾殷商巫咸者也言卜筮則吕氏春秋所謂巫彭作醫巫咸作筮者也周禮人九之名一曰巫更二曰巫咸三曰巫式四曰巫目五曰巫易六曰巫比七曰巫祠八曰巫參九曰巫環鄭玄注此九巫皆當讀為筮字之誤也言巫鬼則莊子所云巫咸祒曰來楚辭離騷所云巫咸將夕降兮懷椒糈而要之史記封禪書所云巫咸之興自此始索隱曰孔安國尚書傳云巫咸臣名今云巫咸之興自此始則以巫咸為巫覡然楚辭亦以巫咸主神蓋太史公以巫咸是殷臣以巫接神事大戊使禳桑榖之災故云然許氏説文所云巫咸初作巫又其死而為神則秦詛楚文所云不顯大神巫咸者也封禪書荆巫祀堂下巫先司命施糜之屬索隱曰巫先謂古巫之先有靈者蓋巫咸之類也而又或以巫咸為黃帝時人歸藏言黃神將戰筮於巫咸是也以為帝堯時人郭璞巫咸山賦序地理志曰巫咸山在安邑縣東水經注鹽水出東南薄山西北流徑巫咸山北言巫咸以鴻術為帝堯醫是也以為春秋時人莊子言鄭有神巫曰季咸列子言神巫季咸自齊來處於鄭是也枚乘七發扁鵲治內巫咸治外文選吕向注扁鵲巫鵲咸皆鄭人按列子莊子皆言鄭有神巫曰季咸而扁則鄚人字形相混亦以為鄭也至山海經海外西經言巫咸國在女丑北左手操青蛇右手操赤蛇在登葆山羣巫所從上下也注採藥往來大荒西經言大荒之中有山名曰豐沮玉門日月所入有靈山巫咸巫即巫朌巫彭巫姑巫真巫禮巫抵巫謝巫羅十巫從此升降百藥爰在注羣巫上下此山採之也淮南子地形訓言軒轅丘在西方巫咸在其北方則益荒誕不可稽而知古賢之名為後人所假託者多矣河伯竹書帝芬十六年雒伯用與河伯馮夷鬬帝泄十六年殷侯微上甲微也以河伯之師伐有昜殺其君綿臣是河伯者國居河上而命之為伯如文王之為西伯而馮夷者其名爾楚辭九歌以河伯次東君之後則以河伯為神天問胡羿射夫河伯而妻彼雒嬪王逸章句以射為實以妻為夢其解逺遊令海若舞馮夷則曰馮夷水仙人也是河伯馮夷皆水神矣穆天子傳至於陽紆之山河伯無夷之所都居注無夷馮夷也山海經云氷夷山海經中一作從極之淵深三百仞惟氷夷恆都焉氷夷人面乘兩龍郭璞注氷夷馮夷也即河伯也郭璞江賦氷夷倚浪以傲睨莊子馮夷得之以遊大川司馬喜注引清冷傳曰馮夷華隂潼鄉隄首里人也服八石得道為水仙是為河伯是以馮夷死而為神其説怪矣龍魚河圖曰河伯姓呂名公子夫人姓馮名夷以馮夷為河伯之妻更怪楚辭九歌有河伯而馮夷屬海若之下亦若以為兩人大抵所傳各異而謂河神有夫人者亦秦人以君主妻河鄴巫為河伯娶婦之類耳淮南子馮夷大丙之御注二人古之得道能御隂陽者魏書髙句麗先祖朱蒙朱蒙母河伯女為夫餘王妻朱蒙自稱為河伯外孫則河伯又有女有外孫矣真誥載有一人旦旦詣河邉拜河水如此十年河侯河伯遂與相見豫白璧十雙教以水行不溺法注曰河侯河伯故當是兩神邪湘君楚辭湘君湘夫人亦謂湘水之神有后有夫人也初不言舜之二妃王逸章句始以湘君為水神湘夫人為二妃記曰舜葬於蒼梧之野蓋三妃未之從也山海經洞庭之山帝之二女居之郭璞注曰天帝之二女而處江為神即列仙傳江妃二女也九歌所謂湘夫人稱帝子者是也而河圖玉版曰湘夫人者帝堯女也秦始皇浮江至湘山逢大風而問博士湘君何神博士曰聞之堯二女舜妃也死而葬此列女傳曰二女死於湘江之間俗謂之湘君鄭司農亦以舜妃為湘君説者皆以舜陟方而死二妃從之俱溺死於湘江遂號為湘夫人按九歌湘君湘夫人自是二神江湘之有夫人猶河雒之有虙妃也此之為靈與天地並安得謂之堯女且既謂之堯女安得復總云湘君哉何以考之禮記云舜葬蒼梧二妃不從明二妃生不從征死不從葬且傳曰生為上公死為貴神禮五嶽比三公四瀆比諸侯今湘川不及四瀆無秩於命祀而二女帝者之后配靈神祇無緣復下降小水而為夫人也原其致謬之繇繇乎俱以帝女為名名實相亂莫矯其失習非勝是終古不悟可悲矣此辨甚正又按逺遊之文上曰二女御九招歌下曰湘靈鼓瑟是則二女與湘靈固判然為二即屈子之作可證其非舜妃矣後之文人附會其説以資諧諷其瀆神而慢聖也不亦甚乎禹崩會稽故山有禹廟而水經注言廟有聖姑禮樂緯云禹治水畢天賜神女聖姑夫舜之湘妃猶禹之聖姑也甚矣人之好言色也太白星也而有妻甘氏星經曰太白上公妻曰女媊女媊居南斗食厲天下祭之曰明星河伯水神也而有妻龍魚河圖曰河伯姓呂名公子夫人姓馮名夷常儀古占月之官也而淮南子以為羿妻竊藥而奔月名曰常娥霜露之所為雪水之所凝也而淮南子云青女乃出以降霜雪髙誘注天神青玉女巫山神女宋玉之寓言也而水經注以為天帝之季女名曰瑤姬李善髙唐賦注引襄陽耆舊傳曰赤帝女姚姬未行而卒葬於巫山之陽雒水宓妃陳思王之寄興也而如淳以為伏羲氏之女漢書音義伏羲氏之女溺雒水為神嵞山啓母天問之雜説也後人附以少姨以為啓母之妹今少室山有阿姨神而武后至封之為玉京太后金闕夫人青溪小姑為蔣子文之第三妹則見於楊炯之碑楊炯少姨廟碑曰蔣侯三妹青溪之軌迹可尋并州妬女為介子推之妹則見於李諲之詩見下小孤山之訛為小姑也歐陽公歸田録杜拾遺之訛為十姨也黃氏日鈔是皆湘君夫人之類而九歌之篇逺遊之賦且為後世迷惑男女瀆亂神人之祖也或曰易以坤為婦道而漢書有媪神之文郊祀歌媪神蕃釐張晏曰媪者老母之稱坤為母故稱媪於是山川之主必為婦人以象之非所以隆國典而昭民敬也巳金元好問承天鎮懸泉詩注曰平定土俗傳介子推被焚其妹介山氏恥兄要君積薪自焚號曰妬女祠唐書髙宗調露元年九月幸并州道出妬女祠其碑大厯中判官李諲撰辭旨殊謬至有百日積薪一日燒之之語鄉社至今以百五日積薪而焚之謂之祭妬女其詩有曰神祠水之滸儀衛盛官府頗怪祠前碑稽考失莽鹵吾聞允格臺駘宣汾洮障大澤自是生有自來歸有所假而而即如字自經溝瀆便可尸祝之祀典紛紛果何取子胥鼓浪怒未泄精衛銜薪心獨苦楚臣百問天不酬肯以誕幻虛荒驚聾瞽自有宇宙有此水此水綿綿流萬古人言主者介山氏且道未有介山之前復誰主山深地古自是有神物不假靈真誰敢侮稗官小説出閭巷社鼓村簫走翁嫗當時大厯十才子爭遣李諲鑱陋語此是千古正論杜氏通典汾隂后土祠為婦人塑像武太后時移河西梁山神塑像就祠中配焉開元十一年有司遷梁山神像於祠外之别室夫以山川之神而人為之配合其瀆亂不經尤甚矣張南軒集言舜廟中有武后像即日投之江中泰山頂碧霞元君宋真宗所封世人多以為泰山之女後之文人知其説之不經而撰為黃帝遣玉女之事以附會之不知當日所以褒封固真以為泰山之女也今考封號雖自宋時而泰山女之説則晉時已有之張華博物志文王以太公為灌壇令期年風不鳴條文王夢見有一婦人當道而哭問其故曰我東海泰山神女嫁為西海婦欲東歸灌壇令當吾道太公有德吾不敢以暴風疾雨過也文王夢覺明日召太公三日三夕果有疾風驟雨自西來也文王乃拜太公為大司馬此一事也干寶搜神記後漢胡母班嘗至泰山側為泰山府君所召令致書於女壻河伯云至河中流扣舟呼青衣當自有取書者果得逹復為河伯致書府君此二事也魏書髙句麗傳朱蒙告水曰我是日子河伯外孫列異傳記蔡支事又以天帝為泰山神之外孫自漢以來不明乎天神地祇人鬼之别一以人道事之於是封嶽神為王則立寢殿為王夫人有夫人則有女而女有壻又有外孫矣唐宋之時但言靈應即加封號不如今之君子必求其人以實之也又考泰山不惟有女亦又有兒魏書段承根傳父暉師事歐陽湯有一童子與暉同志後二年辭歸從暉請馬暉戲作木馬與之童子甚悅謝暉曰吾泰山府君子奉敕遊學今將歸損子厚贈無以報德子後至常伯封侯言訖乘馬騰空而去集異記言貞元初李納病篤遣押衙王祐禱岱嶽遙見山上有四五人衣碧汗衫半臂路人止祐下車言此三郎子七郎子也文獻通考後唐長興三年詔以泰山三郎為威雄將軍宋大中祥符元年十月封禪畢親幸加封炳靈公夫封其子為將軍為公則封其女為君正一時之事爾又考管子對桓公曰東海之子類於龜不知何語而房玄齡注則以為海神之子又元劉遵魯漠島記曰廟中神妃相傳為東海廣德王第七女夫海有女則山亦有女曷足怪乎共和史記周本紀厲王出奔於彘厲王太子靜匿召公之家周公召公二相行政號曰共和共和十四年厲王死於彘二相乃共立太子靜為王以二相為共和非也汲冡紀年厲王十二年出奔彘十三年共伯和攝行天子事號曰共和漢書古今人表有共伯和師古曰共國伯爵和其名二十六年王陟於彘周定公召穆公立太子靖為王共伯和歸其國此即左氏王子朝所謂諸侯釋位以間王政者也但其言共伯歸國者未合古者無天子之世朝覲訟獄必有所歸吕氏春秋言共伯和修其行好賢仁周厲之難天子曠絶而天下皆來請矣按此則天下朝乎共伯非共伯至周而攝行天子事也共伯不以有天下為心而周公召公亦未嘗奉周之社稷而屬之他人故周人無易姓之嫌共伯無僭王之議莊子曰許由娛於潁陽而共伯得乎共首共首今之共山亦謂之共頭荀子武王伐紂至共頭而山隧呂氏春秋武王使召公就微子開於共頭之下而與之盟蓋其秉道以終得全神養性之術者矣畢拱辰曰按金氏通鑑前編厲王三十七年出奔彘五十一年崩於彘其紀年亦與竹書不合左傳鄭大叔出奔共注共國今汲郡共縣史記春申君傳通韓上黨於共寧使道安成出入賦之田敬仲完世家王建降秦秦遷之共餓死齊人歌之曰松邪柏邪住建共者客邪漢書功臣表有共莊侯盧罷師唐書地理志衛州共城縣武德元年置共州即今衛輝府輝縣詩序柏舟共薑自誓也衛世子共伯蚤死其妻守義父母欲奪而嫁之誓而弗許故作是詩以絶之此别一共伯共者諡也非共國之共也今輝縣有共薑臺後人之附會也介子推介子推事見於左傳則曰晉侯求之不獲以綿上為之田曰以志吾過且旌善人呂氏春秋則曰負釜蓋簦終身不見二書去當時未逺為得其實然之推亦未久而死故以田祿其子爾史記之言稍異亦不過曰使人召之則亡聞其入綿上山中於是環綿上之山而封之以為介推田號曰介山而已立枯之説始自屈原燔死之説始自莊子容齋三筆以為始自劉向新序非也楚辭九章惜往日介子忠而立枯兮文公寤而追求封介山而為之禁兮報大德之優遊思久故之親身兮因縞素而哭之莊子則曰介子推至忠也自割其股以食文公文公後背之子推怒而去抱木而燔死盜跖篇尊東方朔七諫丙吉傳長安士伍書劉向説苑新序因之記水經注引王肅喪服要桂樹之問亦辨以為誣於是瑰竒之行彰而廉靖之心沒矣今當以左氏為據割股燔山理之所無皆不可信魏武帝令曰聞太原上黨西湖堆門冬至後百五日皆絶火寒食云為介子推且北方沍寒之地老少羸弱將有不堪之患令到人不得寒食若犯者家長半嵗刑主吏百日刑令長奪一月俸後魏髙祖太和二十年二月癸丑詔介山之邑聽為寒食自餘禁斷册府元龜龍星木之精也春見東方心為火之盛故為之禁火俗傳介子推以此日被焚禁火路史燧人改火論曰順天者存逆天者亡是必然之理也昔者燧人氏作觀乾象察辰心而出火作鑽燧别五木以改火豈惟惠民哉以順天也四時五變榆栁青故春取之棗杏赤故夏取之桑柘黃故季夏取之柞楢白故秋取之槐檀黑故冬取之皆因其性故可救時疾豫嘗考之心者天之大火而辰戌者火之二墓是以季春心昏見於辰而出火季秋心昏見於戍而納之卯為心之明堂至是而火大壯是以仲春禁火戒其盛也周官每嵗仲春命司烜氏以木鐸修火禁於國中為季春將出火而司爟掌行火之政令四時變國火以救時疾季春出火季秋內火民咸從之時則施火令凡國失火野焚萊則隨之以刑罰夫然故天地順而四時成氣不愆伏國無疵癘而民以寧鄭以三月鑄刑書而士文伯以為必災六月而鄭火蓋火未出而作火宜不免也今之所謂寒食一百五者熟食斷煙謂之龍忌蓋本乎此司烜仲春以木鐸修火禁因火出而警之仲秋火入則不警宫正春秋以木鐸修火禁宫禁尚嚴也而周舉之書魏武之令與夫汝南先賢傳陸翽鄴中記等皆以為為介子推謂子推以三月三日燔死而後世為之禁火吁何妄邪是何異於言子胥溺死而海神為之朝夕者乎豫初賦潮知此妄記而或者謂昔人言潮無出子胥前者因云為舉書朝宗之語而齊景嘗欲遵海觀朝儛矣且屈原聽潮水之相擊而易亦有行險不失信之言自有天地即有此潮豈必見紙上而後信哉子胥漂於吳江適有祠廟當潮頭不知丹徒南恩等潮且復為誰潮邪豫觀左氏史遷之書曷嘗有子推被焚之事况以清明寒食初靡定日而琴操所記子推之死乃五月五非三日也古人以三月上巳祓禊以清明前三日寒食初無定日後世既己一之而又指為三月之三妄矣周舉傳云每冬中輒一月寒食以子推焚骸神靈不樂舉火然則介子又將以冬中亡矣非可信也夫火神物也其功用亦大矣昔隋王劭嘗以先王有鑽燧改火之義於是表請變火曰古者周官四時變火以救時疾明火不變則時疾必興聖人作法豈徒然哉在晉時有人以雒陽火渡江世世事之相續不滅火色變青昔師曠食飯云是勞薪所㸑晉平公使視之果然車輞今溫酒炙肉用石炭火木炭火竹火草火麻荄火氣味各自不同以此推之新火舊火理應有異伏願逺遵先聖於五時取五木以變火用功甚少救益方大夫火惡陳薪惡勞晉代荀朂進飯亦知薪勞而隋文帝所見江寧寺晉長明鐙亦復青而不熱傳記有以巴豆木入㸑者爰得泄利而糞臭之草炊者率致味惡然則火之不改其不疾者鮮矣泌以是益知聖人之所以改火修火正四時五變者豈故為是煩文害俗得巳而不己哉東晉初有王離妻李將河南火渡江云受於祖母王有遺書二十卷臨終戒勿絶火遂常種之傳二百年火色如血謂之聖火宋齊之間李嫗年九十餘以火治病多愈嫗死人為葬之號聖火冡每隂雨見火出冡門今號其處為聖火巷金陵故事云禪衆寺前直南小巷也傳不云乎違天必有大咎先漢武帝猶置别火令丞典司燧事漢書大鴻臚有别火令丞後世乃廢之邪方石勒之居鄴也於是不禁寒食而建德殿震及端門襄國西門雹起西河介山大如雞子平地三尺汙下丈餘人禽死以萬數千里摧折秋稼蕩然夫五行之變如是而不知者亦以為為之推也雖然魏晉之俗尤所重者辰為商星實祀大火而汾晉參墟參辰錯行不毗和所致杞梁妻春秋傳齊侯襲莒杞梁死焉齊侯歸遇杞梁之妻於郊使弔之辭曰殖之有罪何辱命焉若免於罪猶有先人之敝廬在下妾不得與郊弔齊侯弔諸其室左氏之文不過如此而已檀弓則曰其妻迎其柩於路而哭之哀孟子則曰華周杞梁之妻善哭其夫而變國俗言哭者始自二書説苑則曰杞梁華舟進鬬殺二十七人而死其妻聞之而哭城為之阤而隅為之崩列女傳則曰杞梁之妻無子內外皆無五屬之親既無所歸乃枕其夫之尸於城下而哭道路過者莫不為之揮涕十日而城為之崩言崩城者始自二書而列女傳上文亦載左氏之言夫既有先人之敝廬何至枕尸城下且莊公既能遣弔豈至暴骨溝中崩城之云未足為信且其崩者城耳未云長城長城築於威王之時去莊公百有餘年竹書紀年梁惠成王二十年齊閔王築防以為長城按魏惠王二十年乃齊威王之二十七年非閔王而齊之長城又非秦始皇所築之長城也後人相傳乃謂秦築長城有范郎之妻孟薑送寒衣至城下聞夫死一哭而長城為之崩則又非杞梁妻事矣夫范郎者何人哉使秦時别有此事何其相類若此唐僧貫休乃據以作詩云築人築土一萬里杞梁貞婦啼嗚嗚則竟以杞梁為秦時築城之人似并左傳孟子而未讀者矣古詩誰能為此曲無乃杞梁妻崔豹古今注樂府杞梁妻者杞殖妻妹朝日所作也殖戰死妻曰上則無父中則無夫下則無子人生之苦至矣乃抗聲長哭杞都城感之而頽遂投水死其妹悲姊之貞操乃作歌名曰杞梁妻焉梁殖字也按此則又云杞之都城春秋杞成公遷於緣陵今昌樂縣文公又遷於淳于今安丘縣其時杞地當已入齊要之非秦之長城也池魚東魏杜弼檄梁文曰楚國亡猿禍延林木城門失火殃及池魚後人每用此事清波雜志云不知所出以意推之當是城門失火以池水救之池竭而魚死也廣韻古有池仲魚者城門失火仲魚燒死故諺云城門失火殃及池魚據此則池魚是人姓名風俗通已有此説按淮南子云楚王亡其猿而林木為之殘宋君亡其珠池中魚為之殫故澤失火而林憂則失火與池魚自是兩事後人誤合為一耳考池魚事本於吕氏春秋必巳篇曰宋桓司馬有寶珠抵罪出亡王使人問珠之所在曰投之池中於是竭池而求之無得魚死焉此言禍福之相及也此後人用池魚事之祖祖君彥為李密檄文曰燕巢衛幕魚遊宋池莊安漢書五行志嚴公二十年師古曰嚴公謂莊公也避明帝諱改曰嚴凡漢書載諡姓為嚴者皆類此則是嚴姓本當作莊今考史記有莊生莊賈莊豹樗里子傳莊舄莊忌莊助莊青翟莊熊羆莊參莊蹻莊芷淮南王安傳而獨有嚴君疾樗里子傳秦封樗里子號為嚴君名正義曰蓋封蜀郡嚴道縣因號嚴君疾也嚴仲子嚴安鄧伯羔謂安自姓嚴胡身之通鑑嚴延年注曰此嚴非莊助之嚴自是一姓戰國時有濮陽嚴仲子然漢書藝文志曰主父偃二十八篇徐樂一篇莊安一篇是安本姓莊非嚴也嚴君平亦姓莊揚子法言蜀莊沈冥是也嚴尤亦姓莊後漢書光武紀注引桓談新論曰莊尤字伯石避明帝諱改之又改莊周為嚴周漢書王貢兩龔鮑傳老子嚴周敘傳貴老嚴之術改楚之莊生為嚴先生古今人表嚴先生師古曰即殺陶朱公兒者也王褒洞簫賦師襄嚴春不敢竄其巧李善注七略有莊春言琴王莽傳有斄嚴春非此漢書之稱莊安班氏所未及改也史記之稱嚴安後人所追改也藝文志常侍郎莊匆竒賦十一篇嚴助賦三十五篇師古曰上言莊匆竒下言嚴助史駮文嚴助傳作嚴蔥奇李廣射石今永平府盧龍縣南有李廣射虎石廣為右北平太守而此地為遼西郡之肥如其謬不辨自明水經注言右北平西北百三十里有無終城亦非也考右北平郡前漢治平剛後漢治土垠酈氏所引魏氏土地記曰薊城東北三百里有右北平城此後漢所治之土垠而平剛則在盧龍塞之東北三四百里乃武帝時郡治李廣所守今之塞外其不在土垠明矣又考西京雜記述此事則云獵於冥山之陽莊子言南行者至於郢北面而不見冥山司馬彪注冥山北海山名是廣之出獵乃冥山而非近郡之山也新序曰楚熊渠子夜行見寢石以為伏虎關弓射之滅矢飲羽下視知石也却復射之矢摧無迹韓詩外傳張華博物志亦同是射石者又熊渠而非李廣也吕氏春秋作養由基王克論衡同黃氏日鈔曰此事每載不同要皆野人相承之妄言耳即使二事偶同而太史公所述本無其地今必欲指一卷之石以當之不已惑乎後周書李逺傳嘗校獵於莎柵見石於叢薄中以為伏兔射之鏃入寸餘就而視之乃石也太祖聞而異之賜書曰昔李將軍親有此事公今復爾可謂世載其德雖熊渠之名不能獨羡其美李廣熊渠二事併用大小山王逸楚辭章句言淮南王安博雅好古招懷天下俊偉之士著作篇章分造辭賦以類相從故或稱小山或稱大山其義猶詩有小雅大雅也梁昭明太子十二月啓乃曰桂吐花於小山之上梨翻葉於大谷之中庾肩吾詩梨紅大谷晚桂白小山秋庾信枯樹賦小山則叢桂留人扶風則長松繫馬是以山為山谷之山失其旨矣梁書何胤二兄求點並棲遁求先卒至是胤又隱世號點為大山胤為小山丁外人丁外人非名言是蓋主之外夫也猶言齊悼惠王肥髙帝外婦之子也史記齊悼惠王肥髙祖長庶男也其母外婦也曰曹氏服虔曰外人主之所幸也然王子侯表有山原孝侯外人齊孝王五世孫乘丘侯外人中山靖王曽孫則是姓劉而名外人不知何所取義毛延壽西京雜記曰元帝後宫既多不得常見乃使畫工圖形案圖召幸之諸宫人皆賂畫工多者十萬少者亦不減五萬獨王嬙不肯遂不得見胸奴入朝求美人為閼氏於是上案圖以昭君行及去召見貌為後宫第一善應對舉止間雅帝悔之而名籍已定帝重信於外國故不復更人乃窮案其事畫工皆棄市籍其家資皆巨萬畫工有杜陵毛延壽為人形醜好老少必得其真安陵陳敞新豐劉白龔寬並工為牛馬飛鳥衆勢人形好醜不逮延壽下杜陽望亦善畫尤善布色樊育亦善布色同日棄市京師畫工於是差稀據此則畫工之圖後宫乃平日而非丐奴求美人時且毛延壽特衆中之一人又其得罪以受賂而不獨以昭君也後來詩人謂胸奴求美人乃使畫工圖形而又但指毛延壽一人且沒其受賂事失之矣名以同事而晦吕氏春秋言秦穆公興師以襲鄭過周而東鄭賈人弦髙奚施將西市於周遽使奚施歸告乃矯鄭伯之命以十二牛勞師是奚施為弦髙之友淮南子作蹇他而左氏傳不載淮南子言荆軻西刺秦王髙漸離宋意為擊築而歌於易水之上宋玉笛賦亦以荆卿宋意並稱水經注漸離擊築宋如意和之是宋意為髙漸離之侣而戰國䇿史記不載戰國策東孟之會聶政陽堅刺相兼君注云堅政之副猶秦武陽按聶政告嚴仲子曰其勢不可以多人未必有副淮南子注秦皇帝二十六年初兼天下有長人見於臨洮其髙五丈足迹六尺放寫其形鑄金人以象之翁仲君何是也今人但言翁仲不言君何名以同事而章孟子禹稷當平世三過其門而不入考之書曰啓呱呱而泣豫弗子此禹事也而稷亦因之以受名華周杞梁之妻善哭其夫而變國俗考之列女傳曰哭於城下七日而城為之崩此杞梁妻事也而華周妻亦因之以受名左傳但言獲杞梁不言獲華周人以相類而誤墨子文王舉閎夭泰顛於罝網之中授之政而西土服於傳未有此事必太公之誤也吕氏春秋箕子窮於商范蠡流乎江范蠡未嘗流江必伍員之誤也史記孫叔敖三得相而不喜三去相而不悔孫叔敖未聞去相必令尹子文之誤也淮南子吳起張儀車裂支解張儀未嘗車裂必蘇秦之誤也易林貞良得願微子解囚微子未嘗被囚必箕子之誤也晉潘嶽太宰魯武公誄秦亡蹇叔舂者不相蹇叔之亡不見於書必百里奚之誤也吕氏春秋蹇叔有子曰申與視注申白乙丙也視孟明視也皆蹇叔子也按盂明視百里奚之子後魏穆子容太公呂望碑文大魏東苞碣石西跨流沙南極班超之柱北窮竇憲之志班超未嘗南征必馬援之誤也後周庾信擬詠懷詩麟窮季氏罝虎振周王圈季氏未嘗獲麟必叔孫之誤也晉書夏統傳子路見夏南憤恚而慷愾子路未嘗見夏南蓋衛南子之誤傳記不考世代張衡言春秋元命包有公輸班與墨翟事見戰國非春秋時又言别有益州益州之置在於漢世以證圖讖為後人偽作今按傳記之文若此者甚多管子稱三晉之君其時未有三晉輕重篇稱魯梁秦趙其時未有梁趙稱代王其時未有代王國語句踐之伯陳蔡之君皆入朝其時有蔡無陳説苑句踐聘魏其時未有魏又言仲尼見梁君孟簡子相梁其時未有梁魯亦無孟簡子又言韓武子出田欒懷子止之韓氏無武子又言楚莊王以椒舉為上客椒舉事靈王非莊王呂氏春秋晉文公師咎犯隨會隨會不與文公咎犯同時趙襄子攻翟一朝而兩城下有憂色孔子賢之趙襄子為晉卿時孔子已卒顔闔見魯莊公顔闔穆公時人去莊公十一世史記孔子世家使從者為寧武子臣於衛孔子時寧氏已滅扁鵲傳虢君出見扁鵲於中闕其時虢亡已久龜策傳宋元王宋有元公無元王莊子見魯哀公而其書有魏惠王趙文王魯哀公去趙文王一百七十嵗韓非子扁鵲見蔡桓侯桓侯與魯桓公同時相去幾二百嵗越絶書晉鄭王晉鄭未嘗稱王又言孔子奉雅琴見越王越滅吳孔子已卒列子晏平仲問養生於管夷吾鹽鐡論季桓子聽政栁下惠忽然不見又言臧文仲治魯勝其盜而自矜子貢非之平仲去管子季桓子去柳下惠子貢去臧文仲各百餘嵗韓詩外傳孟嘗君請學於閔子閔子孟嘗君相去幾二百嵗冉有對魯哀公言姚賈監門子姚賈秦始皇時人相去二百嵗日知録卷二十五
