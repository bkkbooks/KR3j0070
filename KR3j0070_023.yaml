body:
  text: 日知録卷二十三崑山顧炎武撰姓言姓者本於五帝見於春秋者得二十有二媯虞姓出顓頊封于陳姒夏姓出顓頊封于把鄫越傳云沈姒蓐黃春秋時無考子殷姓出髙辛封于宋小戎亦子姓姬周姓出黃帝封于管蔡郕霍魯衛毛𣆀郜雍曹滕畢原酆郇邘晉應韓凡蔣邢茅胙祭吳虞虢鄭燕魏芮彤荀賈耿滑焦楊密隨已諸國􅌐戎犬戎皆姬姓任宿須句顓臾風姓也自太皥秦趙梁徐郯江黃葛麇嬴姓也自少皥莒已姓薛任姓隱十一年疏引世本謝章薛舒呂祝終泉畢過十國皆任姓南燕姞姓也自黃帝密須亦姞姓國語又有酉滕葴荀僖儇依七姓其封國在周世無考杜祁姓也自陶唐楚䕫權芉姓邾郳曹姓鄅逼陽妘姓鬷夷董姓也自祝融國語又有彭秃斟三姓在周世無考齊申吕許紀州向姜姓也自炎帝又有姜戎蓼六舒舒鳩偃姓也自咎繇胡歸姓鄧曼姓羅熊姓狄隗姓鄋瞞漆姓陰戎允姓六者不詳其所出國語以莒為曹姓越為芉姓與此異略舉一二論之則今之孟氏季氏孫氏寧氏游氏豐氏皆姬陳氏田氏皆媯華氏向氏樂氏魚氏皆子崔氏馬氏皆姜屈氏昭氏景氏皆芊自戰國以下之人以氏為姓而五帝以來之姓亡矣或曰嬴姓出于祝融䢵葛穀皆嬴姓伯益賜姓嬴秦趙徐乃其後今凡注疏家所引姓氏大扺出于世本其書亡不能備考氏族禮記大傳正義諸侯賜卿大夫以氏若同姓公之子曰公子公子之子曰公孫公孫之子其親已逺不得上連於公故以王父字為氏若適夫人之子則以五十字伯仲為氏若魯之仲孫季孫是也若庶子妾子則以二十字為氏記所云冠而字之之義則展氏臧氏是也若異姓則以父祖官及所食之邑為氏以官為氏者則司馬司城是也以邑為氏者若韓趙魏是也凡賜氏族者比為卿乃賜有大功德者生賜以族若叔孫得臣是也雖公子之身若有大功德則以公子之字賜以為族若仲遂是也其無功德死後乃賜族若無駭是也按此論亦多不然詳見第一卷卿不書族條其子孫若為卿其君不賜族子孫自以王父字為族也氏族對文為别散則通也故左傳云問族於衆仲下云公命以字為展氏是也其姓與氏散亦得通故春秋有姜氏子氏姜子皆姓而云氏是也戰國時人大抵猶稱氏族戰國䇿甘茂曰昔者曽子處費費人有與曽子同名族者而殺人不言姓而言族可見當時未嘗以氏為姓也漢人則通謂之姓然氏族之稱猶有存者漢書恩澤侯表褒魯節侯公子寬以魯頃公𤣥孫之𤣥孫奉周祀元始元年六月丙午封子相如嗣更姓公孫氏平帝紀封周公後公孫相如為褒魯侯當依表作公子寬後更為姬氏公子公孫氏也姬姓也此變氏稱姓之一證水經注漢武帝元鼎四年幸雒陽巡省豫州觀於周室邈而無祀詢問耆老乃得孽子嘉封為周子南君以奉周祀按汲冡古文謂衛將軍文子為子南彌牟其後有子南徑紀年徑朝于魏後惠成王如衛命子南為侯秦并六國衛最後滅疑嘉是衛後故氏子南而稱君也據此嘉本氏子南武帝即以其氏命之為爵而漢書恩澤侯表竟作姬嘉則沒其氏而書其姓矣與褒魯之封公孫氏更為姬氏者正同姓氏之稱自太史公始混而為一本紀於秦始皇則曰姓趙氏於漢髙祖則曰姓劉氏氏族相傳之訛氏族之書所指秦漢以上者大抵不可盡信唐書表李氏則云紂之時有理徵字德靈為翼𨽻中吳伯本李延夀北史序傳不知三代時無此名字無此官爵也表王氏則云周靈王太子晉以直諫廢為庶人傳記亦無此事王氏定著三房一曰琅邪二曰太原皆出靈王太子晉三曰京兆出魏信陵君是凡王皆姬姓矣乃王莽自云舜後漢書元后傳莽自謂黃帝之後黃帝姓姚氏八世生虞舜舜起媯汭以媯為姓至周武王封舜後媯滿于陳是為胡公十三世生完完字敬仲奔齊齊桓公以為卿姓田氏十一世田和有齊國三世稱王至王建為秦所滅項羽起封建孫安為濟北王至漢興安失國齊人謂之王家因以為氏莽敗其族尚全未必無後裔而春秋吳有王犯晉有王良范氏之臣王生戰國齊有王斗王蠋王歡費有王順魏有王錯趙有王登秦有王稽王齕王翦王綰王戊過秦論有王廖未知何國人亦未必同出於靈王也野客叢書曹子建作王仲宣誄曰流裔畢萬末胄稱王厥姓斯氏條分葉散世滋芳烈揚聲秦漢吕向注秦有王翦王離漢有五侯按王粲系畢公髙之後畢萬封于魏後十代文侯始列為侯至孫稱惠王因以王為氏而秦之翦離自周太子晉之後漢之五侯自齊田和之後此三派元不相干注引為一誤矣故新莽以姚媯陳田王五姓為宗室且禁元城王氏勿與四姓為婚而已自取王欣之女魏東萊王基為子納太原王沈女皆不以為嫌蓋知此也庾信作宇文傑墓志亦有是誤韓文公作王仲舒神道碑文云王氏皆王者之後在太原者為姬姓春秋時王子成父敗狄有功因賜氏此語郤有斟酌竇氏古無所考類族者不得其本見左傳有后緡方娠逃出自竇之文即為之說曰帝相妃有仍氏女逃出自竇奔歸有仍生少康少康次子曰龍留居有仍遂為竇氏唐書宰相世系表此與王莽引易伏戎于莽升其髙陵莽皇帝名也升劉伯升也何以異哉乃韓文公作竇牟墓志后緡竇逃閔腹子夏以再家竇為氏亦用此事竊意古地以竇名者甚多必是以地為氏路史曰余嘗考之古之得姓者未有不本乎始封者也其氏於事者蓋寡矣而姓書氏譜一每為之曲說至有棄其祖之所自出又牽異類而屬之豈不悲哉正謂若此之類也漢時碑文所述氏族之始多不可據如魏蔣濟郊議稱曹騰碑文云曹氏族出自邾王沈魏書云其先出於黃帝當髙陽世陸終之子曰安是為曹姓周武王克殷封曹俠于邾至戰國為楚所滅子孫分流或家于沛而魏武作家傳自云曹叔振鐸之後陳思王作武帝誄曰於穆武王胄稷𦙍周則又姬姓之後以國為氏者矣及至景初中明帝從髙堂隆議謂魏為舜後詔曰曹氏世系出自有虞氏今祀圜丘以始祖帝舜配後少帝禪晉文亦稱我皇祖有虞氏則又不知其何所據宋書符瑞志載博士蘇林董巴言但云魏之氏族出自顓頊與舜同祖見於春秋世家魏志蔣濟以為舜本姓媯其苗曰田非曹之先著文以追詰隆夫以一代之君而三易其祖豈不可笑况於士大夫乎程氏出程伯休父太史公自序云重黎氏世序天地其在周程伯休甫其後也應劭曰封為程國伯休甫字也其後為司馬氏晉書宣帝紀其先出自帝髙陽之子重黎為夏官祝融歷唐虞夏商世序其職及周以夏官為司馬其後程伯休甫周宣王時以世官克平徐方鍚以官族因而為氏而左傳成十八年晉欒書中行偃使程滑弒厲公注程滑晉大夫襄二十三年程鄭嬖於公注鄭亦荀氏宗此則晉之程氏乃荀氏之别不與休甫同出今既祖休甫又祖程嬰則誤矣路史以荀為文王之後則子華子之書亦言其族出于司馬而又曰趙真吾姓之所宗氏也則程又與趙同祖朱子曰子華子近世僞書今或引其說以證姓氏之所從出則誣其祖矣又按莊子及吕氏春秋子華子韓昭釐侯時人非孔子所見之程子沈氏宋書沈約自序昔少皥金天氏有裔子曰昧為𤣥冥師生允格臺駘臺駘能業其官宣汾洮障大澤以處太原帝顓頊嘉之封諸汾川其後四國沈姒蓐黃沈子國今汝南平輿沈亭是也汝南去汾州甚逺春秋之時列于盟㑹定公四年諸侯會召陵伐楚沈子不㑹晉使蔡伐沈滅之以沈子嘉歸按沈姒蓐黃四國皆在汾水之上為晉所滅左氏昭公元年傳曰今晉主汾而滅之矣黃非江人黃人之黃則沈亦非沈子嘉之沈休文乃竝列而合之為一誤也唐宰相世系表曰沈氏出自姬姓周文王第十子𣆀叔季食采於沈汝南平輿沈亭即其地也此為得之又按魯有沈猶氏家語魯之販羊有沈猶氏者曽子弟子沈猶行是以地為姓漢書景帝封楚元王子歲為沈猶侯白氏唐白居易自序家狀曰出於楚太子建之子白公勝楚殺白公其子奔秦代為名將乙丙巳降是也裔孫白起有大功於秦封武安君按白乙丙見於僖之三十三年白公之死則哀之十六年後白乙丙一百四十八年曽謂樂天而不考古一至此哉唐宰相世系表以西乞術白乙丙為孟明之子尤誤楊氏漢書揚從才雄傳曰其先出自有周伯僑者以支庶食采於晉之揚左傳楊字從木因氏焉揚在河汾之間周衰而揚氏或稱侯號曰揚侯會晉六卿爭權韓魏趙興而范中行知伯弊當是時逼揚侯揚侯逃於楚巫山因家焉此誤以楊侯與楊食我為一人也唐書宰相世系表曰楊氏出自姬姓周宣王子尚父封為揚侯又云晉之公族食邑於羊舌左傳正義引世族譜云羊舌其所食邑名凡三縣一曰銅鞮二曰楊氏三曰平陽羊舌四族叔向食采楊氏其地平陽楊氏縣是也及晉滅羊舌氏而叔向子孫逃于華山仙谷遂居華隂用修據此以楊陽揚羊四姓為一尤誤按楊城即今之洪洞縣本楊侯國左氏女叔侯所云霍楊韓魏皆姬姓也襄二十九年而子雲反離騷亦云有周氏之嬋嫣兮或鼻祖於汾隅靈宗初諜伯僑兮流于末之揚侯不知其字何以為楊及其滅於晉而為大夫羊舌氏邑則食我始見於傳而楊朱與老子同時又非羊舌之族也陽氏則以國為氏以邑為氏皆不可知胡三省曰春秋閔公二年齊人遷陽子孫以國為氏陽又按昭公十二年齊髙偃帥師納北燕伯于是邑名晉有陽處父乃在叔向之前而楚之陽丐魯之陽虎曾子弟子有陽膚非一陽也宋之羊斟邾之羊羅非一羊也安得謂陽為平陽羊為羊舌而竝附之叔向乎假氏後漢書假熲其先出鄭共叔假古人無以祖父名為氏者凡若此類皆不通之說按假氏當出自假干史記老子之子名宗宗魏將封于假干唐書世系表封於假為干木大夫謬魏世家有假干木假干子田完世家有假干明褚氏唐宰相世系表云出自子姓宋共公子假字子石食采于褚其德可師號曰褚師按褚師乃官名不獨宋有此官鄭亦有之昭公二年鄭公孫黑請以印為褚師是也衛亦有褚師聲子賀氏晉書賀循傳曰㑹稽山隂人也其先慶普漢世傳禮所謂慶氏學族髙祖純安帝時為侍中避安帝父清河王慶諱改為賀氏宋史賀鑄自言出王子慶忌居越之湖澤所謂鏡湖乃慶湖也見鑄本傳然史即疑之按古但有以王父字為氏無以名為氏者慶忌名也不得為氏而鏡湖本名鑑湖慶古音羌聲不相近若齊之慶氏居吳朱方見於左傳後人以慶封有弒君之惡諱之而欲更其祖其不及宋司馬華孫逺矣水經注有賀臺越入吳還而成之故號曰賀臺茍欲求越國之故何不取之於賀臺而必取之於鏡湖又改鏡而為慶邪刀氏復古編云作刁非姓譜以為齊大夫豎刀之後胡三省曰豎刀安得有後漢書貨殖傳有刀間愚按古書刀與貂通齊襄王時有貂勃寇氏姓譜出自武王弟康叔為周司寇後人因以氏焉按康叔為衛國之祖必無以王官氏其支庶之理此乃衛之司寇左傳哀二十五年有司寇亥即寇氏之祖也檀弓有司寇惠子孔顔孟三氏今之顔氏皆云兖國之裔考仲尼弟子列傳有顔幸顔髙顔祖顔之僕顔噲顔何而孔子於衛主顔讎由此六人與讎由皆無後乎今之孔氏皆云夫子之裔春秋齊有孔虺衛有孔達陳有孔寧鄭有孔叔孔張此四族者皆無後乎且夫子出於宋為子姓而鄭姬姓陳媯姓衛姞姓哀十一年孔姞可合而為一乎史記貨殖傳宛孔氏之先梁人也用鐵冶為業秦伐魏遷孔氏南陽平準書孔僅南陽大冶顔魯公作家廟碑云其先出於顓頊之孫祝融融孫安為曹姓其裔邾武公名夷甫字顔子友别封郳為小邾子遂以顔為氏多仕魯為卿大夫按左傳襄十九年齊侯娶于魯曰顔懿姬其姪鬷聲姬注曰顔鬷皆姬母姓當云母氏則顔之為姬姓為魯族審矣姓譜曰顔姓本自魯伯禽支子有食采顔邑者因以為族其出於邾之說本自圈稱葛洪蓋徒見公羊於邾有顔公之稱而不考之於左氏也莒之犂比公豈必為犂彌之祖乎公羊傳謂邾婁顔淫九公子於宫中因以納賊周天子誅顔而反孝公於魯非隱公所盟之儀父不知何取於若人而以之為祖春秋時以孟為字者甚多今之孟氏皆祖子輿前代亦未之有也魏書孟表濟北蛇邱人自云本屬北地號索里諸孟古時孟姓亦或與芒通史記秦本紀擊芒卯華陽索隱引譙周云孟卯也淮南子孟卯注引戰國䇿曰芒卯也元史孔思晦傳五季時孔末之後方盛欲以僞滅真害宣聖子孫幾盡至是其裔復欲冒稱宣聖後思晦以為不早辨則真僞久益不可明彼與我不共戴天乃列于族與共拜殿庭可乎遂㑹族人斥之而重刻宗譜于石然則今之以孔姓而濫通譜牒者可以戒矣仲氏漢濟隂太守孟郁修堯廟碑曰惟序仲氏祖統所出本繼於姬周之遺苗天生仲山甫翼佐中興宣平功遂受封于齊周道衰微失爵亡邦後嗣乖散各相土擇居帝堯萌兆生長葬陵在於成陽聖化常存慕巍巍之盛樂風俗之美遂安處基業屬都鄉髙相里因氏仲焉以傳於今其隂列仲氏有名者三十餘人又廷尉仲定碑略同漢時仲氏自謂仲山甫之後託基於帝堯之陵而今則以為孔子弟子子路之後援顔曾孟之例而求為五經博士矣然春秋之以仲氏者不一而仲山甫未嘗封齊則漢人之祖山甫未必是而今人之祖子路亦未必非也以國為氏古人之氏或以諡或以字或以官或以邑無以國為氏者其出奔他國然後以本國為氏敬仲奔齊而為陳氏是也其他若鄭丹宋朝楚建郳申之類皆是也不然則亡國之遺裔也今人姓同於國者多自云以國為氏非也夏氏出於陳之少西而非夏后氏之夏齊氏出於衛之齊惡而非齊國之齊左氏史記其最著明者矣秦堇父非秦國之秦狄虒彌非狄人之狄姓氏書姚寬西溪叢語曰姓氏之學莫盛於元和姓纂自南北朝以官職相髙沿至於唐崔盧李鄭紏紛可鄙若以聖賢所本如媯姓子姓姬姓姜姓之類各分次其所從來以及春秋所紀用世本荀况譜杜預公子譜為法則唐虞三代列國諸侯俱可成書此似太史公欲為而未就者耳愚嘗欲以經傳諸書次之首列黃帝之子得姓者十二人次則三代以上之得國受氏而後人因以為姓者次則戰國以下之見於傳記而今人通謂之姓者次則三國南北朝以下之見於史者又次則代北復姓遼金元姓之見於史者而無所考者别為一帙略舉其目曰姓本第一封國第二氏别第三秦漢以來姓氏合并第四代北姓第五遼金元姓第六雜改姓第七無徵第八此則若網之在綱有條而不紊而望族五音之紛紛者皆無所用豈非反本類族之一大事哉漢劉向撰世本二卷其書不傳今左傳注疏多本之然亦未必無誤通譜同姓通族見於史者自晉以前未有晉書石苞傳曾孫朴沒于寇石勒以與朴同姓俱出河北引朴為宗室特加優寵位至司徒南史侯瑱傳侯景以瑱與已同姓託為宗族待之甚厚此以殊族而附中國也晉書孫旗傳旗子弼及弟子髦輔琰四人竝有吏材稱於當世遂與孫秀合族南史周𢎞正傳諂附王偉與周石珍建康之厮𨽻也為梁制局監降侯景合族舊唐書李義甫傳義甫既貴之後自言本出趙郡始與諸李叙昭穆而無賴之徒茍合藉其權勢拜伏為兄叔者甚衆李輔國傳宰相李揆山東甲族見輔國執子弟之禮謂之五父此以名門而附小人也凡此史皆書之以志其非今人好與同姓通譜不知於史傳居何等也北人重同姓多通譜系南人則有比鄰而各自為族者宋書王仲德傳北土重同姓謂之骨肉有逺來相投者莫不竭力營贍仲德聞王愈在江南是太原人乃往依之愈禮之甚薄魏書崔𤣥伯傳崔寬自隴右通欵見司徒浩浩與相齒次厚撫之及浩誅以逺來疏族獨得不坐遂家於武城以一子繼浩弟覽妻封氏相奉如親北史杜銓傳初密太后杜氏父豹喪在濮陽太武欲令迎葬於鄴謂司徒崔浩曰天下諸杜何處望髙朕意欲取杜中長老一人以為宗正令營護凶事浩曰京兆為美中書博士杜銓其家今在趙郡是杜預後於今為諸杜最召見銓以為宗正令與杜超子道生送豹喪葬鄴南銓遂與超如親超謂銓曰既是宗正何緣僑居趙郡乃延引同屬魏郡南史韋鼎傳陳亡入隋時吏部尚書韋世康兄弟顯貴文帝從容謂鼎曰世康與公逺近對曰臣宗族南徙昭穆非臣所知帝曰卿百代卿族豈忘本也命官給酒肴遣世康請鼎還杜陵鼎乃自楚太傅孟以下二十餘世並考論昭穆作韋氏譜七卷示之歡飲十餘日乃還近日同姓通譜最為濫雜其實皆植黨營私為蠧國害民之事宜嚴為之禁欲合宗者必上之於官使諳悉古今者為之考定嵗終以達禮部而類奏行之其不請而私通者屏之四裔然後可革其弊古之姓氏有專官掌之國語曰使名姓之後能知上下之神祗氏姓之所出者為之宗又曰司啇協名姓春官宗伯其屬有都宗人家宗人而女官亦有內宗外宗今日姓氏昏姻二事似宜專設一官方得教民之本氏族之亂莫甚於五代之時當日承唐餘風猶重門䕃故史言唐梁之際仕宦遭亂奔亡而吏部銓文書不完因緣以為姦利至有私鬻告敕亂易昭穆而季父母舅反拜姪甥者豆盧革傳册府元龜長興初鴻臚卿桞膺將齊即文書兩件賣與同姓人柳居則大理寺斷罪當大辟以遇恩赦減死奪見任官罰銅終身不齒敕曰一人告身三代名諱傳於同姓利以私財上則欺罔人君下則貨鬻先祖罪莫大焉自今以後如有此弊傳者受者竝當極法今則因無䕃叙遂弛禁防五十年來通譜之俗遍於天下自非明物察倫之主亟為澄别則滔滔之勢將不可反矣唐朝已前最重譜牒如新唐書言河南劉氏本出胸奴之後劉庫仁柳城李氏世為契丹酋長營州王氏本髙麗之類此同姓而不同族也又如魏書髙陽王雍傳言博陵崔顯世號東崔地寒望劣此同族而不同望也故髙士亷傳言每姓第其房望雖一姓中髙下懸隔異姓稱族自漢以來未有此事杜子美寄族弟唐十八使君詩云與君陶唐後盛族多其人聖賢冠史籍枝派羅源津則杜與唐為兄弟矣重送劉十弟判官詩云分源豕韋派别浦鴈賓秋年事推兄忝人才覺弟優則杜與劉為兄弟矣韓文公送何堅序亦云何與韓同姓為近容齊三筆引孫緬唐韻曰韓滅子孫分散江淮間因以韓為何字隨音變遂為何氏按詩揚之水一章言戍申二章言戍甫三章言戍許孔氏曰言甫許者以其俱為姜姓既重章以變文因借甫許以言申其實不戍甫許也六國時秦趙同為嬴姓史記漢書多謂秦為趙亦此類也史記秦本紀太史公曰秦以其先造父封趙城為趙氏陸賈傳秦任刑法不變卒滅趙氏索隱曰案韋昭云秦伯翳後與趙同出蜚亷造父有功周穆王封之趙由此一姓趙氏漢書武五子傳趙氏無炊火焉韋昭曰趙秦之别氏南越傳蒼梧秦王晋灼曰秦王即趙先也趙本與秦同姓故曰秦王淮南子亦稱秦始皇為趙政三國志陳思王上疏絶纓盜馬之臣赦楚趙以濟其難注秦穆公有赦盜馬事趙則未聞蓋以秦亦趙姓文選王融䇿秀才文訪遊禽於絶澗作霸秦基李善注引韓非子所載趙董閼于事而云史記曰趙氏之先與秦共祖以其共祖故雖趙亦號曰秦又左思魏都賦二嬴之所曽聆李善注秦穆公趙簡子史記趙氏之先與秦同祖故曰二嬴也嵩髙言生甫及申孔氏曰此詩送申伯而及甫侯者美其上世俱出四嶽故連言之今人之於同姓幾無不通譜何不更廣之於異姓而以子美退之為例也李華淮南節度使崔公頌德碑云惟申伯翼宣王登南邦興周室小白率諸侯征楚翟奉王職與崔公叶德同勳皆姜姓也開元十九年於兩京置齊太公廟建中初宰相盧杞京兆尹盧諶以盧者齊之裔乃鳩其裔孫若崔盧丁吕之族合錢以崇飾之元吳澄送何友道遊萍鄉序云袁柳撫何二族各以儒官著而其初實一姬姓文之昭由魯之展而為柳武之穆由晉之韓而為何氏不同而姓同宋邵伯溫聞見録云司馬溫公一日過康節先生謁曰程秀才既見則溫公也問其故公笑曰司馬出程伯休父二字姓改一字古時以二字姓改為一字者如馬宫本姓馬矢改為馬唐憲宗名純詔姓淳于者改姓于唐宰相世系表鍾離昧二子次曰接居潁川長社為鍾氏見之史册不過一二自洪武元年詔民間有色目姓一切禁止如今有呼姓本呼延乞姓本乞伏皆明初改而并中國所自有之復姓皆去其一字氏族之紊莫甚於此且如孫氏有二衛之良夫楚之叔敖竝見於春秋而公孫叔孫長孫士孫王孫之類今皆去而為孫與二國之孫合而為一而其本姓遂亡公羊公沙公乘之類則去而為公母丘母將之類則去而為母而其本姓遂亡司徒司空之類唐𤣥宗御注孝經碑末有司徒巨源李雍娑羅樹碑末有司徒𤣥蕳宋開寶中宗廟碑翰林待詔司徒儼書宋史趙逢傳有禮部侍郎集賢殿學士司徒翊則去而為司司馬氏則去而或為司或為馬而司馬之僅存於代者惟溫公之後所以然者蓋因儒臣無學不能如魏孝文改代北之姓一一為之條理而聽其人之所自為也然漢姓之改不始於是時唐書阿史那忠以擒頡利功拜左屯衛將軍妻以宗女定襄縣主賜名為忠單稱史氏韓文公集賢院校理石君墓志云其先姓烏石蘭從拓跋魏氏入夏居河南遂去烏與蘭獨姓石氏劉靜修古里氏名字序云吳景初本姓古里氏以代北諸姓今各就其近似者易從中國姓故古里氏例稱吳則固巳先之矣肅宗上元二年詔氏姓與俗諱及隱疾同聲者宜改與本族望所出漢金世宗大定十三年五月戊戌禁女直人毋得混為姓得敦本之至意章邱志言洪武初翰林編修吳沈奉㫖撰千家姓得姓一千九百六十八而此邑如术如傌尚未之録廣韻傌字下注云齊大夫名今訪之术姓有三四百丁自云金丞相珠格髙琪之後按珠格原文作术虎前人不知音譯故繆以為术姓之祖也蓋二字改為一字者而撰姓之時尚未登於黃册也以此知單姓之改竝在明初以後而今代山東氏族其出於金元之裔者多矣洪武元年禁不得蒙古姓禁中國人之為䝉古姓元時有此俗非禁䝉古之本姓也三年四月甲子詔曰天生斯民族屬姓氏各有本原古之聖王尤重之所以别昏姻重本始以厚民俗也朕起布衣定群雄為天下主已嘗詔告天下蒙古諸色人等皆吾赤子果有材能一體擢用比聞入仕之後或多更姓名朕慮嵗久其子孫相傳昧其本原非先王致謹氏族之道中書省其告諭之如已更易者聽其改正可謂正大簡要至九年三月癸未以火你赤為翰林蒙古編修更其姓名曰霍莊北音讀霍如火蓋亦倣漢武賜日磾姓金之意然漢武取義於休屠王祭天金人亦以中國本無金姓也今中國本有霍姓而賜之霍則與周霍叔之後無别矣况其時又多不奉㫖而自為姓者其年閠九月丙午淮安府海州儒學正曾秉正言臣見近來蒙古色目人多改為漢姓與土著無異有求仕入官者有登顯要者有為富商大賈者雖示懷徠終慮淆混宜令復姓庶可辨識又臣前過江浦見塞外之俘纍纍而有以臣所見不如早為之所至永樂元年九月庚子上謂兵部尚書劉俊曰各衛來降人多同名宜賜姓以别之於是兵部請如洪武中故事編置勘合給賜姓氏按洪武中勘合賜姓實録不載惟十六年二月故元雲南右丞觀音保降賜姓名李觀又宣宗實録綽爾洪武二十一年來歸賜姓名李賢從之三年七月賜巴圖特穆爾名吳允誠婁圖嚕古名柴秉誠寶珠名楊效誠自此遂以為例而華宗賜姓與中土舊族相亂惜乎當日之君子徒誦招攜懷逺之言而無類族辨物之道使舉籍蕃人之來歸者賜以漢姓所無不妨如拓跋宇文之類二字為姓則既不混於因生賜姓胙土命氏之舊而又使百世之下知昭代遠服四裔其得姓於朝者凡若干族豈非曠代之盛舉哉北方門族杜氏通典言北齊之代瀛冀諸劉清河張宋并州王氏濮陽侯族諸如此輩近將萬室北史薛𦙍傳為河北太守有韓馬兩姓各二千餘家今日中原北方雖號甲族無有至千丁者户口之寡族姓之衰與江南相去􅞅絶其一登科第則為一方之雄長而同譜之人至為之僕役此又風俗之敝自金元以來凌夷至今非一日矣冒姓今人多有冒母家姓者漢書外戚恩澤侯表扶柳侯吕平以皇太后姊長姁子侯師古曰平既吕氏所生不當姓吕蓋史家唯記母族也按是時太后方封吕氏故平以姊子冒吕姓而封耳唐書天后紀聖厯二年臘月賜皇太子中宗姓武氏然則有天子而令之冒母姓者與漢書景十三王傳趙王彭祖取江都易王寵姬王建所姦淖姬者甚愛之生一男號淖子晉書會稽王道子傳許榮上疏言今臺府局吏直衛武官及僕𨽻婢兒取母之姓者本臧獲之徒無鄉邑品第是知冒母為姓皆人倫之所鄙賤然亦有帝子而稱母姓者如栗太子衛太子史皇孫之類則以其失位而名之也外戚傳上憐許太子蚤失母蓋霍后時人稱之吕平以太后姊長姁子侯此冒母姓之始夏侯嬰傳曾孫頗尚主主隨外家姓號孫公主故滕公子孫更為孫氏此冒外祖母姓史記灌夫傳父張孟為潁隂侯嬰舍人得幸因進之至二千石故蒙灌氏姓為灌孟大宛傳堂邑氏故夷奴甘父漢書注服䖍曰堂邑姓也漢人其奴名甘父師古曰堂邑氏之奴本夷人名甘父下云堂邑父者蓋取主之姓以為氏而單稱其名曰父此冒主姓之始新唐書元載父景升為曹王明妃元氏掌田租請于妃冒為元氏兩姓漢書百官表建昭三年七月戊辰衛尉李延夀為御史大夫一姓繁古人二名止用一字晉侯重耳之名見於經而定四年祝他述踐土之盟其載書止曰晉重豈古人二名可但稱其一與昭二年莒展輿出奔吳傳曰莒展之不立晉語曹僖負羇稱叔振鐸為先君叔振亦二名而稱其一也昭二十一年蔡侯朱出奔楚榖梁傳作蔡侯東出奔楚乃為之說曰東者東國也東國隱太子之子平侯廬之弟朱叔父也何為謂之東也王父誘而殺焉父執而用焉奔而又奔之曰東惡之而貶之也然則以削其一名為貶也定六年季孫斯仲孫忌帥師圍鄆杜氏注何忌不言何闕文王莽孫宗得罪自殺復其本名㑹宗貶厥爵改厥號是又以增其一名為貶也班固幽通賦發還師以成命兮重醉行而自耦潘嶽西征賦重戮帶以定襄𢎞大順以霸世文公名止用一字本於踐土載書却非翦截古人名字之比至嶽為關中詩云紛紜齊萬亦孔之醜馬汧督誄云齊萬哮闞震驚台司則不通矣豈有以齊萬年為齊萬者邪若梁王彤為征西大將軍而詩云桓桓梁征尤不成語班固幽通賦巨滔天而泯夏王莽字巨君止用一巨字王逸九思管束縳兮桎梏百貿易兮傳賣音鬻遭桓繆兮識舉才德用兮列施百里奚止用一百字此體後漢人已開之矣吕氏春秋干木光乎德去假字今本呂氏卷秩有假字惜誓來革順志而用國去惡字此為翦截名字之祖文中竝稱兩人而一氏一名尤為變體把殖華還二人也而淮南子稱為殖華賈誼新書使曹勃不能制曹曹參勃周勃也史記孟子荀卿傳管嬰不及管管仲嬰晏嬰也司馬遷報任安書周魏見辜周周勃魏魏其侯竇嬰也楊雄長揚賦乃命驃衛驃驃騎將軍霍去病衛大將軍衛青也杜欽傳覽宗宣之饗國韋昭曰宗殷髙宗也宣周宣王也徐樂傳名何必夏子俗何必成康服䖍曰夏禹也子湯也湯子姓班固幽通賦周賈蕩而貢憤周莊周賈賈誼也漢􅚌彰長碑云喪父事母有柴潁之行柴髙柴潁潁考叔也夏侯湛張平子碑云同貫宰貢宰宰我貢子貢也風俗通清擬夷叔郤正釋譏褊夷叔之髙懟傅子夷叔迂武王以成名杜預遺令南觀伊雒北望夷叔陶潜詩積善云有報夷叔在西山皆謂伯夷叔齊漢廣漢屬國侯李翊碑夷史之髙巴郡太守樊敏碑有夷史之直皆謂伯夷史魚陶潜讀史述九章程杵是程嬰公孫杵臼新唐書尉遲敬德傳隱巢是隱太子巢刺王一諡一爵古人諡止稱一字古人諡有二字三字而後人相沿止稱一字者衛之睿聖武公止稱武公貞惠文子止稱公叔文子晉趙獻文子止稱文子檀弓晉獻文子成室注謂晉君獻之廬陵胡氏曰或趙武諡獻文耳魏惠成王止稱惠王楚頃襄王止稱襄王秦惠文王止稱惠王悼武王止稱武王昭襄王止稱昭王莊襄王止稱莊王韓昭釐侯止稱昭侯宣惠王止稱宣王趙悼襄王止稱襄王漢諸葛忠武侯止稱武侯稱人或字或爵顔曾思孟三人皆氏而思獨字以嫌於夫子也樊酈絳灌三人皆姓而勃獨爵以功臣周姓者多也汾隂侯昌隆慮侯寵魏其侯止䣙武侯綜髙景侯成博陽侯聚皆周姓顔師古引楚漢春秋謂别有一人名絳灌者非史記垓下之戰孔將軍居左費將軍居右孔將軍蓼侯孔藂也費將軍費侯陳賀也費獨以爵者以功臣陳姓者多也博陽侯濞曲逆侯平堂邑侯嬰陽夏侯豨棘蒲侯武河陽侯涓髙胡侯夫乞復陽侯胥槀侯錯猗氏侯遫龍侯署紀信侯倉皆陳姓子孫稱祖父字子孫得稱祖父之字子稱父字屈原之言朕皇考曰伯庸是也孫稱祖字子思之言仲尼祖述堯舜是也朱子曰古人未嘗諱字程先生云豫年十四五從周茂叔本朝先輩尚如此伊川亦嘗呼明道字儀禮筮宅之辭曰哀子某為其父某甫筮宅又曰哀子某來日某卜葬其父某甫字父也虞祭之祝曰適爾皇祖某甫卒哭之祝曰哀子某來日某隮祔爾于爾皇祖某甫字祖也祔祭之祝曰適爾皇祖某甫以隮祔爾孫某甫兩字之也字為臣子所得而稱故周公追王其祖曰王季王而兼字已祧不諱册府元龜唐憲宗元和元年禮儀使奏言謹按禮記曰既卒哭宰夫執木鐸以命于宫曰舍故而諱新此謂已遷之廟則不諱也今順宗神主升祔禮畢髙宗中宗神主上遷請依禮不諱制可文宗開成中刻石經凡髙祖太宗及肅代德順憲穆敬七宗諱竝缺㸃畫髙中睿𤣥四宗己祧則不缺文宗見為天子依古卒哭乃諱鄭氏曲禮注曰生者不相辟名故御名亦不缺韓退之辨諱本為二名嫌名立論而其中治天下之治却犯正諱蓋元和之元髙宗己祧故其潮州上表曰朝廷治平日久曰政治少懈曰巍巍治功曰君臣相戒以致至治舉張行素曰文學治行衆所推平淮西碑曰大開明堂坐以治之韓𢎞神道碑銘曰無有外事朝廷之治惟諱辨篇中似不當用漢時祧廟之制不傳竊意亦當如此故孝惠諱盈而說苑敬愼篇引易天道虧盈而益謙四句盈字皆作滿在七世之內故也班固漢書律厯志盈元盈統不盈之類一卷之中字凡四十餘見何休注公羊傳曰言孫于齊者盈諱文己祧故也若李陵詩獨有盈觴酒與子結綢繆枚乘柳賦盈玉縹之清酒載古文苑又詩盈盈一水間載玉臺新詠二人皆在武昭之世而不避諱又可知其為後人之擬作而不出於西京矣李陵詩不當用盈字容齊隨筆論之後唐明宗天成四年中書門下奏少帝册文內有基字是𤣥宗廟諱尋常詔敕皆不迥回避少帝是繼世之孫册文內不欲斥列聖之諱今改為宗字宋史紹興三十二年正月禮部太常寺言欽宗祔廟翼祖當遷以後翼祖皇帝諱依禮不諱詔恭依謝肇浙曰宋真宗名恆而朱子於書中恆字獨不諱蓋當寧宗之世真宗己祧崇禎三年禮部奉㫖頒行天下避太祖成祖廟諱及孝武世穆神光熹七宗廟諱正依唐人之式惟今上御名亦須回避蓋唐宋亦皆如此觀漢宣帝之詔知當時已避天子之名然止避下一字而上一字天子與親王所同則不諱皇太子名不諱册府元龜唐王紹為兵部尚書紹名初與憲宗同憲宗時為廣陵王順宗即位將册為皇太子紹上言請改名議者或非之曰皇太子亦人臣也漢魏故事皇太子稱臣晉咸寧中議除此制摯虞以為孝經資於事父以事君義兼臣子則不嫌於稱臣詔令依舊東宫之臣當請改爾奈何非其屬而遽請改名豈為以禮事上邪左司員外郎李藩曰歷代故事皆自不識大體之臣而失之因不可復正無足怪也三國志注言魏文帝為五官中郎將賓客如雲邴原獨不往太祖微使人問之原答曰吾聞國危不事冡宰君老不奉世子萬歷中年往往有借國本之名而以為題目者得無有愧其言唐中宗自房州還復立為皇太子左庶子王方慶上言太子皇儲其名尊重不敢指斥晉尚書僕射山濤啓事稱皇太子而不言名朝官猶尚如此宫臣諱則不疑今東宫殿及門名皆有觸犯臨事論啓回避甚難孝敬皇帝為太子時改𢎞教門為崇教門沛王為皇太子改崇賢館為崇文館皆避名諱以遵典禮伏望依例改換制從之史臣謂方慶欲尊太子以示中興之漸然則方慶之言蓋有為言之也有明之制太子親王名俱令回避蓋失之不考古也崇禎二年兵部主客司主事賀烺以避皇太子名改名世夀而光宗為太子河南府及商州屬縣竝未嘗改實録言洪武十四年十月辛酉給事中鄭相同請依古制凡啓事皇太子惟東宫官屬稱臣朝臣則否以見尊無二上之義詔下群臣議翰林院編修吳沈言太子所以繼聖體而承天位者也尊敬之體宜同從之歷代不稱臣之制自斯而變親王之名尤不必諱而亦諱之正統十二年山西鄉試詩經題內維周之楨楨字犯楚昭王諱考試及同考官俱罰俸一月二名不偏諱二名不偏諱宋武公名司空改司空為司城是其證也杜氏通典大唐武德九年六月太宗居春宫總萬幾下令曰依禮二名不偏諱其官號人名及公私文籍有世及民兩字不連讀者竝不須諱避唐書髙宗紀貞觀二十三年七月丙午改治書侍御史為御史中丞諸州治中為司馬别駕為長史治禮郎為奉禮郎以避上名上以貞觀初不諱先帝二字有司奏曰先帝二名禮不偏諱上既單名臣子不合指斥上乃從之通典又言太宗時二名不相連者竝不諱至𤣥宗始諱之然永徽初已改民部為戶部而李世績已去世字單稱績矣又按隋書修於太宗時而中間多有改世為代改民為人者此唐人偏諱之始然亦有不盡然者經籍志四民月令作四人而齊民要術仍民字是亦漢書注所云史駮文者也廣章懷太子注後漢書亦有并其本文而改之者如胡傳詩美先人詢于芻蕘之類後唐明宗名嗣源天成元年六月敕曰古者酌禮以制名懼廢於物難知而易諱貴便於時况徵彼二名抑有前例太宗文皇帝自登寶位不改舊稱時則臣有世南官有民部靡聞曲避止禁連呼朕猥以眇躬託於人上祗遵聖範非敢自尊應文書內所有二字但不連稱不得回避若臣下之名不欲與君親同字者任自改更務從私便庶體朕懷嫌名衛桓公名完楚懷王名槐古人不諱嫌名故可以為諡韓文公諱辨言不諱滸勢秉機乃𤣥宗御删定禮記月令曰野雞入大水為蜃曰野雞始雊則諱雉以與治同音也李林甫序曰璿樞玉衡以齊七政則諱璣德宗九月九日賜曲江宴詩時此萬樞暇適與佳節并則諱機以與基同音也南史劉秉不稱名而書其字曰彥節則諱秉以與昞同音也又如武后父諱士彠而孫處約改名茂道韋仁約改名思謙睿宗諱旦而張仁亶改名仁願𤣥宗諱隆基而劉知幾改名子𤣥箕州改名儀州即今遼州德宗諱適而括州改名處州順宗諱誦而鬬訟律改為鬬競憲宗諱純凡姓淳于者改姓于惟監察御史韋淳不改既而有詔以陸淳為給事中改名質淳不得已改名處厚而懿宗以南詔酋龍名近𤣥宗諱遂不行册禮則退之所言亦未為定論也唐自中葉以後即士大夫亦諱嫌名故舊史以韓愈為李賀作諱辨為紕繆而賈曾傳則曰拜中書舍人曾以父名忠固辭議者以為中書是曹司名又與曾父名音同字别於禮無嫌曾乃就職懿宗紀則曰咸通二年八月中書舍人衛洙奏狀稱蒙恩除授滑州刺史官號內一字與臣家諱音同請改授閒官敕曰嫌名不諱著在禮文成命已行固難依允是又以為不當諱也册府元龜咸通十二年分司侍御史李溪進狀曰臣准西臺牒及金部稱奉六月二十七日敕內園院郝景全事奏狀內訟字音與廟諱同奉敕罰臣一季俸者臣官位至卑得蒙罰俸屈與不屈不合有言而事關理體若便隱默恐負聖時願陛下寬其罪戾使得盡言臣前奏狀稱准敕因事告事旁訟他人是咸通十一年十月十三日敕語臣狀中具有准敕字非臣自撰辭句臣謹按禮不諱嫌名又按職制律諸犯廟諱嫌名不坐注云謂若禹與雨疏云謂聲同而字異注疏重復至易分曉伏惟皇帝陛下明過帝堯孝踰大舜豈自發制敕而不避諱哉故是審量禮律以為無妨耳即引陛下敕文而言不敢擅有移改不謂內園便有此論奏也臣非敢訴此罰俸也恐自此有援引敕格者亦須委曲回避便成訛弊臣聞趙充國為將不嫌伐一時事以為漢家後法魏徵為相不存形迹以致貞觀太平臣雖未及將相忝為陛下持憲之臣豈可以論俸為嫌而使國家敕命有誤也願陛下留意察納别下明敕使自後章奏一遵禮律處分則天下幸甚敕免所罰南唐元宗初名璟避周信祖廟諱改名景是不諱嫌名按嫌名之有諱在漢末之聞晉羊祜為都督荆州諸軍事及薨荆州人為祜諱名室户皆以門為稱改戶曹為辭曹此諱嫌名之始也後魏地形志天水郡上邽縣犯太祖諱改為上封魏太祖名圭宋代制於嫌名字皆避之禮部韻略凡與廟諱音同之字皆不收太祖諱匡胤十陽部去王切一十三字二十一震部羊晉切一十一字皆不收它皆倣此朱子周易本義姤卦下以故為姤作故為遇避髙宗嫌名也宋板書貞字完字多是缺筆貞音同禎仁宗諱完音同桓欽宗諱雍録以貞女樹為正女木樹音同曙英宗諱豈不聞顔氏家訓所云吕尚之兒如不為上趙一之子倘不作一便是下筆即妨是書皆觸者乎金章宗泰和元年七月己巳初禁廟諱同音字蓋亦倣宋制也明代不諱嫌名如建文年號是也以諱改年號唐中宗諱顯𤣥宗諱隆基唐人凡追稱髙宗顯慶年號多云明慶永隆年號多云永崇趙元昊以父名德明改宋明道年號為顯道而范文正公與元昊書亦改後唐明宗為顯宗杜氏通典釋法明逰天竺記明下有國諱改焉四字當是小注今本連作大文前代諱孟蜀所刻石經於唐髙祖太宗諱皆缺書石晉相里金神道碑民珉二字皆缺末筆南漢劉巖尊其父謙為代祖聖武皇帝猶以代字易世至宋益逺矣而乾德三年卜諲伏羲女媧廟碑民珉二字咸平六年孫冲序絳守居園池記碑民珉二字皆缺末筆其於舊君之禮何其厚與豫至西安見宋咸平二年夢英自書篆書日録偏旁字源序立于文宣王廟者稱長安為故都而唐字跳行蓋嘆昔人之厚其時唐之亡已九十三年矣楊阜魏明帝時人也其疏引書協和萬國猶避漢髙祖諱韋昭吳後主時人也其解國語凡莊字皆作嚴猶避漢明帝諱唐長孫無忌等撰隋書易忠節傳以誠節稱苻堅為苻永固亦避隋文帝及其考諱後漢應劭作風俗通有諱舊君之議自古相傳忠厚之道如此今人不知之矣元移刺迪為常州路總管刻其所㸃四書章句或問集注其凡例曰凡序注或問中題頭及空處竝存其舊以見當時忠上之意如宋德隆盛之類近嵗新刋大學衍義亦然時天厯元年也資治通鑑周太祖世宗紀太祖皇帝皆題頭至今仍之孟子見梁襄王章末注蘇氏曰豫觀孟子以來自漢髙祖及光武及唐太宗及我太祖皇帝能一天下者四君太祖上空一字永樂中修大全於其空處添一宋字後人之見與前人相去豈不逺哉名父名君名祖金縢周公之祝辭曰惟爾元孫某左傳荀偃濟河而禱稱曾臣彪名君也淮南子曰祝則名君左傳楚子圍宋申犀見王稱無畏知罃對楚王稱外臣首鄢陵之戰欒針曰書退名父也華耦來盟稱君之先臣督欒盈辭于周行人曰陪臣書曰其子黶名祖若父也弟子名師論語長沮曰夫執輿者為誰子路曰為孔丘孟子樂正子入見曰君奚為不見孟軻也是弟子而名師也同輩稱名古人生不諱名同輩皆面呼其名書周公若曰君奭禮記曾子問篇老聃曰丘檀弓篇曾子曰商論語微生畝謂孔子曰丘是也以字為諱古人敬其名則無有不稱字者顔氏家訓曰古者名以正體字以表德名終則諱之字乃可以為孫氏孔子弟子記事者皆稱仲尼子貢曰仲尼日月也皆魏鶴山云儀禮子孫於祖禰稱字吕后微時嘗字髙祖為季漢袁種字其叔父盎曰絲王丹與侯霸子語字霸為君房江南至今不諱字也河北士人全不辨之故有諱其名而并諱其字者三國志司馬朗傳年九嵗人有道其父字者朗曰慢人親者不敬其親者也客謝之常林傳年七嵗有父黨造門問林伯先在否林不答客曰何不拜林曰雖當下拜臨子字父何拜之有晉書儒林劉兆傳嘗有人著鞾騎驢至兆門外曰吾欲見劉延世兆儒德道素青州無稱其字者門人大怒兆曰聽前舊唐書韓愈傳拜中書舍人有不悅愈者言愈前左降為江陵掾曹荆南節度使裴均館之頗厚近者均子鍔還省父愈為序餞鍔仍呼其字此論喧於朝列坐是改太子右庶子至於山陽公載記言馬超降蜀常呼先主字關羽怒請殺之此則面呼人主之字又不可以常儕論矣自稱字漢書注張晏曰匡衡少時字鼎世所傳衡與貢禹書上言衡敬報下言匡鼎白南史陶𢎞景自號華陽隱居人間書札即以隱居代名此自稱字之始也東觀餘論言古人或有自稱字者王右軍敬謝帖云王逸少白廬山遠公集盧循與遠書云范陽盧子先叩首柳少師與弟帖云誠懸呈今按唐權德輿答楊湖南書稱載之再拜柳冕答鄭衢州書稱敬叔頓首白居易與元九書稱樂天再拜宋陳搏謁髙公詩稱道門弟子圖南上唐張謂長沙風土碑銘有唐八葉元聖六載正言待理湘東張洗濟瀆廟祭器幣物銘濯纓不才謬領兹邑元稹作白氏長慶集序自書曰微之序乃是作文自稱其字自稱其字不始於漢人家父吉甫寺人孟子之詩已先之矣人主呼人臣字漢髙帝曰運籌䇿帷帳之中决勝千里之外吾不如子房張良字景帝曰天下方有急王孫竇嬰字寧可以讓邪皆人主呼人臣字也晉以下人主於其臣多不呼名南史梁蔡樽為吏部尚書侍中武帝嘗設大臣䴵樽在坐帝頻呼姓名樽竟不答食䴵如故帝覺其負氣乃改唤蔡尚書樽始放筯執笏曰爾帝曰卿向何聾今何聰對曰臣預為右戚且職在納言陛下不應以名垂唤帝有慙色文選范雲表稱乃祖𤣥平李善注引晉中興書范汪字𤣥平魏書江式表稱臣亡祖文威式祖強字文威又南朝人如王敬𢎞王仲德王景文謝景仁北朝人如蕭世怡李元操之輩名犯帝諱即以字行不復更名宋褚叔茂張叔茂名與太和諱同以字行周通鑑大同二年時人多以字行舊史皆因之韋叔裕字孝寬以字行魏書多稱揚遵彥魏王昕對汝南王悅自稱元景北齊祖珽對長廣王湛自稱孝徵隋崔頥答豫章王啓自稱祖濬王貞答齊王􅌔啓自稱孝逸而唐太宗時如封倫房喬髙儉尉遲恭顔籀竝以字為名蓋因天子常稱臣下之字故爾其時堂陛之間未甚濶絶君臣而有朋友之義後世所不能及矣因話録文宗對翰林諸學士因論前代文章裴舍人素數道陳拾遺名柳舍人璟目之裴不覺上顧桞曰他字伯玉亦應呼陳伯玉兩名禮記正義公羊說春秋譏二名謂二字作名若魏曼多也公羊傳春秋以仲孫何忌為仲孫忌魏曼多為魏多皆謂譏二名而去之左氏說二名者楚公子棄疾弒其君即位之後改名為居是為二名許愼謹案云文武賢臣有散宜生蘇忿生則公羊之說非也白虎通古人之名或兼或單春秋譏二名乃謂其無常者也是用左氏說今按古人兩名見於經傳者不止楚平王如晉文侯名仇而書云父義和楚靈王名圍而春秋書弒其君䖍于乾溪趙簡子名鞅而鐵之戰自稱志父南宫敬叔名說一名縚字容又字括蜚亷石棺銘自稱處父屈原名平其作離騷也名正則字靈均賈誼傳梁王勝注李竒曰文三王傳言揖此言勝為有兩名假名甲乙史記萬石君傳長子建次子甲次子乙次子慶甲乙非名也失其名而假以名之也韓安國傳蒙獄吏田甲張湯傳湯之客曰甲漢書髙五王傳齊宦者徐甲嚴助傳閩越王弟甲疑亦同此孟嘗君傳田甲劫湣王當是其名任安傳某子甲何為不來乎三國志注許攸呼魏太祖小字曰某甲卿不得我不得冀州也左傳文十四年齊公子元不順懿公之為政也終不曰公曰夫巳氏注猶言某甲文選為齊明帝讓宣城郡公表謹附某官某甲奉表以聞宣德皇后令今遣某位某甲等漢書魏相傳中謁者趙堯舉春李舜舉夏兒湯舉秋貢禹舉冬不應一時四人同以堯舜禹湯為名若有意撰而名之者及讀急就章有云祖堯舜樂禹湯乃悟若此類皆古人所假以名之也或曰髙帝時實有趙堯然非謁者蜀漢費禕作甲乙論設為二人之辭世說云黃初中有甲乙疑論晉人文字每多祖此虛設甲乙中書令張華造甲乙之問云甲娶乙為妻後人娶丙博士弟子徐叔中服議以母為甲先夫為乙後夫為丙先子為丁繼子為戊梁范縝神滅論有張甲王乙李丙趙丁而關尹子云甲言利乙言害丙言或利或害丁言俱利俱害關尹子亦魏晉間人所造之書也先秦以上即有以甲乙為彼此之辭者韓非子罪生甲禍歸乙伏怨乃結以姓取名古人取名連姓為義者絶少近代人命名如陳王道張四維吕調陽馬負圖之類榜目一出則此等姓名幾居其半不知始自何年嘗讀通鑑至五代後漢有虢州伶人靖邉庭胡身之注曰靖姓也優伶之名與姓通取一義所以為謔也靖邉庭亦見宋史田欽祚傳考之自唐以來如黃翻綽雲朝霞唐書魏謨傳鏡新磨五代史伶官傳羅衣輕遼史伶宦傳之輩皆載之史書益信其言之有據也嗟乎以士大夫而效伶人之命名則自嘉靖以來然矣以父名子左傳成十六年潘尫之黨潘尫之子名黨也襄二十三年申鮮虞之𫝊摯申鮮虞之子名傅摯也按儀禮特牲饋食禮筮某之某為尸注曰某之某者字尸父而名尸也少牢饋食禮同亦此類也史記太史公自序維仲之省厥濞王吳濞乃劉仲之子稱為厥濞以夫名妻左傳昭元年當武王邑姜方震大叔漢書杜欽傳皇太后女弟司馬君力蘇林曰字君力為司馬氏婦南齊書周盤龍愛妾杜氏上送金叉鑷二十枚手敕曰餉周公阿杜孔叢子衛將軍文子之內子死復者曰皋媚女復子思聞之曰此女氏之字非夫氏之字也婦人於夫氏以姓氏稱禮也兼舉名字史文有一人而兼舉名字如子玉得臣百里孟明視之類已於左傳見之臯陶庭堅亦一人兩稱若駢儷之文必無重出而亦有一二偶見者焦氏易林申公顛倒巫臣亂國劉琨答盧諶詩宣尼悲獲麟西狩涕孔邱謝惠連秋懷詩雖好相如逹不同長卿慢沈約宋書恩幸傳論胡廣纍世農夫伯始致位公相黃憲牛醫之子叔度名動京師皆一人而兼舉其名字也古詩誰能刻鏤此公輸與魯班下一與字竟以公輸魯班為二人則不通矣排行兄弟二名而用其一字者世謂之排行如德宗德文義符義真之類起自晉末漢人所未有也水經注昔北平侯王談不同王莽之政子興生五子竝避亂隱居光武即帝位封為五侯元才北平侯益才安喜侯顯才蒲隂侯仲才新市侯季才唐侯是後人追撰妄說東漢人二名者亦少單名以偏旁為排行始見於劉琦劉琮此後應璩應瑒衛瓘衛玠之流踵之而出矣陳球傳二子瑀璠弟子圭若取偏旁又不當與父同也今人兄弟行次稱一為大不知始自何時漢淮南厲王常謂上大兄孝文帝行非第一也二人同名有以二人同名而合稱之者左傳莊二十八年晉獻公外嬖梁五與東關嬖五晉人謂之二五耦戰國䇿杜赫謂楚王曰此用二忌之道也以齊田忌鄒忌為二忌唐髙宗顯慶二年詔曰蹤二起於吳白蓋倣此稱字同其名名字相同起於晉宋之間史之所載晉安帝諱德宗字德宗恭帝諱德文字德文㑹稽王道子字道子殷仲文字仲文宋蔡興宗字興宗齊顔見逺字見逺梁王僧孺字僧孺劉孝綽字孝綽庾仲容字仲容江德藻字德藻任孝恭字孝恭師覺授字覺授北齊慕容紹宗字紹宗魏蘭根字蘭根後周王思政字思政辛慶之字慶之崔彥穆字彥穆之類至唐時尤多藩鎮傳田緒字緒劉濟字濟此起家軍伍未曾立字如李載義辭未有字之比爾史家例以為字非也且其文不可省乎變姓名古人變姓名多是避仇然亦有無所為而變者范蠡適齊為鴟夷子皮之陶為朱公第五倫客河東自稱王伯齊梁鴻適齊姓運期名耀生而曰諱生曰名死曰諱今人多生而稱人之名曰諱金石録云生而稱諱見於石刻者甚衆因引孝宣元康二年詔曰其更諱詢以為西漢已如此蜀志劉豹等上言聖諱豫覩許靖等上言名諱昭著晉書髙頵言范伯孫恂恂率道名諱未嘗經於官曹束晢勸農賦場功畢租輸至録社長召閭師條牒所領注列名諱王褒洞簫賦幸得諡為洞簫兮李善注諡者號也號而曰諡猶之名而曰諱者矣生稱諡漢書張敖傳吕后數言張王以魯元故不宜有此劉攽曰史家記事或有如此追言諡者史記貫髙與張敖言謂帝為髙祖公羊傳公子翬與桓公言吾為子口隱矣皆此類公羊傳注諡者傳家所加今按傳記中此例尚多如左氏傳石碏曰陳桓公方有寵於王國語鮑國謂子叔聲伯曰子何辭苦成叔之邑戰國䇿智過曰魏桓子之謀臣曰趙葭韓康子之謀臣曰假規史記秦本紀晉文公夫人請曰繆公怨此三人入於骨髓魯世家周公戒伯禽曰我文王之子武王之弟成王之叔父宋世家華督使人宣言國中曰殤公即位十年耳而十一戰楚世家國人每夜驚曰靈王入矣隨人謝吳王曰昭王亡不在隨齊湣王遺楚王書曰令秦惠王死武王立鄭世家莊公曰武姜欲之楚共王曰鄭成公孤有德焉趙世家吳延陵季子使於晉曰晉國之政卒歸於趙武子趙文子名武韓宣子魏獻子之後矣韓世家屈宜臼曰昭侯不出此門吳起傳公叔之僕曰君因先與武侯言仲尼弟子傳子羔曰出公去矣而門已閉魯仲連傳新垣衍謂趙王曰趙誠發使尊秦昭王為帝禇先生補梁孝王世家竇太后謂景帝曰安車大駕用梁孝王為寄三王世家公户滿意謂燕王曰今昭帝始立荀子周公謂伯禽之傅曰成王之為叔父吕氏春秋豫讓欲殺趙襄子其友謂之曰以子之才而索事襄子淮南子先軫曰昔吾先君與繆公交諸御鞅復於簡公曰陳成常宰豫二子者甚相憎也吳越春秋子胥曰報汝平王說苑景公曰善為我浮桓子也衛叔文子曰今我未以往而簡子先以來竝是生時不合稱諡又如禮記曽子問孔子曰季桓子之喪衛君請弔哀公辭不得命公為主客入弔康子立於門右孔子沒時哀公康子俱存此皆後人追為之辭也自東京以下即無此語文益謹而格卑矣史記田敬仲世家齊人歌之曰嫗乎采芑歸乎田成子史通曰田常見存而遽呼以諡蘇氏曰田常之時安知其為成子而稱之稱王公為君稱周文王為文君焦氏易林文君燎獵吕尚獲福號稱太師封建齊國漢張衡思𤣥賦文君為我端蓍兮利飛遁以保名稱晉文公為文君楚辭惜往日介子忠而立枯兮文君寤而追求淮南子晉文君大布之衣牂羊之裘又云介子歌龍蛇而文君垂泣稱宋文公為文君墨子昔者宋文君鮑之時稱楚莊王為莊君荀子莊君之􅘈稱齊莊公為莊君墨子昔者齊莊君之時稱魯昭公為昭君焦氏易林乾侯野井昭君喪居稱齊景公為景君宋何承天上陵篇指營邱感牛山爽鳩既沒景君歎稱宋襄公為襄君周庾信入彭城館詩襄君初建國稱宋元公為元君莊子宋元君夜半而夢日知録卷二十三
