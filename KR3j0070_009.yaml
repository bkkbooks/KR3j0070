body:
  text: 日知録卷九崑山顧炎武撰人材宋葉適言法令日繁治具日密禁防束縳至不可動而人之智慮自不能出於繩約之內故人材亦以不振使與人稍談及度外之事輒搖手而不敢為夫以漢之能盡人材陳湯猶扼腕於文墨吏而况於後世乎宜乎豪傑之士無以自奮而同歸於庸懦也使枚乘相如而習晚近之經義則必不能發其文章使管仲孫武而讀晚近之科條則必不能運其權略故法令者敗壞人材之具以防姦宄而得之者什三以沮豪傑而失之者常什七矣自萬厯以上法令繁而輔之以教化故其治猶為小康萬厯以後法令存而教化亡於是機變日增而材能日減其君子工於絶纓而不能獲敵之首其小人善於盜馬而不肯救君之患誠有如墨子所云使治官府則盜竊守城則倍畔使斷獄則不中分財則不均吕氏春秋所云處官則荒亂臨財則貪得列近則持諌將衆則罷怯又如劉蕡所云謀不足以剪除姦凶而詐足以抑揚威福勇不足以鎮衛社稷而暴足以侵害閭里者嗚呼吾有以見徒法之無用矣實録言宣德五年八月丙戍上罷朝御文華殿學士楊溥等侍上問庶官之選何術而可以盡得其人溥對曰嚴薦舉精考課何患不得上曰近代有罪舉主之法夫以一言之薦而欲保其終身不亦難乎朕以為教養有道人材自出漢董仲舒言素不養士而欲求賢猶不琢玉而求文采此知本之論也徒循三載考績之文而不行三物教民之典雖堯舜亦不能以成允釐之治矣保舉宋史元祐初司馬光為相奏曰為政得人則治然人之才或長於此而短於彼雖皋夔稷契各守一官中人安可求備故孔門以四科取士漢室以數路得人若指瑕掩善則朝無可用之人茍隨器授任則世無可棄之士臣備位宰相職當選官而識短見狹士有恬退滯淹或孤寒遺逸豈能周知若專引知識則嫌於私若止循資序未必皆才莫若使有位達官各舉所知然後克叶至公野無遺賢矣欲乞朝廷設十科舉士一曰行義純固可為師表科有官無官人皆可舉二曰節操方正可備獻納科舉有官人三曰智勇過人可備將帥科舉文武有官人四曰公正聰明可備監司科舉知州以上資序五曰經術精通可備講讀科有官無官人皆可舉六曰學問該博可備顧問科同上七曰文章典麗可備著述科同上八曰善聽獄訟盡公得實科舉冇官人九曰善治財賦公私俱便科同上十曰練習法令能斷請讞科同上應職事官自尚書至給舍諫議寄祿官自開府儀同三司至大中大夫職自觀文殿學士至待詔每歲須於十科內舉三人仍具狀保任中書置籍記之異時有事須材即執政案籍視其所嘗被舉科格隨事試之有勞又著之籍內外官闕取嘗試有效者隨科授職所賜誥命仍備所舉官姓名其人任官無狀坐以繆舉之罪所貴人人重愼所舉得才光又言朝廷執政惟八九人若非交舊無以知其行能不惟涉循私之嫌兼所取至狹豈足以盡天下之賢才若採訪毁譽則情偽萬端與其聽遊談之言曷若使之結罪保舉故臣奏設十科以舉士其公正聰明可備監司誠知請屬挾私所不能無但有不如所舉譴責無所寬宥則不敢妄舉矣明主勞於求賢而逸於任人韓非子云王登為中牟令吕氏春秋作任登言中牟士中章胥巳襄主曰子見之我將以為中大夫其相室曰中大夫晉重列也今無功而受君其耳而未之目邪襄主曰我取登既耳而目之矣登之所取又耳而目之是耳目人終無已也此執要之論也善乎子夏之告樊遲也曰舜有天下選於衆舉皋陶不仁者逺矣湯有天下選於衆舉伊尹不仁者逺矣唐書崔祐甫為相薦舉惟其人不自疑畏推至公以行日除十數人未逾年除吏幾八百員多稱允當帝嘗謂曰人言卿擬官多親舊何邪對曰陛下令臣進擬庶官夫進擬者必悉其才行若素不知聞何繇得其實帝以為然以德宗之猜忌而猶能聽之亦由祐甫之至公也李綘傳德宗問多公親舊何邪祐甫對曰所問當與不當耳非臣親舊孰知其才其不知者安敢與官時以為名言正統三年十一月乙未行在通政司左通政陳恭言古者擇任庶官悉由選部是以職任專而事體一頃者令朝臣各薦所知恐開私謁之門而長奔競之風乞令杜絶一歸銓部事下行在吏部尚書郭璡等覆奏曰往時朝廷慮典銓者未盡知人故敕廷臣各舉所知其法良矣脫有徇私邦憲昭然誰肯同蹈今恭聽流言而尼良法未見其當也乞令仍舊從之關防隋書酷吏傳庫狄士文為貝州刺史凡有出入皆封署其門僮僕無敢出外此後來居官通例而史以為異事豈非當日法制雖嚴而關防未若後之密乎末世人習澆訛防間日甚少不禁飭則姦宄之徒投間抵隙無所不至長吏到官以關防為第一義然愚以為但無至公之心以御之爾世説晉文王親愛阮嗣宗阮從容言嘗遊東平樂其土風願得為東平太守文王從其意阮騎驢徑到郡至則壞府舍諸壁障使內外相望然後教令一郡清肅十餘日復騎驢去唐姚合為武功尉其縣居詩曰朝朝門不閉長似在山時在曠達之士猶且為之而况於大賢也大唐新語薑晦為吏部侍郎性聰悟識理體舊制吏曹舍宇悉布棘以防令史與選人交通及晦領選事盡除之大開銓門示無所禁有私引置者晦輒知之召問莫不首伏初朝廷以晦改革前規咸以為不可竟銓綜得所賄賂不行舉朝歎服太祖實録洪武二十年八月壬申上謂刑部尚書唐鐸工部侍郎秦逵都察院左都御史詹徽等曰朕初於文籍設關防印記者本以絶欺蔽防姦偽特一時權宜爾果正人君子焉用是為自今六科有關防印記俱銷之仍移文諸司使知朕意封駮人主之所患莫大乎唯言而莫豫違齊景公燕賞於國內萬鍾者三千鍾者五令三出而職計莫之從公怒令免職計令三出而士師莫之從晏子春秋此畜君之詩所為作也漢哀帝封董賢而丞相王嘉封還詔書胡三省曰後世給舍封駮本此後漢鍾離意為尚書僕射數封還詔書自是封駮之事多見於史而未以為專職也唐制凡詔敕皆經門下省事有不便得以封還而給事中有駮正違失之掌著於六典唐書給事中在漢為加官至唐屬之門下省使之駮正奏抄塗竄詔敕之不便如袁高崔植韋𢎞景狄兼謨鄭肅韓佽韋溫鄭公輿之輩並以封還敕書垂名史傳亦有召對慰諭如德宗之於許孟容中使嘉勞如憲宗之於薛存誠者而元和中給事中李藩在門下制敕有不可者即於黃紙後批之吏請别連白紙藩曰别以白紙是文狀也何名批敕宣宗以右金吾大將軍李燧為嶺南節度使已命中使賜之節給事中蕭倣封還制書上方奏樂不暇别召中使使優人追之節及燧門而返人臣執法之正人主聽言之明可以並見德宗時盧杞量移饒州刺史制出給事中袁高執之不下擢浙東觀察判官齊總為衡州刺史給事中許孟容封還詔書植憲宗末皇甫鎛奏減內外官俸以助國用給事中崔封還敕書穆宗時授李訓四門助教給事中鄭肅韓佽封還制書時劉士涇擢太僕卿給事中韋𢎞景封還詔書文宗赦官典犯贓者給事中狄兼謨封還敕書宗宣宗時赦康季榮擅用官錢給事中封還敕書懿時貶右補闕王譜給事中鄭公輿封還敕書五代廢弛宋太宗淳化四年六月戊寅始復給事中封駮而司馬池猶謂門下雖有封駮之名而詔書一切自中書以下非所以防過舉也明代雖罷門下省長官而獨存六科給事中以掌封駮之任旨必下科其有不便給事中駮正到部謂之科參若曰抄出駮之抄出寢之是也六部之官無敢抗科參而自行者故給事中之品卑而權特重萬厯之時九重淵默泰昌以後國論紛紜而維持禁止往往賴抄參之力天啓六年大理寺正許志吉以請旌母節事為禮科右給事中張惟一抄參具疏申辨奉旨參駮係科臣執掌許志吉險辭飾辨著罰俸三個月夫亦由行古之道也元城語録曰王安石薦李定時陳襄彈之未行已擢監察御史裏行宋次道封還詞頭辭職清波雜志唐制唯給事得封還詔書富鄭公知制誥日封劉從願妻遂國夫人公乃繳還詞頭後人遂踵而行之中書舍人繳還詞頭自此始罷之次直吕大臨再封還之最後付蘇子容又封還之更奏復下至於七八子容與大臨俱落職奉朝請名譽赫然此乃祖宗德澤百餘年養成風俗與齊太史見殺三人而執筆如初者何異部刺史漢武帝遣刺史周行郡國省察治狀黜陟能否斷治寃獄以六條問事一條強宗豪右田宅踰制以強陵弱以衆暴寡二條二千石不奉詔書倍公向私旁諂牟利侵漁百姓聚斂為姦三條二千石不恤疑獄風厲殺人怒則任刑喜則任賞煩擾刻暴剝削黎元為百姓所疾山崩石裂妖祥訛言四條二千石選署不平茍阿所愛蔽賢寵頑五條二千石子弟怙倚榮勢請託所監六條二千石違公下比阿附豪強通行貨賂割損政令又令歲終得乘傳奏事夫秩卑而命之尊官小而權之重此小大相制內外相維之意也元城語録漢元封五年初置刺史部十三州秋分行郡國秩六百石而得按二千石不法其權最重秩卑則其人激昂權重則能行志本自秦時遣御史出監諸郡史記言秦始皇分天下以為三十六郡郡置守尉監蓋罷侯置守之初而已設此制矣漢書百官表監御史秦官掌監郡漢省丞相遣史分刺州不常置武帝元封五年初置部刺史掌奉詔條察州秩六百石員十三人成帝末翟方進何武乃言春秋之義用貴治賤不以卑臨尊刺史位下大夫而臨二千石輕重不相準請罷刺史更置州牧秩二千石而朱博以漢家故事置部刺史秩卑而賞厚咸勸功樂進州牧秩真二千石位次九卿九卿缺以高第補其中材則茍自守而已恐功效陵夷姦軌不勝於是罷州牧復置刺史後漢書劉焉傳靈帝政化衰缺四方兵寇焉以刺史威輕建議改為牧伯請選重臣以居其任從之州任之重自此而始劉昭之論以為刺史監糾非法不過六條傳車周流匪有定鎮秩裁六百未生陵犯之釁成帝改牧其萌始大唐戴叔倫撫州刺史廳壁記云漢置十三部刺史以察舉天下非法通籍殿中乘傳奏事居靡定處權不牧人合二者之言觀之則州牧之設中材僅循資自全強者至專權裂土新唐書李景伯為太子右庶子與太子舍人盧俌議今天下諸州分𨽻都督專生殺刑賞使授非其人則權重釁生非強幹弱枝之誼願罷都督留御史以時按察秩卑任重以制姦宄便繇是停都督然後知刺史六條為百代不昜之良法而今之監察御史巡按地方為得古人之意矣唐書監察御史掌分察百寮巡按州縣又其善者在於一年一代夫守令之官不可以不久也監臨之任不可以久也久則情親而弊生望輕而法玩故一年一代之制又漢法之所不如而察吏安民之效已見於二三百年者也唐李嶠請十州置御史一人以周年為限使其親至屬縣或入閭里督察姦訛觀採風俗此法正明代所行若夫倚勢作威受賕不法此特其人之不稱職耳不以守令之貪殘而廢郡縣豈以巡方之濁亂而停御史乎至於秩止七品與漢六百石制同王制天子使其大夫為三監監於方伯之國國三人金華應氏曰方伯者天子所任以總乎外者也又有監以臨之蓋方伯權重則易專大夫位卑則不敢肆此大小相維內外相統之微意也何病其輕重不相準乎夫不達前人立法之意而輕議變更未有不召亂而生事者吾於成哀之際見漢治之無具矣唐自太宗貞觀二十年遣大理卿孫伏伽黃門侍郎禇遂良等二十二人以六條巡察四方黜陟官吏帝親自臨決牧守已下以賢能進擢者二十人以罪死者七人其流罪已下及免黜者數百人已後頻遣使者或名按察或名巡撫至玄宗天寶五載正月命禮部尚書席豫等分道巡按天下風俗及黜陟官吏此則巡按之名所繇始也玄宗開元二十三年二月辛亥置十道採訪處置使詔曰言念蒼生心必遍於天下自古良牧福猶潤於京師所以厯選列城聿求連率豈徒刺察將委輯寧朝散大夫檢校御史中丞關內宣諭賑給使上柱國盧絢等任寄已深聲實兼茂咸貫通於理道益純固於公心或華髮不衰或白圭無玷可以軌儀郡國康濟黎元間歲巳來數州失稔頗致流冗能勿軫懷而吏或不畏不仁不安不便誠須矯過必在任賢庶蠲疾苦之源以協大中之義若令行一道利乃萬人朕所設官以俟能者唐開元中或請選擇守令停採訪使姚崇奏十道採訪猶未盡得人天下三百餘州縣多數倍安得守令皆稱其職于文定筆塵曰元時風憲之制在內諸司有不法者監察御史劾之在外諸司有不法者行臺御史劾之即今在內道長在外按臺之法也惟所謂行臺御史者竟屬行臺歲以八月出巡四月還治乃長官差遣非繇朝命其體輕矣明朝御史總屬內臺奉命出按一歲而更與漢遣刺史法同唐宋以來皆不及也唐中宗神龍二年遣十道巡察使詔二周年一替懾韋忠謙言御史一出當動搖山嶽震州縣明朝多有其人金史宗雄傳自熙宗時遣使亷問吏治得失世宗即位凡數歲輒一遣黜陟之故大定之間郡縣吏皆奉法百姓滋殖號為小康章宗即位置九路提刑使此即今按察使六條之外不察漢時部刺史之職不過以六條察郡國而已不當與守令事三國志司馬宣王報夏矦太初書曰秦時無刺史但有郡守長吏漢家雖有刺史奉六條而已故刺史稱傳車其吏言從事居無常法吏不成臣其後轉更為官司耳故朱博為冀州刺史敕告吏民欲言縣丞尉者刺史不察黃綬各自詣郡鮑宣為豫州牧以聽訟所察過詔條被劾而薛宣上疏言吏多苛政政教煩碎大率咎在部刺史或不循守條職舉錯各以其意多與郡縣事翟方進傳言遷朔方刺史居官不煩苛所察應條輒舉自刺史之職下侵而守令始不可為天下之事猶治絲而棼之矣太祖實録洪武二十一年四月諭按治江西監察御史花綸等自今惟官吏貪墨鬻法及事重者如律逮問其細事毋得苛求隋以後刺史秦置御史以監諸郡漢省丞相遣史分刺州不常置武帝元封五年初置十三州刺史各一人魏晉以下為刺史持節都督魏志言自漢季以來刺史總統諸郡賦政於外非若曩時司察之任而已漢時止十三州至梁時南方一偏之地遂置一百七州隋文帝開皇三年罷郡以州統縣杜氏通典曰以州治民職同郡守無復刺舉之任自是刺史之名存而職廢後雖有刺史皆太守之互名有時改郡為州則謂之刺史有時改州為郡則謂之太守一也非舊刺史之職理一郡而已由此言之漢之刺史猶今之巡按御史魏晉以下之刺史猶今之總督隋以後之刺史猶今之知府及直𨽻知州也新唐書地理志曰唐興高祖改郡為州太守為刺史宋真宗咸平四年左司諌知制誥楊億疏言昔自秦開郡置守漢以天下為十三部命刺史以領之自後因郡為州以太守為刺史降及唐氏亦嘗變更曽未數年又仍舊貫今多命省署之職出為知州又設通判之官以為副二此權宜之制耳豈可為經久之訓哉臣欲乞諸州並置刺史以戶口多少置其俸祿分中下上緊望雄之等級品秩之制率如舊章與常參官比視階資出入更踐省去通判之目但置從事之員建亷察之府以統臨按輿地之圖而區處昔太平興國初詔廢支郡出於一時十國為連周法斯在一道置使唐制可尋至若號令之行風教之出先及於府府以及州州以及縣縣及鄉里自上而下由近及遠譬如身之使臂臂之使指提綱而衆目張振領而羣毛理由是言之支郡之不可廢也明矣臣欲乞復置支郡𨽻於大府量地里而分割如漕運之統臨名分有倫官業自舉又覩唐制內外官奉錢之外有祿米職田又給防閣庶僕親事帳內執衣白直門夫各以官品差定其數歲收其課以資於家本司又有公廨田食本錢以給公用自唐末離亂國用不充百官奉錢並減其半自餘别給一切權停今郡官於半奉之中已是除陌又於半奉三分之內其二以他物給之鬻於市㕓十裁得其一二曽糊口之不及豈代耕之足云昔漢宣帝下詔云吏能勤事而奉祿薄欲其無侵漁百姓難矣遂加吏奉著於䇿書竊見今之結髮登朝陳力就列其奉也不能致九人之飽不及周之上農其祿也未嘗有百石之入不及漢之小吏若乃左右僕射百僚之師長位莫崇焉月奉所入不及中軍千夫之帥豈稽古之意哉欲乞今後百官奉祿雜給並循舊制既豐其稍入可責以亷隅官且限以常員理當減於舊費觀此則明代所循大抵皆宋之餘弊矣知縣知縣者非縣令而使之知縣中之事知猶管也杜氏通典所謂檢校試攝判知之官是也唐姚合為武功尉作詩曰今朝知縣印夢裏百憂生唐人亦謂之知印其名始於貞元已後其初尚帶一權字白居易集有裴克諒權知華隂縣令制曰華隂令卒非選補時唐制凡選始於孟冬終於季春唐晈傳貞觀中官吏部侍郎先是選集四時補擬不為限晈請以冬初集盡季春止後遂為法調租勉農政不可缺前鎮國軍判官試大理評事裴克諒久佐本府頗有勤績屬邑利病爾必周知宜假銅墨試其才理待有所立方議正名是權知者不正之名也至於普設知縣則起自宋初明朝事實云五代任官凡曹掾簿尉之齷齪無能以至昏老不任驅策者始注縣令故天下之邑率皆不治誅求刻剝猥迹萬狀至優諢之言多以令長為笑魏泰東軒筆録同建隆三年始以朝官為知縣其間復參用京官或幕職為之宋史言宋初內外所授官多非本職惟以差遣為資厯建隆四年詔選朝士分治劇邑大理正奚嶼知館陶監察御史王祐知魏楊應夢知永濟屯田員外郎于繼徽知臨清常參官宰縣自此始又曰初州郡多闕官縣令選尤猥下多為清流所鄙薄每不得調乃詔吏部選幕職官為知縣自此以後遂罷令而設知縣沿其名至今雲麓漫鈔曰唐制縣令闕佐官攝令曰知縣事李翺任工部志文云攝富平尉知縣事是也今差京官曰知縣差選人曰令與唐異矣宋時結銜曰以某官知某府事以某官知某州事以某官知某縣事以其本非此府此州此縣之正官而任其事故云然山堂考索藝祖開基召諸鎮會于京師賜第以留之分命朝臣出守列郡號權知軍州事軍謂兵州謂民也縣于愼行筆塵曰宋時大縣四千户以上選朝官知小三千戶以下選京官知故知縣與縣令不同以京朝官之銜知某縣事非外吏也事如建隆三年寃句令候陟以清幹聞擢左拾遺知縣是也後則直云某府知府某州知州某縣知縣文復而義舛矣北齊宰縣多用厮濫至於士流恥居百里北史元文遙傳五代選令必皆鄙猥之人自古以來以社稷民人寄之庸瑣者未有不敗事者也知州宋葉適言五代之患專在藩鎮藝祖思靖天下以為不削節度則其禍不息於是始置通判以監統刺史而分其柄命文臣權知州事使名若不正任若不久者以輕其權宋敏求曰凡節度州為三品刺史州為五品國初曹翰以觀察使判頴州是以四品臨五品州也同品為知隔品為判自後唯輔臣宣徽使太子太保僕射為判餘並為知州監當知𣙜稅都監總兵戎而太守者即刺史塊然徒管空城受詞訴而已諸鎮皆束手請命歸老宿衛昔日節度之害盡去而四方萬里之逺奉尊京城文符朝下期會夕報伸縮緩急皆在朝廷矣是宋初本有刺史而别設知州以代其權後則罷刺史而專用知州以權設之名為經常之任矣新唐書元和初李吉甫為相病方鎮疆恣為帝從容言使屬郡刺史得自為政則風化可成帝然之出郎吏十餘人為刺史宋祖之以京官臨制州縣蓋趙公開其端矣知府唐制京郡乃稱府至宋則潛藩之地皆升為府宋初太宗真宗皆嘗為開封府尹後無繼者乃設權知府一人以待制以上充皇朝政略凡命知府必帶權字以翰林為之翰林學士及雜學士若待制則權發遣而已自陸遊渭南集權知府李符始崇寧三年蔡京乞罷權知府置牧尹各一員牧以皇子領尹以文臣充是權知府者所以避京尹之名也後則直命之為知府非也守令所謂天子者執天下之大權者也其執大權奈何以天下之權寄之天下之人而權乃歸之天子自公卿大夫至於百里之宰一命之官莫不分天子之權以各治其事而天子之權乃益尊後世有不善治者出焉盡天下一切之權而收之在上而萬幾之廣固非一人之所能操也沈約宋書論曰孝建泰始主威獨運空置百司權不外假而刑政糾雜理難遍通而權乃移於法於是多為之法以禁防之雖大姦有所不能踰而賢智之臣亦無能效尺寸於法之外相與兢兢奉法以求無過而已於是天子之權不寄之人臣而寄之吏胥是故天下之尤急者守令親民之官而今日之尤無權者莫過於守令守令無權而民之疾苦不聞於上安望其致太平而延國命乎書曰元首叢脞哉股肱惰哉萬事墮哉蓋至於守令日輕而胥史日重則天子之權已奪而國非其國矣尚何政令之可言耶削考功之繁科循久任之成效必得其人而與之以權庶乎守令賢而民事理此政治之急務也元吳淵頴歐陽氏急就章解後序曰今之世每以三歲為守令滿秩曾未足以一新郡縣之耳目而已去又况用人不得專辟臨事不得專議錢糧悉拘於官而不得專用軍卒弗出於民而不得與聞蓋古之治郡者自辟令丞唐世之大藩亦多自辟幕府僚屬是故守主一郡之事或司金榖或按刑獄各有分職守不煩而政自治雖令之主一邑丞則贊治而掌農田水利主簿掌簿書尉督盜賊令亦不勞獨議其政之當否而已今自一命而上皆出於吏部遇一事公堂完署甲是乙否吏或因以為姦勾稽文墨補苴罅漏塗擦歲月填塞辭欵而益不能以盡民之情狀至於唐世之賦上供送使留州自有定額兵則郡有都試而惟守之所調遣宋之盛時歲有常貢官府所在用度贏餘過客往來廪賜豐厚故士皆樂於其職而疾於赴功兵雖不及於唐義勇民丁團結什伍衣裝弓弩坐作擊刺各保鄉里敵至即發而郡縣固自兼領者也今則官以錢糧為重不留贏餘常俸至不能自給故多贓吏兵則自近戍逺既為客軍尺籍伍符各有統帥但知坐食郡縣之租稅然已不復繫守令事矣夫辟官涖政理財治軍郡縣之四權也而今皆不得以專之是故上下之體統雖若相維而令不一法令雖若可守而議不一為守令者既不得其職將欲議其法外之意必且玩常習故辟嫌礙例而皆不足以有為又況三時耕稼一時講武不復古法之便易而兵農益分遇歲一儉郡縣之租稅悉不及額軍無見食東那西挾倉廪空虛而郡縣無復贏蓄以待用或者水旱洊至閭里蕭然農民菜色而郡縣且不能以振救而坐至流亡是以言涖事而事權不在於郡縣言興利而利權不在於郡縣言治兵而兵權不在於郡縣尚何以復論其富國裕民之道哉必也復四者之權一歸於郡縣則守令必稱其職國可富民可裕而兵農各得其業矣宋理宗淳祐八年監察御史兼崇政殿説書陳求魯奏今日救弊之䇿大端有四宜採夏侯太初併省州郡之議俾縣令得以直達於朝廷用宋元嘉六年為斷之法俾縣令得以究心於撫字法藝祖出朝紳為令之典以重其權遵光武擢卓茂為三公之意以激其氣然後為之正其經界明其版籍約其妄費裁其橫斂此數言者在今日亦可采而行之舊唐書烏重胤傳元和十三年為橫海節度使上言曰臣以河朔能拒朝命者其大略可見蓋刺史失其職反使鎮將領兵事若刺史各得職分又有鎮兵則節將雖有祿山思明之姦豈能據一州為畔哉所以河朔六十年能拒朝命者秪以奪刺史縣令之職自作威福故也臣所管德棣景三州已舉公牒各還刺史職事訖應在州兵並令刺史收管從之繇是法制修立各歸名分是後雖幽鎮魏三州以河北舊風自相更襲在滄州一道獨稟命受代自重胤制置使然也祖宗朝凡大府知府之任多有賜敕然無常例成化四年七月亷州府知府邢正將之任以亷州密邇珠池喉襟交址近為廣西流賊攻陷城邑生民凋弊特請賜敕從之吉安府知府許聰將之任以吉安多強宗豪右詞訟繁興亦請賜敕俾得權宜處置從之刺史守相得召見兩漢之隆尤重太守史言孝宣拜刺史守相輒親見問觀其所繇退而考察所行以質其言有名實不相應必知其所以然常稱曰庶民所以安其田里而亡歎息愁恨之心者政平訟理也與我共此者其惟良二千石乎當日太守常得召見或賜璽書堂陛之間不甚濶絶文帝謂季布曰河東吾股肱郡故特召君耳武帝賜嚴助書久不聞問具以春秋對母以蘇秦縱橫賜吾邱壽王書子在朕前之時知略輻湊及至連十餘城之守任四千石之重師古曰太守都尉皆二千石今夀王為都尉不置太守故云四千石也職事並廢盜賊縱橫甚不稱在前時何也光武勞郭伋曰賢能太守去帝城不逺伋為頴州太守河潤九里冀京師並蒙福也天下之大不過數十郡國而二千石之行能皆獲簡於帝心是以吏職修而民情達以視後世之寄耳目於監司飾功狀於文簿者有親疏繁簡之不同矣其在唐時猶存此意玄宗開元十三年上自選諸司長官有聲望者十一人為刺史命宰相諸王餞於雒濵御書十韻詩賜之宣宗時李行言自涇陽縣令除海州刺史李君奭自醴泉令除懷州刺史皆采之民言擢以御筆入謝之日處分州事萬里之逺如在階前夫人主而欲親民必自其親大吏始矣册府元龜憲宗元和三年二月敕許新除官及刺史等假日於宣政門外謝便進狀辭其授官於朝堂禮謝並不須候假開國朝舊制凡命都督刺史皆臨軒册拜特示恩禮近歲雖不册拜而牧守受命之後皆便殿口對賜衣蓋以親人唐諱民字改曰人之官恩禮不可廢也時宰相李吉甫之舅裴復新除河南少尹求速之任適遇寒食假吉甫特奏請遂兼刺史同有是命非舊典也至明則名為陛辭而不得一見天顔堂亷內外之分益為邈絶漢令長漢時令長於太守雖稱屬吏然往往能自行其意不為上官所奪如蕭育為茂陵令會課育第六而漆令郭舜殿見責問育為之請扶風怒曰君課第六裁自脫何暇欲為左右言及罷出傳召茂陵令詣後曹當以職事對育徑出曹書佐隨牽育育案佩刀曰蕭育杜陵男子何詣曹也遂趨出欲去官明旦詔召入拜為司𨽻校尉育過扶風府門官屬掾吏數百人拜謁車下陶謙為舒令太守張磐同郡先輩與謙父友意殊親之而謙耻為之屈嘗舞屬謙謙不為起固強之乃舞舞又不轉磐曰不當轉邪謙曰不可轉轉則勝人如此事在今日即同列所難堪而昔人以行之上官漢時長吏之能自樹立可見於此矣宋史司馬池傳授永寧主簿與令相惡池以公事謁令令南向倨坐不起池挽令西向偶坐論事不為少屈京官必用守令通典言晉制不經宰縣不得入為臺郎魏肅宗時吏部郎中辛雄上疏以為郡縣選舉繇來共輕宜改其弊分郡縣為三等三載黜陟有稱職者方補京官如不厯守令不得為內職則人思自勉唐張九齡言於玄宗曰古者刺史入為三公郎官出宰百里致理之本莫若重守令凡不厯都督刺史雖有高第不得任侍郎列卿不厯縣令雖有善政不得任臺郎給舍都督守令雖遠者使無十年任外從之詔三省侍郎缺擇嘗任刺史者郎官缺擇嘗任縣令者宣宗大中改元制曰古者郎官出宰郡守入相所以重親人之官急為政之本自澆風久扇此道寖消頡頏清塗便臻顯貴治人之術未嘗經心欲使究百姓艱危通天下利病不可得也軒墀近臣蓋備顧問如不知人疾苦何以膺朕眷求今後諌議大夫給書中中書舍人未曽任刺史縣令者宰臣不得擬議宋孝宗時臣僚言吏事必厯而後知人才必試而後見為縣令者必為丞簿為郡守者必為通判為監司者必為郡守皆有差等未厯親民不宜驟擢因定知縣以三年為任非經兩任不除監察御史此開元乾道之吏治所以獨高於近代也明代綸扉之地必取詞林名在丙科始分銅墨於是字人之職輕而簿書錢榖之司一歸之俗吏矣漢諺有云取官漫漫怨死者半風俗通而宋神宗嘗謂宰臣曰朕思祖宗以百戰得天下今以州郡付之庸人常切痛心後之人君其以斯言書之坐右乎貞觀初馬周上言古者郡守縣令皆妙選賢德欲有所用必先試以臨人或繇二千石高第入為宰相今獨重內官縣令刺史頗輕其選又刺史多武夫勳臣或京官不稱職始出補外折衝果毅身力強者入為中郎將其次乃補邊州而以德行才術擢者十不能一所以百姓未安殆繇於此夫以太宗之政而馬周猶有此言則知重內輕外自古之所同患人主茍欲親民必先親牧民之官而後太平之功可冀矣宗室漢唐之制皆以宗親與庶姓參用入為宰輔出居牧伯者無代不有漢孝昭始元二年以宗室無在位者舉茂才劉辟強劉長樂皆為光祿大夫辟強守長樂衛尉孝平元始元年詔宗室為吏舉亷佐史補四百石師古曰言宗室為吏者皆令舉亷各從本秩而依亷吏遷之為佐史者例補四百石唐玄宗開元二十五年五月辛丑命有司選宗子有才者宗正薦四從叔前奉天令知正四從叔前祁縣令志遠五從弟雒陽尉遇六從弟酸棗丞良五從弟武進尉朏五從姪鄭縣尉瞻五從姪前宋州參軍承嗣皆授臺省官及法官京縣官詔曰至公之用本無偏黨惟善所在豈隔親疏四從叔知正等咸有才名見推公族秉惟清之操兼致遠之資朕每慮同盟不勤于德常縣右職以勸其從先委宗卿精為內舉量能考行厯在踰時名數則多升聞益寡光膺是選諒在得人固可擢以清要遷於臺閣將觀志於七子冀藉名於八人書不云乎九族既睦平章百姓凡今懿戚可不愼與違道漫常義無私於王法修身效節恩豈薄於他人期於帥先勵我風俗深宜自勉以副明言天寶三年正月詔皇五等以下親及九廟子孫有材學政理委宗正寺揀擇聞薦憲宗元和二年詔略同德宗貞元二年八月以睦王府長史嗣虢王則之為左金吾大將軍謂宰臣曰朕不欲獨用外戚故選宗室子有才行者奬拔之昭宗乾寧二年六月丁亥朔以京兆尹嗣薛王知柔兼戶部尚書判度支兼諸道鹽鐵轉運等使制曰支度牢籠之務弛張經制之宜當擇通才俾繼成績僉曰叔父膺豫簡求匪私吾宗示張王室故終唐之世有宰相十一人郇王房有林甫回鄭王房有程石福小鄭王房有勉夷簡宗閔恆山王房有適之吳王房有峴惠宣太子房有知柔而舊史贊之曰我宗之英曰皋嗣曹王與勉宋子京以為周唐任人不疑得親親用賢之道惟明朝不立此格於是為宗屬者大抵皆溺於富貴妄自驕矜不知禮義至其貧者則遊手逐食靡事不為名曰天枝實為棄物宋時凡宗室之不肖者俗呼為潑撒太尉曹冏所謂今之州牧郡守古之方伯諸侯或比國數人或兄弟並據而宗室子弟曽無一人間厠其間六代論正有明當日之事也崇禎時始行換授之法而教之無素舉之無術未見有卓然樹一官之績者三百年來當國大臣皆畏避而不敢言至天子獨斷行之而已晚矣然則親賢並用古人之所以有國長世者後王其可不鑒乎正統十四年也先犯京師詔諸王率兵勤王已而冦退詔止之大理寺丞薛瑄奏宜擇諸王最賢者二三人召來參預大議匡輔聖明帝曰不必召光武中興實賴諸劉之力乃即位已後但有續封之典而無舉賢之詔明章已下恩澤教訓徒先於四姓小侯明帝紀永平九年為四姓小侯開立學校置五經師注四姓樊氏郭氏隂氏馬氏其子弟號曰小侯而不聞加意於宗屬者然而親疏並用猶法西京故靈獻之世荆表益焉各專方鎮而昭烈乘之以稱帝于蜀若顚木之有由蘖其與宋之二王航海奔亡一敗而不振者不可同年而語矣唐末屯田郎中李衢作皇室維城録其有感于宗枝之不振乎史言自玄宗以後諸王不出閣不分房蓋自永王璘舉兵而人主疏忌其兄弟矣使得自樹功名如曹王皋者三五人參錯天下為牧帥亦何至大盜覆都強臣問鼎而十六宅諸王並殱於逆竪之手也明宗室自天啓二年開科得進士一人朱愼䤰列名奄案為宗人羞此不教不學之所致也崇禎中得進士十二人惟朱統鈽起家庶吉士官至南京國子監祭酒而其始館選時尚有以宗生為疑吏部尚書王永光曰既可以中翰即可以庶常遂取之其他換授甚多然其才略皆無聞焉張邦基墨莊漫録言國朝宗室例除環衛裕陵始以非袒免補外官繼有登科者然未有為侍從宣和五年始除子嵩徽猷閣待制繼而子淔亦除八年又除子櫟前明制度與宋略同昔後魏元志為雒陽令不避疆禦孝文帝謂邢巒曰此兒竟可所謂王孫公子不鏤自雕巒曰露竹霜條故多徑莭非鸞則鳯其在本枝也人主之宗屬豈必無才能優於庶姓者哉閔管蔡之失道而作棠棣之詩以親其兄弟此周之所以興懲吳楚七國之變而抑損諸侯至於中外彈微本末俱弱此西漢之所以亡也宋沈懷文諫孝武曰陛下既明管蔡之誅願崇唐衛之寄深得富辰諫王之指夫惟聖人以至公之心處親疏之際故有國長久而天下蒙其福矣金史密國公璹世宗子越王永功之子也天興初國事危急曹王出質璹已卧疾求入見哀宗於隆德殿上問叔父欲何言璹奏曰聞訛可曹王名欲出議和訛可年幼恐不能辦大事臣請副之或代其行上慰之曰南渡後宣宗遷汴國家比承平時有何奉養然叔父亦未嘗沾溉無事則置之冷地無所顧藉有急則投之不測叔父盡忠固可天下其謂朕何叔父休矣於是君臣相顧泣下哀宗雖亡國之君而其言有足悲者章宗防制刻削兄弟而其禍卒至於此豈非後王之永鑒哉自古帝王為治之道莫先於親親而有明之待親王及其宗屬也則位重而愈疏祿多而愈貧誠有如漢哀帝時杜業上言宗室諸侯微弱與繫囚無異者英宗實録載景泰三年七月甲辰陜西布政司言秦愍王子故庶人尚炌男女十人皆未有室家請如詔于軍民之家自擇昏配從之時其長女年四十長子年三十六矣此去開國八九十年太祖之曽孫而怨曠之感不得上聞已如此又况數傳而下者乎於是請名請昏無不有費而不副其意即部中為之沈閣宋史趙希躍傳宗姓多貧而始生有訓名為人後有過禮吏受賕無藝莫敢自陳雲麓漫鈔言宗籍凡袒免親以上皆賜名乃有寓不典之言及取怪僻字樣以為戲笑明代之弊同此前明宗室固鮮修飭而朝臣視之若非其同類者唐書言德宗初政諸王有官者皆令出閣就班嶽陽等一十縣主在諸王院久而未適人者悉命以禮出降二百年來無有以建中故事為朝廷告者崇禎中唐王作書述閣老子文定之言曰唐玄宗十王宅百孫院皆在京師凡有所請皆賂韓虢而後得憲宗時諸王久不出閣亦必厚賂宦官始得所請彼以宗室近屬其聚居都邑猶不免於夤緑况以千里外之藩封二百年之支屬有不結納左右以為倚託哉嗚呼文定之言結納左右而得請猶未褻也今之懇乞下僚卑哀吏胥不如是則終不得請不愈甚乎又曰漢臣之言曰有白頭老人教臣言嗚呼余繼之矣夫一夫吁嗟王道為虧今且窮閻蔀屋猶得被雲雨之施而耳目之所不及恩澤之所不周未有甚於皇族者枤杜作而晉微角弓刺而周替覽唐王之言為之慨然藩鎮宋代之患在于無藩鎮嶽飛説張所曰國家都汴恃河北以為固茍馮據要衝峙列重鎮一城受圍則諸城或撓或救金人不敢窺河南而京師根本之地固矣文天祥言本朝懲五季之亂削除藩鎮一時雖足以矯尾大之弊然國以寖弱故敵至一州則一州破至一縣則一縣殘今宜分竟內為四鎮使其地大力衆足以抗敵約日齊奮有進無退彼備多力分疲於奔命而吾民之豪傑者又伺間出於其中則敵不難却也嗚呼世言唐亡於藩鎮而中葉以降其不遂并於吐蕃回紇滅於黃巢者未必非藩鎮之力宋至靖康而始立四道金至興元而始建九公不已晚乎尹源唐説曰世言唐所以亡由諸侯之疆此未極於理夫弱唐者諸侯也唐既弱矣而久不亡者諸侯維之也燕趙魏首亂唐制專地而治若古之建國此諸侯之雄者然皆恃唐為輕重何則假王命以相制則易而順唐雖病之亦不得而外焉故河北順而聽命則天下為亂者不能遂其亂河北不順而變則姦雄或附而起德宗世朱泚李希烈始遂其僭而終敗亡田悅叛於前武俊順於後也憲宗討蜀平夏誅蔡夷鄆兵連四方而亂不生卒成中興之功者田氏稟命王承宗歸國也武宗將討劉稹之叛先正三鎮絶其連衡之計而王誅以成如是二百年姦臣逆子專國命者有之夷將相者有之而不敢窺神器非力不足畏諸侯之勢也及廣明之後關東無復唐有方鎮相侵伐者猶以王室為名及梁祖舉河南劉仁恭輕戰而敗羅氏內附王鎔請盟於是河北之事去矣梁人一舉而代唐有國諸侯莫能與之爭其勢然也向使以僖昭之弱乘巢蔡之亂而田承嗣守魏王武俊朱滔據趙燕疆相均地相屬其勢宜莫敢先動況非義舉乎如此雖梁祖之暴不過取霸於一方爾安能強襌天下故唐之弱者以河北之強也唐之亡者以河北之弱也或曰諸侯強則分天子之勢子何議之過乎曰秦隋之勢無分於諸侯而亡速於唐何如哉不獨此也契丹入大梁而不能有者亦以藩鎮之勢重也宋史劉平為鄜延路副總管上言五代之末中國多事惟制西戎為得之中國未嘗遣一騎一卒遠屯塞上但任土豪為衆所服者封以州邑征賦所入足以贍兵養士由是無邊鄙之虞太祖定天下懲唐末藩鎮之盛削其兵柄收其賦入自節度以下第坐給俸祿或方面有警則總師出討事已則兵歸宿衛將還本鎮彼邊方世襲宜異於此而誤以朔方李彛興靈武馮繼業一切亦徙內地自此靈夏仰中國戌守千里饋糧兵民並困矣宋初之事折氏襲而府州存繼捧朝而夏州失一得一失足以為後人之鑑也賈昌朝為御史中丞請陜西緣邊諸路守臣皆帶安撫蕃部之名擇其族大有勞者為首帥如河東折氏之比庶可以為藩籬之固路史封建後論曰天下之枉未足以害理而矯枉之枉常深天下之弊未足以害事而救弊之弊常大方至和之二年范蜀公為諌院建言恩州自皇祐五年秋至去年冬知州者凡七換河北諸州大率如是欲望兵馬練習安可得也伏見雄州馬懷德恩州劉渙冀州王德恭皆材勇智慮可責辦治乞令久任然事勢非昔今不從其大而徒舉三二州為之以一簣障江河猶無益也請以昔者河東之折靈武之李與夫馮暉楊重勛之事言之馮暉節度霛武而重勛世有新秦藩屏西北他日暉卒太祖乃徙其子馮翊而以近鎮付重勛於是二方始費朝廷經略折李二姓自五代來世有其地二寇畏之太祖於是俾其世襲每謂邊寇內入非世襲不克守世襲則其子孫久遠家物勢必愛吝分外為防設或叛渙自可理討縱其反噬原陜一帥禦之足矣况復朝廷恩信不爽奚自而他斯則聖人之深謀有國之極算固非流俗淺近者之所知也厥後議臣遽以世襲不便折氏則以河東之功姑令仍世而李氏遂移陜西因兹遂失靈夏國之與郡其事固相懸矣議者以太祖之懲五季而解諸將兵權為封建之不可復愚竊以為不然夫太祖之不封建特不隆封建之名而封建之實固已默圖而隂用之矣李漢超齊州防禦監關南兵馬凡十七年敵人不敢窺邊郭進以洺州防禦守西山巡檢纍二十年賀惟忠守易李謙溥刺隰姚內斌知慶皆十餘載韓令坤鎮常山馬仁圭守瀛王彥升居原趙贊處延董遵誨屯環武守琦戌晉何繼筠牧棣若張美之守滄景咸纍其任管𣙜之利賈易之權悉以畀之又使得自誘募驍勇以為爪牙軍中之政俱以便宜從事是以二十年間無西北之虞深機密䇿蓋使人繇之而不知爾胡為議者不原其故遂以兵為天子之兵郡不得而有之故自寶元康定以中國勢力而不能亢一偏方之元昊靖康寇難長驅百舍直搗梁師蕩然無有藩籬之限卒之橫潰莫或支持繇今日言之奚啻冬水之冰齒嗚呼欲治之君不世出而大臣者每病本務之不知此豫所以每咎徴普以為唐室我朝之不封建皆鄭公韓王之不知以帝王之道責難其主而為是尋常茍且之治也黃氏日抄曰太祖時不過用李漢超輩使自為之守而邊烽之警不接於廟堂三代以來善于禦邊者未有如我太祖者也不使守封疆者久任世襲而欲身制萬里如在目睫天下無是理也藩鎮既罷而州縣之任處之又不得其方真宗咸平三年濮州盜夜入城略知州王守信監軍王昭度於是知黃州王禹稱上言易曰王公設險以守其國自五季亂離各據城壘豆分瓜剖七十餘年太祖太宗削平僭偽天下一家當時議者乃令江淮諸郡毁城隍收兵甲撤武備書生領州大郡給二十人小郡十五人以充常從號曰長吏實同旅人名為郡城蕩若平地雖則尊京師而抑郡縣為強幹弱枝之計亦匪得其中道也蓋太祖削諸侯跋扈之勢太宗杜僭偽覬望之心不得不爾其如設法救世久則弊生救弊之道在乎從宜疾若轉規不可膠柱今江淮諸州大患有三城池墮圯一也兵仗不完二也軍不服習三也望陛下特紆宸斷許江淮諸郡酌民戶衆寡城池大小並置守捉軍士多不過五百人閲習弓劎然後漸葺城壁繕完甲胄則郡國有禦侮之備長吏免剽掠之虞矣嗚呼人徒見藝祖罷節度為宋百年之利而不知奪州縣之兵與財其害至於數百年而未巳也陸士衡所謂一夫從橫而城池自夷豈非崇禎中流冦之事乎輔郡崇禎二年三月兵部侍郎申用𢡟上疏請以昌平通易霸四州為四輔宿重兵以衛京師奉旨嘉納下部議覆事不果行魏書言靈太后時四中郎將兵寡弱任城王澄奏宜以東中帶榮陽郡南中帶魯陽郡西中帶恆農郡北中帶河內郡選二品三品親賢居之配以強兵則深根固本之計也靈太后將從之以議者不同而止及爾朱榮至河隂遂無一兵拒敵金都大梁貞祐四年元兵取潼關次嵩汝間御史臺言兵踰崤澠深入重地近抵西郊彼知京師屯宿重兵不復叩城索戰但以遊騎遮絶道路而分兵攻擊州縣是亦圍京師之漸也若專以城守為事中都之危又將見於今日元史太祖八年分兵三道伐金河北郡縣盡拔唯中都通順真定清沃大名東平德邳海州十一城不下此臣等所為寒心也不攻京師而縱其别攻州縣是猶火在腹心撥置於手足之上均一身也願陛下察之契丹後改為遼太祖將攻幽州其后述律氏指帳前樹曰此樹無皮可以生乎曰不可后曰幽州之有土有民亦猶是爾吾以三千騎掠其四野不過數年困而歸我矣赫連勃勃稱帝諸將勸先取關中勃勃曰吾大業草創士衆未多姚興亦一時之雄諸將用命關中未可圖也我今専固一城彼必并力於我衆非其敵亡可立待不如以驍騎風馳出其不意救前則擊後救後則擊前使彼疲於奔命我則遊食自若不及十年嶺北河東盡為我有待興既死嗣子暗弱徐取長安在吾計中矣古人用兵之智多有出此邊縣宋元祐八年知定州蘇軾言漢鼂錯與文帝畫備邊䇿不過二事其一曰徙逺方以實廣虛其二曰制邊縣以備敵國今河朔西路被邊州軍自澶淵講和以來百姓自團結為弓箭社不論家業之髙下户出一人又自相推擇家資武藝衆所服者為社頭社副録事謂之頭目帶弓而鋤佩劎而樵出入山坂飲食長技與北敵同私立賞罰嚴於官府分番巡邏鋪屋相望若透漏北敵及本土強盜不獲其當番人皆有重罰遇有警急繫鼓集衆頃刻可致千人器甲鞍馬常若寇至蓋親戚墳墓所在人自為戰敵甚畏之先朝名臣帥定州者如韓琦龎籍皆如意拊循其人以為爪牙耳目之用而籍又增損其約束賞罰今雖名目具存責其實用不逮往日欲乞朝廷立法少賜優異明設賞罰以示懲勸奏凡兩上皆不報此宋時弓箭社之法雖承平廢弛而靖康之變河北忠義多出於此有國家者能於間暇之時而為此寓兵於農之計可不至於臨時倉皇課責有司以修練儲備之紛紛矣宦官漢和熹鄧后詔中官近臣於東觀受讀經傳以教授宫人秦符堅選奄人及女𨽻有聰識者置博士授經若夫巷伯能詩列于小雅史遊急就著在藝文古固有之而不限其人也太祖深懲前代宦寺之弊命內官不許識字永樂以後此令不行宣德中乃有內書堂之設實録宣德元年七月以劉翀為行在翰林院修撰專授小內使書四年十月命行禮部尚書兼謹身殿大學士陳山專授小內使書仕實録言山為人寡學急利而昧大體上薄之其致歸恩禮一無所及則其授小內使書亦賤者之事也昔隋蔡允恭為起居捨人帝遣教宫人允恭恥之數稱疾宋賈昌期為侍講以編修資善堂書籍為名而實教授內侍講官吳育奏罷之以宣廟之納諫求言而廷臣未有論及此者馴致秉筆之奄其尊侔於內閣而大權旁落不可復收得非內書堂階之厲乎英廟升遐興璽局局丞王綸以老事東宫希圖柄用而翰林侍讀學士錢溥以嘗奉命授內書館綸受學馬遂內外交錯以謀入閣已而敗露得罪王綸造溥家執弟子禮坐溥上坐飲至晡而去周禮寺人王之正內五人內豎倍寺人之數當時􅉏御之臣皆是士人而婦寺之權衰矣唐太宗詔內侍省不立三品官以內侍為之長階第四不任以事惟門閣守禦廷內掃除稟食而已武后時稍增其人至中宗黃衣乃二千員玄宗時宫嬪大卒至四萬宦官黃衣以上三千員玄宗始置內侍省監二員秩三品以髙力士袁思藝為之是知宦官之盛繇於宫嬪之多而人主欲不近刑人則當以逺色為本王元美筆記曰髙帝時中人不得預外事見公侯大臣叩首惟謹宋濓大明日厯序言后妃居中不預一髮之政外戚亦循理畏法無敢情寵以病民寺人之徒惟給事掃除之役其家法之嚴五也至永樂初狗兒諸奄稍稍見馬上之績後以倦勤朝事漸寄筆札久乃稱肺腑矣太監鄭和等以奉命率舟師下海中諸蠻而中人有出使者矣西北大將多洪武舊人意不能無疑思以腹心參之而中人有鎮守者矣王振時上春秋少不日接大臣而中人有票旨徑行者矣明史所載永樂五年六月內使李進往山西採天花詐傳詔旨擅役軍民此即弄權之漸仁宗即位凡差出內臣限十日內盡撤回京其見於詔書者有採寶石採金珠香貨採鐵黎木而太宗實録多諱之不書實録有十九年十一月辛酉遣內官楊寶二十年十月癸巳遣內官韋喬同御史察勘兩京及天下庫藏出納二事至洪熙元年六月宣宗即位而巡按浙江監察御史尹崇髙奏朝內近差內官內使市買諸物每物置局有拘集之擾有供應之煩朝廷所需甚微民間所費甚大宜皆取回惟令有司買納詔從之乃猶有如宣德六年十二月乙未所書管事袁琦假公務為名擅差內官內使陵虐官吏軍民逼取金銀等物以至磔死而其黨十餘人皆斬者嗚呼作法于涼其敝猶貪至於萬厯中年礦稅之使旁午四出而藉口於祖宗之成例則外廷之臣交章爭之而無可如何矣是以武王不泄邇中官典兵亦始於永樂仁宗實録言甘肅總兵官都督費瓛不能專斷軍政悉聽中官指使敕責其低睂俯首受制於人宣宗實録言交址左參政馮貴善用嘗得土軍五百人徑勇善戰貴撫肓甚厚每率之討賊所嚮成功後為中官馬騏奪去貴與賊戰不利遂死之宣德元年三月己亥敕責中官山壽曰叛賊黎利本一窮蹙小寇若早用心禽捕如探雀雛爾乃妄執已見再三陳奏惟事招撫以致養禍遺患及方政等進討爾擁官軍一千餘人坐守乂安不往來䇿應視其敗衄是則文址之失實本於中官而仁宣二宗亦但加之譙責而已王振之專土木之難此非其漸乎交址一事中官之惡實録不盡書景泰四年吏科給事中盧祥言臣思永樂年間克平交址設置郡縣蠻人服從後因鎮守內臣貪虐致失人心竟亡其地天下至今非議不已即此數言可以想見師之上六曰小人勿用必亂邦也豈不信夫成祖天威逺加無思不服遏密未幾遂棄交址齊桓首霸而寺人貂始漏師于多魚春秋已志之矣故姤之初六一隂始生而周公戒之正統九年正月辛未命成國公朱勇興安伯徐亨都督馬亮陳懷等統兵出境勦兀良哈三衛勇同太監僧保出喜峰口亨同太監曹吉祥出界嶺口亮同太監劉永誠出劉家口懷同太監但信出古北口是時王振擅權乃有此遣而後遂以為例至十四年陽和口之戰太監郭敬監軍諸將悉為所制師無紀律而宋謙朱冕全軍覆沒矣景泰元年閏正月乙卯工部辦事吏徐鎮言刑餘之人不侍君側太祖高皇帝懲漢唐之弊不令預政不令典兵但使之守門傳命而已邇者姦監王振乘機專政依勢作威王爵天憲悉出其口生殺豫奪任已愛憎又多引同類如郭敬等以為心腹出監邊事皇上臨御之初乞監前失宦官有參預朝政及監軍鎮守者悉令還內各守本職如此則宦官無召釁之端國祚有過厯之兆矣事寢不行六月乙酉陜西蘭縣舉人假堅論宦寺監軍之失庚子肅府儀衛司餘丁聊讓請禁抑宦寺三年九月辛卯南京錦衣衛鎮撫司軍匠餘丁蕭敏陳內官苦害軍民十事天順八年十一月丙寅兩京六科給事中王徽等言正統末年王振專權使先帝遠播宗社幾危天順年間曹吉祥專權舉兵焚闕欲危宗社今日牛玉專權謀出皇后欺侮陛下是皆貽笑於四方取議萬世者也臣請自今以後一不許內官與國政二不許外官與內官私相交結三不許內官弟姪在外管事并置立産業自古內官賢良者萬無一人無事之時似為謹愼一聞國政便作姦欺如聞陛下將用某人也必先賣之以為已功聞陛下將行某事也必先泄之以張已勢人望日歸威權日重而內官之禍起矣此臣等所以勸陛下不許內臣與聞國政者此也內官侍奉陛下朝夕在側文武大臣不知亷恥者多與之交結有饋以金寶珠玉加之婢膝奴顔者內官便以為賢朝夕在陛下前稱美之有正大不阿不行私謁者內官便以為不賢朝夕在陛下前非毁之陛下天縱聖明固不為惑日加浸潤未免致疑稱美者驟踰顯位非毁者久屈下僚怨歸朝廷恩結宦寺而內官之禍起矣臣等所以勸陛下不許外官與內官交結者此也內官弟姪人等授職任事倚勢為非聚姦養惡家人百數資貨萬餘田連千頃馬繫千匹內官因有此家産所以貪婪無厭姦弊多端身雖在內心實在外內外相通而禍亂所由起矣此臣等所以勸陛下不許內官弟姪在外管事并置立家産者此也陛下果能鑒彼三人於既往行此三事於方今則禍亂自然不作災害自然不生倘或不然則禍起蕭牆變生肘腋異日之患有不可言者矣然臣等今日之所言乃舉朝廷之所諱臣等雖愚亦知避禍但受恩朝廷無以為報官居言路不可茍容若陛下能行而不疑即臣等雖死而無悔矣上責徽等妄言要譽命吏部俱調州判官疏草李鈞筆也中都之變宦官僨事之前車也不一年而監守之遣四出以外廷無人甚也平隂之役夙沙衛殿殖綽曰子殿齊師國之辱也天子以此耻天下之士大夫而士大夫不以為耻且羣然攻之廷論雖譁上心弗信及暫撤之而士大夫又果不足用也於是乎再任宦者而國事已不可為昔者唐德宗即位疏斥宦官親任朝士而張涉以儒學入侍薛雍以文雅登朝繼以贓敗故宦官武將得以藉口曰南牙文臣贓動至巨萬而謂我曹濁亂天下豈非欺罔邪於是上心始疑不知所倚仗矣嗚呼吾不知今日之攻宦官者果愈於宦官乎內廷既不可用外廷亦遂無人而國事又將誰屬乎至於昭王歎息思良將之已亡武帝咨嗟慮名臣之欲盡而燎原靡撲過涉終亡可為痛哭者矣是以人材非一世之所能成古先王於多難之時而得賢臣之助者以其養之豫而儲之廣也傳曰詒厥孫謀以燕翼子子桑有焉夫有天下而為子孫之慮者則必在於人才矣金史完顔額爾克傳劉祁曰金人南渡之後近侍之權尤重蓋宣宗喜用其人以為耳目伺察百官故奉御輩採訪民間號行路御史或得一二事即入奏之上因責臺官漏泄皆抵罪又方面之柄雖委將帥又差一奉御在軍中號曰監戰每臨機應變多為所牽制遇敵輒先奔故師多喪敗哀宗因之不改終至亡國論曰夫以􅉏御治軍既掣之肘又信其讒以殺人失政刑矣唐之亡坐以近侍監軍金蹈其轍哀哉金時近侍非宦豎也以世胄或吏員為之見錫默愛實傳崇禎十四年十二月戊午上諭禮部并在內各監局等衙門官常典制內外攸分本職之外豈宜侵越我太祖高皇帝酌古式今獨嚴近習之防敕內官母預外事一時朝政清明法紀整肅拔本澄源意甚深遠朕鑒後追前凛持祖訓自今神宫等監及各司局庫等衙門或典禮繕戎或鳩工管鑰或司繕服或辦文書都著勤愼小心料理本等職業不許違越祖制干預在外政事違者即以亂政參拏處斬仍詳察舊典開列職掌具奏禮部右侍郎蔣德璟疏言周官內職不滿百人糾禁王宫掌於小宰古聖垂法下戒將來蓋其愼也天啓元年四月御史張捷疏言請令中官受考察於禮部定為五年一舉如京察例太祖高皇帝實詳監於往代而取𠂻焉其設內官也監司局庫各有定員秩不過四品俸不過一石而且糾劾有令交通有戒豫政典兵有禁謹內外之防杜假竊之漸至尚論漢唐已事而三致意焉淵哉天訓亘古不易矣雖二十五年曽遣太監聶慶童往諭陜西河州等衛所番族令其輸馬以茶給之然往諭屬番於軍民無與且不假事柄亦暫往即還終洪武之世無他特遣此所以致清明整肅之治而開萬世太平之基也乃若列聖纘承宫府之大防無改而時事偶異中外之任使間聞永樂中始有遣使外國及遣往甘肅巡視者洪熙中始有守備南京者正統中始有率兵討賊防邊及各省鎮守者景泰初始有分坐十營或稱監鎗者然仍聽尚書于謙等節制至正德中邊關始置內監且令提督禁兵內操分坐勇士四衛軍營益非祖宗之舊矣他如監工監器會同審録蘇杭織造𣙜稅開礦之遣皆利少害多亦旋設旋止操縱在握一時暫託權宜而事任遞遷易世每多釐正惟世宗肅皇帝毅然裁革獨斷於先我皇上剪除逆璫嫓美於後總之稟成於高皇帝訓諭內臣毋豫政事外臣毋行交結二語足括千古治亂之源矣臣等伏讀寶訓深遡詒謀不使有功自無竊柄之患嘗令畏法實杜亂政之階故委腹心則威福移寄耳目則羅織啓遵典章則職守自恪嚴內外則侵越不生此實鑒古酌今可以無敝而神孫聖祖於焉一揆者也謹遵聖諭備察舊章將各監局職掌著為令甲可考見者臚列上呈恭候聖明裁奪得旨申飭奄人之有祠堂自英宗之賜王振始也至魏忠賢則生而易祠且遍于天下矣故聖人戒乎作俑禁自宫實録成化元年七月丁巳直𨽻魏縣民李堂等十一名自宫以求進命執送錦衣衛獄罪之發南海子種菜祖宗以來凡閹割火者必俘獲之奴或罪極當死者出其死而生之蓋重絶人之世不忍以無罪之民受古肉刑也景泰以來乃有自宫以求進者朝廷雖暫罪之而終收以為用故近畿之民畏避繇役希覬富貴者倣效成風往往自戕其身及其子孫日赴禮部投進自是以後日積月纍千百成羣其為國之蠧害甚矣史臣劉吉等之辭餘冬序録曰永樂二十二年令凡自宫者以不孝論軍犯罪及本管頭目總小旗民犯罪及有司里老實録永樂十九年七月丁卯嚴自宫之禁犯者皆發充軍成化九年令私自淨身者本身處死家發邊遠充軍正統十二年天順二年成化九年節經申明𢎞治五年自淨身者本身并下手人俱處死全家充軍兩鄰及歇家不舉有司里老容隱者一體治罪其禁止乎未殘者法甚嚴也永樂二十三年仁宗即位興州左屯衛軍徐翼有子自宫入為內豎翼奏乞除軍籍上曰為父當教子為子當養親爾有子不能教自殘其體背親恩絶人道敗壞風化皆原於爾尚敢希除軍籍邪出其子使代軍役宣德二年令自淨身人軍民各還元伍籍不許投入王府及官勢家藏隱躲避差役若犯本身及匿藏家處死該管總小旗里老鄰佑一體治罪正統元年閏六月時軍民多自宫希進間有以赦而獲免罪者刑部請依舊制不論赦前赦後俱論以不孝重罪從之成化十一年二月順天府永清縣民徐義自宫其幼子以求進詔發充廣西南丹衛軍妻及幼子皆隨往十五年淨身人令巡城御史錦衣衛督逐回籍𢎞治元年令錦衣衛拘送順天府遞發元管官司點閘知在不許容縱十三年令先年淨身人曽經發遣不候收取私自來京圖謀進用者問發邊遠充軍其戒約於巳殘者法亦非不至也而貂璫滿朝金玉塞塗至明末而益盛然則法果行乎宋仁宗未有繼嗣太常博士吳及上言古之明王重絶人之世今宦官之家競求他子勦絶人理以希爵命童幼何罪陷於刀鋸有因而夭死者夫有疾而夭治世所矜況無疾乎有罪而宫前王不忍況無罪乎臣聞漢永平之際中常侍四員小黃門十人爾唐太宗定制無得踰百員今以祖宗時較之當日宦官幾何人今幾何人臣愚以為胎卵刳傷鳯凰不至繼嗣未育殆繇於此伏願濬發德音詳為條禁權罷宦官進獻有擅宫童幼置以重法若然則天心必應繼嗣必廣召福祥安宗廟之䇿無先此者帝異其言權罷內臣進養子日知録卷九
