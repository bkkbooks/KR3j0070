body:
  text: 日知録卷七崑山顧炎武撰孝弟為仁之本堯舜之道孝弟而已矣是故克明俊德以親九族九族既睦平章百姓百姓昭明協和萬邦黎民於變時雍此之謂孝弟為仁之本察其所安求仁而得仁安之也不怨天不尤人下學而上達安之也使非所安則擇乎中庸而不能期月守也子張問十世記曰聖人南面而治天下必自人道始矣立權度量考文章改正朔易服色殊徽號異器械别衣服此其所得與民變革者也其不可得變革者則有矣親親也尊尊也長長也男女有别此其不可得與民變革者也自春秋之并為七國七國之并為秦而大變先王之禮然其所以辨上下别親疏決嫌疑定是非則固未嘗有異乎三王也故曰其或繼周者雖百世可知也自古帝王相傳之統至秦而大變然而秦之所以亡漢之所以興則亦不待讖緯而識之矣不仁而得天下未之有也此百世可知者也保民而王莫之能禦也此百世可知者也媚奧奧何神哉如祀竈則迎尸而祭於奧此即竈之神矣詩于以奠之宗室牖下注牖下室西南隅所謂奧也李氏曰户東而牖西户不當中而近東則西南隅最為深隱故謂之奧而祭祀及尊者常處焉奧曲禮為人子者居不主奧仲尼燕居以奧阼並言是本人之所處祭時乃奉神於此時人之語謂媚其君者將順於朝廷之上不若逢迎於燕退之時也注以奧比君以竈比權臣本一神也析而二之未合語意武未盡善觀於季札論文王之樂以為美哉猶有憾則知夫子謂武未盡善之旨矣猶未洽於天下孟子此文之猶有憾也天下未寧而崩史記封禪書此武之未盡善也記曰樂者象成者也又曰移風昜俗莫善於樂武王當日誅討伐奄三年討其君而寶龜之命曰有大艱于西土殷之頑民迪屢不靜商俗靡靡利口惟賢餘風未殄視舜之從欲以治四方風動者何如哉故大武之樂雖作於周公而未至於世變風移之日聖人之時也非人力之所能為矣劉汝佳曰揖讓征誅自是聖人所遇使舜當武之時亦須征伐孔子曰唐虞禪夏后殷周繼其義一也性之反之自其從入之異及其成功一也人而天反而性矣以是而論樂之優劣其與以追蠡者何異哉朝聞道夕死可矣有弗學學之弗能弗措也有弗問問之弗知弗措也有弗思思之弗得弗措也有弗辨辨之弗明弗措也有弗行行之弗篤弗措也不知年數之不足也俯焉日有孶孶斃而後已故曰朝聞道夕死可矣吾見其進也未見其止也有一日未死之身則有一日未聞之道忠恕延平先生答問門人朱熹元晦編曰夫子之道不離乎日用之間自其盡己而言則謂之忠自其及物而言則謂之恕莫非大道之全體雖變化萬殊於事為之末而所以貫之者未嘗不一也曽子答門人之問正是發其心爾豈有二邪若以為夫子一以貫之之㫖甚精微非門人所可告姑以忠恕答之恐聖賢之心不若是之支也如孟子言堯舜之道孝弟而已矣人皆足以知之但合內外之道使之體用一原顯微無間則非聖人不能爾朱子又嘗作忠恕說其大指與此略同按此說甚明而集注乃謂借學者盡己推己之目以著明之是疑忠恕為下學之事不足以言聖人之道也然則是二之非一之也慈溪黃氏曰天下之理無所不在而人之未能以貫通者己私間之也盡己之謂忠推己及人之謂恕忠恕既盡己私乃克此理所在斯能貫通故忠恕者所以能一以貫之者也元戴侗作六書故其訓忠曰盡己致至之謂忠語曰為人謀而不忠乎又曰言思忠記曰喪禮忠之至也又曰祀之忠也如見親之所愛如欲色然又曰瑕不掩瑜瑜不掩瑕忠也傳曰上思利民忠也又曰小大之獄雖不能察必以情忠之屬也孟子曰自反而仁矣自反而有禮矣其橫逆由是也君子必自反也我必不忠觀於此數者可以知忠之義矣反身而誠然後能忠能忠矣然後由己推而達之家國天下其道一也其訓恕曰推己及物之謂恕己欲立而立人己欲達而達人施諸己而不願亦勿施於人恕之道也充是心以往達乎四海矣故曰夫子之道忠恕而已矣忠也者天下之大本也恕也者天下之達道也本程子子貢問曰有一言而可以終身行之者乎子曰其恕乎仲弓問仁夫子告之亦以敬恕夫聖人者何以異於人哉知終身可行則知一以貫之之義矣中庸記夫子言君子之道四無非忠恕之事而乾九二之龍德亦惟曰庸言之信庸行之謹然則忠恕君子之道也何以言違道不遠曰此猶之云巧言令色鮮矣仁也古人語辭云爾獸違道不遠即道也違禽獸不遠即禽也孟子已自申之豈可以此而疑忠恕之有二乎或曰孟子言強恕而行求仁莫近焉何也曰此為未至乎道者言之也孟子曰由仁義行非行仁義也仁義豈有二乎今人謂有聖人之忠恕有學者之忠恕非也盡得忠恕方是聖人學者所以學為忠恕夫子之言性與天道夫子之教人文行忠信而性與天道在其中矣故曰不可得而聞子曰二三子以我為隱乎吾無隱乎爾吾無行而不與二三子者是丘也謂夫子之言性與天道不可得而聞是疑其有隱者也不知夫子之文章無非夫子之言性與天道所謂吾無行而不與二三子者是丘也子貢之意猶以文章與性與天道為二故曰子如不言則小子何述焉子曰天何言哉四時行焉百物生焉天何言哉是故可仕可止可久可速無一而非天也恂恂便便侃侃誾誾無一而非天也動容周旋中禮者盛德之至也孟子以為堯舜性之之事夫子之文章莫大乎春秋春秋之義尊天王攘戎翟誅亂臣賊子皆性也皆天道也故胡氏以春秋為聖人性命之文而子如不言則小子其何述乎今人但以繫辭為夫子言性與天道之書愚嘗三復其文如鳴鶴在隂七爻自天祐之一爻憧憧往來十一爻履德之基也九卦所以教人學易者無不在於言行之間矣故曰初率其辭而揆其方既有典常茍非其人道不虛行樊遲問仁子曰居處恭執事敬與人忠司馬牛問仁子曰仁者其言也訒由是而充之一日克己復禮有異道乎今之君子學未及乎樊遲司馬牛而欲其說之高於顔曽二子是以終日言性與天道而不自知其墮於禪學也朱子曰聖人教人不過孝弟忠信持守誦習之間此是下學之本今之學者以為鈍根不足留意其平居道說無非子貢所謂不可得而聞者又曰近日學者病在好髙論語未問學而時習便說一貫孟子未言梁惠王問利便說盡心易未看六十四卦便讀繫辭此皆躐等之病又曰聖賢立言本自平易今推之使髙鑿之使深黃氏日鈔曰夫子述六經後來者溺於訓詁未害也濓洛言道學後來者借以談禪則其害深矣孔門弟子不過四科自宋以下之為學者則有五科曰語録科永嘉南渡本於清談之流禍人人知之孰知明代之清談有甚於前代者昔之清談談老莊明之清談談孔孟未得其精而已遺其粗未究其本而先辭其末不習六藝之文不考百王之典不綜當代之務舉夫子論學論政之大端一切不問而曰一貫曰無言以明心見性之空言代修己治人之實學股肱惰而萬事荒爪牙亡而四國亂神州蕩覆宗社丘墟昔王衍妙善𤣥言自比子貢及為石勒所殺將死顧而言曰嗚呼吾曹雖不如古人向若不祖尚浮虛勠力以匡天下猶可不至今日今之君子得不有愧乎其言變齊變魯變魯而至於道者道之以德齊之以禮變齊而至於魯者道之以政齊之以刑博學於文君子博學於文自身而至於家國天下制之為度數發之為音容莫非文也品節斯斯之謂禮孔子曰伯母叔母疏衰踊不絶地姑姊妹之大功踊絶於地知此者由文矣哉由文矣哉記曰三年之喪人道之至文者也又曰禮減而進以進為文樂盈而反以反為文傳曰文明以止人文也觀乎人文以化成天下故曰文王既沒文不在兹乎而諡法經緯天地曰文與弟子之學詩書六藝之文有深淺之不同矣三以天下讓皇矣之詩曰帝作邦作對自太伯王季則泰伯之時周日以彊大矣乃託之采藥往而不反當其時以國讓也而自後日言之則以天下讓也猶南宫適謂稷躬稼而有天下當其時讓王季也而自後日言之則讓於文王武王也有天下者在三世之後而讓之者在三世之前宗祧不記其功彛鼎不銘其迹此所謂三以天下讓民無得而稱焉者也路史曰方太王時以與王季而王季以與文王文王以與武王皆泰伯啓之也故曰三讓鄭康成注曰泰伯周太王之長子次子仲雍次子季歷太王見季歷賢又生文王有聖人表故欲立之而未有命太王疾泰伯因適吳越采藥太王殁而不反季歷為喪主一讓也季歷赴之不來奔喪二讓也免喪之後遂斷髮文身三讓也三讓之美皆隱蔽不著故人無得而稱也泰伯去而王季立王季立而文武興雖謂之以天下讓可矣太史公序吳世家云太伯避歷江蠻是適文武攸興古公王迹甚當高泰伯之讓國者不妨王季詩之言因心則㕛是也述文王之事君者不害武王詩之言上帝臨女是也古人之能言如此今將稱泰伯之德而先以莽操之志加諸太王豈夫子立言之意哉朱子作論語或問不取翦商之說而蔡仲默傳書武成曰大王雖未始有翦商之志而始得民心王業之成實基於此仲默朱子之門人可謂善於匡朱子之失者矣或問曰太王有廢長立少之意非禮也泰伯又探其邪志而成之至於父死不赴傷毁髮膚皆非賢者之事就使必於讓國而為之則亦過而不合於中庸之德矣其為至德何耶曰太王之欲立賢子聖孫為其道足以濟天下而非有愛憎之間利欲之私也是以泰伯去之而不為狷王季受之而不為貪父死不赴傷毁髮膚而不為不孝蓋處君臣父子之變而不失乎中庸此所以為至德也其與魯隱公吳季子之事蓋不同矣此說本之伊川先生有婦人焉豫有亂臣十人同心同德此陳師誓衆之言所謂十人皆身在戎行者而太姒邑姜自在宫壼之內必不從軍旅之事亦必不并數之以足十臣之數也古人有言曰牝雞無晨牝雞之晨惟家之索方且以用婦人為紂罪矣乃周之功業必藉於婦人乎此理之不可通或文字傳寫之誤漢博士孔衍言臣祖安國得璧中古人論語為改今文闕疑可也書大誥爽邦由哲亦惟十人迪知上帝命蔡氏亦以為亂臣十人季路問事鬼神未能事人焉能事鬼左右就養無方故其祭也洋洋乎如在其上如在其左右未知生焉知死人之生也直故其死也無求生以害仁有殺身以成仁天地有正氣雜然賦流形下則為河嶽上則為日星文信公正氣歌可以謂之知生矣孔曰成仁孟曰取義而今而後庶幾無愧衣𢃄贊可以謂之知死矣不踐迹服堯之服誦堯之言行堯之行所謂踐迹也先王之教若說命所謂學于古訓康誥所謂紹聞衣德言以至於詩書六藝之文三百三千之則有一非踐迹者乎善人者忠信而未學禮篤實而未日新雖其天資之美亦能暗與道合而足已不學無自以入聖人之室矣治天下者亦然故曰周監於二代郁郁乎文哉不然則以漢文之幾致刑措而不能成三代之治矣異乎三子者之撰夫子如或知爾之言吾非斯人之徒與而誰與也曽㸃浴沂詠歸之言素貧賤行乎貧賤君子無入而不自得也故曰異乎三子者之撰去兵去食乃積乃倉乃裹餱糧于橐于囊國所以足食而不待豳土之行也備乃弓矢煆乃戈矛礪乃鋒刃無敢不善國所以足兵而不待淮夷之役也茍其事變之來而有所不及備則耰鉏白梃可以為兵而不可闕食以修兵矣糠核草根可以為食而不可棄信以求食矣古之人有至於張空弮羅雀鼠而民無二志者非上之信有以結其心乎此又權於緩急輕重之間而為不得已之計也明此義則國君死社稷大夫死宗廟至於輿臺牧圉之賤莫不親其上死其長所謂聖人有金城者此物此志也豈非為政之要道乎孟子言制梃以撻秦楚亦是可以無待於兵之意古之言兵非今日之兵謂五兵也故曰天生五材誰能去兵世本蚩尤以金作兵一弓二殳三矛四戈五㦸周禮司右五兵注引司馬法曰弓矢圍殳矛守戈㦸助是也詰爾戎兵詰此兵也踊躍用兵用此兵也無以鑄兵左氏僖公十八年傳鑄此兵也秦漢以下始謂執兵之人為兵如信陵君得選兵八萬人項羽將諸侯兵三十餘萬見於太史公之書而五經無此語也以執兵之人為兵猶之以被甲之士為甲公羊傳桓公使高子將南陽之甲立僖公而城魯閔公二年晉趙鞅取晉陽之甲以逐荀寅與士吉射哀公十三年奡蕩舟竹書紀年帝相二十七年澆伐斟鄩大戰于濰覆其舟滅之楚辭天問覆舟斟鄩何道取之正此謂也漢時竹書未出故孔安國注為陸地行舟而後人因之王逸注天問謂滅斟鄩氏奄若覆舟亦以不見竹書而强為之說古人以左右衝殺為蕩陳宋書顔師伯傳單騎出蕩孔覬傳每戰以刀楯直蕩其鋭卒謂之跳蕩别帥謂之蕩主陳書高祖紀蕩主戴晃徐宣等後周書侯莫陳崇傳王勇傳有直蕩都督楊紹傳有直蕩別將晉書載紀隴上健兒歌曰丈八蛇矛左右盤十蕩十決無當前唐書百官志矢石未交陷堅突衆敵因而敗者曰跳蕩蕩舟蓋兼此義與蔡姬之乘舟蕩公者不同左傳僖公三年管仲不死子糾君臣之分所關者在一身華裔之防所繫者在天下故夫子之於管仲略其不死子糾之罪而取其一匡九合之功蓋權衡於大小之間而以天下為心也夫以君臣之分猶不敵華裔之防而春秋之志可知矣有謂管仲之於子糾未成為君臣者子糾於齊未成君於仲與忽則成為君臣矣狐突之子毛及偃從文公在秦而曰今臣之子名在重耳有年數矣漢晉巳下太子諸王與其臣皆定君臣之分蓋自古相傳如此若毛偃為重耳之臣而仲與忽不得為糾之臣是以成敗定君臣也可乎又謂桓兄糾弟此亦强為之說論至於尊周室存華夏之大功則公子與其臣區區一身之名分小矣雖然其君臣之分故在也遂謂之無罪非也豫一以貫之好古敏求多見而識夫子之所自道也然有進乎是者六爻之義至賾也而曰知者觀其彖辭則思過半矣三百之詩至泛也而曰一言以蔽之曰思無邪三千三百之儀至多也而曰禮與其奢也寧儉十世之事至逺也而曰殷因於夏禮周因於殷禮雖百世可知百王之制至殊也而曰道二仁與不仁而已矣此所謂豫一以貫之者也其教門人也必先叩其兩端而使之以三隅反故顔子則聞一以知十而子貢切磋之言子夏禮後之問則皆善其可與言詩豈非天下之理殊塗而同歸大人之學舉本以該末乎彼章句之士既不足以觀其㑹通而高明之君子又或語德性而遺問學均失聖人之指矣君子疾沒世而名不稱焉疾名之不稱則必求其實矣君子豈有務名之心哉是以乾初九之傳曰不易乎世不成乎名古人求沒世之名今人求當世之名吾自幼及老見人所以求當世之名者無非為利也名之所在則利歸之故求之惟恐不及也茍不求利亦何慕名性相近也性之一字始見於商書曰惟皇上帝降衷于下民若有恆性恆即相近之義相近近於善也相逺逺於善也故夫子曰人之生也直罔之生也幸而免人之生也直即孟子所謂性善人亦有生而不善者如楚子良生子越椒子文知其必滅若敖氏是也然此千萬中之一耳故公都子所述之三說孟子不斥其非而但曰乃若其情則可以為善矣乃所謂善也蓋凡人之所大同而不論其變也若紂為炮烙之刑盜跖日殺不辜肝人之肉此則生而性與人殊亦如五官百骸人之所同然亦有生而不具者豈可以一而槩萬乎故終謂之性善也孟子論性專以其發見乎情者言之且如見孺子入井亦有不憐者呼蹴之食有笑而受之者此人情之變也若反從而喜之吾知其無是人也曲沃衛嵩曰孔子所謂相近即以性善而言若性有善有不善其可謂之相近乎如堯舜性者也湯武反之也若湯武之性不善安能反之以至於堯舜邪湯武可以反之即性善之說湯武之不即為堯舜而必待於反之即性相近之說也孔孟之言一也虞仲史記太伯之奔荆蠻自號句吳荆蠻義之從而歸之千餘家立為吳太伯太伯卒無子弟仲雍立是為吳仲雍仲雍卒子季簡立季簡卒子叔達立叔達卒子周章立是時周武王克殷求太伯仲雍之後得周章周章已君矣因而封之乃封周章弟虞仲於周之北故夏墟是為虞仲列為諸侯按此則仲雍為吳仲雍而虞仲者仲雍之曽孫也殷時諸侯有虞國詩所云虞芮質厥成者武王時國滅而封周章之弟於其故墟乃有虞仲之名耳論語逸民虞仲夷逸左傳太伯虞仲太王之昭也即謂仲雍為虞仲是祖孫同號且仲雍君吳不當言虞古吳虞二字多通用史記趙世家吳廣內其女孟姚索隱曰古虞吳音相近故舜後亦姓吳詩不吳不敖漢書武帝紀引作不虞不驁衛尉衡方碑辭引不吳不揚作不虞不揚釋名吳虞也公羊傳定公四年晉士鞅衛孔圄帥師代鮮虞虞本或作吳石鼓文有吳人注曰虞人也水經注吳山在汧縣西古之汧山也國語所謂虞矣楊用修曰吳古虞字省文如呼之省為乎樝之省為柤也今崑山有浦名大虞小虞俗謂之大吳小吳竊疑二書所稱虞仲並是吳仲之誤又考吳越春秋太伯曰其當有封者吳仲也則仲雍之稱吳仲固有徴矣漢書地理志河東郡太陽吳山在西上有吳城史記秦本紀昭襄王五十三年伐魏取吳城周武王封太伯後於此吳祖太伯故曰太伯後是為虞公後漢郡國志太陽有吳山上有虞城水經注亦作虞城虞城之書為吳城猶吳仲之書為虞仲也杜元凱左氏注亦曰仲雍支子别封西吳聽其言也厲君子之言非有意於厲也是曰是非曰非孔頴達洪範正義曰言之決斷若金之斬割居官則告諭可以當鞭朴行師則誓戒可以當甲兵此之謂聼其言也厲有始有卒者其惟聖人乎聖人之道未有不始於灑掃應對進退者也故曰約之以禮又曰知崇禮卑梁惠王史記魏世家惠王三十六年卒子襄王立襄王元年與諸侯㑹徐州相王也追尊父惠王為王而孟子書其對惠王無不稱之為王者則非追尊之辭明矣司馬子長亦知其不通而改之曰君通鑑改孟子作君何必曰利亦以此然孟子之書出於當時不容誤也杜預左傳集解後序言哀王於史記襄王之子惠王之孫也惠王三十六年卒而襄王立立十六年卒而哀王立古書紀年篇惠王三十六年改元從一年始至十六年而稱惠成王卒即惠王也疑史記誤分惠成之世以為後王年也哀王二十三年乃卒故特不稱諡謂之今王作書時未卒故謂之今王今按惠王即位三十六年稱王改元又十六年卒而子襄王立即紀年所謂今王無哀王也襄哀字相近史記分為二人誤耳秦本紀秦惠文王十四年更為元年此稱王改元之證又與魏惠王同時魏世家襄王五年豫秦河西之地七年魏盡入上郡於秦今按孟子書惠王自言西喪地於秦七百里乃悟史記所書襄王之年即惠王之後五年後七年也以孟子證之而自明者也据紀年周慎靚王之二年而魏惠王卒其明年為魏襄王之元年又二年燕王噲讓國於其相子之又二年為赧王之元年齊人伐燕取之又二年燕人畔與孟子之書先梁後齊其事皆合然孟子在二國皆不久書中齊事特多又嘗為卿於齊當有四五年若適梁乃惠王之末而襄王立即行故梁事不多謂孟子以惠王之三十五年至梁者誤以惠王之後元年為襄王之元年故也史記及孟子序說謂梁惠王之三十五年孟子至梁其後二十三年齊人伐燕而孟子在齊者非衛嵩曰孟子遊歷先後雖不可考以本書證之當時自宋歸鄒由鄒之任之薛之滕而後之梁之齊孟子為卿於齊其於梁則客也故見齊王稱臣見梁王不稱臣未有義而後其君者也不遺親不後君仁之效也其言義何義者禮之所從生也昔者齊景公有感於晏子之言而懼其國之為陳氏也曰是可若何對曰惟禮可以巳之在禮家施不及國民不遷農不移工賈不變士不濫官不滔大夫不收公利又曰君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聼禮也君令而不違臣共而不二父慈而教子孝而針兄愛而㕛弟敬而順夫和而義妻柔而正姑慈而從婦聼而婉禮之善物也晉侯謂女叔齊曰魯侯不亦善於禮乎對曰禮所以守其國行其政令無失其民者也今政令在家不能取也有子家羈弗能用也公室四分民食於他思莫在公不圗其終為國君難將及身不恤其所禮之本末將於此乎在而屑屑焉習儀以亟言善於禮不亦逺乎子曰君子之道辟則坊與坊民之所不足者也大為之坊民猶踰之故君子禮以坊德刑以坊淫命以坊欲古之明王所以禁邪於未形使民日遷善逺罪而不自知者是必有其道矣不動心凡人之動心與否固在其加卿相行道之時也枉道事人曲學阿世皆從此而始矣我四十不動心者不動其行一不義殺一不辜而得天下有不為也之心市朝若撻之於市朝即書所言若撻于市古者朝無撻人之事市則有之周禮司市市刑小刑憲罰中刑徇罰大刑撲罰又曰胥執鞭度而巡其前掌其坐作出入之禁令凡有罪者撻戮而罰之是也禮記檀弓遇諸市朝不反兵而鬪兵器非可入朝之物奔喪哭辟市朝奔喪亦但過市無過朝之事也其謂之市朝者史記孟嘗君傳日莫之後過市朝者掉臂不顧索隱曰言市之行列有如朝位故曰市朝古人能以衆整如此司市以次敘分地而經市注敘肆行列也後代則朝列之參差有反不如市肆者矣必有事焉而勿正心倪文節思謂當作必有事焉而勿忘勿忘勿助長也傳寫之誤以忘字作正心二字言養浩然之氣必當有事而勿忘既巳勿忘又當勿助長也疊二勿忘作文法也按書無逸篇曰自時厥後立王生則逸生則逸不知稼穡之艱難亦是疊一句而文愈有致今人發言亦多有重說一句者禮記祭義見間以俠甒鄭氏曰見間當為覸史記蔡澤傳吾持梁刺齒肥索隱曰刺齒肥當為齧肥論語五十以學易朱子以為五十當作卒此皆古書一字誤為二字之證文王以百里湯以七十里文王以百里孟子為此言以證王之不待大爾其實文王之國不止百里周自王季伐諸戎疆土日大文王自岐遷豐其國已跨三四百里之地伐崇伐密自河以西舉屬之周未克商以前無滅國者但臣屬而已至於武王而西及梁益庸蜀羌髳微盧彭濮東臨上黨戡黎無非周地紂之所有不過河內殷墟其從之者亦但東方諸國而已一舉而克商宜其如振槁也書之言文王曰大邦畏其力文王何嘗不藉力哉廛無夫里之布有夫布有里布周禮地官載師職曰凡宅不毛者有里布凡田不耕者出屋粟凡民無職事者出夫家之征閭師職曰凡無職者出夫布鄭司農云里布者布參印書廣二寸長二尺以為幣貿昜物詩云抱布貿絲抱此布也或曰布泉也春秋傳曰買之百兩一布昭公二十六年又廛人職掌斂市之絘布總布質布罰布廛布𤣥謂宅不毛者罰以一里二十五家之泉集注未引閭師文今人遂以布專屬於里孟子自齊葬於魯孟子自齊葬於魯言葬而不言喪此改葬也禮改葬緦事畢而除故反於齊止於嬴而充虞乃得承間而問若曰奔喪而還營葬方畢即出赴齊卿之位而門人未得發言可謂三月無君則皇皇如也而身且不行三年之喪何以教滕世子哉其實皆什一也古來田賦之制實始於禹水土既平咸則三壤後之王者不過因其成蹟而已故詩曰信彼南山維禹甸之畇畇原隰曽孫田之我疆我理南東其畝然則周之疆理猶禹之遺法也周禮小司徒注昔夏少康在虞思有田一成有衆一旅一旅之衆而田一成則井牧之法先古然矣孔氏信南山正義引此則曰丘甸之法禹之所為孟子乃曰夏后氏五十而貢殷人七十而助周人百畝而徹夫井田之制一井之地畫為九區故蘇洵謂萬夫之地蓋三十二里有半而其間為川為路者一為澮為道者九為洫為涂者百為溝為畛者千為遂為徑者萬使夏必五十殷必七十周必百則是一王之興必將改畛涂變溝洫移道路以就之為此煩擾而無益於民之事也豈其然乎周官遂人凡治野夫間有遂遂上有徑十夫為溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路以達於畿夫子言禹盡力乎溝洫而禹之自言亦曰濬畎澮距川知其制不始於周矣蓋三代取民之異在乎貢助徹而不在乎五十七十百畝其五十七十百畝特丈尺之不同而田未嘗易也故曰其實皆什一也古之王者必改正朔易服色異度數故史記秦始皇本紀於改年十月朔上黑之下即曰數以六為紀符法冠皆六寸而輿六尺六尺為步乘六馬三代之王其更制改物亦大抵如此故王制曰古者以周尺八尺為步今以周尺六尺四寸為步而當日因時制宜之法亦有可言夏時土曠人稀故其畝特大殷周土易人多故其畝漸小以夏之一畝為二畝其名殊而實一矣國佐之對魯人曰先王疆理天下物土之宜而布其利豈有三代之王而為是紛紛無益於民之事哉莊嶽引而置之莊嶽之間注莊嶽齊街里名也莊是街名嶽是里名左傳襄二十八年得慶氏之木百車於莊注云六軌之道昭十年又敗諸莊哀六年戰于莊敗注並同反陳于嶽注云嶽里名古者不為臣不見觀夫孔子之見陽貨而後知踰垣閉門為賢者之過未合於中道也然後世之人必有如胡廣被中庸之名馮道託仲尼之迹者矣其始也屈己以見諸侯一見諸侯而懷其祿利於是望塵而拜貴人希㫖以投時好此其所必至者曾子子路之言所以為末流戒也故曰君子上交不諂又曰上弗援下弗推後世之於士人許之以自媒勸之以干祿而責其有恥難矣公行子有子之喪禮父為長子斬衰三年故公行子有子之喪而孟子與右師及齊之諸臣皆往弔為不順於父母虞書所載帝曰豫聞如何嶽曰瞽子父頑母嚚象傲克諧以孝蒸蒸乂不格姦是則帝之舉舜在瞽瞍底豫之後今孟子乃謂九男二女百官牛羊倉廩備以事舜於畎畝之中猶不順於父母而如窮人無所歸此非事實但其推見聖人之心若此使天下之為人子者處心積慮必出乎此而後為大孝耳與答桃應之問同後儒以為實然則二嫂使治朕棲之說亦可信矣象封有庳舜都蒲阪而封象於道州鼻亭水經注王隱曰應陽縣本泉陵之北部東五里有鼻墟象所封也山下有象廟後漢書東平王蒼傳注有鼻國名在今永州營道縣北袁談傳注今猶謂之鼻亭在三苖以南荒服之地誠為可疑如孟子所論親之欲其貴愛之欲其富又且欲其源源而來何以不在中原近畿之處而置之三千餘里之外邪蓋上古諸侯之封萬國其時中原之地必無閒土可以封故也又考太公之於周其功亦大矣而僅封營丘營丘在今昌樂濰二縣界史言其地瀉鹵人民寡而孟子言其儉於百里又萊夷逼處而與之爭國夫尊為尚父親為后父功為元臣而封止於此豈非中原之地無閒土故至薄姑氏之滅而後乃封太公邪周時滅一國乃封一國左傳成王滅唐而封太叔焉是也竹書紀年武王十六年秋王師滅蒲姑或曰禹封在陽翟稷封在武功何與二臣者有安天下之大功舜固不得以介弟而先之也故象之封於逺聖人之不得已也漢高祖封劉仲為代王乃是棄其兄於邉陲近寇之地與舜之封象異矣周室班爵祿為民而立之君故班爵之意天子與公侯伯子男一也而非絶世之貴代耕而賦之祿故班祿之意君卿大夫士與庶人在官一也而非無事之食黃氏日鈔讀王制曰必本於上農夫者示祿出於農等而上之皆以代耕者也是故知天子一位之義而不敢肆於民上以自尊知祿以代耕之義則不敢厚取於民以自奉不明于此而侮奪人之君常多於三代之下矣費惠公孟子費惠公注惠公費邑之君按春秋時有兩費其一見左傳成公十三年晉侯使吕相絶秦曰珍滅我費滑注滑國都於費今河南緱氏縣莊公十六年滑伯注同昭公二十六年王次于滑注滑周地本鄭邑襄公十八年楚蒍子馮公子格率鋭師侵費滑蓋本一地秦滅之而後屬晉耳女叔侯對平公曰虞虢焦滑霍揚韓魏皆姬姓也晉是以大其一僖公元年公賜季㕛汶陽之田及費齊乘費城在費縣西北二十里魯季氏邑漢梁相費泛碑云其先季㕛為魯大夫有功封費因以為姓按隱公元年已有費伯即費庈父在子思時滑國之費其亡久矣疑即季氏之後而僭稱公者魯連子稱陸子謂齊湣王曰魯費之衆臣甲舍于襄賁而楚人對頃襄王有鄒費郯邳殆所謂泗上十二諸侯者邪仁山金氏曰費本魯季氏之私邑而孟子稱小國之君曾子書亦有費君費子之稱蓋季氏專魯而自春秋以後計必自據其邑如附庸之國矣大夫之為諸侯不待三晉而始然其來亦漸矣季氏之於魯但出君而不敢立君但分國而不敢篡位愈於晉衛多矣故曰魯猶秉周禮行吾敬故謂之內也先王治天下之具五典五禮五服五刑其出乎身加乎民者莫不本之於心以為之裁制親親之殺尊賢之等禮所生也故孟子答公都子言義而舉酌鄉人敬尸二事皆禮之用也而莫非義之所宜自此道不明而二氏空虛之教至於捶提仁義絶滅禮樂從此起矣自宋以下一二賢智之徒病漢人訓詁之學得其粗迹務矯之以歸於內而達道達德九經三重之事置之不論此真所謂告子未嘗知義者也其不流於異端而害吾道者幾希董子曰宜在我者而後可以稱義故言義者合我與宜以為一言以此操之義之言我也義字從我兼聲與意此與孟子之言相發以紂為兄之子以紂為弟且以為君而有微子啓以紂為兄之子且以為君而有王子比干並言之則於文有所不便故舉此以該彼此古人文章之善且如郊社之禮所以事上帝也不言后土地道無成而代有終也不言臣妻先王居檮杌於四裔不言渾敦窮竒叨餮後之讀書者不待子貢之明亦當聞一以知二矣才人固有為不善之才而非其性也性者天命之才者亦天降之下章言天之降才是以禽獸之人謂之未嘗有才中庸言能盡其性孟子言不能盡其才能盡其才則能盡其性矣在乎擴而充之求其放心學問之道無他求其放心而已矣然則但求放心可不必於學問乎與孔子之言吾嘗終日不食終夜不寢以思無益不如學也者何其不同邪他日又曰君子以仁存心以禮存心是所存者非空虛之心也夫仁與禮未有不學問而能明者也孟子之意蓋曰能求放心然後可以學問使奕秋誨二人奕其一人專心致志惟奕秋之為聼一人雖聼之一心以為有鴻鵠將至思援弓繳而射之雖與之俱學弗若之矣此放心而不知求者也然但知求放心而未嘗窮中罫之方悉雁行之勢馬融圍棊賦亦必不能從事於奕所去三免死而已矣則亦不久而去矣故曰所去三自視欿然人之為學不可自小又不可自大得百里之地而君之皆足以朝諸侯有天下不敢自小也附之以韓魏之家如其自視欿然則過人逺矣不敢自大也豫將以斯道覺斯民也思天下之民匹夫匹婦有不被堯舜之澤者若己推而內之溝中則可謂不自小矣自耕稼陶漁以至為帝無非取於人者則可謂不自大矣故自小小也自大亦小也今之學者非自小則自大吾見其同為小人之歸而已士何事士農工商謂之四民其說始於管子穀梁成公元年傳亦云三代之時民之秀者乃收之鄉序升之司徒而謂之士固千百之中不得一焉大宰以九職任萬民五曰百工化飭八材計亦無多人爾武王作酒誥之書曰妹土嗣爾股肱純其藝黍稷奔走事厥考厥長此謂農也肇牽車牛逺服賈用孝養厥父母此謂商也又曰庶士有正越庶伯君子其爾典聼朕教則謂之士者大抵皆有職之人矣惡有所謂羣萃而州處四民各自為鄉之法哉春秋以後游士日多齊語言桓公為游士八十人奉以車馬衣裘多其資幣使周游四方以號召天下之賢士而戰國之君遂以士為輕重文者為儒武者為俠嗚呼游士興而先王之法壞矣彭更之言王子墊之問其猶近古之意與飯糗茹草享天下之大福者必先天下之大勞宅天下之至貴者必執天下之至賤是以殷王小乙使其子武丁舊勞于外知小人之依而周之后妃亦必服浣濯之衣修煩縟之事及周公遭變陳后稷先公王業之所由者則皆農夫女工衣食之務也于寶晉紀論古先王之教能事人而後能使人其心不敢失於一物之細而後可以勝天下之大舜之聖也而飯糗茹草禹之聖也而手足胼胝面目黧黑此其所以道濟天下而為萬世帝王之祖也况乎其不如舜禹者乎朱子語類言舜之耕稼陶漁夫子之釣弋子路之負米子貢之埋馬皆賤者之事而古人不辟也有若三踊於魯大夫之庭冉有用矛以入齊軍而樊須雖少能用命此執干戈以衛社稷而古人所不辭也後世驕侈日甚反以臣子之職為恥孟子外篇史記伍被對淮南王安引孟子曰紂貴為天子死曽不若匹夫揚子法言修身篇引孟子曰夫有意而不知者有矣未有無意而至者也桓寬鹽鐡論引孟子曰吾於河廣知德之至也又引孟子曰堯舜之道非逺人也人不思之爾周禮大行人注引孟子曰諸侯有王宋鮑照河清頌引孟子曰千載一聖猶旦暮也顔氏家訓引孟子曰圖影失形梁書處士傳序引孟子曰今人之於爵祿得之若其生失之若其死廣韻圭字下注曰孟子六十四黍為一圭十圭為一合以及集注中程子所引荀子孟子三見齊王而不言事門人疑之孟子曰我先攻其邪心今孟子書皆無其文豈所謂外篇者邪史記索隱引皇甫謐曰孟子稱禹生石紐西夷人也恐是舜生諸馮之誤漢書藝文志孟子十一篇風俗通曰孟子作書中外十一篇詩維天之命傳引孟仲子曰大哉天命之無極而美周之禮也閟宫傳引孟仲子曰是禖宫也正義引趙岐云孟仲子孟子從昆弟學於孟子者也譜云孟仲子者子思弟子蓋與孟軻共事子思後學於孟軻著書論詩毛氏取以為說則又有孟仲子之書矣陸璣詩草木疏云子夏傳魯人申公申公傳魏人李克李克傳魯人孟仲子孟仲子傳趙人孫卿孫卿傳魯人大毛公大毛公傳小毛公孟子引論語孟子書引孔子之言凡二十有九其載於論語者八學不厭而教不倦子里仁為美之君薨聼於冡宰簡大哉堯之為君小鳴鼓而攻吾黨之士狂鄉原德之賊者惡似而非又多大同而小異然則夫子之言其不傳於後者多矣故曰仲尼沒而微言絶孟子字樣九經論語皆以漢石經為據故字體未變孟子字多近今如知多作智說多作悅女多作汝辟多作避弟多作悌疆多作强之類與論語異蓋久變於魏晉以下之傳録也然則石經之功亦不細矣唐書言邠州故作豳開元十三年以字類幽故為邠今惟孟子書用邠字容齊四筆言孟子是由惡醉而强酒見且由不得亟並作由今本作猶是知今之孟子又與宋本小異孟子弟子趙岐注孟子以季孫子叔二人為孟子弟子季孫知孟子意不欲而心欲使孟子就之故曰異哉弟子之所聞也子叔心疑惑之亦以為可就之矣使巳為政以下則孟子之言也又曰告子名不害兼治儒墨之道者嘗學於孟子而不能純徹性命之理又曰高子齊人也學於孟子鄉道而未明去而學他術又曰盆城括嘗欲學於孟子問道未達而去宋徽宗政和五年封告子不害東阿伯高子泗水伯盆城括萊陽伯季孫豐城伯子叔承陽伯皆以孟子弟子故也史記索隱曰孟子有萬章公明高等並軻之門人廣韻又云離婁孟子門人不知其何所本淮南子黃帝亡其𤣥珠使離朱健剟索之注二人皆黃帝臣抱朴子有彭祖之弟子離婁公元吳萊著孟子弟子列傳二卷今不傳晏子書稱西郭徒居布衣之士盆城括嘗為孔子門人尤誤荼荼字自中唐始變作茶其說已詳之唐韻正按困學紀聞荼有三誰謂荼苦苦菜也有女如荼茅秀也以薅荼蓼陸草也今按爾雅荼蒤字凡五見而各不同釋草曰荼苦菜注引詩誰謂荼苦其甘如薺疏云此味苦可食之菜本草一名選一名游冬易緯通卦驗𤣥圖云苦菜生於寒秋經冬歷春乃成月令孟夏苦菜秀是也葉似苦苣而細斷之有白汁花黃似菊堪食但苦耳又曰蔈荂荼注云即艻疏云按周禮掌荼及詩有女如荼皆云荼茅秀也蔈也荂也其别名此二字皆從草從余又曰蒤虎杖注云似紅草而粗大有細刺可以染赤疏云蒤一名虎杖陶注本草云田野甚多壯如大馬蓼莖斑而葉圓是也又曰蒤委葉注引詩以茠蒤蓼疏云蒤一名委葉王肅說詩云蒤陸穢草然則蒤者原田蕪穢之草非苦菜也今詩本茠作薅此二字皆從草從涂釋木曰檟苦荼注云樹小如梔子冬生葉可煮作羮飲今呼早采者為荼晚取者為茗一名荈蜀人名之苦荼此一字亦從草從余今以詩考之邶谷風之荼苦七月之采荼綿之堇荼皆苦采之荼也詩采苦采苦傳苦苦采正義曰此荼也陸璣云苦采生山田及澤中得霜恬􅀈而美所謂堇荼如飴內則云濡豚包苦用苦菜是也又借而為荼毒之荼桑柔湯誥皆苦菜之荼也夏小正取荼莠周禮地官掌荼儀禮既夕禮茵著用荼實綏澤焉詩鴟梟捋荼傳曰荼萑苕也正義曰謂薍之秀穗茅薍之秀其物相類故皆名荼也茅秀之荼也以其白也而象之出其東門有女如荼國語吳王夫差萬人為方陳白常白旗素甲白羽之矰望之如荼考工記望而㫝之欲其荼白亦茅秀之荼也良耜之荼蓼委葉之蒤也唯虎杖之蒤與檟之苦荼不見於詩禮而王褒僮約云陽武買荼張載登成都白菟樓詩云芳荼冠六清孫楚詩云薑桂荼荈出巴蜀本草衍義晉溫嶠上表貢荼千斤茗三百斤是知自秦人取蜀而後始有茗飲之事王褒僮約前云炮鱉烹荼後云陽武買荼注以前為苦菜後為茗唐書陸羽傳羽嗜荼自此後荼字減一畫為茶著經三篇言茶之原之法之具尤備天下益知飲茶矣有常伯熊者因羽論復廣著茶之功其後尚茶成風時回紇入朝始驅馬市茶至明代設茶馬御史而大唐新語言右補闕綦毋煚性不飲茶著茶飲序曰釋滯消壅一日之利暫佳瘠氣侵精終身之害斯大獲益則功歸茶力貽患則不謂茶災豈非福近易知害逺難見宋黃庭堅茶賦亦曰寒中瘠氣莫甚於茶或濟之鹽勾賊破家今南人往往有茶癖而不知其害此亦攝生者之所宜戒也鴚爾雅舒雁鵝注今江東呼􅕯􅕯即鴐字古加字讀如哥詩君子偕老之珈東山之嘉並與何為韻左傳魯大夫榮鴐鵝方言雁自關而東謂之鴚鵝太𤣥經裝次二鴐鵝慘於冰一作􅛥鵝司馬相如子虛賦弋白鵠連鴐鵝雙鶬下𤣥鶴加上林賦鴻鷫鵠鴇鴐鵝屬玉揚雄反離騷鳯皇翔於蓬渚兮豈鴐鵝之能捷張衡西京賦鴐鵝鴻鶤南都賦鴻鴇鴐鵝杜甫七歌前飛鴐鵝後􅒗鶬遼史穆宗紀獲鴐鵝祭天地元史武宗紀禁江西湖廣汴梁私捕鴐鵝山海經青要之山是多鴐鳥郭璞云未詳或云當作鴐其從馬者傳寫之誤爾漢書古今人表榮鴐鵝師古曰鴐音加今本亦誤作駕今左傳本亦多作駕猶詩乘乘鴇之誤作鴇也九經唐宋取士皆用九經今制定為五經而周禮儀禮公羊榖梁二傳並不列於學官杜氏通典東晉元帝時太常賀循上言尚書被符經置博士一人晉書荀嵩傳時簡省博士其儀禮公羊穀梁及鄭易皆省不置又多故厯紀儒道荒廢學者能兼明經義者少且春秋三傳俱出聖人而義歸不同自前代通儒未有能通得失兼而學之者也今宜周禮儀禮二經置博士二人春秋三傳置博士三人其餘易詩書則經置一人合八人太常荀嵩上疏言博士舊員十有九人今五經合九人準古計今猶未中半周易有鄭氏注其書根源誠可深惜儀禮一經所謂曲禮鄭𤣥於禮特明皆有證據昔周之衰孔子作春秋左丘明子夏造䣛親受孔子歿丘明撰其所聞為之傳微辭妙旨無不精究公羊高親受子夏立於漢朝多可采用榖梁赤師徒相傳諸所發明或是左氏公羊不載亦足有所訂正臣以為三傳雖同曰春秋而發端異趣宜各置一人以傳其學遇王敦難不行按元帝紀云太興四年三月置周易儀禮公羊博士明年正月王敦反是雖置而旋不行也唐貞觀九年五月敕自今以後明經兼習周禮若儀禮者於本色內量減一選開元八年七月國子司業李元璀上言三禮三傳及毛詩尚書周易等並聖賢微旨生人教業今明經所習務在出身咸以禮記文少人皆競讀周禮經邦之軌則儀禮莊敬之楷模公羊榖梁歷代宗習今兩監及州縣以獨學無㕛四經殆絶事資訓誘不可因循其學生請停各量配作業并貢人預試之日習周禮儀禮公羊榖梁並請帖十通五許其八第以此開勸即望四海均習九經該備從之唐書開元十六年十二月楊瑒為國子祭酒奏言今之明經習左氏者十無二三又周禮儀禮及公羊榖梁殆將廢絶請量加優奬於是下制明經習左氏及通周禮等四經者出身免任散官遂著於式古人抱遺經扶微學之心如此其急而今乃一切廢之蓋必當時之士子苦四經之難習而主議之臣徇其私意遂舉歷代相傳之經典棄之而不學也自漢以來豈不知經之為五而義有並存不容執一故三家之學並列春秋至於三禮各自為書今乃去經習傳尤為乖理茍便已私用之干祿率天下而欺君負國莫甚於此經學日衰人材日下非職此之由乎宋史神宗用王安石之言士各占治易書詩周禮禮記一經兼論語孟子是時儀禮春秋皆不列學官元祐初始復春秋左傳朱文公乞修三禮劄子遭秦滅學禮樂先壞其頗存者三禮而已周官一書固為禮之綱領至於儀法度數則儀禮乃其本經而禮記郊特牲冠義等篇乃其義說耳朱子言儀禮是經禮記是解儀禮且如儀禮有冠禮禮記便有冠義儀禮有昏禮禮記便有昏義以至燕射之類莫不皆然前此猶有三禮通禮學究諸科禮雖不行士猶得以誦習而知其說熙寧以來王安石變亂舊制廢罷儀禮而獨存禮記之科棄經任傳遺本宗末其失已甚是則儀禮之廢乃自安石始之語類言儀禮舊與五經並行王介甫始罷去祖宗朝有開寶通禮科禮官用此等人為之介甫一切罷去至於明代此學遂絶朱子又作謝監嶽文集序曰謝綽中建之政和人先君子尉政和行田間聞讀書聲入而視之儀禮也以時方專治王氏學而獨能爾異之即與俱歸勉其所未至遂中紹興三年進士第在宋已為空谷之足音今時則絶響矣考次經文禮記樂記寬而靜至溫良而慈一節當在愛者宜歌商之上文義甚明然鄭康成因其舊文不敢輒更但注曰此文換簡失其次寬而靜宜在上愛者宜歌商宜承此書武成定是錯簡有日月可考蔡氏亦因其舊而别序一篇為今考定武成最為得體其他考定經文如程子改易繫辭天一地二一節於天數五之上論語必有寢衣一節於齊必有明衣布之下蘇子瞻改書洪範曰王省惟歲一節於五曰厯數之下改康誥惟三月哉生魄一節於洛誥周公拜手稽首之上朱子改大學康誥曰至止於信於未之有也之下改詩云瞻彼淇澳二節於止於信之下論語誠不以富二句於齊景公有馬千駟一節之下詩小雅以南陔足鹿鳴之什而下改為白華之什皆至當無復可議後人效之妄生穿鑿周禮五官互相更調而王文憲名柏作二南相配圗洪範經傳圖重定中庸章句圖改甘棠野有死麕何彼穠矣三章於王風仁山金氏本此改斂時五福一節於五曰考終命之下改惟辟作福一節於六曰弱之下使鄒魯之書傳於今者幾無完篇殆非所謂畏聖人之言者矣董文清槐改大學知止而后有定二節於子曰聼訟吾猶人也之上以為傳之四章釋格物致知而傳止於九章則大學之文元無所闕其說可從鳯翔袁楷謂文言有錯入繫辭者鳴鶴在隂已下七節自天祐之一節憧憧往來已下十一節此十九節皆文言也即亢龍有悔一節之重見可以明之矣遂取此十八節屬於天𤣥而地黃之後依卦為序於義亦通然古人之文變化不拘况六經出自聖人傳之先古非後人所敢擅議也日知録卷七
