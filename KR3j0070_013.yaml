body:
  text: 日知録卷十三崑山顧炎武撰周末風俗春秋終於敬王三十九年庚申之歲西狩獲麟又十四年為真定王元年癸酉之歲魯哀公出奔二年卒於有山氏左傳以是終焉又六十五年威烈王二十三年戊寅之歲初命晉大夫魏斯趙籍韓虔為諸侯又一十七年安王十六年乙未之歲初命齊大夫田和為諸侯又五十二年顯王三十五年丁亥之歲六國以次稱王蘇秦為從長自此之後事乃可得而紀自左傳之終以至此凡一百三十三年史文闕軼考古者為之茫昧如春秋時猶尊禮重信而七國則絶不言禮與信矣春秋時猶宗周王而七國則絶不言王矣史記秦本紀孝公使公子少官率師會諸侯于逢澤以朝王蓋顯王時春秋時猶嚴祭祀重聘享而七國則無其事矣春秋時猶論宗姓氏族而七國則無一言及之矣春秋時猶宴會賦詩而七國則不聞矣春秋時猶有赴告策書而七國則無有矣邦無定交士無定主此皆變於一百三十三年之間史之闕文而後人可以意推者也不待始皇之并天下而文武之道盡矣李康運命論云文簿之敝漸於靈景辨詐之偽成於七國馴至西漢此風未改故劉向謂其承千嵗之衰周繼暴泰之餘弊貪叨險詖不間義理觀夫史之所録無非功名勢利之人筆札喉舌之輩而如董生之言正誼明道者不一二見也蓋自春秋之後至東京而其風俗稍復乎古吾是以知光武明章果有變齊至魯之功而惜其未純乎道也自斯以降則宋慶厯元祐之間為優矣嗟乎論世而不考其風俗無以明人主之功余之所以斥周末而進東京亦春秋之意也秦紀會稽山刻石秦始皇刻石凡六皆鋪張其滅六王并天下之事其言黔首風俗在泰山則云男女禮順慎遵職事昭隔內外靡不清淨在碣石門則云男樂其疇女修其業如此而已惟會稽一刻其辭曰飾省宣義有子而嫁倍死不貞防隔內外禁上淫泆男女潔誠夫為寄豭正義曰豭牡豬也左氏定公十四年傳既定爾婁豬盍歸我艾豭寄豭者謂淫於他室殺之無罪男秉義程妻為逃嫁子不得母邵氏曰母云者母之也咸化廉清何其繁而不殺也考之國語自越王句踐棲於會稽之後惟恐國人之不蕃故令壯者無取老婦老者無取壯妻女子十七不嫁其父母有罪丈夫二十不取其父母有罪生丈夫二壺酒一犬生女子二壺酒一豚生三人公與之母生二人公與之餼內傳子胥之言亦曰越十年生聚吳越春秋至謂句踐以寡婦淫泆過犯皆輸山上士有憂思者令遊山上以喜其意當其時蓋欲民之多而不復禁其淫泆傳至六國之末而其風猶在故始皇為之厲禁而特著於刻石之文以此與滅六王并天下之事並提而論且不著之於燕齊而獨著之於越然則秦之任刑雖過而其坊民正俗之意固未始異於三王也漢興以來承用秦法以至今日者多矣世之儒者言及於秦即以為亡國之法亦未之深考乎兩漢風俗漢自孝武表章六經之後師儒雖盛而大義未明故新莽居攝頌德獻符者遍於天下光武有鑒於此故尊崇節義敦厲名實所舉用者莫非經明行修之人而風俗為之一變至其末造朝政昏濁國事日非而黨錮之流獨行之輩依仁蹈義舍命不渝風雨如晦雞鳴不已三代以下風俗之美無尚於東京者故范曄之論以為桓靈之間君道粃僻朝綱日陵國隙屢啓自中智以下靡不審其崩離而權強之臣息其窺盜之謀豪俊之夫屈於鄙生之議儒林傳論所以傾而未頽決而未潰皆仁人君子心力之為左雄傳論可謂知言者矣使後代之主循而弗革即流風至今亦何不可而孟德既有冀州崇奬跅弛之士觀其下令再三至於求負汙辱之名見笑之行不仁不孝而有治國用兵之術者建安二十二年八月令十五年春令十九年十二月令意皆同於是權詐迭進姦逆萌生故董昭太和之疏已謂當今年少不復以學問為本專更以交遊為業國士不以孝悌清修為首乃以趨勢求利為先至正始之際而一二浮誕之徒騁其智識蔑周孔之書習老莊之教風俗又為之一變夫以經術之治節義之防光武明章數世為之而未足毁方敗常之俗孟德一人變之而有餘後之人君將樹之風聲納之軌物以善俗而作人不可不察乎此矣光武躬行儉約以化臣下講論經義常至夜分一時功臣如鄧禹有子十三人各使守一藝閨門修整可為世法貴戚如樊重三世共財子孫朝夕禮敬常若公家以故東漢之世雖人才之倜儻不及西京而士風家法似有過於前代東京之末節義衰而文章盛自蔡雍始其仕董卓無守卓死驚歎無識觀其集中濫作碑頌則平日之為人可知矣宋袁淑弔古文伯喈衒文而求入以其文采富而交遊多故後人為立佳傳嗟乎士君子處衰季之朝常以負一世之名而轉移天下之風氣者視伯喈之為人其戒之哉正始魏明帝殂少帝史稱齊王即位改元正始凡九年其十年則太傅司馬懿殺大將軍曹爽而魏之大權移矣三國鼎立至此垂三十年一時名士風流盛於雒下乃其棄經典而尚老莊蔑禮法而崇放達視其主之顛危若路人然即此諸賢為之倡也自此以後競相祖述如晉書言王敦見衛玠謂長史謝鯤曰不意永嘉之末復聞正始之音沙門攴遁以清談著名於時莫不崇敬以為造微之功足參諸正始宋書言羊玄􅍖二子太祖賜名曰咸曰粲謂玄􅍖曰欲令卿二子有林下正始餘風王微與何偃書曰卿少陶玄風淹雅修暢自是正始中人南齊書言袁粲言於帝曰臣觀張緒有正始遺風南史言何尚之謂王球正始之風尚在其為後人企慕如此然而晉書儒林傳序云擯闕里之典經習正始之餘論指禮法為流俗目縱誕以清髙此則虛名雖被於時流篤論未忘乎學者是以講明六藝鄭玄王肅為集漢之終演説老莊王弼何晏為開晉之始于寶晉紀論曰風俗淫僻恥尚失所學者以老莊為宗而黜六經談者以虛薄為辨而賤名簡行身者以放濁為通而狹節信進仕者以苟得為貴而鄙居正當官者以望空為高而笑勤恪以至國亡於上教淪於下干戈日爭君臣屢易非林下諸賢之咎而誰咎哉有亡國有亡天下亡國與亡天下奚辨曰易姓改號謂之亡國仁義充塞而至於率獸食人人將相食謂之亡天下魏晉人之清談何以亡天下是孟子所謂楊墨之言至於使天下無父無君而入於禽獸者也昔者嵇紹之父康被殺於晉文王至武帝革命之時而山濤薦之入仕紹時屏居私門欲辭不就濤謂之曰為君思之久矣天地四時猶有消息而況於人乎一時傳誦以為名言而不知其敗義傷教至於率天下而無父者也夫紹之於晉非其君也忘其父而事其非君當其未死三十餘年之間為無父之人亦已久矣而蕩陰之死何足以贖其罪乎且其入仕之初豈知必有乘輿敗績之事而可樹其忠名以蓋於晚也人君御物之方莫大乎抑浮止競宋自仁宗在位四十餘年雖所用或非其人而風俗醇厚好尚端方論世之士謂之君子道長及神宗朝荆公秉政驟奬趨媚之徒深鉏異已之輩鄧綰李定舒亶蹇序辰王子韶諸姦一時擢用而士大夫有十鑽之目鑽者取必入之義班固答賓戲商鞅挾三術以鑽孝公曰鄧綰傳以頌王安石得官謂其鄉人笑罵從汝好官須我為之干進之流乘機抵隙馴至紹聖崇寧而黨禍大起國事日非膏肓之疾遂不可治後之人但言其農田水利青苗保甲諸法為百姓害而不知其移人心變士習為朝廷之害其害於百姓者可以一旦而更而其害於朝廷者厯數十百年滔滔之勢一往而不可反矣李應中謂自王安石用事陷溺人心至今不自知覺人趨利而不知義則主勢日孤此可謂知言者也詩曰毋教猱升木如塗塗附夫使慶厯之士風一變而為崇寧者豈非荆公教猱之效哉蘇軾傳熙寧初安石創行新法軾上書言國家之所以存亡者在道德之淺深不在乎強與弱厯數之所以長短者在風俗之厚薄不在乎富與貧臣願陛下務崇道德而厚風俗不願陛下急於有功而貪富強仁祖持法至寬用人有序專務掩覆過失未嘗輕改舊章考其成功則曰未至以言乎用兵則十出而九敗以言乎府庫則僅足而無餘徒以德澤在人風俗知義故升遐之日天下歸仁議者見其末年吏多因循事不振舉乃欲矯之以苛察齊之以智能招徠新進勇鋭之人以圖一切速成之效未享其利澆風已成多開驟進之門使有意外之得公卿侍從跬步可圖俾常調之人舉生非望欲望風俗之厚豈可得哉近歲朴拙之人愈少巧進之士益多惟陛下哀之救之當時論新法者多矣未有若此之深切者根本之言人主所宜獨觀而三復也東軒筆録王荆公秉政更新天下之務而宿望舊人議論不協荆公遂選用新進待以不次故一時政事不日皆舉而兩禁臺閣內外要權莫非新進之士也石林燕語故事在京職事官絶少用選人者熙寧初稍欲革去資格之弊始詔選舉到可試用人並令崇文院較書以備詢訪差使候二年取旨或除館職或升資任或只與合入差遣時邢尚書恕以河南府永承縣主簿首為崇文院較書胡右丞愈知諫院猶以為太遽因請雖選人而未厯外官與雖厯仕而不滿者皆不得選舉乃特詔邢恕與堂除近地試銜知縣近歲不復用此例自始登第直為禁從矣及出知江寧府呂惠卿驟得政柄有射羿之意而一時之士見其得君謂可以傾奪荆公遂更朋附之以興大獄尋荆公再召鄧綰反攻惠卿惠卿自知不安乃條列荆公兄弟之失數事面奏上封惠卿所言以示荆公故荆公表有云忠不足以取信故事事欲其自明義不足以勝姦故人人與之立敵蓋謂是也既而惠卿出亳州荆公復相承黨人之後平日肘腋盡去而在者已不可信可信者又才不足以任事當日惟與其子雱機謀而雱又死知道之難行也於是慨然復求罷去遂以使相再鎮金陵未期納節久之得會靈觀使其發明荆公情事至為切當子曰君子易事而難説也而大戴禮言有人焉容色辭氣其入人甚愈進退周旋其與人甚巧其就人甚速其叛人甚易迹荆公昔日之所信用者不惟變士習蠹民生而已亦不饗其利蘇轍疏呂惠卿比之呂布劉牢之書曰其後嗣王罔克有終相亦罔終為大臣者可不以人心風俗為重哉東軒筆録又曰王荆公在中書作新經義以授學者故太學諸生幾及三千人又令判監直講程第諸生之業處以上中下三舍而人間傳以為試中上舍者朝廷將以不次升擢於是輕薄書生矯飾言行坐作虛譽奔走公卿之門者若市矣蘇子瞻易傳兑卦解曰六三上六皆兑之小人以説為事者均也六三履非其位而處於二陽之間以求説為兑者故曰來兑言初與二不招而自來也其心易知其為害淺故二陽皆吉而六三凶上六超然於外不纍於物此小人之託於旡求以為兑者也故曰引兑言九五引之而後至也其心難知其為害深故九五孚于剝雖然其心蓋不知而賢之非説其小人之實也使知其實則去之矣故有厲而不凶然則上六之所以不光何也曰難進者君子之事也使上六引而不兑則其道光矣此論蓋為神宗用王安石而發孟子曰好名之人能讓千乘之國茍非其人簞食豆羹見於色荆公當日處卑官力辭其所不必辭既顯宜辭而不復辭矯情干譽之私固有識之者矣夫子之論觀人也曰察其所安又曰色取仁而行違居之不疑在邦必聞在家必聞是則欺世盜名之徒古今一也人君可不察哉陸遊歲暮感懷詩在昔祖宗時風俗極粹美人材兼南北議論忘彼此誰令各植黨更仆而迭起中更兵革禍此風猶未巳倘築太平基請自厚俗始清議古之哲王所以正百辟者既已制官刑警于有位矣而又為之立閭師設鄉校存清議於州里以佐刑罰之窮移之郊遂載在禮經殊厥井疆稱於畢命兩漢以來猶循此制鄉舉里選必先考其生平一玷清議終身不齒君子有懷刑之懼小人存恥格之風教成於下而上不嚴論定於鄉而民不犯降及魏晉而九品中正之設雖多失實遺意未亡凡被糾彈付清議者即廢棄終身同之禁錮晉書卞壺傳至宋武帝篡位乃詔有犯鄉論清議贓汙淫盜一皆蕩滌洗除與之更始自後凡遇非常之恩赦文並有此語齊梁陳詔並云洗除先注當日鄉論清議必有記注之目小雅廢而中國微風俗衰而叛亂作矣然鄉論之汙至煩詔書為之洗刷豈非三代之直道尚在於斯民而畏人之多言猶見於變風之日乎豫聞在下有鰥所以登庸以比三凶不才所以投畀雖二帝之舉錯亦未嘗不詢于芻蕘然則崇月旦以佐秋官進鄉評以扶國是儻亦四聰之所先而王治之不可闕也陳壽居父喪有疾使婢丸藥客往見之鄉黨以為貶議坐是沈滯者纍年阮簡父喪行遇大雪寒凍遂詣浚儀令令為他賓設黍臛簡食之以致清議廢頓幾三十年溫嶠為劉司空使勸進母崔氏固留之嶠絶裾而去迄於崇貴鄉品猶不過也每爵皆發詔謝惠連先愛會稽郡吏杜德靈及居父憂贈以五言詩十餘首文行於世坐廢不豫榮伍張率以父憂去職其父侍伎數十人善謳者有色貌邑子儀曹郎顧玩之求聘焉謳者不願遂出家為尼嘗因齋會率宅玩之為飛書言與率姦南司以事奏聞髙祖惜其才寢其奏然猶致世論服闋後久之不仕官職之升沉本於鄉評之與奪其猶近古之風乎天下風俗最壞之地清議尚存猶足以維持一二至於清議亡而干戈至矣洪武十五年八月乙酉禮部議凡十惡姦盜詐偽干名犯義有傷風俗及犯贓至徒者書其名於申明亭以示懲戒有私毁亭舍塗抹姓名者監察御史按察司官以時按視罪如律制可十八年四月辛丑命刑部録內外諸司官之犯法罪狀明著者書之申明亭此前代鄉議之遺意也後之人視為文具風紀之官但以刑名為事而於弼教新民之意若不相關無惑乎江河之日下已名教司馬遷作史記貨殖傳謂自廊廟朝廷巖穴之士無不歸於富厚等而下之至於吏士舞文弄法刻章偽書不避刀鋸之誅者沒於賂遺而仲長敖核性賦謂倮蟲三百人最為劣爪牙皮毛不足自衛惟賴詐偽迭相嚼齧等而下之至於臺隸僮豎惟盜惟竊乃以今觀之則無官不賄遺而人人皆吏士之為矣無守不盜竊而人人皆僮豎之為矣自其束髮讀書之時所以勸之者不過所謂千鍾粟黃金屋而一旦服官即求其所大欲君臣上下懷利以相接遂成風流不可復制後之為治者宜何術之操曰惟名可以勝之名之所在上之所庸而忠信廉潔者顯榮於世名之所去上之所擯而怙侈貪得者廢錮於家即不無一二矯偽之徒猶愈於肆然而為利者南史有云漢世士務修身故忠孝成俗至於乘軒服冕非此莫由晉宋以來風衰義缺故昔人之言曰名教曰名節曰功名不能使天下之人以義為利而猶使之以名為利雖非純王之風亦可以救積汙之俗矣舊唐書薛謙光為左補闕上疏言臣竊窺古之取士實異於今先觀名行之源考其鄉邑之譽崇禮讓以厲已顯節義以標信以敦朴為先最以雕蟲為後科故人崇勸讓之風士去輕浮之行希仕者必修貞確不拔之操行難進易退之規衆議已定其髙下郡將難誣其曲直故計貢之賢愚即州將之榮辱假有穢行之彰露亦鄉人之厚顔是以李陵降而隴西慙干木隱而西河美故名勝於利則小人之道消利勝於名則貪暴之風扇自七國之季雖雜縱橫而漢代求才猶徵百行是以禮節之士敏德自修閭里推髙然後為府寺所辟今之舉人有乖事實鄉議決小人之筆行修無長者之論䇿第喧競於州府祈恩不勝於拜伏或明制避武后嫌名詔改為制才出試遣搜敡驅馳府寺之門出入王公之第上啓陳詩唯希咳唾之澤摩頂至足冀荷提攜之恩故俗號舉人皆稱覓舉覓者自求之稱也夫徇已之心切則至公之理乖貪仕之性彰則廉潔之風薄是知府命雖髙異叔度勤勤之讓黃門已貴無秦嘉耿耿之辭縱不能挹已推賢亦不肯待於三命故選司補置喧然於禮闈州貢賓王爭訟於階闥謗議紛合漸以成風夫競榮者必有爭利之心謙遜者亦無貪賄之纍自非上智焉能不移在於中人理由習俗若重謹厚之士則懷祿者必崇德以修名若開趨競之門則徼幸者皆戚施而附會附會則百姓罹其弊修名則兆庶蒙其福風化之漸靡不由兹嗟乎此言可謂切中當時之弊矣漢人以名為治故人材盛今人以法為治故人材衰宋范文正上晏元獻書曰夫名教不崇則為人君者謂堯舜不足法桀紂不足畏為人臣者謂八元不足尚四凶不足恥天下豈復有善人乎人不愛名則聖人之權去矣今日所以變化人心蕩滌汚俗者莫急於勸學奬廉二事天下之士有能篤信好學至老不倦卓然可當方正有道之舉者官之以翰林國子之秩而聽其出處則人皆知向學而不競於科目矣庶司之官有能潔已愛民以禮告老而家無儋石之儲者賜之以五頃十頃之地以為子孫世業而除其租賦復其丁徭則人皆知自守而不貪於貨賂矣豈待災川再遣方收牧豕之儒公孫𢎞優孟陳言始録負薪之胤孫叔敖而扶風之子特賜黃金尹翁歸涿郡之賢常頒羊酒韓福遂使名高處士德表具僚當時懷稽古之榮沒世仰遺清之澤不愈於科名爵祿勸人使之干進而叨利者哉以名為酟必自此塗始矣漢平帝元始中詔曰漢興以來股肱在位身行儉約輕財重義未有若公孫𢎞者也位在宰相封侯而為布被脫粟之飯奉祿以給故人賔客無有所餘可謂減於制度應劭曰禮貴有常尊衣服有品而率下篤俗者也與內富厚而外為詭服以釣虛譽者殊科其賜𢎞後子孫之次見為適者爵關內侯食邑三百戶魏志嘉平六年朝廷追思清節之士詔賜故司空徐邈征東將軍胡質衛尉田豫家穀二千斛帛三十束布告天下後魏宣武帝延昌四年詔曰故處士李謐屢辭徵辟志守沖素儒隱之操深可嘉美可遠傍惠康近準玄晏諡曰貞靜處士並表其門閭以旌髙節唐六典有養德邱園聲實明著雖無官爵亦賜諡曰先生存者賜之以先生之號殁者則加之以諡如揚播隱居不仕至德中賜號玄靖先生是也宋史同以余所見崇禎中嘗用巡按御史祁彪佳言贈舉人歸子慕朱陛宣為翰林院待詔唐書牛僧孺隋僕射竒章公𢎞之裔幼孤下杜樊鄉有賜田數頃依以為生則知隋之賜田至唐二百年而猶其子孫守之若金帛之頒廪祿之惠則早已化為塵土矣明朝正統中以武進田賜禮部尚書胡濚其子孫亦至今守之故竊以為奬廉之典莫善於此廉恥五代史馮道傳論曰禮義廉恥國之四維四維不張國乃滅亡善乎管生之能言也禮儀治人之大法廉恥立人之大節蓋不廉則無所不取不恥則無所不為人而如此則禍敗亂亡亦無所不至況為大臣而無所不取無所不為則天下其有不亂國家其有不亡者乎然而四者之中恥尤為要故夫子之論士曰行已有恥孟子曰人不可以無恥無恥之恥無恥矣又曰恥之於人大矣為機變之巧者無所用恥焉所以然者人之不廉而至於悖禮犯義其原皆生於無恥也故士大夫之無恥是謂國恥吾觀三代以下世衰道微棄禮義捐廉恥非一朝一夕之故然而松柏後雕於歲寒雞鳴不巳於風雨彼昏之日固未嘗無獨醒之人也頃讀顔氏家訓有云齊朝一士夫嘗謂吾曰我有一兒年已十七頗曉書疏教以塞上曲及彈琵琶稍欲通解以此伏事公卿無不寵愛吾時俯而不答異哉此人之教子也若由此業自致卿相亦不願汝曹為之嗟乎之推不得已而仕於亂世猶為此言尚有小宛詩人之意彼閹然媚於世者能無愧哉羅仲素曰教化者朝廷之先務廉恥者士人之美節風俗者天下之大事朝廷有教化則士人有廉恥士人有廉恥則天下有風俗古人治軍之道未有不本於廉恥者吳子曰凡制國治軍必教之以禮勵之以義使有恥也夫人有恥在大足以戰在小足以守矣尉繚子言國必有慈孝廉恥之俗則可以死易生而太公對武王將有三勝一曰禮將二曰力將三曰止欲將故禮者所以班朝治軍而兔罝之武夫皆本於文王后妃之化豈有淫芻蕘竊牛馬而為暴於百姓者哉後漢書張奐為安定屬國都尉羌豪帥感奐恩德上馬二十匹先零酋長又遺金鐻八枚奐並受之而召主簿於諸羌前以酒酹地曰使馬如羊不以入廏使金如粟不以入懷悉以金馬還之羌性貪而貴吏清前有八都尉率好財貨為所患苦及奐正身潔已威化大行嗚呼自古以來邊事之敗有不始於貪求者哉吾於張奐之事有感焉杜子美詩安得廉頗將三軍同晏眠一本作廉恥將詩人之意未必及此然吾觀唐書言王佖為武靈節度使先是吐蕃欲成烏蘭橋每於河壖先貯材木皆為節帥遣人潛載之委於河流終莫能成蕃人知佖貪而無謀先厚遺之然後并役成橋仍築月城守之自是朔方禦寇不暇至今為患由佖之黷貨也故貪夫為帥而邊城晚開得此意者郢書燕説或可以治國乎流品晉宋以來尤重流品故雖蕞爾一方而猶能立國宋書蔡興宗傳興宗為征西將軍開府儀同三司荆州刺史常侍如故被徵還都時右軍將軍王道隆任參國政權重一時躡履到興宗前不敢就席良久方去竟不呼坐元嘉初中書舍人狄當詣太子詹事王曇首不敢坐其後中書舍人王𢎞為太祖所愛遇上謂曰卿欲作士人得就王球坐乃當判耳殷劉殷景仁劉湛並雜無所益也若往詣球可稱旨就席及至球舉扇曰若不得爾𢎞還依事啓聞帝曰我便無如此何五十年中有此三事張敷傳遷江夏王義恭撫軍記室參軍時義恭就文帝求一學義沙門會敷赴假還江陵入辭文帝令以後艑載沙門敷不奉詔曰臣性不耐雜遷正員郎中書舍人狄當周赳並管要務以敷同省名家欲詣之赳曰彼若不相容便不如不往當曰吾等並已員外郎矣何憂不得共坐敷先設二牀去壁三四尺二客就席酬接甚歡既而呼左右曰移吾牀遠客赳等失色而去世説紀僧真得幸於齊世祖嘗請曰臣出自本縣武吏遭逢聖時階榮至此無所須惟就陛下乞作士大夫上曰此由江斆謝􅀈我不得措意可自詣之僧真承旨詣斆登榻坐定斆顧命左右曰移吾牀遠客僧真喪氣而退以告世祖世祖曰士大夫故非天子所命梁書羊侃傳有宦者張僧胤候侃侃竟不前之曰我牀非閹人所坐自萬厯季年搢紳之士不知以禮飭躬而聲氣及於宵人如汪文言一人為東林諸公大玷詩字頒於輿皂至於公卿上壽宰執稱兒而神州陸沈中原塗炭夫有以致之矣重厚世道下衰人材不振王伾之吳語鄭綮之歇後薛昭緯之浣溪沙李邦彥之俚語辭曲莫不登諸巖廊用為輔弼至使在下之人慕其風流以為通脫而棟折榱崩天下將無所芘矣及乎板蕩之後而念老成大雅蕩播遷之餘而思耆俊文衛之命庸有及乎有國者登崇重厚之臣抑退輕浮之士此移風易俗之大要也侯景數梁武帝十失謂皇太子吐言止於輕薄賦詠不出桑中張説論閻朝隱之文如麗服靚妝燕歌趙舞觀者忘疲若類之風雅則罪人矣今之詞人率同此病淫辭豔曲傳布國門有如北齊陽俊之所作六言歌辭名為陽五伴侶寫而賣之在市不絶者誘惑後生傷敗風化宜與非聖之書同類而焚庶可以正人心術何晏之粉白不去手行步顧影鄧揚之行步舒縱坐立傾倚謝靈運之每出入自扶接者常數人後皆誅死而魏文帝體貌不重風尚通脫是以享國不永後祚短促史皆附之五行志以為貌之不恭昔子貢於禮容俯仰之間而知兩君之疾與亂夫有所受之矣子曰君子不重則不威學則不固揚子法言曰言輕則招憂行輕則招辜貌輕則招辱好輕則招淫四明薛岡謂士大夫子弟不宜使讀世説未得其雋永先習其簡傲推是言之可謂善教矣防其乃逸乃諺之萌而引之有物有恆之域此以正養蒙之道也南齊陳顯達語其諸子曰麈尾蠅拂是王謝家物汝不須捉此即取於前燒除之耿介讀屈子離騷之篇乃知堯舜所以行出乎人者以其耿介同乎流俗合乎汙世則不可與入堯舜之道矣非禮勿視非禮勿聽非禮勿言非禮勿動是則謂之耿介反是謂之昌披夫道若大路然堯桀之分必在乎此鄉原老氏之學所以異乎孔子者和其光同其塵此所謂似是而非也卜居漁父二篇盡之失非不知其言之可從也而義有所不當為也子雲而知此義也反離騷其可不作矣尋其大指生斯世也為斯世也善斯可矣此其所以為莽大夫與卜居漁父法語之言也離騷九歌放言也儉約國奢示之以儉君子之行宰相之事也漢汝南許劭為郡功曹同郡袁紹公族豪俠去濮陽令歸車徒甚盛入郡界乃謝曰吾輿服豈可使許子將見之遂以單車歸家晉蔡充好學有雅尚體貌尊嚴為人所憚髙平劉整車服奢麗嘗語人曰紗縠吾服其常耳遇蔡子尼在坐而經日不自安北齊李德林父亡時正嚴冬單衰徒跣自駕靈輿反葬博陵崔諶休假還鄉將赴弔從者數十騎稍稍減留比至德林門才餘五騎云不得令李生怪人熏灼李僧伽修整篤業不應辟命尚書袁叔德來候僧伽先減僕從然後入門曰見此賢令吾羞對軒冕夫惟君子之能以身率物者如此是以居官而化一邦在朝廷而化天下魏武帝時毛玠為東曹掾典選舉以儉率人天下之士莫不以亷節自勵雖貴寵之臣輿服不敢過度唐大厯末元載伏誅拜楊綰為相綰質性貞廉車服儉朴居廟堂未數日人心自化御史中丞崔寬劍南西川節度使寧之弟家富於財有别墅在皇城之南池館臺榭當時第一寬即日潛遣毁撤中書令郭子儀在邠州行營聞綰拜相坐中音樂減散五分之四京兆尹黎幹每出入騶從百餘亦即日減損惟留十騎而已李師古跋扈憚杜黃裳為相命一幹吏寄錢數千緡氈車子一乘使者到門未敢送伺候纍日有緑輿自宅出從婢二人青衣襤縷言是相公夫人使者遽歸告師古師古折其謀終身不敢改節此則禁鄭人之泰侈奚必於三年變雒邑之矜誇無煩乎三紀修之身行之家示之鄉黨而已道豈遠乎哉大臣記曰大臣法小臣廉官職相序君臣相正國之肥也故欲正君而序百官必自大臣始然而王陽黃金之論時人既怪其奢公孫布被之名直士復譏其詐則所以考其生平而定其實行者惟觀之於終斯得之矣季文子卒大夫入斂公在位宰庀家器為葬備無衣帛之妾無食粟之馬無藏金玉無重器備君子是以知季文子之忠於公室也相三君矣而無私積可不謂忠乎諸葛亮自表後主曰成都有桑八百株薄田十五頃子孫衣食悉仰於家自有餘饒至於臣在外任無别調度隨身衣食悉仰於官不别治生以長尺寸若臣死之日不使內有餘帛外有贏財以負陛下及卒如其所言夫廉不過人臣之一節而左氏稱之為忠孔明以為無負者誠以人臣之欺君誤國必自其貪於貨賂也夫居尊席腆潤屋華身亦人之常分爾豈知髙后降之弗祥民人生其怨詛其究也乃與國而同敗耶誠知夫大臣家事之豐約關於政化之隆汙則可以審擇相之方而亦得審民之道矣杜黃裳元和之名相而以富厚蒙譏盧懷慎開元之庸臣而以清貧見奬是故貧則觀其所不取此卜相之要言除貪漢時贓罪被劾或死獄中或道自殺唐時贓罪多於朝堂決殺其特宥者乃長流嶺南睿宗太極元年四月制官典主司枉法贓一匹已上並先決一百而改元及南郊赦文每曰大辟罪已下巳發覺未發覺已結正未結正繫囚見徒罪無輕重咸赦除之官典犯贓不在此限然猶有左降遐方謫官蠻徼者而盧懷慎重以為言謂屈法惠姦非正本塞源之術是知亂政同位商后作其丕刑貪以敗官夏書訓之必殺三代之王罔不由此道者矣宋初郡縣吏承五季之習黷貨厲民故尤嚴貪墨之罪開寶三年董元吉守英州受贓七十餘萬帝以嶺表初平欲懲掊克之吏特詔棄市而南郊大赦十惡故劫殺及官吏受贓者不原史言宋法有可以得循吏者三而不赦犯贓其一也天聖以後士大夫皆知飾簠簋而厲廉隅蓋上有以勸之矣石林燕語熙寧中蘇子容判審刑院知金州張仲宣坐枉法贓論當死故事命官以贓論死皆貸命杖脊黥配海島子容言古者刑不上大夫可殺則殺仲宣五品官今杖而黥之得無辱多士乎乃詔免黥杖止流嶺外自是遂為例然懲貪之法亦漸以寬矣于文定慎行謂本朝姑息之政甚於宋世敗軍之將可以不死贓吏巨萬僅得罷官而小小刑名反有凝脂之密是輕重胥失之矣蓋自永樂時贓吏謫令戍邊宣德中改為運甎納米贖罪浸至於寬而不復究前朝之法也宣德中都御史劉觀坐受贓數千金論斬上曰刑不上大夫觀雖不善朕終不忍加刑命遣戍遼東正統初遂多特旨曲宥嗚呼法不立誅不必而欲為吏者之毋貪不可得也人主既委其太阿之柄而其所謂大臣者皆刀筆筐篋之徒毛舉細故以當天下之務吏治何由而善哉北夢瑣言後唐明宗尤惡墨吏鄧州留後陶玘為內鄉令成歸仁所論稅外科配貶嵐州司馬掌書記王惟吉奪厯任告敕長流綏州亳州刺史李鄴以贓穢賜自盡汴州倉吏犯贓內有史彥珣舊將之子又是駙馬石敬瑭親戚王建立奏之希免死上曰王法無私豈可徇親供奉官于延徽巧事權貴監倉犯贓侍衛使張從貴方便救之上曰食我厚祿盜我倉儲蘇秦復生説我不得並戮之以是在五代中號為小康之世册府元龜載天成四年十二月蔡州西平縣令李商為百姓告陳不公大理寺斷止贖銅敕旨李商招愆俱在案款大理定罪備引格條然亦事有所未圖理有所未盡古之立法意在惜人況自列聖相承溥天無事人皆知禁刑遂從輕喪亂以來廉恥者少朕一臨寰海四換星灰常宣無外之風每革從前之弊惟期不濫皆守無私李商不務養民專謀潤已初聞告不公之事件決彼狀頭又為奪有主之莊田撻其本戶國家給州縣篆印祗為行遣公文而乃將印厯下鄉從人戶取物據兹行事何以官為宜奪歷任官杖殺讀此敕文明宗可謂得輕重之權者矣金史大定十二年咸平尹舒穆嚕阿穆爾以贓死於獄上謂其不尸諸市巳為厚幸貧窮而為盜賊蓋不得已三品職官以贓至死愚亦甚矣其諸子皆可除名夫以贓吏而錮及其子似非惡惡止其身之義然貪人敗類其子必無廉清則世宗之詔亦未為過漢書言李固杜喬朋心合力致主文宣而孝桓即位之詔有曰贓吏子孫不得詳舉豈非漢人已行之事乎元史至元十九年九月壬戌敕中外官吏贓罪輕者決杖重者處死有庸吏之貪有才吏之貪唐書牛僧孺傳穆宗初為御史中丞宿州刺史李直臣坐贓當死中貴人為之申理帝曰直臣有才朕欲貸而用之僧孺曰彼不才者持祿取容耳天子制法所以束縛有才者安祿山朱泚以才過人故亂天下帝是其言乃止今之貪縱者大抵皆才吏也茍使之惕於法而以正用其才未必非治世之能臣也後漢書稱袁安為河南尹政號嚴明然未嘗以贓罪鞫人此近日為寬厚之論者所持以為口實乃余所見數十年來姑息之政至於綱解紐弛皆此言貽之敝矣嗟乎范文正有言一家哭何如一路哭耶朱子謂近世流俗惑於陰德之論多以縱舍有罪為仁此猶人主之以行赦為仁也孫叔敖斷兩頭蛇而位至楚相亦豈非陰德之報耶唐柳氏家法居官不奏祥瑞不度僧道不貸贓吏法此今日士大夫居官者之法也宋包拯戒子孫有犯贓者不得歸本家死不得葬大塋此今日士大夫教子孫者之法也貴廉漢元帝時貢禹上言孝文皇帝時貴廉潔賤貪汚賈人贅壻及吏坐贓者皆禁錮不得為吏賞善罰惡不阿親戚罪白者伏其誅疑者以與民師古曰罪疑惟輕也亡贖罪之法亡無同故令行禁止海內大化天下斷獄四百與刑錯亡異武帝始臨天下尊賢重士闢地廣境數千里自見功大威行遂從耆欲用度不足乃行一切之變使犯法者贖罪入穀者補吏是以天下奢侈官亂民貧盜賊並起亡命者衆郡國恐伏其誅則擇便巧史書習於計簿能欺上府者以為右職師古曰上府謂所屬之府右職髙職也姦軌不勝則取勇猛能操切百姓者以苛暴威服下者使居大位故亡義而有財者顯於世欺謾而善書者尊於朝悖逆而勇猛者貴於官故俗皆曰何以孝弟為財多而光榮何以禮義為史書而仕宦何以謹慎為勇猛而臨官故黥劓而髠鉗者猶復攘臂為政於世行雖犬彘家富勢足目指氣使是為賢耳師古曰動目以指物出氣以使人故謂居官而置富者為雄傑處姦而得利者為壯士兄勸其弟父勉其子俗之敗壞乃至於是察其所以然者皆以犯法得贖罪求士不得真賢相守崇財利師古曰相諸侯相也守郡守也誅不行之所致也今欲興至治致太平宜除贖罪之法相守選舉不以實及有贓者輒行其誅亡但免官則爭盡力為善貴孝弟賤賈人進真賢舉實廉而天下治矣嗚呼今日之變有甚於此自神宗以來黷貨之風日甚一日國維不張而人心大壞數十年於此矣書曰不肩好貨敢恭生生鞠人謀人之保居敘欽必如是而後可以立太平之本禹又欲令近臣自諸曹侍中以上家亡得私販賣與民爭利犯者輒免官削爵不得仕宦此議今亦可行自萬厯以後天下水利碾磑場渡市集無不屬之豪紳相沿以為常事矣禁錮姦臣子孫唐太宗詔禁錮宇文化及司馬德戡裴虔通等子孫不令齒敘貞觀七年正月戊子詔文見舊唐書武后令楊素子孫不得任京官及侍衛新唐書至德中兩京平大赦惟祿山支黨及李林甫楊國忠王鉷子孫不原新唐書宋髙宗即位詔蔡京童貫王黼朱勔李彥梁師成談稹皆誤國害民之人子孫更不收敘清波雜志而章惇子孫亦不得仕於朝宋史章惇傳明太祖有天下詔宋末蒲壽庚黃萬石子孫不得仕宦叨餮之象周鼎檮杌之名楚書古人蓋有之矣竊謂宜令按察司各擇其地之姦臣一二人王法之所未加或加而未盡者刻其名於獄門之石以為世戒而禁其後人之入仕九刑不忘百世難改亦先王樹之風聲之意乎舊唐書太宗紀貞觀二年六月辛卯詔曰天地定位君臣之義以彰卑髙既陳人倫之道斯著是用篤厚風俗化成天下雖復時經治亂主或昏明疾風徑草芬芳無絶剖心焚體赴蹈如歸夫豈不愛七尺之軀重百年之命諒由君臣義重名教所先故能明大節於當時立清風於身後至如趙髙之殞二世董卓之鴆𢎞農人神所疾異代同憤況凡庸小豎有懷凶悖遐觀典䇿罔不誅夷辰州刺史長蛇縣男裴虔通昔在隋代委質晉藩煬帝以舊邸之情特相愛幸遂乃忘蔑君親潛圖弒逆密伺間隙招結羣醜長戟流矢一朝竊發天下之惡孰云可忍宜其夷宗焚首以彰大戮但年代異時纍逢赦令可特免極刑投之四裔除名削爵遷配歡州虔通歸國授滁州總管每自言身除隋室以啓大唐有觖望之色及得罪怨憤歲餘而死唐書太宗紀貞觀二年七月戊申萊州刺史牛方裕絳州刺史薛世良廣州長史唐奉義虎牙郎將髙元禮以宇文化及之黨皆除名徙於邊册府元龜權萬紀為治書侍御史貞觀四年正月奏宇文智及受隋厚恩而蔑棄君親首為弒逆人臣之所同疾萬代之所不原今其子乃任千牛侍衛左右請從屏黜以為懲戒制可大唐新語楊昉為左丞時宇文化及子孫理資蔭朝廷以事隔兩朝且其家親族亦衆下所司理之昉判曰父弒隋主子訴隋資生者猶配遠方死者無宜更敘時人深賞之楊元禧傳載武后制曰隋尚書令楊素昔在本朝早荷殊遇稟凶邪之德懷諂佞之才惑亂君上離間骨肉搖動冢嫡寧惟掘蠱之禍誘扇後主卒成請蹯之釁生為不忠之人死為不義之鬼身雖幸免子竟族誅斯則姦逆之謀是其庭訓險薄之行遂成門風刑戮雖加枝胤仍在豈可復肩隨近侍齒迹朝行朕接統百王恭臨四海上嘉賢佐下惡賊臣常欲從容於萬幾之餘褒貶於千載之外況年代未遠耳目所存者乎其楊素及兄弟子孫並不得令任京官及侍衛史言元禧忤張易之密奏左貶然此制自是當時公論宋末蒲壽庚叛逆之事皆出於其兄壽􅍲之畫是時壽􅍲佯著黃冠野服歸隱山中自稱處士以示不臣二姓而密為壽庚作降表令人自水門潛出送款於唆都其後壽庚以功授平章富貴冠一時而壽􅍲亦居甲第有投詩者云劒戟紛紜扶主日山林寂寞閉門時水聲禽語皆時事莫道山翁總不知泉州府志嗚呼今之身為戎首而外託髙名者亦未嘗無其人也或欲蓋而彌章則無逃於三叛之筆矣家事孔子曰居家理故治可移於官子木問范武子之德於趙孟對曰夫子之家事治言於晉國無隱情其祝史陳信於鬼神無愧辭子木歸以語王王曰宜其光輔五君以為盟主也夫以一人家事之理而致晉國之霸士大夫之居家豈細行乎史記之載宣曲任氏曰富人爭奢侈而任氏折節為儉力田畜田畜人爭取賤賈任氏獨取貴善富者數世然任公家約非田畜所出弗衣食公事不畢則身不得飲酒食肉以此為閭里率故富而主上重之漢書載張安世曰安世尊為公侯食邑萬戶然身衣弋綈夫人自紡績家童七百人皆有手技作事內治産業纍積纖微是以能殖其貨富於大將軍光後漢書載樊宏父重曰世善農稼好貨殖性溫厚有法度三世共財子孫朝夕禮敬常若公家其營理産業物無所棄課役童隸各得其宜故能上下勠力財利歲倍今之士大夫知此者鮮故富貴不三四傳而衰替也兩家奴爭道霍氏奴入御史府欲躢大夫門此霍氏之所以亡也奴從賔客漿酒藿肉此董賢之所以敗也然則今日之官評其先考之僮約乎以正色立朝之孔父而豔妻行路禍及其君以小心謹慎之霍光而陰妻邪謀至於滅族夫綱之能立者鮮矣戎王聽女樂而牛馬半死楚鐵劍利而倡優拙秦王畏之成帝寵黃門名倡丙強景武之屬而漢業以衰玄宗造霓裳羽衣之曲而唐室遂亂今日士大夫才任一官即以教戲唱曲為事官方民隱置之不講國安得不亡身安得無敗奴僕顔氏家訓鄴下有一領軍貪積已甚家僮八百誓滿一千唐李義府多取人奴婢及敗各散歸其家時人為露布云混奴婢而亂放各識家而競入潘嶽西征賦曰混雞犬而亂放各識家而競入太祖數涼國公藍玉之罪亦曰家奴至於數百今日江南士大夫多有此風一登仕籍此輩競來門下謂之投靠多者亦至千人而其用事之人則主人之起居食息以至於出處語默無一不受其節制有甘於毁名喪節而不顧者奴者主之主者奴之嗟乎此六逆之所由來矣漢書霍光傳任宣言大將軍時百官已下但事馮子都王子方等皆老奴又曰初光愛幸監奴馮子都常與計事師古曰監奴奴之監知家務者也及顯光妻寡居與子都亂夫以出入殿門進止不失尺寸之人而溺情女子小人遂至於此今時士大夫之僕多有以色而升以妻而寵夫上有漁色之主則下必有蒸弒之臣清斯濯纓濁斯濯足自取之也是以欲清閨門必自簡童僕始嚴分宜之僕永年號曰鶴坡張江陵之僕遊守禮號曰楚濵古詩昔有霍家奴姓馮名子都而晉灼引漢語以為馮毁則子都亦字也不但招權納賄而朝中多贈之詩文儼然與搢紳為賔主名號之輕文章之辱至斯而甚異日媚閹建祠非此為之嚆矢乎人奴之多吳中為甚史言呂不韋家僮萬人嫪毒家僮數千人今吳中仕宦之家有至一二千人者其專恣暴橫亦惟吳中為甚有王者起當悉免為良而徙之以實遠方空虛之地士大夫之家所用僕役並令出資雇募如江北之例鄭康成周禮司厲注曰今之奴婢古之罪人也風俗通言古制本無奴婢奴婢皆是犯事者今吳中亦諱其名謂之家人則豪橫一清而四鄉之民得以安枕其為士大夫者亦不受制於人可以勉而為善訟簡風淳其必自此始矣閽人顔氏家訓昔者周公一沐三握髮一飯三吐哺以接白屋之士一日所見七十餘人門不停賔古所貴也失教之家閽寺無禮或以主君寢食嗔怒拒客未通江南深以為恥黃門侍郎裴之禮號善待士有如此輩對賔杖之其門生僮僕接於他人折旋俯仰辭色應對莫不肅敬與主無别也史記鄭當時誡門下客至無貴賤無留門者後漢書皇甫嵩折節下士門無留客而大戴禮武王之門銘曰敬遇賔客貴賤無二則古已言之矣觀夫後漢趙一之於皇甫規髙彪之於馬融一謁不靣終身不見為士大夫者可不戒哉後漢書梁冀傳冀壽共乘輦車遊觀第內鳴鐘吹管或連繼日夜客到門不得通皆請謝門者門者纍千金今日所謂門包殆昉於此田宅舊唐書張嘉貞在定州所親有勸立田業者嘉貞曰吾忝厯官榮曾任國相未死之際豈憂飢餒若負譴責雖富田莊何用比見朝士廣占良田及身殁後皆為無賴子弟作酒色之資甚無謂也聞者歎服此可謂得二疏之遺意者若夫世變日新人情彌險有以富厚之名而反使其後人無立錐之地者亦不可不慮也書又言馬燧資貨甲天下既卒子暢承舊業屢為豪幸邀取貞元末中尉曹志廉諷暢令獻田園第宅順宗復賜暢中貴人逼取仍指使施於佛寺暢不敢吝晚年財産並盡身殁之後諸子無室可居以至凍餒今奉誠園亭館即暢舊第也白樂天詩不見馬家宅今作奉誠園元微之詩蕭相深誠奉至尊舊居求作奉誠園秋來古巷無人掃樹滿空牆閉戟門寶通鑑作奉成園又以為馬璘之第並誤按馬璘傳天中貴戚勳家已務奢靡而垣屋猶存制度然衛公李靖家廟匕為嬖臣楊氏馬廄矣及安史之亂法度墮弛內臣戎帥競務奢豪亭館第舍力窮乃止璘之第經始中堂費錢二十萬貫德宗踐阼條舉格令第舍不得踰制仍詔毁璘中堂及內官劉忠翼之第璘之家園進屬宮司自後公卿賜宴多於璘之山池子弟無行家財尋盡册府元龜貞元十八年二月朔賜羣臣會宴於延康里故馬璘池亭自後每逢令節皆然則二馬身後事略同然謂之故馬璘池亭而不曰奉誠園也雍録奉誠園在安邑坊本馬燧宅燧子暢獻之王鍔家財富於公藏及薨有二奴告其子稷改父遺表匿所獻家財憲宗欲遣中使詣東都簡括以裴度諫而止稷後為德州刺史廣齎金寶僕妾以行節度使李全略利其貨而圖之教本州軍作亂殺稷納其室女以伎媵處之吾見今之大家以酒色費者居其一以爭鬩破者居其一意外之侮奪又居其一而三桓之子孫微矣三反今日人情有三反曰彌謙彌偽彌親彌泛彌奢彌吝召殺巧召殺忮召殺吝召殺南北風化之失江南之士輕薄奢淫梁陳諸帝之遺風也河北之人鬭狠劫殺安史諸凶之餘化也南北學者之病飽食終日無所用心難矣哉今日北方之學者是也羣居終日言不及義好行小慧難矣哉今日南方之學者是也范文正公史言范文正公先天下之憂而憂後天下之樂而樂而文正自作鄠郊友人王君墓表云今兹方面賔客滿坐鐘鼓在庭白髮憂邊對酒鮮樂豈如圭峰月下倚髙松聽長笛欣然忘天下之際乎馬文淵少有大志及至晚年猶思建功邊陲而浪泊西里見飛鳶跕跕墮水中終思少遊之言古今同此一轍王荆公詩豈羡京師傳谷口但知鄉里勝壺頭阮嗣宗詠懷詩所云寧與燕雀翔不隨黃鵠飛黃鵠遊四海中路將安歸者也若夫知幾之神處亢之正聖人當之亦必有道矣辛幼安辛幼安詞小草舊曽呼遠志故人今有寄當歸此非用薑伯約事也吳志太史慈東萊黃人也後立功於孫䇿曹公聞其名遺慈書以篋封之發省無所道但貯當歸幼安久宦南朝未得大用晚年多有淪落之感亦廉頗思用趙人之意爾觀其與陳同甫酒後之言不可知其心事哉士大夫晚年之學南方士大夫晚年多好學佛北方士大夫晚年多好學仙夫一生仕宦投老得間正宜進德修業以補從前之闕而知不能及流於異端其與求田問舍之輩行事雖殊而孳孳為利之心則一而已矣宋史呂大臨傳富弼致政於家為佛氏之學蒙齋筆談富鄭公少好道自言吐納長生之術信之甚篤亦時為燒煉丹竈事守亳時迎潁州僧正顒館於書室親接弟子禮大臨與之書曰古者三公無職事惟有德者居之內則論道於朝外則主教於鄉古之大人當是任者必將以斯道覺斯民成已以成物豈以位之進退年之盛衰而為之變哉今大道未明人趨異學不入於莊則入於釋疑聖人為未盡善輕禮義為不足學人倫不明萬物憔悴此老成大人惻隱存心之時以道自任振起壞俗若夫移精變氣務求長年此山谷避世之士獨善其身者之所存豈世之所以望於公者弼謝之以達尊大老而受後生之針規良不易得也唐玄宗開元六年河南參軍鄭銑虢州朱陽縣丞郭仙舟投匭獻詩敇曰觀其文理是崇道法至於時用不切事情可各從所好並罷官度為道士士大夫家容僧尼册府元龜唐玄宗開元二年七月戊申制曰如聞百姓家多以僧尼道士為門徒往還妻子無所避忌今江南尚有門徒之稱或詭託禪觀妄陳禍福爭涉左道深斁大猷自今已後百官不得輒容僧尼道士等至家緣吉凶要須設齋皆於州縣陳牒寺觀然後依數聽去仍令御史金吾明加捉搦唐制百官齋日雖在寺中不得過僧張籍寺宿齋詩云晚到金光門外寺寺中新竹隔簾多齋居禁與僧相見院院開門不得過金史海陵紀貞元三年以右丞相張浩平章政事張暉每見僧法寶必坐其下失大臣體各杖二十僧法寶妄自尊大杖二百貧者事人貧者不以貨事人然未嘗無以自致也江上之貧女常先至而掃室布席陳平侍里中喪以先往後罷為助古人之風吾黨所宜勉矣分居宋孝建中中軍府録事參軍周殷啓曰今士大夫父母在而兄弟異居計十家而七庶人父子殊産八家而五其甚者乃危亡不相知飢寒不相恤忌疾讒害其間不可稱數宜明其禁以易其風當日江左之風便已如此魏書裴植傳云植雖自州送祿奉母及贍諸弟而各别資財同居異爨一門數竈蓋亦染江南之俗也隋盧思道聘陳嘲南人詩曰共甑分炊飯同鐺各煮魚而地理志言蜀人敏慧輕急尢足意錢之戲小人薄於情禮父子率多異居册府元龜唐肅宗乾元元年四月詔百姓中有事親不孝别籍異財玷汚風俗虧敗名教先決六十配𨽻磧西有官品者禁身聞奏宋史太祖開寶元年六月癸亥詔荆蜀民祖父母父母在者子孫不得别財異居二年八月丁亥詔川岐諸州察民有父母在而别籍異財者論死太宗淳化元年九月辛巳禁川峽民父母在出為贅壻真宗大中祥符二年正月戊辰詔誘人子弟析家産者令所在擒捕流配其於教民厚俗之意可謂深且篤矣遼史聖宗統和元年十一月詔民有父母在别籍異居者坐罪若劉安世劾章惇父在别籍異財絶滅義禮則史傳書之以為正論馬亮為御史中丞上言父祖未葬不得别財異居李元綱厚德録乃今之江南猶多此俗人家兒子娶婦輒求分異而老成之士有謂二女同居易生嫌競式好之道莫如分爨者豈君子之言與史記言商君治秦令民有二男以上不分異者倍其賦又言秦人家富子壯則出分家貧子壯則出贅以為國俗之敝而陸賈家於好畤有五男出所使越得橐中裝賣千金分其子子二百金令其生産陸生常安車駟馬從歌舞琴瑟侍者十人寶劒直百金謂其子曰與汝約過汝汝給吾人馬酒食極欲十日而更所死家得寶劒車騎侍從者後人或謂之為達至唐姚崇遺令以達官身後子孫失蔭多至貧寒斗尺之間參商是競欲倣陸生之意預為分定將以絶其後爭嗚呼此衰世之意也漢桓帝之世更相濫舉時人為之語曰舉秀才不知書察孝廉父别居見抱朴子當世之俗猶以分居為恥若吳之陳表世為將督兄修亡後表母不肯事修母表謂其母曰兄不幸早世表統家事當奉嫡母母若能為表屈情承順嫡母者是至願也母若不能直當出别居耳由是二母感寤雍穆可以見東漢之流風矣陳氏禮書言周之盛時宗族之法行故得以此繫民而民不散及秦用商君之法富民有子則分居貧民有子則出贅由是其流及上雖王公大人亦莫知有敬宗之道寖淫後世習以為俗而時君所以統馭之者特服紀之律而已間有糾合宗族一再傳而不散者則人異之以為義門豈非名生於不足與應劭風俗通曰凡兄弟同居上也通有無次也讓其下耳豈非中庸之行而今人以為難能者哉五雜俎言張公藝九世同居髙宗問之書忍字百餘以進其意美矣而未盡善也居家御衆當令紀綱法度截然有章乃可行之永久若使姑婦勃溪奴僕放縱而為家長者僅含默隱忍而已此不可一朝居而況九世乎善乎浦江鄭氏對太祖之言曰臣同居無他惟不聽婦人言耳此格論也雖百世可也唐玄宗天寶元年正月敕如聞百姓有戶髙丁多茍為規避父母見在乃别籍異居宜令州縣勘會其一家之中有十丁已上者放兩丁征行賦役五丁已上放一丁即令同籍共居以敦風教其賦丁孝假與免差科謂應賦之丁遇父母亡則免差科謂之孝假按此後周太祖所制若罹凶禮則不征其賦者也可謂得化民之術者矣父子異部三國志言冀州俗父子異部更相毁譽今之江浙之間多有此風一入門户父子兄弟各樹黨援兩不相下萬厯以後三數見之此其無行誼之尤所謂惟弔兹不于我政人得罪天惟與我民彛大泯亂者矣生日生日之禮古人所無余昔年流寓薊門生日有致餽者答書云小辨之逐子始説我辰哀郢之放臣乃言初度顔氏家訓曰江南風俗兒生一期為制新衣盥浴裝飾男則用弓矢紙筆女則刀尺針縷並加飲食之物及珍寶服玩置之兒前觀其發意所取以驗貪廉智愚名之為試兒親表聚集因成宴會自兹以後二親若在每至此日常有飲食之事無教之徒雖已孤露魏晉間人以父亡為孤露嵇康與山巨源絶交書少加孤露趙彥深見母自陳幼小孤露亦謂之偏露唐孟浩然送莫氏甥詩平生早偏露其日皆為供頓酣暢聲樂不知有所感傷梁孝元年少之時每八月六日載誕之辰嘗設齋講自阮修容元帝所生母薨後此事亦絶是此禮起於齊梁之間逮唐宋以後自天子至於庶人無不崇飾此日開筵召客賦詩稱壽而於昔人反本樂生之意去之遠矣陳思王植陳思王植初封臨災侯聞魏氏代漢發服悲哭文帝恨之魏志蘇則傳司馬順字子忠宣王第五弟通之子初封習陽亭侯魏志杜恕傳注引晉書作龍陽及武帝受禪歎曰事乖唐虞而假為禪名遂悲泣由是廢黜徙武威姑臧縣雖受罪流放守意不移而卒滕王瓚隋髙祖母弟周宣帝崩髙祖入禁中將總朝政瓚聞召不從曰作隨國公恐不能保何乃更為族滅事耶廣王全昱全忠之兄全忠稱帝與宗戚飲博於宫中酒酣全昱忽以投瓊擊盆中迸散睨帝曰朱三汝本碭山一民從黃巢為盜天子用汝為四鎮節度使富貴極矣奈何一旦滅唐三百年社稷自稱帝王行當族滅奚以博為帝不懌而罷夫天人革命而中心弗願者乃在於興代之懿親其賢於祼將之士勸進之臣遠矣降臣記言孔子射于矍相之圃賁軍之將亡國之大夫不入説苑言楚伐陳陳西門燔使其降民修之孔子過之不軾戰國䇿安陵君言先君手受太府之憲憲之上篇曰國雖大赦降城亡子不得與焉注以城降人及亡人之子下及漢魏而馬日磾于禁之流至於嘔血而終不敢靦於人世時之風尚從可知矣後世不知此義而文章之士多護李陵智計之家或稱譙叟此説一行則國無守臣人無植節反顔事讐行若狗彘而不之愧也何怪乎五代之長樂老序平生以為榮滅廉恥而不顧者乎春秋僖十七年齊人殲于遂穀梁傳曰無遂則何以言遂其猶存遂也故王蠋死而田單復齊𢎞演亡而桓公救衛此足以樹人臣之鵠而降城亡子不齒於人類者矣今浙江紹興府有一種人謂之惰民世為賤業不敢與齊民齒志云其先是宋將焦光瓚部曲以叛宋降金被斥楚漢之際有鄭君見史記鄭當時傳失其名嘗事項籍籍死屬漢髙祖悉令諸籍臣名籍謂不稱項王而斥其名鄭君獨不奉詔於是盡拜名籍者為大夫而逐鄭君金哀宗之亡參政張天綱見執於宋有司令供狀書金主為虜主天綱曰殺即殺焉用狀為有司不能屈聽其所供天綱但書故主而巳唐肅宗至德三年正月大赦詔自開元已來宰輔之家不為逆賊所汚者與子孫一人官本朝古人謂所事之國為本朝魏文欽降吳表言世受魏恩不能扶翼本朝抱愧俯仰靡所自厝又如吳亡之後而蔡洪與刺史周俊書言吳朝舉賢良是也顔氏家訓先君先夫人皆未還建業舊山旅葬江陵東郭之推父協梁湘東王府記室參軍承聖末啓求揚都欲營遷厝蒙詔賜銀百兩已於揚州小郊卜地燒磚值本朝淪沒流離至此之推仕歷齊周及隋而猶稱梁為本朝蓋臣子之辭無可移易而當時上下亦不以為嫌者矣舊唐書劉昫撰昫為石晉宰相而其職官志稱唐曰皇朝曰皇家曰國家經籍志稱唐曰我朝後唐時所纂也宋胡三省注資治通鑑書成於元至元時注中凡稱宋皆曰本朝曰我宋其釋地理皆用宋州縣名惟一百九十七卷蓋牟城下注曰大元遼陽府路遼東城下注曰今大元遼陽府二百六十八卷順州下曰大元順州領懷柔密雲二縣二百八十六卷錦州下曰陳元靚曰大元於錦州置臨海節度領永樂安昌興城神水四縣屬大定府路二百八十八卷建州下曰陳元靚曰大元建州領建平永霸二縣屬大定府路宋曰我宋元曰大元兩得之矣書前代官陶淵明以宋元嘉四年卒而顔延之身為宋臣乃其作誄直云有晉處士真定府龍藏寺碑隋開皇六年立其末云齊開府長兼行參軍九門張公禮撰齊亡入周周亡入隋而猶書齊官韓偓自書裴郡君祭文書甲戍歲書前翰林學士承旨銀青光祿大夫行尚書户部侍郎知制誥昌黎縣開國男食邑三百户韓偓是歲朱氏篡唐已八年猶書唐官而不用梁年號宋史劉豫傳豫改元阜昌朝奉郎趙俊書甲子不書僭年豫亦無如之何日知録卷十三
