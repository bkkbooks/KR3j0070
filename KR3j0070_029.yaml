body:
  text: 日知録卷二十九崑山顧炎武撰騎詩云古公亶父來朝走馬古者馬以駕車不可言走董氏曰顧野王作來朝趣馬曰走者單騎之稱古公之國鄰西戎翟其習尚有相同者程大昌雍録曰古皆乘車今曰走馬恐此時或已變乘為騎蓋避翟之遽不暇駕車然則騎射之法不始於趙武靈王也左傳昭公二十五年左師展將以公乘馬而歸正義曰古者服牛乘馬馬以駕車不單騎也至六國之時始有單騎蘇秦所云車千乘騎萬匹是也曲禮云前有車騎者禮記漢世書耳經典無騎字也劉炫謂此左師展將以公乘馬而歸欲共公單騎而歸此騎馬之漸也周禮大司馬師帥執提注提謂馬上鼓有曲木提持鼓立馬髦上者故謂之提正義曰先鄭蓋據當時已有單騎舉以況周其實周時皆乘車無輕騎法也傳王應麟謂六韜言騎戰其書當出於周末又引公羊齊侯唁公以鞍為几公羊亦周末之書也春秋之世荒服之散居於中夏者大抵皆在山谷之間兵車之所不至齊桓晉文僅攘而郤之不能深入其地者用車故也中行穆子之敗無終於太原得之毁車崇卒而智伯欲伐仇猶遺之大鐘以開其道其不利於車可知矣勢不得不變而為騎騎射所以便山谷也變服所以便騎射也是以公子成之徒諫變服而不諫騎射意騎射之法必有先武靈而用之者矣騎利攻車利守故衛將軍之遇敵以武剛車自環為營史記項羽本紀叙鴻門之會曰沛公則置車騎脫身獨騎上言車騎則車駕之馬來時所乘也下言獨騎則單行之馬去時所跨也樊噲夏侯嬰靳彊紀信四人則皆步走也樊噲傳曰沛公留車騎獨騎馬噲等四人步從是也驛漢書高帝紀乘傳詣雒陽師古曰傳若今之驛古者以車謂之傳車其後又單置馬謂之驛騎竊疑此法春秋時當已有之如楚子乘驛會師于臨品祁奚乘驛而見范宣子楚子以馹至於羅汭子木使馹謁諸王楚人謂游吉曰吾將使驛奔問諸晉而以告國語晉文公乘馹自下脫會秦伯于王城吕氏春秋齊君乘馹而自追晏子及之國郊皆事急不暇駕車或是單乘驛馬而注疏家未之及也戴侗云以車曰傳以騎曰馹晉侯以傳召伯宗則是車也說文傳遽也左傳弦高且使遽告于鄭注遽傳車則按韓非子言齊景公游少海傳騎從中來謁騎亦可以謂之傳謝在杭五雜俎曰古者乘傳皆驛車也史記田橫與客二人乘傳詣雒陽注四馬高足為置傳四馬中足為馳傳四馬下足為乘傳然左傳言鄭子産乘遽而至則似單馬騎矣釋文以車曰傳以馬曰遽子産時相鄭國豈乏車乎懼不及故乘遽其為驛馬無疑矣漢初尚乘傳車如鄭當時王溫舒皆私具驛馬後患其不速一槩乘馬矣驢騾自秦以上傳記無言驢者意其雖有而非人家所常畜也爾雅無驢而有鼰鼠身長須而賊秦人謂之小驢逸周書伊尹為獻令正北空同大夏莎車胸奴樓煩月氏諸國以槖駝野馬騊駼駃騠為獻驢父馬母曰騾馬父驢母曰駃騠古今注以牡馬牝驢所生謂之駏吕氏春秋趙簡子有兩白騾甚愛之李斯上秦王書言駿良駃騠鄒陽上梁王書亦云燕王按劍而怒食以駃騠是以為貴重難得之物也司馬相如上林賦騊駼槖駝蛩蛩驒騱駃騠驢騾王褒僮約調治馬驢兼落三重其名始見於文而賈誼弔屈原賦騰駕罷牛兮驂蹇驢日者列傳騏驥不能與罷驢為駟東方朔七諫要裊奔亡兮騰駕槖駝劉向九歎郤騏驥以轉運兮騰驢騾以馳逐揚雄反離騷騁驊騮以曲囏兮驢騾連蹇而齊足則又賤之為不堪用也嘗考驢之為物至漢而名至孝武而得充上林至孝靈而貴幸後漢書五行志靈帝於宫中西園駕四白驢躬自操轡驅馳周旋以為大樂於是公卿貴戚轉相倣效至乘輜軿以為騎從互相侵奪賈與馬齊然其種大抵出於塞外自趙武靈王騎射之後漸資中國之用鹽鐡論騾驢馲駝銜尾入塞驒奚騵馬盡為我畜杜篤論都賦虜􅬟侲驅騾驢馭宛馬鞭駃騠霍去病傳單于遂乘六騾胸奴傳其竒畜則槖駝驢騾駃騠騊駼驒奚西域傳鄯善國有驢馬多槖它烏秅國有驢無牛而龜兹王學漢家儀外國人皆曰驢非驢馬非馬若龜茲王所謂騾也可見外國之多産此種而漢人則以為竒畜耳今中原亦自産騾任重致逺之資勝于駑駘百倍且習見而無復以為竒畜者矣軍行遲速魏明帝遣司馬懿征遼東其時自雒陽出軍不過三千餘里而帝問往還幾日懿對以往百日攻百日還百日以六十日為休息如此一年足矣此猶是古人師行日三十里之遺意夏侯淵為將赴急疾常出敵之不意軍中為之語曰典軍校尉夏侯淵三日五百六日一千此可偶用之於二三百里之近不然百里而趨利者蹶上將固兵家所忌也木􅎆渡軍史記淮陰侯傳從陽夏以木􅎆缶渡軍服䖍曰以木押縛􅎆缶以渡是也古文簡不言縛爾吳志孫靜傳䇿詐令軍中促具􅎆缶數百口分軍夜投查瀆亦此法也其狀圖於喻龍德兵衡謂之甕筏海師海道用師古人蓋屢行之矣吳徐承率舟師自海入齊此蘇州下海至山東之路越王勾踐命范蠡舌庸率師沿海泝淮以絶吳路此浙東下海至淮上之路唐太宗遣强偉於劍南伐木造舟艦自巫峽抵江揚趨萊州此廣陵下海至山東之路漢武帝遣樓船將軍楊僕從齊浮渤海擊朝鮮魏明帝遣汝南太守田豫督青州諸軍自海道討公孫淵秦符堅遣石越率騎一萬自東萊出右徑襲和龍唐太宗伐高麗命張亮率舟師自東萊渡海趨平壤薛萬徹率甲士三萬自東萊渡海入鴨緑水此山東下海至遼東之路漢武帝遣中大夫嚴助發會稽兵浮海救東甌橫海將軍韓說自句章浮海擊東越此浙江下海至福建之路劉裕遣孫處沈田子自海道襲番禺此京口下海至廣東之路隋伐陳吳州刺史蕭瓛遣燕榮以舟師自東海至吳此又淮北下海而至蘇州也公孫度越海攻東萊諸縣侯希逸自平盧浮海據青州此又遼東下海而至山東也宋李寶自江隂率舟師敗金兵于膠西之石臼島此又江南下海而至山東也此皆古人海道用師之效海運唐時海運之事不詳於史蓋栁城陷沒之後至開元之初新立治所唐書地理志營州栁城郡萬嵗通天元年為契丹所陷聖厯二年僑治漁陽開元五年又還治栁城乃轉柬南之粟以餉之耳及其樹藝巳成則不復資於轉運非若元時以此為恆制也舊唐書宋通典作宗慶禮傳張九齡駁諡議曰營州鎮彼戎夷扼喉斷臂逆則制其死命順則為其主人是稱樂都其來尚矣往緣趙翽作牧馭之非才自經隳廢便長寇孽大明臨下聖謀獨斷恢祖宗之舊復大禹之迹以數千之役徒無甲兵之强衛指期遂往禀命而行於是量畚築執鼛鼓親總其役不愆所慮俾栁城為金湯之險邉境無鋒鏑之苦尋而罷海運收歲儲邊庭晏然河朔無擾與夫興師之費轉輸之勞較其優劣孰為利害此罷海之一證舊唐書懿宗紀咸通三年南蠻陷交趾徵諸道兵赴嶺南時湘灕泝運功役艱難軍屯廣州乏食潤州人陳磻石詣闕上書言江西湖南泝流運糧不濟軍師士卒食盡則散此宜深慮臣有竒計以饋南軍天子召見磻石因奏臣弟聽思曾任雷州刺史家人隨海船至福建往來大船一隻可致千石自福建裝船不一月至廣州得船數十艘便可致三萬石至廣府又引劉裕海路進軍破盧循故事執政是之以磻石為鹽鐡巡官往揚子院專督海運於是康承訓之軍皆不闕供燒荒守邊將士每至秋月草枯出塞縱火謂之燒荒唐書契丹每入寇幽薊劉仁恭嵗燎塞下草使不得留牧馬多死契丹乃乞盟是也其法自七國時已有之戰國䇿公孫衍謂義渠君曰中國無事於秦則秦且燒􅌊獲君之國英宗實録正統七年十一月錦衣衛指揮僉事王瑛言禦邉莫善於燒荒蓋邉之所恃者馬馬之所恃者草近年燒荒逺者不過百里近者五六十里敵馬來侵半日可至乞敕邊將遇秋深率兵約日同出數百里外縱火焚燒使敵馬無水草可恃如此則在我雖有一時之勞而一冬坐卧可安矣翰林院編修徐珵後改名有貞亦請每年九月盡敕坐營將官巡邊分為三路一出宣府抵赤城獨石一出大同抵萬全一出山海抵遼東各出三五百里燒荒哨瞭如遇邊寇出沒即相機防禦此先朝燒荒舊制誠守邊之良法也家兵古之為將者必有素豫之卒春秋傳冉求以武城人三百為已徒卒後漢書朱俊傳交址賊反拜俊刺史令過本郡簡募家兵張燕冦河內逼近京師出俊為河內太守將家兵擊却之三國志吕䖍傳領泰山太守將家兵到郡郭祖公孫犢等皆降晉書王渾傳為司徒楚王瑋將害汝南王亮渾辭疾歸第以家兵千餘人閉門距瑋瑋不敢逼少林僧兵少林寺中有唐太宗為秦王時賜寺僧教其辭曰王世充叨竊非據敢違天常法師等並能深悟幾變早識妙因擒彼凶孽廓兹淨土聞以欣尚不可思議今東都危急旦夕殄除並宜勉終茂功以垂令範是時立功十有三人裴漼少林寺碑所稱志操惠瑒曇宗等惟曇宗拜大將軍餘不受官賜地四十頃此少林僧兵所起考之魏書孝武帝西奔以五千騎宿于瀍西楊王别舍沙門都維那惠臻負璽持千牛刀以從舊唐書元和十年嵩山僧圓淨與淄青節度使李師道謀反結勇士數百人伏於東都進奏院乘雒城無兵欲竊發焚燒宫殿小將楊進李再興告變留守吕元膺乃出兵圍之賊突圍而出入嵩嶽山棚盡擒之宋史范致虛以僧趙宗印充宣撫司參議官兼節制軍馬宗印以僧為一軍號尊勝隊童子行為一軍號淨勝隊然則嵩雒之間固世有異僧矣嘉靖中少林僧月空受都督萬表檄禦倭於松江其徒三十餘人自為部伍持鐡棒擊殺倭甚衆皆戰死嗟乎能執干戈以扞疆場則不得以其髠徒而外之矣宋靖康時有五臺僧真寶與其徒習武事於山中欽宗召對便殿命之還山聚兵拒金晝夜苦戰寺舍盡焚為金所得誘勸百方終不顧曰吾法中有口回之罪吾既許宋皇帝以死豈當妄言也怡然受戮而德祐之末常州有萬安僧起義者作詩曰時危聊作將事定復為僧其亦有屠羊說之遺意者哉毛葫蘆兵元史順帝紀至正十三年立南陽鄧州等處毛葫蘆義兵萬户府募土人為軍免其差役令防城自效因其鄉人自相團結號毛葫蘆軍故以名之朵爾直班傳金商義兵以獸皮為矢房如瓠號毛葫蘆軍甚精鋭大學衍義補今唐鄧山居者以毒藥漬矢以射獸應弦而倒謂之毛葫蘆成化三年國子監學録黃明義言宋時多剛縣夷為冦用白芀子兵破之白芀子者即今之民壯也方音五方之語雖各不同然使友天下之士而操一鄉之音亦君子之所不取也故仲由之唁夫子病之鵙舌之人孟子所斥而宋書謂高祖雖纍葉江南楚言未變雅道風流無聞焉爾又謂長沙王道憐素無才能言音甚楚舉止施為多諸鄙拙世說言劉真長見王丞相既出人問見王公云何答曰未見他異惟聞作吳語耳又言王大將軍年少時舊有田舍名語音亦楚又言支道林入東見王子猷兄弟還人問見諸王何如答曰見一羣白項烏但聞唤啞啞聲北史謂丹楊王劉昶呵罵僮僕音雜夷夏雖在公坐諸王每侮弄之夫以創業之君中興之相不免時人之議而況於士大夫乎北齊楊愔稱裴讞之曰河東士族京官不少惟此家兄弟全無鄉音其所賤可知矣至於著書作文尤忌俚俗公羊多齊言淮南多楚語若易傳論語何嘗有一字哉若乃講經授學彌重文言是以孫詳蔣顯曾習周官而音乖楚夏左思魏都賦蓋音有楚夏者土風之乖也則學徒不至梁書儒林傳陸倕云李業興學問深博而舊音不改則為梁人所笑北史本傳下人士音辭鄙陋風操蚩拙則顔之推不願以為兒師家訓是則惟君子為能通天下之志蓋必自其發言始也金史國語解序曰今文尚書辭多竒澀蓋亦當世之方音也荀子每言案楚辭每言羌皆方音劉協文心雕龍云張華論韻謂士衡多楚可謂銜靈均之聲餘失黃鍾之正響也國語後魏初定中原軍容號令皆本國語後染華俗多不能通故録其本言相傳教習謂之國語孝文帝命侯伏侯可悉陵以國語譯孝經之㫖教於國人謂之國語孝經並隋書經籍志而歷考後魏北齊二書若孟威以明解北人語敕在著作以備推訪孫搴以能通鮮卑語宣𫝊號令祖珽以解鮮卑語免罪復參相府劉世清以能通四裔語為當時第一後主命作突厥語翻涅槃經以遺突厥可汗並見遇時主寵絶羣僚後唐康福善諸蕃語明宗聽政之暇每召入便殿咨訪時事福即以蕃語奏之樞密使安重誨惡焉嘗面戒之曰康福但亂奏事有日斬之外國風俗歷九州之風俗考前代之史書中國之不如外國者有之矣遼史言契丹部族生生之資仰給畜牧績毛飲湩以為衣食各安舊風狃習勞事不見紛華異物而遷故家給人足戒備整完卒之虎視四方强朝弱附金史世宗嘗謂宰臣曰朕嘗見女直風俗迄今不忘今之燕飲音樂皆習漢風非朕心所好東宫不知女直風俗第以朕故猶尚存之恐異日一變此風非長久之計他日與臣下論及古今又曰女直舊風雖不知書然其祭天地敬親戚尊耆老接賔客信朋友禮意欵曲皆出自然其善與古書所載無異汝輩不可忘也乃禁女直人不得改稱漢姓學南人衣裝犯者抵罪又曰女直舊風凡酒食㑹聚以騎射為樂今則奕碁雙陸宜悉禁止令習騎射又曰遼不忘舊俗朕以為是海陵習學漢人風俗是忘本也若依國家舊風四境可以無虞此長久之計也邵氏聞見録言回紇風俗朴厚君臣之等不甚異故衆志專一徑健無敵自有功於唐賜遺豐腴登里可汗始自尊大築宫室以居婦人有粉黛文繡之飾中國為之虛耗而其俗亦壞昔者祭公謀父之言犬戎樹惇能帥舊德而守終純固由余之對穆公言戎裔之俗上含淳德以遇其下下懷忠信以事其上一國之政猶一身之治其所以有國而長世用此道也及乎古風漸逺鮮克遵循不務詩書唯徵玩好服飾競於無等財賄溢于靡用驕淫矜誇浸以成習於是中行有變俗之譏賈生有五餌之䇿又其末也則有如張昭逺以皇弟皇子喜俳優飾姬妾而卜沙陀之不永張舜民見太孫好音樂美姝名茶古畫而知契丹之將亡禮不忘其初敦本之道不其懿與史記言胸奴獄久者不過十日一國之囚不過數人鹽鐡論言胸奴之俗略於文而敏於事宋鄧肅對高宗言外國之巧在文書簡簡故速中國之患在文書繁繁故遲遼史言朝廷之上事簡職專此遼之所以興也又曰皇帝四時巡守宰相已下於中京居守一切公事除拜官僚止行皇帖權差俟行在所取㫖出給誥敕文官縣令録事已下更不奏聞聽中書銓選然則外國之能勝於中國者惟其簡易而已金史食貨志言金起東海其俗純實可與返古初入中夏民多流亡土多曠閒遺黎惴惴何求不獲於斯時縱不能復井地溝洫之制若用唐之永業口分以制民産放其租庸調之法以足國計何至百年之內所為經畫紛紛然與其國相終始邪其弊在於急一時之利踵久壞之法及其中葉鄙遼儉朴襲宋繁縟之文懲宋寬柔加遼操切之政是棄二國之所長而併用其所短也繁縟勝必至於傷財操切勝必至於害民訖金之世國用易匱民心易離豈不由是與作法不愼厥初變法以救其弊祗益甚焉耳其論金時之弊至為明切魏太武始制反逆殺人奸盜之法號令明白政事清簡無繫訊連逮之煩百姓安之宋余靖言燕薊之地陷入契丹且百年而民亡南顧心者以契丹之法簡易故也樓煩樓煩乃趙西北邉之國其人强悍習騎射史記趙世家武靈王行新地遂出伐西遇樓煩王於西河而致其兵致云者致其人而用之也是以楚漢之際多用樓煩人别為一軍髙祖功臣侯年表陽都侯丁復以趙將從起鄴至霸上為樓煩將而項羽本紀漢有善騎射者樓煩應劭曰樓煩胡也今樓煩縣按樓煩地大不止一縣之人則漢有樓煩之兵矣灌嬰傳擊破柘公王武斬樓煩將五人攻龍且生得樓煩將十人擊項藉軍陳下斬樓煩將二人攻黥布别將于相斬樓煩將三人功臣表平定侯齊受以驍騎都尉擊項藉得樓煩將則項王及布亦各有樓煩之兵矣蓋自古用蠻裔攻中國者始自周武王牧野之師有庸蜀羌髳微盧彭濮而晉襄公敗秦于殽實用姜戎為犄角之勢大者王小者霸於是武靈王踵此用以謀秦而鮮卑突厥回紇沙陀自此所在皆有矣吐蕃回紇大抵外國之音皆無正字唐之吐蕃即今之土魯畨是也唐之回紇即今之回回是也唐書回紇一名回鶻元史有畏兀兒部畏即回兀即鶻也其曰回回者亦回鶻之轉聲也遼史天祚紀有回回國王國元史太祖紀以回鶻回回為二恐非其曰畏吾兒者又畏兀兒之轉聲也册府元龜按國史叙鐵勒種類云伊吾以西焉耆以北有契弊烏護紇骨等部契弊則契苾也烏護則烏紇也後為回鶻紇骨則紇扢斯也轉為黠戛斯蓋夷音有緩急即傳譯語不同大明會典哈密古伊吾廬地在燉煌北大磧外為西域諸畨往來要路其國部落與回回畏兀兒三種雜居則回回與畏兀兒又為二種矣今所存元時碑刻有畏兀兒字亦與回回字不同自唐會昌中回紇衰弱降幽州者前後三萬餘人皆散𨽻諸道始雜居於中華而不變其本俗杜子美留花門詩連雲屯左輔百里見積雪李衛公上尊號玉册文種類磐互縞衣如荼挾邪作蠱浸淫宇內今之遺風亦未衰於昔日也舊唐書憲宗紀元和二年正月庚子回紇請於河南府太原府置摩尼寺許之此即今禮拜寺之所從立也新唐書常衮傳言始回紇有戰功者得留京師戎性易驕後乃創邸第佛祠或伏甲其間數出中渭橋與軍人格鬭奪含光門魚契走城外然則自肅代以來回紇固巳有居京師者矣實録正統元年六月乙卯徙甘州涼州寄居回回於江南各衛凡四百三十六户一千七百四十九口其時西陲有警不得已為徙戎之䇿然其種類遂蕃於江左矣正統三年八月有歸附回回二百二人自涼州徙至浙江明初於其來降者待之雖優而防之未嘗不至福建漳州衛指揮僉事楊榮因進表至京為回回之編置漳州者寄書於其同類奉㫖坐以交通外裔黜為為事官於大同立功正統四年七月辛未其後文教涵濡戎心漸革而內附子孫遂有登科第襲冠裳者惟回回自守其國俗終不肯變結成黨夥為暴閭閻以纍朝之德化而不能訓其頑獷之習所謂食桑椹而懷好音固難言之矣天子無故不殺牛而今之回子終日殺牛為膳宜先禁此則裔風可以漸革唐時赦文每曰十惡五逆火光行劫持刃殺人官典犯贓屠牛鑄錢合造毒藥不在原赦之限可見古法以屠牛為重也若韓滉之治江東以賊非牛酒不嘯結乃禁屠牛以絶其謀此又明識之士所宜豫防者矣西域天文西域人善天文自古已然唐書泥婆羅國頗解推測盈虛兼通厯術事天竺國善天文厯算之術罽賔國遣使進天文經拂菻國其王城門樓中懸一大金稱以金丸十二枚屬於衡端以候日之十二時為一金人其大如人立於側每至一時其金丸輒落鏗然發聲引唱以紀日時毫釐無失蓋不始於回回西洋也元史張思明傳大德初擢左司都事有獻西域稱法思明以惑衆不用王忠文雜集有阿都剌除回回司天少監誥曰天文之學其出於西域者約而能精雖其術不與中國古法同然以其多驗故近代多用之别設官署以掌其職册府元龜載開元七年吐火羅國王上表獻解天文人大慕闍智慧幽深問無不知伏乞天恩唤取問諸教法請置一法堂依本教供養此與今之利瑪竇相似干陀利韓文公廣州記有干陀利注家皆闕按梁書海南諸夷傳干陀利國在南海洲上其俗與林邑扶南略同出斑布吉貝檳榔檳榔特精好為諸國之最梁王僧孺有謝賜干陀利所獻檳榔啓周𢎞正傳有罪應流徙敕以賜干陀利國陳書世祖紀天嘉四年干陀利國遣使獻方物惟宋書孝武帝紀孝建二年斤陀利國遣使獻方物南史同以干為斤疑誤大秦今之佛經皆題云大秦鳩摩羅什譯謂是姚興國號非也大秦乃西域國名後漢書西域𫝊言大秦國在海西地方數千里有四百餘城小國役屬者數十又云天竺國西與大秦通此其國名之偶同而𫝊以為其人民皆長大平正有類中國故謂之大秦固未必然而晉書載記石季龍時有安定人侯子光自稱佛太子謂大秦國來當王小秦國以中國為小秦則益為夸誕矣日知録卷二十九
