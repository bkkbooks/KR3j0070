body:
  text: 日知録卷二十七崑山顧炎武撰漢人注經左氏解經多不得聖人之意元凱注傳必曲為之疏通殆非也鄭康成則不然其於二禮之經及子夏之傳往往駮正如周禮職方氏荆州其浸潁湛注云潁水出陽城宜屬豫州在此非也豫州其浸波溠注云春秋傳曰除道梁溠營軍臨隨則溠宜屬荆州在此非也儀禮喪服篇唯子不報傳曰女子子適人者為其父母期故言不報也注云唯子不報男女同不報爾傳以為主謂女子子似失之矣女子子為祖父母傳曰何以期也不敢降其祖也注云經似在室傳似巳嫁公妾以及士妾為其父母傳曰何以期也妾不得體君得為其父母遂也注云然則女君有以尊降其父母者與春秋之義雖為天王后猶曰吾季姜是言子尊不加於父母此傳似誤矣士虞禮篇用尹祭注云尹祭脯也大夫士祭無云脯者今不言牲號而云尹祭亦記者誤矣於禮記則尤多置駮如檀弓篇齊榖王姬之喪魯莊公為之大功注云當為舅之妻非外祖母也外祖母又小功也季子皋葬其妻犯人之禾注云恃寵虐民非也叔仲衍請繐衰而環絰注云弔服之絰服其舅非月令篇孟夏之月行賞封諸侯注云祭統曰古者於禘也發爵賜服順陽義也於嘗也出田邑發秋政順陰義也今此行賞可也而封諸侯則違於古封諸侯出土地之事於時未可似失之斷薄刑決小罪注云祭統曰草艾則墨謂立秋後也刑無輕於墨者今以純陽之月斷刑決罪與毋有壞墮自相違似非季夏之月命漁師伐蛟取鼉登龜取黿注云四者甲類秋乃堅成周禮曰秋獻龜魚又曰凡取龜用秋時是夏之秋也作月令者以為此秋據周之時也周之八月夏之六月因書於此似誤也孟秋之月毋以封諸侯立大官毋以割地行大使出大幣注云古者於嘗出田邑此其嘗並秋而禁封諸侯割地失其義郊特牲篇季春出火注云言祭社則此是仲春之禮也仲春以火田田止弊火然後獻禽至季春火出而民乃用火今云季春出火乃牧誓社記者誤也郊之用辛也周之始郊日以至注云言日以周郊天之月而至陽氣新用事順之而用辛日此說非也郊天之月而日至魯禮也三王之郊一用夏正魯以無冬至祭天於圓丘之事是以建子之月郊天示先有事也尸陳也注云尸或詁為主此尸神象當從主訓之言陳非也明堂位篇夏后氏尚明水殷尚醴周尚酒注云此皆其時之用耳言尚非君臣未嘗相弒也禮樂刑法政俗未嘗相變也注云春秋時魯三君弒又士之有誄由莊公始婦人髽而弔始於臺駘云君臣未嘗相弒政俗未嘗相變亦近誣矣雜記下或曰主之而附於夫之黨注云妻之黨自主之非也圭子男五寸注云子男執璧作此贊者失之矣此其所駮雖不盡當視杜氏之專阿傳文則不同矣經注之中可謂卓然者乎論語子見南子注孔安國曰行道既非婦人之事而弟子不說與之呪誓義可疑焉此亦漢人疑經而不敢强通者也宋黃震言杜預注左氏獨主左氏何休注公羊獨主公羊惟范寧不私於榖梁而公言三家之失如曰左氏以鬻拳兵諫為愛君是人主可得而脅也以文公納幣為用禮是居喪可得而昏也榖梁以衛輒拒父為尊祖是為子可得而叛也不納子糾為內惡是仇讐可得而容也公羊以祭仲廢君為行權是神器可得而窺也妾母稱夫人為合正是嫡庶可得而齊也又曰左氏艷而富其失也誣榖梁清而婉其失也短公羊辨而裁其失也俗今考集解中糾傳文者得六事莊九年公伐齊納糾傳當可納而不納齊變而後伐故乾時之戰不諱敗惡內也解曰讐者無時而可與通縱納之遲晚又不能全保讐子何足以惡內乎然則乾時之戰不諱敗齊人取子糾殺之皆不迃其文正書其事內之大惡不待貶絶居然顯矣惡內之言傳或失之僖元年公子友帥師敗莒師于麗獲莒拿傳公子友謂莒拿曰吾二人不相說士卒何罪屏左右而相搏解曰江熙曰經書敗莒師而傳云二人相搏則師不戰何以得敗理自不通也子所愼三戰居其一季友令德之人豈當舍三軍之整佻身獨鬬潜刃相害以決勝負者哉此又事之不然傳或失之僖十四年季姬及繒子遇于防使繒子來朝傳遇者同謀也解曰魯女無故逺會諸侯遂得淫通此又事之不然左傳曰繒季姬來寧公怒之以繒子不朝遇于防而使來朝此近合人情襄十一年作三軍傳古者天子六師諸侯一軍作三軍非正也解曰周禮司馬法王六軍大國三軍次國二軍小國一軍總云諸侯一軍又非制也昭十一年楚子䖍誘蔡侯般殺之于申傳夷狄之君誘中國之君而殺之故謹而名之也解曰蔡侯般弒父之賊此人倫之所不容王誅之所必加禮凡在官者殺無赦豈得惡楚子殺般乎若謂夷狄之君不得行禮於中國者理既不通事又不然宣十一年楚人殺陳夏徵舒不言入傳曰明楚之討有罪也似若上下違反不兩立之說哀二年晉趙鞅帥師納衛世子蒯瞶于戚傳納者內弗受也何用弗受也以輒不受也以輒不受父之命受之王父也信父而辭王父則是不尊王父也其弗受以尊王父也解曰江熙曰齊景公廢世子世子還國書篡若靈公廢蒯瞶立輒則蒯瞶不得復稱曩日世子也稱蒯瞶為世子則靈公不命輒審矣此矛楯之喻也然則從王父之言傳似失矣經云納衛世子鄭世子忽復歸于鄭稱世子明正也明正則拒之者非邪以上皆糾正傳文之失宋吳元美作吳縝新唐書糾謬序曰唐人稱杜征南顔祕書為左丘明班孟堅忠臣顔師古本傳今觀其推廣發明二子信有功矣至班左語意乖戾處往往曲為說以會附之安在其為忠也今吳君於歐宋大手筆乃能糾謬纂誤力禆前闕殆晏子所謂獻可替否和而不同者此其忠何如哉然則唐人之論忠也陋矣可謂卓識之言注疏中引書之誤爾雅釋山多草木岵無草木峐疏峐當作屺石戴土謂之崔嵬土戴石為砠毛傳引之互相反鄭康成箋詩采蘩引少牢饋食禮主婦被禓誤作禮記皇矣引左傳鄭公子突使勇而無剛者嘗冦而速去之晉士會若使輕者肆焉其可誤合為一事注周禮大司徒引左傳成二年先王疆理諸侯誤作吾子疆理天下引詩錫之山川土田附庸誤作土地射人引射義明乎其節之志以不失其事則功成而德行立誤作樂記縣士引左傳韓襄為公族大夫誤作韓須注禮記月令引夏小正八月丹鳥羞白鳥誤作九月引詩稱彼兕觥萬夀無疆誤作受福無疆范武子解榖梁傳莊十八年引玉藻天子𤣥冕而朝日於東門之外誤作王制郭景純注爾雅引孟子止或尼之誤作行或尼之引易鞏用黃牛之革固志也誤以革遁二爻合為一傳韋昭國語注公父文伯母賦緑衣之三章誤引四章高誘淮南子注引詩鼉鼓逄逄誤作鼉鼓洋洋孔穎達左傳文十八年正義引孟子栁下惠聖之和者也誤作伊尹聖人之和者也蘇賦書傳伊訓引孟子從流下而忘反謂之流誤作從流上而忘反謂之游朱震易傳井大象引詩維此哲人謂我劬勞誤作知我者謂我劬勞趙汝梅易輯聞蹇大象引孟子我必不仁我必無禮誤作我必不仁不義朱元晦中庸章句引詩后稷之孫實維大王居岐之陽實始翦商誤作至于大王詩集傳閔豫小子引楚辭三公穆穆登降堂只誤作三公揖讓朱子注論語夏曰瑚商曰璉此仍古注之誤記曰夏后氏之四璉殷之六瑚是夏曰璉商曰瑚也享禮注引發氣滿容今儀禮文作發氣焉盈容漢人避惠帝諱盈之字曰滿此當改而不改也孟子有為神農之言注史遷所謂農家者流也仁山金氏曰太史公六家同異無農家班固藝文志分九流始有農家者流集注偶誤未及改楊用修言朱子周易本義引韓非子參之以比物伍之以合虛誤以合虛為合參原其故乃自荀子注中引來不自韓非子采出也按伍所以合參安得謂之合虛乃今韓非子本誤姓氏之誤榖梁傳隱九年天王使南季來聘南氏姓也季字也南非姓姓字衍文桓二年及其大夫孔父孔氏父字諡也父非諡諡字衍文詩白華箋褒似褒人所入之女姒其字也字當作姓此康成之誤孔氏曰褒國姒姓言姒其字者婦人因姓為字也乃是曲為之解耳朱子注論語孟子如太公姜姓吕氏名尚其别姓氏甚明至子夏孔子弟子姓卜名商子禽姓陳名亢子貢姓端木名賜子文姓鬬名榖於菟之類皆以氏為姓齊宣王姓田氏名辟疆則併姓氏而為一矣豈承昔人之誤而未之正與宋自夾漈鄭氏始著氏族略以前人多未講此故博古圖言州吁姓州而徽宗欲倣周人王姬之號故公主謂之帝姬也左傳注隱五年使曼伯與子元潜軍軍其後按子元疑即厲公之字昭十一年申無宇之言曰鄭莊公城櫟而置子元焉使昭公不立杜以為别是一人厲公因之以殺曼伯而取櫟非也蓋莊公在時即以櫟為子元之邑如重耳之蒲夷吾之屈故厲公於出奔之後取之特易而曼伯則為昭公守櫟者也九年公子突請為三覆以敗戎桓五年子元請為二拒以敗王師固即厲公一人而或稱名或稱字耳合三事觀之可以知厲公之才略而又資之以巖邑能無篡國乎十一年立桓公而討寪氏有死者言非有名位之人蓋微者爾如司馬昭族成濟之類解曰欲以弒君之罪加寪氏而復不能正法誅之非也桓二年孔父嘉為司馬杜氏以孔父名而嘉字非也孔父字而嘉其名按家語本姓篇曰宋湣公熙生弗父何何生宋父周周生世子勝勝生正考父考父生孔父嘉其後以孔為氏然則仲尼氏孔正以王父之字而楚成嘉鄭公子嘉皆字子孔亦其證也說文孔久乙久子乙至而得子嘉美之也古人名嘉字子孔鄭康成注士喪禮曰某甫字也若言山甫孔甫甫父通是亦以孔父為字劉原父以為己名其君於上則不得字其臣於下竊意春秋諸侯卒必書名而大夫則命卿稱字無生卒之别劉原父亦云大夫再命稱名三命稱字亦未嘗以名字為尊卑之分桓十一年鄭伯寤生卒葬鄭莊公宋人執鄭祭仲杜氏以仲為名而足字亦拘於例也十七年蔡侯封人卒蔡季自陳歸于蔡名其君於上字其臣於下也昭二十二年劉子單子以王猛居於皇劉子單子以王猛入於王城二十三年尹氏立王子朝二十六年尹氏召伯毛伯以王子朝奔楚爵其臣於上名其君於下也然則孔父當亦其字而學者之疑可以渙然釋矣君之名變也命卿之書字常也重王命亦所以尊君也其弟以千畝之戰生解曰西河界休縣南有地名千畝非也穆侯時晉境不得至介休按史記趙世家周宣王伐戎及千畝戰正義曰括地志云千畝原在晉州嶽陽縣北九十里五年蔡人衛人陳人從王伐鄭解曰王師敗不書不以告非也王師敗不書不可書也為尊者諱六年不以國解曰國君之子不自以本國為名焉有君之子而自名其國者乎謂以列國為名若定公名宋哀公名蔣八年楚人上左君必左無與王遇解曰君楚君也愚謂君謂隋侯王謂楚王兩軍相對隨之左當楚之右言楚師左堅右瑕君當在左以攻楚之右師十三年及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績解曰或稱人或稱師史異辭也愚謂燕獨稱人其君不在師莊十二年蕭叔大心解曰叔蕭大夫名按大心當是其名而叔其字亦非蕭大夫也二十三年蕭叔朝公解曰蕭附庸國叔名按唐書宰相世系表云宋戴公生子衎字樂父裔孫大心平南宫長萬有功封于蕭以為附庸今徐州蕭縣是也其後楚滅蕭十四年莊公之子猶有八人解莊公子傳惟見四人子忽子亹子儀並死獨厲公在八人名字記傳無聞按猶有八人者除此四人之外尚有八人見在也桓十四年鄭伯使其弟語來盟傳稱其字曰子人亦其一也二十二年山嶽則配天解曰得太嶽之權則有配天之大功非也詩曰嵩高維嶽駿極于天言天之高大惟山嶽足以配之二十五年夏六月辛未朔日有食之鼓用牲于社非常也惟正月之朔慝未作日有食之於是乎用幣于社伐鼓于朝周之六月夏之四月所謂正月之朔也然則此其常也而曰非常者何蓋不鼓于朝而鼓于社不用幣而用牲此所以謂之非常禮也杜氏不得其說而曰以長歷推之是年失閏辛未實七月朔非六月也此則咎在司歷不當責其伐鼓矣又按唯正月之朔以下乃昭十七年季平子之言今載於此或恐有誤僖四年昭王南征而不復寡人是問解曰不知其故而問之非也蓋齊侯以為楚罪而問之然昭王五十一年南征不復至今惠王二十一年計三百四十七年此則孔文舉所謂丁零盜蘇武牛羊可并案者也五年太伯不從不從者謂太伯不在太王之側爾史記述此文曰太伯虞仲太王之子也太伯亡去是以不嗣以亡去為不從其義甚明杜氏誤以不從父命為解而後儒遂傳合魯頌之文謂太王有翦商之志太伯不從此與秦檜之言莫須有者何以異哉六年圍新密鄭所以不時城也實密而經云新城故傳釋之以為鄭懼齊而新築城因謂之新城也解曰鄭以非時興土功故齊桓聲其罪以告諸侯夫罪孰大於逃盟者而但責其非時興土功不亦細乎且上文固曰以其逃首止之盟故也則不煩添此一節矣十五年涉河侯車敗解曰秦伯之軍涉河則晉侯車敗非也秦師及韓晉尚未出何得言晉侯車敗當是秦伯之車敗故穆公以為不祥而詰之耳此二句乃事實非卜人之言若下文所云不敗何待則謂晉敗古人用字自不相蒙三敗及韓當依正義引劉炫之說是秦伯之軍三敗及韓在涉河之後此韓在河東故曰冦深矣史記正義引括地志云韓原在同州韓城縣西南非也杜氏解但云韓晉地郤有斟酌十八年秋師還解曰邢留距衛非也狄强而邢弱邢從於狄而伐者也言狄師還則邢可知矣其下年衛人伐邢蓋憚狄之强不敢伐而獨用師于邢也解曰邢不速退所以獨見伐亦非二十二年大司馬固諫曰解曰大司馬固莊公之孫公孫固也非也大司馬即司馬子魚固諫堅辭以諫也隱三年言召大司馬孔父而屬殤公焉桓二年言孔父嘉為司馬知大司馬即司馬也文八年上言殺大司馬公子卬下言司馬握節以死知大司馬即司馬也定十年公若藐固諫曰知固諫之為堅辭以諫也二十四年晉侯求之不獲以綿上為之田蓋之推既隱求之不得未幾而死故以田祿其子爾楚辭九章云思久故之親身兮因縞素而哭之明文公在時之推巳死史記則云聞其入綿上山中於是環綿上山中而封之以為介推田號曰介山然則受此田者何人乎於義有所不通矣三十三年晉人及姜戎敗秦師于殽解曰不同陳故言及非也及者殊姜戎之辭文元年於是閏三月非禮也古人以閏為嵗之餘凡置閏必在十二月之後故曰歸餘於終考經文之書閏月者皆在嵗末文公六年閏月不告月猶朝于廟哀公五年閏月葬齊景公是也而左傳成公十七年襄公九年哀公十五年皆有閏月亦並在嵗末又經傳之文凡閏不言其月者言閏即嵗之終可知也今魯改厯法置閏在三月故為非禮漢書律厯志曰魯厯不正以閏餘一之歲為蔀首是也孟康曰當以閏盡歲為蔀首今失正未盡一歲便以為蔀首也又按漢書高帝紀後九月師古曰秦之厯法應置閏者總致之於歲末蓋取左傳所謂歸餘於終之意何以明之據漢書表及史記漢未改秦厯之前屢書後九月是知厯法故然二年陳侯為衛請成於晉執孔達以說此即上文所謂我辭之者也解謂晉不聽而變計者非三年雨螽于宋解曰宋人以螽死為得天祐喜而來告故書夫隕石鷁退非喜而來告也七年宣子與諸大夫皆患穆嬴且畏逼解曰畏國人以大義來逼已非也畏穆嬴之逼也以君夫人之尊故十三年文子賦四月解曰不欲還晉以傳考之但云成二國不言公復還晉四月之詩當取亂離瘼矣維以告哀之意爾宣十二年宵濟亦終夜有聲解曰言其兵衆將不能用非也言其軍囂無復部伍成六年韓獻子將新中軍且為僕大夫必言僕大夫者以君之親臣故獨令之從公而入寢庭也解未及十六年邲之師荀伯不復從解曰荀林父奔走不復故道非也謂不復從事于楚子在君側敗者一大我不如子子以君免敗者一大恐君之不免也我不如子子之才能以君免也解謂軍大崩為一大及御與車右不同者非襄四年有窮由是遂亡解曰浞因羿室不改有窮之號非也哀元年稱有過澆矣此特承上死于窮門而言以結所引夏訓之文爾十年鄭皇耳帥師侵衛楚令也猶云從楚之盟故也解謂亦兼受楚之敕命者非十一年政將及子子必不能解謂魯次國而為大國之制貢賦必重故憂不堪非也言魯國之政將歸於季孫以一軍之征而供霸國之政令將有所不給則必改作其後四分公室而季氏擇二蓋亦不得已之計叔孫固已豫見之矣十八年塹防門而守之廣里解曰故經書圍非也圍者圍齊也非圍防門也二十一年得罪於王之守臣守臣謂晉侯玉藻諸侯之於天子曰某土之守臣某是也解以為范宣子非二十三年禮為鄰國闕解曰禮諸侯絶期故以鄰國責之非也把孝公晉平公之舅尊同不降當服緦麻三月言鄰國之喪且猶徹樂而況於母之兄弟乎二十八年陳文子謂桓子曰禍將作矣吾其何得對曰得慶氏之木百車于莊文子曰可愼守也已解曰善其不志於貨財非也邵國賢曰此陳氏父子為隱語以相諭也愚謂木者作室之良材莊者國中之要路言將代之執齊國之權三十一年我問師故問齊人用師之故解曰魯以師往非昭五年民食于他解曰魯君與民無異謂仰食于三家非也夫民生於三而君食之今民食於三家而不知有君是昭公無養民之政可知矣八年輿嬖袁克殺馬毁玉以葬解以輿為衆及謂欲以非禮厚葬哀公皆非也輿嬖嬖大夫也言輿者掌君之乘車如晉七輿大夫之類馬陳侯所乘玉陳侯所佩殺馬毁玉不欲使衆人得之十年棄德曠宗謂使其宗廟曠而不祀解曰曠空也未當十二年子産相鄭伯辭於享請免喪而後聽命禮也子産能守喪制晉人不奪皆為合禮解但得其一偏十五年福祚之不登叔父焉在言忘其彛器是福祚之不登惡在其為叔父乎解以為福祚不在叔父當復在誰者非十七年夫子將有異志不君君矣日者人君之表不救日食是有無君之心解以為安君之災者非十八年振除火災振如振衣之振猶火之著於衣振之則去也解以振為棄未當鄭有他竟望走在晉言鄭有他竟之憂也解謂雖與他國為竟者非二十三年先君之力可濟也先君謂周之先王書言昔我先君文王武王是也解以為劉蚠之父獻公非二十七年事君如在國當時諸侯出奔其國即别立一君惟魯不敢故昭公雖在外而意如猶以君禮事之范鞅所言正為此也解以為書公行告公至謬矣三十二年越得歲而吳伐之必受其凶解曰星紀吳越之分也歲星所在其國有福吳先用兵故反受其殃非也吳越雖同星紀而所入宿度不同故歲獨在越定五年卒于房房疑即防字古阜字作􅊟脫其下而為􅀈字漢仙人唐公􅀈碑可證也漢書汝南郡吳房孟康曰本房子國而史記項羽紀封陽武為吳防侯字亦作防哀六年出萊門而告之故解曰魯郭門也按定九年解曰萊門陽關邑門十一年為王孫氏傳終言之亦猶夫槩王奔楚為堂溪氏也解曰改姓欲以辟吳禍非凡邵陸傅三先生之所巳辨者不録考工記注考工記輪人注鄭司農云揱讀如紛容揱參之揱正義曰此蓋有文今檢未得今按司馬相如上林賦云紛溶萷蔘猗柅從風字作萷音蕭宋玉九辨萷橚槮之可哀兮形銷鑠而瘀傷張衡西京賦鬱蓊薆薱橚爽櫹槮即此異文而上文既建而迤崇於軫四尺注鄭司農云迤讀為倚移從風之移正義則曰引司馬相如上林賦弓人居幹之道菑栗不迤則弓不發注同疏其下句亡其上句蓋諸儒疏義不出一人之手爾雅注爾雅釋詁篇梏直也古人以覺為梏禮記緇衣引詩有覺德行作有梏德行注未引釋言篇郵過也注道路所經過是以為郵傳之郵恐非古人以尤為郵詩賓之初筵是曰既醉不知其郵禮記王制郵罰麗于事國語夫郵而效之郵又甚焉家語芾而麛裘投之無郵漢書成帝紀天著變異以顯朕郵五行志后妾當有失節之郵賈誼傳般紛紛其離此郵兮亦夫子之故也谷永傳封氣悖亂咎徵著郵外戚傳班倢妤賦猶被覆載之厚德兮不廢捐於罪郵叙傳譏苑扞偃正諫舉郵皆是過失之義列子魯之君子迷之郵者則又以為過甚之義文選盧諶贈劉琨詩春同尤良用乏驥騄李善引杜氏左傳注郵無恤王良也尤與郵古字通國語注國語之言高高下下者二周太子晉諫靈王曰四嶽佐禹高髙下下疏川道滯鍾水豐物謂不墮高不堙卑順其自然之性也申胥諫吳王曰高高下下以罷民於姑蘇謂臺益增而高池益浚而深以竭民之力也語同而意則異昔在有虞有崇伯鯀據下文堯用殛之於羽山當言有唐而曰有虞者以其事載於虞書至于𤣥月王召范蠡而問焉爾雅釋天九月為𤣥注云魯哀公十六年九月非也當云魯哀公十六年十一月夏之九月楚辭注九章惜往日寧溘死而流亡兮恐禍殃之有再注謂罪及父母與親屬者非也蓋懷王以不聽屈原而召秦禍今頃襄王復聽上官大夫之譛而遷之江南一身不足惜其如社稷何史記所云楚日以削數十年竟為秦所滅即原所謂禍殃之有再者也大招青春受謝注以謝為去未明按古人讀謝為序儀禮鄉射禮豫則鈎楹內注豫讀如成周宣榭之榭周禮作序孟子序者射也謂四時之序終則有始而春受之爾九思思丁文兮聖明哲哀平差兮迷謬愚吕傅舉兮殷周興忌噽專兮郢吳虛此援古賢不肖君臣各二丁謂商宗武丁舉傅說者也注以丁為當非荀子注荀子案角鹿埵隴種東籠而退耳注云其義未詳蓋皆摧敗披靡之貌新序第七卷亦言隴種而退今考之舊唐書竇軌傳高祖謂軌曰公之入蜀車騎驃騎從者二十人為公所斬略盡我隴種車騎未足給公北史李穆傳芒山之戰周文帝馬中流矢驚逸墜地穆下馬以䇿擊周文背罵曰籠凍軍士爾曹主何在爾獨住此蓋周隋時人尚有此語淮南子注淮南子詮言訓羿死於桃棓注云棓大杖以桃木為之以擊殺羿自是以來鬼畏桃也說山訓羿死桃部不給射注云桃棓地名按部即棓字一人注書而前後不同若此史記注秦始皇紀五百石以下不臨遷勿奪爵五百石以下秩卑任淺故但遷而不奪爵其六百石以上之不臨者亦遷而不奪爵也史文簡古兼二事為一條山鬼固不過知一歲事也其時已秋歲將盡矣今年不驗則不驗矣山鬼豈能知來年之事哉退言曰祖龍者人之先也謂稱祖乃亡者之辭無與我也皆惡言死之意始皇崩於沙邱乃又從井陘抵九原今大同邊外然後從直道以至咸陽回繞三四千里而歸者蓋始皇先使蒙恬通道自九原抵甘泉塹山堙谷千八百里若徑歸咸陽不果行游恐人疑揣故載輼輬而北行但欲以欺天下雖君父之尸臭腐車中而不顧亦殘忍無人心之極矣項羽紀搏牛之虻不可以破蟣蝨言虻之大者能搏牛而不能破蝨喻巨鹿城小而堅秦不能卒破鴻門之會沛公但稱羽為將軍而樊噲則稱大王其時羽未王也張良曰誰為大王畫此計者其時沛公亦未王也此皆臣下尊奉之辭史家因而書之今百世之下辭氣宛然如見又如黃歇上秦昭王書先帝文王武王其時秦亦未帝必以書法裁之此不達古今者矣背關懷楚謂舍關中形勝之地而都彭城如師古之解乃背約非背關也古人謂倍為二孟子卿祿二大夫秦得百二言百倍也齊得十二言十倍也孝文紀天下人民未有嗛志與樂毅傳先王以為慊於志同皆厭足之意荀子惆然不慊又曰由俗謂之道盡嗛也又曰嚮萬物之美而不能嗛也又曰不自嗛其行者言濫過戰國䇿齊桓公夜半不嗛又曰膳啖之嗛於口並是慊字而誤從口大學此之謂自謙亦慊字而誤從言吕氏春秋茍可以傔劑貌辨者吾無辭為也亦慊字而誤從人三年復晉陽中都民三歲正義曰晉陽故城在汾州平遙縣西南此當言中都故城在汾州平遙縣西南言晉陽誤也然此注已見卷首中都下文帝前后死竇氏妾也諸侯皆同姓謂無甥舅之國可娶索隱解非漢書無此句十一月晦日有食之漢書多有食晦者蓋署朔參差之失其云十二月望日又食此當作月耳民或祝詛上以相約結而後相謾謂先共祝詛己而欺負乃相告言也故詔令若此者勿聽治注並非孝武紀其後三年有司言元宜以天瑞命不宜以一二數一元曰建元二元以長星曰元光三元以郊得角獸一曰元狩云本封禪書是建元元光之號皆自後追為之而武帝即位之初亦但如文景之元尚未有年號也天官書疾其對國謂所對之國如漢書五行志所謂歲在夀星其衝降婁左氏傳襄二十八年歲棄其次而旅於明年之次以害鳥帑周楚惡之杜氏解謂失次於北禍衝在南者也四始者候之日謂歲始也冬至日也臘明日也立春日也正義專指正月旦非也星隕如雨乃宋閔公之五年言襄公者史文之誤正義以僖公十五年隕石于宋五注之非也封禪書成山斗入海謂斜曲入之如斗柄然古人語也胸奴傳漢亦棄上谷之斗辟縣造陽地豫胸奴又云胸奴有斗入漢地直張掖郡各以勝日駕車辟惡鬼勝日謂五行相克之日也索隱非天子病鼎湖甚湖當作胡鼎胡宫名漢書揚雄傳南至宜春鼎胡御宿昆吾是也三輔黃圖宜春宮在長安城東南杜縣東近下杜御宿苑在長安城南御宿川則鼎胡當在其中間也故卒起幸甘泉而行右內史界索隱以為湖縣在今之閺鄉絶逺且無行宫唯受命而帝者心知其意而合德焉按此即謂武帝服䖍以為高祖非奉車子侯暴病一日死死於海上非死於泰山下也索隱所引新論之言殊謬河渠書引洛水至商顔下服䖍曰顔音崖崖當作岸漢書古今人表屠岸賈作屠顔賈是也師古注謂山領象人之顔額者非其指商山者尤非劉攽已辨之衛世家頃侯厚賂周夷王夷王命衛為侯是頃侯以前之稱伯者乃伯子男之伯也索隱以為方伯之伯雖有詩序旄邱責衛伯之文可据鄭氏箋曰衛康叔封爵稱侯今曰伯者時為州伯周禮九命作伯然非太史公意也且古亦無以方伯之伯而繫諡者周公召公二伯也其諡則曰文公康公楚世家武王使隨人請王室尊吾號王弗聽還報楚楚王怒乃自立為楚武王乃自立為一句為楚武王為一句蓋言自立為王後諡為武王耳古文簡故連屬言之如管蔡世家楚公子圍弒其王郟敖而自立為靈王衛世家鄭世家皆云楚公子棄疾弒靈王自立為平王司馬穰苴傳至常曾孫和因自立為齊威王又如韓世家晉作六卿而韓厥在一卿之位號為獻子與此文勢正同劉炫云號為武武非諡也此說鑿矣項梁立楚懷王孫心為楚懷王尉他自立為南越武帝此後世事爾西起秦患北絶齊交則兩國之兵必至此兩國即謂秦齊也索隱以為韓魏非也越世家乃發習流二千習流謂士卒中之善泅者别為一軍索隱乃曰流放之罪人非也庾信哀江南賦彼鋸牙而鉤瓜又巡江而習流不者且得罪言欲兵之趙世家吾有所見子晣也晣者分明之意易大有象傳明辨晢也即此字音折又音制索隱誤以為鄭子晳之晳魏世家王之使者出過而惡安陵氏於秦安陵氏魏之别封蓋魏王之使過安陵有所不快而毁之於秦也孔子世家余低回留之不能去云按玉篇彳部彽除饑切彽徊猶徘徊也然則字本當作彽徊省為低回耳今讀為高低之低失之楚辭九章抽思低佪夷猶宿北姑兮低一作俳綘侯世家此不足君所乎謂此豈不滿君意乎蓋必條侯辭色之間露其不平之意故帝有此言而條侯免冠謝也建德代侯坐酎金不善元鼎五年有罪國除當云元鼎五年坐酎金不善國除衍有罪二字梁孝王世家乘布車謂微服而行使人不知耳無降服自比喪人之意伯夷傳其重若彼謂俗人之重富貴也其輕若此謂清士之輕富貴也管晏傳方晏子伏莊公尸哭之成禮然後去豈所謂見義不為無勇者邪此言晏子之勇於為義也古人著書引成語而反其意者多矣左傳僖九年君子曰詩所謂白圭之玷尚可磨也斯言之玷不可為也荀息有焉言荀息之能不玷其言也後人持論過高以荀息贊獻公立少為失言以晏子不討崔杼為無勇非左氏太史公之指孫臏傳重射謂以千金射也索隱解以為好射非批亢搗虛索隱曰亢言敵人相亢拒也非也此與劉敬傳扼其骯之骯同張晏曰喉嚨也下文所謂據其街路是也以敵人所不及備故謂之虛蘇秦傳前有樓闕軒轅當作軒縣周禮小胥正樂縣之位王宫縣諸侯軒縣注謂軒縣者闕其南面殊而走說文繫傳曰斷絶分析曰殊謂斷支體而未及死淮南王傳太子即自剄不殊樗里子傳今伐蒲入於魏衛必折而從之此文誤當依索隱所引戰國䇿文為正甘茂傳其居於秦纍世重矣謂歷事惠王武王昭王孟子荀卿傳始也濫耳濫者泛而無節之謂猶莊子之洸洋自恣也注引濫觴之義以為初者非儻亦有牛鼎之意乎謂伊尹負鼎百里奚飯牛之意藉此說以干時非有仲尼孟子守正不阿之論也孟嘗君傳嬰卒諡為靖郭君以號為諡猶之以氏為姓皆漢初時人語也吕不韋傳諡為帝太后與此同王褒賦幸得諡為洞簫兮亦是作號字用平原君傳非以君為有功也而以國人無勳當作一句讀言非國人無功而不封君獨有功而封也信陵君傳如姬資之三年謂以資財求客報仇徒豪舉耳謂特貌為豪傑舉動非真欲求有用之士也蔡澤傳豈道德之符而聖人所謂吉祥善事者與豈下當有非字樂毅傳室有語不相盡以告鄰里謂一室之中有不和之語乃不自相規勸而告之鄰里此為情之薄矣正義謂必告者非魯仲連傳鄒魯之臣生則不得事養死則不得賻襚謂二國貧小生死之禮不備索隱謂君弱臣强者非楚攻齊之南陽南陽者泰山之陽孟子一戰勝齊遂有南陽賈生傳斡棄周鼎兮而寶康瓠應劭曰斡音管管轉也斡流而遷兮或推而還索隱曰斡音烏活反斡轉也義同而音異今說文云斡蠡柄也從斗倝聲揚雄杜林說皆以為軺車輪斡烏括切按倝字古案切說文既云聲則不得為烏括切矣顔師古匡謬正俗云聲類字林並音管賈誼服鳥賦云斡流而遷張華勵志詩云大儀斡運皆為轉也楚辭云管維焉繫此義與斡同字即為管故知斡管二音不殊近代流俗音烏括切非也漢書食貨志浮食竒民欲擅斡山海之貨師古曰斡謂主領也讀與管同張敖傳要之置置驛也如曹相國世家取祁善置田橫傳至尸鄉置之置漢書馮奉世傳燔燒置亭淮隂侯傳容容無所倚容容即顒顒字盧綰傳胸奴以為東胡盧王封之為東胡王也以其姓盧故曰東胡盧王田榮傳榮弟橫收齊散兵得數萬人反擊項羽於城陽正義以為濮州雷澤縣非也漢書城陽郡治莒史記吕后紀言齊王乃上陽城之郡孝文紀言以齊劇郡立朱虛侯章為城陽王而淮隂侯傳言擊殺龍且於濰水上齊王廣亡去信遂追北至城陽皆此地按戰國䇿貂勃對襄王曰昔王不能守王之社稷走而之城陽之山中安平君以敝卒七千禽敵反千里之齊當是時闔城陽而王天下莫之能止然為棧道木閣而迎王與后於城陽之山中王乃復反子臨百姓則古齊時已名城陽矣無不善畫者莫能圖謂以橫兄弟之賢而不能存齊陸賈傳尉他乃蹶然起坐謝陸生坐者跪也數見不鮮意必秦時人語猶今人所謂常來之客不殺雞也賈乃引此以為父之於子亦不欲久慁當時之薄俗可知矣袁盎𫝊調為隴西都尉此今日調官字所本調有更易之意猶琴瑟之更張乃調也張釋之傳十年不得調如淳訓為選未盡扁鵲傳醫之所病病道少言醫之所患患用其道者少即下文六者是也倉公傳臣意年盡三年年三十九歲也按徐廣注高后八年意年二十六當作年盡十三年年三十九歲也脫十字孝文本紀十三年除肉刑武安傳與長孺共一老秃翁謂爾我皆垂暮之年無所顧惜當直言以決此事也索隱以為共治一老秃翁者非因胸奴犯塞而有衛霍之功故序胸奴於衛將軍驃騎傳之前南越尉他傳發兵守要害處按漢書西南夷傳注師古曰要害者在我為要於敵為害也此解未盡要害謂攻守必爭之地我可以害彼彼可以害我謂之害人身亦有要害素問岐伯對黃帝曰脈有要害後漢書來歙傳中臣要害司馬相如傳其為禍也不亦難矣衍亦字汲黯傳愚民安知為一句鄭當時傳高祖令諸故項籍臣名籍謂奏事有涉項王者必斥其名曰項籍也酷吏傳尸亡去歸葬言其家人竊載尸而逃也謂尸能自飛去怪矣游俠傳近世延陵孟嘗春申平原信陵之徒皆因王者親屬藉於有土卿相之富厚延陵謂季札以其遍游上國與名卿相結解千金之劍而繫冡樹有俠士之風也貨殖傳廉吏久久更富廉賈歸富又曰貪賈三之廉賈五之夫放於利而行多怨廉者知取知豫無求多於人義然後取人不厭其取是以取之雖少而久久更富廉者之所得乃有其五也注非洛陽街居在齊秦楚趙之中說文街四通道鹽鐵論燕之涿薊趙之邯鄲魏之溫軹韓之滎陽齊之臨淄楚之宛邱鄭之陽翟二周之三川皆為天下名都居五諸侯之衢跨街衝之路盡椎埋去就與時俯仰椎埋當是推移二字之誤太史公自序申吕肖矣肖乃削字脫其旁耳與孟子魯之削也滋甚義同徐廣注以為痟者非漢書注漢書叙例顔師古撰其所列姓氏鄧展文穎下並云魏建安中建安乃漢獻帝年號雖政出曹氏不得遽名以魏高帝紀諸侯罷戲下各就國注引一說云時從項羽在戲水之上此說為是蓋羽入咸陽而諸侯自留軍戲下爾他處固有以戲為麾者但云罷麾下似不成文不因其幾而遂取之訓幾為危未當幾即機字如書若虞機張之機遣詣相國府署行義年謂書其平日為人之實迹如昭帝紀元鳯元年三月賜郡國所選有行義者涿郡韓福等五人帛宣帝紀令郡國舉孝弟有行義聞於鄉里者各一人是也劉邠改義為儀謂若今團貌非武帝紀元封元年詔用事八神謂東巡海上而祠八神也即封禪書所謂八神一曰天主祠天齊之屬文穎以為祭太一開八通之鬼道者非天漢元年秋閉城門大搜與二年及征和元年之大搜同皆搜索奸人也非踰侈者也昭帝紀三輔太常郡得以叔即菽字粟當賦漢時田租本是叔粟今并口算雜征之用錢者皆令以叔粟當之其獨行於三輔太常郡者不獨為榖賤傷農亦以減漕三百萬石慮儲偫之乏也元帝紀永光元年秋罷如淳曰當言罷某官某事爛脫失之是也左傳成二年夏有亦是闕文杜氏解曰失新築戰事建昭三年戊巳校尉師古曰戊巳校尉者鎮安西域無常治處亦猶甲乙丙丁庚辛壬癸各有正位而戊巳四季寄王故以名官也時有戊校尉又有巳校尉一說戊巳位在中央今所置校尉處三十六國之中故曰戊巳也百官公卿表注亦載二說漢官儀曰戊巳中央鎮覆四方又開渠播種以為厭勝故稱戊巳焉按馬融廣成頌曰校隊案部前後有屯甲乙相伍戊巳為堅則不獨西域雖平時校獵亦有部伍也又如其甲乙八名皆有而西域則但置此戊巳二官爾王莽傳右庚刻木校尉前丙耀金都尉其所名或有所本車師傳置戊巳校尉屯田居車師故地烏孫傳漢徙巳校屯姑墨而後漢書耿恭傳恭為戊校尉屯後王部金蒲城謁者關寵為巳校尉屯前王栁中城故師古以為無常治哀帝紀非赦令也皆蠲除之猶成帝紀言其吏也遷二等同一文法蓋赦令不可復反故但此一事不蠲除也王子侯表瓡節侯息城陽頃王子師古曰瓡即瓠字也又音孤地理志北海郡下瓡侯國師古曰瓡即執字二音不同而功臣表瓡囁侯杅者師古曰瓡狐同河東郡下作狐囁又未知即此一字否也百官表長水校尉掌長水宣曲胡騎師古曰長水胡名也宣曲觀名胡騎之屯於宣曲者按長水非胡名也郊祀志霸産豐潦涇渭長水以近咸陽盡得比山川祠史記索隱曰百官表有長水校尉沈約宋書云營近長水因名水經云長水出白鹿原今之荆溪水是也元鳯四年蒲侯蘇昌為太常十一年坐籍霍山書泄祕書兔師古曰以祕書借霍山非也蓋籍沒霍山之書中有祕記當密奏之而輒以示人故以宣泄罪之耳山本傳言山坐寫祕書顯為上書獻城西第入馬千匹以贖山罪若山之祕書從昌借之昌之罪將不止免官而元康四年昌復為太常薄責昌而厚繩山非法之平也且如顔說當云坐借霍山祕書免足矣何用文之重辭之復乎建昭三年七月戊辰衛尉李延夀為御史大夫一姓繁師古曰繁音蒲元反陳湯傳御史大夫繁延夀師古曰繁音蒲胡反蕭望之傳師古音婆谷永傳師古音蒲河反蒲元則音盤蒲胡則音蒲蒲河則音婆三音互見並未歸一然繁字似有蒲音左傳定四年殷民七族繁氏繁音步何反儀禮卿射禮注今文皮樹為繁豎皮古音婆史記張丞相世家丞相司直繁君索隱曰繁音婆文選繁休伯吕向音步何反則繁之音婆相傳久矣廣韻八戈部中有繁字注曰音薄波切姓也又音煩切此字或作縏玉篇搬字亦音步波步丹二律厯志夀王候課比三年下謂課居下也下文言竟以下吏乃是下獄師古注非食貨志學六甲五方書計之事六甲者四時六十甲子之類五方者九州嶽瀆列國之名書者六書計者九數瓉說未盡國亡捐瘠者瘠古胔字謂死而不葬者也婁敬傳徒見羸胔老弱史記作瘠後漢書彭城靖王恭傳毁胔過禮大戴禮羸醜以胔皆是瘠字則此瘠乃胔字之誤當從孟康之說蘇林音漬是課得榖皆多其旁田畝一斛以上蓋壖地乃久不耕之地地力有餘其收必多所以作代田之法也天下大氐無慮皆鑄金錢矣無慮猶云無算言多也布貨十品師古曰布即錢耳謂之布者言其分布流行也按本文錢布自是二品而下文復載改作貨布之制安得謂布即錢乎莽傳曰貨布長二寸五分廣一寸直貨錢二十五今貨布見存上狹下廣而岐其下中有一孔師古當日或未之見也郊祀志文公獲若石云于陳倉北坂城祠之其神或嵗不至或嵗數來來常以夜光輝若流星從東方來集於祠城若雄雞其聲殷云野雞夜鳴如淳曰野雞雉也吕后名雉改曰野雞五行志天水冀南山大石鳴聲隆隆如雷有頃止壄野同雞皆鳴師古曰雉也竊謂野雞者野中之雞耳注拘於荀悅云諱雉之字曰野雞夫諱恆曰常諱啓曰開史固有言常言開者豈必其皆為恆與啓乎又此文本史記封禪書其上文云有雉登鼎耳雊其下文云公孫卿言見仙人跡緱氏城上有物如雉往來城上又云縱逺方竒獸飛禽及白雉諸物漢書同此二條並無所諱而漢書地理志南陽郡有雉縣江夏郡有下雉縣五行志王音等上言雉者聽察先聞雷聲則漢時未嘗諱雉也木寓龍一駟木寓車馬一駟李竒曰寓寄也寄生龍形於木此說恐非古文偶寓通用偶亦音寓木寓木偶也史記孝武紀作木偶馬而韓延夀傳曰賣偶車馬下里僞物者棄之市道古人用以事神及送死皆木偶人木偶馬魯相史晨孔廟後碑云飭治桐車馬于瀆上今人代以紙人紙馬又史記殷本紀帝武乙無道為偶人謂之天神索隱曰偶音寓酷吏傳胸奴至為偶人象郅都索隱曰漢書作寓人可以證寓之為偶矣五行志吳王濞封有四郡五十餘城四當作三古四字積畫以成與三易混猶左傳陳蔡不羹三國之君為四國也隱公三年二月己巳日有食之其後鄭獲魯隱按狐壤之戰事在其前乃隱公為太子時此劉向誤說班史因之不必曲為之解溝洫志內史稻田租挈重挈偏也說文有觢字注云角一俯一仰意同楚元王傳孫卿師古曰荀况漢以避宣帝諱改之按漢人不避嫌名荀之為孫如孟卯之為芒卯司徒之為申徒語音之轉也上數欲用向為九卿輒不為王氏居位者及丞相御史所持故終不遷衍一不字當云輒為王氏居位者及丞相御史所持持者挾制之義而非挾助之解也季布傳難近謂令人畏而逺之師古以近為近天子為大臣非也樊噲傳項羽既饗軍士中酒中酒謂酒半也吕氏春秋謂之中飲晉靈公發酒於宣孟宣孟知之中飲而出戰國策楚王觴張儀中飲再拜而請凡事之半曰中左傳昭公二十八年中置謂饋之半也上云饋之始至下云饋之畢史記河渠書中作而覺謂工之半也吕氏春秋中關音彎而止謂關弓弦正半而止也中酒猶今人言半席師古解以不醉不醒故謂之中失之矣司馬相如傳酒中樂酣師古曰酒中飲酒中半也一人注書前後不同淮南厲王傳命從者刑之史記作剄之當從剄音相近而訛下文太子自刑不殊又云王自刑殺史記亦皆作剄也孝先自告反告除其罪按史記無下告字是衍文師古曲為之說萬石君傳內史坐車中自如固當者反言之也言貴而驕人當如此乎賈誼傳上數爽其憂謂秦之所憂者在孤立而漢之所憂者在諸侯漢初之所憂者在異姓而今之所憂者在同姓張敖不反故添一貫高為相句古人文字之密植遺腹朝委裘而天下不亂必古有是語所謂君薨而世子生者也季桓子命其臣正常曰南孺子之子男也則以告而立之遺腹之為嗣自人君以至於大夫一也鄒陽傳宋任子冉之計囚墨翟史記作子罕文穎曰子冉子罕也按子罕是魯襄公時人墨翟在孔子之後子冉當别是一人秦皇帝任中庶子蒙之言師古曰蒙者庶子名也今流俗本義下輒加恬字非也按史記秦王寵臣中庶子蒙嘉為先言於秦王非蒙恬蒙亦非名傳文脫一嘉字趙王彭祖傳椎埋即掘冢也新葬者謂之埋師古曰椎殺人而埋之恐非李廣傳彌節白檀彌與弭同司馬相如傳於是楚王乃弭節俳佪注郭璞曰弭猶低也節所杖信節也陵當發出塞乃詔疆弩都尉令迎軍言當俟陵出塞之後乃詔博德迎之蘇武傳陵惡自賜武使其妻賜武牛羊數十頭今人送物與人而託其名於妻者往往有之其謂之賜者陵在胸奴已立為王故也云惡自賜武蓋嫌於自居其名耳師古注謂若示已於胸奴中富饒以夸武者非司馬相如傳子虛之賦乃游梁時作當是侈梁王田獵之事而為言耳後更為楚稱齊難而歸之天子則非當日之本文矣若但如今所載子虛之言不成一篇結構張安世傳無子子安世小男彭祖謂賀無見存之子而以安世小男為子其蚤死之子别有一子乃下文所謂孤孫霸非無子也杜周傳吏所增加十有餘萬謂辭外株連之人張騫傳竟不能得月氏要領古人上衣下裳舉裳者執要舉衣者執領廣陵王胥傳女須泣曰孝武帝下我言孝武帝降慿其身而言千里馬兮駐待路言神魂飛揚將乘此馬而逺適千里之外張晏注以為驛馬非嚴助傳臣聞道路言閩越王弟甲弒而殺之即下文所云會閩越王弟餘善殺王以降者也當淮南王上書之時不知其名故謂之甲猶云某甲耳師古曰甲者閩越王弟之名非朱買臣傳買臣入家中即會稽邸中也邸如今京師之會館柬方朔傳以劍割肉而去之裴松之注魏志云古人謂藏為去蘇武傳掘野鼠去􅋄實而食之師古曰去謂藏之也楊惲傳廷尉當惲大逆無道者以書中有君父送終之語梅福傳諸侯奪宗如帝摰立不善崩而堯自唐侯升為天子是也梅福傳贊殷鑒不逺夏后所聞謂福引吕霍上官之事以規切王氏師古注謂封孔子後非霍光傳張章等言霍氏皆讐有功晉灼曰讐等也非也此如詩無言不讐之讐詩正義相對謂之讐左傳僖五年無喪而戚憂必讐焉注讐猶對也律歷志廣延宣問以理星度未能讐也鄭德曰相應為讐也郊祀志其方盡多不讐伍被傳贊忠不終而詐讐魏其傳上使御史簿責嬰所言灌夫頗不讐趙充國傳微將軍誰不樂此者言豈獨將軍茍安貪便人人皆欲為之師古注以微字屬上句讀非辛慶忌傳衛青在位淮南寢謀謂伍被言大將軍數將習兵未易當又言雖古名將不過是為淮南所憚于定國傳萬方之事大録于君按今所傳王肅注舜典納于大麓曰麓録也納舜使大録萬機之政蓋西京時已有此解故詔書用之章帝即位以太傳趙熹太尉牟融並録尚書事于定國傳贊哀鰥哲獄毛詩禮記凡鰥寡之鰥皆作矜此亦矜之誤哲則折之誤也師古以傳中有哀鰥寡語遂以釋此文而以哲為明哲之哲龔勝傳勿隨俗動吾冢種柏作祠堂師古曰多設器備恐被發掘為動吾冢非也古人族葬勝必已自有墓若隨俗人之意更於冢上種柏作祠堂則是動吾冢也蓋以朝代遷革一切飾終之禮俱不欲用韋賢傳嵗月其徂年其逮耉於昔君子庶顯于後孟自言年老慕昔之君子垂令名于後欲王信老成之言而用之也在鄒詩曰既耉且陋則此為孟之自述可知下從者與載送之下如袁盎傳下趙談之下與之共載復送至其家也尹翁歸傳高至於死高謂罪名之上者猶言上刑王尊傳猥被共工之大惡謂御史大夫劾奏尊以靖言庸違象共滔天蕭育傳鄠名賊梁子政名賊猶言名王謂賊之有名號者也師古曰名賊者自顯其名無所避匿言其彊也非宣元六王傳贊貪人敗類大雅桑柔之詩師古注誤以為蕩張禹傳兩人皆聞知各自得也崇以禹為親之宣以禹為敬之故各自得翟方進傳萬嵗之期近愼朝暮謂宫車晏駕故下文即賁麗以為可移於相也揚雄傳不知伯僑周何别也謂不知是何王之别子冠倫魁能能字當屬上句言為能臣之首史書之文中有誤字要當旁證以求其是不必曲為之說如此傳解謿篇中欲談者宛舌而固聲固乃同之誤東方朔割名於細君名乃炙之誤有文選可證而必欲訓之為固為名此小顔之癖也顔氏家訓云榖梁傳孟勞者魯之寶刀也僖元年有姜仲嶽讀刀為力謂公子左右姓孟名勞多力之人為國所寶與吾苦諍清河郡守邢峙當世碩儒助吾證之赧然而服此傳割名之解得無類之儒林傳弟子行雖不備而至於大夫郎掌故以百數謂不必皆有行誼而多顯官貨殖傳為平陵石氏持錢持錢猶今人言掌財也如氏苴氏皆平陵富人而石訾亦次之游俠傳酒市趙君都賈子光服䖍曰酒市中人也非也按王尊傳長安宿豪大猾箭張禁酒趙放晉灼曰此二人作箭作酒之家今此上文有箭張回即張禁也君都亦即放也名偶異耳佞幸傳朕惟噬膚之恩未忍是取易暌六五厥宗噬膚言貴戚之卿恩未忍絶胸奴傳孤僨之君僨如左傳張脉僨興之僨倉公傳所謂病得之欲男子而不可得也衛律為單于謀穿井築城治樓以藏榖與秦人守之師古曰秦時有人亡入胸奴者今其子孫尚號秦人非也彼時胸奴謂中國人為秦人猶今言漢人耳西域傳胸奴縳馬前後足置城下馳言秦人我丐若馬師古曰謂中國人為秦人習言故也是矣其言與秦人守者胸奴以轉徙為業不習守禦凡穿井築城之事非秦人不能為也大宛傳聞宛城中新得秦人知穿井亦謂中國人也去胡來王唐兜師古曰為其去胡而來降漢故以為王號非也西域傳婼羌國王號去胡來王臣知父呼韓邪單于蒙無量之恩其時尚未更名當曰臣囊知牙斯作史者從其後更名録之耳故印已壞乃云因上書求故印者求更鑄如故印之式去新字而言璽南粵傳朕高皇帝側室之子師古曰言非正嫡所生非也春秋左氏桓公二年傳曰卿置側室杜解側室衆子也文公十二年傳曰趙有側室曰穿西域傳康居國王柬羈事胸奴言不純臣但羈縻事之與烏孫羈屬意同當用彼注刪此注宜給足不可乏當作可不乏外戚傳常與死為伍言濱於死其條刺史大長秋來白之史當作使丞知是何等兒也言藏之以辨是男非女師古注非奈何令長信得聞之謂何道令太后聞之終沒至乃配食於左座謂合葬渭陵配食元帝王莽傳治者掌冦大夫陳成自免去官蓋先幾而去自稱廢漢大將軍者自稱漢大將軍也下文云亡漢將軍同此意自莽言謂之廢漢亡漢耳會省戶下省戶即禁門也蔡雍獨斷曰禁中者門户有禁非侍御者不得入故曰禁中孝元皇后父大司馬陽平侯名禁當時避之故曰省中右庚刻木校尉刻克同取金克木叙傳劉氏承堯之後氏族之世著乎春秋左氏昭公二十九年傳陶唐氏既衰其後有劉纍者學擾龍于豢龍氏以事孔甲師古引士會奔秦其處者為劉氏則又其苗裔也雕落洪支謂中山東平之獄服䖍以為廢退王氏非後漢書注光武紀今此誰賊而馳騖擊之乎注誰謂未有主也非言此何等賊不足煩主上親擊也敢拘制不還以賣人法從事言比略賣人口律罪之重其法也質帝紀先能通經者各令隨家法注儒生為詩者謂之詩家為禮者謂之禮家非也謂如詩有齊魯韓毛通齊詩者自以為齊詩教授通魯詩者自以為魯詩教授韓毛及五經皆然乃所謂家法耳魯丕傳言法異者各令自說師法徐防傳言伏見太學試博士弟子皆以意說不循今文誤作修家法是也左雄傳注儒有一家之學故稱家此得之矣安帝紀永初元年九月癸酉調揚州五郡租米贍給東郡濟陰陳留梁國下邳山陽注五郡謂九江丹陽廬江吳郡豫章也揚州領六郡會稽最逺蓋不調也按順帝紀永建四年分會稽為吳郡安帝時未有吳郡止五郡無可疑者注非馮異遺李軼書茍令長安尚可扶助延期嵗月疏不間親逺不踰近季文豈能居一隅哉言季文於更始為親近之臣當在朝秉政豈得居此一隅注失其指反以為疏逺非景丹傳邯鄲將帥數言我發漁陽上谷兵我聊應言然謂邯鄲將帥有此言我亦聊以此言應之不能必二郡之果來也本文自明注乃謂王郎欲發之謬矣鮑永傳太守趙興歎曰我受漢茅土不能立節而鮑永死之豈可害其子也永字誤當作鮑宣楊厚傳陰臣近戚妃黨當受禍陰臣謂婦人下文宋阿母是也注陰私也非郎顗傳思過念咎務消祗悔注祗大也非也按易復初九無祗悔九家本作多古人多祗二字通用論語多見其不知量也正義曰古人多祗同音左傳襄二十九年多見疏也服䖍本作祗朱浮傳自損盛時損當作捐賈逵傳鄉人有所計爭輒令祝少賓司馬均注云祝詛也爭曲直者輒言敢祝少賓乎非也言敢于少賓之前發誓乎事之如神明也古人文簡爾鍾離意傳光武得奏以見霸侯霸見當作視古示字作視謂以意奏示霸也張禹傳祖父况為常山關長會赤眉攻關城按前漢志常山郡之縣十八其十二曰關後漢志無此縣世祖所省也其地當即今之故關建武十五年徙鴈門代郡上谷三郡民置常山關居庸關以柬梁節王暢傳今陛下為臣收汚天下收汚猶左氏傳所謂國君含垢李雲傳當有黃精代見注黃精謂魏氏將興也按雲本不知是魏故下言陳項虞回許氏爾黃之代赤自是五運之序王莽亦自以為祖黃帝也曹騰傳潁川堂溪趙典等按蔡雍傳作五官中郎將堂溪典注堂溪姓也此文衍一趙字趙典本傳是成都人非潁川靈帝初官衛尉卒又黨錮傳云唯趙典名見而已是後漢有兩趙典文選注阮嗣宗詠懷詩西游咸陽中趙李相經過顔延年注趙漢成帝后趙飛燕也李武帝李夫人也按成帝時自有趙李漢書谷永傳言趙李從微賤專寵外戚傳班倢妤進侍者李平平得幸亦為倢妤叙傳班倢妤供養東宫進侍者李平為倢妤而趙飛燕為皇后自大將軍王鳯薨後富平定陵侯張放淳于長等始愛幸出為微行行則同輿執轡入侍禁中設宴飲之會及趙李諸侍中皆引滿舉白談笑大噱史傳明白如此而以為武帝之李夫人何哉陶淵明詩注西溪叢語陶淵明詩云聞有田子春節義為士雄漢書燕王劉澤傳云高后時齊人田生游乏資以書干澤澤大悅之用金二百斤為田生夀田生如長安求事幸謁者張卿諷高后立澤為琅邪王晉灼曰楚漢春秋云田生字子春非也此詩上文云辭家夙嚴駕當往至無終下文云生有高世名既沒傳無窮其為田疇可知矣三國志田疇字子泰右北平無終人也泰一作春若田生游說取金之人何得有高世之名而為靖節之所慕乎遂盡介然分終死歸田里是用方望辭隗囂書雖懷介然之節欲潔去就之分多謝綺與角精爽今何如多謝者非一言之所能盡今人亦有此語漢書趙廣漢為京兆尹常記召湖都亭長西至界上界上亭長戲曰為我多問趙君注多問者言殷勤若今人千萬問訊也李太白詩注誰憐李飛將白首沒三邉昔人譏其以飛將軍翦截為飛將者然古人自有此語後漢書班勇傳班將能保北鹵不為邉害乎後魏唐永正光中為北地太守數與賊戰未嘗敗北時人語曰莫陸梁恐爾逢唐將並以將軍為將海上碧雲斷單于秋色來單于是地名通典麟德元年改雲中都護府為單于大都護府領縣一曰金河有長城有金河李陵臺王昭君墓舊唐書突厥傳車鼻既破之後突厥盡為封疆之臣於是分置單于瀚海二都護單于都護領狼山雲中桑乾三都督蘇農等一十四州新書言磧以北蕃州悉𨽻瀚海南𨽻雲中雲中者義成公主所居也頡利滅李靖徙突厥羸破數百帳居之以阿史德為之長衆稍盛即建言願以諸王為可汗遙統之帝曰今可汗古單于也乃改雲中府為單于大都護府以殷王旭輪即睿宗為單于都護裴行儉傳突厥阿史德溫傅反單于管內一十四州並叛應之范希朝傳單于城中舊少樹希朝於他處市栁命軍人種之俄遂成林田歸道傳默啜奏請六胡州及單于都護府之地則天不許回紇傳遣使北收單于兵馬倉糧通鑑注引宋白曰唐振武軍舊單于都護府即漢定襄郡之盛樂縣也在隂山之陽黃河之北後魏所都盛樂是也唐平突厥於此置雲中都督府後改單于府新唐書地理志曰唐之盛時開元天寶之際東至安東西至安西南至日南北至單于府徐九臯詩題曰送部四鎮人往單于崔皓詩題曰送單于裴都護赴西河岑參輪臺即事詩輪臺風物異地是古單于是也杜子美詩注寄臨邑舍弟詩徐關深水府送舍弟頴赴齊州詩徐關東海西徐關在齊境今不可考左傳成公二年齊師敗于鞍齊侯自徐關入十七年齊侯與國佐盟于徐關而復之行次昭陵詩威定虎狼都注引蘇秦傳秦虎狼之國甚為無理此乃用秦本紀贊據狼弧蹈參伐參為白虎秦之分星也往者災猶降蒼生喘未蘇謂武韋之禍指麾安率土蕩滌撫洪爐謂𤣥宗再造唐室也本於太宗之遺德在人故詩中及之錢氏謂此詩天寶亂後作而改鐡馬為石馬以合李義山詩昭陵石馬之說非矣其朝享太廟賦曰弓劍皆鳴汗鑄金之風馬此在未亂以前又將何說必古記有此事而今失之爾今昭陵六馬見存皆琢石為屏而刻馬于上其文凸起非金馬也乾陵石鴈亦然奉贈韋左丞丈詩殘杯與冷炙到處潜悲辛顔氏家訓古來名士多所愛好惟不可令有稱譽見役勳貴處之下坐以取殘杯冷炙之辱高都護驄馬行安西都護胡青驄魏書吐谷渾傳吐谷渾嘗得波斯草馬放入海因生驄駒能日行千里世傳青海驄者是也送蔡希魯還隴右詩涼州白麥枯杜氏通典涼州貢白小麥十石天育驃騎歌伊昔太僕張景順監牧攻駒閲清峻遂令大奴守天育别養驥子憐神駿按史言𤣥宗初即位牧馬有二十四萬匹以太僕卿王毛仲為內外間廏使少卿張景順副之開元十三年𤣥宗東封有馬四十三萬匹牛羊稱是上嘉毛仲之功加開封儀同三司是景順特毛仲之副爾今斥毛仲為大奴而歸其功於景順殆以詩人之筆而追黜陟之權乎哀王孫詩但道困苦乞為奴南史齊明帝為宣城王遣典籖柯令孫殺建安王子真子真走入牀下令孫手牽出之叩頭乞為奴不許而死朔方健兒好身手顔氏家訓頃世離亂衣冠之士雖無身手或聚徒衆大雲寺贊公房詩㹞㹞國多狗韓非子外儲說右上夫國亦有狗有道之士陳其術而欲以明萬乘之主大臣為猛狗迎而齕之此人主之所以蔽脅而有道之士所以不用也戰國䇿江乙以狗喻昭奚恤晚行口號逺愧梁江總還家尚黑頭劉辰翁評曰人知江令自陳入隋不知其自梁時已逹官矣自梁入陳自陳入隋歸尚黑頭其人物心事可知著一梁字而不勝其愧矣詩之妙如此豈待罵哉按陳書江總傳侯景寇京都詔以總權兼太常卿臺城陷總避難﨑嶇至會稽郡復往廣州依蕭勃及元帝平侯景徵總為明威將軍始興內史會江陵陷不行總因此流寓嶺南積嵗天嘉四年以中書侍郎徵還朝以本傳總之年計之梁太清三年己已臺城陷總年三十一自此流離於外十四五年至陳天嘉四年癸未還朝總年四十五即所謂還家尚黑頭也總集有詒孔中丞奐詩曰我行五嶺表辭鄉二十年子美遭亂﨑嶇略與總同而自傷其年已老故發此歎爾何暇罵人哉傳又云京城陷入隋為上開府開皇十四年卒於江都時年七十六去禎明三年己酉陳亡之嵗又已五年頭安得黑乎其臺城陷而避亂本在梁時自不得蒙以陳氏何罵之有且子美詩有云莫看江總老猶被賞時魚有云管寧紗帽淨江令錦袍鮮有云江總外家養謝安乘興長亦已亟稱之矣李義山贈杜牧之詩云前身應是梁江總此乂何所譏哉北征詩君誠中興主經緯固密勿漢書劉向傳引詩密勿從事師古曰密勿猶黽勉不聞夏殷衰中自誅褒妲不言周不言妹喜此古人互文之妙自八股學興無人解此文法矣晚出左掖詩騎馬欲雞栖蓋欲效古人敝車羸馬之意後漢書陳蕃傳朱震字伯厚為州從事奏濟陰太守單匡贓罪并連匡兄中常侍車騎將軍超桓帝收匡下廷尉以譴超超詣獄謝三府語曰車如雞栖馬如狗疾惡如風朱伯厚雞栖言車小也余聞之張錦衣紀云唐席豫高都公楊府君碑銘曰獬豸之角初見觸邪雞栖之車逺聞疾惡垂老别詩土門壁甚堅杏園度亦難土門在井陘之東今獲鹿縣西南十里杏園度在衛州汲縣臨河而守以遏賊使不得度皆唐人控制河北之要地也舊唐書郭子儀自杏園渡河圍衛州史思明遣薛岌圍令狐彰于杏園李忠臣為濮州刺史移鎮杏園渡今河南徙而故蹟不可尋矣唐崔峒送馮將軍詩想到滑臺桑葉落黃河東注杏園秋秦州雜詩西戎外甥國注引吐蕃表稱外甥為證按册府元龜載吐蕃書皆自稱外甥稱上為皇帝舅開元二十一年從公主言樹碑於赤嶺其碑文曰維大唐開元二十一年嵗次壬申舅甥修其舊好同為一家則盟誓之文詔敕之語已載之矣胡舞白題斜按南史裴子野為著作舍人時西北逺邉有白題國遣使繇岷山道入貢此國歷代弗賓莫知所出子野曰漢潁陰侯斬白題將一人服䖍注云白題胡名也然則白題乃是國名梁武帝普通三年白題國遣使獻方物册府元龜白題國在滑國東而此詩以為白額儻亦詞家所謂借用者乎喜聞官軍已臨賊境二十韻家家賣叉釧準擬獻香醪南史庾杲之傳杲之嘗兼主客郎對魏使使問杲之曰百姓那得家家題名帖賣宅答曰朝廷既欲掃蕩京雒克復神州所以家家賣宅耳送鄭䖍貶台州司戶詩酒後常稱老畫師舊唐書閻立本傳太宗嘗與侍臣學士泛舟於春苑池中有異鳥隨波容與召立本令寫鳥閣外傳呼云畫師閻立本寄嶽州賈司馬六丈巴州嚴八使君詩賈筆論孤憤嚴君賦幾篇是用史記賈誼至長沙弔屈原事漢書藝文志嚴助賦三十五篇古人經史皆是寫本久客四方未必能攜一時用事之誤自所不免後人不必曲為之諱子美寄嶽州賈司馬六丈巴州嚴八使君詩弟子貧原憲諸生老伏䖍本用濟南伏生事伏生名勝非䖍後漢有服䖍非伏也示獠奴阿假詩曽驚陶侃胡奴異蓋謂士行有胡奴可比阿假胡奴侃子範小字非奴也又如上兜率寺詩何顒好不忘當是周顒見葉少藴避暑録語佐還山後寄詩分張素有期後魏高允徵士頌在者數子仍復分張北史蠕蠕阿那瓌言老母在彼萬里分張後周庾信傷心賦兄弟則五郡分張父子則三州離散蜀相詩三顧頻繁天下計入衡州詩頻繁命屢及蜀志費褘傳以奉使稱㫖頻繁至吳晉書刑法志詔㫖使問頻繁山濤傳手詔頻繁文選庾亮讓中書令表頻繁省闥出總六軍潘尼贈張正治詩張生拔幽華頻繁登二宫陸雲夏府君誄頻繁幃幄答兄平原書錫命頻繁唯費褘山濤二傳作煩蓋後人減筆書爾題郭明府茅屋詩頻驚適小國左傳僖公七年楚文王戒申侯無適小國寄韓諫議詩色難腥腐餐楓香漢書佞幸傳太子齰癰而色難之送李卿詩上四句謂李卿下四句乃公自道晉山雖自棄是用介之推入綿上山中事傷春詩大角纒兵氣後漢書董卓傳贊矢延王輅兵纒魏象鉤陳出帝畿水經注紫微有鉤陳之宿主鬬訟兵陳耆舊把天衣南齊書輿服志衮衣漢世出陳留襄邑所織宋末用繡及織成齊建武中乃彩畫為之加飾金銀薄時亦謂天衣梁庾肩吾和皇太子重雲殿受戒詩天衣初拂石豆火欲然薪唐姚元景光宅寺造佛像讃姜被承歡曳天衣而下拂贈王二十四侍御詩女長裁褐穩男大卷書勻南齊書張融傳與從叔征北將軍永書曰世業清貧民生多待榛栗棗修女贄既長束帛禽鳥男禮巳大勉身就官十年七仕不欲代耕何至此事八哀詩長安米萬錢漢書高帝紀關中大饑米斛萬錢食貨志米至石萬錢解悶詩何人為覔鄭瓜州公自注今鄭祕監審劉辰翁曰因金陵有瓜州號鄭瓜州謬甚按瓜洲唐時屬潤州非金陵别有考在第三十一卷且其字作洲非州也本文並無金陵即令祕監流寓金陵遂可以二百里外江中之一洲為此君之名號乎唐書地理志瓜州晉昌郡下都督府武德五年析沙州之常樂置屬隴右道蕭嵩傳開元十五年吐蕃陷瓜州執刺史田元獻以嵩為兵部尚書河西節度使嵩奏以張守圭為瓜州刺史修築州城招輯百姓令其復業張守圭傳以戰功加銀青光祿大夫仍以瓜州為都督府以守圭為都督岑參為宇文判官詩君從萬里使聞已到瓜州蓋必鄭審嘗官此州故以是稱之今不可考矣䕫府書懷詩蒼生可察眉列子晉國苦盜有郤雍者能視盜之貌察其眉睫之間而得其情觀公孫大娘弟子舞劍器行序記於郾城觀公孫氏舞劍器渾脫舊唐書郭山惲傳中宗引近臣宴集將作大匠宗晉卿舞渾脫胡三省注通鑑長孫無忌以烏羊毛為渾脫氊帽人多效之謂之趙公渾脫因演以為舞中宗神龍二年三月并州清源縣尉吕元泰上疏言此見都邑坊市相率為渾脫駿馬胡服名為蘇莫遮非雅樂也遣懷詩元和辭大爐揚雄解難陶冶大爐秋興詩直北關山金鼓震史記封禪書遂因其直北立五帝壇波漂菰米沈雲黑梁庾肩吾奉和皇太子納涼梧下應令詩黑米生菰葉青花出稻苗久居䕫府將適江陵四十韻擺闔盤渦沸鬼谷子有捭闔篇捭擺古今字通哭李尚書詩奉使失張騫舊唐書房王惲傳惲孫之芳幼有令譽頗善五言詩宗室推之開元末為駕部員外郎天寶十三載安祿山奏為范陽司馬祿山反自拔歸西京授右司郎中歷工部侍郎太子右庶子廣德元年遣之芳兼御史大夫使吐蕃被留境上二年而歸除禮部尚書尋改太子賓客秋色凋春草王孫若箇邊五臣注文選招隱士曰屈原與楚同姓故云王孫宴王使君宅詩留歡卜夜閒閒字當從月甫父名間自不須諱此閒字說文閒隙也閒暇之閒本從隙生義祗是一字至日遣興詩朱衣只在殿中間音異字同韓文公詩注韓文公游青龍寺贈崔太補闕詩側耳酸腸難濯浣是用詩柏舟如匪浣衣秋懷詩戚戚抱虛警是用陸士衡歎逝賦節循虛而警立注皆不及通鑑注賦於民而食人二雞子賦於民而食者取之於民也人二雞子者每人令出二雞子也胡氏未注幾能令臧三耳矣言幾令人以為實有三耳漢武帝太初三年膠東太守延廣為御史大夫注延廣史逸其姓按延即姓也三十九卷南鄭人延岑注延姓岑名四十五卷有京兆尹南陽延篤諸葛亮出師表云後值傾覆受任於敗軍之際奉命於危難之間爾來二十有一年矣所謂敗軍乃當陽長坂之敗其云奉命則求救於江東也注乃云事見上卷文帝黃初四年非虞翻作表示吕岱為愛憎所白語出吳書注曰讒佞之人有愛有憎而無公是非故謂之愛憎愚謂愛憎憎也言憎而並及愛古人之辭寬緩不迫故也又如得失失也史記刺客傳多人不能無生得失利害害也史記吳王濞傳擅兵而别多他利害緩急急也史記倉公傳緩急無可使者游俠傳緩急人之所時有也成敗敗也後漢書何進傳先帝嘗與太后不快幾至成敗同異異也吳志孫皓傳注蕩異同如反掌晉書王彬傳江州當人强盛時立異同羸縮縮也吳志諸葛恪傳一朝羸縮人情萬端禍福禍也晉歐陽建臨終詩潜圖密已構成此禍福端皆此類庾亮出奔左右射賊誤中柂工應絃而倒船上咸失色欲散亮不動徐曰此手何可使著賊注曰言射不能殺賊而反射殺柂工自恨之辭也非也亮意蓋謂有此善射之手使著賊身亦必應弦而倒耳解嘲之語也宋明帝泰始三年沈文秀攻青州刺史明僧嵩帝遣輔國將軍劉懷珍浮海救之進至黔陬文秀所署長廣太守劉桃根將數千人戍不其城懷珍軍于洋水遣王廣之將百騎襲不其城拔之注云洋水即巨洋水按不其城在今即墨縣西南而巨洋水乃今之巨蔑河在臨朐益都夀光三縣之境與黔陬不其相去三四百里安能以百騎而襲取之乎水經注云拒艾水出黔陬縣西南拒艾山又謂之洋洋水膠州志曰洋河在州南三十里發源鐵橛山東流入于海此即懷珍所屯軍處耳梁武帝大通二年魏爾朱榮欲討山東羣盜請敕蠕蠕王阿那壞發兵東趨下口以躡其背注云下口蓋指飛狐口非也此即居庸下口一百六十六卷注曰幽州軍都縣西北有居庸關濕餘水出上谷溫陽縣之東南流出關謂之下口周主從容問鄭譯曰我腳杖痕誰所為也對曰事由烏丸軌宇文孝伯謂由此二人也下云因言軌捋須事亦是譯言之也故軌見殺而孝伯亦賜死注以宇文孝伯屬下讀而云孝伯何為出此言誤矣突厥立劉武周為定楊可汗注云將使之定揚州非也楊者隋姓下條云劉武周為定楊天子郭子和為平楊天子猶言定隋平隋爾楊字從木武后永昌元年二月丁酉尊魏忠孝王曰周忠孝太皇妣曰忠孝太后文水陵曰章德陵咸陽陵曰明義陵注云武氏之先葬文水士彠及其妻葬咸陽非也后父士彠葬文水母楊氏葬咸陽後章德改名昊陵明義改名順陵其碑文云然劉肅大唐新語中宗宴興慶池侍宴者並唱回波詞給事中李景伯歌曰回波詞持酒巵微臣職在針規侍宴既過三爵喧譁竊恐非儀首二句三言下三句六言蓋回波詞體也今通鑑作回波爾時酒巵恐傳寫之誤唐穆宗長慶元年劉總奏分所屬為三道以幽涿營為一道平薊媯檀為一道瀛莫為一道注云營州治栁城道里絶逺劉總奏以為一道必有說按唐書地理志營州栁城郡萬嵗通天元年為契丹所陷聖厯二年僑治漁陽開元五年又還治栁城意者中唐之世復僑治於幽薊之間而史家自天寶亂後於東北邊事略而不詳故今無所考耶李茂貞不敢稱帝但開岐王府置百官名其所居為宫殿妻稱皇后注曰自為岐王而妻稱皇后妻之貴踰於其夫矣竊謂此事理之必不然皇后乃王后之誤後漢高祖紀吳越內牙指揮使諸溫注漢書地理志琅邪郡有諸縣蓋以邑為氏也非按越有大夫諸稽郢周太祖廣順元年慕容彥超遣使入貢帝慮其疑懼賜詔慰安之曰今兄事已至此言不欲繁望弟扶持同安億兆今兄者太祖自謂也事巳至此謂為衆所推而即帝位也觀下文稱之為弟語意相對可知注以漢祖為彥超之兄改作令兄者非日知録卷二十七
