body:
  text: 日知錄卷四崑山顧炎武撰魯之春秋春秋不始於隠公晉韓宣子聘魯觀書於太史氏見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之德與周之所以王也左傳昭公二年葢必起自伯禽之封以洎於中世當周之盛朝覲㑹同征伐之事皆在焉故曰周禮而成之者古之良史也孟子雖言詩亡然後春秋作然不應伯禽至孝公三百五十年全無紀載自隠公以下世道衰微史失其官於是孔子懼而脩之自惠公以上之文無所改焉所謂述而不作者也自隠公以下則孔子以已意脩之所謂作春秋也然則自惠公以上之春秋固夫子所善而從之者也惜乎其書之不存也春秋闕疑之書孔子曰吾猶及史之闕文也史之闕文聖人不敢益也春秋桓公十七年冬十月朔日有食之傳曰不書日官失之也僖公十五年夏五月日有食之傳曰不書朔與日官失之也以聖人之明千嵗之日至可坐而致豈難考歴布算以補其闕而夫子不敢也况於史文之誤而無從取正者乎况於列國之事得之傳聞不登於史䇿者乎左氏之書成之者非一人錄之者非一世可謂富矣而夫子當時未必見也史之所不書則雖聖人有所不知焉者且春秋魯國之史也即使厯聘之餘必聞其政遂可以百二十國之寳書增入本國之記注乎成公十三公㑹諸侯伐秦下正義曰經文依史官䇿書䇿書所無故經文遂闕也傳文采於簡牘簡牘先有故傳文獨存也若乃改葬惠公之類不書者舊史之所無也曹大夫宋大夫司馬司城之不名者闕也齊崔氏出奔衛去名而書族宋殺其大夫山去族而書字疑皆前史之闕鄭伯髠頑楚子麇齊侯陽生之實弑而書卒者傳聞不勝簡書是以從舊史之文也邵氏曰赴以卒則卒赴以弑則弑弑而赴以卒其弑也傳聞云爾也傳聞不勝簡書是以書卒以待察也比之疑獄左氏出於獲麟之後網羅浩博實夫子之所未見乃後之儒者似謂已有此書夫子據而筆削之即左氏之解經於所不合者亦多曲為之説而經生之論遂以聖人所不知為諱是以新説愈多而是非靡定故今人學春秋之言皆郢書燕説而夫子之不能逆料者也子不云乎多聞闕疑慎言其餘豈特告子張乎脩春秋之法亦不過此春秋因魯史而脩者也左氏傳采列國之史而作者也故所書晉事自文公主夏盟政交於中國則以列國之史參之而一從周正自惠公以前則間用夏正其不出於一人明矣其謂賵仲子為子氏未薨平王崩為赴以庚戍先壬戍十二日陳侯鮑卒為再赴似皆揣摩而為之説三正三正之名見於甘誓蘇氏以為自舜以前必有以建子建丑為正者其來尚矣微子之命曰統承先王脩其禮物則知把用夏正宋用殷正若朝覲㑹同則用周之正朔其於本國自用其先王之正朔也獨是晉為姬姓之國而用夏正則不可解三正之所以異者疑古之分國各有所受故公劉當夏后之世而一之日二之日已用建子為紀晉之用寅其亦承唐人之舊與舜典協時月正日即協此不齊之時月杜預春秋後序曰晉太康中汲縣人發其界内舊冢得古書皆簡編科斗文字記晉國起自殤叔次文侯昭侯以至曲沃莊伯莊伯之十一年十一月魯隠公之元年正月也皆用夏正建寅之月為嵗首編年今攷春秋僖公五年晉侯殺其世子申生經書春而傳在上年之十二月十年里克弑其君卓經書正月而傳在上年之十一月十一年晉殺其大夫㔻鄭父經書春而傳在上年之冬十五年晉侯及秦伯戰于韓獲晉侯經書十有一月壬戍而傳則為九月壬戍經傳之文或從夏正或從周正所以錯互如此羅泌以為傳據晉史經則周厯與史記漢元年冬十月五星聚東井乃秋七月之誤正同僖公五年十二月丙子朔虢公醜奔京師而卜偃對獻公以為九月十月之交襄公三十年絳縣老人言臣生之嵗正月甲子朔以長厯推之為魯文公十一年三月甲子朔此又晉人用夏正之見於傳者也僖公二十四年冬晉侯夷吾卒杜氏注文公定位而後告夫不告文公之入傳曰秦伯納之不書不告入也而告惠公之薨以上年之事為今年之事新君入國之日反為舊君即世之年非人情也疑此經乃錯簡當在二十三年之冬傳曰九月晉惠公卒晉之九月周之冬也蓋懐公遣人來告隠公六年冬宋人取長葛傳作秋劉原父曰左氏日月與經不同者丘明作書雜取當時諸侯史䇿之文其用三正參差不一往往而迷故經所云冬傳謂之秋也攷宋用殷正則建酉之月周以為冬宋以為秋矣桓公七年夏榖伯綏來朝鄧侯吾離來朝傳作春劉原父曰傳所据者以夏正紀時也文公十六年齊公子商人弑其君舍經在九月傳作七月隠公三年夏四月鄭祭足帥師取温之麥秋又取成周之禾若以為周正則麥禾皆未熟四年秋諸侯之師敗鄭徒兵取其禾而還亦在九月之上是夏正六月禾亦未熟注云取者葢芟踐之終是可疑按傳中雜取三正多有錯誤左氏雖發其例於隠之元年曰春王周正月而間有失於改定者文多事繁固著書之君子所不能免也閏月左氏傳文公元年於是閏三月非禮也襄公二十七年十一月乙亥朔日有食之辰在申司厯過也再失閏矣哀公十二年冬十二月螽仲尼曰今火猶西流司厯過也並是魯厯春秋時各國之厯亦自有不同者經特據魯厯書之耳史記秦宣公享國十二年初志閏月此各國厯法不同之一證成公十八年春王正月晉殺其大夫胥童傳在上年閏月上有十二月哀公十六年春王正月己卯衛世子蒯瞶自戚入于衛衛侯輒來奔傳在上年閏月上有冬皆魯失閏之證杜以為從告非也史記周襄王二十六年閏三月而春秋非之則以魯厯為周厯非也平王東遷以後周朔之不頒久矣故漢書律厯志六厯有黄帝顓頊夏殷周及魯厯其於左氏之言失閏皆謂魯厯葢本劉歆之説五行志周衰天子不班朔魯厯不正置閏不得其月月大小不得其度王正月廣川書跋載晉安鼎銘曰惟王十月乙亥集古錄博古圖載此鼎並作王九月而論之曰聖人作春秋於嵗首則書王説者謂謹始以正端今晉人作鼎而曰王十月是當時諸侯皆以尊王正為法不獨魯也李夢陽言今人往往有得秦權者亦有王正月字以是觀之春秋王正月必魯史本文也言王者所以别於夏殷並無他義劉原父以王之一字為聖人新意非也子曰述而不作信而好古亦於此見之博古圖載周仲偁父鼎銘曰維王五月初吉丁亥齊侯鎛鐘銘曰維王五月辰在戊寅敔敦銘曰維王十月趙伯循曰天子常以今年冬班明年正朔於諸侯諸侯受之每月奉月朔甲子以告於廟所謂稟正朔也故曰王正月左氏傳曰元年春王周正月此古人解經之善後人辨之累數百千言未明者傳以一字盡之矣未為天子則雖建子而不敢謂之正武成惟一月壬辰是也傳一月周之正月猶豳詩言一之日已為天子則謂之正而復加王以别於夏殷春秋王正月是也春秋時月並書春秋時月並書於古未之見攷之尚書如泰誓十有三年春大會于孟津金縢秋大熟未穫言時則不言月伊訓惟元祀十有二月乙丑太甲中惟三祀十有二月朔武成惟一月壬辰康誥惟三月哉生魄召誥三月惟丙午朏多士惟三月多方惟五月乙亥顧命惟四月哉生魄畢命惟十有二年六月庚午朏言月則不言時朱文公荅林擇之亦有古文例不書時之説其他鐘鼎古文多如此春秋獨並舉時月者以其為編年之史有時有月有日多是義例所存不容於闕一也或疑夫子特筆是不然舊史既以春秋為名自當書時且如隠公二年春公㑹戎于潛不容二年書春元年乃不書春是知謂以時冠月出於夫子者非也建子之月而書春此周人謂之春矣後漢書陳寵傳曰天正建子周以為春元態朋來五經説曰陽生於子即為春隂生於午即為秋此之謂天統謂一為元楊龜山荅胡康侯書曰蒙録示春秋第一叚義所謂元者仁也仁人心也春秋深明其用當自貴者始故治國先正其心其説似太支離矣恐改元初無此意此本之漢書董仲舒傳臣謹按春秋謂一元之意一者萬物之所從始也元者辭之所謂大也謂一為元者視大始而欲正本也三代正朔如忠質文之尚循環無端不可增損也斗綱之端連貫營室織女之紀指牽牛之初以紀日月故曰星紀五星起其初日月起其中其時為冬至其辰為丑三代各據一統明三統常合而迭為首周環五行之道也周據天統以時言也商據地統以辰言也夏據人統以人事言也故三代之時惟夏為正謂春秋以周正紀事是也正朔必自天子出改正朔恐聖人不為也若謂以夏時冠月如定公元年冬十月隕霜殺菽若以夏時言之則十月隕霜乃其時也不足為異周十月乃夏之八月若以夏時冠月當曰秋十月也熊朋來亦云若依夏時周月之説則正月二月須書冬而三月乃可書春爾五代史漢本紀論曰人君即位稱元年常事爾孔子未脩春秋其前固已如此雖暴君昏主妄庸之史其記事先後逺近莫不以嵗月一二數之乃理之自然也元呉萊本此作改元論其謂一為元葢古人之語爾及後世曲學之士始謂孔子書元年為春秋大法遂以改元為重事徐無黨注曰古謂嵗之一月亦不云一而曰正月國語言六吕曰元間大吕周易列六爻曰初九大抵古人言數多不言一不獨謂年為元也吕伯恭春秋講義曰命日以元虞典也書月正元日命祀以元商訓也惟元祀十有二月乙丑年紀日辰之首其謂之元葢已久矣豈孔子作春秋而始名之哉説春秋者乃言春秋謂一為元殆欲深求經㫖而反淺之也改月三代改月之證見於白虎通所引尚書大傳之言甚明其言曰夏以孟春月為正殷以季冬月為正周以仲冬月為正正即正月夏以十三月為正色尚黑以平旦為朔殷以十二月為正色尚白以雞鳴為朔周以十一月為正色尚赤以夜半為朔不以二月後為正者萬物不齊莫適所統故必以三微之月也周以十一月為正即名正月不名十一月矣殷以十二月為正即名正月不名十二月矣夏以十三月為正即名正月不名十三月矣洪邁曰十三月者承十二月而言即正月也胡氏引伊訓太甲十有二月之文以為啇人不改月之證與孔傳不合亦未有明據伊訓惟元祀十有二月乙丑伊尹祠于先王傳曰湯崩踰月太甲即位奠殯而告太甲中惟三祀十有二月朔傳曰湯以元年十一月崩至此二十六月三年服闋未嘗以十二月為嵗首胡氏又引秦人以亥為正不改時月為證則不然漢書髙帝紀春正月注師古曰凡此諸月號皆太初正厯之後記事者追改之非當時本稱也以十月為嵗首即謂十月為正月今此真正月當時謂之四月耳他皆類此叔孫通傳諸侯羣臣朝十月師古曰漢時尚以十月為正月故行朝嵗之禮史家追書十月漢元年冬十月五星聚東井當是建申之月劉攽曰按厯太白辰星去日率不過一兩次今十月而從嵗星於東井無是理也然則五星以秦之十月聚東井耳秦之十月今七月日當在鶉尾故太白辰星得從嵗星也按此足明記事之文皆是追改惟此一事失於追改遂以秦之十月為漢之十月耳夫以七月誤為十月正足以為秦人改月之證胡氏失之天王尚書之文但稱王春秋則曰天王以當時楚吳徐越皆僭稱王故加天以别之也趙子曰稱天王以表無二尊是也邾儀父邾儀父之稱字者附庸之君無爵可稱若直書其名又非所以待鄰國之君也故字之詩序車鄰美秦仲也孔子曰秦仲以字配國者附庸未得爵命無謚可稱卑於子男而進於變夷之國郳犂來介葛盧書名與蕭叔朝公杜解叔名非也同一例也左氏曰貴之公羊曰褒之非矣此亦史家常例非舊史書邾克而夫子改之為儀父也邾儀父稱字附庸之君也郳犂來來朝稱名下矣介葛盧來不言朝又下矣白狄來略其君之名又下矣仲子隠公元年秋七月天王使宰咺來歸惠公仲子之賵曰惠公仲子者惠公之母仲子也文公九年冬秦人來歸僖公成風之禭曰僖公成風者僖公之母成風也猶晉簡文帝母㑹稽王太妃鄭氏之稱簡文宣太后國學明教臧燾所謂繫子為稱兼明貴之所由者也榖梁傳曰母以子氏注妾不得體君故以子為氏按妾不得體君儀禮傳文仲子者何惠公之母孝公之妾也此説得之左氏以為桓公之母桓未立而以夫人之禮尊其母又未薨而賵皆逺於人情不可信公羊亦以為桓公之母惠公之妾繫妾於君較之繫母於子義則短矣所以然者以魯有兩仲子孝公之妾一仲子惠公之妾又一仲子左氏哀公二十四年傳周公及武公娶于薛孝惠娶于商自桓以下娶于齊而隠之夫人又是子氏二傳所聞不同故有紛紛之説此亦魯史原文葢魯有兩仲子不得不稱之曰惠公仲子也考仲子之宫不言惠公者承上文而略其辭也釋例曰婦人無外行於禮當繫夫之謚以明所屬如鄭武公娶于申曰武姜衞莊公娶于齊東宫得臣之妹曰莊姜是也妾不得體君不得已而繫之子仲子繫惠公而不得繫於孝公成風繫僖公而不得繫於莊公抑所謂名不正則言不順者矣春秋十二公夫人之見於經者桓夫人文姜莊夫人哀姜僖夫人聲姜宣夫人穆姜成夫人齊姜皆書薨書葬聲姜不書逆不書至文公成公不書生文夫人出姜不書薨葬隠夫人子氏書薨不書葬昭夫人孟子變薨言卒不書葬不稱夫人其妾母之見於經者僖母成風宣母敬嬴襄母定姒昭母齊歸皆書薨書葬稱夫人小君惟哀母定姒變薨言卒不稱夫人小君其他若隠母聲子桓母仲子閔母叔姜皆不見於經定母則經傳皆闕而所謂惠公仲子者惠公之母也二年十有二月乙卯夫人子氏薨榖梁傳夫人者隠公之妻也左氏以為桓母公羊以為隠母並非卒而不書葬夫人之義從君者也春秋之例葬君則書葬君之母則書葬妻則不書所以别禮之輕重也隠見存而夫人薨故葬不書注謂隠弑賊不討故不書者非成風敬嬴成風敬嬴定姒襄公四年齊歸之書夫人書小君何也邦人稱之舊史書之夫子焉得而貶之在後世則秦芊氏漢薄氏之稱太后也直書而失自見矣定姒定公十五年魯有兩定姒書葬而不書夫人小君哀未君也劉原父曰姒氏為哀公之母定公之妾哀未成君故亦未敢謂其母夫人耳孟子則并不書葬不成喪也君氏卒君氏卒以定公十五年姒氏卒例之從左氏為是不言子氏者子氏非一故繫之君以為别猶仲子之繫惠公也若天子之卿則當舉其名不但言氏也公羊榖梁二傳作尹氏或疑君氏之名别無所見左傳襄公二十六年左師見夫人之歩馬者問之對曰君夫人氏也葢當時有此稱然則去其夫人即為君氏矣戰國齊有君王后夫人子氏隠之妻嫡也故書薨君氏隠之母惠公之繼室妾也故書卒不書葬者何春秋之初去西周未逺嫡妾之分尚嚴故仲子别宫而獻六羽所謂猶秉周禮者也僖公以後日以僭踰於經可見矣滕子薛伯杞伯滕侯之降而子也薛侯之降而伯也杞侯之降而伯而子也貶之乎滕子來朝張無垢胡康侯謂貶其朝桓貶之者人之可也名之可也至於名盡之矣降其爵非情也古之天下猶今也崔呈秀魏廣微天下之人無字之者言及之則名之名之者惡之也惡之則名之焉盡之矣若降其少師而為太子少師降其尚書而為侍郎郎中員外雖童子亦知其不可矣然則三國之降焉何沙隨程氏以為是三國者皆微困於諸侯之政而自貶焉孫明復已有此説伊川春秋傳略同從昭公十三年平丘之盟子産爭承曰鄭伯男也而使公侯之貢懼弗給也哀公十三年黄池之㑹子服景伯曰魯賦於吳八百乘若為子男則將半邾以屬於呉而如邾以事晉皆其證也春秋之世衞稱公矣及其末也貶而侯貶而君史記衛世家昭公時三晉彊衞如小侯屬之成侯十六年衞更貶號曰侯嗣君五年更貶號曰君此著於史記而後人尚有不知者髙誘解吕氏春秋衛嗣君曰秦貶其號為君夫滕薛把猶是也襄公二十七年宋之盟齊人請邾宋人請滕皆不與盟定公元年城成周宋仲㡬曰滕薛郳吾役也則不惟自貶且為大國之私屬矣故魯史因而書之也小國貧則滕薛把降而稱伯稱子大國彊則齊世子光列於莒邾滕薛杞小邾之上齊世子光八㑹諸侯其五㑹並序諸侯之下至襄公十年伐鄭之㑹在滕薛把小邾上十一年再㑹又進在莒邾上時為之也左氏謂以先至而進之亦託辭焉爾闕文桓公四年七年闕秋冬二時定公十四年闕冬一時公羊成公十年闕冬十月昭公十年十二月無冬僖公二十八年冬無月而有壬申丁丑桓公十四年有夏五而無月桓公十七年冬十月有朔而無甲子桓公三年至九年十一年至十七年無王桓公五年春正月甲戍己丑陳侯鮑卒甲戌有日而無事皆春秋之闕文後人之脱漏也莊公二十二年夏五月無事而不書首月杜氏釋例以為闕謬穀梁有桓無王之説竊以為夫子於繼隠之後而書公即位則桓之志見矣奚待去其王以為貶邪王使榮叔來錫桓公命不書天闕文也文公五年王使榮叔歸含且賵同若曰以其錫桓而貶之則桓之立春秋固已公之矣商臣而書楚子文公九年商人而書齊侯文公十五年五等之爵無所可貶孰有貶及於天王邪僖公元年夫人氏之喪至自齊不言姜宣公元年遂以夫人婦姜至自齊不言氏此與文公十四年叔彭生不言仲定公六年仲孫忌不言何同皆闕文也聖人之經平易正大邵國賢寳曰夏五魯史之闕文歟春秋之闕文歟如謂魯史之闕文者筆則筆削則削何獨闕其所不必疑以示後世乎闕其所不必疑以示後世推不誠伯髙之心是不誠於後世也聖人豈為之哉不然則甲戍己丑叔彭生仲孫忌又何為者是故夏五春秋之闕文也非魯史之闕文也范介儒守巳曰紀子伯郭公夏五之類傳經者之脱文耳謂為夫子之闕疑吾不信已按甲戍己丑似是魯史之文故左傳已有再赴之説夫人孫于齊莊公元年三月夫人孫于齊不稱姜氏絶之也二年十有二月夫人姜氏㑹齊侯于禚復稱姜氏見魯人復以小君待之忘父而與讎通也先孫後㑹其間復歸於魯而春秋不書為國諱也此夫子削之矣劉原父曰左氏曰夫人孫于齊不稱姜氏絶不為親禮也謂魯人絶文姜不以為親乃中禮爾杜氏謂文姜之義宜與齊絶而復奔齊者乃是曲説得魏書竇瑗傳引注云夫人有與殺桓之罪絶不為親尊父之義善莊公思大義絶有罪故曰禮也葢先儒皆主此説然則母可絶乎宋襄之母獲罪於君歸其父母之國及襄公即位欲一見而義不可得作河廣之詩以自悲然宋亦不迎而致也為嘗獲罪於先君不可以私廢命也孔子論其詩而著之以為宋姬不為不慈襄公不為不孝今文姜之罪大絶不為親何傷於義哉詩序猗嗟刺魯莊公不能防閑其母趙氏因之有哀痛以思父誠敬以事母威刑以馭下之説此皆禁之於末而不原其始者也夫文姜之反於魯必其與公之喪俱至其孫于齊為國論所不容而去者也内諱奔謂之孫文姜之於齊父母之國也何至於書孫此直書而義自見者也於此而遂絶之則臣子之義伸而異日之醜行不登於史䇿矣莊公年少當國之臣不能堅持大義使之復還於魯慿君母之尊挾齊之强而恣睢淫佚遂至於不可制易曰君子以作事謀始左氏絶不為親一言深得聖人之意而魯人既不能行後儒復昧其義所謂為人臣子而不通春秋之義者遭變事而不知其權豈不信夫公及齊人狩于禚莊公四年二月夫人姜氏享齊侯于祝丘冬公及齊人狩于禚夫人享齊侯猶可書也公與齊侯狩不可書也故變文而曰齊人人之者讎之也杜氏以為微者失之矣楚呉書君書大夫春秋之於呉楚斤斤焉不欲以其名與之也楚之見於經也始於莊之十年曰荆而已二十三年於其來聘而人之二十八年復稱荆而不與其人也僖之元年始稱楚人四年盟于召陵始有大夫公羊傳謂文公九年使椒來聘始有大夫疏矣又謂夷狄不氏非也屈完固已書氏二十一年㑹于盂始書楚子然使宜申來獻㨗者楚子也二十一年而不書君圍宋者子玉二十七年救衞者子玉戰城濮者子玉也二十八年而不書帥聖人之意使之不得遽同於中夏也呉之見於經也始於成之七年曰呉而已襄之五年㑹于戚於其來聼諸侯之好而人之十年十四年復稱呉殊會而不與其人也二十五年門于巢卒始書呉子吳本伯爵春秋以其僭王降從四裔之例而書子二十九年使札來聘始有大夫然滅州來昭公十三年戰長岸十七年敗雞父二十三年滅巢二十四年滅徐三十年伐越三十二年入郢定公四年敗檇李十四年伐陳哀公六年會柤同上㑹鄫七年伐我八年伐齊十年一一年救陳十年戰艾陵十一年㑹橐皋十二年並稱呉而不與其人會黄池十三年書晉侯及呉子而殊其㑹終春秋之文無書帥者使蠻夷之君不得主盟也是知書君書大夫春秋之變文法也政交於中國矣以後世之事言之如劉石十六國之輩略之而已至魏齊周則不得不成之為國而列之於史遼金亦然此夫子所以錄楚吴也聖人録之而後人必以為外之似非春秋之深㫖矣亡國書葬紀已亡而書葬紀叔姬存紀也陳已亡而書葬陳哀公存陳也此聖人之情而見諸行事者也許男新臣卒許男新臣卒左氏傳曰許穆公卒於師葬之以侯禮也而經不言於師此舊史之闕夫子不敢增也榖梁子不得其説而以為内桓師劉原父以為去其師而歸卒於其國鑿矣禘于太廟用致夫人禘于太廟用致夫人夫人者哀姜也哀姜之薨七年矣魯人有疑焉故不祔於姑至是因禘而致之不稱姜氏承元年夫人姜氏薨于夷之文也哀姜與弑二君而猶以之配莊公是亂於禮矣明乎郊社之禮禘嘗之義治國其如示諸掌乎致夫人也躋僖公也皆魯道之衰而夫子所以傷之者也胡氏以夫人為成風成風尚存何以言致亦言之不順也以成風稱小君是亂嫡妾之分雖然猶愈於哀姜也説在乎漢光武之黜吕后而以薄氏配髙廟也及其大夫荀息晉獻公之立奚齊以王法言之易樹子也以臣子言之則君父之命存焉古人重父命伯夷以父命之故不立而逃叔齊是也是故荀息之忠同於孔父仇牧邢人狄人伐衞春秋之文有從同者僖公十八年邢人狄人伐衞二十年齊人狄人盟于邢並舉二國而狄亦稱人臨文之不得不然也莊公二十三年荆人來聘趙氏鵬飛曰稱人非進之也若但書荆來聘則若舉國皆來於文不順故書人字以成文耳不然二十八年荆伐鄭何以不書人乎若惟狄而已則不稱人十八年狄救齊二十一年狄侵衞是也榖梁傳謂狄稱人進之也何以不進之於救齊而進之於伐衞乎則又為之説曰善累而後進之夫伐衞何善之有昭公五年楚子蔡侯陳侯許男頓子沈子徐人越人伐呉不稱於越而稱越人亦同此例陸氏纂例曰凡夷狄與諸侯列序皆稱人以便文但君臣同辭王入于王城不書襄王之復左氏書夏四月丁巳王入于王城而經不書其文則史也史之所無夫子不得而益也路史以為襄王未嘗復國而王子虎為之居守此鑿空之語其説曰春秋始書天王出居後四年五月書公朝于王所冬天王狩于河陽公朝于王所文公八年書天王崩未嘗書入也王猛居皇敬王居狄泉此畿内地而其入也猶且書之天下之主也鄭他國也亦既逺而戒矣孰有入不書哉納天子定王室是乃人臣之極勲而不書於經又何以春秋為然則襄王未嘗入也且惠王嘗適鄭而處于櫟矣襄公二十年其出不書其入不書以路史之言例之則是未嘗出未嘗入也莊王僖玉頃王崩皆不書以路史之言例之則是未嘗崩也而可乎趙氏曰春秋王崩三不書見王室不告魯亦不赴也愚謂此特因舊史之不書而二者之義自見邵氏曰襄王之出也嘗告難於諸侯故仲尼據䇿而書之其入也與夫惠王之出入也皆未嘗告於諸侯䇿所不載仲尼雖得之傳聞安得益之乃若敬王之立則仲尼所見之世也子朝奔楚且有使以告諸侯況天王乎䇿之所具葢昭如也故狄泉也書成周也書事莫大於天王之入而春秋不書故夫子之自言也曰述而不作星孛春秋書星孛有言其所起者有言其所入者文公十四年秋七月有星孛入于北斗不言所起重在北斗也昭公十七年冬有星孛于大辰西及漢不言及漢重不在漢也子卒叔仲惠伯從君而死義矣而國史不書夫子平日未嘗闡幽及之者葢所謂匹夫匹婦之諒自經於溝瀆而莫之知者也納公孫寧儀行父于陳孔寧儀行父從靈公宣淫於國殺忠諫之泄冶君弑不能死從楚子而入陳春秋之罪人也故書曰納公孫寧儀行父于陳杜預乃謂二子託楚以報君之讎靈公成喪賊討國復功足以補過嗚呼使無申叔時之言陳為楚縣矣二子者楚之臣僕矣尚何功之有幸而楚子復封成公反國二子無秋毫之力而杜氏為之曲説使後世詐諼不忠之臣得援以自解嗚呼其亦愈於已為他人郡縣而猶言報讎者與與楚子之存陳不與楚子之納二臣也公羊子固已言之曰存陳悕矣三國來媵十二公之世魯女嫁於諸侯多矣獨宋伯姬書三國來媵葢宣公元妃所生宣公元年夫人至自齊即穆姜庶出之子不書生故子同生特書庶出之女不書致不書媵故伯姬歸於宋特書衞碩人之詩曰東宫之妹正義曰東宫太子所居也繫太子言之明與同母見夫人所生之貴是知古人嫡庶之分不獨子也女亦然矣殺或不稱大夫凡書殺其大夫者義繫於君而責其專殺也盗殺鄭公子騑公子發公孫輒文不可曰盗殺大夫故不言大夫杜氏曰以盜為文故不得言其大夫其義不繫於君猶之盟會之卿書名而已胡氏以為罪之而削其大夫非也閽弑呉子餘祭言呉子則君可知矣文不可曰呉閽弑其君也盗殺蔡侯申同此謂春秋中凡若此者皆趙子所避不成辭穀梁子曰不稱其君閽不得君其君也非也邾子來會公定公十四年大蒐于比蒲邾子來會公春秋未有書來㑹公者來會非朝也㑹于大蒐之地也嘉事不以野成故明年正月復來朝葬用柔日春秋葬皆用柔日宣公八年冬十月己丑葬我小君敬嬴雨不克葬庚寅日中而克葬定公十五年九月丁巳葬我君定公雨不克葬戊午日下昃乃克葬己丑丁巳所卜之日也遲而至於明日者事之變也非用剛日也經文所書葬列國之君無非柔日者惟成公十五年秋八月庚辰葬宋共公是剛日其亦雨不克葬遲而至於明日者與漢人不知此義而長陵髙帝以丙寅茂陵武帝以甲申平陵昭帝以壬申渭陵元帝以丙戍義陵哀帝以壬寅皆用剛日穆天子傳盛姬之葬以壬戍疑其書為後人偽作諸侯在喪稱子凡繼立之君踰年正月乃書即位然後成之為君未踰年則稱子未踰年又未葬則稱名先君初沒人子之心不忍忘其父也父前子名故稱名莊公三十二年子般卒襄公三十一年子野卒是也已葬則子道畢而君道始矣子而不名文公十八年子卒僖公二十五年衞子成公二十八年陳子共公定公三年邾子隠公是也雜記曰君薨太子號稱子待猶君也鄭氏注曰謂未踰年也踰年則改元國不可以曠年無君白虎通曰踰年稱公者緣臣民之心不可一日無君也緣終始之義一年不可有二君也故有不待葬而即位則已成之為君文公元年春王正月公即位成公元年春王正月公即位定公元年夏六月戊辰公即位桓公十三年衞侯惠公宣公十一年陳侯成公成公三年宋公共公衞侯定公是也所以敬守而重社稷也杜氏左傳注衞宣公未葬惠公稱侯以接鄰國非禮也葢不達此義此皆周公之制魯史之文而夫子遵之者也公羊傳曰君存稱世子世子下仍當繫名若陳世子款鄭世子華之類君薨稱子某既葬稱子踰年稱公得之矣未葬而名亦有不名者僖公九年宋子襄公定公四年陳子懷公是也所以從同也盟會之文從同而書不得獨異昭公二十二年劉子單子以王猛居于皇劉蚠亦在喪已葬而不名亦有名之者昭公二十二年王子猛是也所以示别也嫌於敬王王子朝鄭伯突出奔蔡者已即位之君也鄭世子忽復歸于鄭者已葬未踰年之子也此臨文之不得不然非聖人之抑忽而進突也忽突皆名别嫌也杜氏注賤之者非里克殺其君之子奚齊者未葬居喪之子也里克弑其君卓者踰年已即位之君也此臨文之不得不然穀梁傳曰其君之子云者國人不子也非也未踰年書爵即位之禮必於踰年之正月即位然後國人稱之曰君春秋之時有先君已葬不待踰年而先即位者矣宣公十年齊侯使國佐來聘頃公成公四年鄭伯伐許悼公稱爵者從其國之告亦以著其無父之罪姒氏卒定公十五年姒氏卒不書薨不稱夫人葬不稱小君葢春秋自成風以下雖以妾母為夫人然必公即位而後稱之此姒氏之不稱者本無其事也左氏謂不成䘮者非後世之君多於柩前即位於是大行未葬而尊其母為皇太后後漢儀禮志三公奏尚書顧命太子即日即天子位於柩前請太子即皇帝位皇后為皇太后奏可羣臣皆出吉服入㑹如儀及乎所生亦以例加之妾貳於君子疑於父而先王之禮亡矣卿不書族春秋之文不書族者有二義無駭卒挾卒柔㑹宋公陳侯蔡叔盟于折溺會齊師伐衞未賜氏也遂以夫人婦姜至自齊歸父還自晉至笙遂奔齊僑如以夫人婦姜氏至自齊豹及諸侯之大夫盟於宋意如至自晉婼至自晉一事再見因上文而略其辭也公羊宣公元年傳遂何以不稱公子一事而再見者卒名也注卒竟也竟但舉名者省文如後人作史一條之中再見者不復書姓左氏不得其解於溺㑹齊師伐衞則曰疾之於歸父還自晉則曰善之豈有疾之而去族善之而又去族者乎春秋隠桓之時卿大夫賜氏者尚少故無駭卒而羽父為之請族如挾如柔如溺皆未有氏族者也穀梁傳不爵大夫之説近之而未得其實莊閔以下則不復見於經其時無不賜氏者矣劉原父曰諸侯大國三卿皆命於天子次國三卿二卿命於天子小國三卿一卿命於天子大國之卿三命次國之卿再命小國之卿一命其於王朝皆士也韓宣子稱晉士起三命以名氏通再命名之一命略稱人周衰禮廢强弱相并卿大夫之制雖不能盡如古見於經者亦皆當時之實錄也故隠桓之間其去西周未久制度頗有存者是以魯有無駭柔挾鄭有宛詹秦楚多稱人至其晚節無不名氏通矣而邾莒滕薛之君日已益削轉從小國之例稱人而已説者不知其故因謂曹秦以下悉無大夫患其時有見者害其臆説因復構架無端以飾其偽彼固不知王者諸侯之制度班爵云爾或曰翬不稱公子何與杜氏曰公子者當時之寵號宣元年注翬之稱公子也桓賜之也其終隠之篇不稱公子者未賜也劉原父曰公子雖親然天下無生而貴者是以命為大夫則名氏得兩通未命為大夫則得稱名不得稱公子若專命之罪則直書而自見矣齊公子商人弑其君舍己賜氏也衞州吁弑其君完未賜氏也胡氏以為以國氏者累及乎上稱公子者誅及其身此求其説而不得故立此論爾大夫稱子周制公侯伯子男為五等之爵而大夫雖貴不敢稱子春秋自僖公以前大夫並以伯仲叔季為稱詩云伯兮叔兮此大夫之稱也注春秋僖公十五年震夷伯之廟杜氏夷謚伯字大夫既卒書字三桓之先曰共仲曰僖叔曰成季孟孫氏之稱子也自蔑也文公十五年叔孫氏之稱子也自豹也襄公七年季孫氏之稱子也自行父也文公十三年子閔公元年書季子二年書髙皆春秋之特筆晉之諸卿在文公以前無稱子者魏氏之稱子也自犨也僖公二十三年欒氏之稱子也自枝也僖公二十八年趙氏之稱子也自衰也文公二年中行氏之稱子也自林父也文公十三年郤氏之稱子也自缺也文公十三年知氏之稱子也自首也宣公十二年范氏之稱子也自會也宣公十二年韓氏之稱子也自厥也宣公十二年晉齊魯衞之執政稱子他國惟鄭間一有之餘則否不敢與大國並也魯之三家稱子他如臧氏子服氏叔仲氏皆以伯叔稱焉不敢與三家並也惟襄公十四年有子叔齊子論語有卞莊子其生也或以伯仲稱之如趙孟知伯死則謚之而後子之猶國君之死而謚稱公也於此可以見世之升降焉讀春秋者其可忽諸春秋時大夫雖僭稱子而不敢稱於其君之前猶之諸侯僭稱公而不敢稱於天子之前也何以知之以衞孔悝之鼎銘知之曰獻公乃命成叔纂乃祖服曰乃考文叔興舊耆欲成叔孔成子烝鉏也文叔孔文子圉也叔而不子是君前不敢子也左傳韓厥言於晉侯亦云成季宣孟猶有先王之制存焉陸淳曰侯伯子男之位皆得稱其君曰公其子孫亦曰公子而謚不得云公者謚是王所賜也大夫之臣得稱其主曰子而謚不得稱子者謚是君所賜也至戰國則子又不足言而封之為君矣洛誥予旦以多子越御事多子猶春秋傳之言羣子也宣公十二年唐孔氏以為大夫皆稱子非也春秋自僖文以後而執政之卿始稱子其後則匹夫而為學者所宗亦得稱子老子孔子是也孔子弟子惟有子曽子二人稱子閔子冉子僅一見又其後則門人亦得稱之樂正子公都子之流是也孟子樂正子注子通稱故論語之稱子者皆弟子之於師如云非不説子之道衞君待子而為政之類孟子之稱子者皆師之於弟子如云子誠齊人也子亦來見我乎之類亦世變之所從來矣論語稱孔子為子葢夫子而省其文門人之辭也亦有稱夫子者夫子矢之夫子喟然歎曰夫子不荅夫子莞爾而笑夫子憮然曰不直曰子而加以夫避不成辭也即此可悟春秋書法稱凡對君卿大夫皆稱孔子又季氏一篇皆孔子乃記者之異有謚則不稱字春秋傳凡大夫之有謚者則不書字外大夫若宋若鄭若陳若蔡若楚若秦無謚也而後字之内大夫若羽父若衆仲若子家無謚也而後字之公子亦然玉藻士於君所言大夫沒矣則稱謚若字楚共王之五子其成君者皆謚康王靈王平王是也其不成君無謚而後字之子干子晳是也他國亦然陳之五父鄭之子亹子儀是也衞州吁齊無知賊也則名之作傳者於稱名之法可謂嚴且密矣人君稱大夫字古者人君於其國之卿大夫皆曰伯父鄭厲公謂原繁叔父魯隠公謂臧僖伯曰子大夫曰二三子不獨諸侯然也曲禮言列國之大夫入天子之國曰某士自稱曰陪臣某然而天子接之猶稱其字宣公十六年晉侯使士㑹平王室王曰季氏而弗聞乎成公三年晉侯使鞏朔獻齊㨗于周王曰鞏伯實來昭公十五年晉荀躒如周葬穆后籍談為介王曰伯氏諸侯皆有以鎮撫王室伯氏謂荀躒又曰叔氏而忘諸乎注叔籍談字周德雖衰辭不失舊此其稱字必先王之制也春秋凡命卿書字皆本於此周公作立政之書若侯國之司徒司馬司空亞旅並列於王官之後葢古之人君恭以接下而不敢遺小國之臣故平平左右亦是率從而成上下之交矣王貳於虢名不正則言不順言不順則事不成而左氏之記周事曰王貳於虢王叛王孫蘇以天王之尊而曰貳曰叛若敵者之辭其不知春秋之義甚矣星隕如雨星隕如雨言多也啖氏曰奔流者衆如雨之多漢書五行志成帝永始二年二月癸未夜過中星隕如雨長一二丈繹繹未至地滅至雞鳴止谷永對言春秋記異星隕最大自魯莊以來至今再見此為得之而後代之史或曰小星流百枚以上四面行或曰星流如織或曰四方星流大小縱横百餘皆其類也唐書天文志太和七年六月戊午日暮及曙四方流星大小縱横百餘十正統四年八月癸夘日夜達旦有流星大小二百六餘余於甲申年閏六月丙申望見月食既星流竟夕始悟古時有此異不言石隕不至地也傳曰與雨偕也然則無雨而隕將不為異乎秋無麥苗不言嘉穀也據隠公元年傳曰有蜚不為災不書使不害嘉穀焉用書之於經乎築􅔛築都非都也凡邑有宗廟先君之主曰都無曰邑邑曰築都曰城舊唐書禮儀志太常博士顧德章議引此謂春秋二百四十二年魯凡城二十四邑惟􅔛一邑書築其二十三邑曰城豈皆有宗廟先君之主乎又定公十五年城漆漆是邾邑正義知其不可通而曲為之説城小穀城小穀為管仲也據經文小穀不繫於齊疑左氏之誤范甯解穀梁傳曰小穀魯邑春秋發微曰曲阜西北有故小穀城按史記漢髙帝以魯公禮葬項王穀城當即此地杜氏以此小穀為齊邑濟北穀城縣城中有管仲井劉昭郡國志酈道元水經注皆同按春秋有言穀不言小者莊公二十三年公及齊侯遇于穀僖公二十六年公以楚師伐齊取穀文公十七年公及齊侯盟于穀成公五年公孫僑如㑹晉荀首于穀四書穀而一書小穀别於穀也又昭公十一年傳曰齊桓公城穀而寘管仲焉至於今賴之則知春秋四書之榖及管仲所封在濟北穀城而此之小穀自為魯邑爾況其時齊桓公始覇管仲之功尚未見於天下豈遽勤諸侯以城其私邑哉齊人殺哀姜哀姜通慶父弑閔公為國論所不容而孫于邾齊人取而殺之義也而傳謂之己甚非也微子啓蔡穆侯將許僖公以見楚子于武城許男面縛銜壁大夫衰絰士輿櫬楚子問諸逢伯對曰昔武王克殷微子啓如是武王親釋其縛受其璧而袚之焚其櫬禮而命之使復其所楚子從之何孟春曰按書殷紂無道微子去之在武王克殷之前何應當日而有是事己去之後無復還之理而牧野之戰亦必不從人而伐其宗國也意此殆非微子事而逢伯之言特託之古人以現楚子乎徐孚逺曰史記言微子持祭器造於軍門武王乃釋微子復其位如故夫武王既立武庚而又復微子之位則是微子與武庚同在故都也厥後武庚之叛微子何以初無異同之迹然則武王克商微子未嘗來歸也襄仲如齊納幣經書僖公之薨以十二月而公子遂如齊納幣則但書冬即如杜氏之解移公薨於十一月而猶在二十五月之内惡得謂之禮乎子叔姬卒據傳把桓公在位七十年其二十二年魯文公之十二年出一叔姬其五十年魯成公之四年又出一叔姬再娶於魯而再出之必無此理殆一事而左氏誤重書之爾成公九年杞伯來逆叔姬之喪以歸此其本事且文公十二年經書曰二月庚子子叔姬卒何以知其為把婦乎趙子曰書卒義與僖公九年伯姬同以其為時君之女故曰子以别其非先君之女也齊昭公文公十四年齊侯潘卒傳以為昭公按僖公二十七年經書齊侯昭卒孝公今此昭公即孝公之弟不當以先君之名為謚疑左氏之誤經不書葬然僖公十七年傳曰葛嬴生昭公前後文同史記同先儒無致疑者趙盾弑其君太史書曰趙盾弑其君此董狐之直筆也子為正卿亡不越境反不討賊此董狐之㢲辭也傳者不察其指而妄述孔子之言以為越境乃免謬矣穿之弑盾主之也討穿猶不得免也君臣之義無逃於天地之間而可逃之境外乎臨于周廟襄公十二年吴子夀夢卒臨于周廟杜氏以為文王廟也昭公十八年鄭子産使祝史徙主祏于周廟杜氏以為厲王廟也傳曰鄭祖厲王宣公十二年鄭伯逆楚子之辭曰徼福於厲宣桓武而哀公二年蒯聵之禱亦云敢昭告於皇祖文王夫諸侯不得祖天子而有廟焉何曰此廟也非祖也始封之君謂之祖雖然伯禽為文王之孫鄭桓為厲王之子其就封而之國也將何祭哉天下有無祖考之人乎而況於有土者乎意者特立一廟以祀文王厲王而謂之周廟歟漢時有郡國廟其亦倣古而為之歟漢髙帝令諸侯王都皆立太上皇廟葢亦以天下不可有無廟之諸侯王也薄昭與淮南厲王書曰臣之所見髙皇帝之神必不廟食於大王之手明白竹書紀年成王十三年夏六月魯大禘於周公廟按二十一年周文公薨於豐周公未薨何以有廟蓋周廟也公字衍是則始封之君有廟亦可因此而知禘之説欒懐子晉人殺欒盈安得有謚傳言懐子好施士多歸之豈其家臣為之謚而遂傳於史䇿邪子大叔之廟昭公十二年鄭簡公卒將為葬除及㳺氏之廟將毁焉子大叔使其除徒執用以立而無庸毁曰子産過女而問何故不毁乃曰不忍廟也諾將毁矣既如是子産乃使辟之十八年簡兵大蒐將為蒐除子太叔之廟在道南其寢在道北其庭小過期二日使除徒陳於道南廟北曰子産過女而命速除乃毁於南鄉子産朝過而怒之除者南毁子産及衝使從者正之曰毁於北方此亦一事而記者或以為葬或以為蒐傳兩存之而失刪其一耳城成周昭公三十二年傳冬十一月晉魏舒韓不信如京師合諸侯之大夫于狄泉尋盟且令城成周魏子南面衞彪傒曰魏子必有大咎干位以令大事非其任也詩曰敬天之怒不敢戲豫敬天之渝不敢馳驅況敢干位以作大事乎定公元年傳春王正月辛巳晉魏舒合諸侯之大夫于狄泉將以城成周魏子涖政衞彪傒曰將建天子而易位以令非義也大事干義必有大咎晉不失諸侯魏子其不免乎此是一事左氏兩收而失刪其一周之正月晉之十一月也其下文曰己丑士彌牟營成周計丈數揣髙卑度厚薄仞溝洫物土方議逺邇量事期計徒庸慮財用書餱糧以令役於諸侯又曰庚寅栽宋仲㡬不受功庚寅即己丑之明日而傳分為兩年豈有遲之兩月而始栽宋仲幾乃不受功者乎且此役不過三旬而畢矣五伯五伯之稱有二有三代之五伯有春秋之五伯左氏成公二年齊國佐曰五伯之霸也勤而撫之以役王命杜元凱云夏伯昆吾商伯大彭豕韋周伯齊桓晉文詩正義引服䖍云五伯謂夏伯昆吾商伯大彭豕韋周伯齊桓晉文與此同應劭風俗通亦主此説孟子五霸者三王之罪人也趙臺卿注齊桓晉文秦繆宋襄楚莊二説不同顔師古注漢書異姓諸侯王表五伯則以為昆吾大彭豕韋齊桓晉文同姓諸侯王表五伯則以為齊桓宋襄晉文秦穆呉夫差莊白虎通並存二説其後一説謂齊桓晉文秦繆楚吳闔閭據國佐對晉人言其時楚莊之卒甫二年不當遂列為五亦不當繼此無伯而定於五也其通指三代無疑國語祝融能昭顯天地之光明其後八姓昆吾為夏伯大彭豕韋為商伯莊子彭祖得之上及有虞下及五伯李軌注彭祖名鏗堯臣封於彭城厯虞夏至商年七百嵗是所謂五伯者亦商時也淮南子至於昆吾夏后之世髙誘注昆吾夏之伯夏后桀世也是知國佐以前其有五伯之名也久矣據此周時但有二伯穀梁傳交質子不及二伯左傳昭公四年椒舉對楚子言六王二公亦但指齊桓晉文若孟子所稱五伯而以桓公為盛則止就東周以後言之如嚴安所謂周之衰三百餘嵗而五霸更起者也然趙氏以宋襄並列亦未為允宋襄求霸不成傷於泓以卒未嘗霸也史記言越王句踐遂報彊吳觀兵中國稱號五伯子長在臺卿之前所聞異辭越世家言周元王使人賜句踐胙命為伯又言越兵横行於江淮東諸侯畢賀號稱霸王淮南子亦言越王句踐勝夫差於五湖南面而霸天下泗上十二諸侯皆朝之然則言三代之五伯當如杜氏之説言春秋之五伯當列句踐而去宋襄荀子以桓文及楚莊闔閭句踐為五伯江都易王問越王句踐董仲舒對以五伯是當時以句踐為五伯之數斯得之矣占法之多以日占事者史記天官書甲乙四海之外日月不占丙丁江淮海岱戊巳中州河濟庚辛華山以西壬癸恒山以北是也以時占事者越絶書公孫聖今日壬午時加南方史記賈誼傳庚子日斜服集予舍是也又有以月行所在為占史記龜䇿傳今昔壬子宿在牽牛漢書翼奉言白鶴館以月宿亢災後漢書蘇竟言白虹見時月入於畢是也周禮占夢掌其嵗時觀天地之㑹辨隂陽之氣以日月星辰占六夢之吉凶則古人之法可知矣漢以下則其説愈多其占愈鑿加以日時風角雲氣遲疾變動不一其物故有一事而合於此者或迕於彼豈非所謂大道以多岐亡羊者邪故士文伯對晉侯以六物不同民心不壹而太史公亦謂臯唐甘石書傳凌雜米鹽在人自得之於象占之外耳干寳解易六爻相雜唯其時物也曰一卦六爻則皆雜有八卦之氣若初九為震爻九二為坎爻也或若見辰戍言艮巳亥言兌也或以甲壬名乾乙癸名坤也或若以午位名離以子位名坎或若得來為惡物王相為興休廢為衰解爻有等故曰物曰爻中之義羣物交集五星四氣六親九族福徳刑殺衆形萬類皆來發於爻故總謂之物也説易如此小數詳而大道隠矣以此卜筮亦必不驗天文亦然褚先生補史記日者列傳孝武帝時聚㑹占家問之某日可取婦乎五行家曰可堪輿家曰不可建除家曰不吉叢辰家曰大凶厯家曰小凶天人家曰小吉太乙家曰大吉辯訟不决以狀聞制曰避諸死忌以五行為主以日同為占禆竈以逢公卒於戊子日而謂今七月戊子晉君將死萇𢎞以昆吾乙夘日亡而謂毛得殺毛伯而代之是乙夘日以卜其亡此以日之同於古人者為占又是一法天道逺春秋時鄭裨竈魯梓慎最明於天文昭公十八年夏五月宋衞陳鄭災裨竈曰不用吾言鄭又將火子産不從亦不復火二十四年夏五月乙未朔日食梓慎曰將水叔孫昭子曰旱也秋八月大雩是雖二子之精亦有時而失之也昭公七年公將適楚夢襄公祖梓慎曰君不果行子服惠伯曰行三月公如楚故張衡思𤣥賦曰慎竈顯以言天兮占水火而妄訊一事兩占襄公二十八年春無冰梓慎曰宋鄭其饑乎嵗在星紀而淫於𤣥枵以有時災隂不堪陽蛇乘龍龍宋鄭之星也宋鄭必饑𤣥枵虚中也枵耗名也土虚而民耗不饑何為裨竈曰今兹周王及楚子皆將死嵗棄其次而旅於明年之次以害鳥帑周楚惡之十一月癸巳天王崩十二月楚康王卒宋鄭皆饑一事兩占皆驗春秋言天之學天文五行之學愈疎則多中愈密則愈多不中春秋時言天者不過本之分星合之五行驗之日食星孛之類而已五緯之中但言嵗星而餘四星占不之及何其簡也邵子曰五星之説自甘公石公始而其所詳者往往在於君卿大夫言語動作威儀之間及人事之治亂敬怠故其説也易知而其驗也不爽揚子法言曰史以天占人聖人以人占天左氏不必盡信昔人所言興亡禍福之故不必盡驗左氏但記其信而有徴者爾而亦不盡信也三良殉死君子是以知秦之不復東征至於孝公而天子致伯諸侯畢賀其後始皇遂并天下季札聞齊風以為國未可量乃不久而簒於陳氏聞鄭風以為其先亡乎而鄭至三家分晉之後始滅於韓渾罕言姬在列者蔡及曹滕其先亡乎而滕滅於宋王偃在諸姬為最後僖三十一年狄圍衞衞遷於帝丘卜曰三百年而衞至秦二世元年始廢厯四百二十一年是左氏所記之言亦不盡信也列國官名春秋時列國官名若晉之中行宋之門尹鄭之馬師秦之不更庶長皆他國所無而楚尤多有莫敖令尹司馬太宰少宰御士左史右領左尹右尹連尹鍼尹宣公四年有箴尹克黃哀公十六年有箴尹固疑即緘尹寢尹工尹卜尹芋尹陳有芋尹葢藍尹沈尹清尹莠尹嚻尹陵尹郊尹樂尹宫廄尹監馬尹揚豚尹武城尹其官名大抵異於他國宋有禇師而鄭亦有之昭公一年子晳請以印為褚師地名左傳成公元年戰于鞌入自丘輿注云齊邑三年鄭師禦晉敗諸丘輿注云鄭地哀公十四年阬氏葬諸丘輿注云阬氏魯人也泰山南城縣西北有輿城又是魯地是三丘輿為三國地也文公七年穆伯如莒涖盟及鄢陵注云莒邑成公十六年戰于鄢陵注云鄭地今屬潁川郡是二鄢陵為二國地也襄公十四年伐秦至于棫林注云秦地十六年次于棫林注云許地是二棫林為二國地也襄公十七年衞孫蒯田于曹隧飲馬于重丘注云曹邑二十五年同盟于重丘注云齊地是二重丘為二國地也定公十二年費人北國人追之敗諸姑蔑無注當是魯地哀公十三年彌庸見姑蔑之旗注云越地今東陽大末縣是二姑蔑為二國地也地名盂者有五僖公二十一年宋公楚子陳侯蔡侯鄭伯許男曹伯㑹于盂宋之盂也定公八年單子伐簡城劉子伐盂以定王室周之盂也十四年衞太子蒯聵獻盂于齊衞之盂也而晉則有二盂昭公二十八年孟丙為盂大夫今太原盂縣哀公四年齊國夏伐晉取邢任欒鄗逆畤隂人盂壺口此盂當在邢洺之間州國有二桓公五年州公如曹注州國在城陽淳于縣十一年鄖人將與隨絞州蓼伐楚師注州國在南郡華容縣東南昌􅩃僖公三十年王使周公閲來聘饗有昌􅩃白黑形鹽注曰昌歜昌蒲葅而釋文歜音在感反正義曰齊有邴歜魯有公父歜文公十七年周甘歜敗戎于邥垂其音為觸説文歜盛氣怒也從欠蜀聲此昌歜之音相傳為在感反不知與彼為同為異今攷顧氏玉篇有􅩃字徂敢切昌蒲俎也然則傳之昌􅩃正合此字而唐人已誤作歜廣韻亦誤作歜是知南北之學陸孔諸儒猶有不能徧通哀公二十五年若見之君將嗀之今本作㱿廣韻注曰説文從口葢經典之誤文不自天寳開成始矣襄公二十四年日有食之正義曰此與二十一年頻月日食理必不然但其字則變古為篆改篆為𨽻書則縑以代簡紙以代縑多厯世代轉寫謬誤失其本真後儒因循莫能改易此通人之至論攷魏書江式言魯共王壞孔子宅得尚書春秋論語孝經又北平侯張倉獻春秋左氏傳書體與孔氏相類世謂之古文自古文以至於今其傳寫不知幾千百矣安得無誤後之學者於其所不能通必穿鑿而曲為之説其為經典之害也甚矣古之教人必先小學小學之書聲音文字是也顔氏家訓曰夫文字者墳籍根本世之學徒多不曉字讀五經者是徐邈而非許慎習賦誦者信褚詮而忽吕忱明史記者專皮鄒而廢篆籀學漢書者悦應蘇而略蒼雅不知書音是其枝葉小學乃其宗系吾有取乎其言文字不同五經中文字不同多矣有一經之中而自不同者如桑葚見於衞詩而魯則為黮鬯弓著於鄭風而秦則為韔左氏一書其錄楚也薳氏或為蒍氏箴尹或為鍼尹況於鐘鼎之文乎記曰書同文亦言其大略耳所見異辭已下公羊傳孔子生於昭定哀之世文宣成襄則所聞也隠桓莊閔僖則所傳聞也國史所載䇿書之文或有不備孔子得據其所見以補之至於所聞則逺矣所傳聞則又逺矣雖得之於聞必將參互以求其信信則書之疑則闕之此其所以為異辭也公子益師之卒魯史不書其日逺而無所攷矣無駭卒挾卒不書日同此義以此釋經豈不甚易而實是乎何休見桓公二年會稷之傳以恩之淺深有諱與目言之異而以書日不書日詳略之分為同此例則甚難而實非矣竊疑所見異辭所聞異辭所傳聞異辭此三語必有所本而齊魯諸儒述之然其義有三闕文一也諱惡二也言孫三也孔子曰邦無道危行言孫從前之一説則略於逺而詳於近從後之二説則晦於近而章於逺讀春秋者可以得之矣漢書言孔子作春秋有所褒諱貶損不可書見口授弟子弟子退而異言及口説流行故有公羊穀梁鄒夾之學鄒氏夾氏無傳夫喪欲速貧死欲速朽曾子且聞而未達非子游舉其事以實之亦烏得而明哉故曰春秋之失亂紀履緰來逆女何以不稱使昏禮不稱主人宋公使公孫壽來納幣則其稱主人何辭窮也辭窮者何無母也然則紀有母乎曰有有則何以不稱母母不通也富平李因篤曰此言經所以不書紀侯者以見母雖不通而紀侯有母則不得自稱主人以别於宋公之無母也母弟稱弟齊侯使其弟年來聘公羊傳其稱弟何母弟稱弟母兄稱兄左氏宣公十七年傳亦曰凡稱弟皆母弟也何休以為春秋變周之文從殷之質質家親親明當親厚異於羣公子也夫一父之子而以同母不同母為親疎此時人至陋之見春秋以下骨肉衰薄禍亂萌生鮮不由此詩人美鳲鳩均愛七子豈有於父母則望之以均平於兄弟則教之以疏外以此為質是所謂直情而徑行非親親之道郭氏曰若如公羊之説則異母兄弟不謂之兄弟乎程子曰禮文有立嫡子同母弟之説其曰同母弟葢謂嫡耳非以同母弟為加親也若以同母弟為加親則知有母不知有父是禽獸也子沈子隠公十一年公羊傳子沈子曰注云子沈子後師明説此意者沈子稱子冠氏上者著其為師也不但言子曰者辟孔子也其不冠子者他師也按傳中有子公羊子曰桓公六年宣公五年而又有子沈子曰隠公十一年莊公十年定公元年子司馬子曰莊公三十年子女子曰女音汝閔公元年子北宫子曰哀公四年何後師之多歟又有魯子曰莊公三年二十三年僖公五年二十年二十四年二十八年有髙子曰文公四年皆不冠子公穀梁傳有穀梁子曰隠公五年桓公八年尸子曰隠五年桓公八年沈子曰定公元年皆不冠子然則此傳不盡出於公羊子也明矣穀伯鄧侯書名穀伯綏來朝鄧侯吾離來朝傳曰皆何以名失地之君也穀鄧去魯甚逺不緣失地不得皆朝於魯其稱侯朝何貴者無後待之以初也其義甚明而何氏乃有去二時者桓公以火攻人君之説又有不月者失地君朝惡人之説胡氏因之遂以朝桓之貶歸之於天道矣鄭忽書名鄭忽出奔衞傳曰忽何以名春秋伯子男一也辭無所貶傳文簡而難曉李因篤曰春秋之法天子三公稱公王者之後稱公其餘大國稱侯小國稱伯子男見初獻六羽傳是則公侯為一等伯子男為一等也故子産曰鄭伯男也遭喪未踰年之君公侯皆稱子如宋子衛子陳子之類是也以其等本貴於伯子男故降而為子今鄭伯爵也伯與子男為一等下此更無所降不得不降而書名矣名非貶忽之辭故曰辭無所貶祭公來遂逆王后于紀桓公八年祭公來遂逆王后于紀九年春紀季姜歸于京師從逆者而言謂之王后從歸者而言謂之季姜此自然之文也猶詩之言為韓姞相攸也猶左氏之言息媯將歸過蔡也皆未嫁而冠以夫國之號此臨文之不得不然也而公羊以為王者無外其辭成矣又以為父母之於子雖為天王后猶曰吾季姜是其説經雖巧而非聖人之意矣今將曰逆季姜于紀則初學之士亦知其不通又將曰王后歸于京師則王后者誰之女辭窮矣公羊子葢拘於在國稱女之例隠公二年傳女在其國稱女在途稱婦入國稱夫人而不知文固有倒之而順者也傳文則有不同者左氏莊公十八年陳媯歸于京師實惠后爭門公羊閔公二年傳桓公使髙子將南陽之甲立僖公而城魯或曰自鹿門至於爭門者是也或曰自爭門至於吏門者是也注鹿門魯南城東門也據左傳臧紇斬鹿門之闗出奔邾是也爭門吏門並闕按説文淨魯北城門池也从水爭聲士耕切是爭門即以此水名省文作爭爾廣韻作埩後人以瀞字省作淨音才性切而梵書用之自南北史以下俱為才性之爭門不復知矣禮記潔靜精微只作靜字仲嬰齊卒魯有二嬰齊皆公孫也成公十五年三月乙巳仲嬰齊卒其為仲遂後者也杜氏注曰襄仲子公孫歸父弟成公十七年十一月壬申公孫嬰齊卒于貍脤則子叔聲伯也季㕛仲遂皆生而賜氏故其子即以父字為氏劉炫曰仲遂受賜為仲氏故其子孫稱仲氏族孔氏曰死後賜族乃是正法春秋之世有非禮生賜者華督是也季㕛仲遂亦同此例中唐以後賜功臣之號亦此意也生而賜氏非禮也以父字為氏亦非禮也春秋從其本稱而不沒其變氏其生也書公子遂其死也書仲遂卒于垂於其子也其生也書公孫歸父其死也書仲嬰齊卒公子季㕛卒亦同此義惟季㕛之子不見於經公羊傳仲嬰齊者何公孫嬰齊也此言仲嬰齊亦是公孫嬰齊非謂子叔聲伯故注云未見於經為公孫嬰齊今為大夫死見經為仲嬰齊此漢人解經之善若子叔聲伯則戰鞌成公二年如晉六年如莒八年已屢見於經矣為人後者為之子此語必有所受然嬰齊之為後後仲遂非後歸父也猶之叔孫僑如奔而立豹以為為兄後則非也傳拘於孫以王父字為氏之説而以嬰齊為後歸父則以弟後兄亂昭穆之倫矣非也且三桓亦何愛於歸父而為之立後哉隠十年無正已下穀梁傳隠十年無正者以無其月之事而不書非有意削之也穀梁以為隠不自正者鑿矣趙氏曰宣成以前人名及甲子多不具舊史闕也得之矣戎菽莊公三十一年齊侯來獻戎㨗傳曰戎菽也似據管子桓公北伐山戎得冬蔥及戎菽布之天下而為之説桓公以戎㨗夸示諸侯豈徒一戎菽哉且生民之詩曰蓺之荏菽荏菽斾斾傳曰荏菽戎菽也爾雅戎菽謂之荏菽亦作茙菽列子北宮子既歸進其茙菽有稻梁之味則自后稷之生而已蓺之不待桓公而始布矣隕石于宋五公穀二傳相傳受之子夏其宏綱大指得聖人之深意者凡數十條然而齊魯之間人自為師窮鄉多異曲學多辯其穿鑿以誤後人者亦不少矣且如隕石于宋五六鶂左氏公羊作鷁退飛過宋都此臨文之不得不然非史云五石而夫子改之石五史云鶂六而夫子改之六鶂也穀梁子曰隕石于宋五後數散辭也六鶂退飛過宋都先數聚辭也天下之達道五所以行之者三其散辭乎凡為天下國家有九經其聚辭乎初九潛龍後九也九二見龍先九也世未有為之説者也石無知故日之然則梁山崩不日何也鶂微有知之物故月之然則有鸜鵒來巢不月何也夫月日之有無其文則史也故劉敞謂言是月者宋不告日嫌與隕石同日書是月以别之也王子虎卒文公四年夏五月王子虎卒左氏以為王叔文公者是也而穀梁以為叔服按此後文公十四年有星孛入于北斗周内史叔服曰不出七年宋齊晉之君皆將死亂成公元年劉康公伐戎叔服曰背盟而欺大國此必敗明叔服别是一人非王子虎胡氏仍穀梁之誤穀梁日誤作曰穀梁傳宣公十五年中國謹日卑國月夷狄不日其曰潞子嬰兒賢也疏解甚迂按傳文曰字誤當作其日潞子嬰兒賢也書臯陶謨思曰贊贊襄哉吕刑今爾罔不由慰曰勤易大畜九三曰閑輿衞皆當作日古人日曰二字同一書法唯曰若之曰上畫不滿與日字異耳故陸氏釋文於九經中遇二字可疑者即加音切又有一字而兩讀者如詩豈不曰戒曰音越又人栗反曰為改嵗曰殺羔羊亦然自古經師所傳或以為日月之日或以為曰若之曰陸氏兩存而以其音别之毛晃以為一字兩音而駮其失誤矣史記秦始皇本紀贊而以責一日之孤正義曰日音馹日知録卷四
