body:
  text: 日知録卷三十崑山顧炎武撰天文三代以上人人皆知天文七月流火農夫之辭也三星在天婦人之語也月離于畢戍卒之作也龍尾伏晨兒童之謡也後世文人學士有問之而茫然不知者矣若厯法則古人不及近代之密樊深河間府志曰愚初讀律書見私習天文者有禁後讀制書見仁廟語楊士竒等曰此律自為民間設耳卿等安得有禁遂以天元玉厯祥異賦賜羣臣由律書之言觀之乃知聖人所憂者深由制書之言觀之乃知聖人之所見者大日食劉向言春秋二百四十二年日食三十六今連三年比食自建始以來二十嵗間而八食率二嵗六月而一發古今罕有異有大小希稠占有舒疾緩急余所見崇禎之世十七年而八食二年五月乙酉朔丁四年十月卒丑朔七年三月亥朔九年七月癸卯朔十十年正月辛丑朔年十二月乙未朔十四年月癸卯朔十七八月丙辰朔與漢成略同而稠急過之矣然則謂日食為一定之數無關於人事者豈非溺於疇人之術而不覺其自蹈於邪臣之説乎春秋昭公二十一年秋七月壬午朔日有食之公問於梓慎曰是何物也禍福何為對曰二至二分日有食之不為災日月之行也分同道也至相過也其他月則為災非也夫日月之在於天莫非一定之數然天象見於上而人事應於下矣為此言者殆於後世以天變不足畏之説進其君者也漢書五行志亦知其説之非而依違其間以為食輕不為大災水旱而已然則食重也如之何是故日食之咎無論分至月食日食月掩日也月食地掩月也今西洋天文説如此自其法未入中國而已有此論陸文裕金臺紀聞曰嘗聞西域人算日月食者謂日月與地同大若地體正掩日輪上則月為之食南城萬實月食辨曰凡黃道平分各一百八十二度半強對衝處必為地所隔望時月行適當黃道交處與日正相對則地隔日光而月為之食矣按其説亦不始於近代漢張衡靈憲曰當日之衝光常不合者蔽於地也是謂暗虛在星星微月過則食載後漢天文志中俗本地字有誤作他者遂疑别有所謂暗虛而致紛紛之説宋史天文志日火外明其對必有暗氣大小與日體同者非靜樂李鱸習西洋之學述其言曰月本無光借日之照以為光曜至望日與地日為一線月見地不見日不得借光是以無光也或曰不然曾有一年月食之時當在日沒後乃日尚未沈而出地之月巳食矣東月初升西日未沒人兩見之則地固未嘗遮日月也何以云見地不見日乎答曰子所見者非月也月之影也月固未嘗出地也何以驗之今試以一文錢置虛器中前之郤之不見錢形矣郤貯水令滿而錢見則知所見者非錢也乃錢之影也日將落時東方蒼蒼涼涼海氣升騰猶夫水然其映而升之亦月影也如必以東方之月為真月則是以水面之錢為真錢也然乎否乎又如漁者見魚浮水面而投乂刺之必稍下於魚乃能得魚其浮於水面者魚之影也舟人刺篙其半在水視之若曲焉此皆水之能影物也然則月之受隔於地又何疑哉嵗星吳伐越嵗在越故卒受其凶苻秦滅燕嵗在燕故燕之復建不過一紀二者信矣慕容超之亡嵗在齊而為劉裕所破國遂以亡豈非天道有時而不驗邪是以天時不如地利嵗星固有居其國而不吉者其行有嬴縮春秋傳嵗棄其次而旅於明年之次史記天官書已居之又東西去之國凶淮南子當居不居越而之他處以近事考之嵗星當居不居其地必有殃咎考授時歷假目嵗星未有不退之時但晨退四十六日夕退四十六日各有竒共止得九度七十六分有竒而十二宮大約各三十度以出宫為災不出宫不為災也五星聚史言周將代殷五星聚房齊桓將伯五星聚箕沈約宋書天文志云二竹書紀年帝辛三十年五星聚於房漢元年十月五星聚東井唐天寶九載八月五星聚尾箕大歷三年七月五星聚東井宋乾德五年三月五星聚奎景德四年六月司天監言五星聚而伏于鶉火淳熙十三年閏七月五星聚軫元太祖二十一年十一月五星聚見於西南明嘉靖三年正月丙子五星聚營室天啓四年七月丙寅五星聚張丙寅月之十四日日在張九度木十六度火七度土三度金三度水一度凡聚者四日占曰五星若合是謂易行有德受慶改立王者奄有四方子孫蕃昌無德受殃離其國家滅其宗廟百姓離去被滿四方考之前史所載惟天寶不吉蓋玄宗之政荒矣或曰漢從嵗宋從填唐從熒惑云四星之聚占家不以為吉驗之前代于張光武帝漢蜀志劉豹等言建安二十一年太白熒惑填星常從嵗星于牛女中宗紹晉晉書懷帝紀永嘉六年七月嵗星熒惑太白聚于斗牛天文志同但云聚于牛女而元帝紀則云永嘉中嵗填營惑太白聚牛斗之間一云四星一云三星不同庾信哀江南賦值五馬之南奔逢三星之東聚于觜參神武王齊于危文宣代魏于東井肅宗復唐于張髙祖王周皆為有國之祥也故漢獻帝初韓馥以四星會于箕尾欲立劉虞為帝唐咸通十年熒惑填星太白辰星會于畢昴詔王景崇披衮冕軍府稱臣以厭之然亦有不同者如慕容超之滅四星聚奎婁姚泓之滅四星聚東井至德二載四月壬寅四星聚鶉首後晉天福五年術士孫智永以四星聚斗分野有災勸南唐主巡東都宋靖康元年太白熒惑合于斗詔避殿減膳以圖消弭此則天官家所謂四星若合其國兵喪並起君子憂小人流而不可泥於一家之占者矣海中五星二十八宿漢書藝文志海中星占驗十二卷海中五星經雜事二十二卷海中五星順逆二十八卷海中二十八宿國分二十八卷海中二十八宿臣分二十八卷海中日月慧虹雜占十八卷海中者中國也故天文志曰甲乙海外日月不占蓋天象所臨者廣而二十八宿專主中國故曰海中二十八宿星名今天官家所傳星名皆起於甘石如郎將羽林三代以下之官左更右更三代以下之爵王良造父三代以下之人巴蜀河間三代以下之國春秋時無此名也人事感天易傳言先天後天考之史書所載人事動於下而天象變於上有驗於頃刻之間而不容遲者宋武帝欲受晉禪乃集朝臣宴飲日晚坐散中書令傅亮叩扉入見請還都謀禪代之事及出已夜見長星竟天拊髀歎曰我常不信天文今始驗矣隋文帝立晉王廣為皇太子其夜烈風大雪地震山崩民舍多壞壓死者百餘口唐玄宗為臨淄王將誅韋氏與劉幽求等微服入苑中向二鼓天星散落如雪幽求曰天道如此時不可失文宗以右軍中尉王守澄之言召鄭注對于浴堂門是夜彗出東方長三尺然則荆軻為燕太子丹謀刺秦王而白虹貫日衛先生為秦昭王畫長平之事而太白食昴固理之所有孟子言氣一則動志其此之謂與黃河清漢桓帝延熹九年濟陰東郡濟北平原河水清襄楷上言河者諸侯位也清者屬陽濁者屬陰河當濁而反清者陰欲為陽諸侯欲為帝也明年帝崩靈帝以解瀆亭侯入繼隋書言齊武成帝河清元年四月河濟清後十餘嵗隋有天下隋煬帝大業三年武陽郡河清數里十二年龍門河清後二嵗唐受禪金衛紹王大安元年徐沛黃河清臨洮人楊圭上書亦引襄楷之言後四嵗宣宗立元順帝至正二十一年十一月戊辰黃河自平陸三門磧下至孟津五百餘里皆清凡七日而明太祖興至其後尤驗正德河清世宗以興王即位泰昌河清崇禎帝以信王即位妖人闌入宫禁自古國家中葉多有妖人闌入宫禁之事固氣運之疵亦是法紀廢弛所致如漢武帝征和元年上居建章宫見一男子帶劍入中龍華門疑其異人命收之男子捐劍走逐之弗獲上怒斬門候成帝建始三年十月丁未渭水虒上小女陳持弓年九嵗走入橫城門入未央宫尚方掖門殿門門衛戶者莫見至句盾禁中而覺得綏和二年八月庚申鄭通里男子王褒師古曰鄭縣之通里衣綘衣小冠帶劍入北司馬門殿東門上前殿入非常室中解帷組結佩之收縳考問褒故公車大誰卒病狂易不自知入宫狀下獄死後漢靈帝光和元年五月壬午有人白衣入德陽門言梁伯夏教我上殿為天子中黃門桓賢等呼門吏僕射欲收縳吏未到須臾還走求索不得不知姓名四年魏郡男子張博送鐵盧詣太官博上書室殿山居屋後宫禁落屋歡呼上收縳考問辭忽不自覺晉惠帝太安元年四月癸酉有人自雲龍門入殿前北面再拜曰我當作中書監即收斬之五行志于寶曰夫禁庭尊祕之處今賤人徑入而門衛不覺者宫室將虛而下人踰之之妖也成帝咸康五年十一月有人持柘杖綘衣詣止車門上列為聖人使求見天子門候受辭辭稱姓吕名賜具言王和女可右足下有七星星皆有毛長七寸天令命可為天下母奏聞即伏誅并下晉陵誅可秦苻堅時有人入明光殿大呼曰甲申乙酉魚羊食人悲哉無復遺堅命執之俄而不見陳後主為太子時有婦人突入東宫大言曰畢國主唐髙宗永隆二年九月一日萬年縣女子劉凝靜乘白馬著白衣男子從者八九十人入太史局升令廳牀坐勘問比有何災異太史令姚玄辨執之以聞是夜彗見西方天市中長五尺武后神功元年二月庚子有人走入端門又入則天門至通天宫閽者及仗衛不之覺睿宗太極元年狂人假萬謙潛入承天門登太極殿升御牀自稱天子呼宿衛兵士令稱萬嵗德宗貞元八年二月丁亥許州人李狗兒持杖入含元殿擊欄檻擒得伏誅敬宗即位長慶四年三月戊辰狂人徐忠信闌入浴堂門杖四十配流天德文宗開成二年十一月癸亥新書作太和二年十月狂人劉德廣突入含元殿詔付京兆府杖殺之宋髙宗建炎二年十一月帝在揚州郊祀後數日有狂人具衣冠執香爐擕綘囊拜於行宫門外自言天遣我為官家兒書於囊紙刻於右臂皆是語鞫之不得姓名帝以其狂釋不問孝宗淳熙十四年正月紹興府有狂人突入恩平郡王第升堂踐王坐曰我大上皇孫來赴郡鞫訊終不語元順帝至正十年春京師麗正門樓斗拱內有人伏其中不知何自而至逺近聚觀之有旨取付法司鞫問但云薊州人詰其所從來皆惘若無知乃以不應之罪笞之忽不知所在史家並書之以為異明朝景泰三年五月癸巳朔以明日立太子具香亭於奉天門有一人自外徑入執紅棍擊香亭曰先打東南甲子木內使執之命付錦衣衛亦書於英宗實録然未有若萬歷四十三年張差一事宫中府中幾成莫解之禍更歷五朝流言未息天乎人乎吾不得而知之矣周禮閽人職云竒服怪民不入宫注曰怪民狂易是則先王固知其有此事而豫為之防矣詐稱太子建炎南渡有詐稱徐王棣者詐稱信王榛者詐稱越王偲次子者詐稱淵聖第二皇子者詐稱榮德帝姬者詐稱柔福帝姬者莫不伏法訖無異言乃福王時王之明一事中外流言洶洶不息藩鎮稱兵遂以藉口當時民間尚有疑以為真者此亦亡國之妖也已衛太子自殺於湖武帝為築歸來望思之臺事狀明白十年之後猶有如成方遂之乘黃犢車詣北闕吏民聚觀至數萬人公卿莫敢發言右將軍勒兵闕下以偹非常京兆尹雋不疑後到叱從吏收縳或曰是非未可知且安之不疑曰衛太子得罪于先帝亡不即死今來自詣此罪人也晉會稽王導子為桓玄所害以臨川王寶子修之為道子嗣尊妃王氏為太妃義熙中有稱元顯道子世子子秀熙避難蠻中而至者太妃請以為嗣於是修之歸於别第劉裕意其詐而案驗之果散騎郎滕羡奴勺藥也竟坐棄市太妃不悟哭之甚慟本傳近時之論多有似乎此者外國應天象昔人言朔漠諸國唯占於昴北亦不盡然晉志云是時雖二石僣號而其疆弱常占於昴不關太微紫宫考之史流星入紫宫而劉聰死熒惑守心而石虎死孛星太微大角熒惑太白入東井而苻生弒彗起尾箕掃東井而燕滅秦彗起奎婁掃虛危而慕容德有齊地太白犯虛危而南燕亡熒惑在匏瓜中忽亡入東井而姚秦亡熒惑守心而李勢亡熒惑犯帝座而吕隆滅月掩心大星而魏宣武弒熒惑入南斗而孝武西奔月掩心星而齊文宣死彗星見而武成傳位彗星歷虛危而齊亡太白犯軒轅而周閔帝弒熒惑入軒轅而明帝弒嵗星掩太微上將而宇文護誅熒惑入太微而武帝死若金時則太白入太微而海陵弒白氣貫紫微而髙琪殺胡沙虎彗星起大角而哀宗滅其他難以悉數夫中國之有都邑猶人家之有宅舍星氣之失如宅舍之有妖祥主人在則主人當之主人不在則居者當之此一定之理而以中外為限斷乃儒生之見不可語於天道也魏明帝問黃權曰天下鼎立何地為正對曰當驗天文往者熒惑守心而文帝崩吳蜀無事此其徵也晉康帝建元三年嵗星犯天關安西將軍庾翼與兄氷書曰嵗星犯天關占云關梁當分比來江東無他故江道亦不艱難而石虎頻年再閉關不通信使此復是天公憒憒無皂白之徵也梁武帝中大通六年先是熒惑入南斗去而復還留止六句上以諺云熒惑入南斗天子下殿走乃跣而下殿以禳之及聞魏主西奔慙曰彼亦應天象邪星事多凶淮南王安以客言彗星長竟天天下兵當大起謀為畔逆而自剄國除眭孟言大石自立僵栁復起當有從匹夫為天子者而以祅言誅趙廣漢問太史知星氣者言今年當有戮死大臣即上書言丞相罪而身坐要斬甘忠可推漢有再受命之運而以罔上惑衆下獄病死弟子夏賀良等用其説以誅齊康候知東郡有兵私語門人為王莽所殺卜者王况以劉氏復興李氏為輔為李焉作讖書十餘萬言莽皆殺之國師公劉秀女愔言宫中當有白衣會乃以自殺西門君惠語王涉以國師公姓名當為天子遂謀以所部兵劫莽事發被誅王即明星歷嘗以河北有天子氣而以僣位誅死襄楷言天文不利黃門常侍當族滅而卒陷王芬自殺劉焉聞董扶言益州有天子氣求為益州牧而以天火燒城憂懼病卒子璋降於昭烈孔熙先推宋文帝必以非道晏駕禍由骨肉江州當出天子而卒與范曄等謀反棄市并害彭城王郭黁言代吕者王又言涼州分野有大兵故舉事先推王詳後推王乞基而卒之代吕隆者王尚又言滅秦者晉遂南奔秦人追而殺之劉靈助占爾朱當滅乂言三月末我必入定州遂舉兵以三月被擒斬於定州苗昌裔言太祖後當再有天下趙子嵩習聞其説靖康末起兵檄文頗涉不遜卒以貶死成祖永樂末欽天監官王射成言天象將有易主之變孟賢等信之謀立趙王髙燧並以伏誅是數子者之占不可謂不驗而適以自禍其身是故占事知來之術惟正人可以學漢書謂夫子之言性與天道不可得聞而仲舒下吏夏侯囚執眭孟誅戮李尋流放此學者之大戒眭兩夏侯京翼李傳贊又曰星事凶悍非湛密者弗能由也藝文志蜀漢杜瓊精於術學初不視天文無所論説譙周常問其意瓊曰欲明此術甚難須當身視識其形色不可信人也晨夜苦劇然後知之復憂漏泄不如不知是以不復視也後魏髙允精於天文遊雅數以災異問允允曰陰陽災異知之甚難既已知之復恐漏泄不如不知也天下妙理至多何遽問此雅乃止北齊權會明風角玄象學徒有請問者終無所説每云此學可知不可言諸君並貴遊子弟不由此進何煩問也惟有一子亦不授此術石虎之太史令趙攬以天文死苻生之太醫令程延以方脈死故淮南子曰好事者未嘗不中注中傷也圖讖史記趙世家扁鵲言秦穆公寤而述上帝之言公孫支書而藏之秦讖於是出矣秦本紀燕人盧生使入海還以鬼神事因奏録圖書曰亡秦者胡也然則讖記之興實始於秦人而盛於西京之末也褚先生三代世表論引黃帝終始傳始皇備丐奴而亡秦者少子胡亥漢武殺中都官詔獄繫者而即帝位者皇曾孫病已苻生殺魚遵而代生者東海王堅宋廢帝欲南巡湘中而代子業者湘東王彧齊神武惡見沙門而亡髙者宇文周武殺紇豆陵而篡周者楊堅見隋書王劭傳隋煬族李渾而禪隋者李淵唐太宗誅李君羡而革唐者武后周世宗代張永德而繼周者藝祖孔子閉房記自漢以後凡世人所傳帝王易姓受命之説一切附之孔子如沙丘之亡卯金之興皆謂夫子前知而預為之讖其書蓋不一矣魏髙祖太和九年詔自今圖讖祕緯及名為孔子閉房記者一皆焚之留者以大辟論舊唐書王世充傳世充將謀篡位有道士桓法嗣者自言解圖讖乃上孔子閉房記畫作丈夫持一竿以驅羊釋云隋楊姓也干一者王字也王居羊後明相國代隋為帝也世充大悅詳此乃似今人所云推背圖者今則託之李淳風而不言孔子隋書藝術傳臨孝恭著孔子馬頭易卜書一卷百刻一日十二時計刻則以百刻為日今歷家每時有十刻則一百二十刻矣何以謂之百刻乎曰歷家有大刻有小刻初一初二初三初四正一正二正三正四謂之大刻合一日計之得九十六刻其不盡者置一初初於初一之上置一正初於正一之上謂之小刻每刻止當大刻六分之一合一日計之為初初者十二為正初者十二又得四大刻合前為百刻宋王逵蠡海集言百刻之説每刻分為六十分百刻共得六十分散於十二時每時得五百分如此則一時占八刻零二十分將八刻截作初正各四刻却將二十分零數分作初初正初微刻各一十分也困學紀聞所載易氏之説亦同周禮挈壺氏注漏箭晝夜共百刻刻字始見漢書宣帝紀五鳳三年詔曰神光並見燭耀齋宫十有餘刻又曰鸞鳳集長樂宫東闕樹上飛下止地留十餘刻禮記樂記百度得數而有常注百度百刻也靈樞經漏水下百刻以分晝夜説文漏以銅受水刻節晝夜百節隋書天文志昔黃帝創觀漏水制品取則以分晝夜其後因以命官周禮挈壺氏則其職也其法總以百刻分於晝夜梁天監六年武帝以晝夜百刻分配十二辰得八刻仍有餘分乃以晝夜為九十六刻一辰有全刻八焉漢哀新莽以百二十刻為日梁武以九十六刻為日是知每辰得八刻仍有餘分者古法也五代史馬重績傳重續言漏刻之法以中星考晝夜為一百刻八刻六十分刻之二十為一時時以四刻十分為正此自古所用也今失其傳以午正為時始下侵未四刻十分而為午由是晝夜昏曉皆失其正請依古改正從之五代會要晉天福三年司天監奏漏刻經云晝夜一百刻分為十二時每時有八刻三分之一六十分為一刻一時有八刻二十分玉海每時初行一刻至四刻六分之一為時正終八刻三分之一則交八次時國史志每時八刻二十分每刻一擊鼓八鼓後進時牌餘二十分為雞唱唱絶擊一十五鼓為時正雨水禮記月令仲春之月始雨水桃始華倉庚鳴鷹化為鳩始雨水者謂天所雨者水而非雪也今歷去此一句嫌於雨水為正月中氣也鄭康成月令注曰夏小正正月啓蟄漢始亦以驚蟄為正月中疏引漢書律歷志云正月立春節雨水中二月驚蟄節春分中是前漢之末劉歆作三統厯改驚蟄為二月節也然淮南子先雨水後驚蟄則漢初已有此説逸周書周月解春三中氣雨水春分穀雨而蔡雍月令問答云問者曰既不用三統以驚蟄為正月中雨水為二月節皆三統法也獨用之何曰孟夏月令曰蟄蟲始震今作振在正月也仲春始雨水則雨水二月也以其合故用之是則三統未嘗改雨水在驚蟄之前也改之者四分厯耳記疏誤也今二月間尚有雨雪唯南方地暖有正月雨水者南史宋孝武帝紀大明元年正月庚午都下雨水蓋以雨水為異左傳桓五年啓蟄而郊注啓蟄夏正建寅之月夏小正正月啓蟄王應麟曰改啓為驚蓋避景帝諱則當依古以驚蟄為正月中雨水為二月節為是律厯志又先榖雨後清明五行淮南子五行子生母曰義母生子曰保子母相得曰專母勝子曰制子勝母曰困抱朴子引靈寶經謂支干上生下曰寶下生上曰義上克下曰制下克上曰伐上下同曰專以保為寶以困為伐今厯家承用之建除建除之名自斗而起始見於太公六韜云開牙門當背建向破越絶書黃帝之元執辰破已霸王之氣見於地户淮南子天文訓寅為建卯為除辰為滿已為平午為定末為執申為破酉為危戌為成亥為收子為開丑為閉漢書王莽傳十一月壬子直建戊辰直定蓋是戰國後語史記日者傳有建除家解縉封事言治厯明時授民作事但伸播種之宜何用建除之謬方向煞神事甚無謂孤虛宜忌亦且不經東行西行之論天德月德之云臣料唐虞之厯必無此等之文所宜著者日月之行星辰之次仰觀俯察事合逆順七政之齊正此類也艮巽坤乾厯家天盤二十四時有所謂艮巽坤乾者不知其所始按淮南子天文訓曰子午卯酉為二繩丑寅辰己未申戌亥為四鉤東北為報德之維西南為背陽之維東南為常羊之維西北為蹄通之維斗指子則冬至加十五日指癸則小寒加十五日指丑則大寒加十五日指報德之維則越陰在地故曰距日冬至四十六日而立春加十五日指寅則雨水加十五日指甲則雷驚蟄加十五日指卯中繩故曰春分則雷行加十五日指乙則清明風至加十五日指辰則榖雨加十五日指常羊之維則春分盡故曰有四十六日而立夏加十五日指巳則小滿加十五日指丙則芒種加十五日指午則陽氣極故曰有四十六日而夏至加十五日指丁則小暑加十五日指未則大暑加十五日指背陽之維則夏分盡故曰有四十六日而立秋加十五日指甲則處暑加十五日指庚則白露降加十五日指酉中繩故曰秋分加十五日指辛則寒露加十五日指戌則霜降加十五日指蹄通之維則秋分盡故曰有四十六日而立冬加十五日指亥則小雪加十五日指壬則大雪加十五日指子所謂報德之維常羊之維背陽之維蹄通之維即艮巽坤乾也後人省文取卦名當之爾太一太一之名不知始於何時吕東萊大事記曰古之醫者觀八風之虛實邪正以治病因有太一九宫之説時黃氏日抄注吕氏春秋太一曰此未為神名也史記天官書中宫天極星其一明者為太一常居周禮注昊天上帝又名太一封禪書亳人謬忌奏祠太一方曰天神貴者太一太一佐曰五帝古者天子以春秋祭太一東南郊用太牢七日為壇開八通之鬼道於是天子令太祝立其祠長安東南郊常奉祠如忌方其後人有上書言古者天子三年一用太牢祠神三一天一地一太一天子許之令太祝領祠之於忌太一壇上如其方此太一之祠所自起易乾鑿度曰太一取其數以行九宫河圖之數戴九履一左三右七二四為肩六八為足五居中央從橫十五故曰太一取其數以行九宫鄭玄注曰太一者北辰神名也下行八卦之宫每四乃還於中央中央者地神地神疑作北辰之所居故謂之九宫天數以陽出以陰入陽起於子陰起於午是以太一下行九宫從坎宫始自此而坤宫又自此而震宫既又自此而巽宫所行者半矣還息於中央之宫既又自此而乾宫自此而兑宫自此而艮宫自此而離宫行則周矣上遊息於太一之星而反紫宫行起從坎宫終於離宫也後漢黃香作九宫賦南齊書髙帝紀案太一九宫占歷推自漢髙帝五年至宋順帝升明元年太一所在易乾鑿度曰太一取其數以行九宫九宫者一為天蓬以制冀州之野二為天內以制荆州之野三為天衝其應在青四為天輔其應在徐五為天禽其應在豫六為天心七為天柱八為天任九為天英其應在雍在梁揚揚在兖天衝者木也天輔者亦木也故木行太過不及其眚在青在徐天柱金也天心亦金也故金行太過不及其眚在梁在雍惟水無應宫也此謂以九宫制九分野也山堂考索漢立太一祠即甘泉泰畤也唐謂之太清紫極宫宋謂之太一宫宋朝尤重太一之祠以太一飛在九宫每四十餘年而一徙所臨之地則兵疫不興水旱不作在太平興國中太宗立祠於東南郊而祀之則謂之東太一在天聖中仁宗立祠於西南郊而祀之則謂之西太一在熙寧中神宗建集福宫而祀之則謂之中太一宋史劉黻傳言西太一之役佞者進曰太一所臨分野則有福近嵗自吳移蜀信如祈禳之説西北坤維按堵可也當作西南今五六十州安全者不能十數敗降者相繼福何在耶武帝祠太一於長安至晚年以虛耗受禍而後悔方士之謬雖其悔之弗早猶愈於終不知悔者也正五九月唐朝新格以正五九月為忌月今人相沿以為不宜上任考唐書武德二年正月甲子詔自今正月五月九月不得行刑禁屠殺詔曰釋典微妙淨業始於慈悲道教沖虛至德去其殘殺四時之禁無伐麛卯三驅之化不取前禽蓋欲敦崇仁惠蕃衍庶物立政經邦咸率茲道朕祗應靈命撫遂羣生言念亭育無忘鑒寐殷帝去網庶踵前修齊王捨牛實符本志自今以後每年正月五月九月及每月十齋日並不得行刑所在公私宜斷屠殺三白居易在杭州詩曰仲夏齋戒月旬斷腥羶雲麓漫鈔曰釋氏智論云天帝釋以大寶鏡照四大神洲每月一移察人善惡正五九月照南贍部洲唐太宗崇其教太宗當作髙祖故正五九月不食葷百官不支羊錢其後因此遂不上官菽園雜記謂新官上任應祭告神祗必須宰殺故忌之也愚按正五九月不上任自是五行家言不緣屠宰其傳已久亦不始於唐時南齊書張融傳攝祠部倉部二曹倉曹以正月俗人所忌太倉為可開不融議不宜拘束小忌北齊書宋景業傳顯祖將受魏禪或曰陰陽書五月不可入官犯之終於其位景業曰王為天子無復下期豈得不終於其位乎顯祖大悅南史王鎮惡傳鎮惡以五月五日生其祖猛曰昔孟嘗君以惡月生而相齊是以五月為惡月又考左傳鄭厲公復公父定叔之位使以十日入曰良月也就盈數焉而顔師古注漢書李廣數竒以為命隻不耦段會宗傳亦足以復鴈門之踦應劭曰踦隻也會宗從沛郡下為鴈門又坐法免為踦隻不耦也霍去病傳諸宿將常留落不耦是則以雙月為良隻月為忌喜耦憎竒古人已有之矣後漢書桓談傳言卜數隻偶之類蓋古已有此術遼史正旦日上於窗間擲米團得隻數為不利册府元龜德宗貞元十五年九月乙巳詔自今二月一日九月九日每節前放開屠一日中和重陽二節唐人正五九月齋戒不禁閏月白居易有閏九月九日獨飲詩云自從九月持齋戒不醉重陽十五年是閏九月可以飲酒也册府元龜載唐開元二十二年十月敕曰道家三元誠有科誡朕嘗精意禱亦久矣而初未蒙福念不在茲今月十四日十五日是下元齋日都內人應有屠殺令河南尹李適之句當總與贖取其百司諸厨日有肉料亦責數奏來并百姓間是日並停宰殺漁獵等兼肉料食自今以後兩都及天下諸州每年正月七月十月元日起十三至十五兼宜禁斷又舊唐書武宗紀會昌四年春正月乙酉朔勑齋月斷屠出於釋氏國家創業猶近梁隋卿相大臣或沿茲弊鼓刀者既獲厚利紏察者潛受請求正以萬物生植之初宜斷三日列聖忌斷一日仍準開元二十二年勑三元日各斷三日餘月不禁此則道家之説乃正七十月而非正五九月又與武德二年之語不同今人所謂三官齋用此後漢書南丐奴傳胸奴俗嵗有三龍祠常以正月五月九月戊日祭天神此與三長月同古今神祠史記封禪書言秦雍旁有百數十祠而陳寶尤著其神或嵗不至或嵗數來常以夜光輝若流星從東南來集於祠城則若雄雞其聲殷殷云野雞夜雊又云雍菅廟有杜主杜主故周之右將軍其在秦中最小鬼之神者自西京以下而秦時所奉之神絶無影響後漢劉盆子傳軍中常有齊巫鼓舞祠城陽景王以求福助巫狂言景王大怒曰當為縣官何故為賊有笑巫者輒病軍中驚動琅邪王京傳國中有城陽景王祠吏人奉祀神數下言官中多不便利魏書初城陽景王劉章以有功於漢故其國為立祠青州諸郡轉相倣效濟南尤盛至六百餘祠賈人或假二千石輿服𨗳從作倡樂奢侈日甚民坐貧窮厯世長吏無敢禁絶者太祖到時為濟南相皆毁壞祠屋止絶官吏民不得祠祀應劭風俗通曰自琅邪青州六郡及渤海都邑鄉亭聚落皆為立祠造飾五工千石車商人次第為之立服帶綬備置官屬烹殺謳歌紛籍連日轉相誑耀言有神明其譴問禍福立應歷載彌久莫之匡糾惟樂安太傅陳蕃濟南相曹操一切禁絶肅然政清陳曹之後稍復如故然考之於史晉時猶有其祠晉書五行志臨淄有大蛇負二小蛇入漢城陽景王祠中慕容德載記德如齊城登營邱至漢城陽景王廟而今并無其廟宋書元凶劭傳以輦迎蔣侯神像於宫內啓即稽字顙乞恩拜為大司馬封鍾山郡王食邑萬户加節鉞蘇侯為驃騎將軍胡三省通鑑注曰蘇侯神即蘇峻南齊書蘇祖思傳為都昌令隨青州刺史桓護之入堯廟廟有蘇侯神偶坐護之曰唐堯聖人而與蘇侯神共坐今欲正之何如祖思曰使君若清蕩此坐則是堯廟重去四凶繇是諸雜神並除禮志明帝立九州廟於雞籠山大聚羣神蔣侯加爵位至相國大都督中外諸軍事鍾山王蘇侯至驃騎大將軍南史齊東昏侯紀迎蔣侯神入宫晝夜祈禱自誅始安王遙光遂加位相國末又號為靈帝車服羽儀一依王者曹景宗傳梁武帝時旱甚詔祈蔣帝神十旬不雨帝怒命載荻欲焚其廟將起火當神上忽有雲如繖倐忽驟雨如㵼臺中宫殿皆自振動帝懼馳詔追停少時還靜自此帝畏信遂深自踐阼以來未嘗躬自到廟於是備法駕將朝臣修謁陳書武帝紀十月乙亥即皇帝位丙子幸鍾山祀蔣帝廟宋書孔季恭傳先是吳興頻喪太守云項羽神為卞山王居郡聽事二千石至常避之南齊書李安民傳太守到郡必須祀以軛下牛安民奉佛法不與神牛著屐上聽事又於廳上八關齋俄而牛死安民亦卒世以神為祟今南京十廟雖有蔣侯湖州亦有卞山王而亦不聞靈響魏書任城王澄除揚州刺史下車毁蔣子文之廟教梁簡文帝集有吳興楚王神廟碑云楚王既𢎞茲釋止獻車牛是神牛自武帝時革之也流江總卞山楚廟詩盛祀百世英威定幾何而梓潼二即三官純陽之類以後出而反受世人之崇奉關壯繆之祠至遍於天下封為帝君豈鬼神之道亦與時為代謝者乎應劭言平帝時天地六宗已下及諸小神凡千七百所今營宇夷泯宰器闕亡蓋物盛則衰自然之道天其或者欲反本也而水經注引吳猛語廬山神之言謂神道之事亦有換轉昔夫子答宰我黃帝之問謂生而民得其利百年死而民畏其神百年亡而民用其教百年故曰黃帝三百年烈山氏之子曰柱食于稷湯遷之而祀棄以帝王神聖且然則其他人鬼之屬又可知矣春秋之世猶知淫祀之非故衛侯夢夏相而寧子弗祀晉侯卜桑林而荀罃弗禱楚昭王有疾卜曰河為祟王弗祭曰三代命祀祭不越望江漢雎漳楚之望也不榖雖不德河非所獲罪也至屈原之世而沅湘之間並祀河伯豈所謂楚人鬼而越人禨亦皆起於戰國之際乎夫以昭王之所弗祭者而屈子歌之可以知風俗之所從變矣雲麓漫鈔言自釋氏書入中國有龍王之説而河伯無聞矣洪武三年六月癸亥詔曰五嶽五鎮四海四瀆之封起自唐世崇名美號厯代有加在朕思之則有不然夫嶽鎮海瀆皆髙山廣水自天地開闢以至於今英靈之氣萃而為神必皆受命於上帝幽微莫測豈國家封號之所可加瀆禮不經莫此為甚至如忠臣烈士雖可加以封號亦惟當時為宜夫禮所以明神人正名分不可以僣差今宜依古定制凡嶽鎮海瀆並去其前代所封名號止以山水本名稱其神郡縣城隍神號一體改正歷代忠臣烈士亦依當時初封以為實號後世溢美之稱皆與革去庶幾神人之際名正言順於禮為當用稱朕以禮事神之意其東嶽祝文曰神有歷代之封號豫詳之再三畏不敢效可謂卓絶千古之見乃永樂七年正月丙子進封漢秣陵尉蔣君之神為忠烈武順昭靈嘉佑王則何不考之聖祖之成憲也佛寺晉許榮上疏言臣聞佛者清逺玄虛之神今僧尼往往依傍法服五戒粗法尚不能遵而流惑之徒競加敬事又侵漁百姓取財為惠亦未合布施之道也雒陽伽藍記有比丘惠凝死去復活見閻羅王閲一比丘是靈覺寺寶明自云出家之前嘗作隴西太守造靈覺寺成棄官入道閻羅王曰卿作太守之日曲理枉法劫奪民財假作此寺非卿之力何勞説此付司送入黑門此雖寓言乃居官佞佛者之針砭也梁武帝問逹磨曰朕自即位以來造寺寫經度僧不可勝紀有何功德答曰並無功德帝曰何以無功德答曰此但人天小果有漏之因如影隨形雖有非實在彼法中已有能為是言者宋明帝以故第為湘宫寺備極壯麗欲造十級浮圖而不能乃分為二新安太守巢尚之罷郡入見上謂曰卿至湘宫寺未此是我大功德用錢不少通直散騎侍郎虞願侍側曰此皆百姓賣兒貼婦錢所為佛若有知當慈悲嗟憫罪髙浮圖何功德之有泰山治鬼嘗考泰山之故仙論起於周末鬼論起於漢末左氏國語未有封禪之文是三代以上無仙論也史記漢書术有考鬼之説是元成以上無鬼論也鹽鐵論云古者庶人魚菽之祭士一廟大夫三以時有事於五祀無出門之祭今冨者祈名嶽望山川椎牛擊鼓戲倡舞像則出門進香之俗已自西京而有之矣自哀平之際而讖緯之書出然後有如遁甲開山圖所云泰山在左元父在右亢父知生梁父主死博物志所云泰山一曰天孫言為天帝之孫主召人魂魄知生命之長短者其見於史者則後漢書方術傳許峻自云嘗篤病三年不愈乃謁泰山請命烏桓傳死者神靈歸赤山赤山在遼東西北數千里如中國人死者魂神歸泰山也三國志管輅傳謂其弟辰曰但恐至泰山治鬼不得治生人如何而古辭怨詩行云齊度遊四方各繫泰山録人間樂未央忽然歸東嶽陳思王驅車篇云魂神所繫屬逝者感斯征劉楨贈五官中郎將詩云常恐遊岱宗不復見故人應璩百一詩云年命在桑榆東嶽與我期然則鬼論之興其在東京之世乎或曰地獄之説本於宋玉招魂之篇長人土伯則夜乂羅剎之倫也爛土雷淵則刀山劍樹之地也雖文人之寓言而意已近之矣於是魏晉以下之人遂演其説而附之釋氏之書昔宋胡寅謂閻立本寫地獄變相而周興來俊臣得之以濟其酷又孰知宋玉之文實為之祖孔子謂為俑者不仁有以也夫蕃俗信鬼蕃俗信鬼丐奴欲殺二師二師罵曰我死必滅胸奴遂屠二師以祠會連雨雪數月畜産死人民疫病榖稼不熟單于恐為二師立祠室慕容雋斬冉閔於龍城遏陘山山左右七里草木悉枯蝗蟲大起人言閔為祟雋遣使祀之諡曰悼武天王其日大雪魏太祖殺和跋誅其家後世祖西巡五原回幸豺山校獵忽遇暴風雲霧四塞世祖怪而問之羣下言跋世居此土祠家猶存或者能致斯變帝遣古弼祭以三牲霧即除散後世祖搜狩之日每先祭之蓋伯有為厲理固有之無足怪也日知録卷三十
