body:
  text: 日知録巻二十崑山顧炎武撰非三公不得稱公公羊傳曰天子三公稱公王者之後稱公天子三公稱公周公召公畢公毛公蘇公是也王者之後稱公宋公是也杜氏通典曰周制非二王之後列國諸侯其爵無至公者春秋有虞公州公或因殷之舊爵或嘗為天子之官子孫因其號耳非周之典制也東遷而後列國諸侯皆僭稱公夫子作春秋而筆之於書則或公或否生不公葬則公之列國不公魯則公之於是天子之事與人臣之禮並見於書而天下之大法昭矣漢之西都有七相五公西都賦李善注公御史大夫將軍通稱也按後漢書獻帝謂御史大夫郗慮曰郗公天下寧有是邪是御史大夫得稱公也而光武則置三公後漢百官志太尉公一人司徒公一人司空公一人史家之文如鄧公禹呉公漢伏公湛宋公宏第五公倫牟公融袁公安李公固陳公寵橋公𤣥劉公寵崔公烈胡公廣王公龔楊公彪荀公爽皇甫公嵩董公卓曹公操非其在三公之位則無有書公者三國志若漢之諸葛公亮魏之司馬公懿呉之張公昭顧公雍陸公遜晉書若衞公瓘張公華王公導庾公亮陶公侃謝公安桓公温劉公裕之類非其在三公之位則無有書公者史至於唐而書公不必皆尊官洎乎今日誌狀之文人人得稱之矣吁何其濫與何其偽與若鄭端簡名臣記至無人不稱公非史體矣大雅古公亶父箋曰諸侯之臣稱君曰公白虎通曰臣子於其國中皆褒其君為公詩曰乃命魯公俾侯于東公者魯人之稱侯者周室之爵秦誓公曰嗟我士聽無譁夫秦誓之書公與春秋之書秦伯不已異乎曰春秋以道名分五等之爵班之天子不容僭差若秦誓本國之書孔子因其舊文而已公之媚子從公于狩亦秦人之詩也平王以後諸侯通稱為公則有不必專於本國者矣碩人之詩曰譚公維私左傳鄭莊公之言曰無寧兹許公復奉其社稷周之盛時亦有羣公之稱見於康王之誥及詩之雲漢此猶五等之君春秋書之通曰諸侯也左傳自王卿而外無書公者惟楚有之其君已僭為王則臣亦僭為公宣十一年所謂諸侯縣公皆慶寡人者也漢書沛公注孟康曰楚舊僭稱王其縣宰為公淮南子魯陽公注楚之縣公也楚僭號稱王其守縣大夫皆稱公𫝊中如葉公析公申公鄖公蔡公息公商公期思公並邊中國白公邊呉蓋尊其名以重邊邑呂氏春秋楚又有卑梁公戰國策楚人有宛公新城公而秦有麃公索隱曰蓋麃邑公史失其姓名楚漢之際有滕公戚公柘公薛公郯公蕭公陳公魏公留公方與公髙祖初稱沛公太上皇父稱豐公皆楚之遺名左傳齊亦有邢公棠公此縣公之公也御史監郡者亦稱監公見曹相國世家有失其名而公之者史記秦始皇紀侯公項羽紀樅公侯公髙祖紀單父人呂公新城三老董公孝文紀太倉令淳于公天官書甘公封禪書申公齊人丁公曹相國世家膠西葢公留侯世家東園公夏黄公穰侯𫝊其客宋公信陵君𫝊毛公薛公賈生𫝊河南守呉公張敖𫝊中大夫泄公黥布𫝊故楚令尹薛公季布𫝊母弟丁公鼂錯傳謁者僕射鄧公鄭當時𫝊下邽翟公酷吏傳河東守申屠公貨殖𫝊朱公任公漢書髙帝紀終公藝文志蔡公毛公樂人竇公黄公毛公皇公張耳陳餘傳范陽令徐公甘公劉歆𫝊魯國桓公趙國貫公周昌傳趙人方與公武五子𫝊瑕丘江公王褒𫝊九江被公于定國𫝊其父于公翟方進傳方進父翟公儒林傳免中徐公博士江公食子公淄川任公皓星公游俠𫝊故人呂公茂陵守令尹公皆失其名而公之若鄭君盧生之比明祖實録於孝慈髙皇后之父亦不知其名謂之馬公是史之闕文非正書也史記髙帝紀呂公注崔浩云史失其名但舉姓而言公漢書髙帝紀注應邵曰樅公者不知其名故曰公注家發其例於此餘並不注太史公者司馬遷稱其父談故尊而公之也有尊老而公之者戰國策孟嘗君問馮公有親乎史記文帝謂馮唐公奈何衆辱我是也漢書溝洫志趙中大夫白公師古曰葢相呼尊老之稱項籍𫝊南公服䖍曰南方之老人也眭宏𫝊東平嬴公師古曰長老之號元后傳元城建公服䖍曰年老者也呉志程普傳普最年長時人皆呼程公方言凡尊老周晉秦隴謂之公晉書樂志項伯語項莊曰公莫古人相呼曰公漢書何武傳號為煩碎不稱賢公後漢書李固傳京師咸歎曰是復為李公矣宦者𫝊种暠為司徒告賓客曰今身為公乃曹常侍力焉魏志王粲𫝊蔡邕聞粲在門倒屣迎之曰此王公孫也晉書陳騫傳對父矯曰主上明聖大人大臣今若不合意不過不作公耳魏舒𫝊夜聞人問寢者為誰曰魏公舒舒自知當為公矣陸曄傳從兄機每稱之曰我家世不乏公矣王猛傳父老曰王公何縁拜也北史鄭述祖𫝊少時在鄉單馬出行忽有騎者數百見述祖皆下馬曰公在此陶淵明孟長史𫝊從父太常䕫嘗問光禄大夫劉耽孟君若在當已作公否答云此本是三司人是知南北朝以前人語必三公方得稱公也周書姚僧垣𫝊宣帝嘗從容謂僧垣曰嘗聞先帝呼公為姚公有之乎對曰臣曲荷殊私實如聖㫖帝曰此是尚齒之辭非為貴爵之號朕當為公建國開家為子孫永業乃封長壽縣公邑一千戸孔融告髙宻縣為鄭𤣥特立一鄉曰鄭公鄉以為公者仁德之正號不必三事大夫此是曲說據其所引皆史失其名之公而太史公又父子之辭也戰國策陳軫將之魏其子陳應止其公之行史記留侯世家吾惟豎子固不足遣乃公自行耳此皆謂父為公宋書顔延之𫝊何偃路中遥呼延之曰顔公延之答曰身非三公之位又非田舍之公又非君家阿公何以見呼為公北齊書徐之才傳鄭道有嘗戲之才為師公之才曰既為汝師又為汝公在三之義頓居其兩陸雲作祖父誄曰呉丞相陸公誄曰維赤烏八年二月粤乙夘呉故使持節郢州牧左都䕶丞相江陵郡侯陸公薨曰故散騎常侍陸府君誄曰維太康五年夏四月丙申晉故散騎常侍呉郡陸君卒王沈祭其父曰孝子沈敢昭告烈考東郡君張説作其父贈丹州刺史先府君墓誌每稱必曰君然則雖已之先人亦不一概稱公古人之謹於分也史記鼂錯𫝊錯父從潁川來謂錯曰上初即位公為政用事侵削諸侯人口議多怨公者是以父而呼子為公徐孚逺曰御史大夫三公也錯父呼錯為公葢以官稱之沙門亦有稱公者必以其名冠之深公法深也林公道林也逺公惠逺也生公道生也猷公道猷也隆公慧隆也誌公寳誌也澄公佛圖澄也安公道安也什公鳩摩羅什也當時之人嫌於直斥其名故加一公字古沙門皆稱名世説言安汰吐珠玉於前斌亮振金聲於後皆名也梁陳以下僧乃有字而人相與字之字之則不復公之矣宋史豐稷駮宋用臣諡議曰凡稱公者須耆宿大臣及鄉黨有德之士然則明之宦豎而稱公亦不可出於士大夫之口孫升談圃有朝士在中書稱李憲字荆公厲聲叱之曰是何人即出為監當古人不以甲子名嵗爾雅疏曰甲至癸為十日日為陽寅至丑為十二辰辰為隂此二十二名古人用以紀日不以紀嵗嵗則自有閼逢至昭陽十名為嵗陽攝提格至赤奮若十二名為嵗名周禮硩簇氏十日十有二辰十有二月十有二嵗之號注日謂從甲至癸辰謂從子至亥月謂從陬至荼嵗謂從攝提格至赤奮若後人謂甲子嵗癸亥嵗非古也自漢以前初不假借史記厯書太初元年年名焉即閼字逢攝提格月名畢聚日得甲子夜半朔旦冬至其辨晰如此若呂氏春秋序意篇維秦八年嵗在涒灘秋甲子朔賈誼鵩賦單閼之嵗兮四月孟夏庚子日斜兮服集予舍許氏説文後叙粤在永元困頓之年孟陬之月朔日甲子亦皆用嵗陽嵗名不與日同之證漢書郊祀歌天馬徠執徐時謂武帝太初四年嵗在庚辰兵誅大宛也資治通鑑周紀一起著雍攝提格盡𤣥黓困敦亦用古法自經學日衰人趨簡便乃以甲子至癸亥代之子曰觚不觚此之謂矣宋劉恕通鑑外紀目録序曰庖犧前後逮周厲王疑年茫昩借日名甲子以紀之是則嵗之稱甲子也借也何始乎自亡新始也王莽下書言始建國五年嵗在壽星填在明堂倉龍癸酉德在中宫又言天鳳七年嵗在大梁倉龍庚辰厥明年嵗在實沈倉龍辛巳隋書律厯志王莽銅權銘曰嵗在大梁龍集戊辰又曰龍在己巳嵗次實沈是也自此後漢書張純𫝊言攝提之嵗蒼龍甲寅朱穆𫝊言明年丁亥之嵗荀悅漢紀言漢元年實乙未也曹娥碑亦云元嘉元年青龍在辛夘蜀郡造橋碑云維延熹龍在甲辰而張角訛言蒼天已死黄天當立嵗在甲子天下大吉以白土書京城寺門及州郡官府皆作甲子字矣以甲子名嵗雖自東漢以下然其時制詔章奏符檄之文皆未嘗正用之其稱嵗必曰元年二年其稱日乃用甲子乙丑如己亥格庚戌制壬午兵之類皆日也宋書武帝紀有癸夘梓材庚子皮毛亦皆下詔之日惟晉書王廙上疏言臣以壬申嵗見用為鄱陽内史按懐帝以永嘉五年辛未為劉聰所執愍帝以建興元年癸酉即位中間一年無主故言壬申嵗也後代之人無大故而效之非也李暠上表亦云臣去乙巳嵗暠當時改元庚子不用晉年號晉書中以甲子名嵗者僅此兩見自三國鼎立天光分曜而後文人多舍年號而稱甲子魏程曉贈傅休奕詩龍集甲子四時成嵗晉張華感㛰賦方今嵗在己巳將次四仲陸機愍懐太子誄龍集庚戌日月改度陶潛祭從弟敬逺文嵗在辛亥月惟仲秋自祭文嵗維丁夘律中無射後周庾信哀江南賦粤以戊辰之年建亥之月而梁陶隱居真誥亦書己夘嵗至杜預左傳集解後序則追言魏哀王二十年太嵗在壬戌矣呉後主國山封禪文旃蒙協洽之嵗月次陬訾之舍日惟重光大淵獻日當言辛亥而冐用嵗陽嵗名則又失之晉惠帝時廬江杜嵩作壬子春秋壬子元康二年賈后弑楊太后于金墉城之嵗唐人有以豫書而不稱年號者舊唐書禮儀志曰請以開元二十七年己夘四月禘至辛巳年十月袷至甲申年四月又禘至丙戌年十月又祫至己丑年四月又禘至辛夘年十月又祫其辛巳以下不言開元某年又博古圖載唐鑑銘曰武德五年嵗次壬午八月十五日甲子楊州總管府造青銅鏡一面充癸未年元正朝貢其癸未亦不言武德六年者當時屢改年號故也此一鑑而有正書有豫書之不同亦變例也史家之文必以日繫月以月繫年鐘鼎之文則不盡然多有月而不年日而不月者六經中亦有之如詩吉日庚午是也商母乙卣其文曰丙寅王錫口貝朋用作母乙彛丙寅者日也博古圖乃謂商建國始於庚戌厯十七年而有丙寅在仲壬即位之三年則鑿矣豈非迷於後世之以甲子名嵗而欲以追加之古人乎春秋之世各國皆自紀其年發之於言或參互而不易曉則有舉其年之大事而為言者若曰㑹於沙隨之嵗叔仲惠伯㑹郤成子于承匡之嵗鑄刑書之嵗晉韓宣子為政聘于諸侯之嵗是也如溴梁之明年亦是又有舉嵗星而言若曰嵗五及鶉火嵗及大梁嵗在娵訾之口者從後人言之則何不曰甲子也癸亥也是知古人不用以紀嵗也太祖實録自呉元年以前皆書干支不合古法太祖當時實奉宋小明王之號故有言當紀龍鳳者考之史記髙帝之初不稱楚懐王元年而稱秦二年三年又太祖御製滁州龍潭碑文云元末帝至正十有四年竊意其時天下尚是元之天下書至正正合史記書秦之例今續綱目書至正又有兼書者漢書功臣侯表序漢興自秦二世元年之秋楚陳之嵗是也史家追紀月日之法或曰鑄刑書之嵗是則然矣其下云齊燕平之月又曰其明月則何以不直言正月二月乎曰此正史家文字縝宻處史之文有正紀有追紀其上曰春王正月暨齊平二月戊午盟于濡上正紀也此曰齊燕平之月壬寅公孫段卒其明月子産立公孫洩及良止以撫之追紀也追紀而再云正月二月則嫌於一嵗之中而有兩正月二月也故變其文而云古人史法之宻也左傳追紀之文不止此如襄公六年𫝊鄭子國之來聘也四月晏弱城東陽而遂圍萊甲寅堙之環城傅於堞及把桓公卒之月乙未王湫帥師及正輿子棠人軍齊師齊師大敗之丁未入萊萊共公浮柔奔棠正輿子王湫奔莒莒人殺之四月陳無宇獻萊宗器于襄宮晏弱圍棠十一月丙辰而滅之七年傳鄭僖公之為太子也於成之十六年與子罕適晉不禮焉又與子豐適楚亦不禮焉及其元年朝于晉子豐欲愬諸晉而廢之子罕止之十九年𫝊於四月丁未鄭公孫蠆卒赴於晉大夫二十五年𫝊㑹于夷儀之嵗齊人城郟其五月秦晉為成二十六年𫝊齊人城郟之嵗其夏齊烏餘以廩邱奔晉三十一年傳公薨之月子産相鄭伯以如晉昭公七年𫝊齊師還自燕之月罕朔殺罕魋又晉韓宣子為政聘于諸侯之嵗婤姶生子名之曰元皆是追紀又如書金縢既克商二年王有疾弗豫亦追紀也史家月日不必順序古人作史取其事之相屬不論月日故有追書有竟書左傳成公十六年鄢陵之戰先書甲午晦後書癸巳甲午為正書而癸巳則因後事而追書也昭公十三年平邱之盟先書甲戌後書癸酉甲戌為正書而癸酉則因後事而追書也昭公十三年楚靈王之弑先書五月癸亥後書乙夘丙辰乙夘丙辰為正書而五月癸亥則因前事而竟書也葢史家之文常患為月日所拘而事不得以相連屬故古人立此變例有先書以起事者通鑑唐文宗太和九年十一月先書是月戊辰王守澄葬于滻水於壬戌癸亥之前是也重書日春秋桓公十二年書丙戌公㑹鄭伯盟于武父丙戌衞侯晉卒重書日者二事皆當繫日先書公者先内而後外也邵國賢曰一丙戌一是即書一是追書即書者紀事之職追書者承赴之體後人作史凡一日再書則云是日古人必以日月繫年自春秋以下紀載之文必以日繫月以月繫時以時繫年此史家之常法也史記伍子胥𫝊己夘楚昭王出奔庚辰呉王入郢則不月而日刺客𫝊四月丙子光伏甲士於窟室中則不年而月史家之變例也葢二事已見於呉楚二世家故其文從省楚辭攝提貞于孟陬兮維庚寅吾以降攝提嵗也孟陬月也庚寅日也屈子以寅年寅月庚寅日生王逸章句曰太嵗在寅曰攝提格孟始也正月為陬言已以太嵗在寅正月始春庚寅之日下母之體而生是也或謂攝提星名天官書所謂直斗杓所指以建時節者非也豈有自述其世系生辰乃不言年而止言月日者哉長洲文待詔徴明以庚寅嵗生刻一印章曰維庚寅吾以降意謂與屈大夫同年非也屈子之云庚寅者日也使以嵗言無論古人不以甲子名嵗且使屈子生於庚寅至楚懐王被執於秦壬戌之嵗年僅三十有三何以云老冉冉其將至乎古無一日分為十二時古無以一日分為十二時之說洪範言嵗月日不言時周禮馮相氏掌十有二嵗十有二月十有二辰十日二十有八星之位不言時屈子自序其生年月日不及時呂才禄命書亦止言年月日不及時李虛中以人生年月日所直支干推人禍福生死百不失一初不用時也自宋而後乃并其時參合之謂之八字見謝肇淛五襍俎後周蘇綽作大誥曰王省惟嵗卿士惟月庶尹惟日御事惟時古無所謂時凡言時若堯典之四時左氏傳之三時桓公六年三時不害皆謂春夏秋冬也故士文伯對晉侯以嵗時日月星辰謂之六物荀子曰積微月不勝日時不勝月嵗不勝時亦謂春夏秋冬也自漢以下厯法漸宻於是以一日分為十二時葢不知始於何人而至今遵用不廢一日之中所以分紀其時者曰日中曰盡日曰日昃見於易曰東方未明曰㑹朝曰日之方中曰昬曰夕曰宵見於詩曰昩爽曰朝曰日中昃見於書曰朝時曰日中曰夕時曰雞初鳴曰旦曰質明曰大昕曰晏朝曰昬曰日出曰日側曰見日曰逮日見於禮爾雅疏日入後二刻半為昬曰雞鳴曰日中曰晝曰日下昃曰日旰曰日入曰夜曰夜中見於春秋傳曰鼂曰薄暮曰黄昬見於楚辭紀晝則用日史記項羽紀項王乃西從蕭晨擊漢軍而東至彭城日中大破漢軍呂后紀八月庚申旦平陽侯窋見相國産計事日餔時遂擊産彭越𫝊旦日日出十餘人後後者至日中淮南王安𫝊旦受詔日食時上漢書五行志日中時食從東北過半晡時復晡時食從西北日下晡時復武五子昌邑王𫝊夜漏未盡一刻以火發書其日中賀發晡時至定陶東方朔𫝊微行以夜漏下十刻乃出旦明入山下是也紀夜則用星詩之言三星在天三星在隅三星在戸春秋傳之言降婁中而旦是也周禮司寤氏以星分夜不辨星則分言其夜曰夜中曰夜半曰夜鄉晨是也分言其夜而不詳於是有五分其夜而言甲乙丙丁戊者周禮司寤氏掌夜時注夜時謂夜晚早若今甲乙至戊顔氏家訓或問一夜何故五更答曰漢魏以來謂為甲夜乙夜丙夜丁夜戊夜亦云一更二更三更四更五更皆以五為節所以然者假令正月建寅斗柄夕則指寅曉則指午矣自寅至午凡厯五辰冬夏之月雖復長短參差然辰間遼濶盈不至六縮不至四進退常在五者之間更厯也經也故曰五更爾漢書西域傳杜欽曰斥候士五分夜擊刁斗自守天文志本始元年四月壬戌甲夜地節元年正月戊午乙夜六月戊戌甲夜三國志曹爽傳自甲夜至五鼓爽乃投刀于地晉書趙王倫𫝊期四月三日丙夜一籌以鼓聲為應是也五分其夜而不詳於是有言漏上幾刻者五行志晨漏未盡三刻有兩月重見又云漏上四刻半乃頗有光禮儀志夜漏未盡七刻鐘鳴受賀東方朔傳微行以夜漏上十刻迺出王尊𫝊漏上十四刻行臨到外戚𫝊晝漏上十刻而崩又云夜漏上五刻持兒與舜㑹東交掖門自南北史以上皆然故素問曰一日一夜五分之隋志曰晝有朝有禺有中有晡有夕夜有甲乙丙丁戊而無十二時之目也唯厯書云雞三號卒明撫十二節卒于丑而下文却云朔旦冬至正北又云正北正西正南正東不直言子酉午夘漢書五行志言日加辰已又言時加未翼奉𫝊言日加申又言時加夘王莽𫝊天文郎按栻于前日時加某莽旋席隨斗柄而坐而呉越春秋亦云今日甲子時加于已周髀經亦有加夘加酉之言若紀事之文無用此者南齊書天文志始有子時丑時亥時北齊書南陽王綽𫝊有景時午時景時者丙時也左氏𫝊卜楚丘曰日之數十故有十時而杜元凱注則以為十二時雖不立十二支之目然其曰夜半者即今之所謂子也雞鳴者丑也平旦者寅也日出者夘也食時者辰也禺中者已也日中者午也日昳者未也晡時者申也日入者酉也黄昬者戌也人定者亥也一日分為十二始見於此考之史記天官書曰旦至食食至日昳日昳至餔餔至下餔下餔至日入素問藏氣法時論有曰夜半曰平旦曰日出曰日中曰日昳曰下晡王冰注以日昳為土王下晡為金王又有曰四季者注云土王是今人所謂丑辰未戌四時也呉越春秋有曰時加日出時加雞鳴時加日昳時加禺中則此十二名古有之矣史記孝景紀五月丙戌地動其蚤食時復動漢書武五子廣陵王胥傳奏酒至雞鳴時罷王莽𫝊以鷄鳴為時後漢書隗囂傳至昬時遂潰圍齊武王𫝊至食時賜陳潰耿弇𫝊人定時歩果引去來歙𫝊臣夜人定後為何人所賊傷竇武傳自旦至食時兵降畧盡皇甫嵩𫝊夜勒兵鷄鳴馳赴其陳戰至晡時大破之晉書戴洋𫝊永昌元年四月庚辰禺中時有大風起自東南折木宋書符瑞志延康元年九月十日黄昬時月蝕熒惑過人定時熒惑出營室宿羽林皆用此十二時淮南子日出於暘谷浴于咸池拂于扶桑是謂晨明登于扶桑之上爰始將行是謂朏明至于曲阿是謂朝明臨于曽泉是謂早食次于桑野是謂宴食臻于衡陽是謂禺中對于昆吾是謂正中靡于鳥次是謂小遷至于悲谷是謂晡時迴于女紀是謂大遷經于泉隅是謂髙舂頓于連石是謂下舂爰止羲和爰息六螭是謂懸車薄于虞泉是謂黄昬渝于䝉谷是謂定昬按此自晨明至定昬為十五時而卜楚邱以為十時未知今之所謂十二時者自何人定之也素問中有言嵗甲子者有言寅時者皆後人偽撰入之也年月朔日子今人謂日多曰日子日者初一初二之類是也子者甲子乙丑之類是也周禮職内注曰若言某月某日某甲詔書或言甲或言子一也文選陳琳檄呉將校部曲文年月朔日子李周翰注曰子發檄時也漢人未有稱夜半為子時者誤矣古人文字年月之下必繫以朔必言朔之第幾日而又繫之干支故曰朔日子也如魯相瑛孔子廟碑云元嘉三年三月丙子朔廿七日壬寅又云永興元年六月甲辰朔十八日辛酉史晨孔子廟碑云建寧二年三月癸夘朔七日己酉樊毅復華下民租碑云光和二年十二月庚午朔十三日壬午是也此日子之稱所自起若史家之文則有子而無日春秋是也後漢書隗嚻檄文曰漢復元年七月己酉朔己巳不言廿一日然在朔言朔在晦言晦而旁死魄哉生明之文見於尚書則有兼日而書者矣宋書禮志年月朔日甲子尚書令某甲下此古文移之式也陳琳檄文但省一甲字耳南史劉之遴與張纘等參校古本漢書稱永平十六年五月二十一日己酉郎班固而今本無上書年月日子隋書袁充上表稱寶厯之元改元仁壽嵗月日子還共誕聖之時時有十二而但稱子猶之干支有六十而但稱甲子也漢人之文有即朔之日而必重書一日者廣漢太守沈子琚綿竹江堰碑云熹平五年五月辛酉朔一日辛酉綏民校尉熊君碑云建安廿一年十闕月丙寅朔一日丙寅此則繁而無用不若後人之簡矣年號當從實書正統之論始於習鑿齒不過帝漢而偽魏呉二國耳自編年之書出而疑於年號之無所從而其論乃紛紜矣夫年號與正朔自不相關故周平王四十九年而孔子則書之為魯隱公之元年何也春秋魯史也據其國之人所稱而書之故元年也晉之乘存則必以是年為鄂侯之二年矣楚之檮杌存則必以是年為武王之十九年矣觀左傳文公十七年鄭子家與晉韓宣子書曰寡君即位三年而其下文曰十三年十四年十五年則自稱其國之年也襄公二十二年少正公孫僑對晉之辭曰在晉先君悼公九年我寡君於是即位而其下文遂曰我二年我四年則兩稱其國之年也故如三國志則漢人𫝊中自用漢年號魏人傳中自用魏年號吳人𫝊中自用吳年號推之南北朝五代遼金並各自用其年號此之謂從實若病其難知只須别作年表一巻且王莽簒漢而班固作𫝊其於始建國天鳳地皇之號一一用以紀年蓋不得不以紀年非帝之也後人作書乃以編年為一大事而論世之學疏矣春秋傳亦有用他國之年者齊襄公之二年鄋瞞伐齊注云魯桓公之十六年僖之四年子然卒簡之元年士子孔卒注云鄭僖四年魯襄六年鄭簡元年魯襄八年漢時諸侯王得自稱元年漢書諸侯王表楚王戊二十一年孝景三年楚元王𫝊亦云楚王延壽三十二年地節元年之類是也淮南天文訓淮南元年冬太一在丙子謂淮南王安始立之年也注者不逹乃曰淮南王作書之元年又曰淮南王僭號此為未讀史記漢書者矣趙明誠金石録有楚鐘銘惟王五十六祀之論正同此矣又考漢時不獨王也即列侯於其國中亦得自稱元年史記髙祖功臣侯年表髙祖六年平陽懿侯曹參元年孝惠六年靖侯窋元年孝文後四年簡侯竒元年是也呂氏考古圖周陽侯甗鍑銘曰周陽侯家銅三習甗鍑容五斗重十八斤六兩侯治國五年五月國鑄第四呂大臨曰侯治國五年者自以侯受侯嗣位之年數也文選魏都賦劉良注文昌殿前有鐘其銘曰惟魏四年嵗次丙申龍次大火五月丙寅作㽔賓鐘魏四年者曹操為魏公之四年漢獻帝之建安二十一年也元史順帝紀至正二十八年乃明洪武元年也直書二十八年自是以下書曰後一年曰又一年四月丙戌帝殂于應昌是時明太祖即位三年而猶書元主曰帝且不以明朝之年號加之深得史法疑此出於上裁不獨宋王二公之能守古法也宋史馬廷鸞傳瀛國公即位召不至自罷相歸又十七年而薨甚為得體然其他𫝊復有書至元者英宗命儒臣修續通鑑綱目亦書元順帝至正二十七年不書吳元年史書一年兩號古時人主改元並從下詔之日為始未嘗追改以前之月日也魏志三少帝紀上書嘉平六年十月庚寅下書正元元年十月壬辰吳志三嗣主傳上書太平三年十月己夘下書永安元年十月壬午晉書武帝紀上書魏咸熈三年十一月下書泰始元年十二月景寅宋書武帝紀上書晉元熈二年六月甲子下書永初元年六月丁夘文帝紀上書景平二年八月丙申下書元嘉元年八月丁酉明帝紀上書永光元年十二月庚申朔下書泰始元年十二月丙寅唐書髙宗紀上書顯慶六年二月己未下書龍朔元年三月丙申朔中宗紀上書神龍三年九月庚子下書景龍元年九月甲辰睿宗紀上書景龍四年七月己巳下書景雲元年七月己巳𤣥宗紀上書先天二年十二月庚寅朔下書開元元年十二月己亥韓文公順宗實録上書貞元二十一年八月庚子下書永貞元年八月辛丑若此之類並是據實而書至司馬温公作通鑑患其棼錯乃剏新例必取末後一號冠諸春正月之前當時已有譏之者春秋定公元年不書正月杜氏曰公即位在六月故正義曰公未即位必不改元而於春夏即稱元年者未改之日必承前君之年於是春夏當名此年為昭公三十三年及六月既改之後方以元年紀事及史官定策須有一統不可半年從前半年從後雖則年初亦統此嵗故入年即稱元年也漢魏以來雖於秋冬改元史於春夏即以元年冠之是有因於古也按温公通鑑是用此例然有不可通者春秋於昭公三十三年之春而即書定公元年者昭公已薨於上年之十二月矣若漢獻帝延康元年十月始禪于魏而正月之初漢帝尚存即加以魏文黄初之號則非春秋之義矣豈有舊君尚在當時之人皆稟其正朔而後之為史者顧乃追奪之乎史家變亂年號始自隋書大業十二年十一月景辰唐公入京師辛酉遥尊帝為太上皇立代王侑為帝改元義寧而下即書云二年三月右屯衛將軍宇文化及等作亂上崩于温室按此大業十三年煬帝在江都而䝉以代王長安之號甚為無理作史者唐臣不得不爾然於煬帝紀書十三年於恭帝紀書二年兩從其實似亦未害明朝太宗實録上書四年六月己巳下書洪武三十五年六月庚午正是史臣實書與前代合但不明書建文年號後人因謂之革除耳英宗實録上書景泰八年正月辛巳下書天順元年正月壬午旬有六日而不沒其實且如萬厯四十八年九月以後為泰昌元年若依温公例取泰昌之號冠於四十八年春正月之前則詔令文移一一皆當追改且上誣先皇矣故紀年之法從古為正不以一年兩號三號為嫌年號古今相同水經注穀水下千金堨前云太和五年曹魏明帝之太和也後云朝廷太和中元魏孝文帝之太和也割并年號唐朝一帝改年號者十餘其見於文必全書無割取一字用之者至宋始有熈豐政宣建紹乾淳之語已是不敬然猶一帝之號自相連屬無合兩帝而稱之者又必用上一字惟元豐以元字與元祐無别故用下字明朝文人有稱永宣成𢎞嘉隆合兩帝之號而為一稱天啓六年部疏稱正統正德為二正奉㫖列聖年號昭然如何說二正近又有去上字而稱慶厯啓禎更為不通矣地名割用一字如登萊如温台則可如真順廣大則不通矣然漢人已有之史記天官書勃碣海岱之間氣皆黑貨殖𫝊夫燕亦勃碣之間一都㑹也注云勃海碣石漢書王莽𫝊成命於巴宕注云巴郡宕渠縣魏晉以下始多此語常璩華陽國志分巴割蜀以成犍廣是犍為廣漢二郡左思蜀都賦跨躡犍牂是犍為牂牁二郡魏都賦恒碣碪􅑇於青霄是恒山碣石二山人名割用一字者左傳以太皥濟水為皥濟僖二十一年史記以黄帝老子為黄老曹相國世家張釋之田叔魏其鄭當時列𫝊以王喬赤松子為喬松蔡澤𫝊以伊尹管仲為伊管鄒陽𫝊以絳侯灌嬰為絳灌賈生𫝊孫氏西齋録唐人作書無所囘避孫樵所作西齋録乃是私史至於起王氏已廢之魂上配天皇條髙后擅政之年下繫中宗大義凜然視孔子之溝昭墓道不書定正而抑且過之矣此説本之沈既濟駮吳兢史議謂當并天后於孝和紀每嵗書某年春正月皇帝在房陵太后行某事改某制則紀稱孝和而事述太后名禮兩得至於姓氏名諱入宮之由厯位之資及才藝智略年辰崩葬別纂入皇后𫝊列於廢后王庶人之下題其篇曰則天順聖武皇后云事雖不行而史氏稱之其後宋范祖禹作唐鑑竟用此書法通鑑書改元晉書載記十六國時嗣位改元者皆在本年此史家取便序事連屬書之其實皆改明年元也不容十六國之中數十王皆不踰年而改元者也金石録據趙横山李君神碑石虎建武六年嵗在庚子與載記合若從帝紀則建武六年當是己亥今此碑與西門豹祠殿基記皆是庚子以此知帝紀之失此是差一年之證然載記亦不盡合昔人作史但存其年號而已初不屑屑於嵗月也續綱目景炎三年五月以後為帝昺祥興元年非也黄潛番禺客語改元在明年正月己酉朔蓋亦是即位之初改明年元耳史家省文即繫於前年月日之下曰改元祥興以此推十六國事必當同此後元年漢文帝後元年景帝中元年後元年當時只是改為元年後人追紀之為中為後耳若武帝之後元元年則自名之為後光武之中元元年梁武帝之中大通元年中大同元年則自名之為中不可一例論也元順帝至元元年重用世祖之號後人追紀之則曰後至元元年李茂貞稱秦王用天祐年號通鑑後唐莊宗同光二年封岐王李茂貞為秦王比得薛昌序所撰鳳翔法門寺碑天祐十九年建而其文已稱秦王則前乎同光之二年矣蓋必茂貞所自稱又史言茂貞奉天祐年號此碑之末亦書天祐十九年而篇中厯述前事則並以天復紀年至天復二十年止亦與史不合五代史李彦威𫝊是時昭宗改元天祐遷於東都為梁所迫而晉人蜀人以為天祐之號非唐所建不復稱之但稱天復前蜀世家則云建與唐隔絶而不知故仍稱天復其說不同按此碑則岐人亦稱天復史失之也又今陽城縣有後周顯德二年徐綸撰龍泉禪院記内述天祐十九年按此地本屬梁此記乃追削梁號而改稱天祐者通鑑書葬通鑑書外國之葬如晉紀義熙六年九月下云甲寅葬魏主珪於盛樂金陵不言魏葬而言葬魏或以為倣春秋之文愚以為非也春秋書葬宋穆公葬衞桓公之類皆魯遣其臣㑹葬故為此文徐邈曰凡書葬者據我而言葬若南北朝時本國自葬則當書魏葬如宋紀景平元年十二月庚子魏葬明元帝於金陵元嘉二十九年三月辛夘魏葬太武皇帝於金陵則得之矣通鑑書閏月通鑑書閏月而不著其為何月謂倣春秋之法非也春秋時閏未有不在嵗終者自太初厯行每月皆可置閏若不著其為何月或上月無事則後之讀者必費於追尋矣新唐書亦然惟髙宗顯慶二年正月無事乃書曰閏正月壬寅如洛陽宮史書人君未即位史書人君未即位之例左傳晉文公未入國稱公子已入國稱公史記漢髙帝未帝稱漢王未王稱沛公五年將戰垓下而曰皇帝在後絳侯柴將軍在皇帝後至其下文乃曰諸侯及將相相與共請尊漢王為皇帝於言為不順矣沈約作宋書於本紀第十巻順帝昇明三年四月壬申始書進齊公爵為齊王而前第八巻明帝泰始四年七月庚申已書以驍騎將軍齊王為南兖州刺史自此以下齊王之號累見於篇此言之不順也蕭子顯南齊書亦同此例史書一人先後厯官漢書溝洫志先稱博士許商次稱將作大匠許商後稱河隄都尉許商此書一人而先後厯官不同之法書君奭我聞在昔成湯既受命時則有若伊尹格于皇天在太甲時則有若保衡伊尹保衡一人也湯時未為保衡至太甲時始為此官故變文以稱之也史書郡縣同名漢時縣有同名者大抵加東西南北上下字以為別蓋本於春秋之法燕國有二則一稱北燕邾國有二則一稱小邾是其例也若郡國同名而不同地則於縣必加一小字沛郡不治沛治相故書沛縣為小沛廣陽國不治廣陽治薊故書廣陽縣為小廣陽丹陽郡不治丹陽治宛陵故書丹陽縣為小丹陽今順天府保定縣稱小保定寧國府太平縣稱小太平後人作史混書之而無別矣郡國改名後漢書光武紀建武六年春正月丙辰改舂陵鄉為章陵縣十七年冬十月甲申幸章陵修園廟祠舊宅又云乃悉為舂陵宗室起祠堂上言章陵見名也下言舂陵本舂陵侯之宗室不可因縣名而追改之也此史家用字之宻也史記南越王尉佗者真定人也此未當當曰東垣人盧綰𫝊髙帝十一年冬更東垣為真定儒林𫝊漢興田何以齊田徙杜陵師古曰初徙時未為杜陵蓋史家追言之也漢書夏侯勝𫝊夏侯勝字長公初魯共王分魯西寧鄉以封子節侯別屬大河大河後更名東平故勝為東平人趙廣漢𫝊趙廣漢字子都涿郡蠡吾人也故屬河間後漢書黨錮𫝊劉祐中山安國人也安國後別屬博陵夏侯湛東方朔畫像贊大夫諱朔字曼倩平原厭次人也魏建安中分厭次以為樂陵郡故又為郡人焉此郡國改名之例史書人同姓名史記漢髙帝時有兩韓信則別之曰韓王信漢書王莽時有兩劉歆則別之曰國師劉歆此其法本於春秋左氏𫝊襄公二十五年齊崔杼弑其君光事中有兩賈舉則別之曰侍人賈舉金史有二額爾克曰草火額爾克板子額爾克有三羅索曰大羅索曰中羅索曰小羅索述古凡述古人之言必當引其立言之人古人又述古人之言則兩引之不可襲以為已說也詩曰自古在昔先民有作程正叔𫝊易未濟三陽皆失位而曰斯義也聞之成都隱者是則時人之言而亦不敢沒其人君子之謙也然後可與進於學引古必用原文凡引前人之言必用原文水經注引盛𢎞之荆州記曰江中有九十九洲楚諺云州不百故不出王者桓𤣥有問鼎之志乃増一洲以充百數僭號數旬宗滅身屠及其傾敗洲亦消毁今上在西忽有一洲自生沙流迴薄成不淹時其後未幾龍飛江漢矣注乃北魏酈道元作而記中所指今上則南宋文帝以宜都王即帝位之事古人不以為嫌引書用意書泰誓受有億兆夷人離心離德予有亂臣十人同心同德左傳引之則曰太誓所謂商兆民離周十人同者衆也成元年淮南子舜釣於河濱期年而漁者爭處湍瀨以曲隈深潭相予爾雅注引之則曰漁者不爭隈此皆略其文而用其意也文章推服古人韓退之文起八代之衰於駢偶聲律之文宜不屑為而其滕王閣記推許王勃所為序且曰竊喜載名其上詞列三王之次有榮耀焉李太白黄鶴樓詩曰眼前有景道不得崔顥題詩在上頭所謂自古在昔先民有作者也今之好譏訶古人翻駁舊作者其人之宅心可知矣宋洪邁從孫倬丞宣城自作題名記邁告之曰他文尚可隨力工拙下筆如此記豈宜犯不韙哉蓋以韓文公有藍田縣丞㕔壁記故也夫以題目之同於文公而以為犯不韙昔人之謹厚何如哉史書下兩曰字注疏家凡引書下一曰字引書之中又引書則下一云字云曰一義變文以便讀也此出於論語牢曰子云是也若史家記載之辭可下兩曰字尚書多方周公曰王若曰是也孟子書多有兩曰字如公都子曰告子曰公孫丑問曰髙子曰公孫丑曰伊尹曰公孫丑曰詩曰書家凡例古人著書凡例即隨事載之書中左傳中言凡者皆凡例也易乾坤二卦用九用六者亦凡例也分題古人作書於一篇之中有分題則標篇題於首而列分題於下如爾雅釋天一篇下列四時祥災嵗陽嵗名月陽月名風雨星名祭名講武旌旂呂氏春秋孟春紀第一下列正月紀本生重已貴公去私是也疏家謂之題上事謂標題上文之事若周公踐阼及詩篇章句皆篇末題之故此亦爾今按禮記文王世子篇有曰文王之為世子也有曰教世子有曰周公踐阼樂記篇有曰子貢問樂亦同此例後人誤連於本文也又如漢書禮樂志郊祀歌練時日一帝臨二凡十九首皆著其名於本章之末安世房中歌桂華美芳二題傳冩之誤遂以冠後爾雅釋親一篇石經本宗族二字在晜兄也之後母黨二字在從母姊妹之後妻黨二字在為姒婦之後昏姻二字在吾謂之甥也之後今國子監刻本皆改之日知録巻二十
