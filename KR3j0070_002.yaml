body:
  text: 日知録卷二崑山顧炎武撰帝王名號堯舜禹皆名也古未有號故帝王皆以名紀臨文不諱也胡文定修春秋劄子臣聞古者不以名為諱堯典稱有鰥在下曰虞舜則堯舜者固二帝之名而堯典乃虞氏史官所作直載其君之名而不避也考之尚書帝曰格汝舜格汝禹名其臣也堯崩之後舜與其臣言則曰帝禹崩之後五子之歌則曰皇祖胤征則曰先王無言堯舜禹者不敢名其君也自啓至發皆名也夏后氏之季而始有以十干為號者桀之癸商之報丁報乙報丙主壬主癸皆號以代其名白虎通曰殷質以生日名子自天乙至辛皆號也太甲沃丁仲丁河亶甲祖乙盤庚皆以為書篇之名惟其號也商之王著號不著名而名之見於經者二天乙之名履辛之名受是也武庚亦是號祿父乃名也曰湯曰紂則亦號也孔氏西伯戡黎序傳受紂也音相亂號則臣子所得而稱故伊尹曰惟尹躬暨湯頌曰武湯曰成湯曰湯孫也微子之命言乃祖成湯多士言爾先祖成湯皆對其臣子稱之曰文祖曰藝祖曰神宗曰皇祖曰烈祖曰髙祖曰髙后曰中宗曰髙宗而廟號起矣曰玄王曰武王而諡立矣曰大舜曰神禹曰大禹曰成湯曰寧王而稱號繁矣自夏以前純乎質故帝王有名而無號自商以下寖乎文故有名有號而德之盛者有諡以美之於是周公因而制諡自天子逹於卿大夫美惡皆有諡而十干之號不立史記齊太公世家太公子丁公丁公子乙公乙公子癸公猶用商人之稱陸淳曰史記世本厲王以前諸侯有諡者少其後乃皆有諡然王季以上不追諡猶用商人之禮焉此文質之中而臣子之義也嗚呼此其所以為聖人也歟九族宗盟之列先同姓而後異姓喪服之紀重本屬而輕外親此必有所受之不自周人始矣克明俊德以親九族孔傳以為自髙祖至玄孫之親蓋本之喪服小記以三為五以五為九之説而百世不可易者也牧誓數商之罪但言昏棄厥遺王父母弟而不及外親吕刑申命有邦歷舉伯父伯兄仲叔季弟幼子童孫而不言甥舅古人所為先後之序從可知矣故爾雅謂於內宗曰族於母妻則曰黨而昏禮及仲尼燕居三族之文康成並釋為父子孫儀禮昏禮三族之不虞注三族謂父昆弟已昆弟子昆弟禮記仲尼燕居篇故三族和也注三族父子孫也杜元凱乃謂外祖父外祖母從母子及妻父妻母姑之子姊妹之子女子之子非己之同族皆外親有服而異族者左氏桓公六年傳注然則史官之稱帝堯舉其疏而遺其親無乃顛倒之甚乎且九族之為同姓經傳之中有明證矣春秋魯成公十五年宋共公卒傳曰二華戴族也司城莊族也六官者皆桓族也共公距戴公九世凡十三公內除同世者四公而唐六典宗正卿掌皇九族之屬籍以别昭穆之序紀親疏之别九廟之子孫其族五十有九光皇帝一族景皇帝之族六元皇帝之族三髙祖之族二十有一太宗之族十有三髙宗之族六中宗之族四睿宗之族五此在玄宗之時已有七族中睿二宗同為一世若其歷世滋多則有不止於九者而五世親盡故經文之言族者自九而止也杜氏於襄十二年傳注曰同族謂髙祖以下則前説之非不待辨而明矣又孔氏正義謂髙祖玄孫無相及之理桓六年不知髙祖之兄弟與玄孫之兄弟固可以相及如後魏國子博士李琰之所謂夀有長短世有延促不可得而齊同者如宋洪邁容齋隨筆言嗣濮王士歆在隆興為從叔祖在紹熙為曽叔祖在慶元為髙叔祖其明證矣余丁未嵗在大同遇代府中尉俊唽年近五十考其世次於孝宗為昆弟而上距𢎞治之元已一百八十年秦晉二府見在者多其六七世孫亦何必帝堯之世髙祖玄孫之族無一二人同在者乎疑其不相及而以外戚當之其亦昧於齊家治國之理矣路史曰親親治之始也禮小記曰親親者以三為五以五為九上殺下殺旁殺而親畢矣是所謂九族者也夫人生則有父壯則有子父子與己此小宗伯三族之别也周禮小宗伯掌三族之别以辨其親疏其正室皆謂之門子父者子之祖因上推之以及於己之祖子者父之孫因下推之以及於己之孫此禮傳之以三為五也已之祖自己子視之則為曾祖王父自己孫視之則為髙祖王父己之孫自己父視之則為曾孫自己祖視之則為玄孫故又上推以及已之曾髙下推以及已之曾玄是所謂以五為九也陳氏禮書曰已之所親以一為三祖孫所親以五為七記不言者以父子一體而髙玄與曾同服故不辨異之也服父三年服祖期則曾祖宜大功髙祖宜小功而皆齊衰三月者不敢以大小功旁親之服加乎至尊故重其衰麻尊尊也減其日月恩殺也此所謂上殺服適子三年庶子期適孫期庶孫大功適孫傳重者也有適子者無適孫則長子在皆為庶孫也則曾孫宜五月而與玄孫皆緦麻三月者曾孫服曾祖三月曾祖報之亦三月曾祖尊也故加齊衰曾孫卑也故服緦麻此所謂下殺服祖期則世叔宜大功以其與父一體故加以期周道親親至重者莫如兄弟兄弟之子進而為期其服同於子父之兄弟進而為期其服同於祖父故曰死喪之威兄弟孔懷從世叔則疏矣加所不及故服小功族世叔又疏矣故服緦麻此發父而旁殺者也祖之兄弟小功曾祖兄弟緦麻髙祖兄弟無服此發祖而旁殺者也同父至親期同祖為從大功同曾祖為再從小功同髙祖為三從緦麻此發兄弟而旁殺者也父為子期兄弟之子宜九月不九月而期者以其猶子而進之也從兄弟之子小功再從兄弟之子緦麻此發子而旁殺者也祖為孫大功兄弟之孫小功從兄弟之孫緦麻此發孫而旁殺者也蓋服有加也有報也有降也祖之齊衰世叔從子之期皆加也曾孫之三月與兄弟之孫五月皆報也若夫降有四品則非五服之正也觀於九族之訓如喪考妣之文而知宗族之名服紀之數蓋前乎二帝而有之矣後魏孝文太和中詔延四廟之子下逮玄孫之胄申宗宴於皇信堂不以爵秩為列悉序昭穆為次用家人之禮此由古聖人睦族之意而推之者也舜典古時堯典舜典本合為一篇故月正元日格于文祖之後而四嶽之咨必稱舜曰者以别於上文之帝也至其命禹始稱帝曰問答之辭已明則無嫌也惠迪吉從逆凶善惡報應之説聖人嘗言之矣大禹言惠迪吉從逆凶惟景響湯言天道福善禍淫伊尹言惟上帝不常作善降之百祥作不善降之百殃又言惟吉凶不僭在人惟天降災祥在德孔子言積善之家必有餘慶積不善之家必有餘殃豈真有上帝司其禍福如道家所謂天神察其善惡釋氏所謂地獄果報者哉善與不善一氣之相感如水之流濕火之就燥不期然而然無不感也無不應也此孟子所謂志一則動氣而詩所云天之牖民如塤如篪如璋如圭如取如攜者也其有不齊則如夏之寒冬之燠得於一日之偶逢而非四時之正氣也故曰誠者天之道也若曰有鬼神司之屑屑焉如人間官長之為則報應之至近者反推而之逺矣懋遷有無化居懋遷有無化居化者貨也古化貨二字多通用史記仲尼弟子傳與時轉貨資索隱曰家語貨作化運而不積則謂之化留而不散則謂之貨唐虞之世曰化而已至殷人始以貨名仲虺有不殖貨利之言三風有殉於貨色之警而盤庚之誥則曰不肩好貨於是移化之字為化生化成之化而厚斂之君發財之主多不化之物矣舜作南風之歌所謂勸之以九歌者也左傳文八年郤缺言九功之德皆可歌也謂之九歌讀之然後知解吾民之愠者必在乎阜吾民之財而自阜其財乃以來天下之愠三江北江今之揚子江也中江今之吳淞江也東迤北會為匯蓋指固城石臼等湖不言南江而以三江見之南江今之錢塘江也本郭璞記禹貢該括衆流無獨遺浙江之理而會稽又他日合諸侯計功之地也特以施功少故不言於導水爾三江既入一事也震澤底定又一事也後之解書者必謂三江之皆由震澤以二句相蒙為文而其説始紛紜矣程大昌曰弱水既西涇屬渭汭必謂既之一語為起下文則弱水未西其能越秦隴而亂涇渭乎可謂解頤之論錫土姓自三代以下人人無土人人有姓蓋自錫土之法廢而唐宋以下帝王之裔儕於庶人無世守之固錫姓之法廢而漢唐以下屬籍之系賜于功臣失氏族之源古之賜姓皆未有姓而賜之漢唐乃以天子之姓賜臣下後之鄙儒讀禹貢而不知其義者良多矣厥弟五人夏商之世天子之子其封國而為公侯者不見於經以太康之尸位而有厥弟五人使其並建茅土為國屏翰羿何至篡夏哉富辰言周公弔二叔之不咸故封建親戚以蕃屏周杜氏解曰弔傷也咸同也周公傷夏殷之叔世踈其親戚以至滅亡故廣封其兄弟而少康封其庶子於會稽以奉守禹祀二十餘世至於越之句踐卒霸諸侯有禹之遺烈夫亦監於太康孤立之禍而然與若乃孔子所謂大道既隱天下為家各親其親各子其子者亦從此而可知之矣惟彼陶唐有此冀方堯舜禹皆都河北故曰冀方至太康始失河北而五子御其母以從之於是僑國河南再傳至相卒為促所滅古之天子失其故都未有能國者也周失豐鎬而平王以東晉失雒陽宋失開封而元帝髙宗遷於江左遂以不振惟殷之五遷圮於河而非敵人之窺伺則勢不同爾唐自玄宗以後天子屢嘗出狩乃未幾而復國者以不棄長安也故子儀回鑾之表代宗垂泣宗澤還京之奏忠義歸心嗚呼幸而澆之縱欲不為民心所附少康乃得以一旅之衆而誅之爾後之人主不幸失其都邑而為興復之計者其念之哉夏之都本在安邑太康畋於洛表而羿距於河則冀方之地入於羿矣惟河之東與南為夏所有至后相失國依於二斟於是使澆用師殺斟灌在今夀光縣以伐斟鄩在今濰縣而相遂滅左傳哀元年乃處澆於過今掖縣以制東方處豷於戈杜氏解在宋鄭之間以控南國襄四年其時靡奔有鬲今在德平縣在河之東少康奔有虞今虞城縣在河之南而自河以內無不安於亂賊者矣合魏綘伍員二人之言可以觀當日之形勢而少康之所以布德兆謀者亦難乎其為力矣竹書謂太康元年即居斟鄩非也古之天子常居冀州後人因之遂以冀州為中國之號楚辭九歌覽冀州兮有餘淮南子女媧氏殺黑龍以濟冀州路史云中國總謂之冀州穀梁傳曰桓五年鄭同姓之國也在乎冀州正義曰冀州者天下之中州唐虞夏殷皆都焉以鄭近王畿故舉冀州以為説胤征羲和尸官慢天也葛伯不祀亡祖也至於動六師之誅興鄰國之伐古之聖人其敬天尊祖也至矣故王制天子巡守其削絀諸侯必先於不敬不孝惟元祀十有二月惟元祀十有二月乙丑元祀者太甲之元年十有二月者建子之月蓋湯之崩必以前年之十二月也殷練而祔伊尹祠於先王奉嗣王祗見厥祖祔湯於廟也非朔者祔廟無定日先君祔廟而後嗣子即位故成之為王而伊尹乃明言烈祖之成德以訓於王也若自桐歸亳以三祀之十二月者則適當其時而非有所取爾即位者即先君之位也未祔則事死如生位猶先君之位也故祔廟而後嗣子即位殷練而祔即位必在期年之後周卒哭而祔故踰年斯即位矣如魯成公以八月薨十二月葬襄公以明年正月即位有不待葬而即位如魯之文公成公者其禮之未失乎三年喪畢而後踐天子位舜也禹也練而祔祔而即位殷也踰年正月即位周也世變愈下而柩前即位為後代之通禮矣西伯戡黎以關中并天下者必先於得河東秦取三晉而後滅燕齊苻氏取晉陽而後滅燕宇文氏取晉陽而後滅齊故西伯戡黎而殷人恐矣少師古之官有職異而名同者太師少師是也比干之為少師周官所謂三孤也論語之少師陽則樂官之佐而周禮謂之小師者也故史記言紂之將亡其大師疵少師強抱其樂器奔周而後儒之傳誤以為微子也周本紀漢書古今人表亦有大師疵少師強殷紂之所以亡自古國家承平日久法制廢弛而上之令不能行於下未有不亡者也紂以不仁而亡天下人人知之吾謂不盡然紂之為君沈湎於酒而逞一時之威至於刳孕斫脛蓋齊文宣之比耳商之衰也久矣一變而盤庚之書則卿大夫不從君令再變而微子之書則小民不畏國法至於攘竊神祇之犧牷牲用以容將食無災可謂民玩其上而威刑不立者矣史記燕王喜遺樂閴書曰紂之時民志不入獄囚自出即以中主守之猶不能保而况以紂之狂酗昏虐又祖伊奔告而不省乎文宣之惡未必減於紂而齊以強髙緯之惡未必甚於文宣而齊以亡者文宣承神武之餘紀綱粗立而又有楊愔輩為之佐主昏於上而政清於下也至髙緯而國法蕩然矣故宇文得而取之然則論紂之亡武之興而謂以至仁伐至不仁者偏辭也未得為窮源之論也武王伐紂武王伐商殺紂而立其子武庚宗廟不毁社稷不遷時殷未嘗亡也所以異乎曩日者不朝諸侯不有天下而已故書序言三監及淮夷叛周公相成王將黜殷作大誥又言成王既黜殷命殺武庚茍子言周公殺管叔虛殷國注虛讀為墟謂殺武庚遷殷頑民於雒邑朝歌為墟也是則殷之亡其天下也在紂之自燔而亡其國也在武庚之見殺蓋武庚之存殷者猶十有餘年使武庚不畔則殷其不黜矣武王克商天下大定裂土奠國乃不以其故都封周之臣而仍以封武庚降在侯國而猶得守先人之故土蔡仲之命曰乃致辟管叔於商武庚未亂猶謂之商武王無富天下之心而不以叛逆之事疑其子孫所以異乎後世之篡弒其君者於此可見矣及武庚既畔乃命微子啓代殷而必於宋焉謂大火之祀商人是因弗遷其地也是以知古聖王之征誅也取天下而不取其國誅其君弔其民而存先世之宗祀焉斯已矣髙誘淮南子注曰天子不滅國諸侯不滅姓古之政也武王豈不知商之臣民其不願為周者皆故都之人公族世家之所萃流風善政之所存一有不靖易為搖動而必以封其遺胤蓋不以畔逆疑其子孫而明告萬世以取天下者無滅國之義也故宋公朝周則曰臣也周人待之則曰客也自天下言之則侯服於周也自其國人言之則以商之臣事商之君無變於其初也平王以下去微子之世逺矣而曰孝惠娶於商左氏哀二十四年傳曰天之棄商久矣僖二十二年傳曰利以伐薑不利子商哀九年傳吾是以知宋之得為商也國語吳王夫差闕為深溝通於商魯之間莊子商太宰蕩問仁於莊子韓非子子圉見孔子於商太宰商太宰使少庶子之市逸周書王會篇堂人下之左商公夏公立焉樂記商者五帝之遺聲也商識之故謂之商鄭氏注曰商宋詩也蓋自武庚誅而宋復封於是商人曉然知武王周公之心而君臣上下各止其所無復有怨懟不平之意與後世之人主一戰取人之國而毁其宗廟遷其重器者異矣樂記曰投殷之後於宋此本之吕氏春秋乃戰國時人之妄言以武王下車即封微子更誤或曰遷殷頑民於雒邑何與曰以頑民為商俗靡靡之民者先儒解誤也蓋古先王之用兵也不殺而待人也仁東征之役其誅者事主一人武庚而已謀主一人管叔而已下此而囚下此而降下此而遷而所謂頑民者皆畔逆之徒也無連坐并誅之法而又不可以復置之殷都是不得不遷而又原其心不忍棄之四裔故於雒邑又不忍斥言其畔故止曰殷頑民其與乎畔而遷者大抵皆商之世臣大族而其不與乎畔而留於殷者如祝他所謂分康叔以殷民七族陶氏施氏繁氏錡氏樊氏飢氏終葵氏是也非盡一國而遷之也或曰何以知其為畔黨也曰以召公之言讎民知之不畔何以言讎非敵百姓也古聖王無與一國為讎者也上古以來無殺君之事湯之與桀也放之而已使紂不自焚武王未必不以湯之所以待桀者待紂紂而自焚也此武王之不幸也當時八百諸侯雖並有除殘之志然一聞其君之見殺則天下之人亦且恫疑震駭而不能無歸過於武王此伯夷所以斥言其暴也及其反商之政封殷之後人而無利於其土地焉天下於是知武王之兵非得己也然後乃安於紂之亡而不以為周師之過故箕子之歌怨狡童而已無餘恨焉非伯夷親而箕子疏又非武王始暴而終仁也其時異也多士之書惟三月周公初於新邑洛用告商王士曰非我小國敢弋殷命亡國之民而號之商王士新朝之主而自稱我小國以天下為公而不沒其舊日之名分殷人以此中心悅而誠服卜世三十卜年八百其始基之矣泰誓商之德澤深矣尺地莫非其有也一民莫非其臣也武王伐紂乃曰獨夫受洪惟作威乃汝世讎曰肆豫小子誕以爾衆士殄殱乃讎何至於此紂之不善亦止其身乃至并其先世而讎之豈非泰誓之文出於魏晉間人之偽撰者邪蔡氏曰泰誓武城一篇之中似非盡出一人之口又引吳氏言疑其書之晚出或非盡當時之本文蓋已見及乎此特以注家之體未敢直言其偽耳朕夢協朕卜襲于休祥戎商必克伐君大事而託之乎夢其誰信之殆即吕氏春秋載夷齊之言謂武王揚夢以説衆者也左傳昭七年衛史朝之言曰筮襲于夢武王所用也是當時已有此語孟子引書王曰無畏寧爾也非敵百姓也若崩厥角稽首今改之曰罔或無畏寧執非敵百姓懍懍若崩厥角後儒雖曲為之説而不可通矣百姓有過在豫一人百姓有過在豫一人凡百姓之不有康食不虞天性不迪率典皆我一人之責今我當順民心以誅無道也蔡氏謂民皆有責於我似為紆曲王朝步自周武成王朝步自周于征伐商召誥王朝步自周則至于豐畢命王朝步自宗周至于豐不敢乘車而步出國門敬之至也馬氏曰豐文王廟所在鄭氏以為出廟入廟皆步行今按書言步自周則不但於廟也雍録以為步行二十五里則又太逺後之人君驕恣惰佚於是有輦而行國中坐而見羣臣非先王之制矣皇帝輦出房見於漢書叔孫通傳乃秦儀也吕氏春秋出則以輿入則以輦務以自佚命之曰招蹶之機枚乘七發本此作蹶痿之機宋吕大防言前代人主在宫禁之中亦乘輿輦祖宗皆步自內庭出御前殿此勤身之法也周輝清波雜志太祖實録吳元年上以諸子年長宜習勤勞使不驕惰命內侍製麻屨行幐每出城稍逺則馬行其二步趨其一至崇禎帝亦嘗步禱南郊嗚呼太祖之訓逺矣大王王季中庸言武王末受命周公成文武之德追王大王王季大傳言武王於牧之野既事而退遂率天下諸侯執豆籩駿奔走追王大王亶父王季歷文王昌二説不同今按武成言丁未祀於周廟而其告庶邦冢君稱大王王季金縢之册祝曰若爾三王是武王之時已追王大王王季而中庸之言未為得也綿之詩上稱古公亶父下稱文王是古公未上尊號之先文已稱王而大傳之言未為得也仁山金氏曰武王舉兵之日己稱王矣故類於上帝行天子之禮而稱有道曾孫周王發必非史臣追書之辭後之儒者乃嫌聖人之事而文之非也然文王之王與大王王季之王自不同時而追王大王王季必不在周公踐阼之後疑武王未克商先己追尊文王史記伯夷傳西伯卒武王載木主號為文王東伐紂彞倫彞倫者天地人之常道如下所謂五行五事八政五紀皇極三德稽疑庶徴五福六極皆在其中不止孟子之言人倫而已能盡其性以至能盡人之性盡物之性則可以贊天地之化育而彞倫敘矣龜從筮從古人求神之道不止一端故卜筮並用而終以龜為主周禮􅗺人言凡國之大事先􅗺而後卜注當用卜者先􅗺之即事有漸也於􅗺之凶則止不卜然而洪範有龜從筮逆者則知古人固不拘乎此也大卜掌三兆之法其經兆之體皆百有二十其頌皆千有二百故傳曰筮短龜長左傳晉獻公將以驪姬為夫人卜之不吉筮之吉卜人曰筮短龜長不如從長注物生而後有象象而後有滋滋而後有數龜象筮數故象長數短曲禮正義曰凡物初生則有象去初既近且包羅萬形故為長數是終末去初既逺推尋事數始能求象故以為短也自漢以下文帝代來猶有大橫之兆藝文志有龜書五十三卷夏龜二十六卷南龜書三十八卷巨龜三十六卷雜龜十六卷而後則無聞唐之李華遂有廢龜之論矣舊唐書周公居東主少國疑周公又出居於外而上下安寧無腹心之患者三公之力也武王之誓衆曰豫有亂臣十人同心同德於此見之矣荀子曰二公仁智且不蔽故能持周公而名利福祿與周公齊微子之命微子之於周蓋受國而不受爵受國以存先王之祀不受爵以示不為臣之節故終身稱微子也孔氏書傳曰微畿內國名子爵也微子卒立其弟衍是為微仲衍之繼其兄繼宋非繼微也而稱微仲者何猶微子之心也至於衍之子稽則逺矣於是始稱宋公嗚呼吾於洪範之書言十有三祀微子之命以其舊爵名篇而知武王周公之仁不奪人之所守也後之經生不知此義而抱器之臣倒戈之士接迹於天下矣酒誥酒為天之降命亦為天之降威紂以酗酒而亡文王以不腆於酒而興興亡之幾其原皆在於酒則所以保天命而畏天威者後人不可不謹矣召誥古者吉行日五十里故召公營洛乙未自周戊申朝至於洛凡十有四日師行日三十里故武王伐紂癸巳自周戊午師渡孟津凡二十有五日漢書以為三十一日誤元子微子之命以微子為殷王元子召誥則又以紂為元子曰皇天上帝改厥元子兹大國殷之命又曰有王雖小元子哉人君謂之天子故仁人之事天如事親其稽我古人之德傅説之告髙宗曰學於古訓乃有獲武王之誥康叔既祗遹乃文考而又求之殷先哲王又求之商耉成人又别求之古先哲王大保之戒成王先之以稽我古人之德而後進之以稽謀自天及成王之作周官亦曰學古入官曰不學牆靣子曰述而不作信而好古又曰好古敏以求之又曰君子以多識前言往行以畜其德先聖後聖其揆一也不學古而欲稽天豈非不耕而求穫乎節性降衷于下民若有恆性此性善之説所自出也節性惟日其邁此性相近之説所自出也豈弟君子俾爾彌爾性似先公酋矣命也有性焉君子不謂命也汝其敬識百辟享人主坐明堂而臨九牧不但察羣心之向背亦當知四國之忠姦故嘉禾同穎美侯服之宣風底貢厥􅋙戒明王之慎德所謂敬識百辟享也昔者唐明皇之致理也受張相千秋之鏡聽元生于蒍之歌亦能以謇諤為珠璣以仁賢為器幣及乎王心一蕩佞諛日崇開廣運之談致江南之貨廣陵銅器京口綾衫錦纜牙檣彌亘數里靚妝鮮服和者百人乃未幾而薊門之亂作矣然則韋堅王鉷之徒剝民以奉其君者皆不役志于享者也易曰公用享于天子小人弗克若明皇者豈非享多儀而民曰不享者哉惟爾王家我適朝覲者不之殷而之周訟獄者不之殷而之周於是周為天子而殷為侯服矣此之謂惟爾王家我適王來自奄多方之誥曰惟五月丁亥王來自奄而多士王曰昔朕來自奄是多方當在多士之前後人倒其篇第耳元儒王柏論亦同此但更置太多未敢信奄之叛周是武庚既誅而懼遂與淮夷徐戎並興而周公東征乃至於三年之久孟子曰伐奄三年討其君是也伐奄成王時事上言相武王因誅紂而連言之耳既克而成王踐奄蓋行巡狩之事書序成王既踐奄將遷其君於蒲姑是也多方篇云周公曰王若曰是周公尚未遷殷而王已踐奄矣孔傳以為奄再叛者拘於篇之先後而強為之説至于再至于三當從蔡氏説建官惟百成王作周官之書謂唐虞稽古建官惟百而夏商官倍者時代不逺其多寡何若此之懸絶哉且天下之事一職之微至於委吏乘田亦不可闕而謂二帝之世遂能以百官該內外之務吾不敢信也考之傳注亦第以為因時制宜而莫詳其實吾以為唐虞之官不止於百而其咨而命之者二十有二人其餘九官之佐殳斨伯與朱虎熊羆之倫暨侍御僕從以至州十有二師外薄四海咸建五長以名逹於天子者不過百人而已其他則穆王之命所謂慎簡乃僚而天子不親其黜陟者也故曰堯舜之知而不遍物急先務也堯舜之仁不遍愛人急親賢也夏商之世法日詳而人主之職日侵於下其命於天子者多故倍也觀於立政之書內至於亞旅外至於表臣百司而夷微盧蒸三亳版尹之官又虞夏之所未有則可知矣杜氏通典言漢初王侯國百官皆如漢朝惟丞相命於天子其御史大夫以下皆自置及景帝懲吳楚之亂殺其制度罷御史大夫以下官至武帝又詔凡王侯吏職秩二千石者不得擅補其州郡佐吏自别駕長史以下皆刺史太守自補歷代因而不革洎北齊武平中後主失政多有佞幸乃賜其賣官分占州郡下及鄉官多降中旨故有敕用州主簿郡功曹者自是之後州郡辟士之權寖移於朝廷以故外吏不得精核由此起也故劉炫對牛𢎞以為大小之官悉由吏部此政之所以日繁而沈既濟之議欲令六品以下及僚佐之屬許州府辟用唐書百官志曰初太宗省內外官定制為七百三十員曰吾以此待天下才足矣賢後之人見周禮一書設官之多職事之密以為周之所以致治者如此而不知宅乃事宅乃牧宅乃準之外文王罔敢知也然則周之制雖詳而意猶不異於唐虞矣求治之君其可以天子而預銓曹之事哉司空司空孔傳謂主國空土以居民未必然顔師古曰空穴也古人穴居主穿土為穴以居人也見漢書百官公卿表注此語必有所本易傳云上古穴居而野處詩云古公亶父陶復陶穴未有家室今河東之人尚多有穴居者今人謂窯即古陶字莊子言逃虛空虛空即今人所謂冷窯也洪水之後莫急於奠民居故伯禹作司空為九官之首顧命讀顧命之篇見成王初喪之際康王與其羣臣皆吉服而無哀痛之辭以召公畢公之賢反不及子産叔向誠為可疑再四讀之知其中有脫簡不言殯禮知是闕文豈有新君已朝諸侯而成王尚未殯史官略無一言記及者乎而狄設黼扆綴衣以下即當屬之康王之誥伏生本以顧命康王之誥合為一篇自此以上記成王顧命登遐之事自此以下記明年正月上日康王即位朝諸侯之事也古之人君於即位之禮重矣故即位於廟受命於先王祭畢而朝羣臣羣臣布幣而見然後成之為君春秋之於魯公即位則書不即位則不書蓋有遭時之變而不行此禮如莊閔僖三公者矣康王當太平之時為繼體之主而史録其遺文訓告以為一代之大法此書之所以傳也記曰未沒喪不稱君而今書曰王麻冕黼裳是踰年之君也又曰周卒哭而祔而今曰諸侯出廟門俟是已祔之後也記曰卒哭曰成事是日也以吉祭易喪祭傳言天子七月而葬同軌畢至而今太保率西方諸侯畢公率東方諸侯是七月之餘也因其中有脫簡而後之説書者並以繫之越七日癸酉之下所以生後儒之論而不思初崩七日之間諸侯何由而畢至乎蘇氏亦知其不通而以為問疾之諸侯或曰易吉可乎曰此周公所制之禮也以宗廟為重而不敢凶服以接乎神釋三年之喪以盡斯須之敬此義之所在而天子之守與士庶不同者也商書有之矣惟元祀十有二月乙丑伊尹祠于先王奉嗣王祗見厥祖豈以喪服而入廟哉漢書孝文紀元年冬十月辛亥皇帝見於髙廟蓋猶循此制傳賢之世天下可以無君故堯崩三年之喪畢舜避堯之子於南河之南傳子之世天下不可無君故惟元祀十有二月乙丑伊尹祠于先王奉嗣王祗見厥祖自狄設黼扆綴衣以下皆陳之朝者也設四席者朝羣臣聽政事養國老燕親屬皆新天子之所有事而非事亡之説也自王麻冕黼裳以下皆廟中之事也自王出在應門之內以下則康王臨朝之事也周之末世固有不待葬而先見廟者矣左傳昭二十二年夏四月乙丑王崩于榮錡氏五月庚辰見王六月丁巳葬景王其曰見王者見王子猛於先王之廟也不待期而見王猛不待期而葬景王則以子朝之爭國也然不言即位但曰見王而已孰謂成康無事之時而行此變禮哉書之脫簡多矣如武成之篇蔡氏以為尚有闕文洛誥戊辰王在新邑則王之至洛可知乃二公至洛並詳其日月而王不書金氏以為其間必有闕文蓋伏生老而忘之耳然則顧命之脫簡又何疑哉孔子有言若非有司失其傳則武王之志荒矣余於顧命敢引之以斷千載之疑矯虔説文矯從矢揉箭也故有用力之義漢書孝武紀注引韋昭曰詐稱為矯強取為虔周語注以詐用法曰矯罔中于行以覆詛盟國亂無政小民有情而不得申有寃而不見理於是不得不訴之於神而詛盟之事起矣蘇公遇暴公之讒則出此三物以詛爾斯屈原遭子蘭之讒則告五帝以折中命咎繇而聽直至於里巷之人亦莫不然而鬼神之往來於人間者亦或著其靈爽於是賞罰之柄乃移之冥漠之中而蚩蚩之氓其畏王鈇常不如其畏鬼責矣乃世之君子猶有所取焉以輔王政之窮今日所傳地獄之説感應之書皆苖民詛盟之餘習也明明棐常鰥寡無蓋則王政行於上而人自不復有求於神故曰有道之世其鬼不神所謂絶地天通者如此而已矣文侯之命竹書紀年幽王三年嬖褒姒五年王世子宜臼出奔申八年王立褒姒之子伯盤古服字與盤字相似而誤為太子九年申侯聘西戎及鄫十年王師伐申十一年申人鄫人及犬戎入周弒王及王子伯盤申侯魯侯許男鄭子立宜臼於申虢公翰立王子余臣於攜周二王並立平王元年王東徙雒邑晉侯會衛侯鄭伯秦伯以師從王入於成周二十一年晉文侯殺王子余臣於攜左傳昭二十六年王子朝告諸侯之辭曰攜王姦命諸侯替之而建王嗣杜氏以攜王為伯服蓋失之不考然則文侯之命報其立己之功而望之以殺攜王之效也鄭公子蘭之從晉文公而東也請無與圍鄭晉人許之今平王既立於申申國在今信陽州自申遷於雒邑而復使周人為之戍申竹書紀年平王三十三年楚人侵申三十六年王人戌申則申侯之伐幽王之弒不可謂非出於平王之志者矣當日諸侯但知其冢嗣為當立而不察其與聞乎弒為可誅虢公之立王子余臣或有見乎此也自文侯用師替攜王以除其逼而平王之位定矣後之人徒以成敗論而不察其故遂謂平王能繼文武之緒而惜其棄岐豐七百里之地豈謂能得當日之情者哉孔子生於二百年之後蓋有所不忍言而録文侯之命於書録揚之水之篇於詩其旨微矣葛藟詩序謂平王棄其九族似亦未可盡非列古今人表以平王申侯與幽王褒姒虢石父同下下傳言平王東遷蓋周之臣子美其名爾綜其實不然凡言遷者自彼而之此之辭盤庚遷于殷是也幽王之亡宗廟社稷以及典章文物蕩然皆盡鎬京之地已為西戎所有平王乃自申東保於雒天子之國與諸侯無異而又有攜王與之頡頏並為人主者二十年其得存周之祀幸矣而望其中興哉如東晉元帝不可謂之遷於建康秦誓有秦誓故列秦誓有秦詩故録秦詩述而不作也謂夫子逆知天下之將并於秦而存之者邵子説小之乎知聖人矣秦穆公之盛僅霸西戎未嘗為中國盟主無論齊桓晉文即亦不敢望楚之靈王吳之夫差合諸侯而制天下之柄春秋以後秦蓋中衰吳淵潁萊曰秦之興始於孝公之用商鞅成於惠王之取巴蜀蠶食六國并吞二周戰國之秦也非春秋之秦也其去夫子之卒也久矣自獲麟之嵗以至始皇滅六國并天下二百六十年夫子惡知周之必并於秦哉若所云後世男子自稱秦始皇入我房顛倒我衣裳至沙丘而亡者近於圗澄寶志之流非所以言孔子矣甘誓天子之事也胤征諸侯之事也並存之見諸侯之事可以繼天子也費誓秦誓之存猶是也古文尚書漢時尚書今文與古文為二而古文又自有二漢書藝文志曰尚書古文經四十六卷為五十七篇師古曰孔安國書序云凡五十九篇為四十六卷承詔作傳引序各冠其篇首定五十八篇鄭玄序贊云後又亡其一篇故五十七又曰經二十九卷大小夏侯二家歐陽經三十二卷歐陽生字和伯史失其名夏侯勝勝從兄子建皆傳伏生尚書師古曰此二十九卷伏生傳授者內秦誓非伏生所傳師古并言之詳見下此今文與古文為二也又曰古文尚書者出孔子壁中武帝末魯共王壞孔子宅欲以廣其宫而得古文尚書及禮記論語孝經凡數十篇皆古字也共王往入其宅聞鼓琴瑟鐘磬之音於是懼乃止不壞孔安國者孔子後也悉得其書以考二十九篇得多十六篇師古曰見行世二十九篇之外更得十六篇安國獻之遭巫蠱事未列於學官劉向以中古文師古曰中者夫子之書也校歐陽大小夏侯三家經文酒誥脫簡一召誥脫簡二率簡二十五字者脫亦二十五字簡二十二字者脫亦二十二字文字異者七百有餘脫字數十志自云此所述者本之劉歆七略不知中古文即安國所獻否及王莽末遭赤眉之亂焚燒無餘儒林傳曰孔氏有古文尚書孔安國以今文字讀之因以起其家逸書得十餘篇蓋尚書兹多於是矣言此為最多者明張霸加之以百二篇為偽遭巫蠱未立於學官安國為諫大夫授都尉朝都尉朝授膠東庸生庸生授清河胡常少子又傳左氏常授虢徐敖又傳毛詩授王璜平陵塗惲子真子真授河南桑欽君長王莽時諸學皆立傳末又言平帝時立左氏春秋毛詩逸禮古文尚書而後漢書十四博士無之蓋光武時廢劉歆為國師璜惲等皆貴顯言劉歆者哀帝時歆移書太常博士欲立此諸家之學故也又曰世所傳百兩篇者出東萊張霸分析合二十九篇以為數十或分析之或合之又采左氏傳書序為作首尾凡百二篇篇或數簡文意淺陋成帝時求其古文者霸以能為百兩徴以中書校之非是此又孔氏古文與張霸之書為二也後漢書儒林傳曰孔僖魯國魯人也自安國以下世傳古文尚書又曰扶風杜林傳古文尚書林同郡賈逵為之作訓賈逵傳肅宗好古文尚書詔逵撰歐陽大小夏侯尚書古文同異為三卷帝善之馬融作傳鄭玄注解由是古文尚書遂顯於世又曰建初中詔髙才生受古文尚書毛詩穀梁左氏春秋雖不立學官然皆擢髙第為講郎給事近署然則孔僖所受之安國者竟無其傳而杜林賈逵馬融鄭玄則不見安國之傳而為之作訓作傳作注解此則孔鄭之學又當為二而無可考矣劉陶傳曰陶明尚書春秋為之訓詁推三家尚書及古文是正文字三百餘事名曰中文尚書言參用今文古文之中漢末之亂無傳若馬融注古文尚書十卷鄭玄注古文尚書九卷則見於舊唐書藝文志又有王肅范寧李顒薑道成注古文尚書新唐書作薑道盛開元之時尚有其書而未嘗亡也按陸氏釋文言馬鄭所注二十九篇則亦不過伏生所傳之二十八一堯典并舜典慎徽以下為一篇二臯陶謨并益稷為一篇三禹貢四甘誓五湯誓六盤庚七髙宗肜日八西伯戡黎九微子十牧誓十一洪範十二金縢十三大誥十四康誥十五酒誥十六梓材十七召詔十八洛誥十九多士二十無逸二十一君奭二十二多方二十三立政二十四顧命并康王之誥為一篇二十五呂刑二十六文侯之命二十七費誓二十八秦誓而泰誓别得之民間合之為二十九孔子正義曰史記及漢書儒林傳云伏生獨得二十九篇以教齊魯然泰誓非伏生所得按馬融云泰誓後得鄭玄書論亦云民間得泰誓别録曰武帝末民有得泰誓書於壁內者獻之則泰誓非伏生所傳而言二十九篇者以司馬遷在武帝之世見泰誓出而得行入於伏生所傳內故為史總之云伏生所出不復曲别分析其實得時不與伏生所傳同也且非今之泰誓有白魚入於王舟等語董仲舒對䇿引之其所謂得多十六篇者不與其間也隋書經籍志曰馬融鄭玄所傳惟二十九篇又雜以今文非孔子舊書自餘絶無所説正義曰鄭氏書於伏生所傳之外增益二十四篇舜典一汨作二九工九篇十一大禹謨十二益稷十三五子之歌十四胤征十五湯誥十六咸有一德十七典寶十八伊訓十九肆命二十原命二十一武成二十二旅獒二十三問命二十四以一篇為一卷九共九篇合為一卷通十六卷以合於漢藝文志得多十六篇之數此即張霸之徒所作偽書也與舊唐書所載卷目不同晉世祕府所存有古文尚書經文今無有傳者及永嘉之亂歐陽大小夏侯尚書並亡至東晉豫章內史梅賾始得安國之傳上之正義引晉書云太保鄭沖以古文授扶風蘇愈愈授天水梁栁栁授城陽藏曹曹授汝南梅賾遂上其書又云其書亡失舜典一篇國此書東京以下諸儒皆不曽見鄭玄注禮記韋昭注語杜預注左氏趙岐注孟子凡引此書文並注云逸書增多二十五篇大禹謨一五子之歌二胤征三仲虺之誥四湯誥五伊訓六大甲三篇九咸以一德十説命三篇十三泰誓三篇十六武成十七旅獒十八微子之命十九蔡仲之命二十周官二十一君陳二十二畢命二十三君牙二十四冏命二十五以合於伏生之二十八篇而去其偽泰誓又分舜典益稷盤庚中下康王之誥各自為篇則為今之五十八篇矣其舜典亡闕取王肅本慎徽以下之傳續之陸氏釋文云梅賾上孔氏傳古文尚書亡舜典一篇時以王肅注頗類孔氏故取王注從慎徽五典以下為舜典以續孔傳齊明帝建武四年有姚方興者於大航頭得本有曰若稽古帝舜以下二十八字獻之朝議咸以為非及江陵板蕩其文北入中原學者異之劉炫遂以列諸本第然則今之尚書其今文古文皆有之三十三篇固雜取伏生安國之文而二十五篇之出於梅賾舜典二十八字之出於姚方興又合而一之孟子曰盡信書則不如無書於今日而益驗之矣竊疑古時有堯典無舜典有夏書無虞書而堯典亦夏書也孟子引二十有八載放勳乃殂落而謂之堯典則序之别為舜典者非矣左氏傳莊公八年引臯陶邁種德僖公二十四年引地平天成二十七年引賦納以言文公七年引戒之用休襄公五年引成允成功二十一年二十三年兩引念兹在兹二十六年引與其殺不辜寧失不經哀公六年引允出兹在兹十八年引官占惟先蔽志國語周內史過引衆非元后何戴后非衆罔與守邦而皆謂之夏書則後之目為虞書者贅矣正義言馬融鄭玄王肅别録題皆曰虞夏書以虞夏同科何則記此書者必出於夏之史臣雖傳之自唐而潤色成文不無待於後人者故篇首言曰若稽古以古為言明非當日之記也世更三聖事同一家以夏之臣追記二帝之事不謂之夏書而何夫惟以夏之臣而追記二帝之事則言堯可以見舜不若後人之史每帝立一本紀而後為全書也帝曰來禹汝亦昌言承上文臯陶所陳一時之言也王出在應門之內承上文諸侯出廟門俟一時之事也序分為兩篇者妄也書序益都孫寶侗仲愚謂書序為後人偽作逸書之名亦多不典至如左氏傳定四年祝他告萇𢎞其言魯也曰命以伯禽而封於少皥之虛其言衛也曰命以康誥而封於殷虛其言晉也曰命以唐誥而封於夏虛是則伯禽之命康誥唐誥周書之三篇而孔子所必録也今獨康誥存而二書亡為書序者不知其篇名而不列於百篇之內疏漏顯然是則不但書序可疑并百篇之名亦未可信矣其解命以伯禽為書名伯禽之命尤為切當今録其説正義曰尚書遭秦而亡漢初不知篇數武帝時有大常蓼侯孔臧者安國之從兄也與安國書云時人惟聞尚書二十八篇取象二十八宿謂為信然不知其有百篇也今考傳記引書並無序所亡四十二篇之文則此篇名亦未可盡信也豐熙偽尚書五經得於秦火之餘其中固不能無錯悮學者不幸而生乎二千餘載之後信古而闕疑乃其分也近世之説經者莫病乎好異以其説之異於人而不足以取信於是舍本經之訓詁而求之諸子百家之書猶未足也則舍近代之文而求之逺古又不足則舍中國之文而求之四海之外如豐熙之古書世本尤可怪焉鄞人言出其子坊偽撰又有子貢詩傳後儒往往惑之曰箕子朝鮮本者箕子封於朝鮮傳書古文自帝典至微子止後附洪範一篇曰徐市倭國本者徐市為秦博士因李斯坑殺儒生託言入海求仙盡載古書至島上立倭國即今日本是也二國所譯書其曾大父河南布政使慶録得之以藏於家按宋歐陽永叔日本刀歌徐福行時書未焚逸書百篇今尚存蓋昔時已有是説而葉少藴固已疑之夫詩人寄興之辭豈必真有其事哉日本之職貢於唐久矣自唐及宋歷代求書之詔不能得而二千載之後慶乃得之其得之又不以獻之朝廷而藏之家何也宋咸平中日本僧奝然以鄭康成注孝經來獻不言有尚書至曰箕子傳書古文自帝典至微子則不應别無一篇逸書而一一盡同於伏生孔安國之所傳其曰後附洪範一篇者蓋徒見左氏傳三引洪範皆謂之商書文公五年引沈漸剛克髙明柔克成公六年引三人占從二人襄公三年引無偏無黨王道蕩蕩正義曰箕子商人所説故謂之商書而不知王者周人之稱十有三年周史之記不得為商人之書也禹貢以道山道水移於九州之前此不知古人先經後緯之義也孔安國傳道岍及岐即云更理説所治山川首尾所在是自漢以來别無異文史記夏本紀亦先九州而後道山道水五子之歌為人上者奈何不敬以其不叶而改之曰可不敬乎謂本之鴻都石經據正義言蔡雍所書石經尚書止今文三十四篇無五子之歌熙又何以不考而妄言之也五子之歌乃孔氏古文東晉豫章內火梅賾所上故左傳成公十六年引怨豈在明不見是圖哀公六年引惟彼陶唐有此冀方杜預注並以為逸書國語周單襄公引民可近也而不可上也單穆公引關石和鈞王府則有韋昭解亦以為逸書夫天子失官學在四裔使果有殘編斷簡可以裨經文而助聖道固君子之所求之而惟恐不得者也若乃無益於經而徒為異以惑人則其於學也亦謂之異端而已愚因歎夫昔之君子遵守經文雖章句先後之間猶不敢輒改故元行沖奉明皇之旨用魏徴所注類禮撰為疏義成書上進而為張説所駮謂章句隔絶有乖舊本竟不得立於學官夫禮記二戴所録非夫子所刪況其篇目之次元無深義而魏徴所注則又本之孫炎字叔然漢末人以纍代名儒之作申之以詔旨而不能奪經生之所守蓋唐人之於經傳其嚴也如此故啖助之於春秋卓越三家多有獨得而史氏猶譏其一本所承自用名學謂後生詭辨為助所階乃近代之人其於讀經鹵莽滅裂不及昔人逺甚又無先儒為之據依而師心妄作刋傳記未己也進而議聖經矣更章句未己也進而改文字矣此陸遊所致慨於宋人陸務觀曰唐及國初學者不敢議孔安國鄭康成況聖人乎自慶歷後諸儒發明經旨非前人所及然排繫辭毁周禮疑孟子譏書之胤征顧命不難於議經況傳注乎作趙汝談至謂洪範非箕子之而今且彌甚徐防有言今不依章句妄生穿鑿以遵師為非義意説為得理輕侮道術寖以成俗嗚呼此學者所宜深戒若豐熙之徒又不足論也近有謂得朝鮮本尚書於洪範八政之末添多五十二字者按元王惲中堂事記中統二年髙麗世子禃來朝宴於中書省問曰傳聞汝邦冇古文尚書及海外異書答曰與中國不殊是知此五十二字者亦偽撰也漢東萊張霸偽造尚書百二篇以中書校之非是霸辭受父父有弟子尉氏樊並詔存其書後樊並謀反乃黜其書而偽逸書嘉禾篇有周公奉鬯立于阼階延登贊曰假王涖政之語莽遂依之以稱居攝知惑世誣民乃犯上作亂之漸大學之教禁於未發者其必先之矣日知録卷二
