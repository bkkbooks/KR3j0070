body:
  text: 日知録卷十八崑山顧炎武撰祕書國史漢時天子所藏之書皆令人臣得觀之故劉歆謂外則有太常太史博士之藏內則有延閣廣內祕室之府而司馬遷為太史令紬石室金匱之書劉向揚雄校書天祿閣揚雄答劉歆書自言為郎之嵗詔賜筆墨錢六萬得觀書於石渠班斿進讀羣書上器其能賜以祕書之副東京則班固傅毅為蘭臺令史並典校書曹褒於東觀撰次禮事而安帝永初中詔謁者劉珍及博士議郎四府掾吏五十餘人詣東觀校定五經諸子傳記竇章之被薦黃香之受詔亦得至焉竇章傳是時學者稱東觀為老氏藏室道家蓬萊山太僕鄧康遂薦章入東觀為校書郎黃香傳初除郎中肅宗詔香詣東觀讀所未嘗見書晉宋以下此典不廢左思王儉張纘之流咸讀祕書載之史傳晉左思為三都賦自以所見不博求為祕書郎中南齊王儉遷祕書丞依七略撰七志四千卷永明三年於儉宅開學士館悉以四部書充儉家梁張纘為祕書郎祕書郎有四員宋齊以來為甲族起家之選待次入補其居職例數十百日便遷纘固求不徙欲遍觀閣內圖籍而栁世隆至借給二千卷南齊栁世隆性愛涉獵啓太祖借祕閣書上給二千卷唐則魏徵虞世南岑文本褚遂良顔師古皆為祕書監選五品以上子孫工書者手書繕寫藏於內庫而玄宗命𢎞文館學士元行沖通撰古今書目名為羣書四録以陽城之好學至求為集賢院吏乃得讀之陽城好學貧不能得書求為吏𨽻集賢院竊院中書讀之六年無所不通竇威為祕書郎秩滿當遷固守不調十餘嵗其學業益廣祕段成式為祕書省校書郎閣書籍披閲皆遍宋有史館昭文館集賢院謂之三館太宗别建崇文院中為祕閣藏三館真本書籍萬餘卷置直閣校理仁宗復命繕寫校勘以參知政事一人領之書成藏於太清樓而范仲淹等嘗為提舉且求書之詔無代不下故民間之書得上之天子而天子之書亦往往傳之士大夫自洪武平元所收多南宋以來舊本藏之祕府垂三百年無人得見而昔時取士一史三史之科又皆停廢天下之士於是乎不知古司馬遷之史記班固之漢書干寶之晉書栁芳之唐厯吳競之唐春秋李燾之宋長編並以當時流布至於會要日厯之類南渡以來士大夫家亦多有之未嘗禁止明則實録之進焚草於太液池藏真於皇史宬在朝之臣非預纂修皆不得見而野史家傳遂得以孤行於世天下之士於是乎不知今是雖以夫子之聖起於今世學夏殷禮而無從學周禮而又無從也況其下焉者乎豈非密於禁史而疏於作人工於藏書而拙於敷教者邪遂使帷囊同毁空聞七略之名冢壁皆殘不覩六經之字嗚呼悕矣十三經注疏自漢以來儒者相傳但言五經而唐時立之學官則云九經者三禮三傳分而習之故為九也其刻石國子學則云九經并孝經論語爾雅宋時程朱諸大儒出始取禮記中之大學中庸及進孟子以配論語謂之四書本朝因之而十三經之名始立其先儒釋經之書或曰傳或曰箋或曰解或曰學今通謂之注書則孔安國傳詩則毛萇傳鄭元箋周禮儀禮禮記則鄭元注公羊則何休學孟子則趙岐注皆漢人易則王弼注魏人繫辭韓康伯注晉人論語則何晏集解魏人左氏則杜預注爾雅則郭璞注榖梁則范寧集解皆晉人孝經則唐明皇御注其後儒辨釋之書名曰正義今通謂之疏舊唐書儒學傳太宗以經籍去聖久逺文字多訛謬詔前中書侍郎顔師古考定五經頒於天下又以儒學多門章句繁雜詔國子祭酒孔穎達與諸儒撰定五經義疏凡一百七十卷名曰五經正義令天下傳習髙宗紀永徽四年三月壬子朔頒孔穎達五經正義於天下每年明經令依此考試時但有易詩書禮記左氏春秋五經永徽中賈公彥始撰周禮儀禮義疏宋史李至傳判國子監上言五經書既已板行惟二傳二禮孝經論語爾雅七經疏未修望令直講崔頤正孫奭崔偓佺等重加讐校以備刋刻從之今所行者榖梁唐楊士勛疏孝經論語爾雅宋邢昺疏孟子孫奭疏惟公羊疏不著人名或云唐徐彥撰今人但知五經正義為孔穎達作不知非一人之書也新唐書穎達本傳云初穎達與顔師古司馬才章王恭王琰受詔撰五經義訓百餘篇其中不能無謬冗博士馬嘉運駮正其失詔更令裁定未就永徽二年詔中書門下與國子三館博士𢎞文館學士考正之於是尚書左僕射于志寧右僕射張行成侍中髙季輔就加增損書始布下監本二十一史宋時止有十七史今則并宋遼金元四史為二十一史但遼金二史向無刻本南北齊梁陳周書人間傳者亦罕故前人引書多用南北史及通鑑而不及諸書亦不復采遼金者以行世之本少也嘉靖初南京國子監祭酒張邦竒等請校刻史書欲差官購索民間古本部議恐滋煩擾上命將監中十七史舊板考對修補仍取廣東宋史板付監遼金二史無板者購求善本翻刻十一年七月成祭酒林文俊等表進至萬厯中北監又刻十三經二十一史其板視南稍工而士大夫遂家有其書厯代之事迹粲然於人間矣然校勘不精訛舛彌甚且有不知而妄改者偶舉一二如魏書崔孝芬傳李彪謂崔挺曰比見賢子謁帝旨諭殊優今當為羣拜紀此三國志陳羣傳中事陳羣字長文紀之子時魯國孔融髙才倨傲年在紀羣之間先與紀友後與羣交更為紀拜彰古人用此事者非一北史陸卬傳邢邵向與卬父子交及見卭機悟博學乃謂子彰曰以卿老蚌遂出明珠意欲為羣拜紀非為隱僻今所刻北史改云今當為絶羣耳不知紀羣之為名而改紀為絶又倒其文此已可笑南北板同又如晉書華談傳末云始淮南袁甫字公胄亦好學與談齊名今本誤於始字絶句左方跳行添列一袁甫名題而再以淮字起行南北板同齊王冏傳末云鄭方者字子回此姓鄭名方即上文所云南陽處士鄭方露版極諫而别敘其人與書及冏答書於後耳今乃跳行添列一鄭方者三字名題北板無者唐書李敬元傳末附敬元弟元素今以敬元屬上文而弟元素跳行此不適足以彰太學之無人而貽後來之姍笑乎惟馮夢禎為南祭酒手校三國志猶不免誤終勝他本十三經中儀禮脫誤猶多士昏禮脫壻授綏姆辭曰未教不足與為禮也一節十四字賴有長安石經據以補此一節而其注疏遂亡鄉射禮脫士鹿中翿旌以獲七字士虞禮脫哭止告事畢賓出七字特牲饋食禮脫舉觶者祭卒觶拜長者答拜十一字少牢饋食禮脫以授尸坐取簟興七字此則秦火之所未亡而亡於監刻矣至於歷官任滿必刻一書以充餽遺此亦甚雅而鹵莽就工殊不堪讀陸文裕深金臺紀聞曰元時州縣皆有學田所入謂之學租以供師生廩餼餘則刻書工大者合數處為之故讐校刻畫頗有精者洪武初悉收上國學今南監十七史諸書地理嵗月較工役並存可識也今學既無田不復刻書而有司間或刻之然祇以供餽贐之用其不工反出坊本下工者不數見也昔時入覲之官其餽遺一書一帕而已謂之書帕自萬厯以後改用白金聞之宋元刻書皆在書院山長主之通儒訂之主書院者謂之山長宋史理宗紀何基婺州教授兼麗澤書院山長徐璣建寧府教授兼建安書院山長學者則互相易而傳布之故書院之刻有三善焉山長無事而勤於校讐一也不惜費而工精二也板不貯官而易印行三也有右文之主出焉其復此非難也而書之已為劣生刋改者不可得而正矣是故信而好古則舊本不可無存多聞闕疑則羣書亦當並訂此非後之君子之責而誰任哉舊唐書病其事之遺闕新唐書病其文之晦澀當兼二書刻之為二十二史如宋魏諸國既各有書而復有南史北史是其例也張參五經文字唐人以説文字林試士其時去古未逺開元以前未改經文之日唐書經籍志天寶三載詔集賢學士衛包改古文尚書從今文篆籀之學童而習之今西安府所存唐睿宗書景龍觀鐘猶帶篆分遺法至於宋人其去古益逺而為説日以鑿矣大厯中張參作五經文字據説文字林刋正謬失甚有功於學者開成中唐元度增補復作九經字樣石刻在關中今西安府學向無板本間有殘闕無别本可證近代有好事者刻九經補字并屬諸生補此書之闕以意為之乃不知此書特五經之文非經所有者不載而妄添經外之字并及字書中泛博之訓豫至關中洗刷元石其有一二可識者顯與所補不同乃知近日學者之不肯闕疑而妄作如此山東人刻金石録於李易安後序紹興二年玄􅘬嵗壯月朔不知壯月之出於爾雅八月為壯而改為牡丹凡萬厯以來所刻之書多牡丹之類也别字後漢書儒林書讖書非聖人所作其中多近鄙别字近鄙者猶今俗用之字别字者本當為此字而誤為彼字也今人謂之白字乃别音之轉三朝要典宋史蹇序辰傳紹聖中為起居郎中書舍人同修國史疏言朝廷前日正司馬光等姦惡明其罪罰以告中外惟變亂典刑改廢法度訕讟宗廟睥睨兩宮觀事考言實狀彰著然蹤迹深祕包藏禍心相去八年之間蓋已不可究質其章疏案牘散在有司若不彚輯而存之嵗久必致淪失願悉討姦臣所言所行選官編類人為一帙置之二府以示天下後世大戒遂命序辰及徐鐸編類由是搢紳之禍無一得免者天啓中纂輯三朝要典正用序辰之法門戶之人其立言之指各有所借章奏之文互有是非作史者兩收而並存之則後之君子如執鏡以照物無所逃其形矣褊心之輩謬加筆削於此之黨則存其是者去其非者於彼之黨則存其非者去其是者於是言者之情隱而單辭得以勝之且如要典一書其言未必盡非而其意别有所為繼此之為書者猶是也此國論之所以未平而百世之下難乎其信史也崇禎帝批講官李明睿之疏曰纂修實録之法惟在據事直書則是非互見大哉王言其萬世作史之準繩乎密疏唐武宗會昌元年十一月中書門下奏宰臣及公卿論事行與不行須有明據或奏請允愜必見褒稱或所論乖僻因有懲責在藩鎮上表必有批答居要官啓事自有記注並須昭然在人耳目或取舍存於堂案或與奪形於詔敕前代史書所載奏議罔不由此近見實録多載密疏言不彰於朝聽事不顯於當時得自其家未足為信今後實録所載章奏並須朝廷共知者方得紀述密疏並請不載如此則理必可法人皆向公愛憎之志不行褒貶之言必信從之此雖出於李德裕之私心然其言不為無理自萬厯末年章疏一切留中抄傳但憑閣揭天啓以來讒慝𢎞多嘖言彌甚豫嘗親見大臣之子追改其父之疏草而刻之以欺其人者欲使蓋棺之後重為奮筆之文逭遺議於後人侈先見於前事其為誣罔甚於唐時故志之於書俾作史之君子詳察而嚴斥之也貼黃章奏之冗濫至萬厯天啓之間而極至一疏而薦數十人纍二三千言不止皆枝蔓之辭崇禎帝英年御宇厲精圖治省覽之勤批答之速近朝未有乃數月之後頗亦厭之命內閣為貼黃之式崇禎元年三月即令本官自撮疏中大要不過百字黏附牘尾以便省覽此貼黃之所由起也宋葉夢得石林燕語曰唐制降敕有所更改以紙貼之謂之貼黃蓋敕書用黃紙則貼者亦黃紙也今奏狀劄子皆白紙有意所未盡揭其要處以黃紙别書於後乃謂之貼黃蓋失之矣其表章略舉事目與日月道里見於前及封皮者又謂之引黃記注古之人君左史記事右史記言所以防過失而示後王記注之職其來尚矣唐太宗通曉古典尤重其事蘇冕言貞觀中每日退朝後太宗與宰臣參議政事即令起居郎一人執簡記録由是貞觀注記政事稱為畢備及髙宗朝會端拱無言有司惟奏辭見二事其後許敬宗李義甫用權多妄論奏恐史官直書其短遂奏令隨仗便出不得備聞機務因為故事舊唐書姚璹傳長夀二年遷文昌左丞同鳳閣鸞臺平章事自永徽以後左右史惟得對仗承旨仗下後謀議皆不預聞璹以為帝王謨訓不可遂無紀述若不宣自宰相史官無從得書乃表請仗下所言軍國政要宰相一人専知撰録號為時政記每月封送史館宰相之撰時政記自璹始也四書五經大全自朱子作大學中庸章句或問論語孟子集注之後黃氏幹字直卿號勉齋先生有論語通釋而采語録附於朱子章句之下則始自真氏德秀字希元號西山先生名曰集義止大學一書祝氏洙字宗道乃倣而足之為四書附録後有蔡氏模字仲覺號覺軒先生四書集疏趙氏順孫號格菴先生四書纂疏吳氏真子號克齋先生四書集成昔之論者病其泛溢於是陳氏櫟字夀翁號定宇先生作四書發明胡氏炳文字仲虎號雲峯先生作四書通而定宇之門人倪氏士毅字仲宏號道川先生合二書為一頗有刪正名曰四書輯釋有汪克寬序至正丙戌自永樂中命儒臣纂修四書大全頒之學官而諸書皆廢倪氏輯釋今見於劉用章剡所刻四書通義中永樂中所纂四書大全特小有增刪其詳其簡或多不如倪氏大學中庸或問則全不異而間有舛誤大學格致章或問是亦不待七十子喪而大義已乖矣輯釋引漢書劉歆移太常書有曰及夫子沒而微言絶七十子終而大義乖又孔子家語後序中亦有此二句大全則去其所引劉歆書但云出家語後序則失其本矣中庸九經章或問引賈捐之對元帝語輯釋引漢書本傳文曰夫後宮色盛則賢者隱微佞臣用事則諍臣杜口而文帝不行此捐之之言謂文帝不聽後宮幸臣之請爾大全則改云元帝不行既不知古書又不辨語氣至春秋大全則全襲元人汪克寬胡傳纂疏字德輔隱居不仕以十年之功為此書但改其中愚按二字為汪氏曰及添廬陵李氏等一二條而已詩經大全則全襲元人劉瑾詩傳通釋此書與胡傳纂疏豫今並有之而改其中愚按二字為安成劉氏曰其三經後人皆不見舊書亦未必不因前人也當日儒臣奉旨修四書五經大全頒餐錢給筆札書成之日賜金遷秩所費於國家者不知凡幾將謂此書既成可以章一代教學之功啓百世儒林之緒而僅取已成之書抄謄一過上欺朝廷下誑士子唐宋之時有是事乎豈非骨鯁之臣巳空於建文之代而制義初行一時人士盡棄宋元以來所傳之實學上下相蒙以叨祿利而莫之問也嗚呼經學之廢實自此始後之君子欲掃而更之亦難乎其為力矣書傳會選洪武二十七年四月丙戌詔徵儒臣定正宋儒蔡氏書傳上以蔡氏書傳日月五星運行與朱子詩傳不同及其他注説與番陽鄒季友所論間亦有未安者遂詔徵天下儒臣定正之命翰林院學士劉三吾等總其事凡蔡氏傳得者存之失者正之又采諸家之説足其未備九月癸丑書成賜名書傳會選命禮部頒行天下今按此書若堯典謂天左旋日月五星違天而右轉陳氏祥道髙宗彤日謂祖庚繹于髙宗之廟金氏履祥西伯戡黎謂是武王金氏洛誥惟周公誕保文武受命惟七年謂周公輔成王之七年張氏闕陳氏櫟皆不易之論又如禹貢厥賦貞主蘇氏軾謂賦與田正相當涇屬渭汭主孔傳水北曰汭太甲自周有終主金氏謂周當作君多方不克開于民之麗主葉氏陳氏櫟謂古者治獄以附罪為麗皆可從然所采既博亦或失當如金縢周公居東謂孔氏以為東征非是至洛誥又取東征之説自相抵牾每傳之下繫以經文及傳音釋於字音字體字義辨之甚詳其傳中用古人姓字古書名目必具出處兼亦考證典故蓋宋元以來諸儒之規模猶在而其為此書者皆自幼為務本之學非由八股發身之人故所著之書雖不及先儒而尚有功於後學至永樂中修尚書大全不惟刪去異説并音釋亦不存矣愚嘗謂自宋之末造以至有明之初年經術人才於斯為盛自八股行而古學棄大全出而經説亡十族誅而臣節變洪武永樂之間亦世道升降之一會矣內典古之聖人所以教人之説其行在孝弟忠信其職在灑掃應對進退其文在詩書禮易春秋其用之身在出處去就交際其施之天下在政令教化刑罰雖其和順積中而英華發外樂記亦有體用之分然並無用心於內之説自老莊之學行於戰國之時而外義者告子也外天下外物外生者莊子也於是髙明之士厭薄詩書以為此先王所以治天下之糟粕而佛氏晚入中國其所言清淨慈悲之説適有以動乎世人之慕嚮者六朝諸君子從而好之其傳寖盛後之學者遂謂其書為內典內典字見册府元龜引唐會要開成二年二月王彥進準宣索內典目録十二卷推其立言之旨不將內釋而外吾儒乎夫內釋而外吾儒此自緇流之語豈得士人亦云爾乎黃氏日抄云論語曽子三省章集注載尹氏曰曽子守約故動必求諸身語意已足矣又載謝氏曰諸子之學皆出於聖人其後愈逺而愈失其真獨曽子之學専用心於內故傳之無弊夫心所以具衆理而應萬事正其心者正欲施之治國平天下孔門未有専用心於內之説也用心於內近世禪學之説耳象山陸氏因謂曽子之學是裏面出來其學不傳諸子是外面入去今傳於世者皆外入之學非孔子之真遂於論語之外自謂得不傳之學凡皆源於謝氏之説也後有朱子當於集注中去此一條褚少孫補滑稽傳以傳記雜説為外家是以六經為內也東漢儒者則以七緯為內學六經為外學後漢書方術傳自是習為內學注內學謂圖讖之書也其事祕密故稱內外逸民傳博通內外圖典魏志管寧傳張臶學兼內舉圖讖之文一歸之性與天道不可得聞後漢書桓談傳天道性命聖人所難言也自子貢以下不可得聞指謂讖記而今百世之下曉然皆悟其非今之所謂內學則又不在圖讖之書而移之釋氏矣心學黃氏日抄解尚書人心惟危道心惟微惟精惟一允執厥中一章曰此章本堯命舜之辭舜申之以命禹而加詳焉耳堯之命舜曰允執厥中今舜加危微精一之語於允執厥中之上所以使之審擇而能執中者也此訓之之辭也皆主於堯之執中一語而發也堯之命舜曰四海困窮天祿永終今舜加無稽之言勿聽以至敬修其可願於天祿永終之上又所以警切之使勿至於困窮而永終者也此戒之之辭也皆主於堯之永終二語而發也執中之訓正説也永終之戒反説也蓋舜以昔所得於堯之訓戒并其平日所嘗用力而自得之者盡以命禹使知所以執中而不至於永終耳豈為言心設哉近世喜言心學舍全章本旨而獨論人心道心甚者單托道心二字而直謂即心是道蓋陷於禪學而不自知其去堯舜禹授受天下之本旨逺矣蔡九峯之作書傳述朱子之言曰古之聖人將以天下與人未嘗不以治之之法而并傳之可謂深得此章之本旨九峯雖亦以是明帝王之心而心者治國平天下之本其説固理之正也其後進此書傳於朝者乃因以三聖傳心為説世之學者遂指此書十六字為傳心之要而禪學者借以為據依矣愚按心不待傳也流行天地間貫徹古今而無不同者理也理具於吾心而驗於事物心者所以統宗此理而别白其是非人之賢否事之得失天下之治亂皆於此乎判此聖人所以致察於危微精一之間而相傳以執中之道使無一事之不合於理而無有過不及之偏者也禪學以理為障而獨指其心曰不立文字單傳心印聖賢之學自一心而達之天下國家之用無非至理之流行明白洞達人人所同歷千載而無間者何傳之云俗説浸淫雖賢者或不能不襲用其語故僭書其所見如此中庸章句引程子之言曰此篇乃孔門傳授心法亦是借用釋氏之言不無可酌論語一書言心者三曰七十而從心所欲不踰矩曰回也其心三月不違仁曰飽食終日無所用心乃操則存舍則亡之訓門人未之記而獨見於孟子夫未學聖人之操心而驟語夫從心此即所謂飽食終日無所用心而旦晝之所為有牿亡之者矣唐仁卿名伯元澄海人萬厯甲戌進士官至吏部文選司郎中答人書曰自新學興而名家著其冒焉以居之者不少然其言學也則心而已矣元聞古有學道不聞學心古有好學不聞好心心學二字六經孔孟所不道今之言學者蓋謂心即道也而元不解也何也危微之旨在也雖上聖而不敢言也今人多怪元言學而遺心孰若執事責以不學之易了而元亦可以無辭於執事子曰有能一日用其力於仁矣乎又曰一日克己復禮又曰終日乾乾行事也元未能也孔門諸子日月至焉夫子猶未許其好學而況乎日至未能也謂之不學可也但未知執事所謂學者果仁邪禮邪事邪抑心之謂邪外仁外禮外事以言心雖執事亦知其不可執事之意必謂仁與禮與事即心也用力於仁用力於心也復禮復心也行事行心也則元之不解猶昨也謂之不學可也又曰孳孳為善者心孳孳為利者亦未必非心危乎心哉判吉凶别人禽雖大聖猶必防乎其防而敢言心學乎心學者以心為學也以心為學是以心為性也心能具性而不能使心即性也是故求放心則是求心則非求心則非求於心則是我所病乎心學者為其求心也心果待求必非與我同類心果可學則以禮制心以仁存心之言毋乃為心障與衛蒿曰從心不踰矩孔子至七十時方敢以此自信而今之學者未可與立而欲語從心率天下之人而禍仁義必斯言也論語仁者安仁集注謝氏曰仁者心無內外逺近精粗之間非有所存而自不亡非有所理而自不亂此皆莊列之言非吾儒之學太甲曰顧諟天之明命子曰回之為人也擇乎中庸得一善則拳拳服膺而弗失之矣故曰操則存舍則亡不待存而自不亡者何人哉舉業林文恪材福州府志曰余好問長老前輩時事或為余言林尚默名志閩縣人永樂壬辰進士鄉試會試皆第一殿試一甲第二名方遊鄉序為弟子員即自負其才當冠海內士云然考其時試諸生者則楊文貞金文靖二公也夫尚默當時所習特舉子業耳而楊金二學士皆文章宿老蔚為儒宗尚默乃能必之二公若合符節何哉當是時也學出於一上以是取之下以是習之譬作車者不出門而知適四方之合轍也正德末異説者起以利誘後生使從其學毁儒先詆傳注殆不啻辨髦矣由是學者倀倀然莫知所從欲從其舊説則恐或主新説從其新説則又不忍遽棄傳注也已不能自必況於人乎嗚呼士之懷瑾握瑜範馳驅而不遇者可勝道哉是故射無定鵠則羿不能巧學無定論則遊夏不能工欲道德一風俗同其必自大人不倡遊言始又曰近日講學之輩彌近理而大亂真士附其門者皆取榮名於是一唱百和如伐木者呼邪許然徐而叩之不過徼捷徑於終南而其中實莫之能省也東鄉艾南英皇明今文待序曰嗚呼制舉業中始為禪之説者誰與原其始蓋由一二聰明才辨之徒厭先儒敬義誠明窮理格物之説樂簡便而畏繩束其端肇於宋南渡之季而慈湖楊氏之書為最著國初功令嚴密匪程朱之言弗遵也蓋至摘取良知之説而士稍異學矣然豫觀其書不過師友講論立教明宗而已未嘗以入制舉業也其徒龍溪王畿緒山錢德洪闡明其師之説而又過焉亦未嘗以入制舉業也龍溪之舉業不傳陽明緒山班班可考矣衡較其文持詳矜重若未始肆然欲自異於朱氏之學者然則今之為此者誰為之始與吾姑為隱其姓名而又詳乙注其文使學者知以宗門之糟粕為舉業之俑者自斯人始萬厯丁丑科楊起元嗚呼降而為傳燈於彼教初説其淺深相去已逺矣又況附會以援儒入墨之輩其鄙陋可勝道哉今其大旨不過曰耳自天聰目自天明猶告子曰生之謂性而已及其厭窮理格物之迂而去之猶告子曰不得於言勿求於心而已任其所之而冥行焉未有不流於小人之無忌憚者此中庸所以言性不言心孟子所以言心而必原之性大學所以言心而必曰正其心吾將有所論著而姑言其槩如此學者可以廢然返矣又曰嘉靖中姚江之書雖盛行於世而士子舉業尚謹守程朱無敢以禪竄聖者自興化華亭兩執政尊王氏學於是隆慶戊辰論語程義首開宗門破題見下是年主考李春芳興化縣人此後浸淫無所底止科試文字大半剽竊王氏門人之言陰詆程朱坊刻中有偽作羅倫致知在格物一篇其破題曰良知者廓於學者也按羅文毅中成化二年進士當時士無異學使果有此文則良知之説始於彝正不始於伯安矣況前人作破亦無此體舊日文字破題或二句或三句必盡題意嘉靖八年主司變體創為輕佻之格孔子聖之時者也程文破云聖人者立大中者也試録一出士論譁然以其為先朝名臣而借之耳破題用莊子五經無真字始見於老莊之書老子曰其中有精其精甚真莊子漁父篇孔子愀然曰敢問何謂真客曰真者精誠之至也荀子真積力久亦是此意真黃庭經曰積精纍氣以為大宗師篇曰而已反其真而我猶為人猗列子曰精神離形各歸其真故謂之鬼鬼歸也歸其真宅漢書楊王孫傳曰死者終身之化而物之歸者也歸者得至化者得變是物各反其真也説文曰真仙人變形登天也徐氏繫傳曰真者仙也化也從匕匕即化也反人為亡從目從匕入其所乘也人老則近於死故老字從匕既死則反其真故真字亦從匕以生為寄以死為歸於是有真人真君真宰之名秦始皇曰吾慕真人自謂真人不稱朕魏太武改元太平真君而唐玄宗詔以四子之書謂之真經皆本乎此也後世相傳乃遂與假為對李斯上秦王書夫擊甕叩缶彈筝搏髀而歌呼嗚嗚快耳目者真秦之聲也韓信請為假王髙帝曰大丈夫定諸侯即為真王耳何以假為又更東垣曰真定竇融上光武書曰豈可背真舊之主事姦偽之人而與老莊之言真亦微異其指矣今謂真古曰實今謂假古曰偽左傳襄十八年使乘車者左實右偽以斾先輿曳柴而從之所假王猶假君假相國唐人謂之借職是也今人之謂假亦非宋諱玄以真代之故廟號曰真宗玄武七宿改為真武玄冥改為真冥玄枵改為真枵崇文總目謂太玄經為太真則猶未離其本也隆慶二年會試為主考者厭五經而喜老莊黜舊聞而崇新學首題論語子曰由誨汝知之乎一節其程文破云聖人教賢者以真知在不昧其心而已莊子大宗師篇且有真人而後有真知列子仲尼篇無樂無知是真樂真知始明以莊子之言入之文字自此五十年間舉業所用無非釋老之書彗星掃北斗文昌而御河之氷變為赤血矣崇禎時始申舊日之禁而士大夫皆幼讀時文習染已久不經之字搖筆輒來正如康崑崙所受鄰舍女巫之邪聲非十年不近樂器未可得而絶也雖然以周元公道學之宗而其為書猶有所謂無極之真者吾又何責乎今之人哉羅氏困知記謂無極之真二五之精妙合而凝太極與陰陽五行非二物也不當言合又言通書未嘗一語及無極孟子言所不慮而知者其良知也下文明指是愛親敬長若夫因嚴以教敬因親以教愛則必待學而知之者矣今之學者明用孟子之良知暗用莊子之真知科場禁約萬厯三十一年闕月禮部尚書馮琦上言頃者皇上納都給事中張問達之言正李贄惑世誣民之罪盡焚其所著書其崇正闢邪甚盛舉也臣竊惟國家以經術取士自五經四書二十一史通鑑性理諸書而外不列於學官而經書傳注又以宋儒所訂者為準此即古人罷黜百家獨尊孔氏之旨自人文向盛士習寖漓始而厭薄平常稍趨纖靡纖靡不已漸騖新竒新竒不已漸趨詭僻始猶附諸子以立幟今且尊二氏以操戈背棄孔孟非毁朱程惟南華西竺之語是宗是競以實為空以空為實以名教為桎梏以紀綱為贅疣以放言髙論為神竒以蕩軼規矩掃滅是非亷恥為廣大取佛書言心言性略相近者竄入聖言取聖經有空字無字者強同於禪教語道既為蹖駮論文又不成章世道潰於狂瀾經學幾為榛莽臣請坊間一切新説曲議令地方官雜燒之生員有引用佛書一句者廩生停廩一月增附不許幫補三句以上降黜中式墨卷引用佛書一句者勒停一科不許會試多者黜革二十八年禮科摘湖廣舉人董以修四書義有無去無住出世住世語罰停五科伏乞天語申飭斷在必行自古有仙佛之世聖學必不明世運必不盛即能實詣其極亦與國家無益何況襲咳唾之餘以自蓋其名利之迹者乎夫道術之分久矣自西晉以來於吾道之外别為二氏自南宋以來於吾道之中自分兩岐又其後則取釋氏之精藴而陰附於吾道之內又其後則尊釋氏之名法而顯出於吾道之外非聖主執中建極羣工一德同風世運之流未知所屆上曰祖宗維世立教尊尚孔子明經取士表章宋儒近日學者不但非毁宋儒漸至詆譏孔子掃滅是非蕩棄行檢復安得節義忠孝之士為朝廷用覽卿等奏深於世教有裨可開列條欵奏來仙佛原是異術宜在山林獨修有好尚者任其解官自便自此稍為釐正然而舊染既深不能盡滌又在位之人多以護惜士子科名為陰德亦不甚摘發也至於末年詭僻彌甚新學之興人皆土苴六經因而不讀傳注崇禎三年浙江鄉試題乂用明俊民用章上文嵗月日時無易傳曰不失其時也第三名龔廣生文誤以為厯家一日十二時之時而取冠本經刻為程文九年應天鄉試題王請大之至文王一怒而安天下之民內有以遏徂莒注曰莒詩作旅衆也謂密人侵阮徂共之衆也第二十三名周天一文誤以為春秋莒人之莒亦得中式部科不聞磨勘詔令之不行至此朱子晚年定論宋史陸九淵傳初九淵嘗與朱熹會鵝湖論辨所學多不合及熹守南康九淵訪之熹與至白鹿洞九淵為講君子小人喻義利一章聽者至有泣下熹以為切中學者隱微深痼之病至於無極而太極之辨則貽書往來論難不置焉王文成守仁所輯朱子晚年定論今之學者多信之不知當時羅文莊欽順已嘗與之書而辨之矣其書曰詳朱子定論之編蓋以其中嵗以前所見未真及晚年始克有悟乃於其論學書牘三數十卷之內摘此三十餘條其意皆主於向裏者以為得於既悟之餘而斷其為定論斯其所擇宜亦精矣第不知所謂晚年者斷以何年為定偶考得何叔京氏卒於淳熙乙未時朱子年方四十有六後二年丁酉而論孟集注或問始成今有取於答何書者四通以為晚年定論至於集注或問則以為中年未定之説竊恐考之欠詳而立論之太果也又所取答黃直卿一書監本止云此是向來差誤别無定本二字今所編增此二字而序中又變定字為舊字却未詳本字所指朱子有答呂東萊一書嘗及定本之説然非指集注或問也凡此愚皆不能無疑顧猶未足深論竊以執事天資絶世而日新不已向來恍若有悟之後自以為證諸五經四子沛然若決江河而放諸海又以為精明的確洞然無復可疑某固信其非虛語也然又以為獨於朱子之説有相抵牾揆之於理容有是邪他説固未敢請嘗讀朱子文集其第三十二卷皆與張南軒答問書內第四書亦自以為其於實體似益精明因復取凡聖賢之書以及近世諸老先生之遺語讀而驗之則又無一不合蓋平日所疑而未白者今皆不待安排往往自見灑落處與執事之所自序者無一語不相似也書中發其所見不為不明而卷末一書提綱振領尤為詳盡竊以為千聖相傳之心學殆無以出此矣不知何故獨不為執事所取無亦偶然也邪若以此二書為然則論孟集注學庸章句或問不容别有一般道理如其以為未合則是執事精明之見決與朱子異矣凡此三十餘條者不過姑取之以證成髙論而所謂先得我心之所同然者安知不有毫釐之不同者為祟於其間以成抵牾之大隙哉又執事於朱子之後特推草廬吳氏以為見之尤真而取其一説以附三十餘條之後竊以草廬晚年所見端的與否良未易知蓋吾儒昭昭之云釋氏亦每言之毫釐之差正在於此即草廬所見果有合於吾之所謂昭昭者安知非其四十年間鑽研文義之效殆所謂真積力久而豁然貫通者也蓋雖以明道先生之髙明純粹又蚤獲親炙於濓溪以發其吟風弄月之趣亦必反求諸六經而後得之但其所稟鄰於生知聞一以知十與他人極力於鑽研者不同耳又安得以前日之鑽研文義為非而以墮此科臼為悔夫得魚忘筌得兔忘蹄出莊子蹄古罤字通兔罥也可也矜魚兔之獲而反追咎筌蹄以為多事其可乎哉東管陳建作學蔀通辨取朱子年譜行狀文集語類及與陸氏兄弟往來書札逐年編輯而為之辨曰朱陸早同晚異之實二家譜集具載甚明黃氏日鈔曰朱子答陸子夀書反復論喪祭之禮答陸子美書辨詰太極西銘至再而止答陸子靜書辨詰尤切其條理有未明而不能盡人言者凡七終又隨條注釋斥其空疏杜撰且云如曰未然各尊所聞各行所知可矣書亦於此而止近世東山趙汸對江右六君子䇿乃云朱子答項平父書有去短集長之言此特朱子謙已誨人之辭未嘗教人為陸氏之學也豈鵝湖之論至是而有合邪使其合并於晚嵗則其微言精義必有契焉而子靜則既往矣此朱陸早異晚同之説所萌芽也程篁墩敏政因之乃著道一編分朱陸異同為三節始焉如氷炭之相反中焉則疑信之相反終焉若輔車之相倚朱陸早異晚同之説於是乎成矣王陽明因之遂有朱子晚年定論之録専取朱子議論與象山合者與道一編輔車之説正相唱和矣凡此皆顛倒早晚以彌縫陸學而不顧矯誣朱子誑誤後學之深故今編年以辨而二家早晚之實近儒顛倒之弊舉昭然矣又曰朱子有朱子之定論象山有象山之定論不可強同専務虛靜完養精神此象山之定論也主敬涵養以立其本讀書窮理以致其知身體力行以踐其實三者交修並盡此朱子之定論也乃或専言涵養或専言窮理或止言力行則朱子因人之教因病之藥也今乃指専言涵養者為定論以附合於象山其誣朱子甚矣又曰趙東山所云蓋求朱陸生前無可同之實而沒後乃臆料其後會之必同本欲安排早異晚同乃至説成生異死同可笑可笑按子靜卒後朱子與詹元善書謂其説頗行於江湖間損賢者之志而益愚者之過不知此禍何時而已蓋已逆知後人宗陸氏者之弊而東山輩不考此書強欲附會之以為同何邪如此豈不適所以彰朱陸平生之未嘗同適自彰其牽合欺人之弊奈何近世咸信之而莫能察也昔裴延齡掩有為無指無為有以欺人主陸宣公謂其愚弄朝廷甚於趙髙指鹿為馬今篁墩輩分明掩有為無指無為有以欺弄後學豈非吾道中之延齡哉又曰昔韓絳呂惠卿代王安石執政時號絳為傳法沙門惠卿為護法善神愚謂近日繼陸學而興者王陽明是傳法沙門程篁墩則護法善神也此書於朱陸二家同異考之極為精詳而世人不知但知其有皇明通紀又不知通紀乃梁文康儲之弟億所作而託名於清瀾也宛平孫承澤謂陽明所編其意欲借朱子以攻朱子且吾夫子以天縱之聖不以生知自居而曰好古敏求曰多聞多見曰博聞約禮至老刪述不休猶欲假年學易朱子一生效法孔子進學必在致知涵養必在主敬德性在是問學在是如謬以朱子為支離為晚悔則是吾夫子所謂好古敏求多聞多見博文約禮皆早年之支離必如無言無知無能為晚年自悔之定論也以此觀之則晚年定論之刻真為陽明舞文之書矣蓋自𢎞治正德之際天下之士厭常喜新風氣之變已有所自來而文成以絶世之資倡其新説鼓動海內文成與胡端敏世寧鄉試同年一日謂端敏公曰公人傑也第少講學端敏答曰某何敢望公但恨公多講學耳嘉靖以後從王氏而詆朱子者始接踵於人間而王尚書世貞發䇿謂今之學者偶有所窺則欲盡發先儒之説而出其上不學則借一貫之言以文其陋無行則逃之性命之鄉以使人不可詰此三言者盡當日之情事矣故王門髙弟為泰州王艮龍溪王畿二人泰州之學一傳而為顔山農均再傳而為羅近溪汝芳趙大洲貞吉龍溪之學一傳而為何心隱本名梁汝元再傳而為李卓吾贄陶石簣望齡昔范武子論王弼何晏二人之罪深於桀紂以為一世之患輕厯代之害重自喪之惡小迷衆之罪大而蘇子瞻謂李斯亂天下至於焚書坑儒皆出於其師荀卿髙談異論而不顧者也困知之記學蔀之編固今日中流之砥柱矣姑蘇志言姚榮國廣孝著書一卷名曰道餘録専詆程朱實録本傳言廣孝著道餘録詆訕先儒為君子所鄙少師亡後其友張洪謂人曰少師於我厚今死矣無以報之但每見道餘録輒為焚棄少師之才不下於文成而不能行其説者少師當道德一風俗同之日而文成在世衰道微邪説又作之時也嘉靖二年會試發䇿考試官蔣文定冕石文介珤謂朱陸之論終以不合而今之學者顧欲強而同之豈樂彼之徑便而欲陰詆吾朱子之學與究其用心其與何淡陳賈輩亦豈大相逺與至筆之簡册公私詆訾以求售其私見禮官舉祖宗朝故事燔其書而禁斥之得無不可乎成祖實録永樂二年鄱陽人朱季友詣闕獻所著書詆毁宋儒上怒遣行人押赴饒州會司府縣官杖之盡焚其所著書當日在朝之臣有能持此論者涓涓不塞終為江河有世道之責者可無履霜堅氷之慮以一人而易天下其流風至於百有餘年之久者古有之矣王夷甫之清談王介甫之新説宋史林之竒言昔人以王何清談之罪甚於桀紂本朝靖康禍亂考其端倪王氏實負王何之責其在於今則王伯安之良知是也孟子曰天下之生久矣一治一亂撥亂世反之正豈不在於後賢乎竊書漢人好以自作之書而托為古人張霸百二尚書衛宏詩序之類是也晉以下人則有以他人之書而竊為已作郭象莊子注何法盛晉中興書之類是也若有明一代之人其所著書無非竊盜而已世説曰初注莊子者數十家莫能究其旨要向秀於舊注外為解義妙析竒致大暢玄風唯秋水至樂二篇未竟而秀卒秀子幼義遂零落然猶有别本郭象者為人薄行有俊才見秀義不傳於世遂竊以為已注乃自注秋水至樂二篇又易馬蹄一篇其餘衆篇或定點文句而已後秀義别本出故今有向郭二莊今代之人但有薄行而無俊才不能通作者之意其盜竊所成之書必不如元本名為鈍賊何辭舊唐書姚班嘗以其曽祖察所撰漢書訓纂多為後之注漢書者隱沒名字將為已説班乃撰漢書紹訓四十卷以發明舊義行於代吾讀有明𢎞治以後經解之書皆隱沒古人名字將為已説者也勘書凡勘書必用能讀書之人偶見焦氏易林舊刻有曰環緒倚鉏乃環堵之誤注云緒疑作佩井堙水刋乃木刋之誤注云刋疑當作利失之逺矣幸其出於前人雖不讀書而猶遵守本文不敢輒改茍如近世之人據臆改之則文益晦義益舛而傳之後日雖有善讀者亦茫然無可尋求矣然則今之坊刻不擇其人而委之讐勘豈不為大害乎梁簡文帝長安道詩金椎抵長樂復道向宜春是用漢書賈山傳隱以金椎樹以青松為馳道之麗至於此三輔決録長安十二門三塗洞開隱以金椎周以林木左出右入為往來之徑水經注同今誤作金槌而又改為椎輪唐閻朝隱送金城公主適西蕃詩還將貴公主嫁與傉檀王是用晉書載記河西王秃髮傉檀今誤作耨檀而又改為褥氊比於金根車之改金銀而又甚焉者矣莊子嬰兒生無石師而能言一本作所師蓋魏晉以後寫書多有作草者故以所而訛石也改書東坡志林曰近世人輕以意改書鄙淺之人好惡多同故從而和之者衆遂使古書日就訛舛深可忿疾孔子曰吾猶及史之闕文也自豫少時見前輩皆不敢輕改書故蜀本大字書皆善本漢書藝文志曰古者書必同文不知則闕問諸故老至於衰世是非無正人用其私故孔子曰吾猶及史之闕文也今亡矣夫蓋傷其寖不正是知穿鑿之弊自漢已然故有行賂改蘭臺漆書以合其私者矣萬厯間人多好改竄古書人心之邪風氣之變自此而始且如駱賔王為徐敬業討武氏檄本出舊唐書其曰偽臨朝武氏者敬業起兵在光宅元年九月武氏但臨朝而未革命也近刻古人改作偽周武氏不察檄中所云包藏禍心睥睨神器乃是未篡之時故有是言越六年天授元年九月始改國號日周其時廢中宗為廬陵王而立相王為皇帝故曰君之愛子幽之於别宮也不知其人不論其世而輒改其文繆種流傳至今未已又近日盛行詩歸一書尤為妄誕魏文帝短歌行長吟永歎思我聖考聖考謂其父武帝也改為聖老評之曰聖老字竒舊唐書李泌對肅宗言天后有四子長曰太子𢎞監國而仁明孝悌天后方圖稱制乃鴆殺之以雍王賢為太子賢自知不免與二弟日侍於父母之側不敢明言乃作黃臺瓜辭令樂工歌之冀天后悟而哀愍其辭曰種瓜黃臺下瓜熟子離離一摘使瓜好再摘使瓜稀三摘猶尚可四摘抱蔓歸而太子賢終為天后所逐死於黔中其言四摘者以況四子也以為非四之所能盡而改為摘絶此皆不考古而肆臆之説豈非小人而無忌憚者哉易林易林疑是東漢以後人撰而託之焦延夀者延夀在昭宣之世漢書京房傳曰延夀以好學得幸梁王王共其資用令極意學學既成為郡史察舉補小黃令按此梁敬王定國也以昭帝始元二年嗣四十年薨當元帝之初元三年其時左氏未立學官今易林引左氏語甚多又往往用漢書中事如曰彭離濟東遷之上庸事在武帝元鼎元年曰長城既立四夷賔服交和結好昭君是福事在元帝竟寧元年曰火入井口楊芒生角犯厯天門窺見太微登上玉牀似用李尋傳語曰新作初陵踰陷難登似用成帝起昌陵事又曰劉季發怒命滅子嬰又曰大蛇當路使季畏懼則又非漢人所宜言也日知録卷十八
