body:
  text: 日知録卷一崑山顧炎武撰三易夫子言包羲氏始畫八卦不言作易而曰易之興也其於中古乎又曰易之興也其當殷之末世周之盛德邪當文王與紂之事邪是文王所作之辭始名為易而周官大卜掌三易之法一曰連山二曰歸藏三曰周易連山歸藏非易也而云三易者後人因易之名以名之也猶之墨子書言周之春秋燕之春秋宋之春秋齊之春秋周燕齊宋之史非必皆春秋也而云春秋者因魯史之名以名之也左傳僖十五年戰於韓卜徒父筮之曰吉其卦遇蠱曰千乘三去三去之餘獲其雄狐成十六年戰於鄢陵公筮之史曰吉其卦遇復曰南國蹙射其元王中厥目此皆不用周易而别有引據之辭即所謂三易之法也卜徒父以卜人而掌此猶周官之大卜而傳不言易重卦不始文王大卜掌三易之法其經卦皆八其别皆六十有四考之左傳襄公九年穆薑遷於東宫筮之遇艮之隨薑曰是於周易曰隨元亨利貞無咎獨言是於周易則知夏商皆有此卦而重八卦為六十四者不始於文王矣朱子周易本義周易自伏羲畫卦文王作彖辭周公作爻辭謂之經經分上下二篇孔子作十翼謂之傳傳分十篇象傳上下二篇象傳上下二篇繫辭傳上下二篇文言説卦傳序卦傳雜卦傳各一篇漢書藝文志易經十二篇師古曰上下經及十翼故十二篇孔氏正義曰十翼者上彖一下彖二上象三下象四上繫五下繫六文言七説卦八序卦九雜卦十陸德明釋文曰太史公論六家要旨引天下同歸而殊途一致而百慮謂之易大傳班固謂孔子晚而好易讀之韋編三絶而為之傳傳即十翼也前漢六經與傳皆别行至後漢諸儒始合經傳為一自漢以來為費直鄭玄王弼所亂取孔子之言逐條附於卦爻之下程正叔傳因之及朱元晦本義始依古文故於周易上經條下云中間頗為諸儒所亂近世朝氏始正其失而未能盡合古文吕氏又更定著為經二卷傳十卷乃復孔氏之舊云洪武初頒五經天下儒學而易兼用程朱二氏亦各自為書永樂中修大全乃取朱子卷次割裂附之程傳之後易經大全凡例曰程傳本義既已並行而諸家定本又各不同故今定從程傳元本而本義仍以類從而朱子所定之古文仍復殽亂彖即文王所繫之辭傳者孔子所以釋經之辭也後凡言傳放此此乃彖上傳條下義今乃削彖上傳三字而附於大哉乾元之下象者卦之上下兩象及兩象之六爻周公所繫之辭也乃象上傳條下義今乃削象上傳三字而附於天行健之下此篇申彖傳象傳之意以盡乾坤二卦之藴而餘卦之説因可以例推云乃文言條下義今乃削文言二字而附於元者善之長也之下其彖曰象曰文言曰字皆朱子本所無復依程傳添入後來士子厭程傳之多棄去不讀專用本義𢎞治三年會試物不可以茍合而已故受之以賁題陳輔文同考官楊守址批曰序卦朱子無一言以釋其義蓋以程子於諸卦之首疏析其義已明且盡故也今治經者專讀本義易卷踰八百而知有傳者不數人此能知之而又善作是用録之以激厲經生之不讀程傳者而大全之本乃朝廷所頒不敢輒改遂即監版傳義之本刋去程傳而以程之次序為朱之次序虛齋蔡清易經蒙引謂之今所竊刋行易經本義書今四書版本每張十八行每行十七字而注皆小字經禮記並同惟易每張二十二行每行二十三字而本義皆作大字與各經不同明為後來所刻是依監版傳義本而刋去程傳凡本義中言程傳備矣者又添一傳曰而引其文皆今代人所為也坊刻擅改古書宜有嚴禁是學臣之責朱子詩集傳序蔡仲默書集傳序今南京刋大全本改曰詩經大全序書經大全序此即亂刻古書之一驗幸監本尚存其謬亦易見爾相傳且二百年矣惜乎朱子定正之書竟不得見於世豈非此經之不幸也夫朱子記嵩山朝氏卦爻彖象説謂古經始變於費氏而卒大亂於王弼此據孔氏正義曰夫子所作象辭元在六爻經辭之後以自卑退不敢干亂先聖正經之辭王輔嗣之意以為象者本釋經文宜相附近其義易了故分爻之象辭各附其當爻下如杜元凱注左傳分經之年與傳相附故謂連合經傳始於輔嗣不知其實本於康成也魏志髙貴鄉公幸太學問博士淳于俊曰孔子作彖象鄭玄作注其釋經義一也今彖象不與經文相連而注連之何也俊對曰鄭玄合彖象於經者欲使學者尋省易了也帝曰若合之於學誠便則孔子曷為不合以了學者乎俊對曰孔子恐其與文王相亂是以不合此聖人以不合為謙帝曰若聖人以不合為謙則鄭玄何獨不謙邪俊對曰古義𢎞深聖問奧逺非臣所能詳盡是則康成之書已先合之不自輔嗣始矣乃漢書儒林傳云費直治易無章句徒以彖象繫辭文言解説上下經則以傳附經又不自康成始朱子記朝氏説謂初亂古制時猶若今之乾卦蓋自坤以下皆依此後人又散之各爻之下而獨存乾一卦以見舊本相傳之樣式耳愚嘗以其説推之今乾卦彖曰為一條象曰為一條疑此費直所附之元本也坤卦以小象散於各爻之下其為象曰者八餘卦則為象曰者七此鄭玄所連髙貴鄉公所見之本也程傳雖用輔嗣本亦言其非古易咸九三咸其股亦不處也傳曰云亦者蓋象辭本不與易相比自作一處故諸爻之象辭意有相續者此言亦者承上爻辭也小畜九二牽復在中亦不自失也本義曰亦者承上爻義秦以焚書而五經亡明朝以取士而五經亡今之為科舉之學者大率皆帖括熟爛之言不能通知大義者也而易春秋尤為繆盩以彖傳合大象以大象合爻以爻合小象二必臣五必君隂卦必云小人陽卦必云君子於是此一經者為拾瀋之書而易亡矣取胡氏傳一句兩句為旨而以經事之相類者合以為題傳為主經為客有以彼經證此經之題有用彼經而隱此經之題於是此一經者為射覆之書而春秋亡矣天順三年九月甲辰浙江溫州府永嘉縣儒學教諭雍懋言比者浙江鄉試春秋摘一十六段配作一題頭緒太多及所鏤程文乃太簡略而不統貫且春秋為經屬詞比事變例無窮考官出題往往棄經任傳甚至參以己意名雖經題實則射覆乞敕禁止上從之復程朱之書以存易當各自為本備三傳啖趙諸家之説以存春秋必有待於後之興文教者卦爻外無别象聖人設卦觀象而繫之辭若文王周公是已夫子作傳傳中更無别象其所言卦之本象若天地雷風水火山澤之外惟頤中有物本之卦名有飛鳥之象本之卦辭而夫子未嘗增設一象也荀爽虞翻之徒穿鑿附會象外生象以同聲相應為震巽同氣相求為艮兌水流濕火就燥為坎離雲從龍則曰乾為龍風從虎則曰坤為虎十翼之中無語不求其象而易之大指荒矣豈知聖人立言取譬固與後之文人同其體例何嘗屑屑於象哉王弼之注雖涉於玄虛然已一掃易學之榛蕪而開之大路矣王輔嗣略例曰互體不足遂及卦變變又不足推致五行一失其原巧喻彌甚不有程子大義何由而明乎易之互體卦變詩之叶韻春秋之例日月經説之繚繞破碎於俗儒者多矣文中子曰九師興而易道微三傳作而春秋散卦變卦變之説不始於孔子周公繫損之六三己言之矣曰三人行則損一人一人行則得其友是六子之變皆出於乾坤無所謂自復姤臨遁而來者當從程傳蘇軾王炎皆同此説互體凡卦爻二至四三至五兩體交互各成一卦先儒謂之互體其説己見於左氏莊公二十二年陳侯筮遇觀之否曰風為天於土上山也注自二至四有艮象四爻變故艮為山是也然夫子未嘗及之後人以雜物撰德之語當之非也其所論二與四三與五同功而異位特就兩爻相較言之初何嘗有互體之説晉書荀顗嘗難鍾會易無互體見稱於世其文不傳新安王炎晦叔嘗問張南軒曰伊川令學者先看王輔嗣胡翼之王介甫三家易何也南軒曰三家不論互體故爾朱子本義不取互體之説惟大壯五六云卦體似兌有羊象焉不言互而言似似者合兩爻為一爻則似之也又謂頤初九靈龜是伏得離卦然此又創先儒所未有不如言互體矣大壯自三至五成兌兌為羊故爻辭並言羊六爻言位易傳中言位者有二義列貴賤者存乎位五為君位二三四為臣位故皆曰同功而異位而初上為無位之爻譬之於人初為未仕之人上則隱淪之士皆不為臣也明夷上六為失位之君乃其變例其但取初終之義者亦不盡拘故乾之上曰貴而無位需之上曰不當位王弼注需上六曰處無位之地不當位者也程子傳亦云此爵位之位非隂陽之位若以一卦之體言之則皆謂之位故曰六位時成曰易六位而成章是則卦爻之位非取象於人之位矣此意己見於王弼略例但必強彼合此而謂初上無隂陽定位則不可通矣記曰夫言豈一端而已夫各有所當也九二君德為人臣者必先具有人君之德而後可以堯舜其君故伊尹之言曰惟尹躬暨湯咸有一德武王之誓亦曰豫有亂臣十人同心同德師出以律以湯武之仁義為心以桓文之節制為用斯之謂律律即卦辭之所謂貞也論語言子之所慎者戰長勺以詐而敗齊泓以不禽二毛而敗於楚春秋皆不豫之故先為不可勝以待敵之可勝雖三王之兵未有易此者也既雨既處隂陽之義莫著於夫婦故爻辭以此言之小畜之時求如任姒之賢二南之化不可得矣隂畜陽婦制夫其畜而不和猶可言也三之反目隋文帝之於獨孤后也既和而惟其所為不可言也上之既雨猶髙宗之於武后也武人為于大君武人為于大君非武人為大君也如書豫欲宣力四方汝為之為六三才弱志剛雖欲有為而不克濟以之履虎有嘻人之凶也惟武人之效力於其君其濟則君之靈也不濟則以死繼之是當勉為之而不可避耳故有斷脰決腹一瞑而萬世不視不知所益以憂社稷者莫敖大心是也戰國䇿過涉之凶其何咎哉自邑告命人主所居謂之邑詩曰商邑翼翼四方之極書曰惟尹躬先見於西邑夏曰惟臣附於大邑周曰作新大邑於東國洛曰肆豫敢求爾於天邑商武王之妃謂之邑薑白虎通曰夏曰夏邑商曰商邑周曰京師是也周官始以四井為邑泰之上六政教陵夷之後一人僅亦守府而號令不出於國門於是焉而用師則不可君子處此當守正以俟時而已桓王不知此也故一用師而祝聃之矢遂中王肩唐昭宗不知此也故一用師而邠岐之兵直犯闕下然則保泰者可不豫為之計哉易之言邑者皆內治之事夬曰告自邑如康王之命畢公彰善疸惡樹之風聲者也晉之上九曰維用伐邑如王國之大夫大車檻檻毳衣如菼國人畏之而不敢奔者也其為自治則同皆聖人之所取也比之九五邑人不誡是亦內治修而逺人服之意成有渝無咎昔穆王欲肆其心周行天下將皆必有車轍馬迹焉祭公謀父作祈招之詩以止王心王是以獲殁於祗宫傳曰人誰無過過而能改善莫大焉聖人慮人之有過不能改之於初且將遂其非而不反也教之以成有渝無咎雖其漸染之深放肆之久而惕然自省猶可以不至於敗亡以視夫迷復之凶不可同年而論矣故曰惟狂克念作聖童觀其在政教則不能是訓是行以近天子之光而所司者籩豆之事其在學術則不能知類通達以幾大學之道而所習者占畢之文樂師辨乎聲詩故北面而弦宗祝辨乎宗廟之禮故後尸商祝辨乎喪禮故後主人小人則無咎也有大人之事有小人之事雖小道必有可觀者焉致逺恐泥故君子為之則吝也不逺復復之初九動之初也自此以前喜怒哀樂之未發也至一陽之生而動矣故曰復其見天地之心乎顔子體此故有不善未嘗不知知之未嘗復行此慎獨之學也回之為人也擇乎中庸夫亦擇之於斯而已是以不遷怒不二過其在凡人則復之初九日夜之所息平旦之氣其好惡與人相近也者幾希茍其知之則擴而充之矣故曰復小而辨於物不耕穫不災畬楊氏曰誠齋易傳初九動之始六二動之繼是故初耕之二穫之初災之二畬之天下無不耕而穫不災而畬者其曰不耕不災則耕且災前人之所己為也昔者周公毖殷頑民遷於洛邑密邇王室既歷三紀世變風移而康王作畢命之書曰惟周公克慎厥始惟君陳克和厥中惟公克成厥終是故有周之治垂拱仰成而無所事矣周監於二代郁郁乎文哉而孔子之聖但曰述而不作信而好古又曰文武之道未墜於地在人是故六經之業集羣聖之大成而無所創矣雖然使有始之作之者而無終之述之者是耕而弗穫災而弗畬也其功為弗竟矣六二之柔順中正是能穫能畬者也故利有攸往也未富者因前人之為而不自多也猶不富以其鄰之意天在山中張湛注列子曰自地以上皆天也故曰天在山中罔孚裕無咎君子信而後諌未信則以為謗已也而況初之居下位未命於朝者乎孔子嘗為委吏矣曰會計當而已矣嘗為乘田矣曰牛羊茁壯長而己矣此所謂裕無咎也若受君之命而任其事有官守者不得其職則去有言責者不得其言則去矣有孚于小人君子之於小人也有知人則哲之明有去邪勿疑之斷堅如金石信如四時使憸壬之類皆知上志之不可移豈有不革面而從君者乎所謂有孚于小人者如此損其疾使遄有喜損不善而從善者莫尚乎剛莫貴乎速初九曰己事遄往六四曰使遄有喜四之所以能遄者賴初之剛也周公思兼三王以施四事其有不合者仰而思之夜以繼日幸而得之坐以待旦子路有聞未之能行惟恐有聞其遄也至矣文王之勤日昃大禹之惜寸隂皆是道也君子進德修業欲及時也故為政者玩嵗而愒日則治不成為學者日邁而月征則身將老矣召公之戒成王曰宅新邑肆惟王其疾敬德疾之為言遄之謂也故曰雞鳴而起孳孳為善上九弗損益之有天下而欲厚民之生正民之德豈必自損以益人哉不違農時穀不可勝食也數罟不入汙池魚鱉不可勝食也斧斤以時入山林材木不可勝用也所謂弗損益之者也皇建其有極斂時五福用敷錫厥庶民詩曰奏格無言時靡有爭是故君子不賞而民勸不怒而民威於鈇鉞所謂弗損益之者也以天下為一家中國為一人其道在是矣利用為依遷國在無事之國而遷晉從韓獻子之言而遷於新田是也在有事之國而遷楚從子西之言而遷於鄀是也皆中行告公之益也姤天下之生久矣一治一亂盛治之極而亂萌焉此一隂遇五陽之卦也孔子之門四科十哲身通六藝者七十有二人於是刪詩書定禮樂贊周易修春秋盛矣而老莊之書即出於其時後漢立辟雍養三老臨白虎論五經太學諸生至三萬人而三君八俊八顧八及八厨為之稱首馬鄭服何之注經術為之大明而佛道之教即興於其世胡三省曰道家雖宗老子而西漢以前未嘗以道士自名至東漢始有張道陵于吉等是道與佛教皆起於東漢之時是知邪説之作與世升降聖人之所不能除也故曰繫于金柅柔道牽也嗚呼豈獨君子小人之辨而已乎包無魚國猶水也民猶魚也幽王之詩曰魚在于沼亦匪克樂潛雖伏矣亦孔之昭憂心慘慘念國之為虐秦始皇八年河魚大上五行志以為魚隂類民之象也逆流而上言民不從君為逆行也自人君有求多於物之心於是魚亂於下鳥亂於上而人情之所嚮必有起而收之者矣以杞包瓜劉昭五行志曰瓜者外延離本而實女子外屬之象一隂在下如瓜之始生勢必延蔓而及於上五以陽剛居尊如樹杞然詩南山有杞陸璣曰杞山材也其樹如樗左傳所謂杞梓皮革使之無所緣而上故曰以杞包瓜孔子曰惟女子與小人為難養也顰笑有時恩澤有節器使有分而國之大防不可以踰何有外戚宦官之禍乎巳日革己日乃孚六二己日乃革之朱子發讀為戊巳之巳天地之化過中則變日中則昃月盈則食故易之所貴者中十干則戊巳為中至於己則過中而將變之時矣故受之以庚庚者更也天下之事當過中而將變之時然後革而人信之矣古人有以己為變改之義者儀禮少牢饋食禮日用丁巳注內事用柔日必丁巳者取其令名自丁寧自變改皆為敬謹而漢書律歷志亦謂理紀於已斂更於庚是也納甲之法革下卦離納已王弼謂即日不孚己日乃孚以己為己事遄往之已恐未然改命吉革之九四猶乾之九四諸侯而進乎天子湯武革命之爻也故曰改命吉成湯放桀於南巢惟有慙德是有悔也天下信之其悔亡矣四海之內皆曰非富天下也為匹夫匹婦復讎也故曰信志也艮毋意毋必毋固毋我艮其背不獲其身也富貴不能淫貧賤不能移威武不能屈行其庭不見其人也艮其限學者之患莫甚乎執一而不化及其施之於事有扞格而不通則忿懥生而五情瞀亂與衆人之滑性而焚和者相去蓋無幾也孔子惡果敢而窒者非獨處事也為學亦然告子不動心之學至於不得於言勿求於心而孟子以為其弊必將如蹶趨者之反動其心此艮其限列其夤之説也君子之學不然廓然而大公物來而順應故聞一善言見一善行若決江河沛然莫之能禦而無熏心之厲矣慈溪黃氏震日鈔曰心者吾身之主宰所以治事而非治於事惟隨事謹省則心自存不待治之而後齊一也孔子之教人曰居處恭執事敬與人忠曾子曰吾日三省吾身為人謀而不忠乎與朋友交而不信乎傳不習乎不待言心而自貫通於動靜之間者也孟子不幸當人欲橫流之時始單出而為求放心之説然其言曰君子以仁存心以禮存心則心有所主非虛空以治之也至於齋心服形之老莊一變而為坐脫立忘之禪學乃始暝目靜坐日夜仇視其心而禁治之及治之愈急而心愈亂則曰易伏猛獸難降寸心嗚呼人之有心猶家之有主也反禁切之使不得有為其不能無擾者勢也而患心之難降歟省齋記又曰夫心之説有二古人之所謂存心者存此心於當用之地也後世之所謂存心者攝此心於空寂之境也造化流行無一息不運人得之以為心亦不容一息不運心豈空寂無用之物哉世乃有遊手浮食之徒株坐攝念亦曰存心而士大夫溺於其言亦將遺落世事以獨求其所謂心逮其心迹氷炭物我參商所謂老子之弊流為申韓者一人之身己兼備之而欲尤人之不我應得乎山隂縣主簿廳記此皆足以發明厲熏心之義詳又見第二十三卷心學條下乃周公已先繫之於易矣鴻漸于陸上九鴻漸于陸其羽可用為儀吉安定胡氏改陸為逵鼂氏曰其説出於毗陵從事范諤昌按宋史藝文志諤昌有證墜簡一卷朱子從之謂合韻非也詩儀字凡十見柏舟相鼠東山湛露菁菁者莪斯于賓之初筵既醉各一見抑二見皆音牛何反不得與逵為叶而雲路亦非可翔之地仍當作陸為是漸至於陵而止矣不可以更進故反而之陸古之髙士不臣天子不友諸侯而未嘗不踐其土食其毛也其行髙於人君而其身則與一國之士偕焉而已此所以居九五之上而與九三同為陸象也朱子發曰上所往進也所反亦進也漸至九五極矣是以上反而之三楊廷秀曰九三下卦之極上九上卦之極故皆曰陸自木自陵而復至於陸以退為進也巽為進退其説並得之君子以永終知敝讀新臺桑中鶉奔之詩而知衛有狄滅之禍讀宛丘東門月出之詩而察陳有徵舒之亂書齊侯送薑氏於歡而卜桓公之所以薨書夫人薑氏入書大夫宗婦覿用幣而兆子般閔公之所以弒昏姻之義男女之節君子可不慮其所終哉鳥焚其巢人主之德莫大乎下人楚莊王之圍鄭也而曰其君能下人必能信用其民矣故以禹之征苖而伯益贊之猶以滿招損謙受益為戒班師者謙也用師者滿也上九處卦之上離之極所謂有鳥髙飛亦傅於天者矣居心以矜而不聞諫爭之論災必逮夫身者也魯昭公之伐季孫意如也請待於沂上以察罪弗許請囚於費弗許請以五乘亡弗許於是叔孫氏之甲興而陽州次乾侯唁矣鸜鵒鸜鵒往歌來哭其此爻之占乎吳幼清曰此爻變為小過有飛鳥之象巽在牀下九二之巽在牀下恭而無禮則勞也初六之進退慎而無禮則葸也翰音登于天羽翰之音雖登于天而非實際其如莊周齊物之言騶衍怪迂之辨其髙過於大學而無實者乎以視車服傳於弟子弦歌遍於魯中若鶴鳴而子和者孰誕孰信夫人而識之矣永嘉之亡太清之亂豈非談空空核玄玄者有以致之哉翰音登于天中孚之反也山上有雷小過山之髙峻雲雨時在其中間而不能至其巔也故詩曰殷其靁在南山之側或髙或下在山之側而不必至其巔所以為小過也然則大壯言雷在天上何也曰自地以上皆天也妣爾雅父曰考母曰妣愚考古人自祖母以上通謂之妣經文多以妣對祖而並言之若詩之云似續妣祖蒸畀祖妣易之云過其祖遇其妣是也左傳昭十年邑薑晉之妣也平公之去邑薑蓋二十世矣儀禮士昏禮勗帥以敬先妣之嗣蓋繼世主祭之通辭過其祖遇其妣據文義妣當在祖之上不及其君遇其臣臣則在君之下也昔人未論此義周人以薑嫄為妣周禮大司樂注周人以后稷為始祖而薑嫄無所配是以特立廟祭之謂之閟宫周語謂之皇妣太薑是以妣先乎祖周禮大司樂享先妣在享先祖之前而斯干之詩曰似續妣祖箋曰妣先妣薑嫄也祖先祖也或乃謂變文以協韻是不然矣朱子本義以晉六二為享先妣之吉占或曰易爻何得及此夫帝乙歸妹箕子之明夷王用享于岐山爻辭屢言之矣易本周易故多以周之事言之小畜卦辭密雲不雨自我西郊本義我者文王自我也東鄰馭得其道則天下皆為之臣馭失其道則強而擅命者謂之鄰臣哉鄰哉鄰哉臣哉漢書郊祀志引此師古注東鄰謂商紂也西鄰謂周文王也遊魂為變精氣為物自無而之有也遊魂為變自有而之無也夫子之答宰我曰骨肉斃於下隂為野土其氣發揚於上為昭明焄蒿悽愴朱子曰昭明露光景也鄭氏曰焄謂香臭也蒿氣蒸出貌許氏曰悽愴使人慘栗感傷之意魯菴徐氏曰陽氣為魂附於體貌而人生焉骨肉斃於下其氣無所附麗則發散飛揚於上或為朗然昭明之氣或為溫然焄蒿之氣或為肅然悽愴之氣蓋陽氣輕清故升而上浮以從陽也所謂遊魂為變者情狀具於是矣延陵季子之葬其子也曰骨肉復歸於土命也若魂氣則無不之也無不之也張子正蒙有云太虛不能無氣氣不能不聚而為萬物萬物不能不散而為太虛循是出入是皆不得已而然也然則聖人盡道其間兼體而不纍者存神其至矣其精矣乎鬼者歸也張子曰氣之為物散入無形適得吾體此之謂歸陳無已師道以遊魂為變為輪回之説理究吕仲木柟辨之曰長生而不化則人多世何以容長死而不化則鬼亦多矣夫燈熄而然非前燈也雲霓而雨非前雨也死復有生豈前生邪邵氏寶簡端録曰聚而有體謂之物散而無形謂之變唯物也故散必於其所聚唯變也故聚不必於其所散是故聚以氣聚散以氣散味於散者其説也佛荒於聚者其説也仙盈天地之間者氣也氣之盛者為神神者天地之氣而人之心也故曰視之而弗見聽之而弗聞體物而不可遺使天下之人齊明盛服以承祭祀洋洋乎如在其上如在其左右聖人所以知鬼神之情狀者如此維嶽降神生甫及申非有所託而生也文王在上於昭于天非有所乘而去也此鬼神之實而誠之不可掩也通乎晝夜之道而知日往月來月往日來一日之晝夜也寒往暑來暑往寒來一嵗之晝夜也小往大來大往小來一世之晝夜也子在川上曰逝者如斯夫不舍晝夜通乎晝夜之道而知則終日乾乾與時偕行而有以盡乎易之用矣繼之者善也成之者性也維天之命於穆不已繼之者善也天下雷行物與無妄成之者性也是故天有四時春秋冬夏風雨霜露無非教也地載神氣神氣風霆風霆流形庶物露生無非教也天地絪緼萬物化醇善之為言猶醇也曰何以謂之善也曰誠者天之道也豈非善乎形而下者謂之器形而上者謂之道形而下者謂之器非器則道無所寓説在乎孔子之學琴於師襄也已習其數然後可以得其志已習其志然後可以得其為人是雖孔子之天縱未嘗不求之象數也故其自言曰下學而上逹垂衣裳而天下治垂衣裳而天下治變質而之文也自黃帝堯舜始也故於此有通變宜民之論過此以往未之或知也人之為學亦有病於憧憧往來者故天下之不助苖長者寡矣過此以往未之或知也居之安則資之深資之深則取之左右逢其原困德之辨也內文明而外柔順其文王之困而亨者乎不怨天不尤人下學而上逹其孔子之困而亨者乎故在陳之厄絃歌之志顔淵知之而子路子貢之徒未足以逹此也故曰困德之辨也凡易之情愛惡相攻逺近相取情偽相感人心之至變也於何知之以其辭知之將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭遊失其守者其辭屈聽其言也觀其眸子人焉廋哉是以聖人設卦以盡情偽夫誠於中必形於外君子之所以知人也百物而為之備使民知神姦先王之所以鑄鼎也故曰作易者其有憂患乎周身之防御物之智其全於是矣易逆數也數往者順造化人事之迹有常而可驗順以考之於前也知來者逆變化云為之動日新而無窮逆以推之於後也聖人神以知來知以藏往作為易書以前民用所設者未然之占所期者未至之事是以謂之逆數雖然若不本於八卦已成之迹亦安所觀其會通而繫之爻象乎是以天下之言性也則故而已矣劉汝佳曰天地間一理也聖人因其理而畫為卦以象之因其象而著為變以占之象者體也象其已然者也占者用也占其未然者也已然者為往往則有順之之義焉未然者為來來則有逆之之義焉如象天而畫為乾象地而畫為坤象雷風而畫為震巽象水火而畫為坎離象山澤而畫為艮兌此皆觀變於隂陽而立卦發揮於剛柔而生爻者也不謂之數往者順乎如筮得乾而知乾元亨利貞筮得坤而知坤元亨利牝馬之貞筮得震而知震亨震來虩虩笑言啞啞筮得巽而知巽小亨利有攸往利見大人筮得坎而知習坎有孚維心亨行有尚筮得離而知離利貞亨畜牝牛吉筮得艮而知艮其背不獲其身行其庭不見其人筮得兌而知兌亨利貞此皆通神明之德類萬物之情者也不謂之知來者逆乎夫其順數已往正所以逆推將來也孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也數往者順也其或繼周者雖百世可知也知來者逆也故曰易逆數也若如邵子之説則是羲文之易已判而為二而又以震離兌乾為數已生之卦巽坎艮坤為推未生之卦殆不免強孔子之書以就己之説矣説卦雜卦互文雷以動之風以散之雨以潤之日以烜之艮以止之兌以説之乾以君之坤以藏之上四舉象下四舉卦各以其切於用者言之也終萬物始萬物者莫盛乎艮崔憬曰艮不言山獨舉卦名者以動撓燥潤功是風雷水火至於終始萬物於山義則不然故舍象而言卦各取便而論也得之矣古人之爻有廣譬而求之者有舉隅而反之者今夫山一卷石之多今夫水一勺之多天地之外復言山水者意有所不盡也坤也者地也不言西南之卦兌正秋也不言西方之卦舉六方之卦而見之也意盡於言矣虞仲翔以為坤道廣布不主一方及兌象不見西者妄也豐多故親寡旅也先言親寡後言旅以協韻也猶楚辭之吉日兮辰良也虞仲翔以為别有義非也兌為口舌兌為口舌其於人也但可以為巫為妾而已以言説人豈非妾婦之道乎凡人於交友之間口惠而實不至則其出而事君也必至於靜言庸違故舜之馭臣也敷奏以言明試以功而孔子之於門人亦聽其言而觀其行唐書言韋貫之自布衣為相與人交終嵗無款曲未嘗偽辭以悅人其賢於今之人逺矣序卦雜卦序卦雜卦皆旁通之説先儒疑以為非夫子之言然否之大往小來承泰之小往大來也解之利西南承蹇之利西南不利東北也是文王已有相受之義也益之六二即損之六五也其辭皆曰十朋之龜姤之九四即夬之九三也其辭皆曰臀旡膚未濟之九四即既濟之九三也其辭皆曰伐鬼方是周公已有反對之義也必謂六十四卦皆然則非易書之本意或者夫子嘗言之而門人廣之如春秋哀十四年西狩獲麟以後續經之作耳晉晝也明夷誅也蘇氏曰晝日三接故曰晝得其大首故曰誅晉當文明之世羣后四朝而車服以庸揖讓之事也明夷逢昏亂之時取彼凶殘而殺伐用張征誅之事也一言晝一言誅取其音協爾畫古音注易林及張衡西京賦並同相虞仲翔曰誅傷也本義用之與晝義對不切孔子論易孔子論易見於論語者二章而已曰加我數年五十以學易可以無大過矣曰南人有言曰人而無恆不可以作巫醫善夫不恆其德或承之羞子曰不占而已矣是則聖人之所以學易者不過庸言庸行之間而不在乎圗書象數也今之穿鑿圗象以自為能者畔也記者於夫子學易之言而即繼之曰子所雅言詩書執禮皆雅言也是知夫子平日不言易而其言詩書執禮者皆言易也人茍循乎詩書執禮之常而不越焉則自天祐之吉無不利矣故其作繫辭傳於悔吝無咎之旨特諄諄焉而大象所言凡其體之於身施之於政者無非用易之事然辭本乎象故曰君子居則觀其象而玩其辭觀之者淺玩之者深矣其所以與民同患者必於辭焉著之故曰聖人之情見乎辭若天一地二易有太極二章皆言數之所起亦贊易之所不可遺而未嘗專以象數教人為學也是故出入以度無有師保如臨父母文王周公孔子之易也希夷之圗康節之書道家之易也自二子之學興而空疏之人迂怪之士舉竄迹於其中以為易而其易為方術之書於聖人寡過反身之學去之逺矣詩三百一言以蔽之曰思無邪易六十四卦三百八十四爻一言以蔽之曰不恆其德或承之羞夫子所以思得見夫有恆也有恆然後可以無大過七八九六易有七八九六而爻但繫九六者舉隅之義也故發其例於乾坤二卦曰用九用六用其變也亦有用其不變者春秋傳穆薑遇艮之八晉語董因得泰之八是也杜元凱注謂雜用連山歸藏二易皆以七八為占故言遇艮之八者非晉語公子筮得貞屯悔豫皆八本卦為貞之卦為悔沙隨程氏曰初與四五凡三爻變其不變者二三上在屯為八在豫亦八今即以艮言之二爻獨變則名之六餘爻皆變而二爻獨不變則名之八是知乾坤亦有用七用八時也乾爻皆變而初獨不變曰初七潛龍勿用可也坤爻皆變而初獨不變曰初八履霜堅氷至可也占變者其常也占不變者其反也故聖人繫之九六歐陽永叔曰易道占其變故以其所占者名爻不謂六爻皆九六也得之矣趙汝梅易輯聞曰揲蓍策數凡得二十八雖為乾亦稱七凡得三十二雖為坤亦稱八楊彥齡筆録曰楊損之蜀人博學善稱説余嘗疑易用九六而無七八損之云卦畫七八爻稱九六乾之䇿二百一十有六坤之策百四十有四亦是舉九六以該七八也朱子謂七八之合亦三百有六十也乾遇七則一百六十八坤遇八則一百九十二卜筮舜曰官占惟先蔽志昆命于元龜詩曰爰始爰謀爰契我龜洪範曰謀及乃心謀及卿士謀及庶人謀及卜筮孔子之贊易也亦曰人謀鬼謀祖伊告紂言格人元龜亦先人後龜夫庶人至賤也而猶在蓍龜之前故盡人之明而不能決然後謀之鬼焉故古人之於人事也信而有功於鬼也嚴而不瀆子之必孝臣之必忠此不待卜而可知也其所當為雖凶而不可避也故曰欲從靈氛之吉占兮必猶豫而狐疑又曰用君之心行君之意龜策誠不能知此事善哉屈子之言其聖人之徒歟卜居屈原自作設為問答以見此心非鬼神吉凶之所得而移耳王逸序乃曰心迷意惑不知所為往至太卜之家決之蓍龜冀聞異䇿以定嫌疑則與屈子之旨大相背戾矣洪興祖補注曰此篇上句皆原所從下句皆原所去時之人去其所當從從其所當去其所謂吉乃原所謂凶也可謂得屈子之心者矣禮記少儀問卜筮曰義與志與義則可問志則否子孝臣忠義也違害就利志也卜筮者先王所以教人去利懷仁義也石駘仲卒無適子有庶子六人卜所以為後者曰沐浴佩玉則兆五人者皆沐浴佩玉石祈子曰孰有執親之喪而沐浴佩玉者乎不沐浴佩玉石祈子兆衛人以龜為有知也南蒯將叛枚筮之遇坤之比曰黃裳元吉子服惠伯曰忠信之事則可不然必敗外強內溫忠也和以率貞信也故曰黃裳元吉黃中之色也裳下之飾也元善之長也中不忠不得其色下不共不得其辭事不善不得其極且夫易不可以占險猶有闕也筮雖吉未也南蒯果敗是以嚴君平之卜筮也與人子言依於孝與人弟言依於順與人臣言依於忠而髙允亦有筮者當依附爻象勸以忠孝之論其知卜筮之旨矣申鑒或問卜筮曰德斯益否斯損曰何謂也吉而濟凶而救之謂德吉而恃凶而怠之謂損君子將有為也將有行也問焉而以言其受命也如嚮告其為也告其行也死生有命富貴在天若是則無可為也無可行也不當問問亦不告也易以前民用也非以為人前知也求前知非聖人之道也是以少儀之訓曰毋測未至郭璞嘗過顏含欲為之筮含曰年在天位在人修已而天不與者命也守道而人不知者性也自有性命無勞蓍龜文中子子謂北山黃公善醫先寢食而後針藥汾隂侯生善筮先人事而後説卦金史方伎傳序曰古之為術以吉凶導人而為善後世術者或以休咎導人而為不善日知録卷一
