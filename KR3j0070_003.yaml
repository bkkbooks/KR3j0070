body:
  text: 日知録卷三崑山顧炎武撰詩有入樂不入樂之分鼓鐘之詩曰以雅以南子曰雅頌各得其所夫二南也豳之七月也小雅正十六篇大雅正十八篇詩譜小雅十六篇大雅十八篇為正經頌也詩之入樂者也弼以下十二國之附於二南之後而謂之風鴟鴞以下六篇之附於豳而亦謂之豳六月以下五十八篇之附於小雅民勞以下十三篇之附於大雅而謂之變雅詩之不入樂者也釋文曰從六月至無羊十四篇是宣王之變小雅從節南山至何草不黄四十四篇前儒申公毛公皆以為幽王之變小雅從民勞至桑柔五篇是厲王之變大雅從雲漢至常武六篇是宣王之變大雅瞻卬及召旻二篇是幽王之變大雅類正義曰變者雖亦播於樂或無算之節所用或随事而歌又在制禮之後樂不常用今按以變雅而播之於樂如衛獻公使大師歌巧言之卒章是也樂記子夏對魏文侯曰鄭音好濫淫志宋音燕女溺志衛音趨數煩志齊音敖辟喬志此四者皆淫於色而害於徳是以祭祀弗用也朱子曰二南正風房中之樂也鄉樂也二雅之正雅朝廷之樂也商周之頌宗廟之樂也至變雅則衰周卿士之作以言時政之得失而弼鄘以下則太師所陳以觀民風者耳非宗廟燕享之所用也但据程大昌之辯則二南自謂之南而别立正風之目者非大昌字泰之孝宗時人著詩論一十七篇來子當日或未見四詩周南召南南也非風也豳謂之豳詩亦謂之雅亦謂之頌據周禮籥篇而非風也南豳雅頌為四詩而列國之風附焉此詩之本序也宋程大昌詩論謂無國風之目然禮記王制言命大師陳詩以觀民風即謂自弼至曹十二國為風無害孔子删詩孔子刪詩所以存列國之風也有善有不善兼而存之猶古之太師陳詩以觀民風而季札聽之以知其國之興衰正以二者之並陳故可以觀可以聽世非二帝時非上古固不能使四方之風有貞而無淫有治而無亂也文王之化被於南國而北鄙殺伐之聲文王不能化也使其詩尚存而入夫子之刪必將存南音以繋文王之風存北音以繫紂之風而不容於没一也是以桑中之篇溱洧之作夫子不刪志淫風也叔于田為譽段之辭揚之水椒聊為從沃之語夫子不刪著亂本也淫奔之詩録之不一而止者所以志其風之甚也一國皆淫而中有不變者焉則亟録之將仲子畏人言也女曰雞鳴相警以勤生也出其東門不慕乎色也衡門不願外也選其辭比其音去其煩且濫者此夫子之所謂刪也後之拘儒不逹此㫖乃謂淫奔之作不當録於聖人之經是何異唐太子𢎞謂商臣弑君不當載於春秋之策乎舊唐書髙宗諸子傳之黄氏日鈔云國風之用於燕享者惟二南而列國風未嘗被之樂也夫子之所言正者雅頌而未及乎風也桑中之詩明言淫奔東萊吕氏乃為之諱而指為雅音失之矣真希元文章正宗其所選詩一埽千古之陋歸之正㫖然病其以理為宗不得選人之趣且如古詩十九首雖非一人之作而漢代之風略具乎此今以希元之所刪者讀之不如飲美酒被服紈與素何以異乎唐詩山有樞之篇良人惟古歡枉駕惠前綏盖亦弼詩雄雉于飛之義牽牛織女意昉大東兔絲女蘿情同車牽十九作中無甚優劣必以坊淫正俗之㫖嚴為繩削雖矯昭明之枉恐失國風之義六代浮華固當芟落使徐庾不得為人陳隋不得為代無乃太甚豈非執理之過乎何彼穠矣山堂攷索載林氏曰二南之詩雖大槩美詩亦有刺詩不徒西周之詩而東周亦與焉據何彼穠矣之詩可知矣其曰平王之孫齊侯之子攷春秋莊公元年書王姬歸于齊此乃桓王女平王孫下嫁於齊襄公非平王孫齊侯子而何洪氏容齋五筆曰春秋莊公元年當周莊王之四年齊襄公之五年書王姬歸于齊莊公十一年當莊王之十四年齊桓公之三年又書王姬歸于齊莊王為平王之孫則所嫁王姬當是姊妹齊侯之子即襄公桓公二者必居一於此矣説者必欲以為西周之詩於時未有平王乃以平為平正之王齊為齊一之侯與書言寧王同義此妄也毛氏傳平正也武王女文王孫適齊侯之子按成王時齊侯則太公而以武王之女適其子是甥為為婚周之盛時必無此事逮成王顧命丁公始見於經而去武王三十餘年又必無未笄之女矣據詩人欲言其人之子孫則必直言之如稱衛莊姜則曰齊侯之子衛侯之妻東宫之妹邢侯之姨美韓侯取妻則曰汾王之孫蹶父之子又何疑乎且其詩刺詩也以王姬徒有容色之盛而無肅邕之徳何以使人化之故曰何彼穠矣唐棣之華曷不肅邕王姬之車詩人若曰言其容色固如唐棣矣然王姬之車胡不肅邕乎是譏之也按此説桓王女平王孫則是其曰刺詩於義未允盖詩自弼鄘以訖於檜曹皆太師之所陳者也其中有美有刺若二南之詩則用之為燕樂用之為鄉樂用之為射樂用之為房中樂而鼓鐘之卒章所謂以雅以南春秋傳所謂象箾南籥文王世子所謂胥鼓南者也安得有刺此必東周之後其詩可以存二南之遺音而聖人附之於篇者也且自平王之東周徳日以衰矣麥禾之取繻葛之戰㡬無以令於兄弟之國且莊王之世魯衛晉鄭日以多故於是王姬下嫁以樹援於强大之齊尋盟府之墜言繼昏婣之夙好且其下嫁之時猶能修周之舊典而容色之盛禮節之備有可取焉聖人安得不録之以示興周道於東方之意乎春秋襄十五年書劉夏逆王后于齊亦此意盖東周以後之詩得附二南者惟此一篇而已後之儒者乃疑之而為是紛紛之説是烏知聖人之意哉或曰詩之所言但稱其容色何也曰古者婦有四徳而容其一也言其容則徳可知矣説苑引書五事一曰貌貌者男子之所以恭敬婦人之所以姣好也故碩人之詩美其君夫人者至無所不極其形容而野麕之貞亦云有女如玉即唐人為妃主碑文亦多有譽其姿色者洪氏𨽻釋載郭輔碑云有四男三女咸髙賢姣孋漢魏間人作已如此豈若宋代以下之人以此為諱而不道乎夫婦人倫之本昏婣王道之大下嫁於齊甥舅之國太公之後先王以周禮治諸侯之本也詩之得附於南者以此舍是則東周以後事無可稱而民間之謡刺皆屬之王風矣况二南之與民風其來自别宣王之世未嘗無雅則平王以下豈遂無南或者此詩之舊附於南而夫子不刪要亦不異乎嚮者之説也何彼穠矣以莊王之事而附於召南其與文侯之命以平王之事而附於書一也弼鄘衛弼鄘衞本三監之地自康叔之封未久而統於衞矣采詩者猶存其舊名謂之弼鄘衞漢書地理志河内本殷之舊都周既滅殷分其畿内為三國詩風弼鄘衞國是也弼以封紂子武庚鄘管叔尹之衛蔡叔尹之以監殷民謂之三監故書序曰武王崩三監畔周公誅之盡以其地封弟康叔號曰孟侯以夾輔周室遷弼庸之民於雒邑故弼鄘衞三國之詩相與同風弼鄘衞者總名也不當分某篇為弼某篇為鄘某篇為衛分而為三者漢儒之誤以此詩之簡獨多故分三名以各冠之而非夫子之舊也觀小雅六笙詩毛公頗有升降黍離之篇毛公以為王齊詩以為衞則知今詩之次序多出於漢儒也新序黍離衞宣公之子夀閔其兄而作攷之左氏傳襄公二十九年季札觀樂於魯為之歌弼鄘衞曰美哉淵乎憂而不困者也吾聞衛康叔武公之徳如是是其衛風乎而襄公三十一年北宮文子之言引衛詩曰威儀棣棣不可選也此詩今為弼之首篇乃不曰弼而曰衛是知累言之則曰弼鄘衛専言之則曰衛一也猶之言殷商言荆楚云爾意者西周之時故有弼鄘之詩及幽王之亡而軼之而大師之職猶不敢廢其名乎然名雖舊而辭則今矣若據漢書言遷弼鄘之民於雒邑則成王之世已無弼鄘弼鄘之亡久矣故大師但有其名而三國同風無非衛人之作檜左傳作鄶之亡未久而詩尚存故别於鄭而各自為風匪風之篇其西周未亡之日乎曰誰將西歸是鎬京尚存故鄭氏譜以為當夷王厲王之時蘇氏以檜詩皆為鄭作非也弼鄘衛三國也非三監也殷之時邦畿千里周則分之為三國今其相距不過百餘里如地理志所言於百里之間而立此三監又并武庚而為一監皆非也宋陳傅良止齋集答黄文叔書以為自荆以南蔡叔監之管叔河南霍叔河北蔡故蔡國管則管城霍所謂霍太山也其緜地廣不得為弼鄘衛也黎許二國許無風而載馳之詩録於鄘黎無風而式微旄丘之詩録於弼聖人闡幽之㫖興滅之心也諸姑伯姊泉水之詩其曰諸姬猶碩人之庶姜古之來媵而為姪娣者必皆同姓之國其年之長幼序之昭穆則不可知也故有諸姑伯姊之稱猶禮之言伯父伯兄也貴為小君而能謙以下其衆妾此所謂其君之袂不如其娣者矣王事王事適我政事一埤益我凡交於大國朝聘㑹盟征伐之事謂之王事左傳襄公二十九年鄭子展曰詩云王事靡盬不遑啟處東西南北誰敢寜處堅事晉楚以蕃王室也王事無曠何常之有喪大記曰既葬與人立君言王事不言國事又曰君既葬王政入於國既卒哭而服王事其國之事謂之政事朝隮于西朝隮于西崇朝其雨朱子引周禮十煇注以隮為虹是也謂不終朝而雨止則未然諺曰東虹晴西虹雨其雨者雨也盖虹蜺雜亂之交無論雨晴而皆非天地之正氣楚襄王登雲夢之臺望髙唐之觀所謂朝雲者也王弼鄘衛王列國之名其始於成康之世乎惟周王撫萬邦廵侯甸而大師陳詩以觀民風其采於商之故都者則繫之弼鄘衛其采於東都者則繫之王王亦周初大師之本名馬永卿述元城劉先生之言亦謂弼鄘衛本商之畿内故序王之上其采於列國者則各繫之其國至驪山之禍先王之詩率已闕軼而孔子所録者皆平王以後之詩此變風之所由名也詩雖變而大師之本名則不敢變此十二國之所以猶存其舊也先儒謂王之名不當儕於列國而為之説曰列黍離於國風齊王徳於邦君晉范甯春秋穀梁傳序誤矣自幽王以上大師所陳之詩亡矣春秋時君卿大夫之賦詩無及之者此孔子之所不得見也是故詩無正風二南也豳也小大雅也皆西周之詩也至於幽王而止惟何彼穠矣為平王以後之詩其餘十二國風則東周之詩也王者之迹熄而詩亡西周之詩亡也詩亡而列國之事迹不可得而見於是晉之乘楚之檮杌魯之春秋出焉是之謂詩亡然後春秋作也周頌西周之詩也魯頌東周之詩也成康之世魯豈無詩而今亦已亡矣故曰詩亡列國之詩亡也其作於天子之邦者以雅以南以豳以頌則固未嘗亡也日之夕矣雞棲于塒日之夕矣牛羊下來君子當歸之時也至是而不歸如之何勿思也君子以嚮晦入宴息日之夕矣而不來則其婦思之矣朝出而晚歸則其母望之矣列女傳夜居于外則其友弔之矣檀弓於文日夕為退説文繫傳是以樽罍無卜夜之賓衢路有宵行之禁故曰見星而行者唯罪人與奔父母之喪者乎曾子問至於酒徳衰而酣身長夜官邪作而昏夜乞哀天地之氣乖而晦明之節亂矣大車豈不爾思畏子不敢民免而無恥也雖速我訟亦不女從有恥且格也鄭自弼至曹皆周初大師之次序先弼鄘衛殷之故都也次之以王周東都也何以知其為周初之次序弼鄘也晉而謂之唐也皆西周之舊也惟鄭乃宣王所封中興之後始立其名於大師而列於諸國之先者鄭亦王畿之内也故次於王也桓公之時其詩不存故首緇衣也楚吴諸國無詩吴楚之無詩以其僭王而刪之與非也太師之本無也楚之先熊繹辟在荆山篳路籃縷以處草莽惟是桃弧棘矢以共禦王事而周無分器左氏昭公十二年傳岐陽之盟楚為荆蠻置茅蕝設望表與鮮牟守燎而不與盟晉語是亦無詩之可采矣況於吴自夀夢以前未通中國者乎滕薛之無詩微也若乃虢鄶皆為鄭滅而虢獨無詩陳蔡皆列春秋之㑹盟而蔡獨無詩有司失其傳爾豳自周南至豳統謂之國風此先儒之誤程泰之辨之詳矣豳詩不屬於國風周世之國無豳此非大師所采周公追王業之始作為七月之詩兼雅頌之聲而用之祈報之事周禮籥章逆暑迎寒則龡豳詩祈年於田祖則龡豳雅祭蜡則龡豳頌雪山王氏曰此一詩而三用也謂籥章之豳詩以鼓鐘琴瑟四器之聲合籥也笙師龡竽笙塤籥簫篪篴管舂牘應雅凡十二器以雅器之聲合籥也眂瞭播鼗擊頌磬笙磬凡四器以頌器之聲合籥也凡為樂器以十有二律為之數度以十有二聲為之齊量凡和樂亦如之此用七月一詩特其以器和聲有不同爾䲭鴞以下或周公之作或為周公而作則皆附於豳焉雖不以合樂然與二南同為有周盛時之詩非東周以後列國之風也故他無可附言私其豵雨我公田遂及我私先公而後私也言私其豵獻豜于公先私而後公也自天下為家各親其親各子其子而人之有私固情之所不能免矣故先王弗為之禁非惟弗禁且從而恤之建國親侯胙土命氏畫井分田合天下之私以成天下之公此所以為王政也至於當官之訓則曰以公滅私然而禄足以代其耕田足以供其祭使之無將母之嗟室人之謫又所以恤其私也此義不明久矣世之君子必曰有公而無私此後代之美言非先王之至訓矣承筐是將君子不親貨賄束帛戔戔實諸筐篚非惟盡飾之道亦所以逺財而養恥也萬歴以後士大夫交際多用白金乃猶封諸書冊之間進自閽人之手今則親呈坐上徑出懐中交收不假他人茶話無非此物衣冠而為囊橐之寄朝列而有市井之容若乃拾遺金而對管寧倚被囊而酬温嶠曾無媿色了不關情固其宜也然則先王制為筐篚之文者豈非禁於未然之前而示人以逺財之義者乎以此坊民民猶輕禮而重貨罄無不宜罄無不宜宜室家宜兄弟宜子孫宜民人也吉蠲為饎是用孝享禴祠烝嘗于公先王得萬國之歡心以事其先王也民之質矣日用飲食民之質矣日用飲食夫使機智日生而姦偽萌起上下且不相安神奚自而降福乎有起信險膚之族則髙后崇降弗祥有譸張為幻之民則嗣王㒺或克夀是故有道之世人醇工龎商樸女童上下皆有嘉徳而至治馨香感於神明矣然則祈天永命之實必在於觀民而斲雕為樸其道何由則必以厚生為本羣黎庶人也百姓百官也民之質矣兼百官與庶人而言猶曰人之生也直也小人所腓小人所腓古制一車甲士三人步卒七十二人炊家子十人固守衣裝五人廏養五人樵汲五人見司馬法隨車而動如足之腓也傳曰腓辟也箋曰腓當作芘皆未是步乘相資短長相衛行止相扶此所以為節制之師也繻葛之戰鄭原繁髙渠彌以中軍奉公為魚麗之陳先偏後伍伍乘彌縫卒不随車遇闕即補斯已異矣古時營陳遇闕處仍以車補周禮車樸掌闕車之萃注闕車所用補闕之車也左傳宣公十二年楚子使潘黨率㳺闕四十乘注游車補闕者大鹵之師魏舒請毁車以為行伍乘為三伍注乘車者車三人五乘十五人今改去車更以五人為伍分為三伍為五陳以相離兩於前伍於後專為右角㕘為左角偏為前拒專任步卒以取㨗速然亦必山林險阻之地而後可用也步不當騎於是趙武靈王為變服騎射之令而後世因之所以取勝於敵者益輕益速而一敗塗地亦無以自保然後知車戰之為謀逺矣終春秋二百四十二年車戰之時未有斬首至於累萬者車戰廢而首功興矣先王之用兵服之而已不期於多殺也殺人之中又有禮焉以此毒天下而民從之不亦宜乎宋沈括對神宗言車戰之利見於歴世然古人所謂兵車者輕車也五御折旋利於㨗速今之民間輜車重大日不能三十里故世謂之太平車但可施於無事之日爾變雅六月采芑車攻吉日宣王中興之作何以為變雅乎采芑傳曰言周室之强車服之美也言其强美斯劣矣正義曰名生於不足觀夫鹿鳴以下諸篇其於君臣兄弟朋友之間無不曲當而未嘗有夸大之辭大雅之稱文武皆本其敬天勤民之意至其言伐商之功盛矣大矣不過曰㑹朝清明而止然則宣王之詩不有侈於前人者乎如韓奕之篇尤侈一傳而周遂亡嗚呼此太子晉所以謂自我先王厲宣幽平而貪天禍固不待沔水之憂祈父之刺而後見之也大原薄伐玁狁至於大原毛鄭皆不詳其地其以為今太原陽曲縣者始於朱子吕氏讀詩記嚴氏詩緝並云而愚未敢信也古之言大原者多矣若此詩則必先求涇陽所在而後大原可得而明也漢書地理志安定郡有涇陽縣开頭山在西禹貢涇水所出後漢書靈帝紀段熲破先零羌於涇陽注涇陽縣屬安定在原州郡縣志原州平涼縣本漢涇陽縣地今縣西四十里涇陽故城是也然則大原當即今之平涼而後魏立為原州亦是取古大原之名爾唐書原州平涼郡治平髙廣徳元年没吐蕃節度使馬璘表置行原州於靈臺之百里城貞元十九年徙治平涼元和三年又徙治臨涇大中三年收復關隴歸治平髙計周人之禦玁狁必在涇原之間若晉陽之太原在大河之東距周京千五百里豈有宼從西來兵乃東出者乎故曰天子命我城彼朔方而國語宣王料民于大原亦以其地近邊而為禦戎之備必不料之於晉國也又按漢書賈捐之言秦地南不過閩越北不過大原而天下潰畔亦是平涼而非晉陽也漢武帝始開朔方郡故秦但有隴西北地上郡而止若晉陽之太原則其外有雁門雲中九原不得言不過也若書禹貢既修大原至于岳陽春秋晉荀吴帥師敗狄于大原及子産對叔向宣汾洮障大澤以處大原則是今之晉陽而豈可以晉之大原為周之大原乎司馬相如上林賦布濩閎澤延蔓太原阮籍東平賦長風振厲蕭條太原髙平曰原盖古人之通稱也吾讀竹書紀年而知周之世有戎禍也盖始於穆王之征犬戎六師西指無不率服於是遷戎於太原十七年以黷武之兵而為徙戎之事懿孝之世戎車屢征至夷王七年虢公帥師伐太原之戎至於俞泉獲馬千匹則是昔日所内徙者今為寇而征之也宣王之世雖號中興三十三年王師伐太原之戎不克三十八年伐條戎奔戎王師敗逋三十九年伐姜戎戰於千畞王師敗逋四十年料民於太原其與後漢西羌之叛大略相似幽王六年命伯士帥師伐六濟之戎王師敗逋後漢書西羌傳並用此嚴尤以為周得中䇿盖不攷之言於是關中之地戎得以整居其間而陜東之申侯至與之結盟而入宼自遷戎至此一百七十六年周語申繒西戎方强王室方騷盖宣王之世其患如漢之安帝也幽王之世其患如晉之懐帝也其自貽伊戚古今同慨焉而三川之震檿弧之謠皆適㑹其時者也然則宣王之功計亦不過唐之宣宗而周人之美宣亦猶魯人之頌僖也事劣而文侈矣書不盡言是以論其世也如毛公者豈非獨見其情於意言之表者哉竹書紀年自共和以後多可信盖亦必有所傳其前則好事者為之爾莠言自口莠言穢言也若鄭享趙孟而伯有賦鶉奔之詩是也君子在官言官在府言府在庫言庫在朝言朝狎侮之態不及於小人謔浪之辭不加於妃妾自世尚通方人安媟慢宋玉登牆之見淳于滅燭之歡遂乃告之君王傳之文字忘其穢論敘為美談以至執女手之言發自臨喪之際原壤齧妃脣之詠宣於侍宴之餘郭舍人於是搖頭而舞八風祝欽明連臂而歌萬嵗閻知微去人倫無君子而國命隨之矣臧孫紇見衛侯于郲退而告其人曰衛侯其不得入矣其言糞土也亡而不變何以復國以糞土喻其言猶詩之莠言也皇父王室方騷人心危懼皇父以柄國之大臣而營邑于向左傳隠十一年解軹縣西有地名向上在今濟源縣界於是三有事之多藏者随之而去矣庶民之有車馬者隨之而去矣盖亦知西戎之已偪而王室之將傾也以鄭桓公之賢且寄孥於虢鄶則其時之國勢可知然不顧君臣之義而先去以為民望則皇父實為之首昔晉之王衍見中原已亂乃説東海王越以弟澄為荆州族弟敦為青州謂之曰荆州有江漢之固青州有負海之險卿二人在外而吾留此足以為三窟矣鄙夫之心亦千載而符合者乎握粟出卜古時用錢未廣詩書皆無貨泉之文而問卜者亦用粟漢初猶然史記日者傳卜而有不審不見奪糈私人之子百僚是試孔氏曰私人皂𨽻之屬也天下有道小徳役大徳小賢役大賢故貴有常尊賤有等威所以辨上下而定民志也周之衰也政以賄成而官之師旅不勝其富左氏襄公十年傳又其甚也私人之子皆得進而服官而文武周公之法盡矣候人而赤芾曹是以亡不狩而縣貆魏是以削賤妨貴小加大古人列之六逆又不但仍叔之子譏其年弱尹氏之婣刺其材瑣而已自古國家吏道雜而多端未有不趨於危亂者舉賢材慎名器豈非人主之所宜兢兢自守者乎不醉反恥彼醉不臧不醉反恥所謂一國皆狂反以不狂者為狂也以箕子之忠而不敢對紂之失日韓非子況中材以下有不尤而效之者乎卿士師師非度此商之所以亡蘭芷變而不芳兮荃蕙化而為茅此楚之所以六千里而為讎人役也是以聖王重特立之人而逺苟同之士保邦于未危必自此始上天之載上天之載無聲無臭儀刑文王萬邦作孚君子所以事天者如之何亦曰儀刑文王而已其儀刑文王也如之何為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信而已王欲玉女民勞本召穆公諫王之辭乃託為王意以戒公卿百執事之人故曰王欲玉女是用大諫猶之轉予于恤而呼祈父從事不均而怨大夫所謂言之者無罪而聞之者足以戒也豈亦監謗之時疾威之日不敢指斥而為是言乎然而亂君之國無治臣焉至於我即爾謀聽我囂囂則又不獨王之愎諫矣夸毗天之方懠無為夸毗釋訓曰夸毗體柔也後漢書崔駰傳注夸毗謂佞人足恭善為進退天下惟體柔之人常足以遺民憂而召天禍夏侯湛有云居位者以善身為静以寡交為慎以弱斷為重以怯言為信抵疑白居易有云以拱黙保位者為明智以柔順安身者為賢能以直言危行者為狂愚以中立守道者為凝滯故朝寡敢言之士庭鮮執咎之臣自國及家寖而成俗故父訓其子曰無介直以立仇敵兄教其弟曰無方正以賈悔尤且慎黙積於中則職事廢於外强毅果斷之心屈畏忌因循之性成反謂率職而居正者不逹於時宜當官而行法者不通於事變是以殿最之文雖書而不實黜陟之典雖備而不行長慶集策羅㸃有云無所可否則曰得體與世浮沈則曰有量衆皆黙已獨言則曰沽名衆皆濁已獨清則曰立異宋史本傳觀三子之言其於末俗之敝可謂懇切而詳盡矣至於佞諂日熾剛克消亡朝多沓沓之流士保容容之福茍由其道無變其俗必將使一國之人皆化為巧言令色孔壬而後已然則喪亂之所從生豈不階於夸毗之輩乎樂天作胡旋女詩曰天寳季年時欲變臣妾人人學圎轉是以屈原疾楚國之士謂之如脂如韋而孔子亦云吾未見剛者流言以對彊禦多懟即上章所云彊禦之臣也其心多所懟疾而獨窺人主之情深居禁中而好聞外事則假流言以中傷之若二叔之流言以間周公是也夫不根之言何地蔑有以斛律光之舊將而有百升明月之謠以裵度之元勳而有坦腹小兒之誦所謂流言以對者也如此則宼賊生乎内而怨詛興乎下矣郤宛之難進胙者莫不謗令尹所謂侯作侯祝者也孔氏疏采苓曰讒言之起由君數問小事於小人也可不慎哉申伯申伯宣王之元舅也立功於周而吉甫作崧髙之誦其孫女為幽王后無罪見黜申侯乃與犬戎攻殺幽王竹書紀年宣王四十一年王師敗于申則宣王之末申侯已叛乃未㡬而為楚所病戌申之詩作焉當宣王之世周興而申以强當平王之世周衰而申以弱至莊王之世而申為楚縣矣左傳哀公十七年言楚文王縣申二舅之於周功罪不同而其所以自取如此宋左師之告華亥曰女喪而宗室於人何有人亦與女何有讀二詩者豈徒論二王之得失哉徳輶如毛徳輶如毛即輶車鸞鑣之輶言易舉也故曰一日克已復禮天下歸仁焉又曰有能一日用其力於仁矣乎我未見力不足者韓城水經注聖水徑方城縣故城北又東南徑韓城東詩溥彼韓城燕師所完王錫韓侯其追其貊奄受北國王肅曰今涿郡方城縣有韓侯城世謂寒號非也魏書地形志范陽郡方城縣有韓侯城按史記燕世家易水東分為梁門今順天府固安縣有方城村即漢之方城縣也水經注亦云濕水徑良鄉縣之北界歴梁山南髙梁水出焉是所謂奕奕梁山者矣舊説以韓國在同州韓城縣曹氏曰武王子初封於韓其時召襄公封於北燕實為司空王命以燕衆城之竊疑同州去燕二千餘里即令召公為司空掌邦土量地逺近興事任力亦當發民於近甸而已豈有役二千里外之人而為築城者哉召伯營申亦曰因是謝人齊桓城邢不過宋曹二國而召誥庶殷攻位蔡氏以為此遷洛之民無役紂都之理此皆經中明證大全載朱子之言亦以此為不可曉況其追其貊乃東北之夷而蹶父之靡國不到亦似謂韓土在北陲之逺也又攷王符潛夫論曰昔周宣王時有韓侯其國近燕故詩云普彼韓城燕師所完其後韓西亦姓韓為衛滿所伐遷居海中漢時去古未逺當有傳授今以水經注為定按毛傳梁山韓城皆不言其地鄭氏箋乃云梁山今在馮翊夏陽西北韓姬姓之國也後為晉所滅故大夫韓氏以為邑名焉左傳富辰言邘晉應韓武之穆也左竹書紀年平王十四年晉人滅韓按傳僖公十五年晉侯及秦伯戰于韓上言涉河下言及韓又曰宼深矣是韓在河束亦非今之韓城也故杜氏解但云韓晉地城文公十年晉人伐秦取少梁始得今韓之地益明戰于韓非此也至溥彼韓城燕師所完則鄭已自知其説之不通故訓燕為安而曰大矣彼韓國之城乃古平安時衆民之所築完惟王肅以梁山為涿郡方城縣之山而以燕為燕國孫毓亦云今於梁山則用鄭説於燕則用王説二者不可兼通而又巧立召公為司空之説可謂甚難而實非矣又其追其貊鄭以經傳説貊多是東夷故職方掌四夷九貉即貊字鄭志荅趙商云九貉即九夷也又秋官貉𨽻注云征東北夷所獲而漢時所謂濊貊者皆在東北史記貨殖傳燕東綰濊貊朝鮮真番之利髙漢書武帝紀注服䖍曰濊貊在辰韓之北句麗沃沮之南東窮於大海因於箋末添二語云其後追也貊也為玁狁所逼稍稍東遷此又可見康成之不自安而遷就其説也如山之苞如川之流如山之苞營法也如川之流陳法也古之善用師者能為營而後能為陳故曰師出以律又曰不愆於四伐五伐六伐七伐乃止齊焉管子霸國之謀且猶作内政以寄軍令使之耳目素習心志素定如山之不可動搖然後出而用之若決水於千仞之谿矣不弔不祥威儀之不類賢人之喪亡婦寺之專横皆國之不祥而日月之𤯝山川之變鳥獸草木之妖其小者也傳曰人無釁焉妖不自作故孔子對哀公以老者不教幼者不學為俗之不祥家語荀子曰人有三不祥幼而不肯事長賤而不肯事貴不肖而不肯事賢是人之三不祥也而武王勝殷得二俘而問焉曰若國有妖乎一俘對曰吾國有妖晝見星而天雨血一俘對曰此則妖也非其大者也吾國之妖子不聽父弟不聽兄君令不行此妖之大者也武王避席再拜之吕氏春秋畏書載箕子之言亦曰乃㒺畏咈其耉長舊有位人自余所逮見五六十年國俗民情舉如此矣不教不學之徒滿於天下而一二稍有才知者皆少正夘鄧析之流是豈待三川竭而悲周岷山崩而憂漢哉書曰習與性成詩云如彼泉流無淪胥以敗識時之士所以引領於哲王繫心於耉徳也駉魯僖公儉以足用寛以愛民務農重穀而有駉牧之盛衛文公大布之衣大帛之冠務材訓農通商惠工敬教勸學授方任能而有騋牝三千之多然則古之馬政皆本於田功也吾未見廏有肥馬野有餓莩而能國者也實始翦商太王當武丁祖甲之世殷道未衰何從有翦商之事僖公之世距太王已六百餘年作詩之人特本其王迹所基而侈言之爾猶泰誓之言命我文考肅將天威也猶康誥之言天乃大命文王殪戎殷也亦後人追言之也張子曰一日之間天命未絶猶是君臣𤣥鳥讀經傳之文終商之世無言祥瑞者而大戊之祥桑髙宗之雊雉惕於天之見妖而修徳者有二焉則知監於夏王之矯誣上天而慄慄危懼盖湯之家法也簡狄吞卵而生契不亦矯誣之甚乎毛氏傳曰𤣥鳥鳦鳥也春分𤣥鳥降湯之先祖有娀氏女簡狄配髙辛氏帝帝率與之祈於郊禖而生契故本其為天所命以𤣥鳥至而生焉可以破史遷之謬矣敷奏其勇敷奏其勇不震不動不難不竦茍非大受之人驟而當天下之重任鮮不恐懼而失其守者此公孫丑所以有動心之問也升陑伐夏創未有之事而不疑可謂天錫之勇矣何以能之其上帝臨女無貳爾心之謂乎湯武身之也學湯之勇者宜何如震驚百里不喪七鬯近之矣魯頌商頌詩之次序猶春秋之年月夫子因其舊文述而不作也頌者美盛徳之形容以告宗廟魯之頌頌其君而已而列之周頌之後者魯人謂之頌也鄭氏曰襄公時季孫行父請命於周而史克作之然春秋列國卿大夫賦詩無及此四篇者世儒謂夫子尊魯而進之為頌是不然魯人謂之頌夫子安得不謂之頌乎為下不倍也春秋書公書郊禘亦同此義孟子曰其文則史不獨春秋也雖六經皆然今人以為聖人作書必有驚世絶俗之見此是以私心待聖人世人讀書如王介甫纔入貢院而一院之事皆欲紛更宋史張方平傳此最學者之大病也列國之風何以無魯大師陳之固曰魯詩不謂之頌矣孔子魯人也從魯而謂之頌此如魯史之書公也然而泮水之文則固曰魯侯也商何以在魯之後曰草廬吴氏嘗言之矣大師所職者當代之詩也商則先代之詩故次之周魯之後汲冢周書伊尹朝獻商書附於王會解之後即其例也詩序詩之世次必不可信今詩亦未必皆孔子所正且如褒姒滅之幽王之詩也而次於前召伯營之宣王之詩也而次於後序者不得其説遂并楚茨信南山甫田大田瞻彼洛矣裳裳者華桑扈鴛鴦魚藻采菽十詩皆為刺幽王之作恐不然也又如碩人荘姜初歸事也而次於後緑衣日月終風荘姜失位而作燕燕送歸妾作擊鼓國人怨周吁而作也而次於前朱子日月傳曰此詩當在燕燕之前下篇放此渭陽秦康公為太子時作也而次於後黄鳥穆公薨後事也而次於前此皆經有明文可據故鄭氏謂十月之交雨無正小旻小宛皆刺厲王之詩十月之交有艷妻之云自當是幽王漢興之初師移其第耳而左氏傳楚荘王之言曰武王作武其卒章曰耆定爾功其三曰敷時繹思我徂維求定其六曰綏萬邦屢豐年今詩但以耆定爾功一章為武而其三為賚其六為桓章次復相隔越儀禮歌召南三篇越草蟲而取采蘋正義以為采蘋舊在草蟲之前知今日之詩已失古人之次非夫子所謂雅頌各得其所者矣日知録卷三
