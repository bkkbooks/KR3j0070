body:
  text: 日知録巻十崑山顧炎武撰治地古先王之治地也無棄地而亦不盡地田間之涂九軌有餘道矣遺山澤之分秋水多得有所休息有餘水矣是以功易立而難壊年計不足而世計有餘後之人一以急廹之心為之商鞅决裂阡陌而中原之疆理蕩然宋政和以後圍湖占江而東南之水利亦塞宋史劉韐傳鑑湖為民侵耕官田收其租歲二萬斛政和間涸以為田衍至六倍文獻通考圩田湖田多起於政和以來其在浙間者𨽻應奉局其在江東者蔡京秦檜相繼得之大概今之田昔之湖徒知湖中之水可涸以墾田而不知湖外之田將胥而為水也於是十年之中荒恒六七而較其所得反不及於前人子曰無欲速無見小利夫欲行井地之法則必自此二言始矣斗斛丈尺古帝王之於權量其於天下則五歲廵狩而一正之虞書同律度量衡是也其於國中則每歲而再正之禮記月令日夜分則同度量鈞衡石角斗甬正權概是也洪武初命三日一次較勘斛斗秤尺故闗石和鈞大禹以之興夏謹權量審法度而武王以之造周今北方之量鄉異而邑不同至有以五斗為一斗者一鬨之市兩斗並行至其土地有以二百四十步為畝者有以三百六十步為畝者有以七百二十步為畝者大名府志有以一十二百步為一畝者其步弓有以五尺為步有以六尺七尺八尺為步此之謂工不信度者也夫法不一則民巧生有王者起同權量而正經界其先務矣後漢書建武十五年詔下州郡簡覈墾田頃畝及户口年紀河南尹張伋及諸郡守十餘人坐度田不實下獄死而隋書趙煚為冀州刺史為銅斗鐵尺置之於肆百姓便之上聞令頒之天下以為常法儻亦可行於今日者乎地畝大小以近郭為上地逺之為中地下地葢自金元之末城邑丘墟人民稀少先耕者近郭近郭洪武之冊田也後墾者逺郊逺郊繼代之新科也故重輕殊也廣平府志曰地有大小之分者以二百四十步為畝自古以來未之有改也由國初有奉㫖開墾永不起科者有因洿下鹻薄而無糧者今一概量出作數是以元額地少而丈出之地反多有司恐畝數增多取駭於上而貽害於民乃以大畝該小畝取合元額之數自是上行造報則用大地以投黄冊下行徴𣲖則用小畝以取均平是以各縣大地有以小地一畝八分折一畝遞増之至八畝以上折一畝既因其地之高下而為之差等又皆合一縣之丈地投一縣之元額以敷一縣之糧科而賦役由之以出此後人一時之權宜爾考之他郡如河南八府而懐慶地獨小糧獨重開封三十四州縣而把地獨小糧獨重葢由元末未甚殘破故獨重於他郡邑天下初定日不暇給度田之令均丈之法有所不及詳解縉大庖西封事言土田之高下不均而起科之輕重無别或膏腴而稅反輕瘠鹵而稅反重是則洪武之時即已如此而中原之地彌望荆榛亦無從按畝而圗之也唐陸䞇有言創制之始不務齊平供應有煩簡之殊牧守有能否之異所在徭賦輕重相懸所遣使臣意見各異計奏一定有加無除此則致弊之端古今一轍而井地不均賦稅不平固三百年於此矣故東昌府志言二州十五縣步尺參差大小畝規畫不一人得以意長短廣狹其間而大名府志謂田賦必均而後可久除沙茅之地别籍外請檄諸州縣長吏畫一而度之以鈔准尺以尺准步以步准畝以畝准賦倣江南魚鱗冊式而編次之舊所籍不齊之額悉罷去而括其見存者均攤於諸州縣之間一切糧稅馬草驛傳均徭里甲之類率例視之以差數百里之間風土人烟同條共貫矣則知均丈之議前人已嘗著之而今可通於天下者也宋史言宋時田制不立甽畝轉易丁口隱漏兼并冐偽未嘗考按王洙傳洙言天下田稅不均請用郭諮孫千步開方法頒州縣以均其稅又言宣和中李彦置局汝州凡民間美田使他人投牒告陳指為天荒魯山闔縣盡括為公田焚民故劵使田主輸租訴者輒加威刑公田既無二稅轉運使亦不為奏除悉均諸他州宦者傳是則經界之不正賦稅之不均有自宋已然者又不獨金元之季矣州縣界域自古以來畫疆分邑必相比附天下皆然後世則州縣所屬鄉村有去治三四百里者有城門之外即為鄰屬者則幅貟不可不更也下邽在渭北而併於渭南美原在北山而併於富平若此之類俱宜復設而大名縣距府七里可以省入元城則大小不可不均也管轄之地多有隔越如南宫屬真定威縣屬廣平之間有新河縣屬真定地清河屬廣平威縣之間有冠縣屬東昌地鄆城屬兖州范縣屬東昌之間有鄒縣屬兖州地青州之益都等俱有高苑地淮安之宿遷縣有開封之祥符縣地大同之靈丘廣昌二縣中間有順天之宛平縣地或距縣一二百里或隔三四州縣藪姧誨逋恒必繇之而甚則有如沈丘屬開封之縣署地糧乃𨽻於汝陽屬汝寧者則錯互不可不正也衛所之屯有在三四百里之外與民地相錯浸久而迷其版籍則軍民不可不清也水濱之地消長不常如蒲州之西門外三里即以補朝邑之坍使陜西之人越河而佃至於争鬬殺傷則事變不可不通也周禮形方氏掌制邦國之地域而正其封疆無有華離之地有王者作謂宜遣使分按郡邑圗寫地形奠以山川正以經界地邑民居必參相得庶乎獄訟衰而風俗淳矣洪武十七年八月丙戌以州之民户不及三千者皆改為縣改者凡三十七州後魏田制後魏雖起朔漠據有中原然其墾田均田之制有足為後世法者景穆太子監國令曰周書言任農以耕事貢九榖任圃以樹事貢草木任工以餘材貢器物任商以市事貢貨賄任牧以畜事貢鳥獸任嬪以女事貢布帛任衡以山事貢其材任虞以澤事貢其物乃令有司課畿内之民使無牛者借人牛以耕種而為之芸田以償之凡耕種二十二畝而芸七畝大畧以是為率使民各標姓名於田首以知其勤惰禁飲酒游戲者於是墾田大增高祖太和九年十月丁未詔曰朕承乾在位十有五年每覧先王之典經綸百氏儲蓄既積黎元永安爰暨季葉斯道陵替富強者并兼山澤貧弱者望絶一廛致令地有遺利民無餘財或争畝畔以亡軀或因饑饉以棄業而欲天下太平百姓豐足安可得哉今遣使者循行州郡與牧守均給天下之田勸課農桑興富民之本其制男夫十五以上受露田四十畝婦人二十畝民年及課則受田老免及身没則還田諸桑田不在還受之限男夫人給田二十畝課蒔餘種桑五十樹棗五株榆三根非桑之土夫給一畝依法課蒔榆棗限三年種畢不畢奪其不畢之地於是有口分世業之制唐時猶沿之嗟乎人君欲留心民事而創百世之規其亦運之掌上也已宋林勲作本政之書而陳同父以為必有英雄特起之君用於一變之後豈非知言之士哉開墾荒地明初承元末大亂之後山東河南多是無人之地洪武中詔有能開墾者即為已業永不起科是時方孝孺有因其曠土復古井田之議至正統中流民聚居詔令占籍景泰六年六月丙申户部尚書張鳯等奏山東河南北直𨽻并順天府無額田地甲方開荒耕種乙即告其不納稅糧若不起科争競之塗終難杜塞今後但告争者宜依本部所奏減輕起科則例每畝科米三升三合每糧一石科草二束不惟永絶争競之端抑且少助倉廪之積從之户科都給事中成章等劾鳯等不守祖制不恤民怨帝不聽然自古無永不起科之地明初但以招徠墾民立法之過反以啓後日之争端而彼此告訐投獻王府勲戚及西天佛子見實錄成化四年三月無怪乎經界之不正賦稅之不均也蘇松二府田賦之重丘濬大學衍義補曰韓愈謂賦出天下而江南居十九以今觀之浙東西又居江南十九而蘇松常嘉湖五府又居兩浙十九也考洪武中據諸司職掌天下夏稅秋糧以石計者總二千九百四十三萬餘而浙江布政司二百七十五萬二千餘蘇州府二百八十萬九千餘松江府一百二十萬九千餘常州府五十五萬二千餘是此一藩三府之地其田租比天下為重其糧額比天下為多今國家都燕歲漕江南米四百餘萬石以實京師而此五府者幾居江西湖廣南直𨽻之半臣竊以蘇州一府計之以準其餘蘇州一府七縣時未立太倉州其墾田九萬六千五百六頃居天下八百四十九萬六千餘頃田數之中而出二百八十萬九千石稅糧於天下二千九百四十餘萬石歲額之内其科徴之重民力之竭可知也已杜宗桓上廵撫侍郎周忱書曰五季錢氏稅兩浙之田每畝三斗宋時均兩浙田每畝一斗宋淳祐元年鮑亷作琴川志曰國初盡削錢氏白配之目遣右補闕王永高象先各乘遞馬均定稅數只作中下二等中田一畝夏稅錢四文四分秋末八升下田一畝錢三文三分米七升四合取於民者不過如此自熙豐更法崇觀多事靖炎軍興隨時増益然則宋初之額尚未至一斗也元入中國定天下田稅上田每畝稅三升中田二升半下田二升水田五升元史耶律楚材傳至於我太祖高皇帝受命之初天下田稅亦不過三升五升而其最下有三合五合者於是天下之民咸得其所獨蘇松二府之民則因賦重而流移失所者多矣今之糧重去處每里有逃去一半上下者請言其故國初籍没土豪田租有因為張氏義兵而籍没者有因虐民得罪而籍没者有司不體聖心將没入田地一依租額起糧每畝四五斗七八斗至一石以上民病自此而生宋史言建炎元年籍没蔡京王黼等莊以為官田減租三分洪武初未有以此故事上言者何也田未没入之時小民於土豪處還租朝徃暮回而已後變私租為官糧乃於各倉送納運渉江湖動經歲月有二三石納一石者有四五石納一石者有遇風波盜賊者以致累年拖欠不足王叔英疏亦言輸之官倉道路既遥勞費不少收納之際其弊更多有甚於輸富民之租者自洪武時已然矣愚按宋華亭一縣即今松江一府當紹熙時秋苖止十一萬二千三百餘石景定中賈似道買民田以為公田益糧一十五萬八千二百餘石宋末官民田地稅糧共四十二萬二千八百餘石量加圓斛元初田稅比宋尤輕然至大德間没入朱清張瑄田後至元間又没入朱國珍管明等田一府稅糧至有八十萬石迨至季年張士誠又併諸撥屬財賦府與夫營圍沙職僧道站役等田至洪武以來一府稅糧共一百二十餘萬石租既大重民不能堪於是皇上憐民重困屢降德音將天下係官田地糧額遞減三分二分外即宣德五年二月癸巳詔書松江一府稅糧尚不下一百二萬九千餘石愚厯觀徃古自有田稅以來未有若是之重者也以農夫蠶婦凍而織餒而耕供稅不足則賣兒鬻女又不足然後不得已而逃以至田地荒蕪錢糧年年拖欠向蒙恩赦自永樂十三年至十九年七年之間所免稅糧不下數百萬石永樂二十年至宣德三年又復七年拖欠折收輕齎亦不下數百萬石折收之後兩奉詔書勅諭自宣德七年以前拖欠糧草鹽糧也種子粒稅絲門攤課鈔悉皆停徵前後一十八年間蠲免折收停徴至不可算由此觀之徒有重稅之名殊無徵稅之實願閣下轉達皇上稽古稅法斟酌取舍以宜於今者而稅之輕其重額使民如期輸納此則國家有輕稅之名又有徴稅之實矣今按宣廟實録洪熙元年閏七月廣西右布政使周幹自蘇常嘉湖等府廵視還言蘇州等處人民多有逃亡者詢之耆老皆云由官府弊政困民所致如吳江崑山民田畝舊稅五升小民佃種富室田畝出私租一石後因没入官依私租減二斗是十分而取八也撥賜公侯駙馬等項田每畝舊輸租一石後因事故還官又如私租例盡取之且十分而取其八民猶不堪況盡取之乎盡取則無以給私家而必至凍餒欲不逃亡不可得矣乞命所司將没官之田及公侯還官田租俱照彼處官田起科畝稅六斗則田地無抛荒之患而小民得以安生下部議宣德五年二月癸巳詔各處舊額官田起科不一租糧既重農民弗勝自今年為始每田一畝舊額納糧自一斗至四斗者各減十分之二自四斗一升至一石以上者各減十分之三永為定例六年三月廵撫侍郎周忱言松江府華亭上海二縣舊有官田稅糧二萬七千九百餘石俱是古額科糧太重乞依民田起科庶徴收易完上命行在户部會官議劾忱變亂成法沽名要譽請罪之上不許七年三月庚申朔詔但係官田塘地稅糧不分古額近額悉依五年二月癸巳詔書減免不許故違辛酉上退朝御左順門謂尚書胡濙曰朕昨以官田賦重百姓苦之詔減什之三以蘇民力嘗聞外間有言朝廷每下詔蠲除租賦而户部皆不准甚者文移戒約有司有勿以詔書為辭之語若然則是廢格詔令壅遏恩澤不使下流其咎若何今減租之令務在必行書曰民惟邦本本固邦寜有子曰百姓不足君孰與足卿等皆士人豈不知此朕昨有詩述此意今以示卿其念之毋忘濙等皆頓首謝其詩曰官租頗繁重在昔葢有因而此服田者本皆貧下民耕作既勞勩輸納亦苦辛遂令衣食微曷以贍其身殷念惻予懐故迹安得循下詔減什三行之四方均先王視萬姓有若父子親兹惟重邦本豈曰矜吾仁英廟實録正統元年閏六月丁夘行在户部奏浙江直𨽻蘇松等處減除稅糧請命各處廵撫侍郎并同府縣官用心覈實其官田每畝秋糧四斗一升至二石以上者減作二斗七升二斗一升以上至四斗者減作二斗一斗一升至二斗者減作一斗明白具數送部磨勘從之按嘉靖十七年冊長洲縣田猶有七斗以上者今與民田通均而猶三斗七升是此㫖當日未盡奉行也官田自漢以來有之宋史建炎元年籍蔡京王黼等莊以為官田開禧三年誅韓侂胄明年置安邉所韓侂胄與其他權倖没入之田及圍田湖田之在官者皆𨽻焉輸米七十二萬一千七百斛有奇錢一百三十一萬五千緡有奇而已景定四年殿中侍御史陳堯道右正言曹孝慶監察御史虞虙張晞顔等言乞依祖宗限田議自兩浙江東西官民户踰限之田抽三分之一買充公田得一千萬畝之田則歲有六七百萬斛之入丞相賈似道主其議行之始於浙西六郡凡田畝起租滿石者予二百貫以次遞減有司以買田多為功皆謬以七八斗為石其後田少與磽瘠虧租與佃人負租而逃者率取償田主六郡之民多破家矣理宗紀言平江江陰安吉嘉興常州鎮江六郡已買公田三百五十餘萬畝而平江之田獨多似道傳包恢知平江督買田至以肉刑從事元之有天下也此田皆别領於官松江府志言元時苖稅公田外復有江淮財賦都總管府領故宋后妃田以供太后江浙財賦府領籍没朱清張瑄田以供中宫元史天暦二年十月立平江等處田賦提舉司稻田提領所領籍没朱國珍管明田以賜丞相托克托撥賜莊在上海十九保巳元史至托正四年六月己賜托克松江田為立松江等處稻田提領所領宋親王及新籍明慶妙行二寺等田又有汪闗闗滿經厯田以賜影堂寺院諸王近臣又有括入白雲宗僧田元史成宗紀大徳七年七月罷江南白雲宗緫攝所其田令依例輸租仁宗紀至大四年二月御史臺言白雲宗總攝所統江南為僧之有髪者不養父母避役損民乞追收所受璽書銀印勒還民籍從之皆不係州縣元額而元史所記賜田大臣如拜珠雅克特穆爾䓁諸王如魯王多阿克巴拉郯王徹徹爾圖等公主如魯國大長公主寺院如集慶萬壽二寺無不以平江田而平江之官田又多至張士誠據呉之日其所署平章太尉等官皆出於負販小人無不志在良田美宅一時買獻之産徧於平江而一入版圗亦按其租簿没入之已而富民沈萬三等又多以事被籍是故改平江曰蘇州而蘇州之官田多而益多故宣德七年六月戊子知府況鍾所奏之數長洲等七縣秋糧二百七十七萬九千餘石其中民糧止一十五萬三千一百七十餘石官糧二百六十二萬五千九百三十餘石是一府之地土無慮皆官田而民田不過十五分之一也且夫民田僅以五升起科而官田之一石者奉詔減其什之三而猶為七斗是則民間之田一入於官而一畝之糧化而為十四畝矣實錄宣徳七年七月己未行在户部奏直𨽻松江府没官田宜准民田例起科上從之命各處没官田糧俱准此例此固其極重難返之勢始於景定訖於洪武而徵科之額十倍於紹熙以前者也於是廵撫周忱有均耗之法有改𣲖金花官布之法以寛官田而租額之重則一定而不可改若夫官田之農具車牛其始皆給於官而歲輸其稅浸久不可問而其稅復𣲖之於田然而官田官之田也國家之所有而耕者猶人家之佃户也民田民自有之田也各為一冊而徴之猶夫宋史所謂一曰官田之賦二曰民田之賦金史所謂官田曰租私田曰稅者而未嘗併也相沿日久版籍訛脫疆界莫尋村鄙之氓未嘗見冊買賣過割之際徃往以官作民而里胥之飛灑移換者又百出而不可䆒所謂官田者非昔之官田矣乃至訟端無窮而賦不理於是景泰二年從浙江布政司右布政使楊瓚之言將湖州府官田重租分𣲖民田輕租之家承納及歸併則例四年詔廵撫直𨽻侍郎李敏均定應天等府州縣官民田先是正統中户部㑹官議令江南小户官田改為民田起科而量改大户民田為官田以備其數既又因御史徐郁奏令所司均配扣算務使民田量𢃄官田辦糧以甦貧困俱行廵撫侍郎周忱清理然民田多係官豪占據莫能究竟其弊仍舊至是郁復以為言户部請從其議命敏均定搭𣲖敢有恃強阻滯者執治其罪從之嘉靖二十六年嘉興知府趙瀛剙議田不分官民稅不分等則一切以三斗起徴蘇松常三府從而效之自官田之七斗六斗下至民田之五升通為一則而州縣之額各視其所有官田之多少輕重為準多者長洲至畝科三斗七升少者太倉畝科二斗九升矣國家失累代之公田而小民乃代官佃納無涯之租賦事之不平莫甚於此然而為此說者亦窮於勢之無可奈何而當日之士大夫亦皆帖然而無異論亦以治如亂絲不得守二三百年紙上之虗科而使斯人之害如水益深而不可救也惟唐太常鶴徴作武進志極為惋歎抑嘗論之自三代以下田得買賣而所謂業主者即連陌跨阡不過本其錙銖之直而直之高下則又以時為之地力之盈虗人事之贏絀率數十年而一變奈之何一入於官而遂如山河界域之不可動也且景定之君臣其買此田者不過予以告牒㑹子虗名不售之物逼而奪之以至彗出民愁而自亡其國宋史買公田五千畝以上以銀半分官告五分度牒二分㑹子三分半五千畝以下以銀半分官告三分度牒三分㑹子三分半千畝以下度牒㑹子各半五百畝至三百畝全以㑹子及田事成每石官給止四十貫而半是告牒民持之而不得售六郡騷然四百餘年之後推本重賦之繇則猶其遺禍也宋史謂其弊極多其租尤重及宋亡遺患猶不息亮哉斯言而況於没入之田本無其直者乎至於今日佃非昔日之佃而主亦非昔日之主則夫官田者亦將與冊籍而俱銷共車牛而皆盡矣猶執官租之說以求之固已不可行隋書李徳林傳高祖以高阿那肱衛國縣市店八十區賜徳林車駕幸晋陽店人上表稱地是民物高氏强奪於内造舍上命有司科還價直則是以當代之君而還前代所奪之地價古人已有之矣又考後漢書譙𤣥子瑛奉家錢千萬於公孫述以贖父死及𤣥䘚天下平定𤣥弟慶以狀詣闕自陳尤武勅所在還𤣥家錢則知人主以天下為心固當如此而欲一切改從民田以復五升之額即又駭於衆而損於國有王者作咸則三壤謂宜遣使案行吳中逐縣清丈定其肥瘠高下為三等上田科二斗中田一斗五升下田一斗山塘塗蕩以升以合計者附於冊後而概謂之曰民田惟學田屯田乃謂之官田則民樂業而賦易完視之紹熙以前猶五六倍也豈非去累代之横征而立萬年之永利者乎昔者唐末中原宿兵所在皆置營田以耕曠土其後又募高貲户使輸課佃之户部别置官司總領不𨽻州縣梁太祖擊淮南掠得牛以千萬計給東南諸州農民使歳輸租自是歴數十年牛死而租不除民甚苦之周太祖素知其弊用張凝李榖之言悉罷户部營田務以其民𨽻州縣其田廬牛農器並賜見佃者為永業悉除租牛課是歲户部增三萬餘户或言營田有肥饒者不若鬻之可得錢數十萬緡以資國帝曰利在於民猶在國也朕用此錢何為嗚呼以五代之君猶知此義而況他日大有為之主必有朝聞而夕行之者矣宋紹興二十三年知池州黄子游言青陽縣苖七八倍於諸縣因南唐嘗以縣為宋齊丘食邑故輸三斗後遂為額詔減苖稅二分有半科米二分今存者惟衛所屯田學田勲戚欽賜莊田三者猶是官田南京各衙門所管草塲田地佃户亦轉相典賣不異民田蘇州一府惟呉縣山不曽均為一則至今有官山私山之名官山每畝科五升私山畝科一升五勺今高淳縣之西有永豐鄉者宋時之湖田所謂永豐圩者也文獻通考永豐圩自政和五年圍湖成田初令百姓請佃後以賜蔡京又以賜韓世忠又以賜秦檜繼撥𨽻行宫今𨽻總所宋史建康府永豊圩租米歲以三萬石為額王弼成化十一年進士溧水知縣永豐謡曰永豐圩接永寜鄉一畝官田八斗糧人家種田無厚薄了得官租身即樂前年大水平斗門圩底禾苖無半分里胥告災縣官怒至今追租如追魂有田追租未足怪盡將官田作民賣富家得田貧納租年年舊租結新債舊租了新租促更向城中賣黄犢一犢千文任時估債家算息不算母嗚呼有犢可賣君莫悲東鄰賣犢兼賣兒但願有兒在我邊明年還得種官田讀此詩知當日官佃之苦即已如此元史閻復傳言江南公田租重宜減以貸貧民而以官作民亦不始於近日矣元微之集奏狀右臣當州百姓田地每畝只稅粟九升五合草四分地頭𣙜酒錢共出二十一文已下其諸色職田每畝約稅粟三斗草三束脚錢一百二十文若是京官上司職田又湏百姓變米雇車般送比量正稅近於四倍其公廨田官田驛田等所稅輕重約與職田相似是則官田之苦自唐已然不始於宋元也故先朝洪熙宣德中屢下詔書令民間有抛荒官田召人開耕依民田例起科又不獨蘇松常三府為然吳中之民有田者什一為人佃作者十九其畝甚窄而凡溝渠道路皆并其稅於田之中歲僅秋禾一熟一畝之收不能至三石凡言石者皆以官斛少者不過一石有餘而私租之重者至一石二三斗少亦八九斗佃人竭一歲之力糞㙲工作一畝之費可一緡而收成之日所得不過數斗至有今日完租而明日乞貸者故既減糧額即當禁限私租上田不得過八斗如此則貧者漸富而富者亦不至於貧元史成宗紀至元三十一年十月辛巳時成宗即位江浙行省臣言陛下即位之初詔蠲今歲田租十分之三然江南與江北異貧者佃富人之田歲輸其租今所蠲特及田主其佃民輸租如故則是恩及富室而不被及於貧民也宜令佃民當輸田主者亦如所蠲之數從之明朝宣徳十年五月乙未刑科給事中年富亦有此請大德八年正月乙未詔江南佃户私租太重以十分為率普減二分永為定例前一事為特恩之蠲後一事為永額之減而皆所以寛其佃户也是則厚下之政前代已有行之者漢武帝時董仲舒言或耕豪民之田見稅什五唐德宗時陸贄言今京畿之内每田一畝官稅五升而私家收租有畝至一石者是二十倍於官稅也降及中等租猶半之夫土地王者之所有耕稼農夫之所為而兼并之徒居然受利望令凡所占田約為條限裁減租價務利貧人仲舒所言則今之分租贄所言則今之包租也然猶謂之豪民謂之兼并之徒食貨志豪民侵陵分田刼假師古曰分田謂貧者無田而取富人田耕種共分其所收也假亦謂貧人賃富人之田也刼者富人刼奪其稅侵欺之也宋已下則公然號為田主矣豫借唐𤣥宗天寳三載制曰每載庸調八月徵收農功未畢恐難濟辦自今已後延至九月二十日為限至代宗廣德二年七月庚子稅天下地畝青苖錢以給百官俸田一畝稅錢十五所謂青苖錢者以國用急不及待秋方苖青而徵之故號青苖錢主其任者為青苖使此與宋王安石所行青苖錢之法不同彼則當青黄未接之時貸錢於貧民而取其息本謂之常平錢民問名為青苖錢耳遂為後代豫借之始陸宣公言蠶事方興已輸縑稅農功未艾遽歛榖租上司之繩責既嚴下吏之威暴愈促有者急賣而耗其半直無者求假而費其倍酬憲宗元和六年二月制以新陳未接營辦尤艱凡有給用委觀察使以供軍錢方貟借便不得量抽百姓故韓文公有游城南詩云白布長衫紫領巾差科未動是閒身麥苖含穟桑生葚共向田頭樂社神是三四月之間尚未動差科也至後唐莊宗同光四年三月戊辰以軍食不足勅河南尹豫借夏秋稅其時外内離叛未及一月國亡主滅明宗即位頗知愛民見於文獻通考所載長興四年起徵條流其節候早者五月十五日起徵八月一日納足遞而下之其尤晚者六月十五日起徵九月納足周世宗顯德三年十月丙子上謂侍臣曰近朝徵歛榖帛多不俟收穫紡績之畢乃詔三司自今夏稅以六月秋稅以十月起徵是莊宗雖有三月豫借之令而實未嘗行也乃後代國勢阽危非若同光而春初即出榜開徵其病民又甚矣詩云碩䑕碩䑕無食我苖謝君直曰苖未秀而食之貪之甚也明之為豫借者食苖之政也有不敺民而適樂郊者乎虞謙洪武末為杭州府知府嘗建議僧道民之蠧今江南寺院田多或數百頃而徭役未嘗及之貧民無田徃徃為徭役所困請為定制僧道每人田無過十畝餘田以均平民初是之已而謂非舊制遂廢紡織之利今邊郡之民既不知耕又不知織雖有材力而安於游惰華陰王宏撰著議以為延安一府布帛之價貴於西安數倍既不獲紡織之利而又歲有買布之費生計日蹙國稅日逋非盡其民之惰以無教之者耳今當每州縣發紡織之具一副令有司依式造成散給里下募外郡能織者為師即以民之勤惰工拙為有司之殿最一二年間民享其利將自為之而不煩程督矣計延安一府四萬五千餘户户不下三女子固已十三萬餘人其為利益豈不甚多按鹽鐵論曰邊民無桑麻之利仰中國絲絮而後衣之夏不釋複冬不離窟父子夫婦内藏於專室土圜之中崔寔政論曰僕前為五原太守土俗不知緝績冬積草伏卧其中若見吏以草纒身令人酸鼻今火同人多是如此婦人出草則穿紙袴真所謂倮蟲者也吾乃賣儲峙得二十餘萬詣雁門廣武迎織師使巧手作機乃紡以教民織後漢書采入本傳是則古人有行之者矣漢志有云冬民既入婦人同巷相從夜績女工一月得四十五日八月載績為公子裳豳之舊俗也率而行之富強之效惇龎之化豈難致哉吳華覈上書欲禁綾綺錦繡以一生民之原豐榖帛之業謂今吏士之家少無子女多者三四少者一二通令户有一女十萬家則十萬人人人織績一歳一束則十萬束矣使四疆之内同心戮力數年之間布帛必積恣民五色惟所服用但禁綺繡無益之飾且美貌者不待華采以崇好豔姿者不待文綺以致愛有之無益廢之無損何愛而不暫禁以充府藏之急乎此救乏之上務富國之本業使管晏復生無以易此方今纂組日新侈薄彌甚斵雕為樸意亦可行之會乎馬政析因夷隩先王之所以處人民也日中而出日中而入左氏莊二十九年傳先王之所以處廐馬也漢鼂錯言令民有車騎馬一匹者復䘚三人師古曰當為䘚者免其三人不為䘚者復其錢本傳文帝從之故文景之富衆庶街巷有馬仟伯阡陌字同之間成羣乘牸牝者擯而不得㑹聚漢書食貨志若乃塞之斥也橋桃致馬千匹貨殖傳班壹避墜古地字於樓煩致馬牛羊數千羣敘傳則民間之馬其盛可知武帝輪臺之悔乃修馬復令復䘚三人之令西域傳唐𤣥宗開元九年詔天下之有馬者州縣皆先以郵遞軍旅之役定户復緣以升之百姓畏苦乃多不畜馬故騎射之士減曩時自今諸州民勿限有無蔭能家畜十馬以下免帖驛郵遞征行定户無以馬為貲唐書兵志古之人君其欲民之有馬如此惟魏世宗正始四年十一月丁未禁河南畜牝馬魏書本紀河延昌元年六月戊寅通南牝馬之禁元世祖至元二十三年六月戊申括諸路馬凡色目人有馬者三取其二漢民悉入官敢匿與互市者罪之元史本紀實錄言永樂元年七月丙戌上諭兵部臣曰比聞民間馬價騰貴葢禁民不得私畜故也漢文景時閭里有馬成羣民有即國家之有其榜諭天下聽軍民畜馬勿禁又曰三五年後庶幾馬漸蕃息此承元人禁馬之後故有此諭而洪熙元年正月辛巳上申諭兵部令民間畜官馬者二歲納駒一匹俾得以餘力養私馬至宣德六年有陜西安定衛土民王從義畜馬蕃息數以來獻此則小為之而小效者也然未及修漢唐復馬之令也驛傳後唐輿服志曰驛馬三十里一置史記田横乗傳詣雒陽未至三十里至尸鄉置是也唐制亦然唐書百官志凡三十里有驛白居易詩從陜至東京今陜州至河南府山低路漸平風光四百里在今代為三百里車馬十三程是也桑維翰對晋高祖言大梁距魏不過十里其行或一日而馳十驛岑參詩一驛過一驛驛騎如星流平明發咸陽暮及隴山頭韓愈詩銜命山東撫亂師日馳三百自嫌遲是也天寳六載勅自今左降官日馳十驛以上又如天寳十四載十一月丙寅安祿山反於范陽壬申聞於行在所時上在華清宫在今臨潼縣六日而達至徳二載九月癸夘廣平王收西京甲辰㨗書至行在時上在鳯翔府一日而達而唐制赦書日行五百里則又不止於十驛也古人以置驛之多故行速而馬不弊後人以節費之說歴次裁併至有七八十里而一驛者馬倒官逃職此之故盍一考之前史乎且如通州潞河驛四十里至夏店驛五十里至公樂驛五十里至蘭州漁陽驛今以夏店公樂二驛併於三河則一驛七十里矣豈不勞乎又如定州永定驛五十里至西樂驛四十五里至伏城驛四十里至真定府恒山驛猶仍舊貫使併為三驛亦必不堪其敝矣古人以三十里為一舍左傳楚子入鄭退三十里而許之平注以為退一舍而詩言我服既成于三十里周禮遺人三十里有宿宿有路室然則漢人之驛馬三十里一置有自來矣史記晋世家注引賈逵曰司馬法從遯不過三舍三舍九十里也明初凡驛皆有倉洪熙元年六月丙辰河南新安知縣陶鎔奏縣在山谷土瘠民貧遇歲不登公私無措惟南關驛有儲糧臣不及待報借給貧民一千七百二十八石上嘉其稱職即此一事而當時儲畜之裕法令之寛賢尹益下之權明主居高之聽皆非季世之所能及矣然則驛之有倉不但以供賓客使臣而亦所以待凶荒囏阨實周禮遺人之掌也帖括後生何足以知先王之政哉今時十里一鋪俗作舖設䘚以遞公文金史泰和六年初置急逓舖腰鈴傳遞日行三百里奉大名府志唐有銀牌末熙寜有金字牌急脚逓岳飛詔班師一日中十二金字牌是也孟子所云置郵而傳命葢古已有之史記白起既行出咸陽西門十里至杜郵漢書黄覇傳注師古曰郵亭書舍謂傳送文書所止處漕程山堂考索載唐漕制凡陸行之程馬日七十里步及驢五十里車三十里水行之程舟之重者沂河日三十里江四十里餘水四十五里空舟沂河四十里江五十里餘水六十里沿流之舟則輕重同制河日一百五十里江一百里餘水七十里轉運徵歛送納皆準程節其遲速其三峽砥柱之類不拘此限此法可以不盡人馬之力而亦無逗留之患明之過淮過洪及囘空之限猶有此意而其用車驢則必窮日之力而後止以至於人畜兩弊豈非後人之急廹日甚於前人也與然其效可睹矣行鹽松江李雯論鹽之產於塲猶五榖之生於地宜就塲定額一稅之後不問其所之則國與民兩利又曰天下皆私鹽則天下皆官鹽也此論鑿鑿可行丘仲深大學衍義補言復海運而引杜子美詩雲㠶轉遼海稉俗作粳稻來東吳為證余於鹽法亦引子美詩云蜀麻吳鹽自古通又曰風烟𣺌吳蜀舟楫通鹽麻又曰蜀麻久不來吳鹽擁荆門若如後代之法各有行鹽地界呉鹽安得至蜀哉人人誦杜詩而不知此故事所云誦詩三百授之以政不達者也洪武三年六月辛巳山西行省言大同糧儲自陵縣長蘆運至太和嶺路逺費重若令商人於大同倉入米一石太原倉入米一石三斗者俱准鹽一引引二百斤商人鬻畢即以原給引自赴所在官司繳之如此則轉輸之費省而軍儲充矣從之此中鹽之法所自始唐劉晏為轉連使專用𣙜鹽法充軍國之費時自許汝鄭鄧之西皆食河東池鹽度支主之汴滑唐蔡之東皆食海鹽晏主之晏以為鹽吏多則州縣擾故但於出鹽之鄉置鹽官收鹽户所主之鹽轉鬻於商人任其所之自餘州縣不復置官其江嶺間去鹽鄉逺者轉官鹽於彼貯之或商絶鹽貴則減價鬻之謂之常平鹽官獲其利而民不乏鹽始江淮鹽利不過四十萬緡季年乃六百萬緡由是國用充足而民不困弊今日鹽利之不可興正以鹽吏之不可罷讀史者可以慨然有省矣行鹽地分有逺近之不同逺於官而近於私則民不得不買私鹽既買私鹽則興販之徒必興於是乎盗賊多而刑獄滋矣宋史言江西之䖍州地連廣南而福建之汀州亦與䖍接䖍鹽弗善汀故不産鹽二州民多盜販廣南鹽以射利又言䖍州官鹽自淮南運致鹵濕襍惡輕不及斤而價至四十七錢嶺南鹽販入䖍一斤半當一斤純白不襍賣錢二十以故䖍人盡食嶺南鹽䖍州即今贑州府宋時屢議不定介䘚食廣東鹽每歲秋冬田事纔畢恒數十百為羣持甲兵旗鼔徃䖍汀漳潮循梅惠廣八州之地所至刼人榖帛掠人婦女與廵捕吏䘚鬬格或至殺傷則起為盜依阻險要捕不能得或赦其罪招之元末之張士誠以鹽徒而盜據吳會其小小興販雖太平之世未嘗絶也余少居崑山常熟之間為兩浙行鹽地而民間多販淮鹽自通州渡江其色青黑視官鹽為善及游大同所食者蕃鹽堅緻精好此地利之便非國法之所能禁也明知其不能禁而設為廵捕之格課以私鹽之獲每季若干為一定之額寧非奉行之具文哉宋嘉祐中著作佐郎何鬲三班奉職王嘉麟上書請罷給茶本錢縱園户貿易而官收租錢與所在征算歸𣙜貨務以償邊糴之費可以䟽利源而寛民力仁宗從之其詔書曰厯世之敝一旦以除著為經常弗復更制是以雖當王安石之時而於茶法未有所變其說可通之於鹽課者也日知錄卷十
