body:
  text: 日知録卷八崑山顧炎武撰州縣稅賦王士性廣志繹曰天下賦稅有土地肥瘠不甚相逺而徴科乃至懸絶者當是國初草草未定畫一之制而其後相沿不敢議耳如真定之轄五州二十七縣蘇州之轄一州七縣無論所轄即其廣輪之數真定已當蘇之五而蘇州糧二百三萬八千石真定止一十萬六千石然猶南北異也若同一北方也河間之繁富二州十六縣登州之貧寡一州七縣相去殆若莛楹而河間糧止六萬一千登州乃二十三萬六千然猶直𨽻山東異也若在同省漢中二州十四縣之殷庶視臨洮二州三縣之衝疲易知也而漢中糧止三萬臨洮乃四萬四千然猶各道異也若在同道順慶不大於保寧其轄二州八縣均也而順慶糧七萬五千保寧止二萬然猶兩郡異也若在一邑則同一西南充也而負郭十里田以步計賦以田起二十里外則田以絙量不步矣五十里外田以約計不絙矣官賦無定數私價亦無定估何其懸絶也惟是太平日久纍世相傳民皆安之以為固然不自覺耳夫王者制邑居民則壤成賦豈有大小輕重不同若此之甚哉且以所轄州縣言之真定三十二西安三十六開封平陽各三十四濟南三十成都三十一而松江鎮江太平止三縣漢陽興化止二縣其直𨽻之州則如徐州澤州之四縣郴州之五縣嘉定之六縣潼川之七縣儼然一府也而其小者或至於無縣可轄且明初之制多因元舊平陽一路共領九州殆據山西之半至洪武二年始以澤潞遼沁四州直𨽻山西行省而今尚有五州若蒲州自古别為一郡屢此建言皆為户部所格歸德一州向屬開封至嘉靖二十四年始分為府天下初定日不暇給沿元之非遂至二三百年崔銑言今之郡大者千里屬邑數十為長者名數且不能悉奚望其理也宜令大郡不過四百里邑百里然則後之王者審形勢以制統轄度輻員以界郡縣則土田以起徴科乃平天下之先務不可以慮始之艱而廢萬年之利者矣太祖實録洪武八年三月平陽府言所屬蒲解二州距府闊逺乞以直𨽻山西行省為便未許至天啓四年巡按山西李日宣請以二州十縣分立河中府治運城以運使兼知府事運同兼清軍運副兼管糧運判兼理刑事下户部户部下山西山西下河東河東下平陽府議之竟寢不行按漢河東郡二十四縣後漢二十城魏正始八年分河東之汾北十縣為平陽郡此所謂欲製千金之裘而與狐謀其皮也且商雒之於關內陳許之於大梁德棣之於濟南頴亳之於鳯陽自古不相統屬去府既逺更添司道於是有一府之地而四五其司道者官愈多而民愈擾職此之由矣昔仲長統昌言謂諸夏有十畝共桑之迫逺州有曠野不發之田范曄酷吏傳亦言漢制宰守曠逺户口殷大而後漢馬援傳既平交址奏言西于縣户有三萬二千逺界去庭千餘里庭縣庭也請分為封溪望海二縣許之華陽國志巴郡太守但望字伯門大山人見風俗通上疏言郡境南北四千東西五千屬縣十四土界遐逺令尉不能窮詰姦凶時有賊發督郵追案十日乃到賊已逺逃蹤跡絶滅其有犯罪逮捕證驗文書詰訊從春至冬不能究訖繩憲未加或遇德令是以賊盜公行姦宄不絶太守行農桑不到四縣刺史行部不到十縣欲請分為二郡其後遂為三巴水經注山隂縣漢㑹稽郡治也永建中陽羡周嘉上書以縣逺赴㑹稽至難求得分置遂以浙江西為吳以東為㑹稽此皆逺縣之害已見於前事者也北齊書赫連子悅除林慮守世宗往晉陽路由是郡因問所不便子悅答言臨水武安二縣去郡遙逺山嶺重疊車步艱難若東屬魏郡則地平路近世宗笑曰卿徒知民便不覺損幹子悅答以所言因民疾苦不敢以私潤負心嗟乎今之牧守其能不徇於私而計民之便者吾未見其人矣屬縣自古郡縣之制惟唐為得其中今考地理志屬縣之數京兆河南二府各二十河中太原二府各十三魏州十四廣州十三鎮州桂州各十一其他雖大無過十縣者此其大小相維多寡相等均安之效不可見於前事乎後代之王猶可取而鏡也但其中一二縣之郡亦有可并憲宗元和元年割屬東川六州制曰分疆設都蓋資共理形束壤制亦在稍均將懲難以銷萌在立防而不紊故賈生之議以楚益梁宋氏之規割荆為郢酌於前事宜有變通此雖一時之言亦經邦制郡之長策也州縣品秩漢時縣制萬户已上為令秩千石至六百石減萬户為長秩五百石至三百石唐則州有上中下三等縣有京畿上中中下下六等品各有差太祖實録吳元年定縣有上中下三等稅糧十萬石已下為上縣知縣從六品縣丞從七品主簿從八品六萬石以下為中縣知縣正七品縣丞正八品主簿從八品三萬石以下為下縣知縣從七品丞簿如中縣之秩洪武六年八月壬辰分天下府為三等糧二十萬石已上者為上府秩從三品二十萬石以下者為中府秩正四品十萬石以下者為下府秩從四品不知何年始改此制洪武十四年十月定考劾法府以田糧十五萬石以上州以七萬石以上縣以三萬石以上親臨王府上司軍馬守禦路當驛道邊方衝要者為繁不及此者為簡後乃一齊其品而但立繁簡之目才優者調繁不及者調簡古時列爵惟五之意遂盡亡之矣府漢曰郡唐曰州州即郡也惟建都之地乃曰府唐初止京兆河南二府武后以并州為太原府𤣥宗以蒲州為河中府益州為成都府肅宗以岐州為鳯翔府荆州為江陵府德宗以梁州為興元府惟興元以德宗行幸於此其餘皆建都之地也舊唐書田悅傳朱滔自稱翼王悅稱魏王王武俊稱趙王又請李納稱齊王以幽州為范陽府魏州為大名府恆州為真定府鄆州為東平府李希烈傳僭號以汴州為大梁府是則以州稱府者僭也後梁以汴州為開封府後唐以魏州為興唐府鎮州為真定府册府元龜載長興三年中書省奏本朝都長安以京兆府為上今都雒陽請以河南府為上其五府舊以鳯翔府為首河中成都江陵興元為次中興初升魏博為興唐府鎮州為真定府皆是創業興王之地宜升在五府之上合為七府至宋而大郡多升為府王明清揮麈録曰太祖皇帝以歸德軍節度使創業升宋州為歸德府後為應天府太宗以晉王即位升并州為太原府真宗以夀王建儲升夀州為夀春府仁宗以升王建儲升建業為江寧府英宗以齊州防禦使入繼以齊州為興德軍神宗自頴王升儲升汝隂為順昌府哲宗自延安郡王升儲升延州為延安府徽宗以端王即位升端州為肇慶府欽宗自定王建儲前已升定州為中山府太上以康王中興升康州為德慶府今上以建王建儲升建安為建寧府宣和元年六月邢州民董世多進狀以英宗嘗為巨鹿郡公又知嶽州孫協進言英宗嘗為嶽州防禦使詔加討論時邢州已升安國軍遂以邢州為信德府嶽州為嶽陽軍是歲十月又詔以列聖潛邸所領地再加討論以真宗嘗為襄王升襄州為襄陽府仁宗嘗為慶國公升慶州為慶陽府英宗嘗為宜州刺史以宜州為慶逺軍神宗嘗為安州觀察使以安州為德安府又嘗為光國公以光州為光山軍哲宗嘗為東平軍節度使以鄆州為東平府嘗為均國公以均州為武當軍徽宗嘗為寧國公以寧州為興寧軍又嘗為平江鎮江軍節度使並升為府又以太宗嘗為睦州防禦使升睦州為遂昌軍今上即位之初升隆興寧國常德諸府皆以潛藩擁麾之地也隋煬帝大業九年詔曰博陵昔為定州地居衝要先皇歷試所基王化斯逺故以道冠豳風義髙姚邑朕巡撫氓庶爰届兹邦瞻望郊壥懷德思止可改博陵為高陽郡赦境內死罪已下給復一年於是召髙祖時故吏皆量才授職此前代升郡故事然以先皇涖任之邦追思舊德有此特詔至宋則但列空銜便加恩數矣玉照新志曰徽宗嘗封遂寧郡王升遂州為遂寧府嘗封蜀國公升蜀州為崇慶府沿至於今無郡不府而狹小之處如滁和澤沁郴靖邛眉之類猶以州名又有𨽻府之州特異其名而親理民事與縣尹無别凡唐宋舊設之州並有附郭縣而州不親民事元初省冗官令州官兼領洪武初并附郭縣八州州浦士衡曰國朝建立府州多踵勝國其最異者則以統縣而省縣八州刺史而下行縣令之事所謂名存實異與宋以前不同者也縣之𨽻於州者則既𢃄府名又𢃄州名而其實未嘗管攝於州惟到任繳憑必由州轉府尚有餼羊之意體統乖而名實殽矣竊以為宜仍唐制凡郡之連城數十者析而二之三之而以州統縣惟京都乃稱府焉豈不畫一而易遵乎鄉亭之職漢書百官表縣令長皆秦官掌治其縣萬户以上為令秩千石至六百石減萬户為長秩五百石至三百石皆有丞尉秩四百石至二百石宋書百官志漢制丞一人尉大縣二人小縣一人是為長吏百石以下有斗食佐史之秩是為少吏武帝紀元光六年詔曰少吏犯禁吏寧成傳為少吏必陵其長大率十里一亭亭有長宋書五家為伍伍長主之二伍為什什長主之十什為里里魁主之十里為亭亭長主之史記建元以來侯者年表張章父為長安亭長失官是亭長亦稱官也十亭一鄉鄉有三老有秩張敞傳注師古曰鄉有秩者嗇夫之類也嗇夫游徼宋書又有鄉佐三老掌教化嗇夫職聼訟收賦稅游徼徼循禁賊盜宋書鄉佐有秩主賦稅三老主教化嗇夫主爭訟游徼主姦非縣大率方百里其民稠則減稀則曠鄉亭亦如之皆秦制也高帝紀二年二月令舉民年五十以上有修行能帥衆為善置以為三老鄉一人擇鄉三老一人為縣三老與縣令丞尉以事相教復勿繇戍三老為鄉官故壺關三老荗得上書言太子雞黃霸傳使郵亭鄉官皆畜豚此其制不始於秦漢也自諸候兼并之始而管仲蒍敖子産之倫所以治其國者莫不皆然管子書曰擇其賢民使為里君而周禮地官自州長以下有黨正族師閭胥比長自縣正以下有鄙師酇長里宰鄰長則三代明王之治亦不越乎此也夫惟於一鄉之中官之備而法之詳然後天下之治若網之在綱有條而不紊至於今日一切蕩然無有存者且守令之不足任也而多設之監司監司之又不足任也而重立之牧伯積尊絫重以居乎其上而下無與分其職者雖得公亷勤幹之吏猶不能以為治而况託之非人者乎後魏太和中給事中李沖上言宜準古五家立一鄰長五鄰立一里長五里立一黨長長取鄉人強謹者鄰長復一夫里長二黨長三所復復征戍餘若民三載無愆則陟用陟之一等孝文從之詔曰鄰里鄉黨之制所由來矣欲使風教易周家至日見以大督小從近及逺如身之使手幹之總條然後口算平均義興訟息史言立法之初多稱不便及事既施行計省昔十有餘倍於是海內安之後周蘇綽作六條詔書曰非直州郡之官皆須善人爰至黨族閭里正長之職皆當審擇各得一鄉之選以相監統隋文帝師心變古開皇十五年始盡罷州郡鄉官而唐栁宗元之言曰有里胥而後有縣大夫有縣大夫而後有諸侯有諸侯而後有方伯連帥有方伯連帥而後有天子由此論之則天下之治始於里胥終於天子其灼然者矣故自古及今小官多者其世盛大官多者其世衰文獻通考言唐之初止有上中下都督府其後則有節度觀察團練諸使宋之初止有轉運使其後則有安撫提刑等官麻唐書代宗紀大厯八年九月癸未晉州男子郇模以辮髮持竹筐葦席哭於東市請獻三十字一字為一事其言練者請罷諸州團練使也其言監者請罷諸道監運使也興亡之塗罔不由此漢時嗇夫之卑猶得以自舉其職故爰延為外黃鄉嗇夫仁化大行民但聞嗇夫不聞郡縣後漢書本傳而朱邑自舒桐鄉嗇夫舒縣之鄉官至大司農病且死屬其子曰我故為桐鄉吏其民愛我必葬我桐鄉後世子孫奉嘗我不如桐鄉民師古曰嘗謂蒸嘗之祭及死其子葬之桐鄉西郭外民共為起冡立祠嵗時祠祭至今不絶漢書循吏傳二君者皆其縣人也必昜地而官易民而治豈其然哉今代縣門之前多有榜曰誣告加三等越訴笞五十此先朝之舊制亦古者懸法象魏之遺意也今人謂不經縣官而上訴司府謂之越訴是不然太祖實録洪武二十七年四月壬午命有司擇民間高年老人公正可任事者理其鄉之詞訟若户婚田宅鬪毆者則㑹里胥決之事涉重者始白於官若不由里老處分而徑訴縣官此之謂越訴也宣德七年正月乙酉陜西按察僉事林時言洪武中天下邑里皆置申明旌善二亭民有善惡則書之以示勸懲凡戶婚田土鬪毆常事里老於此剖決今亭宇多廢善惡不書小事不由里老輒赴上司獄訟之繁皆由於此依景泰四年詔書猶曰民有怠惰不務生理者許里老教民榜例懲治天順八年三月詔軍民之家有為盜賊曽經問斷不改者有司即大書盜賊之家四字於其門能改過者許里老親鄰人相保管方與除之此亦古者畫衣冠異章服之遺意惟其大小之相維詳要之各執然後上不煩而下不擾唐至大厯以後干戈興賦稅煩矣而劉長卿之題霅溪李明府曰落日無王事青山在縣門蓋縣令之職猶不下侵而小民得以安其業是以能延國命百有餘年迄於僖昭而後大壞然則鳴琴戴星有天下者宜有以處之矣洪熙元年七月丙申巡按四川監察御史何文淵言太祖高皇帝令天下州縣設立老人必選年高有德衆所信服者使勸民為善鄉閭爭訟亦使理斷下有益於民事上有助於官司比年所用多非其人或出自𨽻僕規避差科縣官不究年德如何輒令充應使得憑藉官府妄張威福肆虐閭閻或遇上司官按臨巧進讒言變亂黑白挾制官吏比有犯者謹已按問如律竊慮天下州縣類有此等請加禁約上命申明洪武舊制有濫用匪人者并州縣官皆置諸法然自是里老之選輕而權亦替矣英宗實録言松江知府趙豫和易近民凡有詞訟屬老人之公正者剖斷有忿爭不已者則己為之和解故民以老人目之當時稱為良吏弊正統以後里老往往保留令丞朝廷因而許之尤為政見於景泰三年十月庚戌太僕寺少卿黃仕揚所奏漢世之於三老命之以秩頒之以祿而文帝之詔俾之各率其意以道民當日為三老者多忠信老成之士也上之人所以禮之者甚優是以人知自好而賢才亦往往出於其間新城三老董公遮說漢王為義帝發喪而遂以收天下壺關三老茂上書明戾太子之寃史册炳然為萬世所稱道近世之老人則聼役於官而靡事不為故稍知亷恥之人不肯為此而願為之者大抵皆姦猾之徒欲倚勢以陵百姓者也其與太祖設立老人之初意悖矣明初以大户為糧長掌其鄉之賦稅多或至十餘萬石運糧至京得朝見天子洪武中或以人材授官至宣德五年閏十二月南京監察御史李安及江西廬陵吉水二縣耆民六年四月監察御史張政各言糧長之害謂其倍收糧石準折子女包攬詞訟把持官府纍經禁飭而其患少息然未嘗以是而罷糧長也惟老人則名存而實亡矣今州縣或謂之耆民或謂之公正或謂之約長與庶人在官者無異巡檢即古之游徼也元史成宗大德十年正月升巡檢為九品洪武中尤重之而特賜之敕洪武十三年二月丁邜見御製文集第七卷又定為考課之法二十五年閏十二月辛邜及江夏侯周德興巡視福建增置巡檢司四十有五二十年四月自𢎞治以來多行裁革所存不及曩時之半巡檢裁則總督添矣崇禎年至薊州保定各設總督唐自乾元以後節度觀察防禦使之設正與明代纍添總督巡撫兵備相類何者巡檢遏之於未萌總督治之於己亂里甲常熟陳梅曰周禮五家為比比有長五比為閭閭有胥四閭為族族有師五族為黨黨有正五黨為州州有長五州為鄉鄉有大夫其間大小相維輕重相制網舉目張周詳細密無以加矣而要之自上而下所治皆不過五人蓋於詳密之中而得易簡之意此周家一代良法美意也後世人才逺不如古乃欲以縣令一人之身坐理數萬戶口賦稅色目繁猥又倍於昔時雖欲不叢脞其可得乎愚故為之說曰以縣治鄉以鄉治保或謂之都以保治甲視所謂不過五人者而加倍焉亦自詳密亦自易簡此斟酌古今之一端也又曰一鄉幾保不妨多少何也因民居也法用圓十甲千户不得增損何也稽成數也法用方掾屬古文苑注王延夀桐柏廟碑人名謂掾屬皆郡人可考漢世用人之法今考之漢碑皆然不獨此廟蓋其時惟守相命於朝廷而自曹掾以下無非本郡之人故能知一方之人情而為之興利除害其辟用之者即出於守相而不似後代之官一命以上皆由於吏部故廣漢太守陳寵入為大司農和帝問在郡何以為理寵頓首謝曰臣任功曺王渙以簡賢選能主簿鐔顯拾遺補闕臣奉宣詔書而已帝乃大悅至於汝南太守宗資任功曹范滂南陽太守成瑨委功曺岑晊並謡達京師名標史傳而鮑宣為豫州牧郭欽奏其舉錯煩苛代二千石署吏是知署吏乃二千石之職州牧代之尚為煩苛後歸吏部而統之宜乎事煩而日不給隋文帝開皇二年罷辟署令吏部除授品官為州郡佐官其時劉炫對牛𢎞以為往者州惟置綱紀郡置守丞縣置令而已其餘具僚則長官自辟是知自辟掾屬即齊魏之世猶然間宋史選舉志宋初內外小職任長吏得自奏辟熙寧悉罷歸選部然要處職任如沿邊兵官防河捕盜重課額務場之類尋又立專法聼舉於是辟置不能全廢也又其變也銓注之法多立資格而吏治因之大壞矣京房傳房為魏郡太守自請得除用他郡人因此知漢時掾屬無不用本郡人者房之此請乃是破格杜氏通典言漢縣有丞尉及諸曺掾多以本郡人為之三輔縣則兼用他郡黃霸傳補左馮翊二百石卒史如淳曰三輔郡得任用他郡人而卒史獨二百石所謂尤異者也及隋氏革選盡用他郡人唐高宗時魏𤣥同為吏部侍郎上疏言臣聞傅說曰明王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以理人昔之邦國今之州縣土有常君人有定主自求臣佐各選英賢其大臣乃命於王朝耳秦并天下罷侯置守漢氏因之有沿有革諸侯得自置吏四百石已下其傅相大官則漢為置之州郡掾史督郵從事悉任之於牧守爰自魏晉始歸吏部遞相祖襲以迄於今用刀筆以量才按簿書而察行法令之弊其來已久蓋君子重因循而憚改作有不得已者亦當運獨見之明定卓然之議如今選司所行者非上皇之令典乃近代之權道所宜遷革實為至要何以言之夫丈尺之量所及者蓋短鍾庾之器所積者寧多况天下之大士人之衆而可委之數人之手乎假使平如權衡明如水鏡力有所極照有所窮銓綜既多紊失斯廣又以比居此任時有非人豈直愧彼清通亦將竭其庸妄情故既行何所不至贓私一起以及萬端至乃為人擇官為身擇利顧親疏而舉筆看勢要而措情加以厚貌深衷險如溪壑擇言觀行猶懼不周今能百行九能析之於一面具僚庶品專斷於一司其亦難矣天祚大聖比屋可封咸以為有道恥賤得時無怠諸色入流嵗以千計羣司列位無復增多官有常員人無定限選集之始霧積雲屯擢敘於終十不收一淄澠雜混玉石難分用舍去留得失相半撫即事之為弊知及後之滋失夏殷以前制度多闕周監二代煥乎可觀諸侯之臣不皆命於天子王朝庶官亦不專於一職故穆王以伯冏為太僕正命之曰愼簡乃僚無以巧言令色便辟側媚其惟吉士此則令其自擇下吏之文也太僕正中大夫耳尚以僚屬委之則三公九卿亦必然矣周禮太宰內史並掌爵祿廢置司徒司馬别掌興賢詔事當是分任於羣司而統之以數職各自求其小者而王命其大者焉夫委任責成君之體也所委者當則所用者精裴子野有言曰官人之難先王言之尚矣居家視其孝㕛鄉黨服其誠信出入觀其志義憂歡取其智謀煩之以事以觀其能臨之以利以觀其亷周禮始於學校論之州里告諸六事而後貢之王庭其在漢家尚猶然矣州郡積其功能然後為五府所辟五府舉其掾屬而升於朝三公參得除署尚書奏之天子一人之身所關者衆一士之進其謀也詳故官得其人鮮有敗事魏晉反是所失𢎞多子野所論蓋區區之宋朝耳猶謂不勝其弊而况於當今乎臣竊見制書每令三品五品薦士下至九品亦令舉人此聖朝側席旁求之意也而褒貶未明莫愼所舉且惟賢知賢聖人篤論身且濫進鑒豈知人今欲務得實才兼宜擇其舉主流清以源潔影端由表正不詳舉主之行能而責舉人之庸濫不可得已漢書云張耳陳餘之賔客厮役皆天下俊傑彼之蕞爾猶能若斯況以神皇之聖明國家之德業而不建久長之䇿為無窮之基盡得賢取士之術而但顧望魏晉之遺風留意周隋之敝事臣竊惑之伏願稍回聖慮特采芻言略依周漢之規以分吏部之選即望所用精詳鮮於差失疏奏不納𤣥宗時張九齡為左拾遺上言夫吏部尚書侍郎以賢而授者也雖知人之難豈不能拔十得五今膠以格條據資配職無得賢之實若刺史縣令必得其人於管內嵗當選者使考才行可入流品然後送臺又加擇焉以所用多寡為州縣􅢜最則州縣愼所舉可官之才多吏部因其成無今日之繁矣栁渾傳德宗嘗親擇吏宰畿邑有效召宰相語皆賀帝得人渾獨不賀曰此特京兆尹職耳陛下當擇臣輩以輔聖德臣當選京兆尹承大化尹當求令長聼細事代尹擇令非陛下所宜帝然之都令史通典晉有尚書都令史八人秩二百石與左右丞總知都臺事宋齊八人梁五人謂之五都令史舊用人常輕後漢百官志尚書令史十八人二百石然梁冀傳曰學生桂陽劉常當世名儒冀召補令史以辱之則知此職非士流之所為也武帝詔曰尚書五都職參政要非但總理衆局亦乃方軌二丞頃雖求才未臻妙簡可革用士流以盡時彥乃以都令史視奉朝請其重之如此彼其所謂都令史者猶為二百石之秩而間用士流為之然南齊陸慧曉為吏部郎吏部都令史歷政以來咨執選事慧曉任巳獨行未嘗與語帝遣人語慧曉曰都令史諳悉舊貫可共參懷慧曉曰六十之年不復能咨都令史為吏部郎也故當日之為吏部者多克舉用人之職自隋以來令史之任文案煩屑漸為卑冗不參官品金史皇統八年用進士為尚書省令史正隆二年罷世宗紀大定二年二月甲寅復用進士為尚書省令史二十三年閏月戊午上謂宰臣曰女直進士可依漢兒進士補省令史夫儒者操行清潔非禮不行以吏出身者自幼為吏習其貪墨至於為官性不能改政道興廢實由於此章宗紀明昌二年五月戊辰詔御史臺令史並以終場舉人充李完傳言尚書省令史正隆間用雜流大定初以太師張浩奏請始統取進士天下以為當今乞以三品官子孫及終場舉人委臺官辟用上納其言選舉志言終金之代科目得人為盛諸宫護衛及省臺部驛史令史通事仕進皆列於正班斯則唐宋以來之所無者豈非因時制宜而以漢法為依据者乎以令史官至宰執者伊喇道魏子平孟浩梁肅張萬公紐赫伊特格勒董師中王蔚馬惠迪馬謀楊伯通賈鉉孫鐸孫即康賈益謙皆有傳至於明季則品彌卑權彌重八柄詔王乃不在官而在吏矣舊唐書許子儒居選部不以藻鑑為意有令史緱直新舊書並作句直句音勾是宋人減筆字今據册府元龜正之是其腹心每注官多委令下筆子儒但髙枕而卧語緱直云平配由是補授失序傳為口實嗟乎未若後世之以緱直為當官以平配為著令也胥史之權所以日重而不可拔者任法之弊使之然也開誠布公以任大臣疏節闊目以理庶事則文法省而徑竇清人材庸而狐鼠退矣吏胥天子之所恃以平治天下者百官也故曰臣作朕股肱耳目又曰天工人其代之如奪百官之權而一切歸之吏胥是所謂百官者虛名而柄國者吏胥而已郭隗之告燕昭王曰亡國與役處吁其可懼乎秦以任刀筆之吏而亡天下此固巳事之明驗也唐鄭餘慶為相有主書滑渙久司中書簿籍與內官典樞密劉光琦相倚為姦每宰相議事與光琦異同者令渙往請必得四方書幣資貨充集其門弟泳官至刺史及餘慶再入中書與同僚集議渙指陳是非餘慶怒叱之未幾罷為太子賔客其年八月渙贓汚發賜死憲宗聞餘慶叱渙事甚重之久之復拜尚書左僕射唐書本傳韋處厚為相有湯銖者為中書小胥其所掌謂之孔目房宰相遇休暇有內狀出即召銖至延英門付之送知印宰相由是稍以機權自張廣納財賄處厚惡之謂曰此是半裝滑渙矣乃以事逐之册府元龜夫身為大臣而有甘臨之憂係遁之疾則今之君子有愧於唐賢多矣謝肇浙曰從來仕宦法罔之密無如今日者上自宰輔下至驛遞倉巡莫不以虛文相酬應而京官猶可外吏則愈甚矣大抵官不留意政事一切付之胥曺而胥曺之所奉行者不過已往之舊牘歷年之成規不敢分毫踰越而上之人既以是責下則下之人亦不得不以故事虛文應之一有不應則上之胥曺乂乘隙而繩以法矣故郡縣之吏宵旦竭蹶惟日不足而吏治卒以不振者職此之由也又曰國朝立法太嚴如户部官不許蘇松浙江人為之以其地多賦稅恐飛詭為姦也然弊孔蠹竇皆由吏胥堂司官遷轉不常何知之有今户部十三司胥算皆紹興人可謂目察秋毫而不見其睫者矣法制法制禁令王者之所不廢而非所以為治也其本在正人心厚風俗而已故曰居敬而行簡以臨其民周公作立政之書曰文王罔攸兼于庶言庶獄庶愼又曰庶獄庶愼文王罔敢知于茲其丁寧後人之意可謂至矣秦始皇之治天下之事無大小皆決於上上至於衡石量書日夜有呈不中呈不得休息而秦遂以亡太史公曰昔天下之網嘗密矣然奸僞萌起其極也上下相遁至於不振然則法禁之多乃所以為趣亡之具而愚暗之君猶以為未至也杜子美詩曰舜舉十六相身尊道何髙秦時任商鞅法令如牛毛又曰君看燈燭張轉使飛蛾密其切中近朝之事乎漢文帝詔置三老孝弟力田常員令各率其意以道民焉夫三老之卑而使之得率其意此文景之治所以至於移風易俗黎民醇厚而上擬於成康之盛也諸葛孔明開誠心布公道而上下之交人無間言以蕞爾之蜀猶得小康魏操吳權任法術以御其臣而篡逆相仍略無寧嵗天下之事固非法之所能防也叔向與子産書曰國將亡必多制夫法制繁則巧猾之徒皆得以法為市而雖有賢者不能自用此國事之所以日非也善乎杜元凱之解左氏也曰法行則人從法法敗則法從人宣公十二年傳解前人立法之初不能詳究事勢豫為變通之地後人承其已弊拘於舊章不能更革而復立一法以救之於是法愈繁而弊愈多天下之事日至於叢脞其究也眊而不行語出漢書董仲舒傳師古曰眊不明也上下相䝉以為無失祖制而已此莫甚於有明之世如勾軍行鈔二事立法以救法而終不善者也宋葉適言國家因唐五代之極弊收斂藩鎮之權盡歸於上一兵之籍一財之源一地之守皆人主自為之也欲專大利而無受其大害遂廢人而用法廢官而用吏禁防纎悉特與古異而威柄最為不分雖然豈有是哉故人才衰乏外削中弱以天下之大而畏人是一代之法度又有以使之矣又曰今內外上下一事之小一罪之微皆先有法以待之極一世之人志慮之所周浹忽得一智自以為甚竒而法固巳備之矣是法之密也然而人之才不獲盡人之志不獲伸昏然俯首一聼於法度而事功日墮風俗日壞貧民愈無告奸人愈得志此上下之所同患而臣不敢誣也又曰萬里之逺嚬呻動息上皆知之雖然無所寄任天下泛泛焉而已百年之憂一朝之患皆上所獨當而羣臣不與也夫萬里之逺皆上所制命則上誠利矣百年之憂一朝之患皆上所獨當而其害如之何此外冦所以憑陵而莫禦讎恥所以最甚而莫報也陳亮上孝宗書曰五代之際兵財之柄倒持於下藝祖皇帝束之於上以定禍亂後世不原其意束之不已故郡縣空虛而本末俱弱洪武六年九月丁未命有司庶務更月報為季報以季報之數類為嵗報凡府州縣輕重獄囚即依律斷決不須轉發果有違枉從御史按察司糾劾令出天下便之省官光武中興海內人民可得而數裁十二三鄣塞破壞亭燧絶滅或空置太守令長招還流民帝笑曰今邊無人而設長吏治之如春秋素王矣以故省并郡國及官僚屢見於史而總之曰兵革即息天下少事文書調役務從簡寡至乃十存一焉以此知省官之故緣於少事今也文書日以繁獄訟日以多而為之上者主於裁省則天下之事必將叢脞而不勝不勝之極必復增官而事不可為矣晉荀朂之論以為省官不如省事省事不如清心昔蕭曺相漢載其清靜民以寧一所謂清心也抑浮說簡文案略細苛宥小失有好變常以徼利者必行其誅所謂省事也此探本之言為治者識此可無紛紛於職官多寡之間矣選補漢宣帝時盜賊並起徴張敞拜膠東相請吏追捕有功效者得一切比三輔尤異如淳曰一切權時也趙廣漢奏請令長安游徼獄吏秩百石又循吏傳左馮翊有二百石卒史此之謂尤異也天子許之上名尚書調補縣令者數十人是漢時縣令多取郡吏之尤異者是以習其事而無不勝之患後乃一以畀之初釋褐之書生其通曉吏事者十不一二而耎弱無能者且居其八九矣又不擇其人之材而以探籌投鉤為選用之法是以百里之命付之闒茸不材之人既以害民而卒至於自害於是煩劇之區遂為官人之陷穽而年年更代其弊益深而不可振矣然漢時之吏多通經術故張敞得而舉之宣帝得而用之至明季儒非儒吏非吏則吾又不識用之何從也于慎行筆麈言太宰富平孫公丕揚患中人請託難於從違大選外官立為掣籖之法一時宫中相傳以為至公下逮閭巷翕然稱誦而不知其非體也古人見除吏條格却而不視以為一吏足矣奈何衡鑑之地自處於一吏之職而無所秉成亦已陋矣至於人才長短各有所宜資格高下各有所便地方繁簡各有所合道里逺近各有所準乃一付之於籖是掩鏡可以索照而折衡可以坐揣也南人選南北人選北此昔年舊例宋政和六年詔知縣注選雖甚逺無過三十驛三十驛者九百里也今之選人動涉數千里風土不諳語音不曉而赴任寧家之費復不可量是率天下而路也欲除銓政之弊豈必如此而後為至公邪夫人主茍能開誠布公則自大臣以下至於京朝官無不可信之人而銓選之處有不必在京師者唐貞觀元年京師榖貴始分人於雒州置選至開耀元年以關外道里迢遞河雒之邑天下之中始詔東西二曺兩都分簡留放既畢同赴京師謂之東選是東都一掌選也黔中嶺南閩中官不由吏部委都督選擇土人補授上元高宗三年八月壬寅敕自今每年遣五品已上彊明清正官充南選使仍令御史同往注擬杜子美有送魏同直充嶺南掌選崔郎中判官詩曰選曺分五嶺使者歷三湘儒學傳仲子陵蜀人典黔中選補乘傳過家西人以為榮大厯十四年十二月己亥詔專委南選使停遣御史是黔中嶺南閩下各一掌選也新書張九齡為桂州都督兼嶺南按察選補使而九齡又即嶺南之人李峴傳曰代宗即位徴峴為荆南節度江陵尹知江淮選補使又曰罷相為吏部尚書知江淮選舉置銓於洪州劉滋傳曰興元元年改吏部侍郎往洪州知選事時京師冦盜之後天下旱蝗榖價翔貴選人不能赴調乃命滋江南典選以便江嶺之人是江南又一掌選也宋神宗詔川陜福建廣南八路之官罷任迎送勞苦令轉運司立格就注免其赴選是亦參用唐人之法建炎南渡始詔福建二廣闕並歸吏部唯四川仍舊今之議者必曰如此多請託之門而啓受賕之徑豈唐人盡清亷而今人皆貪濁邪夫子之告仲弓曰舉爾所知今之取士禮部以糊名取之是舉其所不知也吏部以掣籖注之是用其所不知也是使其臣拙於知人而巧於避事及乎赴任之後人與地不相宜則吏治墮吏治墮則百姓畔百姓畔則干戈興於是乎軍前除吏而并其所為尺寸之法亦不能守豈若廓然大公使人得舉其所知而明試以功責其成效於服官之日乎唐太宗謂侍臣曰刺史朕當自選縣令宜詔五品已上各舉一人𤣥宋開元九年敕京官五品已上外官刺史四府上佐各舉縣令一人視其政善惡為舉者賞罰有明正統元年十一月乙邜敕在京三品以上官各舉亷潔公正明達事體堪任御史者一人在京四品官及國子監翰林院堂上官各部郎中員外郎六科掌科給事中各道掌道御史各舉亷慎明敏寬厚愛民堪任知縣者一人吏部更加詳察而擢用之夫欲救後來之弊必如此而後賢才可得政理可興也自南北互選之後赴任之人動數千里必須舉債方得到官而風土不諳語言難曉政權所寄多在猾胥昔唐之季世嘗暫一行之於嶺南矣文宗開成五年十一月嶺南節度使盧鈞奏伏以海嶠擇吏與江淮不同若非諳熟土風即難搜求人瘼且嶺中往日之弊是南選今時之弊是北資臣當管二十二州惟韶廣二州官僚每年吏部選授若非下司貧弱令史即是逺處無能之流比及到官皆有積債十中無一肯識亷恥臣到任四年備知情狀其潮州官吏伏望特循往例不令吏部注擬且委本道求才若攝官亷慎有聞依前許觀察使奏正事堪經久法可施行敕旨依奏册府元龜桂唐書韓佽元和中為管觀察使部二十餘州自參軍至縣令無慮三百員吏部所補才十一餘皆觀察使商才補職歐陽詹泉州晉江人其先皆為本州州佐縣令閩越地肥衍有山泉禽魚雖能通文書吏事不肯北宦此固昔人以為敝法而改絃者矣掣籖之法未行選司猶得意為注闕雖多有為人擇地亦尚能為地擇人自新法既行並以聼之不可知之數而繁劇之區有纍任不得賢令相繼禠斥者夫君子之道在乎至公存一避嫌之心遂至以人牧為嘗試昔唐皎為吏部侍郎當引入銓或云其家在蜀乃注與吳復有言親老先任江南即唱之隴右史書以為譏笑以此用人豈能致太平之理哉實録言洪武四年正月壬辰河南府知府徐麟以母老居蘄之廣濟請終飬詔改麟為蘄州府知府俾就養其母聖主之興坦懷待物其所以勸羣臣者至矣萬厯末常熟顧大韶作竹籖傳其文倣毛頴傳為之謂籖對主上言上而庶吉士科道之選下而鄉㑹試取士一皆用臣臣乃得展其材此憤世滑稽之言然以之曉人可謂罕譬而喻矣夫楚王之厭紐盆子之探符古之人用以立帝立王而今日厪厪施之選人乎唐時所謂銓者有留有放唐書選舉志凡取人之法有四一曰身體貌豐偉二曰言言辭辨正三曰書楷法遒美四曰判文理優長四事皆可取則先德行德均以才才均以勞得者為留不得者為放總章二年司列少常伯裴行儉始設長名榜宋白曰長名榜定留放留者入選放者不得入選長安志曰尚書省之南别有吏部選院謂之吏部南院選人引集之所其榜列於院外楊國忠傳故事歲揭版南院為選式是也已定注則過門下侍中給事中按閲有不可黜之故放者多而留者少景雲中以宋璟為吏部尚書李乂盧從願為侍郎皆不畏强禦請謁路絶集者萬餘人留者三銓不過二千人服其公宋時此法猶存孝宗乾道元年五月乙亥詔未銓試人毋得堂除未有若前明之一登科而受祿如持券者也停年格世之言停年格者皆言起於後魏崔亮今讀亮本傳而知其亦有不得已也傳曰遷吏部尚書時羽林新害張彛之後靈太后令武官得依資入選官員既少應選者多前尚書李韶循常擢人衆情嗟怨亮乃奏為格制不問賢愚專以停解日月為斷雖復官須此人停日後者終於不得庸才下品年月久者則先擢用沈滯者皆稱其能亮外甥司空咨議劉景安以書規亮曰殷周以鄉孰貢士兩漢由州郡薦才魏晉因循又置中正諦觀在昔莫不審舉雖未盡美定應十收六七而朝廷貢秀才止用其文不取其理察孝亷惟論章句不及治道立中正惟辨氏族不考人才至於取士之途不博沙汰之理未精而舅屬當銓衡宜改張易調如之何反為停年格以限之天下之士誰復修厲名行哉亮答書曰汝所言乃有深致吾乘時徼幸得為吏部尚書常思同升舉直以報明主之恩乃其本願昨為此格有由而然今已為汝所怪千載之後誰知我哉古今不同時宜須異何者昔有中正品其才第上之尚書尚書據狀量人授職此乃與天下羣賢共爵人也吾謂當爾之時無遺才無濫舉矣而汝猶云十收六七况天下之選專歸尚書以一人之鑑照察天下劉毅所云一吏部兩郎中而欲究竟人物何異以管窺天而求其博哉今勳人甚多又羽林入選武夫崛起不解書計惟可彍弩前驅指蹤捕噬而已忽令垂組乘軒責以治效是所謂未曽操刀而使專割又武人至多官員至少設令千人共一官猶無官可授況一人望一官何由不怨哉吾近面執不宜使武人入選請賜其爵厚其祿既不見從是以權立此格限以停年耳昔子産鑄刑書以救敝叔向譏之以正法何異汝以古禮難權宜哉仲尼有言知我者春秋罪我者亦春秋吾之此指其猶是也但令將來君子知吾意焉後甄琛元修義城陽王徽相繼為吏部尚書利其便已踵而行之自是賢愚同貫涇渭無别魏之失才自亮始也辛琡為吏部尚書上言黎元之命繫於長吏若使惟取年勞不簡賢否義均行雁次若貫魚執簿呼名一吏足矣數人而用何謂銓衡書奏不報然觀其答書之指考其時事由羽林之變既姑息於前武人之除復濫開於後不得已而為此例設也上無陵壓之勳人下無譟呼之叛黨何疑何憚而不復前王之制乃以停年為斷乎魏書辛雄傳上疏言自神龜末來專以停年為選士無善惡嵗久先叙職無劇易名到授官執案之吏以差次日月為功能銓衡之人以簡用老舊為平直且庸劣之人莫不貪鄙委斗筲以共治之重託碩鼠以百里之命皆貨賄是求肆心縱意禁制雖煩不勝其欲致令徭役不均發調違謬箕斂盈門囚執滿道二聖明詔寢而不遵畫一之法懸而不用自此中外之民相將為亂蓋由官授不得其人百姓不堪其命故也嗚呼此魏之所以未久而亡也歟北齊書文襄帝紀攝吏部尚書魏自崔亮以後選人常以年勞為制文襄乃釐改前式銓擢惟在得人又沙汰尚書郎妙選人地以充之至於才名之士咸被薦擢通典唐自高宗麟德以後承平既久人康俗阜求進者衆選人漸多總章二年裴行儉為司列少常伯始設長名姓歷榜引銓注之法又定州縣官資高下升降以為故事其後莫能革焉至𤣥宗開元十八年行儉子光庭為侍中兼吏部尚書先是選司注官惟視其人之能否或不次超遷或老於下位有出身二十餘年不得祿者又州縣亦無等級或自大入小或初近後逺皆無定制光庭始奏用循資格新唐書本傳初吏部求人不以資考為限所奬拔惟其才往往得俊乂任之士亦自奮其後士人猥衆專務趨競銓品枉撓光庭懲之因行儉長名榜乃為循資格凡官罷滿以若干選而集各有差等官高者選少卑者選多無問能否選滿則注限年躡級不得踰越非負譴者皆有升無降庸愚沈滯者皆喜謂之聖書雖小有常規而掄才之方失矣其有異才高行聼擢不次然有其制而無其事有司但守文奉式循資例而已自宋以下年資之制大抵皆本於光庭也宋孫洙資格論曰三代以下選舉之法其始終一切皆失者其國家資格之制乎今賢材之伏於下者資格閡之也職業之廢於官者資格牽之也士之寡亷鮮恥者爭於資格也民之困於虐政暴吏資格之人衆也萬事之所以抏弊百吏之所以廢弛法制之所以頽爛決潰而不之救者皆資格之失也惟天之生大賢大德也非以私厚其人將使之輔生民之治者也惟人之有大材大智者非以獨樂其身將以振生民之窮者也今小人纍日而取貴仕君子側身而困卑位賢者戴不肖於上而愚者役智者於下爵不考德祿不授能故曰賢材之伏於下者資格閡之也才足以堪其任小拘嵗月而防之矣力不足以稱其位增纍考級而得之矣所得非所求也所求非所任也位不度才功不索實故曰職業之廢於官者資格牽之也今夫計嵗閥而爭年勞者日夜相鬪也有司躐一名差一級則攝衣而羣爭訴矣其甚者或懷黃敕而置於丞相之前也其行義去市賈者亡幾耳故曰士之寡亷鮮恥者爭於資格也來而暴一邑既嵗滿矣又去而虐一州也非以贓敗至死不黜虎吏劘牙而食於民賢者欎死於巖穴而赤子不得愛其父母也故曰民之困於虐政暴吏者資格之人衆也夫資格之法起於後魏崔亮而復行之於唐之裴光庭是二子者其當世固巳罪之不待後人之譏矣然而行之前世不過數十年者也後得稱職者矯而更之故其患不大今資格之弊流漫根結踵為常法方且世世而遵行之矣往者不知非來者不知矯故曰萬事抏弊百吏廢弛法制頽爛決潰而不之救也雖然不無小利也小便也利之者蠢愚而廢滯者也便之者耋老而庸昏者也而於天下國家焉則大失也大害也然而提選部者亦以是法為簡而易守也百品千羣不復銓敘人物而綜核功實一吏在前勘簿呼名而授之矣坐廟堂者亦以是法為要而易行也大官大職列籍按氏差第日月遝然而登之矣上下相冒而賢材去愈逺可為太息也為今之急誠宜大蠲弊法簡拔異能爵以功為先後用以才為序次無以積勤纍勞者為高敘無以深資久考者為優選智愚以别善否陳前而萬事不治庶功不熙者臣愚未嘗聞也金章宗謂宰臣曰今之用人太拘資歷循資之法起於唐代如此何以得人平章政事張汝霖對曰不拘資格所以待非常之材上曰崔祐甫為相未踰年薦八百人豈皆非常之材與銓選之害宋葉適論銓選之害曰夫甄别有序黜陟不失者朝庭之要務也故自一命以上皆欲用天下之所賢者而不以便其不肖者之人竊怪人主之立法常為不肖者之地而消靡其賢才以俱入於不肖而已而其官最要其害最甚者銓選也吏部者朝廷喉舌之處也尚書侍郎者天子貴近之臣也處之以其地任之以其官與之以甄别黜陟天下士大夫之柄而乃立法以付之曰吾一毫不信汝也汝一毫不自信也其人之賢否其事之罪功其地之逺近其資之先後其祿之厚薄其闕之多少則曰是一切有法矣天下法度之至詳曲折詰難之至多士大夫不能一舉措手足者顧無甚於銓選之法也嗚呼與人以官賦人以祿生民之命致治之本由此而出矣奈何舉天下之大柄而自束縛蔽蒙之乃為天下大弊之源乎雖然是幾百年於是矣其相承者非一人之故學士大夫勤身苦力誦說孔孟傳道先王未嘗不知所謂治道者非若今日之法度也及其一旦之為是官噤舌拱手四顧吏胥以問其所當知之法令吏胥上下其手以視之其人亦抗然自辨曰吾有司也固當守此法而已嗟夫豈其人之本若是陋哉陛下有是名器為鼓舞羣動之具與奪進退以叙天下何忍襲數百年之弊端汨沒於區區壞爛之法以消靡天下之人才而甘心以便其不肖如此則治道安從出而治功安從見哉況自唐中世以前吏部用人之意猶有可考今之所循者乃其衰亂之餘弊耳百王之常道不容於陛下而不復也楊萬里作選法論其上篇曰臣聞選法之弊在於信吏而不信官信吏而不信官故吏部之權不在官而在吏三尺之法適足以為吏取富之源而不足以為朝廷為官擇人之具所謂尚書侍郎二官者據案執筆閉目以書紙尾而已且夫吏之犯法者必治而受賕者必不赦朝廷之意豈真信吏而不信官者邪非朝廷之意也法也意則信官也法則未嘗信官也朝廷亦不自信也天子不自信則法之可否孰決之決之吏而已矣夫朝廷之立法本以防吏之為姦而其用法也則取於吏而為決則是吏之言勝於法而朝廷之權輕於吏也其言至於勝法而其權至重於朝廷則吏部長二安得而不吏之奉哉長二非曰奉吏也曰吾奉法也然而法不決之於官而決於吏非奉吏而何夫是之為信吏而不信官今有一事於此法曰如是可如是而不可士大夫之有求於吏部有持牒而請曰我應夫法之所可行而吏部之長二亦曰可宜其為可無疑也退而吏出寸紙以告之曰不可既曰不可矣宜其為不可無改也未幾而又出寸紙以告之曰可且夫可不可者有一定之法而用可不可之法者無一定之論何為其然也吏也士大夫之始至也恃法之所可亦恃吏部長二之賢而不謁之吏故與長二面可之退而問之吏吏曰法不可也長二無以語則亦曰然士大夫於是不決之法不請之長二而以市於吏吏曰可也而勿亟也伺長二之遺忘而畫取其諾昨奪而今與朝然而夕不然長二不知也朝廷不訶也吏部之權不歸之吏而誰歸夫其所以至此其始也有端其積也有漸而其成也植根甚固而不可動搖矣然則曷為端其病在於忽大體謹小法而已矣吏者從其所謹者而中之并與其所忽者而竊之此其為不可破也且朝廷何不思之曰吾之銓選果止於謹小法而已則一吏執筆而有餘也又焉用擇天下之賢者以為尚書侍郎也哉則吾之所以任尚書侍郎者殆不止於謹小法而已是故莫若略小法而責大體使知小法之有所可否初無繫於大體之利害則吏部長二得以出意而自決之要以不失夫銓選之大體而不害夫立法之大意而已責大體而略小法則不決於吏而吏之權漸輕吏權漸輕然後長二之賢者得以有為而選法可以漸革也其下篇曰臣聞吏部之權不異於宰相亦不異於一吏夫宰相之與一吏不待智者而知其懸絶也既曰吏部之權不異於宰相又曰亦不異於一吏者何也今夫進退朝廷之百官賢者得以用而不肖者得以黜此宰相之權也注擬州縣之百官下至於簿尉而上至於守二此吏部之權也朝廷之百官自大科異等與夫進士甲科之首者未有不由於吏部也未有不由於吏部而官者今日之簿尉未必非他日之宰相而況今日宰相之所進退者臺閣之所布列者皆前日之升階揖侍郎者也故曰吏部之權不異於宰相雖然吏部之所謂注擬何也始入官者則得簿尉自簿尉來者則得令丞推而上之至於幕職由是法也又上之至於守二由是法也其宜得者則曰應格其不宜得者則曰不應格曰應格矣雖貪者疲愞者老耋者乳臭者愚無知者庸無能者皆得之得者不之愧與者不之難也曰不應格矣雖真賢實能亷潔守志之士皆不得也不得者莫之怨不與者莫之恤也吏部者曰彼不愧不怨吾事畢矣如募焉書其役之高下而甲乙之按其役之逺近而勞逸之呼一吏而閲之簿盡矣此縣令之以止小民之爭也吏部注擬百官而寄之以天下之民命乃亦止於止爭而已矣故曰亦不異於一吏今吏部亦有所謂銓量者矣揖之使書以觀其能書乎否也召醫而視之以探其有疾與否也贊之使拜以試其視聼之明暗筋力之老壯也曰銓量者如是而已矣而賢不肖愚智何别焉昔晉用山濤為吏部尚書而中外品員多所啓拔宋以蔡廓為吏部尚書廓先使人告宰相徐羡之曰若得行吏部之職則拜不然則否羡之答云黃散以下皆委廓猶以為失職遂不拜蓋古之吏部雖黃門散騎皆由吏部之較選是當時之為吏部者豈亦止取若今所謂應格者而為黃散哉抑將止取今所謂銓量者而為黃散邪宋史蘇紳傳上言古者自黃散而下及隋之六品唐之五品皆吏部得專去留今審官院流內銓則古之吏部三班院古之兵部不問官職之閒劇才能之長短惟以資厯深淺為先後有司但主簿籍而已欲賢不肖有别不可得也臣願朝廷稍增重尚書之權使之得以察百官之能否而與奪之如丞簿以下官小而任輕者固未能人人而察之也至於縣宰之寄以百里之民者守二之寄以一郡之民者豈不重哉且天下幾州一州幾縣一嵗之中居者待者之外到部而注擬縣宰者幾人守二又幾人則亦不過三數百而已以一嵗三數百之守二縣宰而散之於三百六旬之日月則一日之注擬者絶多補寡亦無幾爾一嵗之間而不能察三數百人之能否則其為尚書者亦偶人而已矣月計之而不粗嵗計之而不精則其州縣之得人豈不十而五六哉雖不五六豈不十而三四哉以此較彼不猶愈乎或曰尚書之權重則將得以行其私奈何是不然昔陸贄請令臺省長官各舉其屬而德宗疑諸司所舉皆有情故或受賂者贄諌之曰陛下擇相亦不出臺省長官之中豈有為長官則不能舉一二屬吏居宰相則可擇千百其僚其要在於精擇長吏贄之說盡矣今朝廷百官孰非宰相進擬者而不疑也至於吏部長二之注擬而獨疑其私乎精擇尚書而假之以與奪之權使得精擇守二縣宰而無專拘之以文法庶乎天下不才之吏可以汰而天下之治猶可以復起也與紹興三十二年吏部侍郎凌景夏言國家設銓選以聼羣吏之治其掌於七司著在令甲所守者法也今升降於胥吏之手有所謂例焉長二有遷改郎曺有替移來者不可復知去者不能盡告索例而不獲雖有強明健敏之才不復致議引例而不當雖有至公盡理之事不復可伸貨賂公行姦弊滋甚嘗觀漢之公府有辭訟比尚書有決事比比之為言猶今之例今吏部七司宜置例册凡經申請或堂白或取㫖者每一事已命郎官以次擬定而長二書之於册永以為例每半嵗上於尚書省仍關御史臺如此則巧吏無所施而銓敘平允矣淳熙元年參知政事龔茂良言法者公天下而為之者也例者因人而立以壞天下之公者也昔之患在於用例破法今之患在於因例立法自例行而法廢矣故諺稱吏部為例部是則銓政之害在宋時即已患之而今日尤甚所以然者法可知而例不可知吏胥得操其兩可之權以市於下世世相傳而雖以朝廷之力不能拔而去之甚哉例之為害也又豈獨吏部然哉古無例字只作列禮記間傳罪多而刑五喪多而服五上附下附列也注列等比也釋文徐邈音例即後人例字至漢書何武傳曰欲除吏先為科例以防請託杜欽傳曰不為陛下廣持平例王莽傳曰太傅平晏從吏過例始加人作例寇萊公為相章聖嘗語兩府欲擇一人為馬步軍指揮使公方議其事吏有以文籍進者公問何書對曰例簿也公曰朝廷欲用一衙官尚須檢例邪安用我輩壞國政者正由此爾司馬溫公與呂惠卿論新法於上前溫公曰三司使掌天下財不才而黜之可也不可使兩府侵其事今為制置三司條例司何也宰相以道佐人主安用例茍用例則胥史足矣今為看詳中書條例司何也惠卿不能對員缺員缺之名自晉時已有之晉書王藴傳遷尚書吏部郎每一官缺求者十輩世說注引山濤啓事曰吏部郎史曜出缺處當選魏書元修義傳遷吏部尚書時上黨郡缺中散大夫高居求之至唐趙憬審官六議遂有人少闕缺字同多人多闕少之語而崔湜以中書侍郎知吏部選事至逆用三年員闕令狐咺在吏部楊炎為侍郎至分闕以惡闕與炎其名相傳至今不改矣舊唐書德宗紀御史大夫崔從奏兵戎未息仕進頗多比來每至選集不免據闕留人嘗歎遺才仍招怨望此亦似今之截留候選也大唐新語劉思立為考功員外子憲為河南尉思立今日亡明日選人有索憲闕者載深咨嗟以為名教所不容乃書其無行注名籍其人比出選門為衆目所視衆口所訾亦趦趄而失步矣朝廷咸謂載能振理風俗自今言之不過索一丁憂之闕亦何至見擯於清議邪不知由是心推之則有其親未死而設為機阱以謀奪其處亦人情之所必至者矣孟子曰人能充無欲害人之心而仁不可勝用也人能充無穿窬之心而義不可勝用也茍反是而充之其亦何所不至邪願後之持銓衡者常以正風俗為心則國家必有得人之慶矣日知録卷八
