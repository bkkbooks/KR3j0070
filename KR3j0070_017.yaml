body:
  text: 日知録卷十七崑山顧炎武撰生員額數生員猶曰官員有定額謂之員唐書儒學傳國學始置生七十二員取三品以上子弟若孫為之太學百四十員取五品以上四門學百三十員取七品以上郡縣三等上郡學置生六十員中下以十為差上縣學置生四十員中下亦以十為差此生員之名所始而明制亦略倣之明初諸生無不廩食於學會典言洪武初令在京府學六十人在外府學四十人州學三十人縣學二十人日給廩膳聽於民間選補仍免其差徭二丁正統六年閏十一月乙未以直𨽻保安州臨邊民少減儒學訓導一員生員併為兩齋嵗貢依縣學例其後以多才之地許令增廣亦不過三人五人而已踵而漸多於是宣德元年定為之額如廩生之數其後又有軍民子弟俊秀待補增廣之名大明會典正統十二年奏準常額之外軍民子弟願入學者提調教官考選俊秀待補增廣員缺一體考送應試之按實録此從鳳陽府知府楊瓚之言先是廩增額外生止謂之入學寄名此則準其待缺補充增廣生矣久之乃號曰附學無常額而學校自此濫矣異時每學生員不過數十人故考試易精程課易密而洪武二十四年七月庚子詔歲貢生員不中其廩食五年者罰為吏不及五年者遣還讀書次年復不中者雖未及五年亦罰為吏二十七年十月庚辰詔生員食廩十年學無成效者罰為吏成化初禮部奏準革去附學生員四年五月庚申旨下已而不果行成化元年大藤峽用兵始令兩廣考試不中生員廩膳納米五十石增廣納米三十石免其充吏放回寧家其年保定等府水災復依此例廪膳納米六十石增廣四十石以後餉軍賑飢率依此例至五年二月提調直𨽻學校監察御史陳煒奏請免其充吏竟發為民奉旨準行仍追其所食廩米而教官提調官亦各有罰取之如彼其少課之如此其嚴豈有如後日之濫且惰者乎當時於取進士用三場動言遵祖制而於此獨不肯申明祖制舉一世而為姑息之政僥幸之人是可歎也宣德三年三月戊戌行在禮部尚書胡濚奉旨令各處巡按御史同布政司按察司并提調官教官將生員公同考試食廩膳七年以上學無成效者發充吏六年以下追還所給廩米黜為民至宣德七年奏天下生員三萬有竒其時即已病生員之濫而尚未有提學官之設是以煩特旨而會多官也正統元年五月壬辰始設提調學校官每處添按察司官一員南北御史各一員十年四月廣東左參議楊信民奏自設提調學校官以來監臨上司嫌於侵職巡厯所至置之不問如廣東諸處阻江隔海提學官不過嵗一至而已雖曰職掌徒為文具乞罷之便事下禮部尚書胡濚言布按二司所至處自應提督考較府州縣提調正官每月朔望宜照例詣學考其勤惰今因設提學官乃彼此推諉是非設官之過乃曠職之咎也得旨申飭仍令巡按御史紏舉提學官之不職者幹十三年七月丙戌山西絳縣儒學署訓導事舉人張請罷提督學校御史僉事等官部議從之上不允處景泰元年四月壬午翰林院編修周洪謨請裁革各提學官天順五年十一月庚申復設提督學校官其條例曰生員食廩六年以上不諳文理者悉發充吏增廣生入學六年以上不諳文理者罷黜為民當差又曰生員有闕即於本處官員軍民之家選考端重俊秀子弟補充當時生員有闕方補後充吏之法不行而新進附生乃有六年未滿免黜之例蓋繇此而推之也李吉甫在中唐之世疾吏員太廣謂繇漢至隋未有多於今者天下常以勞苦之人三奉坐待衣食之人七而今則遐陬下邑亦有生員百人即未至擾官害民而已為遊手之徒足稱五蠧之一矣有國者茍知俊士之效賖而遊手之患切其有不亟為之所乎其中之劣惡者一為諸生即思把持上官侵噬百姓聚黨成羣投牒呼譟正統十四年六月丙辰詔生員事犯黜退者輕罪充吏免追廩米若犯受贓姦盜冒籍科舉挾妓飲酒居喪娶妻妾等罪者南北直𨽻發充兩京國子監膳夫各布政司發充鄰近儒學齋夫膳夫滿日原籍為民示警廩膳仍追廩米至崇禎之末開門迎賊者生員縛官投偽者生員幾於魏博之牙軍成都之突將矣故十六年殿試䇿問有曰秀孝間汙潢池時舉人亦有從賊者故云嗚呼養士而不精其效乃至於此景泰四年四月己酉右少監武艮禮部右侍郎兼左春坊左庶子鄒幹等奏臨清縣學生員伍銘等願納米八百石乞入監讀書今山東等處正缺糧儲宜允其請從之并詔各布政司及直𨽻府州縣學生員能出米八百石於臨清東昌徐州三處賑濟願入監讀書者聽此一時之秕政遂循之二百年五月庚申令生員納米入監者比前例減三百石河南開封府儒學教授黃鑾奏納粟拜官皆衰世之政乃有之未聞以納粟為貢士者臣恐書之史册將取後世作俑之譏部議倉廩稍實即為停罷八月癸巳禮部奏邇因濟寧徐州飢權宜拯濟令生員輸米五百石入監讀書雖云權宜實壞士習請弛其令庶生徒以學行相勵從之正統以後京官多為其子陳情乞恩送監讀書者此太學之始壞天順五年十月令生員納馬草匹補監生唐書載尚書左丞賈至議曰夫先王之道消則小人之道長小人之道長則亂臣賊子生焉臣弒其君子弒其父非一朝一夕之故其所由來者漸矣漸者何謂忠信之陵頽恥尚之失所末學之馳騁儒道之不舉四者皆取士之失也近代趨仕靡然向風致使祿山一呼而四海震蕩思明再亂而十年不復向使禮讓之教𢎞仁義之道著則忠臣孝子比屋可封逆節不得而萌人心不得而搖矣觀三代之選士任賢皆考實行故能風化淳一運祚長逺秦坑儒士二代而亡漢興雜三代之政𢎞四科之舉西京始振經術之學東都終持名節之行至有近戚竊位強臣擅權弱主外立母后専政而社稷不隕終彼四百豈非興學行道扇化於鄉里哉厥後文章道弊尚於浮侈取士異術茍濟一時自魏至隋四百餘載三光分景九州阻域竊號僭位德義不修是以子孫速顛享國咸促國家革魏晉梁隋之弊承夏殷周漢之業四隩既宅九州攸同覆燾亭育合德天地安有捨皇王舉士之道縱亂代取人之術此公卿大夫之辱也是則科舉之弊必至於躁競而躁競之歸馴至於亂賊自唐迄今同斯一轍有天下者誠思風俗為人才之本而以教化為先庶乎德行修而賢才出矣明初有以儒士而入科場者謂之儒士科舉景泰間陳循奏臣原籍吉安府自生員之外儒士報科舉者往往一縣至有二三百人中式額數今人論科舉多以廣額為盛不知前代乃以減數為美談著之於史舊唐書王丘傳開元初遷考功員外郎貢舉舊以考功員外郎主之開元二十四年始改用禮部侍郎杜甫詩忤下考功第先是考功舉人請託大行取士頗濫每年至數百人此通計諸科之始丘一切核其實材登科者僅滿百人議者以為自則天已後凡數十年無如丘者嚴挺之傳開元中為考功員外郎典舉二年人稱平允登科者頓減二分之一陸贄傳知貢舉一嵗選士才十四五此進士登第之數數年之內居臺省清近者十餘人此皆因減而精昔人之所稱善今人為此不但為刻薄之名而又坐失門生百數十人雖至愚者不為矣髙鍇傳為禮部侍郎凡掌貢部三年每嵗登第者四十人開成三年敕曰進士每嵗四十人其數過多則乖精選官途填委要窒其源宜改每嵗限放三十人如不登其數亦聽文宗之識豈不優於宋太宗乎賈餗傳太和中三典禮闈所選士共止七十五人齊王融為武帝作䇿秀才文曰今農戰不修文儒是競宋自太宗太平興國二年賜進士諸科五百人遽令釋褐而二年進士至萬二百六十人淳化二年至萬七千三百人見曽鞏文集於是一代風流無不趨於科第葉適作制科論謂士人猥多無甚於今世此雖足以𢎞文教之盛而士習之偷亦自此始矣呂氏家孰記言今士人所聚多處風俗便不好魯哀公用莊子之言號於國中曰無其道而為其服者其罪死五日而魯國無敢儒服者獨有一丈夫儒服而立乎公門公召而問以國事千轉萬變而不窮莊子曰以魯國而儒者一人耳可謂多乎記曰垂緌五寸惰遊之士也今將求儒者之人而適得惰遊之士此其説在乎楚葉公之好畫龍而不好真龍也永樂十年二月會試天下舉人詔諭考官楊士竒金幼孜曰數科取士頗多不免玉石雜進今取毋過百人正統五年十二月始增會試中式額為百五十人應天府鄉試百人他處皆量增之天順七年有監察御史朱賢上言欲多收進士以備任使上惡其干譽下錦衣衛獄降四川忠州花林水驛驛丞通場下第册府元龜唐天寶十載九月辛卯上御勤政樓試懷才抱器舉人丙申敕曰朕祇膺寶厯殷鑒逺圖慮草澤之遺賢降弓旌於屢辟是以三紀於兹羣材輻湊或一言可紀必適輪轅一善可經每加奬進庶六合之內靡然同風四科之門咸能一貫何兹意之緬邈而增修之寂寥今者舉人深乖宿望朕之所問必正經史卿等所答咸皆少通朕以獨鑒未周必資僉議爰命朝賢三事精加詳擇咸以為闕於聚學莫可登科其懷才抱器舉人並放更習學其有不對䇿羅嘉茂既是白丁宜於劒南效力全不答所問崔慎感劉灣等勒為本郡充學生之數勿許東西其所舉官各量貶殿以示懲誡是通場皆下第也然玄宗不因是而廢此科且黜落之舉人猶稱為卿等既無峻切之文亦不為姑息之政斯得之矣御試黜落宋史仁宗紀嘉祐二年三月賜禮部奏名進士諸科及第出身八百七十七人親試舉人免黜落始此此仁宗末年姑息之政詒謀録曰舊制殿試皆有黜落臨時取旨或三人取一或二人取一或三人取二故有纍經省試取中而擯棄於殿試者自張元以積忿降元昊為中國患朝廷始囚其家屬未幾復縱之於是羣臣建議歸咎於殿試嘉祐二年詔進士與殿試者皆不黜落是一畔逆之士子為天下後世士子無窮之利也阮漢聞言以張元而罷殿試之黜落則懲黃巢之亂將天下士子無一不登第而後可殿舉宋初約周顯德之制定貢舉條法及殿罰之式進士文理紕繆殿五舉今謂之罰科諸科初場十否不通者謂之否殿五舉第二第三場十否殿三舉第一場至第三場九否並殿一舉殿舉之數朱書於試卷送中書門下今之科場有去取而無勸懲故不才之人得以旅進而言此者世必以為刻薄矣英宗實録宣德十年九月令天下嵗貢生員從行在翰林院考試中式者送南北國子監讀書不中者發原籍住廩肄業以待復試再不中者發充吏提調教官如例責狀今嵗貢廷試亦無黜落設科取士大抵為恩澤之塗矣進士得人唐書選舉志衆科之目進士尤為貴其得人亦最為盛焉文宗好學嗜古鄭覃以經術位宰相深嫉進士浮薄屢請罷之公主傳德宗女魏國公主下嫁王士平得罪貶賀州司戶參軍門下客蔡南史獨孤申叔為主作團雪散雪辭帝聞怒捕南史等逐之幾廢進士科唐語林進士舉人各樹名甲開成會昌中語曰鄭楊段薛炙手可熱武宗即位宰相李德裕尤惡進士謂朝廷選官須公卿子弟為之何者少習其業自熟朝廷事臺閣之儀不教而自成寒士縱有出人之才固不能間習也德裕之論偏異蓋如此然進士科當唐之晚節尤為浮薄世所共患也金史言取士之法其來不一至於唐宋進士盛焉當時士君子之進不繇是塗則自以為慊苦簟反此繇時君之好尚故人心之趨向然也宋馬永卿言本朝取士之路多矣得人之盛無如進士至有一榜得宰相數人者其間名臣不可勝數此進士得人之明效也或曰不然以本朝崇尚進士故天下英才皆入此科若云非此科不得人則失之矣唐開元以前未嘗尚進士科故天下名士雜出他塗開元以後始尊崇之故當時名士中此科者十常八九以此卜之可以見矣餘姚黃宗羲作明夷待訪録其取士篇曰古之取士也寬其用士也嚴今之取士也嚴其用士也寬古者鄉舉里選士之有賢能者不患於不知降而唐宋其科目不一士不得與於此尚可轉而從事於彼是其取之之寬也王制命鄉論秀士升之司徒曰選士司徒論選士之秀者升之學曰俊士大學正論造士之秀者升之司馬曰進士司馬論進士之賢者以告於王而定其論論定然後官之任官然後爵之位定然後祿之唐之士及第者未便解褐入仕吏部又復試之詳下條宋雖登第入仕然亦止簿尉令録榜首才得丞判是其用之之嚴也寬於取則無遺才嚴於用則無幸進今也不然其取士止有科舉一塗雖使豪傑之士若屈原董仲舒司馬相如揚雄之徒舍是亦無繇而進取之不謂嚴乎哉一日茍得上之列於侍從下亦置之郡縣即其黜落而為鄉貢者終身不復取解授之以官用之又何其寬也嚴於取則豪傑之老死邱壑者多矣寬於用此在位者多不得其人也流俗之人徒見二百年以來之功名氣節一二出於其中遂以為科法已善不必他求不知科第之內既聚此十百萬人不應功名氣節之士獨不得入則是功名氣節之士之得科第非科第之能得功名氣節之士也假使探籌較其長短而取之行之數百年則功名氣節之士亦自有出於探籌之中者寧可謂探籌為取士之善法邪究竟功名氣節人物不及漢唐逺甚徒使庸妄之輩充塞天下豈天之不生才哉則取之之法非也我故寬取士之塗有科舉有薦舉有太學有任子有郡縣佐其法以諸生掌六曹有辟召有絶學有上書而用之之嚴附見焉明初薦辟之法既廢而科舉之中尤重進士神宗以來遂有定例州縣印官以上中為進士缺中下為舉人缺最下乃為貢生缺舉貢厯官雖至方面非廣西雲貴不以處之以此為銓曹一定之格間有一二舉貢受知於上拔為卿二大僚則必盡力攻之使至於得罪譴逐且殺之而後已於是不繇進士出身之人遂不得不投門戶以自庇資格與朋黨二者牢不可破而國事大壞矣至於翰林之官又以清華自處而鄙夷外曹崇禎中天子忽用推知考授編檢而衆口交譁有適從何來遽集於此之誚唐武儒衡語嗚呼科第不與資格期而資格之局成資格不與朋黨期而朋黨之形立防微慮始有國者其為變通之計乎大臣子弟人主設取士之科以待寒畯誠不宜使大臣子弟得與其間以示寵遇之私而大臣亦不當使其子弟與寒士競進魏孝文時于烈為光祿勳卿其子登引例求進烈上表請黜落孝文以為有識之言雖武夫猶知此義也唐之中葉朝政漸非然一有此事尚招物議長慶元年禮部侍郎錢徽知貢舉中書舍人李宗閔子壻蘇巢右補闕楊汝士弟殷士皆及第為段文昌所奏指擲榜內鄭朗等十四人謂之子弟穆宗乃內出題目重試落朗等十人貶徽江州刺史宗閔劍州刺史汝士開江令舊唐書會昌四年權知貢舉左僕射王起奏所放進士有江陵節度使崔元式甥鄭朴東都留守牛僧孺女壻源重故相竇易直子緘監察御史楊收弟嚴試文合格物議以子弟非之敕遣戶部侍郎翰林學士白敏中覆試落下三人唯放楊嚴一人册府元龜知唐書楊嚴傳又有楊至共五人大中元年禮部侍郎魏扶奏臣今年所放進士三十三人其封彥卿崔琢鄭延休等三人實有詞藝為時所稱皆以父兄見居重任不敢選取詔令翰林學士承旨戶部侍郎韋琮考覆敕放及第舊唐書大中末令狐綯罷相其子滈應進士舉在父未罷相前拔文解及第諫議大夫崔瑄論滈干撓主司侮弄文法請下御史臺推勘疏留中不出舊唐書令狐綯子滈傳大中十三年綯罷相為河中節度使為其子滈乞應進士舉許之登第三十人有鄭羲者故戶部尚書浣之孫裴宏餘故相休之子魏簹故相扶之子及滈皆大臣子弟諫議大夫崔瑄論滈權在一門勢傾天下及綯罷相作鎮之日便令滈納卷貢闈豈可以父在樞衡獨撓文柄請下御史臺按問奏疏不下滈册府元龜載起居郎張雲疏言綯方出鎮便䇿名放榜宣麻相去二十三日後梁開平三年五月敕禮部所放進士薛鈞是左司侍郎薛廷圭男方持省轄固有避嫌宜令所司落下宋開寶元年權知貢舉王祐擢進士合格者十人陶穀子邴名在第六翼日穀入謝上謂侍臣曰聞穀不能訓子邴安得登第乃命中書覆試邴復登第因下詔自今舉人凡關食祿之家禮部具聞覆試山堂考索至太宗以後科額日廣登用亦驟而上下斤斤猶守此格有人主示公而不取者雍熙二年宰相李昉之子宗諤參政呂蒙正之弟蒙亨鹽鐵使王明之子扶度支使許仲宣之子待問舉進士試皆入等上曰此並勢家與孤寒競進縱以藝升人亦謂朕有私寵罷之是也山堂考索有人臣守法而自罷者唐義問用舉者召試祕閣父介引嫌罷之是也宋史有子弟恬退而不就者韓維嘗以進士薦禮部父億任執政不就廷試仁宗患搢紳奔競諭近臣曰恬靜守道者旌擢則躁求者自當知愧於是宰相文彥博等言維好古嗜學安於靜退乞加甄録召試學士院辭不赴除國子監主簿是也山堂考索父舊唐書言王蕘苦學善屬文以季鐸作相避嫌不就科試而趙屼為御史上疏言治平以前大臣不敢援置親黨於要塗子弟多處管庫甚者不使應科舉自安石柄國持內舉不避親之説始以子雱列侍從繇是循習為常今宜杜絶其源宋史以此為防猶有若秦檜子熺孫塤試進士皆為第一者清波雜志紹聖丁丑章持魁南省時有詩云何處難忘酒南宮放榜時有才如杜牧無勢似章持不取通經士先收執政兒此時無一盞何以展愁眉至於有明此法不講又入仕之塗雖不限出身然非進士一科不能躋於貴顯於是宦遊子弟攘臂而就功名三百年來惟聞一山隂王文端名家屏萬厯中輔臣子中解元不令赴會試者唐宋之風蕩然無存然則寬入仕之塗而厲科名之禁不可不加之意也天寶二年是時海內晏平選人萬計命吏部侍郎宋遙苖晉卿考之遙與晉卿茍媚朝廷又無亷潔之操取舍偷濫甚為當時所醜有張奭者御史中丞倚之子不辨菽麥假手為判特升甲科會下第者嘗為薊令以其事白於范陽節度使安祿山祿山恩寵崇盛謁請無時因具奏之帝乃大集登科人御花萼樓親試升第者十無一二焉奭手持試紙竟日不下一字時謂之曳白帝大怒遂貶遙為武當太守晉卿為安康太守復貶倚為淮陽太守詔曰庭闈之間不能訓子選調之際乃以託人士子皆以為戲笑或託於詩賦諷刺考判官禮部郎中裴朏起居舍人張烜監察御史宋昱左拾遺孟朝皆貶官嶺外石林燕語曰國初貢舉法未備公卿子弟多艱於進取蓋恐其請托也范杲魯公之兄子見知陶穀竇儀皆待以甲科會有言世祿之家不當與寒畯爭科名者遂不敢就試李內翰宗諤已過省以文正為相因唱名辭疾不敢入亦被黜文正罷相方再登科天禧後立法有官人試不中者皆科私罪仍限以兩舉慶厯以來條令日備有官人仍别立額於是進取者始自如矣謝在杭五雜俎曰宋初進士科法制稍密執政子弟多以嫌不令舉進士有過省而不敢就殿試者慶厯中王伯庸為編排官其內弟劉原父廷試第一以嫌自列降為第二今制惟知貢舉典試者宗族不得入其它諸親不禁也執政子弟擢上第者相望不絶顧其公私何如耳楊用修作狀頭天下不以為私與江陵諸子異矣萬厯癸未蘇工部濬入闈取李相公廷機為首卷二公少同筆硯至相善也然蘇取之不以為嫌李魁天下而人無間言公也庚戌之役湯庶子賔尹素知韓太史敬拔之髙等而其後議論蜂起座主門生皆坐褫職夫韓之才誠髙而湯之取未為失人但心迹難明卒至兩敗亦可惜也然科場之法自是日益多端矣景泰七年大學士王文陳循以其子鄉試不中至具奏訟寃為皆準令會試北卷明制科場分南卷北卷中卷實録洪熙元年八月乙卯行在禮部奏定科舉取士之額南士取十之六北士取十之四部後又令南北各退五卷為中卷景泰二年會試禮奏準取士不分南北戶科給事中李侃等謂北人拙於文辭向日定為南北之分不可改禮部言鄉舉里選之法不可行矣取士若不以文考官將何所據且北方中土人才所生以古言之大聖如周公孔子大賢如顔曽思孟皆非南人以今言之如靖逺伯王驥左都御史王翺王文皆永樂間不分南北所取進士今豈可預謂北無其人侃等所言不允南四年會試命仍分北中卷此調停之術而非造就之方夫北人自宋時即云京東西河北河東陜西五路舉人拙於文辭聲律王氏揮麈録曰國初每嵗放榜取士極少安德裕作魁日九人而已蓋天下未混一也至太宗朝浸多所得率江南之秀其後又别立分數考較五路舉人以北人拙於辭令故優取熙寧二年廷試罷三題専以䇿取士非雜犯不復黜然五路舉人尤為疏略黃道夫榜傳臚至第四甲黨鎛卷子神宗大笑曰此人何繇過省知舉舒信道對以五路人用分數取末名過省上命降作第五甲末況又更兵革之亂文學一事不及南人久矣今南人教小學先令屬對猶是唐宋以來相傳舊法北人全不為此故求其習比偶調平仄者千室之邑幾無一二人而八股之外一無所通者比比也愚幼時四書本經俱讀全注後見庸師窳生欲速其成多為刪抹而北方則有全不讀者王槐野與鄭少潭提學書言關中士不讀朱注不看大全性理通鑑諸書當嘉靖之時已如此欲令如前代之人參伍諸家之注疏而通其得失固數百年不得一人且不知十三經注疏為何物也間有一二五經刻本亦多脫文誤字而人亦不能辨此古書善本絶不至於北方而蔡虛齋林次崖諸經學訓詁之儒皆出於南方也故明代北方有二患一曰田荒二曰人荒非大有為之君作而新之不免於無田甫田維莠驕驕之歎也漢成帝元延元年七月詔內郡國舉方正能直言極諫者各一人北邊二十二郡舉勇猛知兵法者各一人此古人因地取才而不限以一科之法也宋敏求嘗建言河北陜西河東士子性朴茂而辭藻不工故登第者少請令轉運使擇薦有行藝材武者特官之使人材參用而士有可進之路其亦漢人之意也與糊名國家設科之意本以求才今之立法則専以防姦為主如彌封謄録一切之制是也考之唐初吏部試選人皆糊名令學士考判武后以為非委任之方罷之此則糊名已用之選人而未嘗用之貢舉貞元中陸贄知貢舉訪士之有才行者於翰林學士梁肅肅曰崔羣雖少年他日必至公輔果如其言册府元龜贄唐書本傳贄知貢舉時崔元翰梁肅文藝冠時輸心於肅肅與元翰推薦藝實之士一嵗選士才十四五數年之內居臺省清近者十餘人太和初禮部侍郎崔郾試進士東都吳武陵出杜牧所賦阿房宮辭請以第一人處之武陵傳此知其賢而進之也張昌齡舉進士與王公治齊名皆為考功貟外郎王師旦所絀太宗問其故對曰昌齡等華而少實其文浮靡非令器也取之則後生勸慕亂陛下風雅帝然之溫庭筠苦心硯席尤長於詩賦初舉進士至京師人士翕然推重然士行塵雜不修邊幅能逐絃吹之音為側豔之詞公卿家無賴子弟裴誠令狐滈之徒相與蒱飲酣醉終日繇是纍年不第本傳羅隱有詩名尤長於詠史然多譏諷以故不中第册府元龜此知其不可而退之也宋史陳彭年傳言景德中彭年與朝迥同知貢舉請令有司詳定考試條式真宗命彭年與戚綸參定多革舊制専務防間其所取者不復選擇文行止較一日之藝雖杜絶請託然置甲等者或非人望文獻通考略同宋白傅言初陳彭年舉進士輕俊喜謗主司白知貢舉惡其為人黜落之彭年憾焉後居近侍為貢舉條制多所關防蓋為白設也山堂考索同蓋昔之取士雖程其一日之文亦參之以平生之行而鄉評士論一皆達於朝廷李咨傳舉進士真宗聞其至孝擢第三人當時尚未糊名陸遊老學菴筆記本朝進士初亦如唐制兼採時望真廟時周安惠公起建糊名法一切以程文為去留故王旦傳言翰林學士陳彭年呈政府科場條目旦投之地曰內翰得官幾日乃欲隔截天下進士彭年皇恐而退畫墁録言彭年子彥博守汀州以贓敗杖脊流海島其孫逵兄弟發彭年冢取金帶分貨抵罪而范仲淹蘇頌之議並欲罷彌封謄録之法使有司先考其素行以漸復兩漢選舉之舊本傳夫以彭年一人之私而遵之為數百年之成法無怪乎繁文日密而人材日衰欲求才者非有重門洞開之心胸不能起而更張之矣册府元龜唐憲宗元和二年十二月敕自今以後州府所送進士如迹涉疏狂兼虧禮教或曾為官司科罰或曾任州府小吏一事不合入清流者雖薄有詞藝並不得申送如舉送以後事發長吏停見任及已停替者殿二年本試官及司功官並貶降是進一不肖之人考試之官皆有責焉今則藉口於糊名而曰吾衡其文無繇知其人也是教之崇敗行之人而代為之逭其罪也容齋四筆曰唐世科舉之柄顓付之主司仍不糊名又有交朋之厚者為之薦達謂之通榜故其取人也畏於譏議多公而審亦或脅於權勢或撓於親故或纍於子弟皆常情所不能免者若賢者臨之則不然未引試之前其去取髙下固已定於胸中矣韓文公與祠部陸貟外書曰執事之與司貢士者相知誠深矣彼之所望於執事執事之所以待乎彼者可謂至而無間矣彼之職在乎得人執事之志在乎進賢如得其人而授之所謂兩得愈之知者有侯喜侯雲長劉述古韋羣玉托言作紓此四子皆可以當首薦而極論者期於有成而後止可也沈杞張苰登科記作𢎞尉遲汾李紳張後餘李翊皆出羣之才與之足以收人望而得才實主司廣求焉則以告之可也往者陸相公司貢士愈時幸在得中貞元八年陸贄知舉賈稜等二十二人登第公與焉所與及第者皆赫然有聲原其所以亦繇梁補闕肅王郎中礎佐之梁舉八人無有失者其餘則王皆與謀焉陸相待王與梁如此不疑也至今以為美談此書在集中不注嵗月按托言云貞元十八年權德輿主文陸傪貟外通榜韓文公薦十人於傪權公凡三榜共放六人餘不出五年內皆捷以登科記考之貞元十八年德輿以中書舍人知舉放進士二十三人尉遲汾侯雲長韋紓沈杞李翊登第十九年以禮部侍郎放二十人侯喜登第永貞元年放二十九人劉述古登第通三榜共七十二人而韓所薦者預其七元和元年崔邠下放李紳三年又放張後餘張𢎞皆與托言合搜索舊唐書李揆傳乾元初兼禮部侍郎言主司取士多不考實徒峻其隄防索其書䇿殊不知藝不至者居文史之囿亦不能摛辭深昧求賢之意也及試進士請於庭中設五經諸史及切韻本於牀引貢生謂之曰大國選士但務得才經籍在此請恣尋檢舒元輿傳舉進士見有司鉤校苛切因上書言自古貢士未有輕於此者且宰相公卿繇此出而有司以𨽻人待之羅棘遮截疑其為姦非所以求忠直也李戡傳年二十明六經就禮部試吏唱名乃入戡恥之明日徑返江東隱陽羡里又言國朝校試窮微探隱無所不至士至露頂跣足以赴科場此先輩所以有投槧而出者然狡偽之風所在而有試者愈嚴而犯者愈衆桁楊之辱不足以盡辜如主司真具别鑒雖懷藏滿篋亦復何益故搜索之法祇足以濟主司之所短不足以顯才士之所長也前明考試之弊在乎求才之道不足而防姦之法有餘洪武五年正月癸丑上諭禮部臣曰近代以來舉人不中程式為有司所黜者多不省己自修以圖再進往往托拾主司細故謗毁以逞私忿禮讓亷恥之風不立今後有此者罪之萬厯末謝肇浙言上之防士如防姦偷而旁觀之伺主司如伺冦盜宋元祐初御史中丞劉摯上言治天下者遇人以君子長者之道則下必有君子長者之行應於上若以小人遇之彼將以小人自為矣況以此行於學校之間乎誠能反今日之弊而以教化為先賢才得而治具張不難致也金史泰和元年省臣奏搜簡之法雖嚴至於解髮袒衣索及耳鼻殊失待士之禮移刺履傳初舉進士惡搜簡煩瑣去之蓋世宗初年故大定二十九年已嘗依前故事使就沐浴官置衣為之更之既可防濫且不虧禮從之朱子論學校科舉之弊謂上以盜賊待士士亦以盜賊自處鼓譟迫脅非盜賊而何嗟夫三代之制不可見矣漢唐之事豈難倣而行之者乎座主門生貢舉之士以有司為座主而自稱門生自中唐以後遂有朋黨之禍座主字見令狐峘傳主張籍寄蘇州白使君詩登第早年同座楊嗣復傳領貢舉時父於陵自雒入朝乃率門生出迎置酒第中於陵坐堂上嗣復與諸生坐兩序始於陵在考功擢浙東觀察使李師稷及第時亦在焉人謂楊氏上下門生會昌三年十二月二十二日中書覆奏奉宣旨不欲令及第進士呼有司為座主兼題名局席等條疏進來者伏以國家設文學之科求真正之士所宜行崇風俗義本君親然後升於朝廷必為國器豈可懷賞拔之私惠忘教化之根源自謂門生遂為朋比所以時風浸壞臣節何施樹黨背公靡不由此按韓文公送牛堪序吾未嘗聞有登第於有司而進謝其門者則元和長慶之間士風猶不至此臣等議今日以後進士及第任一度參見有司向後不得聚集參謁于有司宅置晏其曲江大會朝官及題名局席並望勒停新唐書初舉人既及第綴行通名詣主司第謝其制序立西階下北上東向主人席東階下西向諸生拜主司答拜乃敘齒謝恩遂升階與公卿觀者皆坐酒數行乃赴期集又有曲江會題名席李肇國史補既捷列名于慈恩寺塔謂之題名大燕于曲江亭子謂之曲江會奉敕宜依後唐長興元年六月中書門下奏時論以貢舉官為恩門及以登第為門生門生者門弟子也顔閔遊夏等並受仲尼之訓即是師門大朝所命春官不曾教誨舉子是國家貢士非宗伯門徒今後及第人不得呼春官為恩門師門及自稱門生宋太祖建隆三年九月丙辰詔及第舉人不得拜知舉官子弟及目為恩門師門并自稱門生劉克莊跋陸放翁帖云余大父著作為京教考浙漕試明年考省試呂成公卷子皆出本房家藏大父與成公往還真迹大父則云上覆伯恭兄成公則云拜覆著作丈時猶未呼座主作先生也尋其言蓋宋末已有先生之稱而至於有明則遂公然謂之座師謂之門生乃其朋黨之禍亦不減於唐時矣王元美觚不觚録謂嘉靖以前門生稱座主不過曰先生而已至分宜當國始稱老翁其厚者稱夫子此後門生俱曰老師五雜俎言國朝惟霍文敏韜不拜主司亦不受人作門生唐時風俗之敝楊復恭至謂昭宗為門生天子唐崔祐甫議以為自漢徐孺子於故舉主之喪徒步千里而行一祭厚則厚矣其於傳繼非可也厯代莫之非也後漢書樊倏傳言郡國舉孝亷率取年少能報恩者當時即有此説近日張荆州九齡又刻石而美之於是後來之受舉為參佐者報恩之分往往過當或撓我王憲捨其親戚之罪負舉其不令子孫以竊名位背公死黨兹或近之時論從而與之通人又不救遂往而不返宋陳瑩中言使王氏之門有負恩之士則漢之宗社不至於亡其言可感夫參伍之於舉主猶蒙顧盼之恩被話言之奬陶鎔成就或資其力昔人且有黨比之譏若科場取士祗憑所試之文未識其名何有師生之分至於市權撓法取賄酬恩枝蔓紏連根柢磐互官方為之濁亂士習為之頺靡其與漢人篤交念故之誼抑何逺哉風俗通記𢎞農太守吳匡為司空黃瓊所舉班詔勸耕道於澠池聞瓊薨即發喪制服上病載輦車還府論之曰剖符守境勸民耕桑肆省寃疑和解仇怨國之大事所當勤恤而猥顧私恩傲狠自遂若宮車晏駕何以過兹論者不察而歸之厚司空袁周陽舉荀慈明有道太尉鄧伯條舉訾孟直方正二公薨皆制齊衰漢書荀爽傳司空袁逢舉有道不應及逢卒爽制服三年當世往往化以為俗邵寶議之曰師喪以心而舉主服三年可乎若此類者非一然荀訾通儒於義足責魏景元元年傅元舉將僕射陳公薨以咨時賢光祿鄭小同云宜準禮而以情義斷之服弔服加麻可也三月除之宋庾蔚之以此論為允或舉者名位斥落子孫無繼多不親至然則隆情繇乎顯閥薄報在乎衰門此又私恩之一變古今同慨者矣後漢書周景為河內太守好賢愛士每至嵗時延請舉吏入止後堂與共宴會如此數四乃遣之贈送什物無不充備既而選其父兄子弟事相優異魏志衛臻傳夏侯惇為陳留太守舉臻計吏命婦出宴臻以為末世之俗非禮之正先是司徒韓演在河南志在無私舉吏當行一辭而已恩亦不及其家曰我舉若可矣豈可令偏積一門是二公者若人情雖有厚薄之殊而意趣則有公私之别矣記言趙文子所舉於晉國管庫之士七十有餘家生不交利死不屬其子焉嗚呼吾見今之舉士者交利而已屬子而已舉主制服雜記曰孔子曰管仲遇盜取二人焉上以為公臣曰其所與遊辟也可人也管仲死桓公使為之服官於大夫者之為之服也自管仲始也有君命焉爾也此雖前仕管氏亦以舉主而服之然孔子以為有君命則可蓋亦有所不盡然之辭同年今人以同舉為同年唐憲宗問李絳曰人於同年固有情乎對曰同年乃九州四海之人偶同科第或登科然後相識情於何有然穆宗欲誅皇甫鎛而宰相令狐楚蕭俯以同年進士􅍖護之矣按漢人已有之後漢書李固傳云有同嵗生得罪於冀風俗通云南陽五世公為廣漢太守與司徒長史段遼叔同嵗又云與東萊太守蔡伯起同嵗又云蕭令吳斌與司徒韓演同嵗三國志魏武帝紀云公與韓遂父同嵗孝亷魏武故事載公令曰顧視同嵗中年有五十未名為老漢敦煌長史武班碑云金鄉長河間髙陽史恢等追惟昔日同嵗郎署孝亷栁敏碑云縣長同嵗犍為屬國趙臺公晉書陶侃傳侃與陳敏同郡又同嵗舉吏其云同嵗蓋即今之同年也惟吳志周瑜傳言堅子䇿與瑜同年步隲傳言與廣陵衛旌同年此當是年齒之年私恩結而公義衰非一世之故矣先輩先輩乃同試而先得第者之稱程氏演繁露曰通典魏文帝黃初五年立太學於雒陽時慕學者始詣太學為門人滿一嵗試通一經者稱弟子不通一經罷遣弟子滿二嵗試通二經者補文學掌故不通者聽從後輩試試通二經亦得補掌故滿三嵗試通三經者擢髙第為太子舍人不第者隨後輩復試試通亦為太子舍人舍人滿二嵗試通四經者擢髙第為郎中不通者隨後輩復試試通亦為郎中郎中滿二嵗能通五經者擢髙第隨才敘用不通者隨後輩復試試通亦敘用故唐世舉人呼已第者為先輩繇此也韋莊集有題云癸丑年下第獻新先輩北夢瑣言王疑知貢舉謂人曰某叨忝文柄今年榜帖全為司空先輩一人而已今考吳志闞澤傳言州里先輩丹陽唐固修身積學薛綜傳言零陵賴恭先輩仁謹不曉時事晉書羅憲傳言侍宴華林園詔問蜀大臣子弟復問先輩宜時敘用者憲薦蜀人常忌杜軫等是先輩之稱果起於三國之時而唐李肇國史補謂互相推敬謂之先輩此又後人之濫矣演繁露又謂唐人已第者其自目曰前進士亦倣此也猶曰早第進士而其輩行在先也澠水燕談録蘇德祥漢相禹圭之子建隆四年進士第一人登第初還鄉里太守置宴作樂伶人致語曰昔年隨侍嘗為宰相郎君今日登科又是狀元先輩鄭氏詩采薇箋曰今薇生矣先輩可以行也是亦漢末人語出身授官史言開元以後四海晏清士無賢不肖恥不以文章達其應詔而舉者多則二千人少猶不減千人所收百才有一文獻通考唐時所放進士每嵗不過二三十人册府元龜貞元十八年五月敕自今已後每年考試所收人明經不得過一百人進士不得過二十人如無其人不必要滿此數五太和元年二年三年每年恩賜及第四十人二年月禮部奏請每年進士以三十人為限從之士之及第者未便解褐入仕尚有試吏部一關韓文公三試於吏部無成則十年猶布衣且有出身二十年不獲祿者東萊呂氏曰唐時進士登第者尚未釋褐或是為人所論薦或再應皆中或藩方辟舉然後始得釋褐請册府元龜唐文宗語宰臣曰凡進士及第有方鎮奏判官者第一任未經作州縣官莫依但第一任曽作州縣官即第二任依奏自宋太宗太平興國二年上初即位思振淹滯賜進士諸科出身者五百餘人石林燕語是年進士特取一百九人八是連放五榜通取百一人皆先賜緑袍鞾笏賜宴開寶寺第一第二等進士及九經授將作監丞大理評事通判諸州其餘皆優等注擬寵章殊異歷代未有也薛居正等言取人太多用人太驟不聽陸遊南唐書言馮延魯子僎韓熙載知貢舉放及第覆試被黜後與其弟侃儀價伉入宋繼取名第蓋南唐及第止於三人五人而宋及第至百餘人也此太宗初一天下欲以得士之盛跨越前代榮觀史册宋史王禹稱上疏言太祖之世每嵗進士不過三十人經學五十人重以諸侯不得奏辟士大夫罕有資廕故有終身不獲一第沒齒不獲一官太宗育德王藩覩其如此臨御之後不求備於取人舍短用長拔十得五在位將逾二紀登第殆近萬人雖有俊傑之才亦多容易而得而不知僥幸之心欲速之習中於士人者且數百年而不可返矣又考通典舉人條例四經出身授緊縣尉判入第三等授望縣尉五經出身授望縣尉判入第三等授畿縣尉進士與四經同資是唐時明經進士初除不過縣尉宋史明經進士入望州判司次畿簿尉文獻通考開寶八年王嗣宗為狀元止授泰州司理參軍太平興國以後始授將作監丞大理評事通判諸州當時以為異數至明代則一入詞林更不外補謝肇浙曰國朝進士一入史館即與六卿抗禮二十年間便可躋卿相清華之選百職莫敢望焉唐宋之代出為郡守入為兩制未嘗有此格也二甲之除猶為部屬崇浮長惰職此之繇所以一第之後盡棄其學而以營升納賄為事者以其得之淺而貴之驟也其於唐人舉士之初制失之逺矣儒林公議言太宗臨軒放榜三五名以前皆出二郡符遷擢榮速陳堯叟王曾初中第即登朝領太史之職賜以朱黻爾後狀元登第者不十餘年皆望柄用人亦以是為當得之也每殿廷臚傳第一則公卿以下無不聳觀雖至尊亦注視焉自崇政殿出東華門傳呼甚寵觀者擁塞通衢今代狀元及第之榮一甲翰林之授權輿於是矣又言雒陽人尹洙豪士也嘗曰狀元及第雖使將兵數十萬恢復幽薊逐出強敵凱歌勞還獻捷太廟其榮無以加焉宋之務虛文而忘實事即太宗有以開之矣宋初用人之弊有二進士釋褐不試吏部一也獻文得旨召試除官二也今衒文之塗已革而入官之選尚輕二者之弊其一尚存似宜仍用唐制用八股之人才而使之理煩治衆此夫子所謂賊夫人之子也恩科宋時有所謂特奏名者開寶三年三月庚戌詔禮部閲進士及十五舉嘗終場者得司馬浦等一百六人賜本科出身特奏名恩例自此始謂之恩科咸平三年遂至九百餘人士人恃此因循不學故天聖之詔曰狃于寬恩遂隳素業茍簡成風甚可恥也而元祐初知貢舉蘇軾孔文仲言今特奏者已及四百五十人又許例外遞減一舉則當復增數百人此曹垂老别無所望布在州縣惟務黷貨以為歸計前後恩科命官幾千人矣何有一人能自奮厲有聞於時而殘民敗官者不可勝數以此知其無益有損議者不過謂宜廣恩澤不知吏部以有限之官待無窮之吏戶部以有限之財祿無用之人而所至州縣舉罹其害乃即位之初有此過舉謂之恩澤非臣所識也當日之論如此金史章宗大定二十九年敕今後凡五次御簾進士可一試而不黜落止以文之髙下定其次謂之恩榜語不云乎及其老也戒之在得故有杖鄉之制以尊髙年致仕之節以養亷恥若以賓王謁帝之榮為閔老酬勞之具恐所益於儒林者小而所傷於風俗者多養陋識於泥塗快羶情於升斗豈有趙孟之禮絳人穆公之思黃髮足以禆君德而持國是者乎況五十不從力政六十不與服戎豈可使齗齗於闕里之旁攘攘於橋門之下宜著為令凡中式舉人年至六十者賜第罷歸居家授徒不中式者不許再上不但減百千黷貨之人亦可以勸二三有恥之士孝宗淳熙七年五月庚辰詔特奏名年六十人毋注縣尉元史至正三年三月監察御史成遵等請用終場下第舉人充學正山長漢獻帝初平四年詔曰今耆儒年踰六十去離本土營求糧資不得専業結童入學皓首空歸長委農野永絶榮望朕甚愍焉其依罷科者聽為太子舍人唐昭宗天復元年赦文令中書門下選擇新及第進士中有久在名場才沾科級年齒已髙者不拘常例各授一官於是禮部侍郎杜德祥奏揀到新及第進士陳光問年六十九曹松年五十四王希羽年七十三劉象年七十柯崇年六十四鄭希顔年五十九詔光問松希羽可祕書省正字象崇希顔可太子校書此亦前代慰寒畯而收物情之一術也實録宣德二年六月己卯行在禮部尚書胡濚奏北京國子監生及見撥各衙門歷事者請令六部尚書都察院都御史通政使司大理寺翰林院各堂上官六科給事中公同監官揀選凡年五十五以上及殘疾貌陋不堪者皆罷為民上從之凡斥去一千九十五人其南京國子監生亦準此例次年即奉旨澄汰天下生員别見後廣額條下三年四月丙辰行在吏部尚書蹇義奏揀選吏員年五十以上及人物鄙猥不諳文移者皆罷為民四年九月甲寅放南北兩京國子監生年五十五以上及殘疾者二百五十三人還鄉為民九年九月戊寅行在禮部奏取天下生員年四十五以上者考試其中者入國子監讀書不中者罷歸為民宣廟精勤吏治一時澄清之效如此後人不知即知之亦不肯言矣年齒記曰四十曰強而仕七十曰老而傳是人生服官之日不過三十年漢順帝陽嘉元年用左雄之言令孝亷年不滿四十不得察舉皆先詣公府諸生試家法儒有一家之學故稱家法文吏課榜奏宋文帝元嘉中限年三十而仕梁武帝天監四年令九流常選年未三十不通一經不得解褐今則突而辨兮已厠銀黃之列死期將至尚留金紫之班何補官常徒隳士習宜定為中制二十方許應試三十方許服官年至六十見任官聽其自請致任實録洪武十三年二月戊辰命文武官年六十以上者皆聽致仕給以誥敕無官之人一切勒停是雖蚤於古記之十年要亦不過三十年而已三十年之中復有三年大憂及期喪不得補選之日則其人在仕路之日少而居林下之日多可以消名利之心而息營競之俗洪熙元年四月庚戌鄭府審理正俞廷輔言近年賓興之士率記誦虛文求其實才十無二三或有年才二十者未嘗學問一旦挂名科目而使之臨政治民職事廢隳民受其弊自今各處鄉試宜令有司先行審訪務得博古通今行止端重年過二十五者許令入試上雖嘉納而未果行今則積習相沿二三百載青雲之路跬步可階五尺之童便思奔競欲以成人材而厚風俗難矣宋李伯玉請罷童子科意亦同此教官漢成帝陽朔二年詔曰古之立太學將以傳先王之業流化於天下也儒林之官四海淵源宜皆明於古今溫故知新通達國體故謂之博士否則學者無述焉為下所輕非所以尊道德也丞相御史其與中二千石二千石雜舉可充博士位者使卓然可觀元仁宗時方以科舉取士虞集上議曰師道立則善人多周子通書今天下學官猥以資格授強加之諸生之上而名之曰師有司弗信也生徒弗信也如此而望師道之立能乎今莫若使守令求經明行修為成德之君子者身師尊之以教於其郡邑其次則求夫操履近正而不為詭異駭俗者確守先儒經義師説而不敢妄為竒論者衆所敬服而非鄉願之徒者其次則取鄉貢至京師罷歸者當今之世欲求成德之人如上一言者或不可遽得若其次之三言則十室之邑必有忠信亦未至乏才也而徒用其又次之一言則亦不過以資格授之而耄鄙之夫遂以學官為糊口之地教訓之員名存而實廢矣明初教職多由儒士薦舉景泰二年始準會試不中式舉人考授天順三年十二月庚申建安縣老人賀煬言朝廷建學立師將以陶鎔士類奈何郡邑學校師儒之官真材實學者百無二三虛糜廩祿猥瑣貪叨需求百計而受業解惑莫措一辭師範如此雖有英才美質何由而成至於生徒之中亦往往玩愒嵗年佻達城闕待次循資濫升監學侵尋老耋授以一官但知為身家之謀豈復有功名之念是則朝廷始也聚羣梟而飲啖終也縱羣狼以牧人茍不嚴行考選則人材日陋士習日下矣上是其言命巡按御史同布按二司分巡官照提調學校例考之太倉陸世儀言今世天子以師傅之官為虛銜而不知執經問道郡縣以簿書期會為能事而不知尊賢敬老學校之師以庸鄙充數而不知教養之法黨孰之師以時文章句為教而不知聖賢之道儇捷者謂之才能方正者謂之迂朴蓋師道至於今而賤極矣即欲束修自厲人誰與之如此而欲望人才之多天下之治不可得矣又言凡官皆當有品級惟教官不當有品級亦不得謂之官蓋教官者師也師在天下則尊於天下在一國則尊於一國在一鄉則尊於一鄉無常職亦無定品惟德是視若使之有品級則僕僕亟拜非尊師之禮矣至其冠服亦不可同於職官當别製為古冠服如深衣幅巾及忠靖巾之類仍以鄉國天下為等庶師道日尊儒風日振而聖人之徒出矣按宋史黃祖舜言抱道懷德之士多不應科目老於韋布乞訪其學行修明孝友純篤者縣薦之州州延之庠序以表率多士其卓行尤異者州以名聞是亦鄉舉里選之意松江府志言洪武初楊孟載為松江府學教授與丘克莊全希賢同官當時分教有司得自延聘皆極州里之選後並至大官而朱子亦云須是罷堂除及注授教官請本州鄉先生為之年未四十不得任教官昔人之論即已及此孟縣志曰縣人張淑譽撰髙皇帝定天下詔府衛州縣各立學置師一人或二人必擇經明行修者署之有能舉其職而最書於朝者或擢為國子祭酒及翰林侍從之官英宗以後始著為令府五人州四人縣三人例録天下嵗貢之士為之間有繇舉人進士除授者而其至也州縣長官及監司之臨者率以簿書升斗之吏視之而不復崇以體貌是以其望易狎而其氣易衰即有一二能誦法孔子以師道聞而得薦擢者亦不過授以州縣之吏而止其取之也太濫其用之也太卑而其録之也太輕無怪乎教術之不興而人才之難就矣士風之薄始於納卷就試師道之亡始於赴部候選梁武帝所謂驅迫亷撝奬成澆競者也有天下者能反此二事斯可以養士而興賢矣武學山堂考索言武學置於慶厯三年阮逸為武學諭未幾省去熙寧復置選知兵書者判武學置直講如國子監靖康之變不聞武學有禦侮者實録正統六年五月從成國公朱勇等奏以兩京多勳衛子弟乃立武學設教授訓導如京府儒學之制景泰五年正月丙寅南京守備寧逺侯任禮請革武學不允一景泰間廢武學天順八年十月丙辰復設京衛武學已而武生漸多常至欺公撓法正德中錢寧已嗾武學生朱大周上疏劾楊一清矣崇禎四年南京武學生吳國麟等毆御史郭維經掌都察院張延登奏黜是則不惟不收其用而反貽之害矣太祖實録洪武二十年七月禮部請如前代故事立武學用武舉仍祀太公建昭烈武成王廟上曰太公周之臣若以王祀之則與周天子並矣加之非號必不享也至於建武學用武舉是分文武為二塗輕天下無全才矣古之學者文武兼備故措之於用無所不宜豈謂文武異科各求専習者乎太公但從祀帝王廟去武成王號罷其舊廟於是勳戚子弟襲爵者習禮肄業於國子監被選尚主者用儀制主事一人教習實録洪武三十一年二月庚辰命吏部設學於虎踞關選儒士十人教故武臣子弟之養於錦衣衛者成化中太監汪直遂請武舉設科鄉試會試殿試悉如進士恩例不果行文事武備統歸於一嗚呼純矣宋劉敞與吳九書曰昔三代之王建辟雍成均以敦教化者危冠縫掖之人居則有序其術詩書禮樂其志文行忠信是以無鄙倍之色鬭爭之聲猶懼其未也故賤詐謀爵人以德褒人以義軌度其信一以待人故曰勇則害上不登於明堂民知所底而無二心是以其教不肅而成其政不嚴而治未聞夫武學之科也夫輕儇之態強武之習瞋目而語難按劍而疾視者此所謂勇力之人也將教之以術而動之以利其可得不為其容乎為其容可得無變其俗乎而況建博士之職廣弟子之員吾恐雖有智者未能善其後矣夫戰國之時天下競於馳騖於是乎有縱橫之師技擊之學以相殘也雖私議巷説有司不及然風俗猶以是薄禍亂猶以是長學者之所甚疾仁人之所憂而辨也若之何其效之且足下預其議而不能救與吾所甚惑也因勳衛子弟不得已而立武學仍宜以孔子為先師如前代國學祀周公唐開元改為孔子周公尚不祀于學而況太公乎成化五年掌武學國子監監丞閻禹錫言古者廟必有學受成獻馘於中欲其先禮義而後勇力也今本學見有空堂數楹乞敕所司改為文廟可謂得禮之意雜流唐時凡九流百家之士並附諸國學而授之以經六典國子祭酒司業之職掌邦國儒學訓導之政令有六學焉一曰國子二曰太學三曰四門四曰律學五曰書學六曰算學天寶九載置廣文館凡七學歐陽詹貞元十四年記曰我國家春享先師後更日命太學博士清河張公講禮記束修既行筵肆乃設公就几北坐南面直講抗牘南坐北面大司成端委居于東小司成率屬列于西國子師長序公侯子孫自其館太學長序卿大夫子孫自其館四門師長序八方俊造自其館廣文師長序天下秀彥自其館其餘法家墨家書家算家術業以明亦自其館沒階雲來即席鱗次攢辨如星連襟成帷觀此可見當日養士之制寬而教士之權一是以人才盛而藝術修經學廣而師儒重後則一切擯諸橋門之外而其人亦自棄不復名其業於是道器兩亡而行能兼廢世教之日衰有繇然也通經為吏漢武帝從公孫宏之議下至郡太守卒史皆用通一藝以上者唐髙宗總章初詔諸司令史考滿者限試一經昔王粲作儒吏論以為先王博陳其教輔和民性使刀筆之吏皆服雅訓竹帛之儒亦通文法故漢文翁為蜀郡守選郡縣小吏開敏有材者張叔等十餘人親自飭厲遣詣京師受業博士後漢欒巴為桂陽太守雖幹吏卑末皆課令習讀程試殿最隨能升授吳顧邵為豫章太守小吏資質佳者輒令就學擇其先進擢置右職而梁任昉有厲吏人講學詩然則昔之為吏者皆曾執經問業之徒心術正而名節修其舞文以害政者寡矣宋文恪訥言天下未有舍儒而可以為吏者東京之盛自期門羽林之士悉令通孝經章句貞觀之時自屯營飛騎亦給博士使授以經有能通經者聽得貢舉小人學道則易使也豈不然乎周官太宰乃施典于邦國而陳其殷置其輔後鄭氏曰殷衆也謂衆士也輔府史庶人在官者夫庶人在官而名之曰輔先王不敢以厮役遇其人也重其人則人知自重矣歐陽公集古録晉南鄉太守碑陰官屬何其多邪蓋通從史而盡列之當時猶於其間取士人故吏亦清修其勢然爾元史順帝紀至正六年四月命左右二司六部吏屬於午後講習經史其時朝綱已弛人心將變雖有此令而實無其益是以太祖實録言科舉初設上重其事凡民間俊秀子弟皆得預選惟吏胥心術已壞不許應試洪武四年七月丁卯又詔凡選舉毋録吏卒之徒二十三年八月壬申唐書選舉志言嘗為州縣小吏雖藝文可采勿舉重劉晏傳嘗言士有爵祿則名重於利吏無榮進則利於名英宗實録大理寺少卿張固嘗建論吏員鮮有不急於利者不宜用為郡守朝廷是其言著為令然而嘗與羣臣言元初有憲官疾吏往候之憲官起扶杖而行因以杖授吏吏拱手卻立不受憲官悟其意他日見吏謝之吏曰某為屬吏非公家僮不敢避勞慮傷理體五年二月壬午是則此輩中未嘗無正直之人顧上所以陶鎔成就之者何如爾陸子靜嘗言古者無流品之分而賢不肖之辨嚴後世有流品之分而賢不肖之辨略能於分别之中而寓作成之意庶乎其得之矣前明會典洪武二十六年定凡舉人出身第一甲第一名從六品第二名第三名正七品賜進士及第第二甲從七品賜進士出身第三甲正八品賜同進士出身而一品衙門提控正七品出身二品衙門都吏從七品出身一品二品衙門掾史典吏二品衙門令史正八品出身其與進士不甚相逺也後乃立格以限其所至而吏員之與科第髙下天淵矣故明初之制謂之三塗並用薦舉一塗也天順二年十二月庚辰詔罷舉保經明行修及賢良方正以言者謂其奔競冗濫無禆實用也進士監生一塗也吏員一塗也或以科與貢為二塗非也從考試而得者總謂之一塗永樂七年車駕在北京命兵部尚書署吏部事方賓簡南京御史之才者召來賓奏御史張循理等二十八人可用上問其出身賓言循理等二十四人繇進士監生洪秉等四人由吏上曰用人雖不専一塗然御史國之司直必有學識達治體亷正不阿乃可任之若刀筆吏知利不知義知刻薄不知大體用之任風紀使人輕視朝廷遂黜秉等為序班諭自今御史勿復用吏流品自此分矣宣德三年三月丙戌敕諭吏部往時選用嚴慎吏員授官者少比年吏典考滿嵗以千計不分賢否一概録用亷能幾何貪鄙塞路其可不精擇乎蘇州況鍾松江黃子威二郡守並有賢名而徐晞萬祺皆纍官至尚書日知録卷十七
