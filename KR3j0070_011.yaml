body:
  text: 日知録卷十一崑山顧炎武撰權量三代以來權量之制自隋文帝一變杜氏通典言六朝量三升當今一升稱三兩當今一兩尺一尺二寸當今一尺今謂即時左傳定公八年正義曰魏齊斗稱於古二而為一周隋斗稱於古三而為一隋書律厯志言梁陳依古斗齊以古升五升為一斗周以玉升一升當官斗一升三合四勺開皇以古斗三升為一升大業初依復古斗梁陳依古稱齊以古稱一斤八兩為一斤周玉稱四兩當古稱四兩半開皇以古稱三斤為一斤大業初依復古稱今考之傳記如孟子以舉百鈞為有力人三十斤為鈞百鈞則三千斤晉書成帝紀今諸郡舉力人能舉千五百斤以上者史記秦始皇紀金人十二重各千石置宫廷中百二十斤為石千石則十二萬斤漢舊儀祭天養牛五歲至二千斤晉書南陽王保傳自稱重八百斤不應若此之重考工記爵一升觚三升儀禮特牲饋食禮注觚三升獻一爵而酬以觚一獻而三酬則一豆矣禮記宗廟之祭貴者獻以爵賤者獻以散尊者舉觶卑者舉角五獻之尊門外缶門內壺君尊瓦甒注凡觴一升曰爵二升曰觚三升曰觶四升曰角壺大一石瓦甒五斗詩曰我姑酌彼金罍毛說人君以黃金飾尊大一碩每食四簋正義四簋器容㪷二升不應若此之巨周禮舍人喪紀共飯米注飯所以實口君用梁大夫用稷士用稻皆四升管子凡食鹽之數一月丈夫五升少半婦人三升少半嬰兒二升少半史記亷頗傳一飯斗米漢書食貨志食人月一石半趙充國傳以一馬自他負三十日食為米二斛四斗麥八斛胸奴傳計一人三百日食用􅖲十八斛不應若此之多史記河渠書可令畝十石嵇康養生論夫田種者一畝十斛謂之良田晉書傅𤣥傳白田收至十餘斛水田至數十斛今之收穫最多亦不及此數靈樞經人食一日中五升既夕禮朝一溢米莫一溢米注二十兩曰溢為米一升二十四分升之一晉書宣帝紀問諸葛公食可幾何對曰三四升會稽王道子傳國用虗竭自司徒以下日廪七升本皆言少而反得多是知古之權量比之於今大抵皆三而當一也史記孔子世家孔子居魯奉粟六萬索隱曰當是六萬斗正義曰六萬小斗當今二千石也此唐人所言三而當一之驗蓋自三代以後取民無制權量之屬每代遞增至魏孝文太和十九年詔改長尺大㪷依周禮制度班之天下魏書張普惠傳神龜中上疏言高宗廢火斗去長尺改重稱所以愛萬姓從薄賦故海內之人歌舞以供其賦奔走以役其勤天子信於上億兆樂於下自兹以降漸漸長濶百姓嗟怨聞於朝野隋煬帝大業三年四月壬辰改度量權衡並依古式雖有此制竟不能復古至唐時猶有大斗小斗大兩小兩之名而後代則不復言矣山堂考索斛之為制方尺而深尺班志乃云其中容十斗蓋古用之斗小歐陽公集古録有谷口銅甬始元四年左馮翊造其銘曰谷口銅甬容十斗重四十斤以今權量校之容三斗重十五斤斗則三而有餘斤則三而不足吕氏考古圖漢好畤官厨鼎刻曰重九斤一兩今重三斤六兩今六兩當漢之一斤又曰軹家釡三斗弱軹家甑三斗一升當漢之一石大抵是三而當一也古以二十四銖為兩五銖錢十枚計重二兩二銖今稱得十枚當今之一兩弱又漢書王莽傳言天鳯元年改作貨布長二寸五分廣一寸首長八分有奇廣八分其圜好徑二分半足枝長八分間廣二分其文右曰貨左曰布重二十五銖頃富平民掊地得貨布一罌所謂長二十五分者今鈔尺之一寸六分有奇廣一寸者今之六分有半八分者今之五分而二十五銖者今稱得百分兩之四十二俗云四錢二分是則今代之大於古者量為最權次之度又次之矣晉書摯虞傳將作大匠陳協掘地得古尺尚書奏今尺長於古尺宜以古為正潘嶽以為習用已久不宜復改虞駮曰昔聖人有以見天下之賾而擬其形容象物制器以存時用故參兩天地以正算數之紀依律計分以定長短之度其作之也有則故用之也有徴考步兩儀則天地無所隱其情準正三辰則懸象無所容其謬施之金石則音韻和諧措之規矩則器用合宜一本不差而萬物皆正及其差也事皆反是今尺長於古尺幾於半寸樂府用之律吕不合史官用之厯象失占醫術用之孔穴乖錯此三者度量之所繇生得失之所取徴皆絓閡而不得通故宜改今而從古也唐虞之制同律度量衡仲尼之訓謹權審度今兩尺並用不可謂之同知失而行不可謂之謹不同不謹是謂謬法非所以軌物垂則示人之極凡物有多而易改亦有少而難變有改而致煩亦有變而之簡度量是人所常用而長短非人所戀惜是多而易改者也正失於得反邪於正一時之變永世無二是變而之簡者也憲章成式不失其舊物季末茍合之制異端雜亂之用宜以時釐改貞夫一者也臣以為宜如所奏大斗大兩漢書貨殖傳黍十大斗師古曰大斗者異於量米粟之斗也是漢時已有大斗但用之量粗貨耳唐六典凡度以北方秬黍中者一黍之廣為分十分為寸十寸為尺一尺二寸為大尺十尺為丈凡量以秬黍中者容一千二百黍為籥二籥為合十合為升十升為斗三斗為大斗十斗為斛凡權衡以秬黍中者百黍之重為銖應劭曰十黍為絫十絫為銖二十四銖為兩三兩為大兩十六兩為斤凡積秬黍為度量權衡者調鍾律測晷景合湯藥及冠冕之制則用之內外官司悉用大者按唐時權量是古今小大並行太史太常太醫用古杜氏通典云貞觀中張文收鑄銅斛稱尺以今常用度量校之尺當六之五衡量皆三之一舊唐書代宗紀大歷十年八月太常寺奏諸州府所用㪷稱當寺給銅㪷稱州府依樣製造而行從之通典載諸郡土貢上黨郡貢人參三百小兩高平郡貢白石英五十小兩濟陽郡貢阿膠二百小斤鹿角膠三十小斤臨封郡貢石斛十小斤南陵郡貢石斛十小斤同陵郡貢石斛二十小斤此則貢物中亦有用小斤小兩者然皆湯藥之用他有司皆用今久則其今者通行而古者廢矣宋沈括筆談曰豫受詔考鍾律及鑄渾儀求秦漢以來度量計六斗當今之一斗七升九合稱三斤當今十三兩是宋時權量又大於唐也元史言至元二十年頒行宋文思院小口斛又言世祖取江南命輸米者止用宋斗斛以宋一石當今七斗故也是則元之斗斛又大於宋也漢祿言石古時制祿之數皆用斗斛左傳言豆區釡鍾各自其四以登于釡論語與之釡與之庾孟子養弟子以萬鍾皆量也漢承秦制始以石為名韓非子王因收吏璽自三百石已上皆效之子之是時即以石制祿史記燕世家同故有中二千石二千石比二千石千石比千石六百石比六百石四百石比四百石三百石比三百石二百石比二百石百石而三公號萬石百二十斤為石是以權代量然考後漢百官志所載月奉之數則大將軍三公奉月三百五十斛以至斗食奉月十一斛又未嘗不用斛所謂二千石以至百石者但以為品級之差而已汲黯傳注如淳曰真二千石月得百五十斛歲凡得千八百石耳二千石月得百二十斛歲凡得一千四百四十石耳今人以十斗為石本於此不知秦時所謂金人十二重各千石撞萬石之鍾縣石鑄鍾虞衡石程書之類皆權也非量也惟白圭傳穀長石斗淳于髠傳一斗亦醉一石亦醉對斗言之是移權之名於量爾葉夢得巖下放言名生於實凡物皆然以斛為石不知起何時自漢以來始見之石本五權之名漢制重百二十斤為石非量名也以之取民賦祿如二千石之類以榖百二十斤為斛猶之可也若酒言石酒之多少本不係榖數從其取之醇醨以今准之酒之醇者斛止取七斗或六斗而醨者多至於十五六斗若以榖百二十斤為斛酒從其權名則當為酒十五六斗從其量名則斛當榖百八九十斤進退兩無所合是漢酒言石者未嘗有定數也謝肇浙謂古者爵容一升十爵為斗百爵為石以考工記一獻三酬之說準之良然昔人未詳此義至於麵言斛石麵亦未必正為麥百二十斤而麥之實又有大小虛實然沿襲至今莫知為非及弓弩較力言斗言石此乃古法打硾以斤為别而世反疑之乃知名實何常之有史記貨殖傳狐貂裘千皮羔羊裘千石變皮言石亦互文也凡細而輕者則以皮計粗而重者則以石計以錢代銖古算法二十四銖為兩漢軹家釡銘重十斤九銖軹家甑銘重四斤草銖是也近代算家不便乃十分其兩而有錢之名此字本是借用錢幣之錢非數家之正名簿領用之可耳今人以入文字可笑唐書武德四年鑄開通元寶徑八分重二銖四絫絫或作參沈存中曰今蜀部亦以十參為一銖參乃古之絫字積十錢重一兩得輕重大小之中所謂二銖四絫者今一錢之重也後人以其繁而難曉故代以錢字度量皆以十起數惟權則以一籥容千二百黍重十二銖兩之為兩十六兩為斤三十斤為鈞四鈞為石今人改銖為錢而自兩以上則絫百絫千以至於萬而權之數亦以十起矣漢制錢言銖金言斤其名近古宋史律歷志太宗淳化三年三月詔曰書云協時月正日同律度量衡所以建國經而立民極也國家萬邦咸乂九賦是均顧出納於有司繫權衡之定式如聞秬黍之制或差毫釐錘鉤為姦害及黎庶宜令詳定稱法著為通規事下有司監內藏庫崇儀使劉蒙劉承圭言太府寺舊銅式自一錢至十斤凡五十一輕重無準外府藏受黃金必自毫釐計之式自錢始則傷於重遂尋本末别制法物至景德中承圭重加參定而權衡之制益為精備其法蓋取漢志子榖秬黍為則廣十黍以為寸從其大樂之尺秬黍黑黍也樂尺自黃鍾之管而生也謂以秬黍中者為分寸輕重之制就成二術二術謂以尺黍而求氂絫因度尺而求氂度者丈尺之總名謂因樂尺之原起於黍而成於寸析寸為分析分為氂析氂為毫析毫為絲析絲為忽則十匆為一絲十絲為一毫十毫為一氂十氂為一分自積黍而取絫從積黍而取絫則十黍為絫十絫為銖二十四銖為兩絫銖皆以銅為之以氂絫造一錢半及一兩等二稱各懸三毫以星準之等一錢半者以取一稱之法其衡合樂尺一尺二寸重一錢錘重六分盤重五分初毫星準半錢至稍總一錢半析成十五分分列十氂第一毫下等半錢當十五氂若十五斤稱等五斤也中毫至梢一錢析成十分分列十氂末毫至梢半錢析成五分分列十氂等一兩者亦為一稱之則其衡合樂尺一尺四寸重一錢半錘重六錢盤重四錢初毫至梢布二十四銖下别出一星星等五絫每銖之下復出一星等五絫則四十八星等二百四十絫計二千四百絫為一兩中毫至梢五錢布十二銖銖列五星星等二絫布十二銖為五錢之數則一銖等十絫都等一百二十絫為半兩末毫至梢六銖銖列十星星等一絫每星等一絫都等六十絫為二錢半以御書真草行三體淳化錢較定實重二銖四絫為一錢者以二千四百得十有五斤為一稱之則其法初以積黍為準然後以分而推忽為定數之端故自忽絲毫氂黍絫銖各定一錢之則謂皆定一錢之則然後制取等稱也忽萬為分以一萬忽為一分之則以十萬忽定為一錢之則匆者吐絲為匆分者始微而著言可分别也絲則千一千絲為一分以一萬絲定為一錢之則毫則百一百毫為一分以一千毫定為一錢之則毫者氂毛也自匆絲毫三者皆斷驥尾為之氂則十一十氂為一分以一百氂定為一錢之則氂者氂牛尾毛也曵赤金成絲以為之也轉以十倍倍之則為一錢轉以十倍倍之謂自一萬匆至十萬忽之類定為之則也黍以二千四百枚為一兩一籥容千二百黍為十二銖則以二千四百黍定為一兩之則兩者以二籥為兩絫以二百四十謂以二百四十絫定為一兩之則銖以二十四轉相因成十絫為銖則以二百四十絫定成二十四銖為一兩之則銖者言殊異也遂成其稱稱合黍數則一錢半者計三百六十黍之重列為五分則每分計二十四黍又每分析為一十氂則每氂計二黍十分黍之四以一氂分二十四黍則每氂先得二黍都分成四十分則一氂又得四分是每氂得二黍十分黍之四每四毫一絲六忽有差為一黍則毫絫之數極矣一兩者合二十四銖為二千四百黍之重每百黍為銖二百四十黍為二銖四絫二銖四絫為錢二絫四黍為分一絫二黍重五氂六黍重二氂五毫三黍重一氂二毫五絲則黍絫之數成矣先是守藏吏受天下歲輸金幣而太府權衡舊式失準得因之為姦故諸道主者坐逋負而破産者甚衆又守藏更代校計爭訟動必數載至是新制既定姦弊無所措中外以為便度量權衡皆太府掌造以給內外官司及民間之用凡遇改元即令更造各以年號印而識之其印有方印長印八角印笏頭印之别所以明制度而防僞濫也是則今日之以十分為錢十錢為兩者始於宋初所謂新制者也十分為錢古時分乃度之名非權之名說文寸十分也隋書律歷志引易緯通卦驗十馬尾為一分說苑度量權衡以粟一十粟為一分十分為一寸淮南子注同孫子算術蠶所吐絲為忽十忽為秒十秒為毫十毫為氂十氂為分十分為寸漢書律厯志本起黃鍾之長以子穀秬黍中者一黍之廣度之九十黍為黃鍾之長一黍為一分十分為一寸此皆度之名淮南子十二蔈而當一粟宋書律志作標十二粟而當一分十二分而當一銖十二銖而當半兩二十四銖為一兩十六兩為一斤三十斤為一鈞四鈞為石此則權之名史記大宛傳善市賈爭分銖然以十二分為一銖二十四銖為一兩則小於今之為分者多矣陶隱居名醫别録曰古稱惟有銖兩而無分名今則以十黍為一銖六銖為一分四分為一兩十六兩為一斤李杲曰六銖為一分即今之二錢半也此又以二錢半為分則隨人所命而無定名也黃金漢時黃金上下通行故文帝賜周勃至五千斤宣帝賜霍光至七千斤而武帝以公主妻欒大至齎金萬斤漢書作十萬斤衛青出塞斬捕首虜之士受賜黃金二十餘萬斤古來賞賜之數莫侈於元成宗即位賜駙馬蠻子𢃄銀七萬六千五百兩濶里吉思一萬五千四百五十兩高麗王王昛三萬兩其定諸王朝㑹賜與有至金千兩銀七萬五千兩者梁孝王薨藏府餘黃金四十餘萬斤館陶公主近幸董偃令巾府曰董君所發一日金滿百斤錢滿百萬帛滿千匹乃白之王莽禁列侯以下不得挾黃金輸御府受直至其將敗省中黃金萬斤者為一匱尚有六十匱黃門鉤盾藏府中尚方處處各有數匱而後漢光武紀言王莽末天下旱蝗黃金一斤易粟一斛是民間亦未嘗無黃金也董卓死塢中有金二三萬斤銀八九萬斤昭烈得益州賜諸葛亮法正關羽張飛金各五百斤銀千斤南齊書蕭頴胄傳長沙寺僧業富沃鑄黃金為龍數千兩埋土中厯相傳付稱為下方黃鐵莫有見者頴胄起兵乃取此龍以充軍實梁書武陵王紀傳黃金一斤為餅百餅為簉至有百簉銀五倍之自此以後則罕見於史尚書疏漢魏贖罪皆用黃金後魏以金難得令金一兩收絹十匹今律乃贖銅宋太宗問學士杜鎬曰兩漢賜豫多用黃金而後代遂為難得之貨何也對曰當時佛事未興故金價甚賤今以目所睹記及會典所載國初金價推之亦大略可考會典鈔法卷內云洪武八年造大明寶鈔每鈔一貫折銀一兩每鈔四貫易赤金一兩是金一兩當銀四兩也徵收卷內云洪武十八年令凡折收稅糧金每兩准米十石銀每兩准米二石是金一兩當銀五兩也三十年上曰折收逋賦欲以蘇民困也今如此其重將愈困民更令金每兩准米二十石銀每兩准米四石然亦是金一兩當銀五兩也永樂十一年令金每兩准米三十石則當銀七兩五錢矣又令交址召商中鹽金一兩給鹽三十引則當銀十兩矣豈非承平以後日事侈靡上自宫掖下逮勳貴用過乎物之故與遼張孝傑為北府宰相貪貨無厭嘗曰無百萬兩黃金不足為宰相家幼時見萬厯中赤金止七八換崇禎中十換天啓中權奄用事百官獻媚者皆進金巵金價漸貴江左至十三換矣投珠抵璧之風將何時而見與漢書食貨志黃金重一斤直錢萬朱提銀重八兩為一流直一千五百八十他銀一流直千是金價亦四五倍於銀也方勺泊宅編云當時黃金一兩才直錢六百米提銀一兩才直錢二百元史至大銀鈔一兩準至元鈔五貫白銀一兩赤金一錢是金價十倍於銀也史記平準書一黃金一斤漢書食貨志黃金方寸而重一斤莊子百斤注李曰金方寸重一斤百金百斤也漢書韋賢傳賜黃金百斤𤣥成詩曰厥賜祁祁百金泊館是也臣瓚曰秦以一鎰為一金孟康曰二十四兩曰鎰漢以一斤為一金是漢之金已減於秦矣漢書食貨志黃金重一斤直錢萬惠帝紀注師古曰諸賜金不言黃者一斤與萬錢王莽傳故事聘皇后黃金二萬斤為錢二萬萬以公羊隱公五年傳百金之魚注百金猶百萬也古金重一斤若今萬錢古來用金之費如吳志劉繇傳笮融大起浮圖祠以銅為人黃金塗身衣以錦采垂銅盤九重何姬傳注引江表傳孫皓使尚方以金作華燧步搖假髻以千數令宫人著以相撲朝成夕敗輒出更作魏書釋老志興光元年敕有司於五縀大寺內為大祖已下五帝鑄釋迦立像五各長一丈六尺都用赤金二萬五千斤天安中於天宫寺造釋迦立像高四十三尺用赤金十萬斤黃金六百斤齊書東昏侯本紀後宫服御極選珍奇府庫舊物不復周用貴市民間金銀寶物價皆數倍京邑酒租皆折使輸金以為金塗猶不能足唐書敬宗紀詔度支進銅三千斤金薄即箔字十萬翻修清思院新殿及升陽殿圗障五代史閩世家王昶起三清臺三層以黃金數千斤鑄寶皇及元始天尊太上老君像宋真宗作玉清昭應宫甍栱欒楹全以金飾所費巨億萬雖用金之數亦不能全計金史海陵本紀宫殿之飾遍傅黃金而後間以五采金屑飛空如落雪元史世祖本紀建大聖壽萬安寺佛像及窗壁皆金飾之凡費金五百四十兩有奇水銀二百四十斤又言繕寫金字藏經凡縻金二千二百四十四兩吳澄傳言粉黃金為泥寫浮屠藏經用泰定帝紀泰定二年七月庚午以國不足罷書金字藏經措時於雲南立造賣金箔規所此皆耗金之繇也杜鎬之言頗為不妄草木子云金一為箔無復再還元矣故南齊書武帝紀禁不得以金銀為箔宋史真宗紀太中祥符元年二月丙午申明不許以金銀為箔之制仁宗紀康定元年八月戊戌禁以金箔飾佛像哲宋紀元祐二年九月丁卯禁私造金箔劉庠傳仁宗外家李珣犯銷金法庠奏言法行當自貴近始從之金史世宗紀大定七年七月戊申禁服用金絲其織賣者皆抵罪金元史仁宗紀至大四年三月辛卯禁民間製箔銷金織金而太祖實録言上出黃金一錠示近臣曰此表箋袱盤龍金也令宫人洗滌銷鎔得之嗚呼儉德之風逺矣銀唐宋以前上下通行之貨一皆以錢而己未嘗用銀漢書食貨志言秦并天下幣為二等而珠玉龜貝銀錫之屬為器飾寶藏不為幣孝武始造白金三品尋廢不行謝肇浙曰漢銀八兩直錢一千當時銀賤而錢貴今銀一兩即直千錢矣舊唐書憲宗元和三年六月詔曰天下有銀之山必有銅礦銅者可資於鼓鑄銀者無益於生人其天下自五嶺以北見採銀坑並宜禁斷李德裕為浙西觀察使奏云去二月中奉宣令進子計用銀九千四百餘兩其時貯備都無二三百兩然考之通典謂梁初唯京師及三吳荆郢江湘梁益用錢其餘州郡則雜以榖帛交易交廣之域則全以金銀為貨而唐韓愈奏狀亦言五嶺買賣一以銀元稹奏狀言自嶺已南以金銀為貨幣自巴已外以鹽帛為交易黔巫溪峽用水銀朱砂繒綵巾帽以相市杜氏通典載唐度支歲計之數粟則二千五百餘萬石布絹綿則二千七百餘萬端屯匹錢則二百餘萬貫未嘗有銀其土貢則貴州貢銀百兩鄂新黨三州各貢銀五十兩賀州貢銀三十兩邵端昭潘辨高龔潯嚴封春羅牢竇橫象瀧藤平琴亷義栁勤康恩崖萬安二十七州各貢銀二十兩是唐人以銀為貢而不以為賦也張籍詩海國戰騎象蠻州市用銀宋史仁宗紀景祐二年詔諸路歲輸緡錢福建二廣易以銀江東以帛於是有以銀當緡錢者矣金史食貨志舊例銀每鋌五十兩其直百貫舊唐書哀帝紀內庫出方圓銀二千一百七十二兩充見任文武常參官救接是知前代銀皆是鑄成民間或有截鑿之者其價亦隨低昻遂改鑄銀名承安寶貨一兩至十兩分五等每兩折錢二貫公私同見錢用又云更造興定寶泉每貫當通寶五十又以綾印製元光珍貨同銀鈔及餘鈔行之行之未久銀價日貴寶泉日賤民但以銀論價至元光二年寶泉幾于不用哀宗正大間民間但以銀市易此今日上下用銀之始今民間輸官之物皆用銀而猶謂之錢糧蓋承宋代之名當時上下皆用錢也明初所收天下田賦未嘗用銀惟坑冶之課有銀實録於每年之終記所入之數而洪武二十四年但有銀二萬四千七百四十兩至宣德五年則三十二萬二百九十七兩歲辦視此為率按宋蘇轍元祐會計録歲入銀止五萬七千兩元史成宗紀右丞相冗澤言歲入銀止六萬兩而宣德五年奏溫處二府平陽麗水等五縣銀額至八萬七千八百兩蓋所開坑冶漸多當日國家固不恃銀以為用也至正統三年以採辦擾民始罷銀課封閉坑穴而歲入之數不過五千有餘九年閏七月戊寅朔復開福建浙江銀場是年採納已六萬七千一百八十兩乃倉糧折輸變賣無不以銀後遂以為常貨蓋市舶之來多矣太祖實録洪武八年三月辛酉朔禁民間不得以金銀為貨交易違者治其罪有告發者就以其物給之其立法若是之嚴也九年四月己丑許民以銀鈔錢絹代輸今年租稅十九年三月己巳詔嵗解稅課錢鈔有道里險逺難致者許易金銀以進五月己未詔户部以今年秋糧及在倉所儲通㑹其數除存留外悉折收金銀布絹鈔定輸京師此其折變之法雖暫行而交易之禁亦少弛矣正統元年八月庚辰命江南租稅折收金帛會典言浙江江西湖廣三布政司直𨽻蘇松等府先是都察院右副都御史周銓奏行在各衛官員俸糧在南京者差官支給本為便利是時京官俸糧並於南京支給但差來者將各官俸米貿易物貨貴買賤酬十不及一朝廷虗費廪祿各官不得實惠請令該部㑹議歲祿之數於浙江江西湖廣南直𨽻不通舟楫之處各隨土産折收布絹白金赴京充俸巡撫江西侍郎趙新亦言江西屬縣有僻居深山不通舟楫者歲齎金帛於通津之處易米上納南京設遇米貴其費不資今行在官員俸祿於南京支給往返勞費不得實用請令江西屬縣量收布絹或白金類銷成錠運赴京師以准官員俸祿少保兼户部尚書黃福亦有是請至是行在户部復申前議上曰祖宗嘗行之否尚書胡濙等對曰太祖皇帝嘗行於陜西每鈔二貫五百文折米一石黃金一兩折二十石白金一兩折四石絹一匹折一石二斗布一匹折一石各隨所産民以為便後又行於浙江民亦便之上遂從所請每米麥一石折銀二錢五分逺近稱便然自是倉廪之積少矣已上實録全文二年二月甲戊命兩廣福建當輸南京稅糧悉納白金有願納布絹者聽於是巡撫南直𨽻行在工部侍郎周忱奏官倉儲積有餘其年十月壬午遣行在通政司右通政李畛往蘇松常三府將存留倉糧七十二萬九千三百石有奇賣銀准折官軍俸糧三年四月甲寅命糶廣西雲南四川浙江陳積倉糧遂令軍民無挽運之勞而囷庾免陳紅之患誠一時之便計也自折銀之後不二三年頻有水旱之災而設法勸借至千石以上以賑凶荒者謂之義民詔復其家至景泰間納粟之例紛紛四出相傳至今而國家所收之銀不復知其為米矣唐書言天寶中海內豐熾州縣粟帛舉巨萬楊國忠判度支因言古者二十七年耕餘九年食今天下太平請在所出滯積變輕齎內富京師又悉天下義倉及丁租地課易布帛以充天子禁藏當日諸臣之議有類於此踵事而行不免太過相沿日久內實外虛至崇禎十三年郡國大祲倉無見粟民思從亂遂以亡國宣德中以邊儲不給而定為納米贖罪之令其例不一正統三年八月從陜西按察使陳正倫之請改於本處納銀解邉易米雜犯死罪者納銀三十六兩三流二十四兩徒五等視流遞減三兩杖五等一百者六兩九十以下及笞五等俱遞減五錢此後代贖鍰之例所繇始也正統十一年九月壬午巡撫直𨽻工部左侍郎周忱言各處被災恐預備倉儲賑濟不敷請以折銀糧稅悉徴本色於各倉收貯俟青黃不接之際出糶於民以所得銀上納京庫則官既不損民亦得濟從之此文襄權宜變通之法所以為一代能臣也以錢為賦周官太宰以九賦斂財賄注財泉古錢字穀也又曰賦口率出泉也方回古今考不然此說荀子言厚刀布之斂以奪之財而漢律有口算孝惠紀注漢律人出一算算百二十錢此則以錢為賦自古有之而不出於田畝也唐初租出榖庸出絹調出繒布未嘗用錢自兩稅法行遂以錢為惟正之供矣孟子有言聖人治天下使有菽粟如水火菽粟如水火而民焉有不仁者乎繇今之道無變今之俗雖使餘糧棲畝斗米三錢而輸將不辦婦子不寧民財終不可得而阜民德終不可得而正何者國家之賦不用粟而用銀舍所有而責所無故也夫田野之氓不為商賈不為官不為盜賊銀奚自而來哉此唐宋諸臣每致歎於錢荒之害而後又甚焉非任土以成賦重穡以帥民而欲望教化之行風俗之美無是理矣白氏長慶集䇿曰夫賦斂之本者量桑地以出租計夫家以出庸租庸者榖帛而已今則榖帛之外又責之以錢錢者桑地不生銅私家不敢鑄業於農者何從得之至乃吏胥追徴官限迫蹙則易其所有以赴公程當豐歲則賤糶半價不足以充緡錢遇凶年則息利倍稱不足以償逋債豐凶既若此為農者何所望焉是以商賈大族乘時射利者日以富豪田壟罷人望歲勤力者日以貧困勞逸既懸利病相誘則農夫之心盡思釋耒而倚市織婦之手皆欲投杼而刺文至使田卒汙萊室如懸罄人力罕施而地利多鬱天時虛運而歲功不成臣嘗反覆思之實繇榖帛輕而錢刀重也夫糶甚貴錢甚輕則傷人糴甚賤錢甚重則傷農農傷則生業不專人傷則財用不足故王者平均其貴賤調節其重輕使百貨通流四人交利然後上無乏用而下亦阜安方今天下之錢日以減耗或積於國府或滯於私家若復日月徴取歲時輸納臣恐榖帛之價轉賤農桑之業轉傷十年以後其弊必更甚於今日矣今若量夫家之桑地計榖帛為租庸以石斗登降為差以匹夫多少為等但書估價並免稅錢則任土之利載興易貨之弊自革弊革則務本者致力利興則趨末者回心游手於道塗市肆者可易業於西成託迹於軍籍釋流者可返躬於東作所謂下令如流水之原繫人於包桑之本者矣贈友詩曰私家無錢罏平地無銅山胡為秋夏稅歲歲輸銅錢錢力日已重農力日已殫賤糶粟與麥賤貿絲與綿歲暮衣食盡焉得無饑寒吾聞國之初有制垂不刋庸必算丁口租必計桑田不求土所無不强人所難量入以為出上足下亦安兵興一變法兵息遂不還使我農桑人憔悴畎畝間誰能革此弊待君秉利權復彼租庸法令如貞觀年李翺集有疏改稅法一篇言錢者官司所鑄粟帛者農之所出今乃使農人賤賣粟帛易錢入官是豈非顛倒而取其無者邪繇是豪家大商皆多積錢以逐輕重故農人日困末業日增請一切不督見錢皆納布帛宋時歲賦亦止是榖帛其入有常物而一時所需則變而取之使其直輕重相當謂之折變景祐初詔户在第九等免折變熙寧中張方平上疏言比年公私上下並苦乏錢又緣青苖助役之法農民皆變轉榖帛輸納見錢錢既難得榖帛益賤人情窘迫謂之錢荒司馬光亦言江淮之南民間乏錢謂之錢荒蘇軾亦言免役之害聚斂民財於上而下有錢荒之患紹熙元年臣僚言古者賦出於民之所有不强其所無今之為絹者一倍折而為錢再倍折而為銀銀愈貴錢愈難得榖愈不可售使民賤糶而貴折則大熟之歲反為民害願詔州郡凡多取而多折者重置于罰民有糶不售者令常平就糴異時歲歉平價以糶庶於民無傷於國有補從之而真宗時知袁州何蒙請以金折本州二稅上曰若是將盡廢耕農矣不許是宋時之弊亦與唐同而折銀之見於史者自南渡後始也解縉太平十策言及今豐歲宜於天下要害之處每歲積糧若干民樂近輸而國受長久之利計之善者也愚以為天下稅糧當一切盡徴本色除漕運京倉之外其餘則儲之於通都大邑而使司計之臣略倣劉晏之遺意量其歲之豐凶積其價之高下糶銀解京以資國用一年計之不足十年計之有餘小民免稱貸之苦官府省敲朴之煩郡國有凶荒之備一舉而三善隨之矣五銖錢今世所傳五銖錢皆云漢物非也南北朝皆鑄五銖錢陳書世祖紀天嘉三年閏二月甲子改鑄五銖錢魏書言武定之初私鑄濫惡齊文襄王以錢文五銖名須稱實宜稱錢一文重五銖者聽入市用計百錢重一斤四兩二十銖通典注按此則一千錢重十一斤以上而隋代五銖錢一千重四斤二兩當時大小稱之差耳自餘皆準此為數其京邑二市天下州鎮郡縣之市各置二稱懸於市門民間所用之稱皆準市稱以定輕重若重不五銖或雖重五銖而多雜鉛鑞並不聽用然竟未施行隋書高祖既受周禪以天下錢貨輕重不等乃更鑄新錢背面肉好皆有周郭文曰五銖而重如其文每錢一千重四斤二兩悉禁古錢及私錢置樣於關不如樣者沒官銷毁之自是錢幣始一百姓便之是則改幣之議始於齊文襄至隋文帝乃行之而今之五銖亦大抵皆隋物也按四斤二兩是六十六兩每一枚當重六分六釐今五銖錢正符此數不知漢制如何古錢惟五銖及開元通寶最多五銖隋開皇元年鑄開元唐武德四年鑄開元錢自宋以後皆先有年號而後有錢文唐之開元則先有錢文而後有年號舊唐書食貨志曰武德四年鑄開元通寶錢徑八分重二銖四絫積十錢重一兩通典云計一千重六斤四兩每兩二十四銖則一錢重二銖半以下古稱比今稱三之一也則今錢為古稱之七銖以上比古五銖則加重二銖以上又曰開元錢之文給事中歐陽詢制詞及書時稱其工其字含八分及𨽻體其詞先上後下次左後右讀之自上及左回環讀之其義亦通流俗謂之開通元寶錢馬永卿曰開元通寶蓋唐二百八十九年獨鑄此錢雒并幽桂等處皆置監故開元錢如此之多而明皇紀號偶相合耳舊唐書高宗乾封元年四月庚寅改鑄乾封泉寶錢二年正月罷乾封錢復行開元通寶錢錢法之變太祖實録歲辛丑二月置寶源局於應天府鑄大中通寶錢與厯代之錢相兼行使成化元年七月丙辰詔通錢法商稅課程錢鈔中半兼收每鈔一貫折錢四文無拘新舊年代逺近悉驗收以便民用世宗實録嘉靖十五年九月甲子巡視五城御史閻鄰等言國朝所用錢幣有二曰制錢祖宗列聖及皇上所鑄如洪武永樂嘉靖等通寶是也曰舊錢厯代所鑄如開元太平淳化祥符等錢是也百六十年來二錢並用民咸利之至嘉靖所鑄之錢最為精工隆慶萬歷加重半銖而前代之錢通行不廢豫幼時見市錢多南宋年號後至北方見多汴宋年號真行草字體皆備間有一二唐錢自天啓崇禎廣置錢局括古錢以充廢銅於是市人皆擯古錢不用崇禎元年六月丙辰上御平臺召對給事中黃承昊疏中有銷古錢不用語閣臣劉鴻訓奏今河南山東山西陜西皆用古錢若驟廢之於民不便此乃書生見上曰卿言是而新鑄之錢彌多彌惡旋鑄旋銷寶源寶泉二局祗為姦蠧之窟故嘗論古來之錢凡兩大變隋時盡銷古錢一大變天啓以來一大變也昔時錢法之弊至於鵝眼綖環之類無代不有然歷代之錢尚存旬日之間便可澄汰今則舊錢巳盡即使良工更鑄而海內之廣一時難遍欲一市價而裕民財其必用開皇之法乎自漢五銖以來為歷代通行之貨金志謂之自古流行之寶未有廢古而專用今者唯王莽一行之耳考之於史魏熙平初尚書令任城王澄上言請下諸州方鎮其太和及新鑄五銖并古錢內外全好者不限大小悉聽行之梁敬帝太平元年詔雜用古今錢宋史言自五代以來相承用唐舊錢至如宋明帝泰始二年則斷新錢專用古錢矣金世宗大定十九年則以宋大觀錢一當五用矣昔之貴古錢如此明季聽爐頭之說官吏工徒無一不衣食其中而古錢銷盡新錢愈雜地既愛寶火常克金遂有乏銅之患自非如隋文别鑄五銖盡變天下之錢古制不可得而復矣錢者歷代通行之貨雖易姓改命而不得變古後之人主不知此義而以年號鑄之錢文於是易代之君遂以為勝國之物而銷毁之自錢文之有年號始也嘗考之於史年號之興皆自季世宋孝武帝孝建初鑄四銖文曰孝建一邉為四銖其後稍去四銖專為孝建廢帝景和二年鑄二銖錢文曰景和魏孝文帝太和十九年更鑄錢文曰太和五銖孝安帝永安二年更鑄永安五銖此非永世流通之術而髙道穆乃以為論今據古宜載年號蓋未之考耳明季河南陜西各自行錢不相流通既非與民同利之術而市肆之滑乘此以欺愚人窘行旅鹽鐵論言弊數變而民滋僞亮哉斯言矣銅乏銅之患前代已言之江淹謂古劒多用銅如昆吾歐冶之類皆銅也楚子賜鄭伯金盟曰無以鑄兵故以鑄三鐘杜氏注古者以銅為兵延漢書食貨志賈誼言收銅勿令布以作兵器韓夀傳為東郡太守取官銅物候月蝕鑄作刀劒鉤鐔放效尚方事古金三品黑金是鐵赤金是銅黃金是金夏后之時九牧貢金乃鑄鼎於荆山之下董安于之治晉陽公宫令舍之堂皆以鍊銅為柱質荆軻之擊秦王中銅桂而始皇收天下之兵鑄金人十二即銅人也三輔舊事曰聚天下兵器鑄銅人十二各重二十四萬斤漢世在長樂宫門魏志云董卓壞以鑄小錢吳門闔閭冡銅槨三重秦始皇冡亦以銅為槨戰國至秦攻爭紛亂銅不充用故以鐵足之鑄銅既難求鐵甚易是故銅兵轉少鐵兵轉多年甚一年歲甚一歲漸染流遷遂成風俗所以鐵工比肩而銅工稍絶二漢之世愈見其微建安二十四年魏太子鑄三寶刀二匕首天下百錬之精利而悉是鑄鐵不能復鑄銅矣考之於史自漢以後銅器絶少惟魏明帝鑄銅人二號曰翁仲又鑄黃龍鳯凰各一而武后鑄銅為九州鼎用銅五十六萬七百一十二斤唐韓滉為鎮海軍節度以佛寺銅鐘鑄弩牙兵器自此之外寂爾無聞止有銅馬銅駝銅匭之屬昭烈入蜀僅鑄鐵錢而見存於今者如真定之佛蒲州之牛滄州之獅無非黑金者矣唐開元中劉秩上議曰夫鑄錢用不善者在乎銅貴銅貴則採用者衆夫銅以為兵則不如鐵以為器則不如漆禁之無害陛下何不禁於人禁於人則銅無所用銅益賤則錢之用給矣舊唐書食貨志文宗御紫宸殿謂宰臣曰物輕錢重如何楊嗣復對以當禁銅器文宗紀考禁銅之令古人有行之者宋孝武帝孝建三年四月甲子禁人車及酒肆器用銅南史唐𤣥宗開元十七年八月辛巳禁私賣銅鉛錫及以銅為器代宗大歷七年十二月壬子禁鑄銅器德宗貞元九年正月甲辰禁賣劒銅器天下有銅山任人採取其銅官賣除鑄鏡外不得造鑄憲宗元和元年二月甲辰禁用銅器各本紀晉高祖天福三年三月丁丑禁民作銅器通鑑宋高宗紹興二十八年七月己卯命取公私銅器悉付鑄錢司民間不輸者罪之宋史本紀然後世行之不免更為罔民之事惟有銷錢鑄錢上下相蒙而此日之錢固無長存之術矣南齊書劉悛傳永明八年悛啓世祖曰南廣郡界蒙山下有城名蒙城可二頃地有燒爐四所從蒙城渡水南百許步平地掘土深二尺得銅有古掘銅坑并居宅處猶存鄧通南安人漢文帝賜通嚴道縣銅山鑄錢今蒙山在青衣水南故秦之嚴道也蒙山去南安二百里此必是通所鑄甚可經略并獻蒙山銅一片又銅石一片平州鑄鐵刀一口上從之遣使入蜀鑄錢魏書食貨志熙平二年尚書崔亮奏恆農郡銅青谷有銅礦計一斗得銅五兩四銖葦池谷礦計一斗得銅五兩鸞帳山礦計一斗得銅四兩河南郡王屋山礦計一斗得銅八兩南青州苑燭山齊州商山並是往者銅官舊迹既有冶利所宜開鑄從之舊唐書韓洄傳為户部侍郎判度支上言商州有紅崖冶出銅又有洛源監久廢不理請鑿山取銅置十爐鑄錢而罷江淮七監從之冊府元龜元和初鹽鐵使李㢲上言郴州平陽高亭兩縣界有平陽冶及馬迹曲木等古銅坑約二百八十餘并請於郴州舊桂陽監置爐兩所採銅鑄錢宋史食貨志舊饒州永平監歲鑄錢六萬貫平江南增為七萬貫而銅鉛錫常不給轉運使張齊賢訪求得南唐承㫖丁釗能知饒信等州山谷産銅鉛錫乃便宜調民采取且詢舊鑄法惟永平用唐開元錢料最善即詣闕面陳詔增市鉛錫炭價於是得銅八十一萬斤鉛二十六萬斤錫十六萬斤歲鑄錢三十萬貫此皆前代開採之迹實録洪武二十年正月丙子府軍前衛老校丁成言河南陜州地有上絞下絞上黃塘下黃塘者舊産銀礦前代皆嘗採取歲收其課今錮間已久採之可資國用上謂侍臣曰凡言利之人皆戕民之賊也朕聞元時江西豐城民告官採金其初歲額猶足取辦經久民力消耗一州之人卒受其害蓋物産有時而窮歲額則終不可減有司貪為巳功而不以言朝廷縱有恤民之心而不能知此可以為戒豈宜效之通鑑周世宗顯德元年九月丙寅朔敕立監採銅鑄錢自非縣官法物軍器及寺觀鐘磬鈸鐸之類聽留外其餘民間銅器佛像五十日內悉令輸官給其直過期隱匿不輸五斤以上其罪死不及者論刑有差洪武二十年四月工部右侍郎秦逵言寶源局鑄錢乏銅請令郡縣收民間廢銅以資鼓鑄上曰鑄錢本以便民今欲取民廢銅以鑄錢朕恐天下廢銅有限斯令一出有司急於奉承小民迫於誅責必至毁器物以輸官其為民害甚矣姑停之上謂侍臣曰卿輩勿以毁佛為疑夫佛以善道化人茍志於善斯奉佛矣彼銅像豈所謂佛邪且吾聞佛在利人雖頭目猶捨以布施若朕身可以濟民亦非所惜也五代史高麗地産銅銀周世宗時遣尚書水部員外郎韓彥卿以帛數千匹市銅於高麗以鑄錢顯德六年高麗王昭遣使者貢黃銅五萬斤錢面自古鑄錢若漢五銖唐開元宋以後各年號錢皆一面有字一靣無字儲泳曰自昔以錢之有字處為隂無字處為陽古者鑄金為貨其陰則紀國號如鏡陰之有欵識也凡器物之識必書於其底與此同義沿襲既久遂以漫處為背漫亦謂之幕見漢書西域傳舊唐書栁仲郢傳作模近年乃有别鑄字於漫處者天啓大錢始鑄一兩字崇禎錢有户工等字錢品益雜而天下亦亂按唐㑹昌中淮南節度使李紳請天下以州名鑄錢京師為京錢未幾武宗崩宣宗立遂廢之無字謂之陽有字謂之陰儀禮疏筮法古用木畫地今則用錢以三少為重錢凡言多少者皆歸餘之數重錢則九也三多為交錢交錢則六也兩多一少為單錢單錢則七也兩少一多為折錢折錢則八也今人以錢筮者猶如此今人用錢以筮以三漫為重爻為陽三字為交爻為陰二字一漫以一漫為主故為單爻二漫一字以一字為主故為折爻猶易傳所云陽卦多陰陰卦多陽之意錢以有字處為陰是知字乃錢之背也碑之背亦名為陰短陌隋書食貨志曰梁大同後自破嶺以東錢以八十為百名曰東錢江郢以上七十為百名曰西錢京師以九十為百名曰長錢中大同元年乃詔通用足陌梁書武帝紀中大同元年七月丙寅詔曰朝四暮三衆狙皆喜名實未虧而喜怒為用頃聞外間多用九陌錢陌減則物貴陌足則物賤至於逺方日更滋甚豈直國有異政乃至家有殊俗徒亂王制無益民財自今可通用足陌錢令書行後百日為期若猶有犯男子謫運女子質作並三年字沈存中曰百錢謂之陌者借陌字用之其實只是百如什與伍耳阡伯字皆從人今俗書作阡陌而皆從阜非也指田之阡陌當從阜漢志或從人蓋古字通用詔下而人不從錢陌益少至於末年遂以三十五為百唐憲宗元和中京師用錢每貫頭除二十文穆宗長慶元年以所在用錢墊陌不一敕內外公私給用錢宜每貫一例除墊八十以九百二十文成貫至昭宗末京師以八百五十為貫每陌才八十五河南府以八十為陌舊唐書哀帝紀天祐二年四月丙辰敕河南府自今市肆交易並以八十五文為陌不得更有改移漢隱帝時王章為三司使聚斂刻急舊制錢出入皆以八十為陌章始令入者八十出者七十七謂之省陌宋史言宋初凡輸官者亦用八十或八十五為百諸州私用則各隨其俗至有以四十八為百者太平興國中詔所在以七十七為百金史言大定中民間以八十為陌謂之短錢官用足陌謂之長錢大名男子幹魯補者上言謂官司所用錢皆當以八十為陌遂為定制衰季之朝與亂同事大抵如此而抱朴子云取人長錢還人短陌則是晉時已有之不始於梁也今京師錢以三十為陌亦宜禁止鈔鈔法之興因於前代未以銀為幣而患錢之重乃立此法唐憲宗之飛錢即如今之會票也宋張詠鎮蜀以鐵錢重不便貿易於是設質劑之法一交一緡以三年為一界而換之天聖間遂置交子務元史劉宣言原交鈔所起漢唐以來皆未嘗有宋紹興初軍餉不繼造此以誘商旅為沿邉糴買之計比銅錢易於齎擎民甚便之稍有滯礙即用見錢尚存古人子母相權之意日增月益其法寖弊趙孟俯亦言古者以米絹民生所須謂之二實銀錢與二物相權謂之二虗鈔乃宋時所創施於邉郡金人襲而用之皆出於不得已然宋人已嘗論之謂無錢為本亦不能以空文行今日上下皆銀輕裝易致而楮幣自無所用周必大二老堂雜志近歲用會子乃四川交子法特官券耳不知何人目為楮幣遂入殿試御題若正言之猶紙錢也乃以為文何邪故洪武初欲行鈔法至禁民間行使金銀以姦惡論而卒不能行及乎後代銀日盛而鈔日微勢不兩行灼然易見乃崇禎之末倪公元璐掌户部必欲行之行鈔之議始於天啓初禮科惠世楊及崇禎末有蔣臣者復申其說擢為户部司務終不可行而止其亦未察乎古今之變矣議者但言洪武間鈔法通行考之實録二十七年八月丙戌禁用銅錢矣其時即有以錢百六十折鈔一貫者故詔禁之大明㑹典洪武二十七年令軍民商賈所有銅錢有司收歸官依數換鈔不許行使正統十三年五月庚寅禁使銅錢時鈔既通行而市㕓亦仍以銅錢交易每鈔一貫折銅錢二文監察御史蔡愈濟以為言請出榜禁約令錦衣衛五城兵馬司巡視有以銅錢交易者掠治其罪十倍罰之上從其請三十年三月甲子禁用金銀矣三十五年十二月甲寅命俸米折支鈔者每石增五貫為十貫是明初造鈔之後不過數年而其法已漸壞不行於是有姧惡之條充賞之格而卒亦不能行也永樂元年四月丙寅以鈔法不通下令禁金銀交易犯者准姧惡論有能首捕者以所交易金銀充賞其兩相交易而一人自首者免坐賞與首捕同徙二年二月戊午詔自今有犯交易銀兩之禁者免死家興州屯戍蓋昏爛倒換出入之弊必至於此乃以鈔之不利而并錢禁之廢堅剛可久之貨而行軟熟易敗之物宜其弗順於人情而卒至於滯閣正統十年山西布政司奏庫貯鈔貫朽爛不堪用者五十九萬三千錠有竒敕令焚燬後世興利之臣慎無言此可矣自鈔法行而獄訟滋多於是有江夏縣民父死以銀營葬具而坐以徙邊者矣有給事中丁環奉使至四川遣親吏以銀誘民交易而執之者矣並永樂二年三月舍烹鮮之理就揚沸之威去冬日之溫用秋荼之密天子亦知其拂於人情而為之戒飭然其不達於天聽不登於史書者又不知凡幾也孟子曰焉有仁人在位罔民而可為也若鈔法者其不為罔民之一事乎元史世祖至元十七年中書省議流通鈔法凡賞賜宜多給幣帛課程宜多收鈔於是陳瑛祖之請通計户口食鹽納鈔又詔令課程贓罰等物悉輸鈔永樂五年三月甲申又詔令笞杖定等輸鈔贖罪二十二年十月癸卯又令權增市肆門攤課程收鈔洪熙元年正月庚寅又令倒死虧缺馬駝等畜並輸鈔又令各缺羊皮魚鰾翎毛等物並輸鈔並宣德元年十月乙亥又令塌坊果園舟車裝載並納鈔四年六月壬寅今之鈔關始此欲以重鈔而鈔不行於是制為阻滯鈔法之罪有不用鈔一貫者罰納千貫親鄰里老旗甲知情不首依犯者一貫罰百貫其關閉鋪店潛自貿易及擡高物價之人罰鈔萬貫知情不首罰千貫三年六月癸卯有阻滯鈔法者令有司於所犯人每貫追一萬貫入官全家發戍邊逺正統十三年五月辛丑而愈不可行矣宣德三年六月己酉詔停造新鈔已造完者悉收庫不許放支其在庫舊鈔委官選揀堪用者備賞賚不堪者燒燬天子不能與萬物爭權信夫正統元年黃福疏言洪武間銀一兩當鈔三五貫今銀一兩當鈔千餘貫前明㑹典國初止有商稅未嘗有船鈔至宣德間始設鈔關夫鈔關之設本藉以收鈔而通鈔法也鈔既停則關宜罷矣如果園菜園之征未久而罷乃猶以為利國之一孔而因仍不革豈非戴盈之所謂以待來年者乎宣德中浙江按察使林碩江西副使石璞纍奏洪武初鈔重物輕所以當時定律官吏受贓枉法八十貫律絞方今物重鈔輕茍非更革刑必失重乞以銀米為準未行至正統五年十一月行在刑部都察院大理寺議今後文職官吏人等受枉法贓比律該絞者有祿人估鈔八百貫之上無祿人估鈔一千二百貫之上俱發北方邊衛充軍亦可以見鈔直之低昻矣僞銀今日上下皆用銀而民間巧詐滋甚非直紿市人且或用以欺官長濟南人家專造此種僞物至纍十纍百用之殆所謂為盜不操矛弧者也律凡僞造金銀者杖一百徒三年為從及知情買使者各減一等其法既輕而又不必行故民易犯夫刑罰世輕世重視其敝何如爾漢時用黃金孝景中六年十二月定鑄錢僞黃金弃市律造僞黃金與私鑄錢者同弃市劉更生以典尚方作黃金不成劾以鑄僞黃金繫當死武帝元鼎五年飲酎少府省金而列侯坐酎金失侯者百餘人如淳曰漢儀注金少不如斤兩及色惡王削縣侯免國宋太祖開寶四年十月己巳詔僞作黃金者棄市而唐文宗太和三年六月依中書門下奏以鉛錫錢文易者過十貫以上所在集衆决殺今僞銀之罪不下於僞黃金而重於以鉛錫錢交易宜比前代之法置之重辟實録正統十一年三月癸未從順天府大興縣知縣馬聰言造僞銀者發邉衛充軍而景泰元年十一月賞北蕃有假金三兩致也先遣使來言是則法之不行遂有以此欺朝廷者矣庶可以革姧而反朴也漢既以錢為貨而銅之為品不齊故水衡都尉其屬有辨銅令丞此亦周官職金之遺意日知録卷十一
