body:
  text: 日知錄卷十五崑山顧炎武撰陵古王者之葬稱墓而已左傳曰殽有二陵其南陵夏后皋之墓也書傳亦言桐宮湯墓周官冢人掌公墓之地並言墓不言陵及春秋以降乃有稱丘者楚昭王墓謂之昭丘趙武靈王墓謂之靈丘而呉王闔閭之墓亦名虎丘蓋必其因山而髙大者故二三君之外無聞焉史記趙世家肅侯十五年起壽陵秦本紀惠文王葬公陵悼武王葬永陵孝文王葬壽陵始有稱陵者後漢書東平憲王蒼傳言園邑之興始自彊秦通典襄陵有晉襄公之陵至漢則無帝不稱陵矣宋施㝛㑹稽志曰自先秦古書帝王墓皆不稱陵而陵之名實自漢始非也墓祭太甲之書曰王徂桐宮居憂此古人廬墓之始曽子問宗子去在他國庶子無爵而居者可以祭乎孔子曰祭哉請問其祭如之何孔子曰向墓而為壇以時祭若宗子死告於墓而後祭於家此古人祭墓之始史記周本紀武王上祭於畢馬融曰畢文王墓地名也此緯書之言不可信記言古不墓祭宗子去在他國事之變也將祭而為壇禮之權也秦興西戎宗廟之禮無聞而特起寝殿於墓側見漢官儀皆宋書禮志漢氏諸陵有園寝者承秦所為也説者以為古前廟後寝以象人君前有朝後有寝也廟以藏王四時祭祀寝有衣冠象生之其以薦新漢之西京已崇此禮叔孫通傳言為原廟渭北衣冠月出游之師古曰從髙帝陵寝出衣冠游於髙廟每月一為之韋𤣥成傳言園中各有寝便殿日祭於寝月祭於廟時祭於便殿寝日四上食廟歲二十五祠便殿歲四祠此皆承秦之制故黷於祭祀如此後漢明帝永平元年春正月帝率公卿已下朝於原陵如元㑹儀而上陵之禮始興蔡邕記曰昔京師在長安時其禮不可盡得聞也光武即世始葬於此明帝嗣位踰年羣臣朝正感先帝不復聞見此禮乃帥公卿百寮就園陵而創焉每正月上丁祀郊廟畢以次上陵百官四姓親家婦女公主諸王大夫外國朝者侍子郡國計吏㑹陵八月飲酎禮亦如之雒陽諸陵皆以晦朔二十四氣伏臘及四時祠廟日上飯太官送用物園令食監典省其親陵所宮人隨鼓漏理被枕具盥水陳妝具貢禹奏言武帝取好女數千人填後宮及棄天下昭帝幼弱霍光專事不知禮正皆以後宮女置於園陵今杜陵有宮人數百外戚傳許后上疏有杜陵梁美人又云成帝崩班倢伃充奉園陵薨因葬園中而張厰書言昌邑哀王歌舞者張脩等十人無子又非姬俱良人無官名王薨當罷歸太傅豹等擅留以為哀王園中人不當罷翼奉亦言諸侯王園宜出其過制者是諸侯王園亦有之矣是以安帝尊母孝德皇元妃耿氏為甘陵大貴人桓帝尊母匽氏為博園貴人靈帝尊母董氏為慎園貴人皆以陵園為名向程氏演繁露曰魏武置宮人銅雀臺令月朝十五輒帳作伎陸機為文譏之不知其來有自矣而十七年正月明帝當謁原陵夜夢先帝太后如平生歡既寤悲不能寐即案厯明旦日吉遂率百官及故客上陵其日甘露降於陵樹帝令百官采取以薦㑹畢帝從席前伏御牀視太后鏡奩中物感動悲涕令易脂澤妝具左右皆泣莫能仰視焉此特士庶人之孝而史傳之以為盛節故陵之崇廟之殺也禮之瀆敬之衰也明帝遺詔無起寢廟藏主於光烈皇后更衣别室而七廟之制遂廢蔡邕以為天子事亡如存之意禮有煩而不可省者殆曲為之説也魏武帝葬髙陵有司依漢立陵上祭殿至文帝黃初三年乃詔曰先帝躬履節儉遺詔省約子以述父為孝臣以繼事為忠古不墓祭皆設於廟髙陵上殿屋皆毁壞車馬還廐衣服藏府以從先帝儉德之志及文帝自作終制又曰壽陵無立寝殿造園邑晉宣王遺令子弟羣官並不得謁陵猶為近古宋書禮志晉宣帝遺詔子弟羣官皆不得謁陵於是景文遵旨至武帝猶再謁崇陽陵一謁峻平陵然遂不敢謁髙原陵至惠帝復止也逮江左初元帝崩後諸公始有謁陵辭陵之事蓋由眷同㕛執率情而舉非雒京之舊也成帝時中宮亦年年拜陵議者以為非禮於是遂止以為永制睠晉書王導傳自漢魏已來羣臣不拜山陵導以元帝同布衣匪惟君臣而已每一崇進皆就拜不勝哀戚由是詔百官拜陵自導始也梁武帝後周明帝始皆謁陵唐太宗𤣥宗亦並行之唐書彭景直傳景龍末為太常博士時獻昭乾三陵皆日祭景直請罷不從開元二十年敇寒食上墓宜編入五禮永為恒式胡三省曰唐開元敕寒食上墓禮經無文近代相傳寖以成俗宜許上墓同拜埽禮蓋但許士庶之家行之而人君無此禮也五代㑹要言後唐莊宗每年寒食出祭謂之破散其後襲而行之歐陽公五代史所謂寒食野祭而焚紙錢即謂此也而陵寝亦有衣冠嬪御之制杜子美橋陵詩宮女晚知曙祠官朝見星韓退之豐陵行曰臣聞神道尚清靜三代舊制存諸書墓藏廟祭不可亂欲言非職知何如蓋深非之也若明代之制無車馬無宫人不起居不進奉亦庶幾得禮之中者與古人於墓之禮但有奔喪去國二事記曰奔喪者不及殯先之墓北面坐哭盡哀主人之待之也即位于墓左婦人墓右成踊盡哀又曰若除喪而後歸則之墓哭成踊束括髮袒絰拜賔成踊送賔反位又哭盡哀遂除於家不哭又曰奔兄弟之喪先之墓而後之家為位而哭所知之喪則哭於宫而後之墓又曰去國則哭於墓而後行反其國則不哭展墓而入魯昭公之孫于齊也與臧孫如墓謀遂行呉延州來季子之於王僚也復命哭墓是則古人之至於墓皆有哭泣哀傷之事而祭者吉禮也無舍廟而之墓者也孟子言孔子没子貢築室於塲獨居三年然後歸曲沃衞萬曰古人為廟以依神無廬墓之事門人既不得奉其廟祀而但廬於冡上以盡其情此亡於禮者之禮也漢以來乃有父母終而廬墓者不知其置神主何地其奉之墓次歟是野祭之也其空置之祠堂歟是視其體魄反過其神也而慤者以此悖先王之禮偽者以此博孝子之名至於今而此風猶未已也且孝如曽子未嘗廬墓孔子封防既反而弟子後至古人豈有廬墓之事哉史記孔子世家魯世世相傳以歲時奉祀孔子冢史言上冢者自孔子留侯二世家始而諸儒亦講禮鄉飲大射於孔子冢孔子冢大一頃故所居堂弟子内後世因廟藏孔子衣冠琴車書夫禮教出於聖人之門豈有就冢而祭至鄉飲大射尤不可於冢上行之蓋孔子教於洙泗之間所葬之冢在講堂之後孔子既殁弟子即講堂而祀之且行飲射之禮太史公不達以為祭於冢也漢人以宗廟之禮移於陵墓有人臣而告事於陵者蘇武自匈奴還詔奉一太牢謁武帝園廟是也有上冢而㑹宗族故人及郡邑之官者樓護為諫大夫使郡國過齊上書求上先人冢因㑹宗族故人班伯上書願過故郡上父祖冢有詔太守都尉以下㑹是也有上冢而太官為之供具者董賢為侍中駙馬都尉上冢有㑹輒太官為供是也有贈諡而賜之於墓者陰興夫人卒肅宗使五官中郎將持節即墓賜䇿追諡興曰翼侯是也有人主而臨人臣之墓者光武至湖陽幸樊重墓霍峻葬成都先主率羣寮臨㑹弔祭因留宿墓上是也有庶民而祭古賢人之墓者曹昭東征賦蘧氏在城之東南兮民亦饗其丘墳文選作尚水經注引此作饗是也人情所趨遂成習俗其流之弊有如楊倫行喪於恭陵者矣有如趙宣葬親而不閉埏隧因居其中行服二十餘年者矣陳蕃傳至乃市賈小民相聚為宣陵孝子者數十人皆除太子舎人而禮教於斯大壞矣招魂之葬於古未聞三輔黃圖言漢太上皇陵在櫟陽北原在東者太上皇在西者昭靈后髙帝母起兵時死於小黃則疑其始於此矣晉東海王越柩為石勒所焚妃裵氏渡江欲招魂葬越元帝詔有司詳議博士傅純曰聖人制禮以事縁情設冢槨以藏形而事之以凶立廟祧以安神而奉之以吉送形而往迎精而還此墓廟之大分形神之異制也至於室廟寝廟祊祭非一處所以廣求神之道而獨不祭於墓明非神之所處也今亂形神之别錯廟墓之宜違禮失義莫大於此於是下詔不許唐髙宗顯慶三年十一月伊麗道行軍副總管蕭嗣業擒阿史那賀魯至京師甲午獻於昭陵總章元年十月司空李勣破髙麗俘髙藏男建男産等至京師獻於昭陵許敬宗言古者軍凱旋則飲至於廟未聞獻馘於陵者然陛下奉園寝與宗廟等可行不疑此亦所謂自我作古者矣唐時陵寝嘗有鷹犬之奉𤣥宗開元二年四月辛未詔曰園陵之地衣冠所游凡厥有司罔不祗事頃者别致鷹狗供奉山陵至於料度極多費損昔戒禽荒既非尋常所用遠惟龍馭每以仁愛為心彼耕象而耘鳥且増哀慕豈飛蒼而走黃更備畋獵有乖儀式無益崇嚴諸陵所有供奉鷹狗等並宜即停天寶二年八月制曰禋祀者所以展誠敬之心薦新者所以申霜露之思自流火届期商風改律載深追遠感物增懷且詩著授衣令存休澣在於臣子猶及恩私恭事園陵未標典式自今以後每至九月一日薦衣於寝陵貽範千載庶展孝思且仲夏端午事無典實傳之淺俗遂乃移風況乎以孝道人因親設教感游衣於漢紀成獻報於禮文宣示庶寮令知朕意今闗中之俗有所謂送寒衣者其遺教也今俗乃用十月一日厚葬晉書索綝傳建興中盜發漢霸杜二陵文帝覇陵宣帝杜陵多獲珍寶帝問綝曰漢陵中物何乃多耶綝對曰漢天子即位一年而為陵天下貢賦三分之一供宗廟一供賔客一充山陵武帝享年久長比崩而茂陵不復容物其樹皆已可拱赤眉取陵中物不能減半於今猶有朽帛委積珠玉未盡此二陵謂霸杜是儉者耳亦百世之誡漢書王莽傳赤眉發掘園陵惟霸陵杜陵完按史記孝文紀言治霸陵皆以瓦器不得以金銀銅錫為飾而劉向諫昌陵疏亦以孝文薄葬足為後王之則然攷之張湯傳則武帝之世已有盜發孝文園瘞錢者矣蓋自春秋列國以來厚葬之俗雖以孝文之明達儉約且猶不能盡除而史䇿所書未必皆為實錄也左傳成公二年八月宋文公卒始厚葬用蜃炭益車馬始用殉重器備椁有四阿棺有翰檜君子謂華元樂舉於是乎不臣臣治煩去惑者也是以伏死而爭今二子者君生則縱其惑死又益其侈是棄君於惡也何臣之為呂氏春秋節喪篇曰審知生聖人之要也審知死聖人之極也知生也者不以害生養生之謂也知死也者不以害死安死之謂也此二者聖人之所獨決也凡生於天地之間其必有死所不免也孝子之重其親也慈親之愛其子也痛於肌骨性也所重所愛死而棄之溝壑人之情不忍為也故有葬死之義葬也者藏也慈親孝子之所慎也慎之者以生人之心慮以生人之心為死者慮也莫如無動莫如無發無發無動莫如無有可利則此之謂重閉古之人有藏於廣野深山而安者矣非珠玉國寶之謂也葬不可不藏也葬淺則狐貍抇之抇讀為掘深則及於水泉故凡葬必於髙陵之上以避狐貍之患水泉之濕此則善矣而忘姦邪盜賊宼亂之難豈不惑哉譬之若瞽師之避柱也避柱而疾觸杙也狐貍水泉姦邪盜賊宼亂之患此杙之大者也慈親孝子避之者得葬之情矣善棺椁所以避螻蟻蛇蟲也今世俗大亂之主愈侈其葬則心非為乎死者慮也生者以相矜尚也侈靡者以為榮儉節者以為陋不以便死為故而徒以生者之誹譽為務此非慈親孝子之心也民之於利也犯流矢蹈白刃渉血盩肝以求之盩古抽字野人之無聞者忍親戚兄弟知交以求利今無此之危無此之醜其為利甚厚乘車食肉澤及子孫雖聖人猶不能禁而況於國彌大家彌富葬彌厚含珠鱗施含珠口實也鱗施施玉於死者之體若魚鱗也玩好貨寶鐘鼎壺濫以冰置水漿於其中為濫取其冷也轝馬衣被戈劒不可勝數諸養生之具無不從者題湊之室室椁也題湊復累棺椁數襲積石積炭以環其外姦人聞之傳以相告上雖以嚴威重罪禁之猶不可止且死者彌久生者彌疏生者彌疏則守者彌怠守者彌怠而葬器如故其勢固不安矣安死篇曰世之為丘壟也其髙大若山其樹之若林其設闕庭為宫室造賔阼也若都邑以此觀世示富則可矣以此為死則不可也夫死其視萬歲猶一瞚也瞚古瞬字人之壽久之不過百中壽不過六十以百與六十為無窮者之慮其情必不相當矣以無窮為死者之慮則得之矣今有人於此為石銘置之壟上曰此其中之物具珠玉玩好財物寶器甚多不可不抇抇之必大富世世乘車食肉人必相與笑之以為大惑世之厚葬也有似於此自古及今未有不亡之國也無不亡之國是無不抇之墓也以耳目所聞見齊荆燕嘗亡矣齊湣王楚平王燕王㑹宋中山已亡矣趙魏韓皆亡矣作書之時秦初并三晉其皆故國矣自此以上者亡國不可勝數上猶前也是故大墓無不抇也而世皆爭為之豈不悲哉君之不令民父之不孝子兄之不悌弟皆鄉里之所釜䰛者而逐之䰛鬲同史記蔡澤傳入韓魏遇奪釜鬲於塗憚耕稼采薪之勞不肯官人事而祈美衣侈食之樂智巧窮屈無以為之於是乎聚羣多之徒以深山廣澤林藪扑擊遏奪又視名丘大墓葬之厚者求舎便居以㣲抇之日夜不休必得所利相與分之夫有所愛所重而令姦邪盜賊宼亂之人卒必辱之此孝子忠臣親父交㕛之大事堯葬於穀林通樹之舜葬於紀市不變其肆禹葬於㑹稽不變人徒變動也言無所興造不擾民也是故先王以儉節葬死也非愛其費也非惡其勞也以為死者慮也先王之所惡惟死者之辱也發則必辱儉則不發故先王之葬必儉必合必同何謂合何謂同葬於山林則合乎山林葬於陵隰則同乎陵隰此之謂愛人夫愛人者衆知愛人者寡故宋未亡而東冢抇東冢文公冢也文公厚葬故冢被發也冢在城東因謂之東冢齊未亡而莊公冢抇莊公名購僖公之父在位六十四年國安寧而猶若此又況百世之後而國已亡乎故孝子忠臣親父交㕛不可不察於此也夫愛之而反危之其此之謂乎魯季孫有喪孔子往弔之入門而左從客也主人以璠璵收此季平子意如之喪也主人桓子斯也收斂也孔子徑庭而趨歴級而上曰以寶玉收譬之猶暴骸中原也言必發抇徑庭歴級非禮也雖然以救過也前代陵墓漢髙帝十二年十二月詔曰秦皇帝楚隱王師古曰陳勝也魏安釐王齊愍王趙悼襄王皆絶亡後其與秦皇帝守冢二十家楚魏齊各十家趙及魏公子無忌師古曰即信陵君也各五家令視其冢復亡以與他事魏明帝景初二年五月戊子詔曰昔漢髙創業光武中興謀除殘暴功昭四海而墳陵崩頽童兒牧豎踐蹋其上非大魏尊崇所承代之意也其表髙祖光武陵四面各百歩不得使民耕牧樵采宋武帝永初元年閏月壬午朔詔曰晉世帝后及藩王諸陵守衞宜便置格其名賢先哲見優前代或立德著節或寧亂庇民墳墓未遠並宜灑埽主者具條以聞南齊明帝建武二年十二月丁酉詔曰舊國都邑望之悵然況乃身經南面負扆宸居或功濟當時德章一世而塋壟欑穢封樹不修豈直嗟深牧豎悲甚信陵而已哉昔中京淪覆鼎玉東遷晉元締構之始簡文遺詠在民而松門夷替埏路榛蕪雖年代殊往撫事興懷晉帝諸陵悉加脩理并増守衞梁武帝天監六年詔曰命世興王嗣賢傳業聲稱不朽人代徂遷二賔以位三恪義在時事寖遠㝛草榛蕪望古興懷言念愴然晉宋齊三代諸陵有司勤加守護勿令細民侵毁作兵有少補使充足前無守視並可量給文選載任昉為卞彬謝脩卞忠貞墓啟魏髙祖太和二十年五月丙戍詔漢魏晉諸帝陵各禁方百歩不得樵蘇踐藉孝明熈平元年七月詔曰先賢列聖道冠生民仁風盛德煥乎圖史暨厯數永終迹隨物變陵隧杳靄鞠為茂草古帝諸陵多見踐藉可明敕所在諸有帝王墳陵四面各五十歩勿聽樵牧隋煬帝大業二年十二月庚寅詔曰前代帝王因時創業君民建國禮尊南面而厯運推移年世永久丘壟殘毁樵牧相趨塋兆堙蕪封樹莫辨興言淪滅有愴於懷自古以來帝王陵墓可給隨近十户蠲其雜役以供守視唐太宗詔見下唐𤣥宗天寶三載十二月詔自古聖帝明王陵墓有頽毁者宜令管内量事脩葺仍明立標記禁其樵采古人於異代山陵必為之脩護若此陳書淳于量傳坐就江陰王蕭季卿買梁陵中樹季卿坐免量免侍中宋熈寜中興利之臣建議前代帝王陵寝許民請射耕􅛮而唐之諸陵悉見芟削昭陵喬木翦伐無遺宋史鄧潤甫傳小民何識自上導之靡存愛樹之思但逐樵蘇之利吁非一朝之故矣金太宗天㑹二年二月詔有盜發遼諸陵者罪死七年二月甲戌詔禁醫巫閭山遼代山陵樵采金史斡魯古孛堇傳乾州後為閭陽縣遼諸陵多在此禁無所犯獨元之世祖縱楊璉真伽發宋㑹稽攢宫不問此自古所無之大變也元史楊璉真伽為江南釋教總統發掘故宋趙氏諸陵之在錢塘紹興者及其大臣冢墓凡一百一所實錄洪武九年八月己酉遣國子生周渭等三十一人分視歴代帝王陵寝命百歩内禁人樵牧設陵户二人守之有經兵燹而崩摧者有司督近陵之民以時封培每三年一遣使致祭其後每登極詔書並有此文而有司之能留意者鮮矣魏髙祖太和十九年九月丁亥詔曰諸有舊墓銘記見存昭然為時人所知者三公及位從公者去墓三十歩尚書令僕九列十五歩黃門五校十歩各不聽􅛮殖陳文帝天嘉六年八月丁丑詔曰梁室多故禍亂相尋兵甲紛紜十年不解不逞之徒虐流生氣無頼之屬暴及徂魂江左肇基王者攸宅金行水位之主木運火德之君時更四代歲逾二百若其經綸王業搢紳民望忠臣孝子何世無之而零落山丘變移陵谷咸皆翦伐莫不侵殘玉杯得於民間漆簡傳於世載無復五株之樹罕見千年之表自天祚光啓恭惟揖讓爰暨朕躬聿脩祖武雖復旂旗服色猶行把宋之封每車駕巡游眇瞻河雒之地故橋山之祀蘋藻弗虧驪山之墳松柏恒守惟戚藩舊壟士子故塋掩殣未周樵牧猶衆或親屬流𨽻負土無期子孫冥滅手植何寄漢髙留連於無忌宋祖惆悵於子房丘墓生哀性靈共惻者也朕所以興言永日思慰幽泉惟前代侯王自古忠烈墳冢被發絶無後者可簡行脩治墓中樹木勿得樵采庶幽顯式暢稱朕意焉唐太宗貞觀四年九月壬午詔曰欽若稽古緬想往册英聲茂實志深褒尚始兹巡省眺矚中塗漢氏諸侯北阜斯託寂寥千載邈而無祀歴選列辟遺迹可觀良宰名卿清徽不滅宜令所司普加研訪爰自上古洎於隋室諸有明王聖帝盛德寵功定亂弭災安民濟物及賢臣烈士立言顯行緯文經武致君利俗丘壟可識塋兆見在者各隨所在條録申奏每加巡簡禁絶芻牧春秋二時為之致祭若有毁壞即宜脩補務令周盡以稱朕意是則不獨前代山陵即士大夫之丘墓並為封禁亦興王之一事可為後法者矣停喪停喪之事自古所無自建安離析永嘉播竄於是有不得已而停者常煒言魏晉之制祖父未葬者不聽服官晉書慕容儁載記而御史中丞劉隗奏諸軍敗亡失父母未知吉凶者不得仕進宴樂皆使心喪有犯君子廢小人戮通典生者猶然況於既殁是以兖州刺史滕恬為丁零翟所殺尸喪不反恬子羡仕宦不廢論者嫌之南史鄭鮮之傳鮮之議引楊臻七年不除喪三十餘年不關人事齊髙帝時烏程令顧昌𤣥坐父法秀宋泰始中北征尸骸不反而昌𤣥晏樂嬉游與常人無異有司請加以清議南齊書本紀振武将軍丘冠先為休留茂所殺喪尸絶域不可復尋世祖特敕其子雄方敢入仕河南氏羌傳當江左偏安之日而猶申此禁豈有死非戰場棺非異域而停久不葬自同平人如今人之所為者哉晉書賀循傳為武康令俗多厚葬及有拘忌囬避歲月停喪不葬者循皆禁焉舊唐書顔真卿傳時有鄭延祚者新書朔方令母卒二十九年殯僧舎垣地真卿劾奏之兄弟終身不齒天下聳動册府元龜後周太祖廣順二年十一月丙午敕曰古者立封樹之制定喪葬之期著在經典是為名教洎乎世俗衰薄風化陵遲親殁而多闕送終身後而便為無主或羈束於仕宦或拘忌於陰陽旅櫬不歸遺骸何託但以先王垂訓孝子因心非以厚葬為賢只以稱家為禮埽地而祭尚可以告䖍負土成墳所貴乎盡力宜頒條令用警因循庶使九原絶抱恨之魂千古無不歸之骨搢紳人士當體兹懷應内外文武臣僚幕職州縣官選人等今後有父母祖父母亡殁未經遷葬者其主家之長不得輒求仕進所由司亦不得申舉解送而宋史王子韶以不葬父母貶官劉昺兄弟以不葬父母奪職並本傳後之王者以禮治人則周祖之詔魯公之劾不可不著之甲令但使未葬其親之子若孫搢紳不許入官士人不許赴舉則天下無不葬之喪矣張稷若爾岐采皇甫謐之名作篤終論其下篇曰葬之習於侈也於是有久而不克葬者是徒知備物豐儀之為厚其親而不知久而不葬之大悖於禮也先王之制喪禮始死而襲襲而斂三日而殯殯而治葬具其葬也貴賤有時天子七月諸侯五月大夫三月士踰月先時而葬者謂之得葬後時而葬者謂之怠喪其自襲而斂自斂而殯自殯而葬中間皆不治他事各視其力日夕拮据至葬而已以為所以計安親體者必至乎葬而始畢也襲也斂也殯也皆以期成乎葬者也殯則不可不葬猶之襲則不可不斂斂則不可不殯相待而為始終者也故不可以他事間也今有人親死踰日而不襲踰旬而不斂踰月而不殯茍非狂易喪心之人必有痛乎其中者矣至於累年而不葬則相與安之何也殯者必於客位所以賔之也父母而賔之人子之所不忍也而為之者以将葬故賔之也所以漸即乎遠也殯而不葬是使其親退而不得反於寝進而不得即於墓不猶之客而未得歸歸而未得至者與非人事之至難安而人子之大不忍者與晏子春秋生者不得安命之曰蓄憂死者不得葬命之曰蓄哀喪服小記曰久而不葬者惟主喪者不除其餘以麻終月數者除喪則已孔氏曰久而不葬謂有事礙不得依月葬者則三年冠服身皆不得祥除主喪者謂子為父妻為夫臣為君孫為祖父殁持重皆為喪主不得除也其餘謂期以下至緦也劉世明曰衆子雖非喪主亦不得除盡張憑謂已嫁之女猶不得除天性難可奪疑則從重孔叢子司徒文子問於子思曰喪服既除然後乃葬則其服何服子思曰三年之喪未葬服不變除何有焉司馬溫公葬論亦云乃知古之人有不幸有故不得葬其親者雖踰三年不除服其心所痛在於未葬以為與未及三月者同實也與未及三月者同實斯不得計時而即吉矣何也喪之即吉始於虞而成於禫虞之為禮起於既葬送形而往迎精而反故為虞以安之未葬則無所為而虞不虞則卒哭而祔皆無所為而舉卒哭與袝不得舉又何為而可以練何為而可以祥且禫故雖踰三年與未及三月者同實也未及三月而欲舉祥禫之禮行道之人弗忍矣喪服小記三年而後葬者必再祭注云謂練祥也葬月虞明月練又明月祥劉世明曰禮虞而柱梋翦屏練而毁廬居堊室祥而席禫而牀今此虞及練祥雖為局促猶追償其事若在異月以其本異歲也練祥之服變除之宜宜如其節也斯其所以可以除而弗除與斯其所以寧斂形還葬縣棺而封而必不敢為溢望奢求以至於久而不葬也與由是言之則人子之未葬其親者未可以虞未可以卒哭也未可以虞未可以卒哭而可以服官乎反末代之澆風舉百王之墜制必有聖人起而行之者陳可大曰以麻終月數者期以下至緦之親以主人未葬不得變葛故服麻以至月數足而除不待主人喪後之除也然其服猶必收藏以俟送葬也夫未葬之喪期已下至緦之親且不得變葛而為之子者乃循葬畢之制而練而祥而禫是則今之人其無父母也久矣魏劉仲武娶毌丘氏生子正舒正則及毌丘儉敗仲武出其妻司馬師夷儉三族故仲武出妻更娶王氏生陶仲武為毌丘氏立别舎而不告絶及毌丘氏卒正舒求祔葬陶不許正舒不釋服訟於上下泣血露骨衰裳綴絡數十年弗得以至死亡宋海虞令何子平母喪去官哀毁踰禮屬大明孝武帝年號末東土饑荒繼以師旅八年不得營葬晝夜號哭常如袒括之日冬不衣絮夏不就清涼一日以米數合為粥不進鹽菜所居屋敗不蔽風日兄子伯興欲為葺理子平不肯曰我情事未申天地一罪人耳屋何宜覆蔡興宗為㑹稽太守甚加矜重為營冢壙朱子采入小學善行篇梁殷不佞為武康令㑹江陵䧟而母卒道路隔絶不得奔赴四載之中晝夜號泣及陳髙祖受禪起為戒昭將軍除婁令至是四兄不齊始迎喪柩歸葬不佞居處禮節如始聞喪若此者又三年唐歐陽通為中書舍人丁母憂以歲凶未葬四年居廬不釋服冬月家人密以氊絮置所眠席下通覺大怒遽令撤之元孫瑾父喪停柩四載衣不解帶此數事可為不得已而停喪者之法近年亦有一二知禮之士未克葬而不變服者而或且譏之曰夫飲酒食肉處内與夫人間之交際往來一一如平人而獨不變衣冠則文存而實亡也文存而實亡近於為名然則必并其文而去之而後為不近名耶子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮嗚呼夫習之難移久矣自非大賢中人之情鮮不動於外者聖人為之弁冕衣裳佩玉以教恭衰麻以教孝介胄以教武故君子恥服其服而無其容使其未葬而不釋衰麻則其悲哀之心痛疾之意必有觸於目而常存者此子游所謂以故興物而為孝子仁人之一助也奚為其必去之也今呉人喪除服則取冠衰履杖焚之服終而未葬則藏之柩旁待葬而服既葬服以謝弔客而後除且焚此亦餼羊之猶存者矣詩曰庶見素韠兮我心藴結兮聊與子如一兮哀公問曰紳委章甫有益於仁乎孔子作色而對曰君胡然焉衰麻苴杖者志不存乎樂非耳弗聞服使然也家語後之議禮者必有能擇於斯者矣又攷實録永樂七年七月甲戍仁孝皇后喪再期皇太子以母喪未葬禫後仍素服視事至几筵仍衰服八年七月乙巳仁孝皇后忌日以未葬禮同大祥十一年二月葬長陵夫天子之子尚且行之而謂不可通於士庶人乎侈於殯埋之飾而民遂至於不葬其親豐於資送之儀而民遂至於不舉其女於是有反本尚質之思而老氏之書謂禮為忠信之薄而亂之首則亦過矣豈知召南之女迨其謂之周禮媒氏凡嫁子娶妻入幣純帛無過五兩而夫子之告子路曰斂首足形還葬而無槨稱其財斯之謂禮何至如鹽鐵論之云送死殫家遣女滿車齊武帝詔書之云斑白不婚露棺累葉者乎馬融有言嫁娶之禮儉則婚者以時矣喪祭之禮約則終者掩藏矣林放問禮之本孔子曰禮與其奢也寧儉其正俗之先務乎宋史孫覺傳知福州閩俗厚於婚喪其費無藝覺裁為中法使資裝無得過百千令下嫁娶以百數葬埋之費亦率減什五元史干文傳傳為婺源知州婺源之俗男女昏聘後富則渝其約有育其女至老死不嫁者親喪貧則不舉有停其柩累數世不葬者文傳下車即召其耆老使以禮訓告之閲三月而婚喪俱畢假葬晉武帝太康中前太子洗馬郄詵寄止衛國文學講堂十餘年母亡不致喪歸便於堂北壁外下棺謂之假葬魏志曹共傳年十餘歲喪父時天下亂宗族各散去鄉里獨與一客擔喪假葬攜將老母渡江假葬字始見於此三年即吉詔用為征東參軍論者以為不合禮鄭志曰趙商問主喪者不除今人違離邦族假葬異國禮不大備要亦有反土之意三年闋矣可得除否荅曰葬者送親之終假葬法後代巧偽反可以難禮乎改殯古人改殯之禮必反於宫寢不拘即遠之制齊莊公以襄公二十五年為崔杼所弑葬諸士孫之里二十八年崔慶既死十二月乙亥朔齊人遷莊公殯於大寝以其棺尸崔杼于市二十九年二月癸夘齊人葬莊公于北郭夫自郭外之葬歴三年之久出而遷之路寢為之改殯不以宫廷為忌不以兵死為嫌古人送往慎終之禮如此景公莊公之弟漢和帝以梁貴人酷殁斂葬禮闕乃改殯於承光宫追服喪制蓋附身附棺之物人子所宜自盡若宋之髙宗於梓宫入境即承之以椁上以欺其先人下以欺其百官兆姓誠千古之罪人矣册府元龜載後唐莊宗同光二年八月遣宗正少卿李瓊往曹州簡行哀帝陵寢三年正月丙申敕曰朕顧惟寡德獲嗣丕圖奉先之道常勤送往之誠靡怠爰自重興廟社載展郊禋旋蕩滌於瑕疵復涵濡於慶澤蓋憂勞靜國曠墜承祧御朽若驚渉川為懼由是推移歲月鬱滯情懷恭念昭宗晏駕之辰少帝登遐之日咸罹虺毒遽殞龍䫇委冠劒於仇讎託山陵於梟獍靜惟規制豈叶度程存愴結以彌深固寢興而増惕䖍思改卜式慰允懷宜令所司别選園陵備禮遷葬貴雪幽明之恨以申追慕之心凡百臣寮體朕哀感雖有是命以年饑財不足而止火葬火葬之俗盛行於江南自宋時已有之宋史紹興二十七年監登聞鼔院范同言今民俗有所謂火化者生則奉養之具惟恐不至死則燔爇而捐棄之國朝著令貧無葬地者許以官地安葬河東地狹人衆雖至親之喪悉皆焚棄韓琦鎮并州以官錢市田數頃給民安葬至今為美談然則承流宣化使民不畔於禮法正守臣之職也事關風化理宜禁止仍飭守臣措置荒閒之地使貧民得以收葬從之景定二年黃震為呉縣尉乞免再起化人亭狀曰照對本司久例有行香寺曰通濟在城外西南一里本寺久為焚人空亭約十間以罔利合城愚民悉為所誘親死即舉而付之烈𦦨餘骸不化則又舉而投之深淵哀哉斯人何辜而遭此身後之大戮耶震久切痛心以人㣲位下欲言未發乃五月六日夜風雷驟至獨盡撤其所謂焚人之亭而去之意者穢氣彰聞冤魂共訴皇天震怒為絶此根越明日據寺僧發覺陳狀為之備申使府蓋亦幸此亭之壞耳案吏何人敢受寺僧之囑行下本司勒令監造震竊謂此亭為焚人之親設也人之焚其親不孝之大者也此亭其可再也哉謹案古者小斂大斂以至殯葬皆擗踊為遷其親之尸而動之也況可得而火之耶舉其尸而畀之火慘虐之極無復人道雖蚩尤作五虐之法商紂為炮烙之刑皆施之於生前未至戮之於死後也展禽謂夏父弗忌必有殃既葬焚煙徹於上或者天實災之然謂之殃則凶可知也楚子期欲焚麇之師子西戒不可雖敵人之尸猶有所不忍也衛侯掘褚師定子之墓焚之於平莊之上殆自古以來所無之事田單守即墨之孤邑積五年思出萬死一生之計以激其民故襲用其毒誤燕人掘齊墓燒死人齊人望之涕泣怒十倍而齊破燕矣然則焚其先人之尸為子孫者所痛憤而不自愛其身故田單思之五年出此詭計以誤敵也尉佗在粤聞漢掘燒其先人冢陸賈明其不然與之要約亦曰反則掘燒王先人冢耳舉至不可聞之事以相恐非忍為之也尹齊為淮揚都尉所誅甚多及死仇家欲燒其尸尸亡去歸葬説者謂其尸飛去夫欲燒其尸仇之深也欲燒之而尸亡是死而有靈猶知燒之可畏也漢廣川王去淫虐無道其姬昭信共殺幸姬王昭平王地餘及從婢三人後昭信病夢昭平等乃掘其尸皆燒為灰去與昭信旋亦誅死王莽作焚如之刑燒陳良等亦遂誅滅魏文帝終制略曰喪亂已來漢氏諸陵無不發掘至乃燒取玉柙金鏤骸骨并盡是焚如之刑也豈不重痛哉東海王越亂晉石勒剖其棺焚其尸曰亂天下者此人也吾為天下報之夫越之惡固宜至此亦石勒之酷而忍為此也王敦叛逆有司出其尸於瘞焚其衣冠斬之所焚猶衣冠耳惟蘇峻以反誅焚其骨楊𤣥感反隋亦掘其父素冢焚其骸骨慘虐之門既開因以施之極惡之人周禮秋官掌戮凡殺其親者焚之然非治世法也隋為仁壽宫役夫死道上楊素焚之上聞之不悦夫淫刑如隋文且不忍焚人則痛莫甚於焚人者矣蔣元暉瀆亂宫闈朱全忠殺而焚之一死不足以盡其罪也然殺之者當刑焚之者非法非法之虐且不可施之誅死之罪人況可施之父母骨肉乎世之施此於父母骨肉者又往往拾其遺燼而棄之水則宋誅太子劭逆黨王鸚鵡嚴道育既焚而揚灰於河之故智也慘益甚矣而或者乃以焚人為佛法然聞佛之説戒火自焚也今之焚者戒火耶人火耶自焚耶其子孫耶佛者外國之法今吾所處中國耶外國耶有識者為之痛惋久矣今通濟寺僧焚人之親以罔利傷風敗俗莫此為甚天幸廢之何可興之欲望台慈矜生民之無知念死者之何罪備牓通濟寺風雷已壞之焚人亭不許再行起置其於哀死慎終實非小補然自宋以來此風日盛國家雖有漏澤園之設而地窄人多不能偏葬相率焚燒名曰火葬習以成俗謂宜每里給空地若干為義冢以待貧民之葬除其租税而更為之嚴禁焚其親者以不孝罪之庶乎禮教可興民俗可厚也嗚呼古人於服器之微猶不敢投之於火故於重也埋之於杖也斷而棄之況敢焚及於尸柩乎茶毗之教始於沙門塞外之風被於華夏辛有之適伊川其亦預見之矣為國以禮後王其念之哉列子言秦之西有儀渠之國者其親戚死聚柴積而焚之熏則煙上謂之登遐然後成為孝子荀子言氏羌之民其俘也不憂其係纍而憂其死不焚也蓋西羌之俗有之宋以禮教立國而不能革火葬之俗於其亡也乃有楊璉真伽之事漏澤園之設起於蔡京不可以其人而廢其法期功喪去官古人於期功之喪皆棄官持服通典安帝初長吏多避事棄官乃令自非父母服不得去職攷之於書如韋義以兄順喪去官楊仁以兄喪去官譙𤣥以弟服去官戴封以伯父喪去官馬融遭兄子喪自劾歸陳實以期喪去官賈逵以祖父喪去官又風俗通云范滂父字叔矩博士徵以兄憂不行劉衡碑云為勃海王郞中令以兄琅邪相憂即日輕舉圉令趙君碑云司徒楊公辟以兄憂不至則兄喪亦謂之憂也曹全碑云遷右扶風槐里令遭同産弟憂棄官則弟喪亦謂之憂也度尚碑云除上虞長以從父憂去官楊著碑云遷髙陽令遭從兄沛相憂篤義忘寵飄然輕舉則從父從兄喪亦謂之憂也陳重傳云舉尤異當遷為㑹稽太守遭姊憂去官則姊喪亦謂之憂也古人凡喪皆謂之憂其父母喪則謂之丁大憂見北史李彪傳王純碑云拜郞失妹寧歸遂釋印紱晉陶淵明作歸去來辭自序曰尋程氏妹喪於武林情在駿奔自免去職則已嫁之妹猶去官以奔其喪也晉嵇紹傳拜徐州刺史以長子喪去職則子之喪亦可以去官也後漢末時人多不行妻服荀爽引據大義正之經典雖不悉變亦頗有改者晉泰始中楊旌有伯母服未除而應孝廉舉博士韓光議以宜貶又言天水太守王孔碩舉楊少仲為孝廉有期之喪而行甚致清議而潘岳悼亡詩曰亹亹期月周戚戚彌相愍又曰投心遵朝命揮涕强就車是則期喪既周然後就官之證今代之人躁於得官輕於持服令晉人見之猶當耻與為伍況三代聖賢之列乎晉書傅咸傳惠帝時司𨽻荀愷從兄喪自表赴哀詔聽之而未下愷乃造太傅楊駿咸奏曰死喪之威兄弟孔懷同堂亡隕方在信宿聖恩矜憫聽使臨喪詔旨未下輒行造謁急謟媚之敬無友于之情宜加顯貶以隆風教張輔傳梁州刺史楊欣有姊喪未經旬車騎長史韓預彊聘其女為妻輔為中正貶預以清風俗劉隗傳世子文學王籍之居叔母喪而婚東閣祭酒顔含在叔父喪嫁女隗並奏之廬江太守梁龕明日當除婦服今日請客奏伎丞相長史周顗等三十餘人同㑹隗奏曰夫嫡妻長子皆杖居廬故周景王有三年之喪既除而宴春秋猶譏況龕匹夫暮宴朝祥慢服之愆宜肅喪紀之禮請免龕官削侯爵顗等知龕有喪吉㑹非禮宜各奪俸一月從之謝安傳期喪不廢樂王坦之以書喻之不從衣冠效之遂以成俗世頗以此譏焉當日期功之喪朝廷猶以為重是以上挂彈文下干鄉議史記魏其武安傳丞相語灌夫曰吾欲與仲孺過魏其侯㑹仲孺有服索𨼆曰服謂期功之服是則漢時有服不預宴㑹之證舊唐書王方慶傳奏言令杖期大功喪未葬不預朝賀未終喪不預宴㑹比來朝官不遵禮法身有哀容陪預朝㑹手舞足蹈公違憲章名教既虧實玷皇化伏望申明令式禁斷唐時格令未墜前經今則有説齊衰而入大夫之門停殯宫而召親朋之㑹者至乃髽踊方聞衿鞶已飾敗禮傷教日異歲深嗚呼有人心者則宜於此焉變矣裵庭裕東觀奏記大中朝有前鄉貢進士楊仁贍女弟出嫁前進士于瓌納函之日有期喪仁贍不易其日憲司糾論貶康州參軍馳驛發遣册府元龜後唐明宗天成二年九月敕原州司馬聶嶼擢從班列委佐親賢不守條章彊買店宅細詢行止頗駭聽聞喪妻未及於半年别成姻媾棄母動逾於千里不奉晨昏令本處賜死唐季五代之時其法猶重册府元龜唐薛膺為左補闕弟齊臨陣為飛矢所中卒膺聞難不及請告馳馬以赴與弟褒庠處喪如禮膺去左補闕庠去河南縣尉直𢎞文館與褒皆屏居外野布巾終喪蹈名教者推之宋史王巖叟為涇州推官聞弟喪棄官歸養吕祖儉監明州倉將上㑹兄祖謙卒部法半年不上者為違年祖儉必欲終期喪朝廷從之詔違年者以一年為限自祖儉始然史之所書亦寥寥矣漢人有以師喪去官者如延篤孔昱後漢書劉焉蜀志並見於史而荀淑之卒李膺時為尚書自表師喪則朝廷固已許之矣其亦子貢築室於場二三子羣居則絰之遺意也與緦喪不得赴舉宋天禧三年正月乙亥諸路貢舉人郭稹等四千三百人見於崇政殿時稹冒緦喪赴舉為同輩所訟上命典謁詰之引服付御史臺劾問殿三舉同保人並贖金殿一舉今制非三年之喪皆得赴舉故士彌躁進而風俗之厚不如昔人遠矣喪娶春秋文公二年冬公子遂如齊納幣公羊傳納幣不書此何以書譏何譏爾喪娶也娶在三年之外則何譏乎喪娶三年之内不圖婚何休注曰僖公以十二月薨至此未滿二十五月又禮先納采問名納吉乃納幣此四者皆在三年之内故云爾然則納幣猶譏而況於昏嫁乎唐髙宗永徽中衡山公主將出降長孫氏議者以時既公除合行吉禮于志寧上疏言禮記曰女子十五而笄二十而嫁有故二十三而嫁鄭𤣥云有故謂遭喪也春秋書魯莊公如齊納幣杜預云母喪未再期而圖婚二傳不譏失禮明故也此則史䇿具載是非歴然斷在聖情不待問於臣下其有議者云準制公除之後湏並從吉漢文帝詔曰天下吏民毋禁取婦嫁女祠祀飲酒食肉此漢文創制其儀為天下百姓至於公主服是斬衰縱使服隨例除無宜情隨例改心喪之内方復成婚非惟違於禮經亦是人情不可伏惟陛下嗣膺寶位臨統萬方理宜繼美羲軒齊芳湯禹𢎞奨仁孝之日敦崇名教之秋伏願遵髙宗之令軌略孝文之權制國家於法無虧公主情禮得畢於是詔公主待三年服闋然後成禮豈非有國之典本於天經地義故守禮之臣猶得引經而爭者哉晉書載記言石勒下書禁國人不聽在喪嫁娶時勒號所部為國人金史章宗紀承安五年三月戊辰定妻亡服内昏娶聽離法七月癸亥定居祖父母喪昏娶聽離法今人多不講此實録正統十三年四月楚王季埱奏弟大冶王季堧擇武昌護衛指揮同知翟政妹為妃昏期在邇不意叔崇陽王孟煒薨逝季堧應持服未敢成昏上命禮部議言王於崇陽王當服期年緣崇陽王未薨之先君命已下節册到日合令妃翟氏拜受候服滿成昏從之正月乙未遣永肅侯徐安等持節册封王妃天順三年十月庚戌瀋王佶焞奏父康王存日擇潞州民李剛女為弟永年王妃李磐為妹長平郡主儀賔巳受封册未及成昏而父王薨今父喪已越大祥陰陽書謂明年為弟妹婚不利乞允於今年擇日嫁娶禮部侍郞鄒榦言三年之喪禮之大者服内成親律有明禁今瀋王與郡王郡主俱父喪未終乃惑於陰陽之説而欲廢此喪制乞行長史司啓王俾待服闋成禮上曰是長史不能輔導之罪也其命廵按御史執問如律十月癸丑廣靈王遜􅀈薨癸酉敕靈丘王遜烇曰所奏第四子第五子俱鎮國將軍并女臨城縣主俱已奏報欲於本年九月後成婚且爾兄初喪正哀戚不暇之時乃欲為男女成婚以廢大禮是豈所忍為哉不允所奏憲廟大婚在天順八年之七月雖託之遺詔而士大夫多以為非故南京禮部右侍郞章綸有請待來春之奏衫帽入見唐書李訓傳文宗召見訓以衰麄難入禁中令戎服號王山人宋史蔡挺傳仁宗欲知契丹事召對便殿挺時有父喪聽以衫帽入則唐宋有喪者不敢假公服也今人干謁官長輒易青黑與常人無異是又李訓之不如乎奔喪守制記曰奔喪者自齊衰以下是古人於期功之喪無有不奔者太祖實錄洪武二十三年閏四月甲戍除期年奔喪之制先是百官聞祖父母伯叔父母兄弟喪俱得奔赴至是吏部言祖父母伯叔父母兄弟皆期年服若俱令奔喪守制或一人連遭數喪或道路數千里則居官日少更易繁數曠官廢事今後除父母及祖父母承重者丁憂外其餘期服不許奔喪詔從之此出於一時權宜之政沿習以來至三百年遂以不奔喪守制為禮法之當然而倍死亡哀多見於搢紳之士矣實錄又言二十七年四月署北平按察司事監察御史陳德文奏言嫁母劉氏卒乞奔喪許之德文四歲喪父家貧隨母嫁陳氏後年長歸宗至是其母卒時已除奔喪之制德文懇請甚至上特憐而許之是太祖雖依吏部之奏而仍通於人子之情固未嘗執一也三代聖王教化之事其僅存於今日者惟服制而已喪亂以來浸已廢墜竊謂父母之喪自非金革不得起復著之國典人人所知其祖父母伯叔父母兄弟之喪並依洪武初年之制許令解官奔赴姊妹妻子雖期喪不必解官服滿補職其他雖持重服而不去官者唐制為嫡子斬衰三年而不去官及大功以下喪者京官許以素服朝叅不預慶賀唐書王方慶傳見上奏𤣥宗開元二十五年十一月丁亥御史大夫李適之每當正旦及緣大禮應朝官并六品清官並衣朱衣六品已下並許通著袴褶朔望日文武朝集使並服袴褶如有慘故準式不合著朱衣袴褶者其日聽不入朝期暢當傳入公門變服今喪已下慘制是也在外諸司素服治事公服之内仍用麻葛祭祀宴㑹俾佐貳攝之未任之官無得謁選生員但歲考不赴科舉庶人之家不許嫁娶十五月禫後復故其有期功喪宴㑹作樂者官員罷職士子黜退仍書之申明亭以示清議庶幾民德歸厚若夤縁干請之風亦不待禁而衰止矣洪武十一年二月廣西布政使臧哲以母喪去官上思之特遣人賜米六十石鈔二十五錠自後凡官以父母喪去職而家居者皆有賜焉十七年正月命吏部凡官員丁憂已在職五年廉勤無贓私過犯者照名秩給半禄終制在職三年者給三月全禄丁憂交代昔時見有司丁父母憂聞訃奔喪不出半月近議必令交代方許離任至有欠庫未補服闋猶不得歸者是則錢糧為重倫紀為輕既乖宰物之方復失使臣之禮其弊之由始於刻削太過蓋昔者錢糧掌於縣丞案牘掌於主簿税課掌於大使余家有嘉靖年買地文契皆用税課司印萬歴後用縣印為令者稽其要而無所與焉又皆俸足以贍其用而不取之庫藏故聞訃遄行無所留滯而亦不見有那移侵欠之事今則州縣之中錐刀之末上盡取之而大吏之誅求尤苦不給庫藏罄乏報以虛文至於近年天下無完庫矣即勒令交代亦不過應之以虛文徒滋不孝之官而無益於國計盈虛之數也嗚呼君人者亦知養廉為致孝之源乎陶侃謂王貢曰杜弢為益州刺史盜用庫錢父死不奔喪卿本佳人何為隨之也天下寧有白頭賊乎貢遂來降而弢敗走今日居官之軰大半皆如杜弢然如此之人作賊亦不能成也史言梁髙祖丁文皇帝高祖父丹陽尹順之憂時為齊隨王鎮西諮議參軍在荆鎮髣髴奉問便投劒星馳不復寢食倍道前行憤風驚浪不暫停止及居帝位立七廟月中再過每至展拜常涕泗滂沱哀動左右然則明王孝治天下而不遺小國之臣必有使之各盡其情者矣洪武八年八月戊辰詔百官聞父母喪者不待報許即去官時北平按察司僉事吕本言近制士大夫出仕在外聞父母之喪必待移文原籍審覈俟其還報然後奔喪臣竊以為中外官吏去鄉或一二千里或且萬里及其文移往復近者彌月遠者半年使為人子者銜哀待報比還家則殯葬已畢豈惟莫覩父母形體雖棺柩亦有不及見者揆之子情深可憐憫臣請自今官吏若遇親喪許令其家屬陳於官移文任所令其奔赴然後覈實庶人子得盡送終之禮而朝廷孝理之道彰矣上然之故有是命武官丁憂晉書言姚興下書將帥遭大喪非在疆場險要之所皆聽奔赴及期乃從王役宋岳飛乞終母喪以張憲攝軍事歩歸廬山元史言成宗詔軍官除邊遠出征其餘遇祖父母父母喪依民官例立限奔赴然則明制武官不丁憂非一道同倫之義也國史言洪武二十八年蘭州衛指揮僉事徐遵等以父及祖母病卒奏乞扶柩歸葬鄉里廷議勿許上特可之豈非求忠臣必於孝子之門者耶居喪宴飲唐憲宗元和九年四月癸未京兆府奏故法曹陸賡男慎餘與兄博文居喪衣華服過坊市飲酒食肉詔各決四十慎餘流循州博文遞歸本貫册府元龜十二年四月辛丑駙馬都尉于季友坐居嫡母喪與進士劉師服宴飲季友削官爵笞四十忠州安置師服笞四十配流連州于頔以不能訓子削階舊唐書本紀以禮坊民而法行於貴戚此唐室之所以復振也姚興時有給事黃門侍郞古成詵每以天下是非為己任京兆韋髙慕阮籍之為人居母喪彈琴飲酒詵聞而泣曰吾當私刃斬之以崇風教遂持劒求髙髙懼而逃匿終身不敢見僭亂之國猶有此人匿喪後唐明宗天成三年閏八月滑州掌書記孟昇匿母憂大理寺斷流奉敕朕以允從人望嗣守帝圖政必究於化源道每先於德本貴持國法以正人倫孟昇身被儒冠職居賔幕比資籌畫以贊盤維而乃都昧操脩但貪榮禄匿母喪而不舉為人子以何堪瀆汚時風敗傷名教五刑是重十惡難寛將復投荒無如去世可賜自盡其觀察使判官錄事參軍失於糾察各有殿罰國恤宴飲春秋傳言呉公子札自衛如晉將㝛于戚衛大夫孫文子邑聞鐘聲焉曰異哉夫子獲罪於君以在此文子以戚叛懼猶不足而又何樂夫子之在此猶燕之巢於幕上君又在殯獻公卒未葬而可以樂乎遂去之文子聞之終身不聽琴瑟漢魏以下有山陵未成而宴飲者漢書元后傳司隷校尉解光奏曲陽侯王根骨肉至親社稷大臣先帝山陵未成公聘取故掖庭女樂五官殷嚴王飛君等置酒歌舞無人臣禮大不敬不道以根嘗建社稷之策遣就國其兄子成都侯況免為庶人歸故郡魏書甄楷傳除祕書郞世宗崩未葬楷與河南尹丞張普惠等飲戲免官是也有國喪未期而宴飲者晉書鍾雅傳拜尚書左丞奏言肅祖明皇帝棄背萬國尚未期月聖主縞素百寮慘愴尚書梅陶無大臣忠慕之節家庭侈靡聲伎紛葩絲竹之音流聞衢路宜加放黜以整王憲是也時穆后臨朝特原不問然百僚惮之有國忌而宴飲者舊唐書德宗紀貞元十二年五月丁巳駙馬都尉郭曖王士平及曖弟煦暄坐代宗忌日宴飲貶官歸第是也此皆故事之宜舉行者禮者君之大柄可聽其頽弛而不問乎宋朝家法宋世典常不立政事叢脞一代之制殊不足言然其過於前人者數事如人君宫中自行三年之喪一也外言不入于梱二也未及末命即立族子為皇嗣三也不殺大臣及言事官四也此皆漢唐之所不及故得繼世享國至三百餘年若其職官軍旅食貨之制冗襍無紀後之為國者並當取以為戒日知錄卷十五
