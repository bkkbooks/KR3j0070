body:
  text: 日知録卷十九崑山顧炎武撰文須有益於天下文之不可絶於天地間者曰明道也紀政事也察民隱也樂道人之善也若此者有益於天下有益於將來多一篇多一篇之益矣若夫怪力亂神之事無稽之言勦襲之說諛佞之文若此者有損於己無益於人多一篇多一篇之損矣文不貴多二漢文人所著絶少史於其𫝊末每云所著凡若干篇惟董仲舒至百三十篇而其餘不過五六十篇或十數篇或三四篇史之録其數蓋稱之非少之也乃今人著作則以多為富夫多則必不能工即工亦必不皆有用於世其不𫝊宜矣西京尚辭賦故漢書藝文志所載止詩賦二家其諸有名文人陸賈賦止三篇賈誼賦止七篇枚乘賦止九篇司馬相如賦止二十九篇兒寬賦止二篇司馬遷賦止八篇王褒賦止十六篇揚雄賦止十二篇而最多者則淮南王賦八十二篇枚臯賦百二十篇而于枚臯傳云臯為文侯受詔輒成故所賦者多司馬相如善為文而遲故所作少而善于臯臯賦辭中自言為賦不如相如其文骩骳曲隨其事皆得其意頗詼笑不甚間靡凡可讀者不二十篇其尤嫚戲不可讀者尚數十篇是辭賦多而不必善也東漢多碑誄書序論難之文又其時崇重經術復多訓詁凡𫝊中録其篇數者四十九人其中多者如曹褒應劭劉陶蔡雍荀爽王逸各百餘篇少者盧植六篇黃香五篇劉騊駼崔烈曹衆曹朔各四篇桓彬三篇而于鄭元𫝊云元依論語作鄭志八篇所注諸經百餘萬言通人頗譏其繁是解經多而不必善也秦延君說堯典篇目兩字之說十餘萬言但說曰若稽古三萬言桓談新論此顔之推家訓所謂鄴下諺云博士買驢書券三紙未有驢字者也陸游詩文辭博士書驢券職事參軍判馬曹文以少而盛以多而衰以二漢言之東都之文多于西京而文衰矣以三代言之春秋以降之文多于六經而文衰矣如惠施五車其書竟無一篇𫝊者記曰天下無道則言有枝葉隋志載古人文集西京惟劉向六卷揚雄劉歆各五卷為至多矣他不過一卷二卷而江左梁簡文帝至八十五卷元帝至五十二卷沈約至一百一卷所謂雖多亦奚以為著書之難子書自孟荀之外如老莊管商申韓皆自成一家言至呂氏春秋淮南子則不能自成故取諸子之言彚而為書此子書之一變也今人書集一一盡出其手必不能多大抵如呂覽淮南之類耳其必古人之所未及就後世之所不可無而後為之庶乎其𫝊也與宋人書如司馬溫公資治通鑑馬貴與文獻通考皆以一生精力成之遂為後世不可無之書而其中小有舛漏尚亦不免若後人之書愈多而愈舛漏愈速而愈不傳所以然者其視成書太易而急於求名故也伊川先生晚年作易𫝊成門人請授先生曰更俟學有所進子不云乎忘身之老也不知年數之不足也俯焉日有孳孳斃而後已直言張子有云民吾同胞今日之民吾與達而在上位者之所共也救民以事此達而在上位者之責也救民以言此亦窮而在下位者之責也天下有道則庶人不議然則政教風俗茍非盡善即許庶人之議矣故盤庚之誥曰無或敢伏小人之攸針而國有大疑卜諸庶民之從逆子産不毁鄉校漢文止輦受言皆以此也唐之中世此意猶存魯山令元德秀遣樂工數人連袂歌于蒍𤣥宗為之感動白居易為盩厔尉作樂府及詩百餘篇規諷時事流聞禁中憲宗召入翰林亦近於陳列國之風聽輿人之誦者矣詩之為教雖主於溫柔敦厚然亦有直斥其人而不諱者如曰赫赫師尹不平謂何如曰赫赫宗周褒姒滅之如曰皇父卿士番維司徒家伯維宰仲允膳夫棸子內史蹶惟趣馬楀惟師氏豔妻煽方處如曰伊誰云從維暴之云則皆直斥其官族名氏古人不以為嫌也楚辭離騷余以蘭為可恃兮羌無實而容長王逸章句謂懷王少弟司馬子蘭椒専佞以慢慆兮章句謂楚大夫子椒洪興祖補注古今人表有令尹子椒如杜甫麗人行賜名大國虢與秦慎莫近前丞相嗔近於十月之交詩人之義矣孔稚圭北山移文明斥周顒劉孝標廣絶交論隂譏到溉袁楚客規魏元忠有十失之書韓退之諷陽城作爭臣之論此皆古人風俗之厚立言不為一時天下之事有言在一時而其效見於數十百年之後者魏志司馬朗有復井田之議謂往者以民各有纍世之業難中奪之今承大亂之後民人分散土業無主皆為公田宜及此時復之當世未之行也及拓跋氏之有中原令戶絶者墟宅桑榆盡為公田以給授而口分世業之制自此而起迄於隋唐守之魏書武定之初私鑄濫惡齊文襄王議稱錢一文重五銖者聽入市用天下州鎮郡縣之市各置二稱懸於市門若重不五銖或雖重五銖而雜鉛鑞並不聽用當世未之行也及隋文帝之有天下更鑄新錢文曰五銖重如其文置樣於關不如樣者沒官銷毁之而開通元寶之式自此而準至宋時猶倣之唐書李叔明為劍南節度使上疏言道佛之弊請本道定寺為三等觀為二等上寺留僧二十一上觀道士十四每等降殺以七皆擇有行者餘還為民德宗善之以為可行之天下詔下尚書省議已而罷之至武宗㑹昌五年併省天下寺觀敕上都東都兩街各留二寺每寺留僧三十人天下節度觀察使治所及同華商汝州各留一寺分為三等上等留僧二十人中等留十人下等五人凡毁寺四千六百餘區歸俗僧尼二十六萬五百人大秦穆護祅僧二千餘人而有明洪武中亦稍行其法元史京師恃東南運糧竭民力以航不測泰定中虞集建言京東數千里北極遼海南濵青齊雈葦之場海潮日至淤為沃壤用浙人之法築堤捍水為田聽富民欲得官者合其衆而授以地能以萬夫耕者授以萬夫之田為萬夫長千夫百夫亦如之三年視其成以地之髙下定為徵額五年有積畜命以官就所儲給以祿十年佩之符印得以𫝊子孫如軍官之法如此可以寬東南之運以紓民力而游手之徒皆有所歸事不果行及順帝至正中海運不至從丞相托克托言乃立分司農司於江南召募能種水田及修築圍堰之人各一千名為農師嵗乃大稔至今水田遺利猶有存者而戚將軍繼光復修之薊鎮是皆立議之人所不及見而窮則變變則通通則久天下之理固不出乎此也孔子言行夏之時固不以望之魯之定哀周之景敬也而獨以告顔淵及漢武帝太初之元幾三百年矣而遂行之孔子之告顔淵告漢武也孟子之欲用齊也曰以齊王猶反手也若滕則不可用也而告文公之言亦未嘗貶於齊梁曰有王者起必來取法是為王者師也嗚呼天下之事有其識者不必遭其時而當其時者或無其識然則開物之功立言之用其可少哉朱子作詩𫝊至於秦黃鳥之篇謂其初特出於西戎之俗而無明王賢伯以討其罪於是習以為常則雖以穆公之賢而不免論其事者亦徒閔三良之不幸而歎秦之衰至於王政不綱諸侯擅命殺人不忌至於如此則莫知其為非也歷代相沿至明朝英宗始革千古之弊嘗讀正統四年六月乙酉書與祥符王有爝曰周王薨逝深切痛悼其存日嘗奏葬擇近地從儉約以省民力自妃夫人以下不必從死年少有父母者各遣歸其家周憲王諱有燉所著有誠齊集憲王雖有此命及薨妃鞏氏竟自經以殉諡貞烈以一品禮葬之蓋自御極之初即有感於憲王之奏而亦朱子詩𫝊有以發其天聰也嗚呼仁哉文人之多唐宋以下何文人之多也固有不識經術不通古今而自命為文人者矣韓文公符讀書城南詩曰文章豈不貴經訓乃菑畬潢潦無根源朝滿夕己除人不通古今馬牛而襟裾行身陷不義況望多名譽而宋劉摯之訓子孫每曰士當以器識為先一號為文人無足觀矣然則以文人名於世焉足重哉此揚子雲所謂托我華而不食我實者也黃魯直言數十年來先生君子但用文章提奬後生故華而不實明朝嘉靖以來亦有此風而陸文裕深所記劉文靖健告吉士之言空同李夢陽大以為不平矣見停驂録宋史言歐陽永叔與學者言未嘗及文章惟談吏事謂文章止於潤身政事可以及物巧言詩云巧言如簧顔之厚矣而孔子亦曰巧言令色鮮矣仁又曰巧言亂德夫巧言不但言語凡今人所作詩賦碑狀足以恱人之文皆巧言之類也不能不足以為通人夫惟能之而不為乃天下之大勇也故夫子以剛毅木訥為近仁學者所用力之途在此不在彼矣天下不仁之人有二一為好犯上好作亂之人一為巧言令色之人自幼而不孫弟以至於弒父與君皆好犯上好作亂之推也自脅肩諂笑未同而言以至於茍患失之無所不至皆巧言令色之推也然而二者之人常相因以立於世有王莽之篡弒則必有揚雄之美新有曹操之禪代則必有潘勗之九錫世說言潘元茂作魏公册命人謂與訓詁同風是故亂之所由生也犯上者為之魁巧言者為之輔故大禹謂之巧言令色孔壬而與歡兜有苖同為一類甚哉其可畏也穆王作冏命曰無以巧言令色便辟側媚然則學者宜如之何必先之以孝弟以消其悖逆陵暴之心繼之以忠信以去其便辟側媚之習使一言一動皆出於其本心而不使不仁者加乎其身夫然後可以修身而治國矣記者於論語之首而列有子曽子之言所以補夫子平日所未及其間次序亦不為無意世言魏忠賢初不知書而口含天憲則有一二文人代為之後漢書言梁冀裁能書計其誣奏太尉李固時扶風馬融為冀章草唐書言李林甫自無學術僅能秉筆而郭慎微苑咸文士之闒茸者代為題尺又言髙駢上書肆為醜悖脅邀天子而吳人顧雲以文辭緣澤其姦宋史言章惇用事嘗曰元祐初司馬光作相用蘇軾掌制所以能鼓動四方乃使林希典書命逞毒於元祐諸臣嗚呼何代無文人有國者不可不深惟華實之辨也文辭欺人古來以文辭欺人者莫若謝靈運次則王維靈運身為元勳之後襲封國公宋氏革命不能與徐廣陶潛為林泉之侶既為宋臣又與廬陵王義真欵密至元嘉之際纍遷侍中自以名流應參時政文帝惟以文義接之以致觖望又上書勸伐河北至屢嬰罪劾興兵拒捕乃作詩曰韓亡子房奮秦帝魯連恥本自江海人忠義動君子及其臨刑又作詩曰龔勝無餘生李業有終盡若謂欲效忠於晉者何先後之矛盾乎史臣書之以逆不為苛矣王維為給事中安祿山陷兩都拘于普施寺迫以僞署祿山宴其徒於凝碧池維作詩曰萬戶傷心生野煙百官何日再朝天秋槐葉落空宮裏凝碧池頭奏管絃賊平下獄或以詩聞於行在其弟刑部侍郎縉請削官以贖兄罪肅宗乃特宥之責授太子中允襄王僭號逼李拯為翰林學士拯既汙僞署心不自安時朱玫秉政百揆無叙拯嘗退朝駐馬國門為詩曰紫宸朝罷綴鵷鸞丹鳳樓前立馬看惟有終南山色在晴明依舊滿長安吟已涕下及王行瑜殺朱玫襄王出奔拯為亂兵所殺二人之詩同也一死一不死而文墨交游之士多護王維如杜甫謂之髙人王右丞天下有髙人而仕賊者乎乃有顛沛之餘投身異姓至擯斥不容而後發為忠憤之論與夫名汙僞籍而自託乃心比于康樂右丞之輩吾見其愈下矣末世人情彌巧文而不慙固有朝賦采薇之篇而夕有捧檄之喜者茍以其言取之則車載魯連斗量王蠋矣曰是不然世有知言者出焉則其人之真僞即以其言辨之而卒莫能逃也黍離之大夫始而搖搖中而如噎既而如醉無可奈何而付之蒼天者真也汨羅之宗臣言之重辭之復心煩意亂而其詞不能以次者真也栗里之徵士淡然若忘於世而感憤之懷有時不能自止而微見其情者真也其汲汲於自表暴而為言者僞也易曰將叛者其辭慙中心疑者其辭枝失其守者其辭屈詩曰盜言孔甘亂是用餤夫鏡情僞屏盜言君子之道興王之事莫先乎此修辭典謨爻象此二帝三王之言也論語孝經此夫子之言也文章在是性與天道亦不外乎是故曰有德者必有言善乎游定夫之言曰不能文章而欲聞性與天道譬猶築數仞之墻而浮埃聚沫以為基無是理矣後之君子於下學之初即談性道乃以文章為小技而不必用力然則夫子不曰其㫖逺其辭文乎不曰言之無文行而不逺乎曾子曰出辭氣斯逺鄙倍矣嘗見今講學先生從語録入門者多不善於修辭或乃反子貢之言以譏之曰夫子之言性與天道可得而聞夫子之文章不可得而聞也楊用修曰文道也詩言也語録出而文與道判矣詩話出而詩與言離矣自嘉靖以後人知語録之不文於是王元美之劄記范介儒之膚語上規子雲下法文中雖所得有淺深之不同然可謂知言者矣文人摹倣之病近代文章之病全在摹倣即使逼肖古人已非極詣況遺其神理而得其皮毛者乎且古人作文時有利鈍梁簡文與湘東王書云今人有效謝康樂裴鴻臚文者學謝則不届其精華但得其冗長師裴則蔑棄其所長惟得其所短宋蘇子瞻云今人學杜甫詩得其粗俗而已葉水心言慶厯嘉祐以來天下以杜甫為師始絀唐人之學謂之江西宗派金元裕之詩云少陵自有速城璧爭奈微之識碔砆夫文章一道猶儒者之末事乃欲如陸士衡所謂謝朝華於已披啓夕秀於未振者今且未見其人進此而窺著述之林益難之矣效楚辭者必不如楚辭效七發者必不如七發蓋其意中先有一人在前既恐失之而其筆力復不能自遂此夀陵餘子學步邯鄲之說也洪氏容齊隨筆曰枚乘作七發創意造端麗辭腴㫖上薄騷些故為可喜其後繼之者如𫝊毅七激張衡七辨崔駰七依馬融七廣曹植七啓王粲七釋張協七命之類規倣太切了無新意傅元又集之以為七林使人讀未終篇往往棄之几格栁子厚晉問乃用其體而超然别立機杼激越清壯漢晉諸文士之弊於是一洗矣東方朔答客難自是文中傑出揚雄擬之為解嘲尚有馳騁自得之妙至於崔駰達㫖班固賓戲張衡應間皆章摹句寫其病與七林同及韓退之進學解出於是一洗矣其言甚當然此以辭之工拙論爾若其意則總不能出於古人範圍之外也如揚雄擬易而作太𤣥王莽依周書而作大誥皆心勞而日拙者矣世說王隱論揚雄大𤣥雖妙非益也古人謂之屋下架屋曲禮之訓毋勦說毋雷同此古人立言之本文章繁簡韓文公作樊宗師墓銘曰維古于辭必已出降而不能乃剽賊後皆指前公相襲從漢迄今用一律此極中今人之病若宗師之文則懲時人之失而又失之者也如絳守居園池記以東西二字平常而改為甲辛殆類吳人之呼庚癸者矣作書須注此自秦漢以前可耳若今日作書而非注不可解則是求簡而得繁兩失之矣子曰辭達而已矣胡纘宗修安慶府志書正德中劉七事大書曰七年閏五月賊七來冦江境而分注於賊七之下曰姓劉氏舉以示人無不笑之不知近日之學為秦漢皆賊七之類也辭主乎達不論其繁與簡也繁簡之論興而文亡矣史記之繁處必勝於漢書之簡處容齊隨筆論衛青𫝊封三校尉語史記勝漢書處正不獨此新唐書之簡也不簡於事而簡於文其所以病也時子因陳子而以告孟子陳子以時子之言告孟子此不須重見而意巳明齊人有一妻一妾而處室者其良人出則必饜酒肉而後反其妻問所與飲食者則盡富貴也其妻告其妾曰良人出則必饜酒肉而後反問其與飲食者盡富貴也而未嘗有顯者來吾將瞷良人之所之也有饋生魚於鄭子産子産使校人畜之池校人烹之反命曰始舍之圉圉焉少則洋洋焉悠然而逝子産曰得其所哉得其所哉校人出曰孰謂子産智豫既烹而食之曰得其所哉得其所哉此必須重疊而情事乃盡此孟子文章之妙使入新唐書於齊人則必曰其妻疑而瞷之於子産則必曰校人出而笑之兩言而已矣是故辭主乎達不主乎簡劉器之曰新唐書叙事好簡略其辭故其事多鬱而不明此作史之病也且文章豈有繁簡邪昔人之論謂如風行水上自然成文若不出於自然而有意於繁簡則失之矣當日進新唐書表云其事則增於前其文則省於舊新唐書所以不及古人者其病正在此兩句也黃氏日鈔言蘇子由古史改史記多有不當如樗里子𫝊史記曰母韓女也樗里子滑稽多智古史曰母韓女也滑稽多智似以母為滑稽矣然則樗里子三字其可省乎甘茂𫝊史記曰甘茂者下蔡人也事下蔡史舉學百家之說古史曰下蔡史舉學百家之說似史舉自學百家矣然則事之一字其可省乎以是知文不可以省字為工字而可省太史公省之久矣文人求古之病後周書栁蚪𫝊時人論文體有今古之異蚪以為時有今古非文有今古此至當之論夫今之不能為二漢猶二漢之不能為尚書左氏乃勦取史漢中文法以為古甚者獵其一二字句用之於文殊為不稱元阿嚕圖進宋史表曰且辭之繁簡以事而文之今古以時蓋用栁蚪之語以今日之地為不古而借古地名以今日之官為不古而借古官名舍今日恆用之字而借古字之通用者皆文人所以自蓋其俚淺也唐書鄭餘慶奏議類用古語如仰給縣官馬萬蹄有司不曉何等語人訾其不適時宋陸務觀跋前漢通用古字韻曰古人讀書多故作文時偶用一二古字初不以為工亦自不知孰為古孰為今也近時乃或鈔掇史漢中字入文辭中自謂工妙不知有笑之者偶見此書為之太息書以為後生戒元陶宗儀輟耕録曰凡書官銜俱當從實如亷訪使總管之類若改之曰監司太守是亂其官制久逺莫可考矣何孟春餘冬序録曰今人稱人姓必易以世望稱官必用前代職名稱府州縣必用前代郡邑名欲以為異不知文字間著此何益於工拙此不惟於理無取且於事復有礙矣李姓者稱隴西公杜曰京兆王曰琅邪鄭曰滎陽以一姓之望而槩衆人可乎此其失自唐宋五季間孫光憲輩始北夢瑣言稱馮涓為長樂公冷齊夜話稱陶穀為五栁公類以昔人之號而槩同姓尤是可鄙官職郡邑之建置代有沿革今必用前代名號而稱之後將何所考焉此所謂於理無取而事復有礙者也于慎行筆麈曰史漢文字之佳本自有在非謂其官名地名之古也今人慕其文之佳往往取其官名地名以施於今此應為古人笑也史漢之文如欲復古何不以三代官名施於當日而但記其實邪文之雅俗固不在此徒混淆失實無以示逺大家不為也豫素不工文辭無所模擬至於名義之微則不敢茍尋常小作或有遷就金石之文斷不敢於官名地名以古易今前輩名家亦多如此古人集中無冗復古人之文不特一篇之中無冗復也一集之中亦無冗復且如稱人之善見于祭文則不復見于志見于志則不復見于他文後之人讀其全集可以互見也又有互見于他人之文者如歐陽公作尹師魯志不言近日古文自師魯始以為范公祭文已言之可以互見不必重出蓋歐陽公自信已與范公之文並可𫝊於後世也亦可以見古人之重愛其言也劉夢得作栁子厚文集序曰凡子厚名氏與仕與年暨行己之大方有退之之志若祭文在又可見古人不必其文之出於己也書不當兩序㑹試録鄉試録主考試官序其首副主考序其後職也凡書亦猶是矣且如明初時府州縣志書成必推其鄉先生之齒尊而有文者序之不則官于其府州縣者也請者必當其人其人亦必自審其無可讓而後為之官于是者其文優其於是書也有功則不讓于鄉矣鄉之先生其文優其于是書也有功則官不敢作矣義取于獨斷則有自為之而不讓于鄉與官矣凡此者所謂職也故其序止一篇或别有發明則為後序亦有但紀嵗月而無序者今則有兩序矣有纍三四序而不止者矣兩序非體也不當其人非職也世之君子不學而好多言也凡書有所發明序可也無所發明但紀成書之嵗月可也人之患在好為人序唐杜牧答莊克書曰自古序其文者皆後世宗師其人而為之今吾與足下竝生今世欲序足下未已之文固不可也讀此言今之好為人序者可以止矣婁堅重刻元氏長慶集序曰序者叙所以作之指也蓋始於子夏之序詩其後劉向以校書為職每一編成即有序最為雅馴矣左思賦三都成自以名不甚著求序於皇甫謐自是綴文之士多有託於人以𫝊者皆汲汲於名而惟恐人之不吾知也至於其𫝊既久刻本之存者或漫漶不可讀有繕寫而重刻之則人復序之是宜叙所以刻之意可也而今之述者非追論昔賢妄為優劣之辨即過稱好事多設游揚之辭皆我所不取也讀此言今之好為古人文集序者可以止矣古人不為人立𫝊列𫝊之名始於太史公蓋史體也不當作史之職無為人立𫝊者故有碑有志有狀而無𫝊梁任昉文章緣起言𫝊始於東方朔作非有先生𫝊是以寓言而謂之𫝊韓文公集中𫝊三篇太學生何蕃圬者王承福毛潁又有下邳侯革華𫝊是僞作栁子厚集中傳六篇宋清郭槖駝童區寄梓人李赤蝜蝂何蕃僅採其一事而謂之𫝊王承福之輩皆微者而謂之𫝊毛潁李赤蝜蝂則戲耳而謂之𫝊蓋比於稗官之屬耳若段太尉則不曰𫝊曰逸事狀子厚之不敢𫝊段太尉以不當史任也自宋以後乃有為人立𫝊者侵史官之職矣太平御覽書目列古人别𫝊數十種謂之别𫝊所以别於史家志狀不可妄作志狀在文章家為史之流上之史官傳之後人為史之本史以記事亦以載言故不讀其人一生所著之文不可以作其人生而在公卿大臣之位者不悉一朝之大事不可以作其人生而在曹署之位者不悉一朝之掌故不可以作其人生而在監司守令之位者不悉一方之地形土俗因革利病不可以作今之人未通乎此而妄為人作志史家又不考而承用之是以抵牾不合子曰蓋有不知而作之者其謂是與名臣碩德之子孫不必皆讀父書讀父書者不必能通有司掌故若夫為人作志者必一時文苑名士乃不能詳究而曰子孫之狀云爾吾則因之夫大臣家可有不識字之子孫而文章家不可有不通今之宗匠乃欲使籍談伯魯之流為文人任其過嗟乎若是則盡天下而文人矣作文潤筆蔡伯喈集中為時貴碑誄之作甚多如胡廣陳實各三碑橋元楊賜胡碩各二碑至於袁滿來年十五胡根年七嵗皆為之作碑自非利其潤筆不至為此史𫝊以其名重隱而不言耳文人受賕豈獨韓退之諛墓金哉李商隱記齊魯二生曰劉叉持韓退之金數斤去曰此諛墓中人所得爾不若與劉君為夀愈不能止今此事載唐書王楙野客叢書曰作文受謝非起於晉宋觀陳皇后失寵於漢武帝别在長門宮聞司馬相如天下工為文奉黃金百斤為文君取酒相如因為文以悟主上皇后復得幸此風西漢已然按陳皇后無復幸之事此文蓋後人擬作然亦漢人之筆也杜甫作八哀詩李雍一篇曰干謁滿其門碑版照四裔豐屋珊瑚鈎麒麟織成罽紫騮隨劍几義取無虛嵗雍本𫝊長於碑頌人奉金帛請其文前後所受巨萬計劉禹錫祭韓愈文曰公鼎侯碑志隧表阡一字之價輦金如山可謂發露真贓者矣侯鯖録唐王仲舒為郎中與馬逢友善每責逢云貧不可堪何不尋碑志相救逢笑曰適見人家走馬呼醫立可待也此雖戲言當時風俗可見矣昔揚子雲猶不肯受賈人之錢載之法言而杜乃謂之義取則又不若唐寅之直以為利也戒菴漫筆言唐子畏有一巨册自録所作文簿面題曰利市今市肆帳簿多題此二字新唐書韋貫之𫝊言裴均子持萬縑請撰先銘答曰吾寧餓死豈能為是今之賣文為活者可以愧矣司空圖傳言隱居中條山王重榮父子雅重之數餽遺弗受嘗為作碑贈絹數千圖置虞鄉市人得取之一日盡既不有其贈而受之何居不得已也是又其次也文非其人元史姚燧以文就正於許衡衡戒之曰弓矢為物以待盜也使盜得之亦將待人文章固發聞士子之利器然非有能一世之名將何以應人之見役者哉非其人而與之與非其人而拒之均罪也非周身斯世之道也吾觀前代馬融懲於鄧氏不敢復違忤藝家遂為梁冀草奏李固又作大將軍西第頌以此頗為正直所羞徐廣為祠部郎時㑹稽王世子元顯録尚書欲使百僚致敬臺內使廣立議由是內外竝執下官禮廣常為愧恨陸游晚年再出為韓托胄撰南園閲古泉記見譏清議朱文公嘗言其能太髙迹太近恐為有力者所牽挽不得全其晚節是皆非其人而與之者也夫禍患之來輕於恥辱必不得已與其與也寧拒至乃儉德含章其用有先乎此者則又貴知微之君子矣少年未達投知求見之文亦不可輕作韓昌黎集有上京兆尹李實書曰愈來京師於今十五年所見公卿大臣不可勝數皆能守官奉職無過失而已未見有赤心事上憂國如家如閣下者今年以來不雨者百有餘日種不入土野無青草而盜賊不敢起穀價不敢貴百坊百二十司六軍二十四縣之人皆若閣下親臨其家老姦宿贓銷縮摧沮魂亡魄喪影滅跡絶非閣下條理鎮服布宣天子威德其何能及此至其為順宗實録書貶京兆尹李實為通州長史則曰實諂事李齊運驟遷至京兆尹恃寵强愎不顧文法是時春夏旱京畿乏食實一不以介意方務聚斂徵求以給進奉每奏對輒曰今年雖旱而穀甚好由是租稅皆不免人窮至壞屋賣瓦木貸麥苖以應官陵轢公卿已下隨喜怒誣奏遷黜朝廷畏忌之嘗有詔免畿內逋租實不行用詔書徵之如初勇於殺害人吏不聊生至譴市里歡呼皆袖瓦礫遮道伺之實由間道獲免與前所上之書逈若天淵矣鶴林玉露摘此為疑豈非少年未達投知求見之文而不自覺其失言者邪後之君子可以為戒假設之辭古人為賦多假設之辭序述往事以為㸃綴不必一一符同也子虛亡是公烏有先生之文已肇始於相如矣後之作者實祖此意謝莊月賦陳王初喪應劉端憂多暇又曰抽毫進牘以命仲宣按王粲以建安二十一年從征吳二十二年春道病卒徐陳應劉一時俱逝亦是嵗也至明帝太和六年植封陳王豈可掎托史𫝊以議此賦之不合哉庾信枯樹賦既言殷仲文出為東陽太守乃復有桓大司馬亦同此例仲文為桓𤣥侍中桓大司馬則𤣥之父溫也此乃因殷仲文有此樹婆娑之言桓元子有木猶如此之歎遂以二事凑合成文而長門賦所云陳皇后復得幸者亦本無其事俳諧之文不當與之莊論矣長門賦乃後人託名之作相如以元狩五年卒安得言孝武皇帝哉陳后復幸之云正如馬融長笛賦所謂屈平適樂國介推還受祿也古文未正之隱晉書劉元海石季龍作史者自避唐諱後之引書者多不知而襲之惟通鑑並改從本名日知録卷十九
