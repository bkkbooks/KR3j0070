body:
  text: 日知録卷五崑山顧炎武撰閽人寺人閽人寺人屬於冢宰則内廷無亂政之人九嬪世婦屬於冢宰則後宫無盛色之事太宰之於王不惟佐之治國而亦誨之齊家者也自漢以來惟諸葛孔明為知此義故其上表後主謂宫中府中俱為一體而宫中之事事無大小悉以咨攸之褘允三人於是後主欲采擇以充後宫而終執不聽宦人黄皓終允之世位不過黄門丞蜀志董允傳可以為行周禮之效矣後之人君以為此吾家事而為之大臣者亦以為天子之家事人臣不敢執而問也其家之不正而何國之能理乎魏楊阜為少府上疏欲省宮人乃召御府吏問後宫人數吏曰禁密不得宣露阜怒杖吏一百數之曰國家不與九卿為密反與小吏為密乎然後知閽寺嬪御之繫於天官周公所以為後世慮至深逺也漢承秦制有少府之官中書謁者黄門鉤盾尚方御府永巷内者宦者八官令丞諸僕射署長中黄門皆屬焉然則奄寺之官猶𨽻於外廷也正月之吉大司徒正月之吉始和布教于邦國都鄙注云周正月朔日大宰注同正嵗令于教官注云夏正月朔日凌人注同州長既以正月之吉讀法又以正嵗讀法如初注云因此四時之正重申之即此是古人三正竝用之驗逸周書周月解曰亦越我周改正以垂三統至於敬授民時廵狩烝享猶自夏焉正謂此也如左氏桓公五年傳云凡祀啓蟄而郊龍見而雩始殺而嘗閉蟄而烝之類是也豳詩七月一篇之中凡言月者皆夏正凡言日者皆周正一之日觱發二之日栗烈三之日于耜傳曰一之日周正月二之日殷正月三之日夏正月北史李業興傳天平四年使梁梁武帝問尚書正月上日受終文祖此時何正業興對曰此夏正月梁武帝問何以得知業興曰案尚書中候運衡篇云日月營始故知夏正又問堯時以前何月為正業興對曰自堯以上書典不載實所不知梁武又云寅賓出日即是正月日中星鳥以殷仲春即是二月此出堯典何得云堯時不知用何正業興對曰雖三正不同言時節者皆據夏時正月周禮仲春二月㑹男女之無夫家者雖自周書月亦夏時堯之日月亦當如此近有楚人剙為堯建子舜建丑之説者據此闢之遂無以難木鐸金鐸所以令軍中木鐸所以令國中此先王仁義之用也一器之微而剛柔别焉其可以識治民之道也歟鼓吹軍中之樂也非統軍之官不用陳蔡徵為吏部尚書啓後主借鼓吹後主謂所司曰鼓吹軍樂有功乃授今則文官用之王世貞觚不觚録言先朝之制維總兵官列營始舉炮奏鼓吹嘉靖後廵撫乃放而行之士庶人用之僧道用之金革之器徧於國中而兵由此起矣晉書司馬恬為御史中丞值海西廢簡文帝登阼未解嚴大司馬桓温屯中堂吹警角恬奏劾温大不敬請科罪今制雖授鉞遣將亦不舉炮鼓吹而士庶吉凶之禮及迎神賽㑹反有用鼓吹者號景泰六年華陽王㕛堚遣千户齎奏赴京并買喇吧笛銅鑼等物奉敕切責以為此行師之具於王何用當時遵守祖訓如此以後法禁日弛庶民皆得用矣後魏孝武永熙中諸州鎮各給鼓吹尋而髙歡舉兵魏分為二唐自安史之亂邊戍皆得用之故杜甫詩云萬方聲一槩吾道竟何之粗厲之音形為亂象先王之制所以軍容不入國也詩有瞽箋云簫編小竹管如今賣餳俗作糖者所吹也周禮小師注同漢時賣餳止是吹竹今則鳴金稽其功緒已成者謂之功未竟者謂之緒説文緒絲端也記曰武王纘太王王季文王之緒六牲古之為禮以祭祀燕享故六牲之掌特重執豕于牢稱公劉也爾牲則具美宣王也至於鄰國相通則葛伯不祀湯使遺之牛羊而衞戴公之廬于曹齊桓歸之牛羊豕雞狗皆三百其平日國君無故不殺牛大夫無故不殺羊士無故不殺犬豕而用大牲則卜之於神以求其吉故左氏載齊國之制公膳止於雙雞而詩人言賓客之設不過兔首炰鼈之類古人之重六牲也如此自齊靈公伐萊萊人使正輿子賂之索馬牛皆百匹而呉人徴魯百牢始於貪求終於暴殄於是范蠡用其霸越之餘謀以畜五牸而澤中千足彘得比封君孳畜之權不在國而在民矣易曰東鄰殺牛不如西鄰之禴祭秦德公用三百牢於鄜畤而王莽末年自天地六宗以下至諸小鬼神凡千七百所用三牲鳥獸三千餘種後不能備乃以雞當鶩雁犬當麋鹿邦饗耆老孤子春饗孤子以象物之方生秋饗耆老以象物之既成然而國中之老者孤者多矣不可以徧饗也故國老庶老則饗之而其他則養於國養於鄉而已王制死事之孤則饗之而其他則養幼少存諸孤而已月令一以教孝一以勸忠先王一舉事而天道人倫備焉此禮之所以為大也與醫師古之時庸醫殺人今之時庸醫不殺人亦不活人使其人在不死不活之間其病日深而卒至於死夫藥有君臣人有强弱有君臣則用有多少有强弱則劑有半倍多則專專則效速倍則厚厚則其力深今之用藥者大抵雜泛而均停既見之不明而又治之不勇病所以不能愈也而世但以不殺人為賢豈知古之上醫不能無失周禮醫師嵗終稽其醫事以制其食十全為上十失一次之十失二次之十失三次之十失四為下是十失三四古人猶用之而淳于意之對孝文尚謂時時失之臣意不能全也易曰裕父之蠱往見吝柰何獨取夫裕蠱者以為其人雖死而不出於我之為嗚呼此張禹之所以亡漢李林甫之所以亡唐也朱文公與劉子澄書所論四君子湯其意亦略似此唐書許𦙍宗言古之上醫惟是别衇衇既精别然後識病夫病之與藥有正相當者惟須單用一味直攻彼病藥力既純病即立愈今人不能别衇莫識病源以情臆度多安藥味譬之於獵未知所多發人馬空地遮圍冀有一人獲之術亦疏矣假令一藥偶然當病他味相制氣勢不行所以難差諒由於此後漢書華佗精於方藥處齊不過數種夫師之六五任九二則吉叅以三四則凶是故官多則亂將多則敗天下之事亦猶此矣造言之刑舜之命龍也曰朕堲讒説殄行震驚朕師故大司徒以鄉八刑紏萬民造言之刑次於不孝不弟而禁暴氏掌誅庶民之作言語而不信者至於訛言莫懲而宗周滅矣國子世子齒於學自后䕫之教胄子而已然矣師氏以三德教國子保氏掌養國子以道而教之六藝而王世子不别置官是世子之與國子齒也是故諸子掌國子之倅國有大事則帥國子而致於大子惟所用之非平日相習之深烏能得其用乎後世乃設東宫之官而分其職秩於是有内外宫朝之隔而先王之意失矣死政之老死國事者之父如史記平原君傳李同戰死封其父為李侯後漢書獨行傳小吏所輔扞賊代縣令死除父奉為郎中蜀志龎統傳統為流矢所中卒拜其父議郎遷諫議大夫是也若父子竝為王臣而特加恩遇如光武之於伏隆先朝之於張五典天啓初張銓以御史死遼加其父五典至兵部尚書又不可以常格論矣凶禮大宗伯以凶禮哀邦國之憂其别有五曰死亡凶札禍烖圍敗宼亂是古之所謂凶禮者不但於死亡而五服之外有非喪之喪者緣是而起也記曰年不順成天子素服乘素車食無樂又曰年不順成君衣布搢本周書曰大荒王麻衣以朝朝中無綵衣此凶札之服也司服大札大荒大烖素服注曰大烖水火為害君臣素服縞冠若晉伯宗哭梁山之崩春秋新宫災三日哭此禍烖之服也記曰國亡大縣邑公卿大夫士厭冠哭于太廟又曰軍有憂則素服哭于庫門之外大司馬若師不功則厭而奉主車春秋傳秦穆公敗于殽素服郊次鄉師而哭此圍敗之服也呂氏春秋公孫龍對趙惠王曰今藺離石入秦而王縞素出總是戰國時猶行此禮若夫曲禮言大夫士去國素衣素裳素冠徹緣鞮履素乘髦馬孟子言三月無君則弔而季孫之會荀躒練冠麻衣此君臣之不幸而哀之者矣秦穆姬之逆晉侯免服衰絰衞侯之念子鮮稅服終身此兄弟之不幸而哀之者矣楚滅江而秦伯降服出次越圍吳而趙孟降于喪食此與國之不幸而哀之者矣漢書髙帝紀秦王子嬰素車白馬應劭曰喪人之服先王制服之方固非一端而已記有之曰無服之喪以蓄萬邦杜氏通典以鎮撫諸州水旱蟲災勞問諸侯疾苦編於凶禮之首不入兆域冢人凡死於兵者不入兆域注戰敗無勇投諸塋外以罰之左氏趙簡子所謂桐棺三寸不設屬辟素車樸馬無入於兆而檀弓死而不弔者三其一曰畏亦此類也莊子戰而死者其人之葬也不以翣資崔本作翣杴杴音坎謂先人墳墓也若敝無存死而齊侯三襚之與之犀軒與直葢而親推之三童汪踦死而仲尼曰能執干戈以衞社稷可無殤也豈得以此一槩隋文帝仁夀元年詔曰投生殉節自古稱難隕身王事禮加二等而世俗之徒不達大義致命戎旅不入兆域虧孝子之意傷人臣之心興言念此每深愍歎且入廟祭祀並不廢闕何至墳塋獨在其外自今以後戰亡之徒宜入墓域可謂達古人之意又攷晉趙文子與叔譽觀乎九原而有陽處父之葬則得罪而見殺者亦未嘗不入兆域也左傳襄公二十九年齊人葬莊公于北郭注引兵死不入兆域樂章詩三百篇皆可以被之音而為樂自漢以下乃以其所賦五言之屬為徒詩而其協於音者則謂之樂府宋以下則其所謂樂府者亦但擬其辭而與徒詩無别於是乎詩之與樂判然為二不特樂亡而詩亦亡古人以樂從詩今人以詩從樂古人必先有詩而後以樂和之舜命䕫教胄子詩言志歌永言聲依永律和聲是以登歌在上而堂上堂下之器應之是之謂以樂從詩宋國子丞王普言古者既作詩從而歌之然後以聲律協和而成曲自厯代至於本朝雅樂皆先製樂章而後成譜崇寧以後乃先製譜後命辭於是辭律不相諧協且與俗樂無異朱子曰詩之作本言志而已方其詩也未有歌也及其歌也未有樂也以聲依永以律和聲則樂乃為詩而作非詩為樂而作也詩出乎志者也樂出乎詩者也詩者其本而樂者其末也古之詩大抵出於中原諸國其人有先王之風諷誦之教其心和其辭不侈而音節之間往往合於自然之律楚辭以下即巳不必盡諧文心雕龍言楚辭訛韻實繁降及魏晉羌戎雜擾方音遞變南北各殊故文人之作多不可以協之音而名為樂府無以異於徒詩者矣元稹言樂府等題除鐃吹横吹郊祀清商等詞在樂志者其餘木蘭仲卿四愁七哀之類亦未必盡播於管絃也人有不純而五音十二律之傳於古者至今不變於是不得不以五音正人聲而謂之以詩從樂以詩從樂非古也後世之失不得已而為之也漢書武帝舉司馬相如等數十人造為詩賦略論律呂以合八音之調作十九章之歌夫曰略論律吕以合八音之調是以詩從樂也後代樂章皆然安世房中歌十七章郊祀歌十九章皆郊廟之正樂如三百篇之頌其他諸詩所謂趙代秦楚之謳如列國之風十九章司馬相如等所作略論律吕以合八音者也趙代秦楚之謳則有協有否以李延年為協律都尉采其可協者以被之音也樂府中如清商清角之類以聲名其詩也如小垂手大垂手之類以舞名其詩也以聲名者必合於聲以舞名者必合於舞至唐而舞亡矣至宋而聲亡矣於是乎文章之傳盛而聲音之用微然後徒詩興而樂廢矣歌者為詩擊者拊者吹者為器合而言之謂之樂對詩而言則所謂樂者八音興於詩立於禮成於樂是也分詩與樂言之也專舉樂則詩在其中吾自衛反魯然後樂正雅頌各得其所是也合詩與樂言之也鄉飲酒禮工四人二瑟注二瑟二人鼓瑟則二人歌也古人琴瑟之用皆與歌並奏故有一人歌一人鼓瑟者漢文帝使慎夫人鼓瑟上自倚瑟而歌是也師古曰倚瑟即今之以歌合曲也亦有自鼓而自歌孔子之取瑟而歌是也若乃衞靈公聽新聲於濮水之上而使師延寫之則但有曲而無歌此後世徒琴之所由興也言詩者大率以聲音為末藝不知古人入學自六藝始孔子以游藝為學之成後人之學好髙以此為瞽師樂工之事遂使三代之音不存於兩京兩京之音不存於六代而聲音之學遂為當今之絶藝七月流火天文也相其隂陽地理也四矢反兮射也兩驂如舞御也止戈為武皿蟲為蠱書也千乘三去亥有二首六身數也古之時人人知之而今日遂為絶學且曰藝而已矣不知之無害也此近代之儒所以自文其空疏也斗與辰合周禮大司樂注此據十二辰之斗建與日辰相配合皆以陽律為之主隂吕來合之是以大師云掌六律六同以合隂陽之聲黄鍾子之氣也十一月建焉而辰在星紀大吕丑之氣也十二月建焉而辰在𤣥枵故奏黄鍾歌大吕以祀天神今五行家言子與丑合大蔟寅之氣也正月建焉而辰在娵訾應鍾亥之氣也十月建焉而辰在析木故奏大蔟歌應鍾以祀地祗寅與亥合諲南齊書禮志太常丞何之議禮孟春之月擇元辰躬耕帝藉鄭注云元辰蓋郊後吉亥也五行説十二辰為六合寅與亥合建寅月東耕取月建與日辰合也姑洗辰之氣也三月建焉而辰在大梁南吕酉之氣也八月建焉而辰在夀星故奏姑洗歌南吕以祀四望辰與酉合㽔賓午之氣也五月建焉而辰在鶉首林鍾未之氣也六月建焉而辰在鶉火故奏蕤賓歌南鍾林鍾也以祭山川午與朱合仲呂巳之氣也四月建焉而辰在實沈夷則申之氣也七月建焉而辰在鶉尾故奏夷則歌小呂仲呂也以享先姚巳與申合夾鍾卯之氣也二月建焉而辰在降婁無射戍之氣也九月建焉而辰在大火故奏無射歌夾鍾以享先祖卯與戍合太𤣥經所謂斗振天而進日違天而退先王作樂以象天地其必有以合之矣凶聲凡建國禁其淫聲過聲凶聲慢聲凶聲如殷紂好為北鄙之聲所謂亢厲而微末以象殺伐之氣者也注謂亡國之聲若桑間濮上此則一淫聲巳該之矣八音先王之制樂也具五行之氣夫水火不可得而用也故寓火於金寓水於石鳬氏為鍾火之至也泗濱浮磬水之精也石生於土而得夫水火之氣火石多水石少泗濵磬石得水之精者也故浮用天地之精以制器是以五行備而八音諧矣土鼓樂之始也陶匏祭之大也二者之音非以悦耳存其質也國語伶州鳩曰匏竹利制又曰匏以宣之瓦以贊之今之大樂久無匏土二音舊唐書音樂志笙女媧氏造列管於匏上内簧其中今之笙竽並以木代匏而漆之無匏音矣其宋葉少藴避暑錄話大樂舊無匏土二音笙以木刻本而不用匏塤亦木為之元史匏以斑竹為之而八音但有其六矣熊氏謂匏音亡而清㢘忠敬者之不多見吾有感於其言元熊朋來五經説曰八音之有笙宜以竹稱而乃以匏稱是所重在匏也古者造笙必以曲沃之匏汶陽之竹漢太學槐市各持方物列磬懸匏八音之匏於卦為艮於風為融於氣為立春匏音啾以立清闕之則清廉者鮮矣匏音正則人思敬不正則忠敬者鮮矣為禮樂之官者尚申請而改正之用火有明火有國火明火以陽燧取之於日司烜氏近於天也故卜與祭用之菙氏大祝大司宼國火取之五行之木司爟近於人也故烹飪用之古人用火必取之於木而復有四時五行之變素問黃帝言壯火散氣少火生氣季春出火貴其新者少火之義也今人一切取之於石其性猛烈而不宜人疾疢之多年夀之減有自來矣詳見第二十五卷介子推條邵氏學史曰古有火正之官語曰鑽燧改火此政之大者也所謂光融天下者於是乎在史記楚世家重黎為帝嚳火正能光融天下命曰祝融周禮司烜氏所掌及春秋宋衛陳鄭所紀者政皆在焉今治水之官猶夫古也而火獨缺焉飲知擇水而亨不擇火以祭以養謂之備物可乎或曰庭燎則有司矣雖然此火之末也涖戮于社大司宼大軍旅涖戮于社注社謂社主在軍者也書甘誓用命賞于祖不用命戮于社孔安國云天子親征必載遷廟之祖主及社主行有功則賞祖主前示不專也不用命奔北者則戮之於社主前社主隂隂主殺親祖嚴社之義也記曰社所以神地之道意古人以社為隂主若其司刑殺之柄者故祭勝國之社則士師為之尸而王莽之將亡赦城中囚徒授兵殺豨飲其血曰有不為新室者社鬼記之宋襄公季平子皆用人於社而亡曹之夢亦曰立於社宫宰我戰栗之對有自來矣邦朋士師掌士之八成七曰為邦朋太公對武王民有十大而曰民有百里之譽千里之交六大也又曰一家害一里一里害諸侯諸侯害天下嗟乎此太公之所以誅華士也世衰道微王綱弛於上而私黨植於下故箕子之陳洪範必皇建其有極而後庶民人無淫朋比德易泰之九二曰朋亡渙之六四曰渙其羣元吉莊子文王寓政於臧丈人而列士壞植散羣荀悅論曰言論者計薄厚而吐辭選舉者度親疎而舉筆苞苴盈於門庭聘問交於道路書記繁於公文私務衆於官事世之弊也古今同之可為太息者此也王公六職之一坐而論道謂之王公王亦為六職之一也未有無事而為人君者故曰天子一位奠摯見于君士冠士之嫡子繼父者也故得奠摯見于君庶子不得見君左傳昭公四年仲與公御菜書觀于公叔孫怒而逐之是也主人主人爵弁纁裳緇袘注主人壻也壻為婦主主人筵于户西注主人女父也親迎之禮自夫家而行故壻稱主人至於婦家則女父又當為主人故不嫌同辭也女父為主人則壻當為賓故曰賓東面荅拜注賓壻也對女父之辭也至於賓出而婦從則變其文而直稱曰壻壻者對婦之辭也曰主人曰賓曰壻一人而三異其稱可以見禮時為大而義之由内矣辭無不腆無辱歸妹人之終始也先王於此有省文尚質之意焉故辭無不腆無辱賓不稱幣不善主人不謝來辱告之以直信曰先人之禮而已所以立生民之本而為嗣續之基故以内心為主而不尚乎文辭也非徒以教婦德而已某子受酬鄉飲酒禮某子受酬注某者衆賓姓也鄉射禮某酬某子注某子者氏也古人男子無稱姓者從鄉射禮注為得如左傳叔孫穆子言叔仲子子服子之類士昏禮皇舅某子此或謚或字之稱與聘禮皇考某子同疏以為若張子李子婦人内夫家豈有稱其舅為張子李子者哉辯鄉飲酒禮鄉射禮其於旅酬皆言辯注云辯衆賓之在下者此辯非辨察之辨古字辯與徧通經文言辯者非一燕禮注今文辯皆作徧是也曲禮主人延客食胾然後辯殽内則子師辯告諸婦諸母名宰辯告諸舅名玉藻先飯辯嘗羞飲而俟樂記其治辯者其禮具注辯徧也左傳定公八年子言辯舍爵於季氏之廟而出注辯猶周徧也史記禮書瑞應辯至須臾寡君有不腆之酒請吾子之與寡君須臾焉使某也以請古者樂不踰辰燕不移漏故稱須臾言不敢久也記曰飲酒之節朝不廢朝莫不廢夕而書酒誥之篇曰在昔殷先哲王廸畏天顯小民經德秉哲越在外服侯甸男衞邦伯越在内服百僚庶尹惟亞惟服宗工越百姓里居罔敢湎于酒不惟不敢亦不暇是豈待初筵之規三爵之制而後不得醉哉飱不致聘禮管人為客三日具沐五日具浴飱不致賓不拜沐浴而食之即孟子所謂廪人繼粟庖人繼肉不以君命將之恐勞賓也三年之喪今人三年之喪有過於古人者三事禮記三年問曰三年之喪二十五月而畢荀子同檀弓曰祥而縞是月禫徙月樂王肅云是祥之月而禫禫之明月可以樂矣又曰魯人有朝祥而莫歌者子路笑之夫子曰由爾責於人終無巳夫三年之喪亦已久矣夫子路出夫子曰又多乎哉踰月則其善也喪服小記曰再期之喪三年也春秋閔公二年公羊傳曰三年之喪實以二十五月白虎通三年之喪再期二十五月後漢書陳忠疏言先聖縁人情而著其節制服二十五月淮南子飭喪紀髙誘注紀數也二十五月之數也孔安國書傳太甲篇云湯以元年十一月崩至此二十六月三年服闋鄭𤣥謂二十四月再期其月餘日不數為二十五月中月而禫則空月為二十六月出月禫祭為二十七月與王肅異魏明帝以景初三年正月崩至五年正月積二十五晦為大祥太常孔美博士趙怡等以為禫在二十七月其年四月祫祭散騎常侍王肅博士樂詳等以為禫在祥月其年二月祫祭晉武帝時越騎校尉程猗贊成王肅駮鄭禫二十七月之失為六徴三驗博士許猛扶鄭義作釋六徴解三驗以二十七月為得並見魏書禮志按三年問曰至親以期斷是何也曰天地則已易矣四時則已變矣其在天地之中者莫不更始焉以是象之也然則何以三年也曰加隆焉爾也焉使倍之故再期也今從鄭氏之説三年之喪必二十七月宋武帝永初元年十月辛夘改晉所用王肅祥禫二十六月儀依鄭𤣥二十七月而後除其過於古人一也儀禮喪服篇曰疏衰裳齊牡麻絰冠布纓削杖布帶疏屨期者父在為母傳曰何以期也屈也至尊在不敢伸其私尊也禮記雜記下篇曰期之喪十一月而練十三月而祥十五月而禫註云此謂父在為母也喪大記曰期終喪不食肉不飲酒父在為母為妻又曰期居廬終喪不御於内者父在為母為妻喪服四制曰資於事父以事母而愛同天無二日土無二王國無二君家無二尊以一治之也故父在為母齊衰期者見無二尊也服問曰三年之喪既練矣有期之喪既葬矣則帶其故葛帶絰期之絰服其功衰徐師曾集注曰三年之䘮謂父喪也期之喪母喪也賈公彦喪服疏所云父卒三年之内而母卒仍服期必父服既除而遭母喪乃得伸三年也喪服傳曰禽獸知母而不知父野人曰父母何算焉都邑之士則知尊禰矣今從武后之制亦服三年之服自唐以前禮制父在為母一周除靈三年心喪髙宗上元元年十二月天后上表請父在為母服齊衰三年從之𤣥宗開元五年右補闕盧履冰上言孝莫大於嚴父故父在為母服齊衰周心喪三年情己申而禮殺也則天皇后改服齊衰三年請復其舊上下其議左散騎常侍褚無量以履冰議為是諸人爭論連年不決七年八月辛夘敕自今五服並依喪服傳文然士大夫議論猶不息行之各從其意無量歎曰聖人豈不知母㤙之厚乎厭降之禮所以明尊卑異戎翟也俗情膚淺不知聖人之心一紊其制誰能正之二十年中書令蕭嵩改脩五禮復請依上元敕父在為母齊衰三年從之按父在為母齊衰三年起自開元禮然其時盧懐慎以母憂起復為兵部侍郎張九齡以母憂起復中書侍郎同平章事邠王守禮以母憂起復左金吾衞將軍嗣鄂王邕以母憂起復衞尉卿而得終禮制者惟張説韓休二人則明皇固巳崇其文而廢其實矣今制父在為母斬衰三年按太祖實録洪武七年九月庚寅貴妃孫氏薨命吳王橚服慈母服斬衰三年以主喪事敕皇太子諸王皆服期乃命翰林學士宋濓等修孝慈録立為定制子為父母庶子為其母皆斬衰三年嫡子衆子為其庶母皆齊衰杖期十一月壬戍朔書成此則當時别有所為而未可為萬世常行之道也其過於古人二也喪服篇又曰不杖麻屨者婦為舅姑傳曰何以期也從服也檀弓上篇曰南宫縚之妻之姑之喪夫子誨之髽曰爾毋從從爾爾毋扈扈爾葢榛以為笄長尺而總八寸正義謂以其為期之喪而殺於斬衰之服喪服小記曰婦人為夫與長子稽顙其餘則否今從後唐之制婦為舅姑亦服三年宋史乾德三年判大理寺尹拙言按律及儀禮喪服傳開元禮五禮精義三禮圖等書所載婦為舅姑服期近代時俗多為重服望加裁定右僕射魏仁浦等奏曰按禮内則云婦事舅姑如事父母則舅姑與父母一也而古禮有期年之説至於後唐始定三年之喪竊以三年之内几筵尚存豈可夫居苫塊之中婦被綺紈之飾夫婦齊體哀樂不同求之人情實傷理本况婦為夫有三年之服於舅姑止服朞年是尊夫而卑舅姑也孝明皇后為昭憲太后服喪三年足以為萬世法望自今婦為舅姑服並如後唐之制三年齊斬一從其夫詔從之何孟春餘冬序錄引唐李涪論曰喪服傳婦為舅姑齊衰五升布十一月而練十三月而祥十五月而禫禫後門庭尚素婦服青縑衣以俟夫之終喪習俗以婦之服青縑謂其尚在喪制故因循亦同夫之喪紀再周而後吉貞元十一年河中府倉曹參軍蕭據狀稱堂兄至女適李氏壻見居喪今時俗婦為舅姑服三年恐為非禮請禮院詳定下詳定判官前太常博士李岧議曰開元禮五服制度婦為舅姑及女子適人為其父母皆齊衰不杖期葢以為婦之道專一不得自達必繫於人故女子適人服夫以斬而降其父母喪服篇曰女子子適人者為其父母傳曰為父何以期也婦人不貳斬也婦人不貳斬者何也婦人有三從之義無専用之道故未嫁從父既嫁從夫夫死從子故父者子之天也夫者妻之天也婦人不貳斬者猶曰不貳天也先聖格言厯代不敢易以此論之父母之喪尚止周嵗舅姑之服無容三年今之學者不本其義輕重紊亂寖以成俗開元禮𤣥宗所脩布在有司頒行天下伏請正牒以明典章李岧之論可謂正矣宋朝詒謀錄乾德三年詔舅姑之喪婦從其夫齊斬三年遂為定制宋人葢未講服青縑之制故也其過於古人三也皆後儒所不敢議非但因循國制亦畏宰我短喪之譏若乃日月雖多而哀戚之情不至焉則不如古人逺矣古人以祥為喪之終中月而禫則在除服之後故喪服四制言祥之日鼓素琴示民有終也檀弓言孔子既祥五日彈琴而不成聲十日而成笙歌有子葢既祥而絲履組纓又曰祥而外無哭者禫而内無哭者樂作矣故也自魯人有朝祥而暮歌者子路笑之孔子言踰月則其善而孟獻子禫縣而不樂孔子曰獻子加於人一等矣於是自禫而後乃謂之終喪王肅據三年問二十五月而畢檀弓祥而縞是月禫徙月樂之文謂為二十五月鄭𤣥據服問中月而禫之文謂為二十七月注云中月間一月也正義引喪服小記云妾祔於妾祖姑亡則中一以上而祔乂學記云中年考校皆以中為間二説各有所據古人祭當卜日小祥卜於十三月之日大祥卜於二十五月之日而禫則或於大祥之月是月或於大祥之後間一月中月自禮記之時而行之已不同矣孝經援神契曰喪不過三年以期增倍五五二十五月義斷仁示民有終故漢人喪服之制謂之五五堂邑令費鳯碑曰菲五五縗杖其未除洪氏曰菲五五者居喪菲食二十五月也此取論語菲飲食字隋書姚蔡傳所謂蔬菲巴郡太守樊敏碑曰遭離母憂五五斷仁是也為父斬衰三年為母齊衰三年此從子制之也父在為母齊衰杖期此從夫制之也家無二尊而子不得自專所謂夫為妻綱父為子綱審此可以破學者之疑而息紛紜之説矣父在為母雖降為期而心喪之實未嘗不三年也如後魏彭城王勰毁瘠三年弗參吉慶乃謂之心䘮傳曰父必三年然後娶達子之志也正義曰左氏昭公十五年傳王一嵗而有三年之喪二焉據大子與穆后天子為后亦期而言三年喪者據達子之志而言故并謂之三年也用唐太宗貞觀元年詔有云妻喪達制之後者即此傳文假令娶於三年之内將使為之子者何服以見何情以處乎理有所不可也抑其子之服於期而申其父之不娶於三年聖人所以損益百世而不可改者精矣檀弓上篇伯魚之母死期而猶哭夫子聞之曰誰與哭者門人曰鯉也夫子曰嘻其甚也伯魚聞之遂除之此自父在為母之制當然疏以為出母者非喪服小記曰庶子在父之室則為其母不禫山隂陸氏曰在父之室為未娶者也并禫祭不舉厭也唐時武韋二后皆以婦乘夫欲除三綱變五服以申尊母之義故髙宗上元元年十二月壬寅天后上表請父在為母服齊衰三年中宗神龍元年五月丙申皇后表請天下士庶為出母三年服其意一也彼且欲匹二聖於天皇陪南郊以亞獻而況區區之服制乎盧履冰表言原夫上元肇年則天巳潛秉政將潛簒預自崇加請升慈愛之喪以抗尊嚴之禮雖齊斬之儀不改而几筵之制遂同數年之間尚未通用天皇晏駕中宗蒙塵垂拱之末果行聖母之偽符載初之元遂啓易代之深釁孝和雖仍反正韋氏復效晨鳴孝和非意暴崩韋氏旋即稱制易曰臣弑其君子弑其父非一朝一夕之故其斯之謂矣臣謹尋禮意防杜實深若不早圖刋正何以垂戒於後𤣥宗開元七年八月癸丑敕周公制禮厯代不刋子夏為傳孔門所受格條之内有父在為母齊衰三年指天后所定此有為而為非尊厭之義與其改作不如師古諸服紀宜一依喪服舊文可謂簡而當矣柰何信道不篤朝令夕更至二十四年又從韋縚之言加舅母堂姨舅之服天寳六載又令出母終三年之服詳舊書儀禮志而太和開成之世遂使駙馬為公主服斬衰三年文宗紀杜悰傳禮教之淪有由來矣自古以來姦人欲蔑先王之禮法而自為者必有其漸天后父在為母齊衰三年之請其意在乎臨朝也故中宗景龍二年二月庚寅大赦天下内外五品巳上母妻各加邑號一等無妻者聽授其女而安樂公主求立為皇太女遂進鴆於中宗矣金世宗大定八年二月甲午朔制子為改嫁母服喪三年洪武七年雖定為母斬衰三年之制而孝慈皇后之喪次年正旦皇太子親王駙馬俱淺色常服則尊厭之禮未嘗不用也夫惟二十七月之内不聽樂不昏嫁不赴舉不服官此所謂心喪固百世不可改矣喪服小記曰祖父卒而后為祖母後者三年鄭氏曰祖父在則其服如父在為母也此祖母之喪厭於祖父者也婦事舅姑如事父母而服止於期不貳斬也然而心喪則未嘗不三年矣故曰與更三年喪不去吳㓜清服制攷詳序曰凡喪禮制為斬衰功緦之服者其文也不飲酒不食肉不處内者其實也中有其實而外飾之以文是為情文之稱徒服其服而無其實則與不服等爾雖不服其服而有其實者謂之心喪心喪之實有隆而無殺服制之文有殺而有隆古之道也愚嘗謂服制當一以周公之禮為正後世有所増改者皆溺乎其文昧乎其實而不究古人制禮之意者也為母齊衰三年而父在為母杖期豈薄於其母哉葢以夫為妻之服既除則子為母之服亦除家無二尊也子服雖除而三者居喪之實如故則所殺者三年之文而巳實固未嘗殺也女子子在室為父斬既嫁則為夫斬而為父母期葢曰子之所天者父妻之所天者夫嫁而移所天於夫則降其父婦人不貳斬者不貳天也降巳之父母而期為夫之父母亦期期之後夫未除服婦已除服而居喪之實如其夫是舅姑之服期而實三年也豈必從夫服斬而後為三年哉喪服有以恩服者有以義服者有以名服者恩者子為父母之類是也義者婦為舅姑之類是也名者為從父從子之妻之類是也從父之妻名以母之黨而服從子之妻名以婦之黨而服兄弟之妻不可名以妻之黨其無服者推而逺之也然兄弟有妻之服巳之妻有娣姒婦之服一家老幼俱有服巳雖無服不必華靡於其躬宴樂於其室如無服之人也同爨且服緦同釁服緦為從母之夫舅之妻與已同爨者爾此所引似汎言之矣朋㕛尚加麻鄰喪里殯猶無相杵巷歌之聲奚獨於兄嫂弟婦之喪而恝然待之如行路之人乎古人制禮之意必有在而未易以淺識窺也夫實之無所不隆者仁之至文之有所或殺者義之精古人制禮之意葢如此後世父在為母三年婦為舅姑從夫斬齊並三年為嫂有服為弟婦亦有服意欲加厚於古而不知古者子之為母婦之為舅姑叔之於嫂未嘗薄也愚故曰此皆溺乎其文昧乎其實而不究古人制禮之意者也古人所勉者喪之實也自盡於巳者也後世所加者喪之文也表暴於人者也誠偽之相去何如哉繼母如母繼母如母以配父也慈母如母以貴父之命也然於其黨則不同矣服問曰母出則為繼母之黨服母死則為其母之黨服為其母之黨服則不為繼母之黨服鄭氏注曰雖外親亦無二統夫禮者所以别嫌明微非聖人莫能制之此類是矣喪服小記為慈母之父母無服為所後者之祖父母妻妻之父母昆弟昆弟之子若子此因為人後而推言之所後者有七等之親皆當如禮而為之服也所後之祖我之曾祖也父母我之祖父母也妻我之母也妻之父母我之外祖父母也因妻而及故連言之取便文也昆弟我之世叔父也昆弟之子我之從父昆弟也若及也若子我之從父昆弟之子也正義謂妻之昆弟妻之昆弟之子者非鄭以若子為如親子但篇末又有兄弟之子若子之文當同一解女子子在室為父鄭氏注言在室者關巳許嫁關該也謂許嫁而未行遭父之喪亦當為之布總箭笄髽三年也内則曰有故二十三年而嫁曾子問孔子曰女在塗而女之父母死則女反是也慈母如母慈母者何也子㓜而母死養於父妾父卒為之三年所以報其鞠育之恩也然而必待父命者此又先王嚴父而不敢自專其報之義也父命妾曰女以為子謂憐其無母視之如子長之育之非立之以為妾後也喪服小記以為為慈母後則未可信也禮記曾子問篇子游問曰喪慈母如母禮與孔子曰非禮也古者男子外有傅内有慈母君命所使教子也此與喪服所言慈母不同何服之有昔者魯昭公少喪其母有慈母良及其死也公弗忍也欲喪之有司以聞曰古之禮慈母無服今也君為之服是逆古之禮而亂國法也若終行之則有司將書之以遺後世無乃不可乎公曰古者天子練冠以燕居吾弗忍也遂練冠以喪慈母喪慈母自魯昭公始也然但練冠以居則異於如母者矣而孔子以為非禮南史司馬筠傳梁天監七年安成國太妃陳氏薨詔禮官議皇太子慈母之服筠引鄭𤣥説服止卿大夫不宜施之皇子武帝以為不然曰禮言慈母有三條一則妾子無母使妾之無子者養之命為子母服以三年喪服齊衰章所言慈母如母是也二則嫡妻子無母使妾養之雖均乎慈愛但嫡妻之子妾無為母之義而恩深事重故服以小功喪服小功章所以不直言慈母而云庶母慈巳者文曰庶母則知其為嫡妻之子矣明異於三年之慈母也其三則子非無母擇賤者視之義同師保而不無慈愛故亦有慈母之名師保無服則此慈母亦無服矣内則云擇於諸母與可者使為子師其次為慈母其次為保母此其明文言擇諸母是擇人而為此三母非謂擇取兄弟之母也子游所問自是師保之慈非三年小功之慈也故夫子得有此荅豈非師保之慈母無服之證乎鄭𤣥不辨三慈混為訓釋引彼無服以注慈巳後人致謬實此之由於是筠等請依制改定嫡妻之子母沒為父妾所養服之五月貴賤並同以為永制喪服小記曰為慈母之父母無服注曰恩所不及故也又曰慈母與妾母不世祭也然則雖云如母有不得盡同於母者矣出妻之子為母出妻之子為母此經文也傳曰出妻之子為母期則為外祖父母無服此子夏傳也傳曰絶族無移服親者屬此傳中引傳援古人之言以證其無服也當自為一條出妻之子為父後者則為出母無服此又經文也傳曰與尊者為一體不敢服其私親也此子夏傳也當自為一條今本乃誤連之父卒繼母嫁父卒繼母嫁從從字句謂年幼不能自立從母而嫁也母之義巳絶於父下章云妻不敢與焉是也故不得三年而其恩猶在於子不可以不為之服也繼母本非屬毛離裏之親以其配父而服之如母爾故王肅曰從乎繼而寄育則為服不從則不服報者母報之也兩相為服也有適子者無適孫冢子身之副也家無二主亦無二副故有適子者無適孫唐髙宗有太子而復立太孫非矣為人後者為其父母為人後者為其父母此臨文之不得不然隋書劉子翊云其者因彼之辭是也後儒謂以所後為父母而所生為伯叔父母於經未有所攷亦自尊無二上之義而推之也宋歐陽氏據此文以為聖人未嘗沒其父母之名辨之至數千言然不若趙瞻之言辭窮直書為簡而當也宋史趙瞻傳中書請濮安懿王稱親瞻爭曰仁宗既下明詔子陛下議者顧惑禮律所生所養之名妄相訾難彼明知禮無兩父貳斬之義敢裂一字之辭以亂厥真且文有去婦出母者去已非婦岀不為母辭窮直書豈足援以斷大義哉臣請與之廷辨以定邪正詆石林燕語濮議廷臣既皆欲止稱皇伯歐陽文忠力以為不然因引儀禮及五服敕云為人後者為其父母則是雖出繼而於本生猶稱父母也時未有能雖之者司馬君實在諫院獨疏言為人後而言父母此因服立文舍父母則無以為稱非謂其得稱父母也按經文言其父母其昆弟者大抵皆私親之辭黄氏日鈔曰歐公被隂私之謗皆激於當日主濮議之力公集濮議四卷又設為或問以發明之滔滔數萬言皆以禮經為其父母一語謂未嘗因降服而不稱父母耳然既明言所後者三年而於所生者降服則尊無二上明矣謂所生父母者葢本其初而名之非有兩父母也未為人後之時以生我者為父母已為人後則以命我者為父母立言者於既命之後而追本生之稱自宜因其舊以父母稱未必其人一時並稱兩父母也公亦何苦力辨而至於困辱危身哉况帝王正統相傳有自非可常人比邪觀先朝嘉靖之事至於入廟稱宗而後知聖人制禮别嫌明微之至也永叔博聞之儒而未見及此學者所以貴乎格物為人後者為其父母報謂所生之父母報之亦為之服期也重其繼大宗也故不以出降繼父同居者夫物之不齊物之情也雖三王之世不能使天下無孤寡之人亦不能使天下無再適人之婦且有前後家東西家而為喪主者矣假令婦年尚少夫死而有三五嵗之子則其本宗大功之親自當為之收恤又無大功之親而不許之從其嫁母則轉於溝壑而已於是其母所嫁之夫視之如子而撫之以至於成人此子之於若人也名之為何不得不稱為繼父矣長而同居則為之服齊衰期先同居而後别居則齊衰三月以其撫育之恩次於生我也為此制者所以寓恤孤之仁而勸天下之人不獨子其子也若曰以其貨財為之築宫廟此後儒不得其說而為之辭宗子之母在則不為宗子之妻服也正義謂母年未七十尚與祭非也祭統曰夫祭也者必夫婦親之是以舅歿而姑老内則明其不與祭矣夫人亞祼母不可以亞子故老而傳事雖老固嘗為主祭之人而禮無二敬故為宗子之母服則不為妻服杜氏通典有夫為祖曾祖髙祖父母持重妻從服議一條云孔瑚問虞喜曰假使𤣥孫為後𤣥孫之婦從服期曾孫之婦尚存纔緦麻近輕逺重情實有疑喜荅曰有嫡子者無嫡孫又若為宗子母服則不服宗子婦以此推之若𤣥孫為後而其母尚存𤣥孫之婦猶為庶不得傳重傳重之服理當在姑矣宋庾蔚之唐志庾蔚之注喪服要記五巻謂舅歿則姑老是授祭事於子婦至於祖服自以姑為嫡與此條之意互相發明君之母妻與民同者為其君齊衰三月也不與民同者君之母妻民不服而嘗仕者獨為之服也古之卿大夫有見小君之禮如成公九年季文子如宋致女復命公享之穆姜出於房再拜是也而妻之爵服則又君夫人命之是以不容無服齊衰三月不言曾祖巳上宋沈括夢溪筆談曰喪服但有曾祖曾孫而無髙祖𤣥孫或曰經之所不言則不服是不然曾重也自祖而上者皆曾祖也自孫而下者皆曾孫也雖百世可也茍有相逮者則必為服喪三月故雖成王之於后稷亦稱曾孫而祭禮祝文無逺近皆曰曾孫禮記祭法言適子適孫適曾孫適𤣥孫適來孫左傳王子虎盟諸侯亦曰及而𤣥孫無有老㓜僖公二十八年𤣥孫之文見於記傳者如此史記孟嘗君傳孫之孫為何曰為𤣥孫然宗廟之中並無此稱詩維天之命駿惠我文王曾孫篤之鄭氏箋曰曾猶重也自孫之子而下事先祖皆稱曾孫禮記郊特牲稱曾孫某注謂諸侯事五廟也於曾祖已上稱曾孫而已信南山正義自曾祖以至無窮皆得稱曾孫左傳哀公二年衞太子禱文王稱曾孫蒯瞶晉書鍾雅傳元帝詔曰禮事宗廟自曽孫已下皆稱曾孫義取於重孫可厯世共其名無所改也曾祖父母齊衰三月而不言曾祖父之父母後人謂之髙祖非經文之脱漏也葢以是而推之矣凡人祖孫相見其得至於五世者鮮矣夀至八九十而後可以見曾孫之子百有餘年而曾孫之子之子亦可見矣人之夀以百年為限故服至五世而窮茍六世而相見焉其服不異於曾祖也經於曾祖已上不言者以是而推之也晉徐農人問殷仲堪謂假如𤣥孫持髙祖重來孫都無服及賀循傳謂髙祖已上五世六世無服之祖者並非觀於祭之稱曾孫不論世數而知曾祖之名統上世而言之矣兄弟之妻無服謂弟之妻婦者其嫂亦可謂之母乎記大傳文同葢言兄弟之妻不可以母子為比以名言之既有所閡而不通以分言之又有所嫌而不可以不逺記曰嫂叔之無服也葢推而逺之也夫外親之同爨猶緦而獨兄弟之妻不為制服者以其分親而年相亞故聖人嫌之嫌之故逺之而大為之坊曲禮嫂叔不通問不獨以其名也此又傳之所未及也存其恩於娣姒而斷其義於兄弟夫聖人之所以處此者精矣大傳疏曰有從有服而無服嫂叔是也有從無服而有服娣姒是也叔嫂雖不制服然而曰無服而為位者惟叔嫂奔喪子思之哭嫂也為位檀弓何也曰是制之所抑而情之所不可闕也然而鄭氏曰正言嫂叔尊嫂也若兄公與弟之妻則不能也正義曰兄公與弟妻不為位者卑逺之弟妻於兄公不為位者尊絶之此又足以補禮記之不及檀弓言嫂叔之無服雜記言嫂不撫叔叔不撫嫂是兼兄公與弟妻先君餘尊之所厭尊尊親親周道也諸侯有一國之尊為宗廟社稷之主既沒而餘尊猶在故公之庶子於所生之母不得伸其私恩為之大功也大夫之尊不及諸侯既沒則無餘尊故其庶子於父卒為其私親並依本服如邦人也親不敵尊故厭尊不敵親故不厭此諸侯大夫之辨也後魏廣陵侯衍為徐州刺史所生母雷氏卒表請解州詔曰先君餘尊之所厭禮之明文季末陵遲斯典或廢侯既親王之子宜從餘尊之義便可大功饒陽男遥官左衞將軍遭所生母憂表請解任詔以餘尊所厭不許晉哀帝欲為皇太妃服三年僕射江虨啓於禮應服緦麻又欲降服期虨曰厭屈私情所以上嚴祖考乃服緦麻胡三省曰以帝入後大宗則太妃乃琅邪國母當以服諸侯者服之也貴臣貴妾此謂大夫之服貴臣室老士也貴妾姪娣也皆有相助之義故為之服緦穀梁傳曰姪娣者不孤子之義也古者大夫亦有姪娣左傳臧宣叔娶於鑄生賈及為而死繼室以其姪生紇是也備六禮之制合二姓之好從其女君而歸焉故謂之貴妾雷次宗曰姪娣貴而大夫尊輕故服至於餘妾出自凡庶故不服士無姪娣故喪服小記曰士妾有子而為之緦然則大夫之妾雖有子猶不得緦也惟夫有死於宫中者則為之三月不舉祭近之矣唐李晟夫人王氏無子妾杜氏生子愿詔以為嫡子及杜之卒也贈鄭國夫人而晟為之服緦議者以為準禮士妾有子而為之緦開元新禮無是服矣而晟擅舉復之頗為當時所誚册府元龜今之士大夫緣飾禮文而行此服者比比也外親之服皆緦外親之服皆緦外祖父母以尊加故小功從母以名加故小功太傳服術有六三曰名名此謂母之兄弟異德異名母之姊妹同德同庾蔚之云男女異長母之在室與其姊妹有同居共席之禮故許其因母名以加服唐𤣥宗開元二十三年制令禮官議加服制太常卿韋縚請加外祖父母服至大功九月舅服至小功五月堂姨堂舅舅母服至袒免太子賓客崔沔議曰禮教之設本於正家家正而天下定矣正家之道不可以貳總一定義理歸本宗所以父以尊崇母以厭降内有齊斬外服皆緦尊名所加不過一等此先王不易之道其來久矣昔辛有適伊州見被髮而祭於野者曰不及百年此其戎乎其禮先亡矣貞觀脩禮特改舊章漸廣渭陽之恩不遵洙泗之典及𢎞道之後唐元之間韋氏弑中宗立温王重茂改元唐龍今避𤣥宗御名上字故稱唐元國命再移於外族矣禮亡徴兆儻見於斯開元初補闕盧履冰嘗進狀論喪服輕重敕令僉議於時羣議紛拏各安積習太常禮部奏依舊定陛下運稽古之思發獨斷之明特降别敕一依古禮事符典故人知向方式固宗盟社稷之福更圖異議竊所未詳願守八年明㫖以為萬代成法職方郎中韋述議曰天生萬物惟人最靈所以尊尊親親别生分類存則盡其愛敬歿則盡其哀戚緣情而制服考事而立言往聖討論亦已勤矣上自髙祖下至𤣥孫以及其身謂之九族由近而及逺稱情而立文差其輕重遂為五服雖則或以義降或以名加數有所從理不踰等百王不易三代可知若以匹敵言之外祖則祖也舅則伯叔父之列也父母之恩不殊而獨殺於外氏者所以尊祖禰而異於禽獸也且家無二尊喪無二斬持重於大宗者降其小宗為人後者減其父母之服女子出嫁殺其本家之喪葢所存者逺所抑者私也今若外祖及舅更加服一等堂舅及姨列於服紀之内則中外之制相去㡬何廢禮徇情所務者末且五服有上殺之義必循原本方及條流伯叔父母本服大功九月今伯叔父母期是加服從父昆弟亦大功九月並以上出於祖其服不得過於祖也從祖祖父母從祖父母從祖昆弟皆小功五月以出於曽祖服不得過於曾祖也族祖祖父母族祖父母族祖昆弟皆緦麻三月以出於髙祖服不得過於髙祖也堂舅姨既出於外曾祖若為之制服則外曾祖父母及外伯叔祖父母亦宜制服矣外祖加至大功九月則外曾祖父母合至小功外髙祖合至緦麻若舉此而舍彼事則不均棄親而錄疏理則不順推而廣之則與本族無異矣且服皆有報則堂外甥外曾孫姪女之子皆須制服矣聖人豈薄其骨肉背其恩愛葢本於公者薄於私存其大者略其細義有所斷不得不然茍可加也亦可減也往聖可得而非則禮經可得而隳矣先王之制謂之彝倫奉以周旋猶恐失墜一紊其敘庸可止乎禮部員外郎楊仲昌議曰按儀禮為舅緦鄭文貞公魏徵議同從母例加至小功五月詳見下條雖文貞賢也而周孔聖也以賢改聖後學何從今之所請正同徴論如以外祖父母加至大功豈不加報於外孫乎外孫為報服大功則本宗庶孫又用何等服邪竊恐内外乖序親疎奪倫情之所沿何所不至昔子路有姊之喪而不除孔子曰先王制禮行道之人皆不忍也子路除之此則聖人援事抑情之明例也記不云乎毋輕議禮時𤣥宗手敕再三竟加舅服為小功舅母緦麻堂姨堂舅袒免宣宗舅鄭光卒詔罷朝三日御史大夫李景讓上言人情於外族則深於宗廟則薄所以先王制禮割愛厚親士庶猶然況於萬乗親王公主宗屬也舅氏外族也今鄭光輟朝日數與親王公主同非所以别親疎防僭越也優詔報之乃罷兩日夫由韋述楊仲昌之言有以探本而尊經由崔沔李景讓之言可以察微而防亂豈非能言之士深識先王之禮而亦目見武韋之禍思永監於將來者哉宗廟之制始變於漢明帝服紀之制始變於唐太宗皆率一時之情而更三代之禮後世不學之主踵而行之唐人增改服制唐人所議服制似欲過於聖人嫂叔無服太宗令服小功曾祖父母舊服三月增為五月嫡子婦大功增為期衆子婦小功增為大功舅服緦増為小功新唐書初太宗嘗以同爨緦而嫂叔乃無服舅與從母親等而異服詔侍中魏徴禮部侍郎令狐德棻等議舅為母族姨乃外戚他姓舅服一時姨乃五月古人未逹者也於是服曾祖父母齊衰三月者増以齊衰五月適子婦大功增以期衆子婦小功増以大功嫂叔服以小功五月報弟妻及夫兄同舅服緦増以小功然律疏舅報甥服猶緦顯慶中長孫無忌以為甥為舅服同從母則舅宜進同從母報又古庶母緦今無服且庶母之子昆弟也為之杖齊是同氣而吉凶異自是亦改服緦父在為母服期髙宗增為三年婦為夫之姨舅無服𤣥宗令從夫服又增舅母緦麻堂姨舅袒免而𢎞文館直學士王元感遂欲增三年之喪為三十六月舊唐書張柬之傳欲何休注公羊傳言魯文公亂聖人制服喪三十六月皆務飾其文欲厚於聖王之制而人心彌澆風化彌薄不探其本而妄為之增益亦未見其名之有過於三王也是故知廟有二主之非則叔孫通之以益廣宗廟為大孝者絀矣知喪不過三年示民有終之義則王元感之服三十六月者絀矣知親親之殺禮所由生則太宗魏徵所加嫂叔諸親之服者絀矣唐書禮樂志言禮之失也在於學者好為曲説而人君一切臨時申其私意以増多為盡禮而不知煩數之為黷也子曰道之不明也賢者過之夫賢者率情之偏猶為悖禮而況欲以私意求過乎三王者哉記曰始死三日不怠三月不解期悲哀三年憂恩之殺也聖人因殺以制節此喪之所以三年賢者不得過不肖者不得不及此喪之中庸也宋熈寧五年中書門下議不祧僖祖祕閣校理王介上議曰夫物有無窮而禮有有限以有限制無窮此禮之所以起而天子所以七廟也今夫自考而上何也必曰祖自祖而上何也必曰曾祖自曾祖而上何也必曰髙祖自髙祖而上又何也必曰不可及見則聞而知之者矣今欲祖其祖而追之不已祖之上又有祖則固有無窮之祖矣聖人制為之限此天子七廟所以自考廟而上至顯祖之外而必祧也自顯祖之外而祧亦猶九族至髙祖而止也皆以禮為之界也五世而斬故也喪之三年也報罔極之恩也以罔極之恩為不足報則固有無窮之報乎何以異於是故喪之罔極而三年也族之久逺而九也廟之無窮而七也皆先王之制弗敢過焉者也記曰品節斯斯之謂禮易於節之象曰君子以制度數議德行唐宋之君豈非昧於節文之意者哉貞觀之喪服開元之廟謚與始皇之狹小先主之宮廷而作為阿房者同一意也報於所為後之兄弟之子若子所後者謂所後之親上斬章言所後者是也鄭注衍一為字所為後謂出而為後之人為人後者於兄弟降一等自期降為大功也兄弟之子報之亦降一等亦自期降為大功也若子者兄弟之孫報之亦降一等自小功降而為緦也庶子為後者為其外祖父母從母舅無服與尊者為一體不敢以外親之服而廢祖考之祭故絀其服也言母黨則妻之父母可知考降考父也既言父又言考者猶易言幹父之蠱有子考无咎也降者骨肉歸復於土也記曰體魄則降人死則魂升於天魄降於地書曰禮陟配天陟言升也又曰放􅈴乃徂落落言降也然而曰文王陟降何也神無方也可以兩在而兼言之噫歆士虞禮聲三注聲者噫歆也將啓户警覺神也曾子問祝聲三注聲噫歆警神也葢歎息而言神其歆我乎猶詩顧予烝嘗之意也喪之皋某復祭之噫歆皆古人命鬼之辭正義曰直云祝聲不知作何聲按論語云顔淵死子曰噫天喪予檀弓云公肩假曰噫是古人發聲多云噫故知此聲亦謂噫也凡祭祀神之所享謂之歆今作聲欲令神歆享故云歆警神也既夕禮聲三注舊説以為噫興也噫興者歎息而欲神之興也噫歆者歎息而欲神之歆也日知録卷五
