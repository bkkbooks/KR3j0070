body:
  text: 日知録卷二十六崑山顧炎武撰史記通鑑兵事秦楚之際兵所出入之塗曲折變化唯太史公序之如指掌以山川郡國不易明故曰東曰西曰南曰北一言之下而形勢瞭然以闗塞江河為一方界限故於項羽則曰梁乃以八千人渡江而西曰羽乃悉引兵渡河曰羽將諸侯兵三十餘萬行畧地至河南曰羽渡淮曰羽遂引東欲渡烏江於髙帝則曰出成􅆏玉門北渡河曰引兵渡河復取成􅆏蓋自古史書兵事地形之詳未有過此者太史公胷中固有一天下大勢非後代書生之所能㡬也司馬溫公通鑑承左氏而作其中所載兵法甚詳凡亡國之臣盜賊之佐苟有一䇿亦具録之朱子綱目大半削去似未逹溫公之意史記於序事中寓論斷古人作史有不待論斷而於序事之中即見其指者惟太史公能之平凖書末載卜式語王翦傳末載客語荆軻傳末載魯句踐語鼂錯傳末載鄧公與景帝語武安侯田蚡傳末載武帝語皆史家于序事中寓論斷法也後人知此法者鮮矣惟班孟堅間一有之如霍光傳載任宣與霍禹語見光多作威福黄霸傳載張敞奏見祥瑞多不以實通傳皆褒獨此寓貶可謂得太史公之法者矣史記史記秦始皇本紀末云宣公初志閏月然則宣公以前皆無閏每三十年多一年與諸國之史皆不合矣則秦之所用者何正邪子長作史記在武帝太初中髙祖功臣年表平陽侯下云元鼎三年今侯宗元年今侯者作史記時見為侯也下又云征和二年侯宗坐太子死國除則後人所續也卷中書征和者二後元者一惠景間侯者年表書征和者一後元者三建元以來侯者年表書征和者二漢興將相年表有天漢太始征和後元以至昭宣元成諸號厯書亦同楚元王世家書地節二年齊悼惠王世家書建始三年者二曹相國世家書征和二年賈誼傳賈嘉至孝昭時列為九卿田叔傳匈奴傳衛將軍傳末有戾太子及巫蠱事司馬相如傳贊揚雄以為靡麗之賦勸百而諷一皆後人所續也河渠書東海引鉅定漢書溝洫志因之東海疑是北海之誤按地理志齊郡縣十二其五曰鉅定下云馬車瀆水首受鉅定東北至琅槐入海又千乘郡博昌下云博水東北至鉅定入馬車瀆而孝武紀曰征和四年春正月行幸東萊臨大海三月上耕於鉅定還幸泰山修封計其道里亦當在齊去東海逺矣凡世家多本之左氏傳其與傳不同者皆當以左氏為正齊世家吾太公望子乆矣此是妄為之説周之太王齊之太公吳之太伯有國之始祖謂之太祖其義一也趙世家趙簡子除三年之喪期而已此因左傳降於喪食之文而誤為之解本無其事敬侯十一年魏韓趙共滅晉分其地成侯十六年與韓魏分晉封晉君以端氏此文重出田敬仲完世家敬仲之如齊以陳氏為田氏此亦太史公之誤春秋傳未有稱田者至戰國時始為田耳仲尼弟子傳公孫龍字子石少孔子五十三嵗按漢書注公孫龍趙人為堅白異同之説者與平原君同時去夫子近二百年殆非也且云少孔子五十三嵗則當田常伐魯之年僅十三四嵗爾而曰子張子石請行豈甘羅外黃舍人兒之比乎商君傳以鞅為大良造將兵圍魏安邑降之此必安邑字誤其下文曰魏惠王使使割河西之地獻於秦以和而魏遂去安邑徙都大梁乃是自安邑徙都之事耳安邑魏都其王在焉豈得圍而便降秦本紀昭王二十一年魏獻安邑若已降於五十年之前何煩再獻乎趙世家敬侯元年始都邯鄲成侯二十二年魏惠王㧞我邯鄲亦有可疑虞卿傳樓昌樓緩恐是一人虞卿進説亦是一事記者或以為趙王不聽或以為聽之太史公兩收之而不覺其重爾燕王遺樂閒書恐即樂毅事而傳者誤以為其子然以二事相校在樂毅當日惠王信䜛易將不得不奔其後徃來復通燕亦未失故君之禮若樂閒不過以言之不聽而遂懟君絶君雖遺之書而不顧此小丈夫之悻悻者矣屈原傳雖放流睠顧楚國繫心懐王不忘欲反卒以此見懐王之終不悟也似屈原放流於懐王之時又云令尹子蘭聞之大怒卒使上官大夫短屈原於頃襄王頃襄王怒而遷之則實在頃襄之時矣放流一節當在此文之下太史公信筆書之失其次序爾隨何説英布當書九江王不當書淮南王歸漢之後始立為淮南王也盖採之諸書其稱未一淮隂侯傳先云范陽辯士蒯通後云齊人蒯通一傳互異韓王信説漢王語乃淮隂侯韓信語也以同姓名而誤漢書孝武紀天漢四年秋九月令死罪人贖錢五十萬減死一等太始二年九月募死罪人贖錢五十萬減死罪一等此一事而重見又同是九月髙帝功臣表十八侯位次一蕭何二曹參三張敖四周勃五樊噲六酈商七奚涓八夏侯嬰九灌嬰十傅寛十一靳歙十二王陵十三陳武十四王吸十五薛歐十六周昌十七丁復十八蟲逹當時所上者戰功而張良陳平皆居中計謀之臣故平列在四十七良列在六十二也至十八侯贊則蕭何第一樊噲第二張良第三周勃第四曹參第五陳平第六張敖第七酈商第八灌嬰第九夏侯嬰第十傅寛第十一靳歙第十二王陵第十三韓信第十四陳武第十五蟲逹第十六周昌第十七王吸第十八而無奚涓薛歐丁復此後人論定非當日之功次矣且韓信已誅死安得復在功臣之位即此可知矣此位次髙后二年所定故凡已絶奪在前者皆不與史家之文多據原本或兩收而不覺其異或並存而未及歸一漢書王子侯表長沙頃王子髙成節侯梁一卷中再見一始元元年六月乙未封一元康元年正月癸卯封此並存未定當删其一而誤留之者也地理志於宋地下云今之沛梁楚山陽濟隂東平及東郡之須昌壽張皆宋分也於魯地下又云東平須昌壽張皆在濟東屬魯非宋地也當攷此並存異説以備攷當小注於下而誤連書者也史記田叔傳既云司直田仁主閉守城門坐縱太子下吏誅死而下又云仁發兵長陵令車千秋上變仁仁族死陘城今在中山國此亦古人附注備攷之文曰古人著書有疑則闕之以待攷如越絶書記吳地傳湖王湖當問之丹湖當問之是也楚元王傳劉徳昭帝時為宗正丞雜治劉澤詔獄而子向傳則云更生父徳武帝時治淮南獄一傳之中自為乖異又其更名向在成帝即位之後而元帝初年即曰徴堪向欲以為諫大夫此兩收而未對勘者也禮樂志上云孝惠二年使樂府夏侯寛備其簫管下云武帝定郊祀之禮乃立樂府武五子傳上云長安白亭東為戾后園下云後八嵗封戾夫人曰戾后置園奉邑樂府之名蚤立於孝惠之世戾園之目預見於八年之前此兩收而未貫通者也夫以二劉之精核猶多不及舉正何恠乎後之讀書者愈鹵莽矣後周書蠕蠕並作茹茹惟列傳二十五卷獨作蠕蠕天文志魏地觜觿參之分野也其界自髙陵以東盡河東河内南有陳留及汝南之召陵㶏疆新汲西華長平潁川之舞陽郾許鄢陵河南之開封中牟陽武酸棗卷皆魏分也按左傳子産曰遷實沈於大夏主參故參為晉星然其疆界亦當至河而止若志所列陳留已下郡縣並在河南於春秋自屬陳鄭二國角亢氐之分也不當併入魏本都安邑至惠王始徙大梁乃據後來之疆土割以相附豈不謬哉食貨志單穆公諫景王鑄大錢本之周語王弗聽卒鑄大錢此廢輕作重不利於民之事班氏乃續之曰以勸農贍不足百姓蒙利焉失其指矣地理志丹陽下云楚之先熊繹所封十八世文王徙郢此誤按史記楚世家成王封熊繹於楚居丹陽徐廣曰在南郡枝江縣水經注曰丹陽城據山跨阜周八里二百八十歩東北兩面悉臨絶澗西帶亭下溪南枕大江嶮峭壁立信天固也楚熊繹始封丹陽之所都也地理志以為吳子之丹陽尋吳楚悠隔繿縷荆山無容遠在吳境非也山海經丹山在丹陽南郭璞注今建平郡丹陽城秭歸縣東七里枚乘傳上云吳王不納乘等去而之梁下云枚乘復説吳王盖吳王舉兵之時乘巳家居而復與之書不然無縁復説也杜周傳周為執金吾遂捕桑𢎞羊衛皇后昆弟子刻深按百官表天漢三年二月執金吾杜周為御史大夫四年卒而衛太子巫蠱事乃在征和二年周之卒已四年其時暴勝之為御史大夫又十一年昭帝元鳯元年御史大夫桑𢎞羊坐燕王旦事誅史家之謬如此王尊傳上行幸雍過虢按今之鳯翔縣乃古雍城而虢在陜幸雍何得過虢當是過美陽之誤美陽故城在今扶風縣北二十里且上文固云自虢令轉守槐里兼行美陽令事矣王商傳春申君獻有身妻而産懐王誤當是幽王外戚傳徙共王母及丁姬歸定陶𦵏共王冡次按丁姬先已𦵏定陶此及丁姬三字衍漢書二志小字漢書地理藝文二志小字皆孟堅本文其師古曰應劭曰服􅐚曰之􅁼乃顔氏注也近本漢書不刻注者誤以此為顔氏注而并删之後漢郡國志云本志惟郡縣名為大書本志司馬彪所撰其山川地名悉為細注今進為大字新注證發臣劉昭采集是則前書小字為孟堅本文猶後漢之細注也其師古等諸注猶後漢之新注也當時相傳之本混作一條未曾分别耳漢書不如史記班孟堅為書束於成格而不及變化且如史記淮隂侯傳末載蒯通事令人讀之感慨有餘味淮南王傳中伍被與王答問語情態横出文亦工妙今悉删之而以蒯伍合江充息夫躬為一傳蒯最寃伍次之二淮傳寥落不堪讀矣荀悦漢紀荀悦漢紀改紀表志傳為編年其叙事處索然無復意味閒或首尾不備其小有不同皆以班書為長惟一二條可采者杜陵陳遂字長子上㣲時與遊戲博奕數負遂上即位稍見進用至太原太守乃賜遂璽書曰制詔太原太守官尊禄重可以償遂博負矣妻君寧時在旁知狀遂乃上書謝恩曰事在元平元年赦前其見厚如此漢書以負遂為負進又曰可以償博進矣進乃悼皇攷之名宣帝不應用之或曰進即賮字財貨也史記吕不韋傳車乘進用不饒荀紀為長元康三年三月詔曰盖聞象有罪而舜封之有痺骨肉之親放而不誅其封故昌邑王賀為海昏侯漢書作骨肉之恩粲而不殊文義難曉荀紀為長按漢書粲而不殊當作􅔁而不誅説文􅔁􅀈􅔁散之也從米殺聲徐引左氏定公四年傳王於是乎殺管叔而􅔁蔡叔言放之若散米今左傳作蔡蔡叔上蔡字亦音素葛反後有善讀者倣裴松之三國志之體取此不同者注于班書之下足為史家之一助紀王莽事自始建國元年以後則云其二年其三年以至其十五年以别於正統而盡沒其天鳯地皇之號後漢書後漢書馬援傳上云帝嘗言伏波論兵與我意合下乃云交阯女子徴側及女弟徴貳反於是璽書拜援伏波將軍此是采輯諸書率爾成文而忘其伏波二字之無所本也自范氏以下史書若此者甚多桓譚傳當王莽居攝簒弑之際天下之士莫不競褒稱徳美作符命以求容􅆺譚獨自守黙然無言按前漢書翟義傳莽依周書作大誥遣大夫桓譚等班行諭告當反位孺子之意還封譚為明告里附城師古曰如古附庸王莽傳當賜爵關内侯者更名曰附城是曾受莽封爵史為諱之爾光武終不用譚當自有説楊震傳河間男子趙騰詣闕上書指陳得失帝怒收考詔獄震上疏救不省騰竟伏尸都市乃安帝時事而張皓傳以為清河趙騰上言災變譏刺朝政收騰繫考皓上疏諫帝悟減騰死罪一等又以為順帝事豈有兩趙騰邪橋𤣥以太尉罷官就醫里舍少子十嵗獨遊門次卒有三人持杖刼執之入舍登樓就𤣥索貨其家之不貧可知乃云及卒家無居業喪無所殯史傳之文前後矛盾𤣥以靈帝之世三為三公亦豈無錢者劉表傳與同郡張儉等俱被訕議號為八顧而黨錮傳表儉二人列於八及前後不同蒯越韓嵩及東曹掾傳㢲等説琮降操則是表卒之後琮已赦嵩而出之矣下文云操至州乃釋嵩之囚此史家欲歸美於操而不顧上下文之相戾也蔡邕傳謂邕亡命江海積十二年中平六年靈帝崩董卓為司空辟之稱疾不就卓切敕州郡舉邕詣府邕不得已到署祭酒而文苑傳有議郎蔡邕薦邊讓於大將軍何進一書按中平元年黃巾起以何進為大將軍正邕亡命之時無緣得奏記薦人也郡國志睢陽本宋國有魚門引左傳僖公二十二年升陘之戰邾人獲公胄縣諸魚門為證按杜預注魚門邾城門非宋也三國志蜀志譙周傳建興中丞相亮領益州牧命周為勸學從事而先主未稱尊號即有勸學從事張爽尹黙譙周等上言前後不同按周卒於晉泰始六年年七十二而昭烈即位之年僅二十有三未必與勸進之列從本傳為是孫亮太平元年孫綝殺滕𦙍呂據時為魏髙貴郷公之甘露元年魏志甘露二年以孫壹為侍中車騎將軍􅖍節交州牧吳侯本傳云壹入魏黃初三年死誤也陸抗傳拜鎮軍將軍都督西陵自關羽至白帝於文難曉按甘寧傳曰隨魯肅鎮益陽拒關羽羽號有三萬人自擇選鋭士五千人投縣上流十餘里淺瀨云欲夜渉渡肅以兵千人益寧寧乃夜徃羽聞之住不渡而結柴營今遂名此處為關羽瀨據此則當云自益陽至白帝也作史不立表志朱鶴齡曰太史公史記帝紀之後即有十表八書表以紀治亂興亡之大畧書以紀制度沿革之大端班固改書為志而年表視史記加詳焉盖表所繇立昉於周之譜牒與紀傳相為出入凡列侯將相王公九卿其功名表著者既系之以傳此外大臣無積勞亦無顯過傳之不可勝書而姓名爵里存没盛衰之跡要不容以遽泯則於表乎載之又其功罪事實傳中有未悉備者亦於表乎載之年經月緯一覽瞭如作史體裁莫大於是而范書闕焉使後之學者無以攷鏡二百年用人行政之節目良可歎也其失始於陳壽三國志而范曄踵之其後作者又援范書為例年表皆在所畧姚思廉梁陳二書李百藥北齊書令狐徳棻周書李延壽南北史皆無表志不知作史無表則立傳不得不多傳愈多文愈繁而事蹟或反遺漏而不舉歐陽公知之故其譔唐書有宰相表有方鎮表有宗室世系表宰相世系表始復班馬之舊章云陳壽三國志習鑿齒漢晉春秋無志故沈約宋書諸志并前代所闕者補之姚思廉梁陳二書李百藥北齊書令狐徳棻周書皆無志而于志寧李淳風韋安仁李延壽别修五代史志詔編第入隋書古人紹聞述徃之意可謂𢎞矣史文重出漢書王子侯表長沙頃王子髙成節侯梁一卷中兩見一始元元年六月乙未封一元康元年正月癸卯封然則王子中多一侯矣馬貴與文獻通攷因而録之不知其誤後漢地理志候城改屬𤣥菟而遼東復出一候城無慮改屬遼東屬國而遼東復出一無慮必有一焉宜删者然則天下郡國中少二城矣史文衍字漢書吳王濞傳吳有章郡銅山誤多一豫字後漢書光武紀以前密令卓茂為太𫝊誤多一髙字黨錮傳黄令毛欽操兵到門誤多一外字後漢書皇后紀桓思竇皇后父諱武后父不當言諱諱字衍儒林傳立五經博士各以家法敎授易有施孟梁丘京氏尚書歐陽大小夏侯詩齊魯韓毛禮大小戴春秋嚴顔凡十四博士太常差次總領焉按此則十五非十四也盖衍一毛字其下文載建初中詔有古文尚書毛詩榖梁左氏春秋雖不立學官之語本紀建初八年詔同又下卷云趙人毛萇傳詩是為毛詩未得立賈逵傳建初八年詔諸儒各選髙才生受左氏穀梁春秋古文尚書毛詩由是四經遂行於世而百官志博士十四人本注曰易四施孟梁丘京氏尚書三歐陽大小夏侯氏詩三魯齊韓氏禮二大小戴氏春秋二公羊嚴顔氏徐防傳注引漢官儀曰易有施孟梁丘賀京房書有歐陽和伯夏侯勝建詩有申公轅固韓嬰春秋有嚴彭祖顔安樂禮有戴徳戴聖凡十四博士則此毛字明為衍文也靈帝紀光和三年六月詔公卿舉能尚書毛詩左氏榖梁春秋各一人悉除議郎尚書上脫古文二字史家誤承舊文史書之中多有仍舊文而未及改者史記燕世家稱今王喜魏書孝静帝紀稱太原公今上舊唐書唐臨傳今上字再見徐有功傳澤王上金傳今上字各一見皆謂𤣥宗韋貫之傳上即位謂穆宗此皆舊史之文作書者失於改削爾宋書武帝紀永初元年八月戊午西中郎將荆州刺史宜都王諱進號鎮西將軍文帝紀元嘉十三年九月癸丑立第三皇子諱為武陵王二十五年八月甲子立第十一皇子諱為淮陽王順帝紀昇明三年正月丁巳以新除給事黃門侍郎蕭諱為雍州刺史三月十五以中軍大將軍諱為南豫州刺史齊公世子蕭思話傳遣司馬建威將軍南漢中太守蕭諱五百人前進隋書髙祖紀開皇十五年七月乙丑晉王諱獻毛龜十九年二月己亥晉王諱來朝張煚傳晉王諱為揚州總管王韶傳晉王諱班師鐡勒傳晉王諱北征北史李弼傳諭使持節太尉柱國大將軍大都督尚書左僕射隴右行臺少師隴西郡開國公李諱舊唐書中宗紀臨淄王諱舉兵誅韋武睿宗紀臨淄王諱與大平公主子薛崇簡等𤣥宗紀詔以皇太子諱充天下兵馬元帥郝處俊傳周王諱為西朋並當時臣子之辭三國志魏后妃傳注甄后曰諱等自隨夫人此諱字明帝名當時史家之文也宋書武帝紀劉諱龍行虎歩後周書桞慶傳宇文諱忠誠奮發北史魏彭城王勰傳帝謂勰曰諱是何人而敢乆違先敕並合稱名史臣不敢斥之爾然宋紀中亦有稱劉裕者一卷之中徃徃雜見册府元龜後唐荘宗同光二年二月戊寅幸李諱宅諱字下小注曰明宗也文選任昉為齊明宗讓宣城郡公表稱臣公言為蕭揚州薦士表稱臣王言表辭本合稱名而改為公王亦其臣子之辭也晉書晉書宣帝紀當司馬懿為魏臣之時無不稱之為帝至蜀將姜維聞辛毗來謂亮曰辛毗杖節而至賊不復出矣所謂賊者即懿也當時在蜀人自當名之為賊史家雜采諸書不暇詳攷一篇之中帝賊互見天文志虛二星冢宰之官也主北方邑居廟堂祭祀祝禱事又主死喪哭泣按此冡宰當作冡人或以公羊傳宰上之木拱矣則墓亦可稱為宰又曰軫四星主冡宰輔臣也則周官之冡宰矣藝術傳戴洋言昔吳伐關羽天雷在前周瑜拜賀按瑜卒於建安十四年而呂蒙之襲關羽乃在二十四年瑜亡已十年矣顧策傳前云友人張翰後又云吳郡張翰張重華傳前云封謝艾為福禄伯後又云進封福禄縣伯戴若思傳舉孝廉入雒周顗傳若思舉秀才入雒南陽王模傳廣平太守丁邵良吏傳丁紹石勒載記前作段就六眷後作段疾六眷陽裕傳又作段眷呂纂載記前作句摩羅耆婆後作鳩摩羅什慕容熙載記𢎞光門馮䟦載記作洪光門又作洪觀門宋書宋書州郡志廣陵太守下云宋初郡國又有輿肥如潞真定新市五縣肥如本遼西之縣其民南渡而僑立於廣陵符瑞志所云元嘉十九年九月戊申廣陵肥如石梁澗中出石鐘九口是廣陵之有肥如也乃南沛太守下復云起居注孝武大明五年分廣陵為沛郡治肥如縣時無復肥如縣當是肥如故縣處也二漢晉太康地志並無肥如縣一卷之中自相違錯且二漢之肥如自在遼西安得屬之廣陵分之沛郡乎魏書魏書崔浩傳浩既工書人多託寫急就章從少至老初不憚勞所書盖以百數必稱馮代彊以示不敢犯國其謹也如此史於馮代彊下注曰疑按急就篇有馮漢彊魏起漠北以漢强為諱故改云代强魏初國號曰代故也顔師古急就篇序曰避諱改易漸就蕪舛正指此酈道元水經注以廣漢並作廣魏即其例也梁書劉孝綽傳衆惡之必監焉衆好之必監焉梁宣帝諱詧故改之盖襄陽以來國史之原文也乃其論則直書姚察書中亦有避唐諱者顧協傳以虎丘山為武丘山何㸃傳則為獸丘山後周書庾信傳哀江南賦過漂渚而寄食託廬中而渡水漂渚當是溧渚之誤張勃吳録曰子胥乞食處在丹陽溧陽縣史記范雎傳伍子胥橐載而出昭關至於陵水戰國䇿作菱水索隐曰劉氏云陵水即栗水也吳越春秋云子胥奔吳至溧陽逢女子瀨水之上古溧瀨同字子胥跪而乞餐女子食之既去自投于水後子胥欲報之乃投白金于此水今名其處為投金瀨金陵志曰江上有渚曰瀨渚是也或以二句不應皆用子胥事不知古人文字不拘如下文生世等於龍門四句亦是皆用司馬子長事隋書經籍志言漢哀帝時博士弟子秦景使伊存口授浮屠經又云後漢明帝遣郎中蔡愔及秦景使天竺得佛經四十二章及釋迦立像按自哀帝之末至東京明帝之初垂六十年使秦景尚存亦當八十餘矣不堪再使絶域也盖本之陶隠居真誥言孝明遣使者張騫羽林郎秦景博士王遵等十四人之大月氏國寫佛經四十二章祕之蘭臺石室作史者知張騫為武帝時人姓名乆著故删去之獨言秦景而前後失于契勘故或以為哀帝或以為明帝耳突厥傳上言沙鉢畧可汗西擊阿波破擒之下言雍虞閭以隋所賜旗鼔西征阿波敵人以為得隋兵所助多來降附遂生擒阿波此必一事而誤重書為二事也北史一事兩見北齊武成帝河清三年九月乙丑封皇子儼為東平王後主天統二年五月己亥封太上皇帝子儼為東平王一事兩書必有一誤徐之才傳嘗與朝士出遊遙望羣犬競走諸人試令目之之才即應聲曰為是宋鵲為是韓盧為逐李斯東走為負帝女南徂其序傳又云於路見狗温子昇戲曰為是宋鵲為是韓盧神儁曰為逐丞相東走為共帝女南徂一事兩見且序傳是延壽自述其先人不當援他人之事以附益也宋齊梁三書南史一事互異南齊書李安民為吳興太守吳興有項羽神䕶郡聽事太守不得上太守到郡必須祀以軛下牛安民奉佛法不與神牛著屐上聽事又於聽上八關齋俄而牛死𦵏廟側今呼為李公牛冡安民卒官世以神為祟按宋書孔季恭傳為吳興太守先是吳興頻喪太守云項羽神為卞山王居郡聽事二千石至常避之季㳟居聽事竟無害也梁書蕭㻠傳遷吳興太守郡有項羽廟土民名為憤王甚有靈騐遂於郡聽事安施牀幕為神座公私請禱前後二千石皆於廳拜祠而避居他室㻠至徙神還廟處之不疑南史云㻠至著屐登聽事聞室中有叱聲㻠厲色曰生不能與漢祖爭中原死據此聽事何也因遷之於廟又禁殺牛􅄙祀以脯代肉此似一事而作史者一以為遭祟一以為厭邪立論不同如此又南齊書蕭惠基傳惠基弟惠休自吳興太守徴為右僕射吳興郡項羽神舊酷烈世人云惠休事神謹故得美遷南史同南史蕭猷本作淵猷傳為吳興郡守與楚王廟神交飲至一斛每酹祀盡歡極醉神影亦有酒色所禱必從後為益州刺史值齊茍兒反攻城兵糧俱盡乃遙禱請救有田老逢數百騎如風言吳興楚王來救臨汝侯是日猷大破茍兒則又以為獲祐益不可信矣又南史蕭惠明傳㤗始初為吳興太守郡界有卞山下有項羽廟相承云羽多居郡聽事前後太守不敢上惠明謂綱紀曰孔季恭嘗為此郡未聞有災遂盛設筵榻接賓數日見一人長丈餘張弓挾矢向惠明既而不見因發背旬日而卒此又與李安民相類而小變其説按宋書惠明傳無此事舊唐書舊唐書雖頗渉繁蕪然事蹟明白首尾該贍亦自可觀其中唐臨傳今上字再見徐有功澤王上金傳今上字各一見皆謂𤣥宗盖沿故帙而未正者也懿宗紀咸通十三年十二月李國昌小男克用殺雲中防禦使段文楚據雲州自稱防禦留後則既直書其叛亂之罪而哀帝紀末云中興之初王處直傳稱莊宗王鎔鄭從讜劉鄴張濬傳各有中興之語自相矛盾按此書纂於劉昫後唐末帝清泰中為丞相監修國史至晉少帝開運二年其書始成册府元龜言户部侍郎張招逺起居郎賈緯秘書少監趙熙吏部郎中鄭受益左司員外郎李為光等修上其賜繒綵銀器并及前朝劉昫當時避晉髙祖嫌名或謂之李氏書朝代遷流簡牘浩富不暇徧詳而並存之後之讀者可以觀世變矣楊朝晟一人作兩傳一見七十二卷一見九十四卷新唐書舊唐書高宗紀乾封元年春正月戊辰朔上祀昊天上帝于泰山以髙祖太宗配饗己巳升山行封禪之禮庚午禪于社首是以朔日祭天于山下明日登封又明日禪社首次序甚明新書改云正月戊辰封于㤗山庚午禪于社首是以祭天封山二事併為一事而繫於戊辰之日文雖簡而事不核矣天后紀光宅元年四月癸酉遷廬陵王于房州丁丑又遷于均州埀拱元年三月丙辰遷廬陵王于房州中宗紀嗣聖元年是年九月改光宅正月廢居于均州又遷于房州按舊書嗣聖元年二月戊午廢皇帝為廬陵王幽于别所四月丁丑遷廬陵王于均州􅂷拱元年三月遷廬陵王于房州中宗紀亦同而以四月為五月然無先遷房州一節疑舊史得之歐公盖博採而誤代宗紀上書四月丁卯幽皇后于别殿下書六月辛亥追廢皇后張氏曰追廢則張后之見殺明矣而不書其死亦為漏畧文宗紀太和九年十一月壬戌李訓及河東節度使王璠邠寧節度使郭行餘御史中丞李孝本京兆少尹羅立言謀誅中官不克訓奔于鳯翔下云左神䇿軍中尉仇士良殺王涯賈餗舒元輿李孝本羅立言王璠郭行餘而獨於李訓不言其死況訓乃走入終南山未至鳯翔亦為未當藝文志蕭方三十國春秋三十卷當作蕭方等乃梁元帝世子名方等侯鯖録曰方等者即周徧義新唐書志歐陽永叔所作頗有裁斷文亦明逹而列傳出宋子京之手則簡而不明二手髙下􅒯為不侔矣如太宗長孫后傳安業后異母兄之罪萬死無赦然不慈于妾天下知之舊書改曰安業罪死無赦然向遇妾不以慈戸知之意雖不異而戸知之三字殊不成文又如徳宗王后傳詔曰祭筵不可用假花果欲祭者從之舊書改曰有詔祭物無用寓欲祭聽之不過省舊書四字然非注不可􅄙也史家之文例無重出若不得已而重出則當斟酌彼此有詳有畧斯謂之簡如崔沔駮太常議加宗廟籩豆其文兩載於本傳及韋縚傳多至二三百言又如來濟與髙智周郝處俊孫處約四人言志及濟領吏部遂以處約為通事舍人兩見於本傳及髙智周傳而石仲覽一人一以為宣城一以為江都此而忽之則亦不得謂之能簡矣此二事已見於新唐書紏繆今仍録之楊瑒傳言有司帖試明經不質大義乃取年頭月日孤經絶句帖試之法用紙帖其上下文止留中間一二句困人以難記年頭如元年二年之類月日如十有二月乙卯之􅁼如此則習春秋者益少矣故請帖平文今改曰年頭月尾屬對雖工而義不通矣嚴武傳為成都尹劍南節度使房琯以故宰相為廵内刺史武慢倨不為禮最厚杜甫然欲殺甫數矣李白作蜀道難者乃為房與杜危之也此宋人穿鑿之論此説又見韋臯傳盖因陸暢之蜀道易而造為之耳李白蜀道難之作當在開元天寶間時人共言錦城之樂而不知畏塗之險異地之虞即事成篇别無寓意及𤣥宗西幸升為南京則又為詩曰誰道君王行路難六龍西幸萬人歡地轉錦江成渭水天㢠廻玉壘作長安一人之作前後不同如此亦時為之矣張孝忠傳孝忠魁偉長六尺李晟傳長六尺古人以六尺為短今以六尺為長於他書未見馬燧楊收傳並云長六尺二寸髙力士傳長六尺五寸舊書段秀實傳隂説大將劉海賓何明禮姚令言判官岐靈岳同謀殺泚以兵迎乘輿三人者皆秀實夙所奨遇此謂姚令言之判官岐靈岳與海賓明禮為三人耳按文姚令言上當少一及字新書遂謂結劉海賓姚令言都虞候何明禮欲圖泚此三人者皆秀實素所厚而下文方云大吏岐靈岳令言賊也安有肯同秀實之謀者哉舊唐書髙仙芝封常清二傳並云四鎮節度使夫蒙靈詧而李嗣業段秀實二傳則云安西節度使馬靈詧劉全諒傳則云安東副都䕶保定軍使馬靈詧按王維集有送不蒙都䕶詩注不蒙蕃官姓也古不字有夫音如詩鄂不韡韡不蒙當即夫蒙然未知其何以又為馬也新書因之兩姓並見而突厥傳則云安西節度使夫蒙靈詧馬總傳李師道平析鄆曹濮等為一道除總節度賜號天平軍長慶初劉總上幽鎮地詔總徙天平而召總還將大用之㑹總卒穆宗以鄆人附賴總復詔還鎮上云詔總徙天平劉總也下云召總還馬總也又云㑹總卒劉總也又云鄆人附賴總馬總也此於人之主賓字之繁省皆有所不當當云詔徙天平而去總字其下則云㑹劉總卒於文無加而義明矣舊唐書皇甫鎛傳附柳泌事云泌繫京兆府獄吏叱之曰何苦作此虛矯泌曰吾本無心是李道古敎我且云壽四百嵗府吏防虞周密恐其隱化及􅄙衣就誅一無變異語雖煩而叙事則明新書但云皆道古敎我􅄙衣即刑卒無它異去其中間語則它異二字何所本邪曹確傳太宗著令文武官六百四十三按百官志太宗省内外官定制為七百三十員舊唐書鄭綮傳昭宗謂有蘊蓄就常奏班簿側注云鄭綮可禮部侍郎平章事中書胥吏詣其家參謁綮􅀏曰諸君大誤使天下人皆不識字宰相不及鄭五也胥吏曰出自聖㫖特恩來日制下綮抗其手曰萬一如此笑殺他人明日果制下新書改曰俄聞制詔下歎曰萬一然笑殺天下人制已下矣何萬一之有禮樂志貞觀二十一年詔左丘明卜子夏公羊髙榖梁赤伏勝髙堂生戴聖毛萇孔安國劉向鄭衆賈逵杜子春馬融盧植鄭康成服䖍何休王肅王弼杜預范寗二十二人配享儒學傳復出此文而闕賈逵作二十一人林藴傳泉州莆田人父披以臨汀多山鬼滛祀民厭苦之撰無鬼論刺史樊晃奏署臨汀令此當是署令在前作論在後而倒其文凡吳氏紏謬所已及者不更論昔人謂宋子京不喜對偶之文其作史有唐一代遂無一篇詔令如徳宗興元之詔不録於書徐賢妃諫太宗疏狄仁傑諫武后營大像疏僅寥寥數言而韓愈平淮西碑則全載之夫史以記事詔疏俱國事之大反不如碑頌乎栁宗元貞符乃希恩餙罪之文與相如之封禪頌異矣載之尤為無識宋史宋史言朝廷與金約滅遼止求石晉賂契丹故地而不思營平灤三州非晉賂乃劉仁㳟獻契丹以求援者既而王黼悔欲併得之遣趙良嗣徃請之再三金人不與此史家之誤按通鑑初幽州北七百里有渝關下有渝水通海自關東北循海有道道狹處纔數尺旁皆亂山高峻不可越北至進牛口舊置八防禦軍募土兵守之田租皆供軍食不入於薊幽州嵗致繒纊以供戰士衣每嵗早獲清野堅壁以待契丹契丹至輙閉壁不戰俟其去選驍勇據隘􅌽之契丹常失利走土兵皆自為田園力戰有功則賜勲加賞由是契丹不敢輕入宼及周徳威為盧龍節度使恃勇不脩邉備遂失渝關之險契丹每芻牧於營平之間又按遼史太祖天贊二年正月丙申大元帥耀庫濟克平州獲刺史趙思温禆將張崇二月如平州甲子以平州盧龍軍置節度使遼之天贊二年乃後唐莊宗同光元年是營平二州契丹自以兵力取之於唐而不於劉仁恭又非賂以求援也若灤本平州之地遼太祖以俘户置灤州當劉仁恭時尚未有此州尤為無據遼史于灤州下云石晉割地在平州之境亦誤也金史張覺傳云平州自入契丹别為一軍執弗與阿魯圖進宋史表元阿嚕圖進宋史表曰厥後瀛國歸朝吉王航海齊亡而訪王蠋乃存秉節之臣楚滅而諭魯公堪矜守禮之國金史忠義傳序曰聖元詔修遼金宋史史臣議凡例前代之臣忠於所事者請書之無諱朝廷從之此皆宋世以來尊經儒重節義之效其時之人心風俗猶有三代直道之遺不獨元主之賢明也宋人謂五代史不為韓通立傳猶是第二等文字齊武帝使太子家令沈約撰宋書疑立袁粲傳審之於帝帝曰袁粲自是宋室忠臣遼史宋史富弼傳言使契丹争獻納二字聲色俱厲契丹主知不可奪乃曰吾當自遣人議之復使劉六符來弼歸奏曰臣以死拒之彼氣折矣可勿許也朝廷竟以納字與之遼史興宗紀亦云感富弼之言和議始定而劉六符傳則曰宋遣使增嵗幣以易十縣六符與耶律仁先使宋定進貢名宋難之六符曰本朝兵强將勇人人願從事於宋若恣其俘獲以飽所欲與進貢字孰多况大兵駐燕萬一南進何以禦之顧小節忘大患悔將何及宋乃從之嵗幣稱貢耶律仁先傳亦同二史並托克托監修而不同如此六符傳似本其家誌狀與其祖景同為一傳而有重文金史金史雖置局纂修多人而大抵出劉祁元好問二君之筆祁字京叔渾源人著歸潛志好問字裕之秀容人著壬辰雜編元人取之以成金史見文藝傳及完顏納紳傳其書亦頗可觀然其中多重見而涉於繁者孔毅父雜説謂自昔史書兩人一事必曰語在某人傳晉書載王隱諫祖約奕棋一段當傳俱出此為文繁矣正同此病海陵諸子傳贊當引楚靈王曰余殺人子多矣能無及此乎昭公十三年而反引荀首言不以人子吾子亦可得乎似為失當幽蘭之縊承麟諡之曰哀宗本紀息州行省諡之曰昭宗完顔羅索傳史從哀宗為定而食貨志末及百官志復有義宗之稱不著何人所上元史列傳中並稱金義宗金與元連兵二十餘年書中雖稱大元而内外之㫖截然不移是金人之作非元人之作此其所以為善承麟即位不過一二日而史猶稱之為末帝白撒傳其與宋之二王削其帝號者絶異故知非一人之筆矣元史元史列傳八卷蘇布特九巻蘇布特一人作兩傳十八卷諤勒哲圖十九卷諤勒哲巴圖亦二人作兩傳盖其成書不出于一人之手宋濓序云洪武元年十二月詔脩元史臣濓臣禕總裁二年二月丙寅開局八月癸酉書成紀三十七卷志五十三卷表六卷傳六十三卷順帝時無實錄可徴因未得為完書上復詔儀曹遣使行天下其渉于史事者令郡縣上之三年二月乙丑開局七月丁亥書成紀十卷志五卷表二卷傳三十六卷凡前書有所未備頗補完之總裁仍濓禕二臣而纂錄之士獨趙壎終始其事然則元史之成雖不出于一時一人而宋王二公與趙君亦難免于疏忽之咎矣昔宋吳縝言方新書來上之初若朝廷付之有司委官覆定使詰難紏駮審定刋修然後下朝臣博議可否如此則初修者必不敢滅裂審覆者亦不敢依違庶乎得為完書可以傳乆乃厯代修史之臣皆務茍完右文之君亦多倦覽未有能行其説者也洪武中嘗命􅄙縉修正元史舛誤其書留中不傳世祖紀中統三年二月以興松雲三州隸上都四年五月陞上都路望雲縣為雲州松山縣為松州是三年尚未陞州預書為州者誤本紀有脱漏月者列傳有重書年者天文志既載月五星凌犯而本紀復詳書之不免重出志末云餘見本紀亦非體諸志皆案牘之文並無鎔范如河渠志言耿參政阿里尚書祭祀志言田司徒郝參政皆案牘中之稱謂也張楨傳有復庫庫特穆爾書曰江左日思薦食上國此謂明太祖也晉陳壽上諸葛孔明集表曰伏惟陛下逺蹤古聖蕩然無忌故雖敵國誹謗之言咸肆其辭而無所革諱所以明大通之道也於此書見之矣舒穆嚕冝孫傳上言大明兵下言朝廷朝廷謂元也其辭明白如此順帝紀大明兵取太平路大明兵取集慶路其時國號未為大明曰大明者史臣追書之也古人記事之文有不得不然者類如此通鑑呂東萊大事記曰史記商君本傳云不告姦者腰斬告姦者與斬敵首同賞匿姦者與降敵同罸通鑑削不告姦者一句而以匿姦之罪為不告姦之罪本傳又云民有二男以上不分異者倍其賦通鑑削之本傳又云名田宅臣妾者以家次通鑑削以家次三字皆當以本傳為正以家次者如漢賜夏侯嬰北第第一之類孟子以伐燕為宣王事與史記不同通鑑以威王宣王之卒各移下十年以合孟子之書今按史記湣王元年為周顯王之四十六年嵗在著雍閹茂又八年燕王噲讓國于相子之又二年齊破燕殺王噲又二年燕人立太子平則已為湣王之十二年而孟子書吾甚慙于孟子尚是宣王何不以宣王之卒移下十二三年則以孟子之書無不皆合而但拘於十年之成數邪史記萬石君列傳慶嘗為太僕御出上問車中㡬馬慶以䇿數馬畢舉手曰六馬慶於諸子中最為簡易矣然猶如此太史公之意謂慶雖簡易而猶敬謹不敢率爾即對其言簡易正以起下文之意也通鑑去然猶如此一句殊失本指通鑑漢武帝元光六年以衛尉韓安國為材官將軍屯漁陽元朔元年匈奴二萬騎入漢殺遼西太守畧二千餘人圍韓安國壁又入漁陽鴈門各殺畧千餘人夫曰圍韓安國壁其為漁陽可知而云又入漁陽則疏矣攷史記匈奴傳本文則云敗漁陽太守軍千餘人圍漢將軍安國安國時千餘騎亦且盡㑹燕救至匈奴引去其文精密如此通鑑改之不當漢書宣帝紀五鳯二年春三月行幸雍祠五畤通鑑改之曰春正月上幸甘泉郊㤗畤攷異引宣紀云三月行幸甘泉而宣紀本無此文不知温公何所據光武自隴蜀平後非警急未嘗復言軍旅皇太子嘗問軍旅之事帝曰昔衛靈公問陳孔子不對此非爾所及據後漢書本文皇太子即明帝也通鑑乃書於建武十三年則東海王疆尚為太子亦為未允唐徳宗貞元二年李泌奏自集津至三門鑿山門車道十八里以避底柱之險按舊唐書李泌傳並無此事而食貨志曰開元二十二年八月𤣥宗從京兆尹裴耀卿之言置河隂縣及河隂倉在今汜水縣河清縣柏崖倉在今孟津縣三門東集津倉三門西鹽倉並在今平陸縣開三門北山十八里以避湍險自江淮而泝鴻溝悉納河隂倉自河隂送納含嘉倉六典東都有含嘉倉又送納太原倉計太原倉雖屬陜州當在河北謂之北運自太原倉浮于渭以實京師凡三年運七百萬石省陸運之傭四十萬貫又云開元二十九年陜郡太守李齊物鑿三門山以通運闢三門巔輸疑當作踰巖險之地俾負索引艦昇於安流自齊物始也天寶三載韋堅代蕭炅以滻水作廣運潭於望春樓之東而藏舟焉是則北運始於耀卿尚陸行十八里河運始於齊物則直達於長安也下距貞元四十五年無縁有李泌復鑿三門之事通鑑不載文人李因篤語予通鑑不載文人如屈原之為人太史公贊之謂與日月爭光而不得書於通鑑杜子美若非出師未㨗一詩為王叔文所吟則姓名亦不登於簡牘矣予答之曰此書本以資治何暇録及文人昔唐丁居晦為翰林學士文宗於麟徳殿召對因面授御史中丞翼日制下帝謂宰臣曰居晦作得此官朕曽以時諺謂杜甫李白輩為四絶問居晦居晦曰此非君上要知之事嘗以此記得居晦今所以擢為中丞册府元龜如君之言其識見殆出文宗下矣日知録卷二十六
