body:
  text: 日知錄卷十六崑山顧炎武撰明經今人但以貢生為明經非也唐制有六科一曰秀才二曰明經三曰進士四曰明法五曰書六曰算大唐新語隋煬帝置明經進士二科國家因隋制増置秀才明法明字明算并前為六科當時以詩賦取者謂之進士金史移刺履傳進士之科隋大業中始試以䇿唐初因之髙宗時襍以箴銘賦詩至文宗始專用賦以經義取者謂之明經葉石林避暑錄話唐制取士用進士明經二科本朝初唯用進士其罷明經不知自何時仁宗患進士詩賦浮淺不本經術嘉祐三年始復明經科今罷詩賦而用經義則今之進士乃唐之明經也唐時入仕之數明經最多考試之法令其全寫註疏謂之帖括議者病其不能通經權文公謂註疏猶可以質驗不者儻有司率情上下其手既失其末又不得其本則蕩然矣今之學者并註疏而不觀殆於本末俱喪然則今之進士又不如唐之明經也乎秀才舊唐書杜正倫傳正倫隋仁壽中與兄正𤣥正藏俱以秀才擢第唐代舉秀才止十餘人正倫一家有三秀才甚為當時稱美唐登科記武德至永徽每年進士或至二十餘人而秀才止一人二人舊唐書職官志則云秀才有唐已來無其人杜氏通典云初秀才科第最髙試方略策五條有上上上中上下中上凡四等貞觀中有舉而不第者坐其州長由是廢絶新唐書高宗永徽二年始停秀才科士人所趨嚮惟明經進士二科而已顯慶初黃門侍郞劉祥道奏言國家富有四海于今已四十年百姓官寮未有秀才之舉未必今人之不如昔將薦賢之道未至豈使方稱多士遂缺斯人請六品以下爰及山谷特降綸言更審搜訪唐人之於秀才其重如此秀才字出史記賈生傳年十八以能誦詩屬書聞於郡中呉廷尉為河南守聞其秀才而儒林傳公孫𢎞等之議則曰有秀才異等輒以名聞此秀才之名所起𤣥宗御撰六典言凡貢舉人有博識髙才強學待問無失俊選者為秀才通二經已上者為明經明閑時務精熟一經者為進士張昌齡傳本州欲以秀才舉之昌齡以時廢此科已久固辭乃充進士貢舉及第是則秀才之名乃舉進士者之所不敢當也册府元龜開元二十四年已後復有秀才舉其時以進士漸難而秀才本科無貼經及襍文之限反易於進士主司以其科廢久不欲拔奬應者多落之三十年來無登第者至天寶初禮部侍郞韋陟始奏請有堪此舉者乃令長官特考其常年舉送者竝停册府元龜又言代宗朝楊綰為禮部侍郞請制五經秀才科事寢不行而舊唐書儒學傳馮伉大厯初登五經秀才科則是嘗行之而旋廢耳又文苑英華判目有云鄉舉進士至省求試秀才考功不聽求訴不已趙岊判曰文藝小善進士之能訪對不休秀才之目文選任昉為蕭楊州作薦士表訪對不休質疑斯在是又進士求試秀才而不可得也今以生員而冒呼此名何也容齋三筆謂秀才之名自宋魏以後實為貢舉科目之最而今世俗以為相輕之稱明初嘗舉秀才洪武十五年徵至秀才數千人如太祖實錄洪武四年四月辛丑以秀才丁士梅為蘇州府知府童權為揚州府知府俱賜冠帶十年二月丙辰以秀才徐尊生為翰林應奉十五年八月丁酉以秀才曾泰為户部尚書是也亦嘗舉孝廉洪武十八年十二月丙午洪武二十年二月己丑以孝廉李德為應天府尹是也此辟舉之名非所施於科目之士今俗謂生員為秀才舉人為孝廉非也舉人舉人者舉到之人北齊書鮮于世榮傳以本官判尚書省右僕射事與吏部尚書袁聿修在尚書省簡試舉人舊唐書髙宗紀顯慶四年二月乙亥上親策試舉人凡九百人調露元年十二月甲寅臨軒試應岳牧舉人是也登科則除官不復謂之舉人而不第則湏再舉太祖實錄許瑗饒之樂平人至正中兩以易經舉于鄉皆第一㑹試不第贑州府志曰鄉舉在宋為漕試謂之發解第階之解送南宫㑹試耳試不第者湏再試未階以入仕也及累舉不第然後有推恩焉謂之特奏者不復繫諸鄉舉矣元時亦然至明朝始定為入仕之途則一代之新制也按宋時亦有不湏再試而送南宫者謂之免解進士澠水燕談仁宗籍田時許開封國學舉人陪位因得免解不若前明以舉人為一定之名也進士乃諸科目中之一科而傳中有言舉進士者有言舉進士不第者孟浩然應進士不第杜甫天寶初應進士不第唐衢應進士久而不第温庭筠大中初應進士累年不第呉筠舉進士不第皇甫鎮舉進士二十三上不中第五代史亦然敬翔乾符中舉進士不中鄭遨唐昭宗時舉進士不中李振常舉進士咸通乾符中連不中鄭珏舉進士數不中司空頲唐僖宗時舉進士不中馮王少舉進士不中李鏻少舉進士累不中賈緯少舉進士不中但云舉進士則第不第未可知之辭不若前明已登科而後謂之進士也宋徽宗宣和六年禮部試進士至萬五千人是年賜第八百五人自本人言之謂之舉進士自朝廷言之謂之舉人唐文宗開成三年五月丁巳朔勅禮部貢院進士舉人歲限放三十人及第進士舉人者謂舉進士之人也進士即是舉人不若前明以鄉試榜謂之舉人㑹試榜謂之進士也永樂六年六月翰林院庶吉士沈升上言近年各布政司按察司不體朝廷求賢之盛心茍圖虛譽有稍能行文大義未通者皆領鄉薦冒名貢士及至㑹試下第其中文字稍優者得除教官其下者亦得升之國監以致天下士子競懷僥倖不務實學洪熈元年十一月四川雙流縣知縣孔友諒上言乞將前此下第舉人通計其數設法清理是明初纔開舉人之塗而其弊即已如此然下第舉人猶令入監讀書三年許以省親未有使之游蕩於人間者正統十四年存省京儲始放回原籍其放肆無恥者游説干謁靡所不為已見於成化十四年禮部之奏至於末年則挾制官府武斷鄉曲於是崇禎中命巡按御史考察所屬舉人間有黜革而風俗之壞已不可復返矣進士進士即舉人中之一科其試於禮部者人人皆可謂之進士唐人未第稱進士已及第則稱前進士雍録引唐人詩云曾題名處添前字通鑑建州進士葉京嘗預宣武軍宴識監軍之靣既而及第在長安與同年出游遇之於塗馬上相揖因之謗議諠然遂沈廢終身是未及第而稱進士也試畢放榜其合格者曰賜進士及第後又廣之曰賜進士出身賜同進士出身然後謂之登科所以異於同試之人者在乎賜及第賜出身而不在乎進士也宋政和三年五月乙酉臣僚言陛下罷進士立三舎之法今賜承議郞徐禋進士出身於名實未正乞改賜同上舎出身從之科目唐制取士之科有秀才有明經有進士有俊士有明法有明字有明算有一史有三史有開元禮有道舉有童子而明經之别有五經有三經有二經有學究一經有三禮有三傳有史科此歲舉之常選也其天子自詔曰制舉唐書選舉志如姚崇下筆成章張九齡道侔伊吕之類見於史者凡五十餘科困學紀聞唐制舉之名多有八十有六故謂之科目宋王安石始罷諸科明代止進士一科則有科而無目矣猶沿其名謂之科目非也王維楨欲於科舉之外倣漢唐舊制更設數科以收天下之竒士不知進士偏重之弊積二三百年非大破成格雖有他材亦無由進用矣制科唐制天子自詔曰制舉所以待非常之才唐志曰所謂制舉者其來遠矣自漢以來天子常稱制詔道其所欲問而親策之唐興世崇儒學雖其時君賢愚好惡不同而樂善求賢之意未始少怠故自京師外至州縣有司常選之士以時而舉而天子又自詔四方德行才能文學之士或髙蹈幽隠與其不能自達者下至軍謀將略翹關抜山絶藝竒伎莫不兼取其為名目隨其人主臨時所欲而列為定科者如賢良方正直言極諫博通墳典達於教化軍謀宏遠堪任將率詳明政術可以理人之類其名最著而天子巡狩行幸封禪太山梁父往往㑹見行在其所以待之之禮甚優而宏材偉論非常之人亦時出於其間不為無得也宋初承周顯德之制設三科不限前資見任職官黃衣草澤竝許應詔景德増為六科熈寧以後屢罷屢復宋人謂之大科葉祖洽傳太宗歲設大科邵氏聞見錄富韓公初游塲屋穆伯長謂之曰進士不足以盡子之才當以大科名世今以殿試進士亦謬謂之制科宋徐度卻埽編曰國朝制科初因唐制有賢良方正能直言極諫經學優深可為師法詳明吏理達於教化凡三科應内外職官前資見任黃衣草澤人竝許諸州及本司解送上吏部對御試策一道限三千字以上咸平中又詔文臣於内外幕職州縣官及草澤中舉賢良方正各一人景德中又詔置賢良方正能直言極諫博通墳典達於教化才識兼茂明於體用武足安邊洞明韜略運籌決勝軍謀宏遠材任邊寄詳明吏理達於從政等六科天聖七年復詔應内外京朝官不帶臺省館閣職事不曽犯贓罪及私罪情理輕者竝許少卿監以上奏舉或自進狀乞應前六科仍先進所業策論十卷卷五道候到下兩省㸔詳如詞理優長堪應制科具名聞奏差官考試論六首合格即御試策一道又置高蹈丘園沈淪草澤茂才異等三科應草澤及貢舉人非工商襍類者竝許本處轉運司逐州長吏奏舉或於本貫投狀乞應州縣體量有行止别無玷犯者即納所業策論十卷卷五道㸔詳詞理稍優即上轉運司審察鄉里名譽於部内選有文學官再㸔詳實有文行可稱者即以文卷送禮部委主判官㸔詳選詞理優長者具名聞奏餘如賢良方正等六科熙寧中悉罷之而令進士廷試罷三題而試策一道建炎間詔復賢良方正一科然未有應詔者髙宗立博學宏辭科凡十二題制誥詔表露布檄箴銘記贊頌序内襍出六題分為三塲每塲體制一古一今南渡以後得人為盛多至卿相翰苑者今之第二塲詔誥表三題内科一道亦是略倣此意而茍簡濫劣至於全無典故不知平仄者亦皆中式則專重初塲之過也甲科杜氏通典按令文科第秀才與明經同為四等進士與明法同為二等然秀才之科久廢而明經雖有甲乙丙丁四科進士有甲乙二科自武德以來明經惟有丙丁第進士惟乙科而已舊唐書𤣥宗紀開元九年四月甲戌上親策試應制舉人於含元殿勅曰近無甲科朕將存其上第楊綰傳天寶十三載𤣥宗御勤政樓試舉人登甲科者三人綰為之首超授右拾遺其登乙科者三十餘人册府元龜杜甫哀蘇源明詩曰制可題未乾乙科已大闡然則今之進士而概稱甲科非也隋書李德林傳楊遵彦銓衡深慎選舉秀才擢第罕有甲科德林射策五條考皆為上是則北齊之世即已多無甲科者矣甲乙丙科始見漢書儒林傳平帝時歲課博士弟子甲科四十人為郞中乙科二十人為太子舎人丙科四十人補文學掌故蕭望之傳以射策甲科為郞匡衡傳數射策不中至九乃中丙科褚先生補史記十八房明制㑹試用考試官二員總裁同考試官十八員分閲五經謂之十八房宋史各房分經始於理宗紹定二年嘉靖末年詩五房易書各四房春秋禮記各二房止十七房萬厯庚辰癸未二科以易卷多添一房減書一房仍止十七房至丙戌書易卷竝多仍復書為四房始為十八房至丙辰又添易詩各一房為二十房天啓乙丑易詩仍各五房書三房春秋禮記各一房為十五房崇禎戊辰復為二十房辛未易詩仍各五房為十八房癸未復為二十房時人概稱為十八房云戒菴漫筆曰江陰李詡著余少時學舉子業竝無刻本忩稿有書賈在利考朋友家往來抄得燈忩下課數十篇每篇謄寫二三十紙到余家塾揀其幾篇每篇酬錢或二文或三文憶荆川唐順之中㑹元其稿亦是無錫門人蔡瀛與一姻家同刻方山薛應旂中㑹魁其三試卷余為從臾其常熟門人錢夢王以東湖書院活板印行未聞有坊間板今滿目皆坊刻矣亦世風華實之一驗也愚按𢎞治六年㑹試同考官靳文僖批已有自板刻時文行學者往往記誦鮮以講究為事之語則彼時已有刻文但不多耳楊子常􅂜曰十八房之刻自萬厯壬辰鈎𤣥錄始旁有批㸃自王房仲士驌選程墨始至乙夘以後而坊刻有四種曰程墨則三塲主司及士子之文曰房稿則十八房進士之作曰行卷則舉人之作曰社稿則諸生㑹課之作至一科房稿之刻有數百部皆出於蘇杭而中原北方之賈人市買以去天下之人惟知此物可以取科名享富貴此之謂學問此之謂士人而他書一切不觀昔丘文莊當天順成化之盛去宋元未遠已謂士子有登名前列不知史册名目朝代先後字書偏旁者舉天下而惟十八房之讀讀之三年五年而一幸登第則無知之童子儼然與公卿相揖讓而文武之道棄如弁髦宋史理宗朝姦弊愈滋冇司命題苟簡或執偏見臆説或發策用事訛舛所取之士既不精數年之後復俾之主文是非顛倒逾甚時謂之謬種流傳嗟乎八股盛而六經微十八房興而廿一史廢昔閔子馬以原伯魯之不説學而卜周之衰余少時見有一二好學者欲通旁經而渉古書則父師交相譙呵以為必不得顓業於帖括而將為坎軻不利之人豈非所謂大人患失而惑者與陸氏曰大人懼違衆而失位心志惑亂故徇流俗之説而亦曰可以無學若乃國之盛衰時之治亂則亦可知也已經義論策今之經義論策其名雖正而最便於空疏不學之人唐宋用詩賦雖曰雕蟲小技而非通知古今之人不能作今之經義始於宋熙寧中王安石所立之法命吕惠卿王雱等為之宋史神宗熙寜四年二月丁巳朔罷詩賦及明經諸科以經義論策試進士命中書撰大義式頒行元祐八年三月庚子中書省言進士御試答策多係在外準備之文工拙不甚相遠難於考較祖宗舊制御試進士賦詩論三題施行已遠前後得人不少況今朝廷見行文字多係聲律對偶非學問該洽不能成章請行祖宗三題舊法詔來年御試將詩賦舉人復試三題經義舉人且令試策此後全試三題是當時即以經義為在外準備之文矣宋史徐禧傳神宗見其所上策曰禧言朝廷用經術變士十已八九然竊襲人之語不求心通者相半此言是也陳後山談叢言荆公經義行舉子專誦王氏章句而不解義荆公悔之曰本欲變學究為秀才不謂變秀才為學究也豈知數百年之後并學究而非其本質乎此法不變則人才日至於消耗學術日至於荒陋而五帝三王以來之天下將不知其所終矣趙鼎言安石設虚無之學敗壞人才陳公輔亦謂安石使學者不治春秋不讀史漢而習其所為三經新義皆穿鑿破碎無用之空言也若今之所謂時文既非經傳復非子史展轉相承皆杜撰無根之語前輩時文無字不有出處今但令士子作文自注出處無根之語不得入文自當攦指而退矣金史明昌元年令舉人程文所用故事可自注出處以是科名所得十人之中其八九皆為白徒而一舉於鄉即以營求關説為治生之計於是在州里則無人非勢豪適四方則無地非游客而欲求天下之安寧斯民之淳厚豈非卻行而求及前人者哉太祖實錄洪武三年八月京師及各行省開鄉試初塲四書疑問本經義及四書義各一道元制有四書疑本經疑洪武三年開科以大學古之欲明明德於天下者二節孟子道在邇而求諸逺一節合為一題問二書所言平天下大指同異此即宋時之法第二塲論一道第三塲策一道中式者後十日復以五事試之曰騎射書算律騎觀其馳驅便㨗射觀其中之多寡書通於六義算通於九法律觀其決斷詔文有曰朕特設科舉以起懷才抱德之士務在經明行修博通古今文質得中名實相稱其中選者朕將親策于廷觀其學識第其髙下而任之以官伏讀此制真所謂求實用之士者矣至十七年命禮部頒行科舉成式第一塲四書義三道經義四道未能者許各減一道第二塲論一道詔誥表内科一道判語五條第三塲經史策五道文辭増而實事廢蓋與初詔求賢之法稍有不同而行之二百餘年非所以善述祖宗之意也二十五年二月甲子儒學生員兼習射與書算俟其科貢兼考之後廢不行宣德四年九月乙夘北京國子監助教王仙言近年生員止記誦文字以備科貢其於字學算法略不曉習改入國監歴事諸司字畫麤拙算數不通何以居官涖政乞令天下儒學生員兼習書算上從之四書疑猶唐人之判語設為疑事問之以觀其學識也四書義猶今人之判語不過得之記誦而已茍學識之可取則劉蕡之對止於一篇已足蓋一代之人才徒以記誦之多書寫之速而取其長則七篇不足為難而有併作五經二十三篇如崇禎七年之顔茂猷者奉旨特賜中式及殿試第二甲第二名賜進士出身亦何禆於經術何施於國用哉實録言洪武十四年六月丙辰詔於國子諸生中選才學優等聰明俊偉之士得三十七人命之博極羣書講明道德經濟之學以期大用稱之曰老秀才累賜羅綺襲衣巾鞾禮遇甚厚後來庶吉士之制實本於此是則太祖所望於諸生者固不僅以帖括之文而惜乎大臣無通經之士使一代籲俊之典但止於斯可歎也永樂二十二年十月丁夘仁廟諭大學士楊士竒等曰朝廷所重安百姓而百姓不得蒙福者繇牧守匪人牧守匪人繇學校失教故歲貢中愚不肖十率七八古事不通道理不明此豈可任安民之寄當日貢舉之行不過四十年而其弊已如此乃䕶局之臣猶託之祖制而相持不變乎三塲明初三塲之制雖有先後而無重輕乃士子之精力多專於一經略於考古主司閲卷復護初塲所中之卷而不深求其二三塲夫昔之所謂三塲非下帷十年讀書千卷不能有此三塲也今則務於㨗得不過於四書一經之中擬題一二百道竊取他人之文記之入塲之日抄謄一過便可僥倖中式而本經之全文有不讀者矣率天下而為欲速成之童子學問由此而衰心術由此而壞宋嘉祐中知諫院歐陽修上言今之舉人以二千人為率請寛其日限而先試以策而考之擇其文辭鄙惡者文意顛倒重襍者不識題者不知故實略而不對所問者誤引事跡者雖能成文而理識乖誕者雜犯舊格不考式者凡此七等之人先去之計二千人可去五六百以其留者次試以論又如前法而考之又可去其二三百其留而試詩賦者不過千人矣於千人而選五百少而易考不至勞昏考而精當則盡善矣縱使考之不精亦當不至大濫蓋其節抄剽盜之人皆以先策論去之矣比及詩賦皆是已經策論粗有學問理識不至乖誕之人縱使詩賦不工亦可以中選矣如此可使童年新學全不曉事之人無由而進今之有天下者不能復兩漢舉士之法不得已而以言取人則文忠之論亦似可取蓋救今日之弊莫急乎去節抄剽盜之人而七等在所先去則闇劣之徒無所僥倖而至者漸少科塲亦自此而清也擬題明代科塲之病莫甚乎擬題且以經文言之初塲試所習本經義四道而本經之中塲屋可出之題不過數十富家巨族延請名士館於家塾將此數十題各撰一篇計篇酬價令其子弟及僮奴之俊慧者記誦熟習入塲命題十符八九即以所記之文抄謄上卷較之風簷結搆難易逈殊四書亦然發榜之後此曹便為貴人年少貎美者多得館選天下之士靡然從風而本經亦可以不讀矣予聞昔年五經之中惟春秋止記題目然亦湏兼讀四傳又聞嘉靖以前學臣命禮記題有出喪服以試士子之能記否者百年以來喪服等篇皆删去不讀今則并檀弓不讀矣書則删去五子之歌湯誓盤庚西伯戡黎微子金縢顧命康王之誥文侯之命等篇不讀詩則删去淫風變雅不讀易則删去訟否剝遯明夷暌蹇困旅等卦不讀止記其可以出題之篇及此數十題之文而已讀論惟取一篇披莊不過盈尺隋書崔賾傳因陋就寡赴速邀時舊唐書薛謙光傳昔人所須十年而成者以一年畢之昔人所待一年而習者以一月畢之成於勦襲得於假倩卒而問其所未讀之經有茫然不知為何書者故愚以為八股之害等於焚書而敗壞人材有甚於咸陽之郊所坑者但四百六十餘人也請更其法凡四書五經之文皆問疑義使之以一經而通之於五經又一經之中亦各有疑義如易之鄭王詩之毛鄭春秋之三傳以及唐宋諸儒不同之説四書五經皆依此發問漢人所謂發策決科者正是如此其對者必如朱子所云通貫經文條舉衆説而斷以己意宋史劉恕傳舉進士詔能講經義者别奏名應召者才數十人恕以春秋禮記對先列註疏方引先儒異説末乃斷以己意凡二十問所對皆然其所出之題不限盛衰治亂宋文鑑載張庭堅自靖人自獻于先王經義一篇使人不得意擬而其文必出於塲中之所作則士之通經與否可得而知其能文與否亦可得而驗矣又不然則姑用唐宋賦韻之法猶可以杜節抄剽盜之弊蓋題可擬而韻不可必文之工拙猶其所自作必不至以他人之文抄謄一過而中式者矣其表題專出唐宋策題兼問古今如王梅溪集中所載人自不得不讀通鑑矣夫舉業之文昔人所鄙斥而以為無益於經學者也今猶不出於本人之手焉何其愈下也哉讀書不通五經者必不能通一經不當分經試士且如唐宋之世尚有以老莊諸書命題如巵言日出賦至相率扣殿檻乞示者今不過五經益以三禮三傳亦不過九經而已此而不習何名為士宋史馮元授江陰尉時詔流内銓以明經者補學官元自薦通五經謝泌笑曰古人治一經而至皓首子尚少能盡通耶對曰達者一以貫之更問疑義辨析無滯石林燕語熈寧以前以詩賦取士學者無不先徧讀五經余見前輩雖無科名人亦多能襍舉五經蓋自幼學時習之故終老不忘自改經術人之教子者往往便以一經授之他經縱讀亦不能精其教之者亦未必皆通五經故雖經書正文亦多遺誤若今人問答之間稱其人所習為貴經自稱為敝經尤可笑也科塲之法欲其難不欲其易使更其法而予之以難則覬倖之人少少一覬倖之人則少一營求患得之人而士類可漸以清抑士子之知其難也而攻苦之日多多一攻苦之人則少一羣居終日言不及義之人而士習可漸以正矣墨子言今若有一諸侯於此為政其國家也曰凡我國能射御之士我將賞貴之不能射御之士我將罪賤之問於若國之士孰喜孰懼我以為必能射御之士喜不能射御之士懼曰凡我國之忠信之士我將賞貴之不忠信之士我將罪賤之問於若國之士孰喜孰懼我以為必忠信之士喜不忠信之士懼今若責士子以兼通九經記通鑑歴代之史而曰若此者中不若此者黜我以為必好學能文之士喜而不學無文之士懼也然則為不可之説以撓吾法者皆不學無文之人也人主可以無聽也今日欲革科舉之弊必先示以讀書學問之法暫停考試數年而後行之然後可以得人晉元帝從元坦之議聽孝廉申至七年乃試胡三省註緩為之期曰申古之人有行之者題切時事考試題目多有規切時事亦虞帝予違汝弼之遺意也宋史張洞傳試開封進士賦題曰孝慈則忠時方議濮安㦤王稱皇事英宗曰張洞意諷朕宰相韓琦進曰言之者無罪聞之者足以戒上意解古之人君近則盡官師之規遠則通鄉校之論此義立而爭諫之塗廣矣天啓四年應天鄉試題今夫奕之為數一節以魏忠賢始用事也浙江鄉試題君之視臣如手足則臣視君如腹心以杖殺工部郞萬燝也七年江西鄉試題皜皜乎不可尚已其年監生陸萬齡請以忠賢建祠國學也萬齡疏以忠賢芟除奸黨為誅少正夘定三朝要典為作春秋請上特製碑文并祠其父於後室以比於啓聖崇禎三年應天鄉試題舉直錯諸枉能使枉者直以媚奄諸臣初定逆案也此皆可以開帝聰而持國是者時當季葉而沔水鶴鳴之義猶存於士大夫可以想見先朝之遺化若崇禎九年應天鄉試春秋題宋公入曹以曹伯陽歸以公孫彊比陳啓新是以曹伯陽比皇上非所宜言大不敬天啓七年順天鄉試書經題我二人共貞以周公比魏忠賢則又無將之漸亦見之彈文者也景泰初也先奉上皇至邊邊臣不納雖有社稷為重之説然當時朝論即有以奉迎之緩為譏者順天鄉試題所謂平天下在治其國者一節蓋有諷意試文格式經義之文流俗謂之八股蓋始於成化以後股者對偶之名也天順以前經義之文不過敷演傳註或對或散初無定式其單句題亦甚少成化二十三年㑹試樂天者保天下文起講先提三句即講樂天四股中間過接四句復講保天下四股復收四句再作大結𢎞治九年㑹試責難於君謂之恭文起講先提三句即講責難於君四股中間過接二句復講謂之恭四股復收二句再作大結每四股之中一反一正一虛一實一淺一深亦有聨屬二句四句為對排比十數對成篇而不止於八股者其兩扇立格謂題本兩對文亦兩大對則每扇之中各有四股其次第之法亦復如之故今人相傳謂之八股若長題則不拘此嘉靖以後文體日變而問之儒生皆不知八股之何謂矣孟子曰大匠誨人必以規矩今之為時文者豈必裂規偭矩矣乎發端二句或三四句謂之破題大抵對句為多此宋人相傳之格本之唐人賦格下申其意作四五句謂之承題然後提出夫子曽子子思孟子皆然為何而發此言謂之原起至萬歴中破止二句承止三句不用原起篇末敷演聖人言畢自攄所見或數十字或百餘字謂之大結明初之制可及本朝時事以後功令益密恐有藉以自􅃷者但許言前代不及本朝至萬厯中大結止三四句於是國家之事罔始罔終在位之臣畏首畏尾其象已見於應舉之文矣試錄文字之體首行曰第一塲頂格寫次行曰四書下一格次行題目又下一格五經及二三塲皆然至試文則不能再下仍提起頂格此題目所以下二格也若歲考之卷則首行曰四書頂格寫次行題目止下一格經論亦然湏知自古以來書籍文字首行無不頂格寫者後來學政茍且成風士子試卷省卻四書各經字竟從題目寫起依大塲之式概下二格聖經反下自作反高於理為不通然日用而不知亦已久矣又其異者沿此之例不論古今詩文概以下二格為題萬厯以後坊刻盛行每題之文必注其人之名於下而刻古書者亦化而同之如題曰周鄭交質下二格其行末書左丘明題曰伯夷列傳下二格其行末書司馬遷變歴代相傳之古書以肖時文之面貌使古人見之當為絶倒程文自宋以來以取中士子所作之文謂之程文金史承安五年詔考試詞賦官各作程文一道示為舉人之式試後赴省藏之至明朝先亦用士子程文刻錄後多主司所作遂又分士子所作之文别謂之墨卷文章無定格立一格而後為文其文不足言矣唐之取士以賦而賦之末流最為冗濫宋之取士以論策而論策之弊亦復如之明之取士以經義而經義之不成文又有甚於前代者皆以程文格式為之故日趨而下鼂董公孫之對所以獨出千古者以其無程文格式也欲振今日之文在毋拘之以格式而俊異之才出矣判舉子第二場作判五條猶用唐時銓試之遺意至於近年士不讀律止抄錄舊本入場時每人止記一律或吏或户記得五條場中即可互換中式之卷大半雷同最為可笑通典選人條例其倩人暗判人間謂之判羅此最無恥請牓示以懲之後唐明宗天成三年中書奏吏部南曹闗今年及第進士内三禮劉瑩等五人所試判語皆同勘状稱晚逼試期偶拾得判草寫淨實不知判語不合一般者敕貢院擢科考詳所業南曹試判激勸為官劉瑩等既不攻文只合直書其事豈得相傳稾草侮瀆公場宜令所司落下放罪宋史太祖紀開寳六年八月丁酉泗州推官侯濟坐試判假手杖除名夫以五代偏安喪亂之餘尚令科罪明以堂堂一統作人之盛而士子公然互換至一二百年目為通弊不行覺察傳之後代其不為笑談乎試判起於唐高宗時初吏部選才將親其人覆其吏事始取州縣案牘疑議試其斷割而觀其能否後日月寖久選人猥多案牘淺近不足為難乃采經籍古義假設甲乙令其判斷既而來者益衆而通經正籍又不足以為問乃徵僻書曲學隱伏之義問之惟懼人之能知也佳者登於科第謂之入等其甚拙者謂之藍縷各有升降選人有格限未至而能試文三篇謂之宏詞試判三條謂之拔萃亦曰超絶詞美者得不拘限而授職至明朝之制以吏部選人之法而施之貢舉欲使一經之士皆通吏事其意甚美又不用假設甲乙止據律文尤為正大得體但以五尺之童能强記者旬日之力便可盡荅而無難亦何以定人才之高下哉蓋此法止可施於選人引試俄頃之間而不可行之通場廣衆竟日之久宜乎各記一曹互相倒換朝廷之制有名行而實廢者此類是矣必不得已而用此制其如通典所云問以時事疑獄令約律文斷決不乖經義者乎經文字體生員冒濫之弊至正嘉而極求其省記四書本經全文百中無一更求通曉六書字合正體者千中無一也簡汰之法是亦非難但分為二場第一場令暗寫四書一千字經一千字脱誤本文及字不遵式者貼出除名第二場乃考其文義則矍相之射僅有存者矣或曰此末節也豈足為才士累夫周官教國子以六藝射御之後繼以六書而漢世試書九千字以上乃得為史以周官童子之課而責之成人漢世掾史之長而求之秀士猶且不能則退之隴畝其何辭之有北齊策孝秀於朝堂對字有脱誤者呼起立席後書迹濫劣者飲墨汁一升文理孟浪者奪席脱容刀僭霸之君尚立此制以全盛之朝求才之主而不思除弊之方課實之效與天下因循於溷濁之中以是為順人情而已權文公有言常情為習所勝避患安時俾躬處休以至老死自為得計豈復有揣摩古今風俗整齊教化根本原始要終長轡遠馭者耶古今一揆可勝慨息史學唐穆宗長慶三年二月諫議大夫殷侑言司馬遷班固范曄三史為書勸善懲惡亞於六經比來史學廢絶至有身處班列而朝廷舊章莫能知者於是立三史科及三傳科通典舉人條例其史書史記為一史漢書為一史後漢書并劉昭所注志為一史三國志為一史晉書為一史李延壽南史為一史北史為一史習南史者兼通宋齊志習北史者通後魏隋書志自宋以後史書煩碎冗長請但問政理成敗所因及其人物損益關於當代者其餘一切不問國朝自髙祖以下及睿宗實録并貞觀政要共為一史朱子亦嘗議分年試士以左傳國語史記兩漢為一科三國晉書南北史為一科新舊唐書五代史為一科時務律厯地理為一科今史學廢絶又甚唐時若能依此法舉之十年之間可得通達政體之士未必無益於國家也宋孝宗淳熈十一年十月太常博士倪思言舉人輕視史學今之論史者獨取漢唐混一之事三國六朝五代以為非盛世而恥談之然其進取之得失守禦之當否籌策之疎宻區處兵民之方形勢成敗之迹俾加討究有補國家請諭春官凡課試命題襍出諸史無所拘忌考覈之際稍以論策為重毋止以初場定去留從之史言薛昂為大司成寡學術士子有用史記西漢語輒黜之在哲宗時嘗請罷史學哲宗斥為俗佞吁何近世俗佞之多乎日知錄卷十六
