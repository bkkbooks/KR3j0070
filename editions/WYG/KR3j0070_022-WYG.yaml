body:
  text: 日知錄卷二十二崑山顧炎武撰四海書正義言天地之勢四邉有水鄒衍書言九州之外有大瀛海環之是九州居水内故以州爲名州古洲字然五經無西海北海之文而所謂四海者亦㮣萬國而言之爾禮記祭義推而放諸西海而準推而放諸北海而準亦是㮣言之海至左傳齊桓公言寡人處北海則直指齊地而孟子言伯夷辟紂居北海之濵唐時以濰州為北海郡而樂昌縣遂有伯夷廟爾雅九夷八蠻六戎五狄謂之四海周禮校人凡將有事於四海山川註四海猶四方也則海非真水之名易卦兊爲澤而不言海禮記鄉飲酒義曰祖天地之左海也則又以見右之無海矣史記日者傳地不滿東南以海為池虞書禹言予决九川距四海據禹貢但有一海而南海之名猶之西河即此河爾禹貢之言海有二柬漸于海實言之海也聲教訖于四海槩言之海也宋洪邁謂海一而已地勢西北髙東南下所謂東此南三海其實一也北至於青滄則曰北海南至於交廣則曰南海東漸呉越則曰東海無繇有所謂西海者詩書禮經之稱四海葢引類而言之至如荘子所謂窮髮之北有㝠海及屈原所謂指西海以爲期皆寓言爾程大昌謂條支之西有海先漢使固嘗見之而載諸史史記大宛傳于寘之西則水皆西流注西海又曰奄蔡在康居西北可二千里臨大澤無崖葢乃北海云漢書西域傳條支國臨西海後漢班超又遣甘英軰親至其地而西海之西又有大秦夷人與海商皆常往來霍去病封狼居胥山其山實臨瀚海蘓武郭吉皆爲匈奴所幽寘諸北海之上而唐史又言突厥部北海之北有骨利幹國在海北岸然則詩書所稱四海實環華裔而四之非寓言也然今甘州有居延海西寧有青海雲南有滇海安知漢唐人所見之海非此類邪九州九州之名始見於禹貢祭法共工氏之霸九有也其子曰后土能平九州此前乎禹而有九州之名周禮職方氏疏曰自神農以上有大九州柱州迎州神州之等至黄帝以來德不及遠惟於神州之内分爲九州史記孟子荀􅀸傳騶衍言中國名曰赤縣神州赤縣神州内自有九州禹之序九州是也不得爲州数中國外如赤縣神州者九乃所謂九州也葢天下有九州古之帝者皆治之後世德薄止治神州神州者東南一州也河圖括地象東南神州正南卬州西南戎州正西弇州正中冀州西北柱州北方𤣥州東北咸州正東陽州淮南子地形訓同而以西北爲台州正北爲濟州東北爲薄州正東爲陽州隋書北郊之制有神州迎州冀州戎州拾州柱州營州咸州陽州唐初房𤣥齡與禮官議以爲神州者國之所託餘八州則義不相及遂除迎州等八座惟祭皇地祗及神州此荒誕之説固無足采然中國之大亦未有窮其涯域者尹耕兩鎮志引漢書地理志言黃帝方制萬里畫埜分州得百里之國萬區而疑不盡於禹九州之内且曰以今觀之涿鹿今保安州東北之極陬也而黄帝以之建都釡山在懐來城北塞上之小山也而黄帝以之合符則當時藩國之在其西北者可知也晉載記慕容廆以大棘城即帝顓頊之􅇕也乃移居之通典棘城在營州柳城東南一百七十里秦漢以來匃奴他部如爾朱宇文之類往往祖黄帝穪昌意後亦一證也按魏周諸書惟云魏之先出自黄帝軒轅氏黄帝子曰昌意昌意之少子受封北國而爾朱氏無聞宇文氏則云其先出自炎帝神農氏今舍拓䟦而言爾朱宇文也遼史言耶律嚴稱遼爲軒轅後厥後昌意降居帝摰遜位至於洪水之災天下分絶而諸侯之不朝者有矣以書考之禹别九州而舜又肇十二州其分爲幽并營者皆在冀之東北書肇十有二州傳云肇始也禹治水之後舜分冀州爲幽州并州分青州爲營州始置十二州北高誘註淮南子云古之幽都在鴈門以必其前閉而後通前距而後服者也而此三州以外則舜不得而有之矣此後世幅員所以止於禹迹九州之内而天地之氣亦自西北而趨於東南日荒日闢而今猶未已也蔡仲黙書傳亦謂當舜之時冀北之地未必荒落如後世騶子之言雖不盡然亦豈可謂其無所自哉幽并營三州在禹貢九州之外先儒謂以冀青二州地廣而分之殆非也孔安國馬融竝云遼疏謂堯時青州當越海而有東益無據幽則今涿易以北至塞外之地書流共工于幽洲孟子作州括地志云在䄠州燕樂縣界今順天有宻雲縣并則今忻代以北至塞外之地營則今遼東大寧之地其山川皆不載之禹貢故靡得而詳凡漢之上谷漁陽右北平遼西遼東山川皆不載之禹貢惟碣石爲右北平驪城縣山然此但島夷之貢道爾然而益稷之書謂弼成五服至于五千則冀方之北不應僅數百里而止遼史地理志言幽州在渤碣之間并州北有代朔營州東曁遼海營衛志言冀州以南歷洪水之變夏后始制城郭其人土著而居并營以北勁風多寒隨陽遷徙歲無寧居曠土萬里或其説之有所本也劉三吾書傳謂孔氏以遼東屬青州隔越巨海道里殊遠非所謂因髙山大川以爲限之意葢幽并營三州皆分冀州之地又引歐陽忞輿地廣記以遼東營州屬冀州今亦未有所攷禹畫九州在前舜肇十二州在後肇始也昔但有九州今有十二州自舜始也漢書地理志堯遭洪水天下分絶爲十二州使禹治之更制九州與書肇十有二州之文不同葢漢人之説如此故王莽據之爲奏陳氏經曰禹貢之作乃在堯時至舜時乃分九州爲十二州至夏之世又并爲九州故傳言貢金九牧竹書紀年帝舜三十三年夏后受命于神宗遂復九州亦未可信然則謂禹貢九州爲盡虞夏之彊域者疏矣夏商以後沿上世九州之名各就其彊里所及而分之故毎代小有不同周書爾雅各與禹貢不同周禮量人掌建國之法以分國爲九州曰分則不循於其舊可知矣周禮職方東北曰幽州其山曰醫無閭藪曰豯養山川曰河泲浸曰菑時醫無閭在今遼東廣寧衛豯養澤註云在長廣今山陽萊陽縣已無迹可考而青之菑時兖之河泲襍出於一條之中殆不可據州有二名舜典肇十有二州禹貢九州大名也周禮大司徒五黨爲州州長註二千五百家爲州左傳僖十五年晉作州兵宣十一年楚子入陳鄕取一人焉以歸謂之夏州昭二十二年晉籍談荀躒帥九州之戎註州鄉属也五州爲鄕哀四年士蔑乃致九州之戎十七年衛侯登城以望見戎州國語謝西之九州何如註謝西有九州二千五百家爲州竝小名也陳祥道禮書二百一十國謂之州五黨亦謂之州萬二千五百家謂之遂一夫之間亦謂之遂王畿謂之縣五鄙亦謂之縣江淮河濟謂之四瀆而易坎爲水爲溝瀆大小之極不嫌同名六國獨燕無後春秋之時楚最彊楚之官令尹最貴而其爲令尹者皆同姓之親至於六國已滅之後而卒能自立以亡秦者楚也嘗考夫七國之時人主多任其貴戚如孟嘗平原信陵三公子毋論楚之昭陽昭奚恤昭睢韓之公仲公叔趙之公子成趙豹趙奢齊之田嬰田忌田單單之功至於復齊國至秦則不用矣而涇陽高陵之軰猶以擅國聞獨燕蔑有子之之於王噲未知其親疎自昭王以降無一同姓之見於史者及陳項兵起立六國後而孫心王楚儋王齊咎王魏已而歇王趙成王韓惟燕人乃立韓廣豈王喜之後無一人與不然燕人之哀太子丹豈下於懐王而忍亡之也葢燕宗之不振乆矣嗚呼楚用其宗而立懐王者楚也燕用非其宗而立韓廣者燕也然則晉無公族而六卿分秦無子弟而閻樂弑魏削藩王而陳留簒于司馬宋卑宗子而二帝没于金人皆是道矣詩曰宗子維城無俾城壊無獨斯畏其斯之謂與郡縣漢書地理志言秦并兼四海以爲周制㣲弱終爲諸侯所䘮故不立尺土之封分天下爲郡縣盪滅前聖之苗裔靡有孑遺後之文人祖述其説以爲廢封建立郡縣皆始皇之所爲也以余觀之殆不然左傳僖公三十三年晉㐮公以再命命先茅之縣賞胥臣宣公十一年楚子縣陳十二年鄭伯逆楚子之辭曰使改事君夷于九縣註楚滅諸小國爲九縣十五年晉侯賞士伯以𤓰衍之縣成公六年韓獻子曰成師以出而敗楚之二縣㐮公二十六年蔡聲子曰晉人将與之縣以比叔向三十年絳縣人或年長矣昭公三年二宣子曰晉之别縣不惟州五年薳啟疆曰韓賦七邑皆成縣也註成縣賦百乗也又曰因其十家九縣其餘四十縣十年叔向曰陳人聽命而遂縣之二十八年晉分祁氏之田以爲七縣分羊舌氏之田以爲三縣哀公十七年子榖曰彭仲爽申俘也文王以爲令尹實縣申息晏子春秋昔我先君桓公予管仲狐與榖其縣十七説苑景公令吏致千家之縣一於晏子戰國䇿智過言於智伯曰破趙則封二子者各萬家之縣一史記秦本紀武公十年伐邽冀戎初縣之十一年初縣杜鄭呉世家王餘祭三年予慶封朱方之縣則當春秋之世滅人之國者固已爲縣矣按昭二十九年傳蔡墨言劉累遷于魯縣則夏后氏已有縣之名周禮小司徒四甸爲縣遂人五鄙爲縣縣士註距王城二百里以外至四百里曰縣亦作寰國語管子制齊三鄉爲寰寰有寰帥十寰爲屬屬有大夫顔師古曰古書縣邑字皆作寰以縣爲縣掛字後人轉用爲州縣字其縣掛之縣又加心以别之也史記呉王發九郡兵伐齊范蜎對楚王曰楚南塞厲門而郡江東甘茂謂秦王曰宜陽大縣名曰縣其實郡也春申君言於楚王曰淮北地邉齊其事急請以爲郡便匈奴傳言趙武靈王置雲中鴈門代郡燕置上谷漁陽右北平遼西遼東郡以屯守又言魏有河西上郡以與戎界邉則當七國之世而固已有郡矣哀公二年傳趙簡子誓曰克敵者上大夫受縣下大夫受郡杜氏註引周書作雒篇千里百縣縣有四郡古時縣大而郡小初説文周制天子地方千里分爲百縣縣有四郡至秦置三十六郡以監其縣今按史記呉王及春申君之事則郡之統縣固不始於秦也呉起爲西河守馮亭爲上黨守李伯爲代郡守西門豹爲鄴令荀况爲蘭陵令城渾説楚新城令衛有蒲守韓有南陽假守魏有安邑令蘓代曰請以三萬户之都封太守千户封縣令趙封馮亭亦云而齊威王朝諸縣令長七十二人則六國之未入於秦而固已先爲守令長矣故史言樂毅下齊七十餘城皆爲郡縣而齊湣王遺楚懐王書曰四國争事秦則楚爲郡縣矣張儀説燕昭王曰今時趙之於秦猶郡縣也安得謂至始皇而始罷矦置守邪傳稱禹㑹諸侯執玉帛者萬國至周武王僅千八百國春秋時見於經傳者百四十餘國又并而爲十二諸侯又并而爲七國此固其勢之所必至秦雖欲復古之制一一而封之亦有所不能而謂罷侯置守之始於秦則儒生不通古今之見也秦分天下爲三十六郡其中西河上郡則因魏之故雲中鴈門代郡則趙武靈王所置上谷漁陽右北平遼西遼東郡則燕所置史記不志地理而見之於匃奴之傳孟堅志皆謂之秦置者以漢之所承者秦不言魏趙燕爾秦始皇議封建實無其本假使用淳于越之言而行封建其所封者不過如穣侯涇陽􅂠陽高陵君之屬而已豈有建國長世之理秦始皇未滅二國古封建之國其未盡滅於秦始皇者衛世家言二世元年廢衛君角爲庻人是始皇時衛未嘗亡也漢書地理志始皇既并天下猶獨置衛君二世時乃廢爲庻人凡四十世九百年最後絶越世家言越以此散諸族子争立或爲王或爲君濵于江南海上服朝于楚秦始皇本紀言二十五年王翦遂定荆江南地降越君漢興有東海王揺閩越王無諸之屬如今世之土司是越未嘗亡也西南夷傳又言秦滅諸侯惟楚苗裔尚有滇王然則謂秦滅五等而立郡縣亦舉其大勢然耳漢王子侯漢王子侯之盛無過哀平之間王莽傳五威将帥七十二人還奏事漢諸侯王爲公者悉上璽綬爲民後漢書城陽㳟王祉傳莾簒立劉氏爲侯者皆降稱子食孤􅀸祿後皆奪爵後漢光武紀建武二年十二月戊午詔曰惟宗室列侯爲王莽所廢先靈無所依歸朕甚愍之其竝復故國若侯身已没屬所上其子孫見名尚書封拜是皆絶於莽而復封於光武之時然漢書表傳中往往言王莽簒位絶而表言安衆侯崇居攝元年舉兵爲王莽所滅侯􅃂建武二年以崇從父弟紹封十三年侯松嗣今見師古曰作表時見爲侯也表言今見者止此一人是光武之時侯身已没者其子孫亦但隨宜封拜而已光武紀十三年下云其宗室及絶國封侯者凡一百三十七人惟安衆之以故國紹封者褒崇之忠非通例也又莽傳云嘉新公國師以符命爲予四輔明德侯劉龔率禮侯劉嘉等凡三十二人皆知天命或獻天符或貢昌言或捕告反冦諸劉與三十二人同宗共祖者勿罷賜姓曰王唯國師公以女配莽子故不賜姓武五子傳廣陽王嘉以獻符命封扶美侯賜姓王氏諸侯王表魯王閔獻神書言莽德封列侯賜姓王中山王成都獻書言莽德封列侯賜姓王王子侯表新鄕侯佟莽傳作信鄉侯元始五年上書言莽宜居攝莽簒位賜姓王若此之類光武豈得而復封之乎又王子侯表序曰元始之際王莽攝朝僞褒宗室侯及王之孫焉居攝而愈多非其正故弗錄旋踵亦絶又可見莽攝位之所封者光武皆不紹封也夫惟於親親之中而寓褒忠之意則於安衆之封見之後漢書卓茂傳云劉宣字子高安衆侯崇之從弟知王莽當簒乃變名姓抱經書隱避林薮建武初乃出光武以宣襲封安衆侯宣或即􅃂之誤又李通傳云永平中顯宗幸宛詔諸李隨安衆宗室會見註引謝承書曰安衆侯崇長沙定王五代孫與宗人討莽有功隨光武河北破王郎朝廷高其忠壯䇿文嗟歎以厲宗室以表計之雖正是五代孫而以紹封者爲名崇殊爲舛錯當以前漢表爲正又劉隆傳曰隆字元伯南陽安衆侯宗室也王莽居攝中隆父禮與安衆侯崇起兵誅莽事泄隆以年未七歲故得免史文雖畧千載之下可以情測也此一代之大典不可不論武五子傳昌邑王賀廢封爲海昬侯薨元帝復封賀子代宗爲海昬侯傳子至孫今見爲侯表云賀以神爵三年薨坐故行滛辟不得置後初元三年釐侯代宗以賀子紹封傳至孫原侯保世嗣傳至曽孫侯㑹邑嗣免建武復封是光武之復封有此二人安衆以褒忠海昬以嘗居尊位故與功臣表蕭何九世孫禹王莽始建國元年更爲蕭鄉侯莽敗絶曹參十世孫宏舉兵佐軍本傳云先降河北詔封平陽侯十一世侯曠嗣今見非光武之薄於鄼侯而厚於平陽也非有功不侯高帝法也紅陽侯王泓以與諸劉結㤙父丹降爲將軍戰死見元后傳冨平侯張純以先來詣闕見后漢書本傳皆得紹封按功臣侯復封者三人㤙澤侯復封者四人高昌侯董永歸德侯㐮平昌侯王獲三人功状無考而周承休侯常自以周後而杜憲趙牧竝以先降梁王不得嗣光武命功之典如此漢侯國漢書地理志京兆尹左馮翊右扶風竝無侯國以在畿内故也然功臣侯表有陽陵侯傅寛高陵侯王虞人㤙澤侯表有高陵侯翟方進竝左馮翊縣名功臣侯表平陵侯蘓建平陵侯范明友右扶風縣名而高陵下曰琅邪二平陵下曰武當則知此鄉名之同於縣者而非三輔也若後漢則新豐侯單超新豐侯叚熲京兆縣夏陽侯馮異櫟陽侯景丹臨晋侯楊賜竝左馮翊縣好畤侯耿弇槐里侯萬修槐里侯竇武槐里侯皇甫蒿栒邑侯宋𢎞􅔛侯董卓竝右扶風縣而嵩傳云食槐里美陽兩縣八千户葢東都之後三輔同於郡國矣地理志侯國有注有不注殆不可曉意者班史亦仍前人之文止據其時之見在者而書之乎都詩毛氏傳下邑曰都後人以爲人君所居非也帝王世紀天子所宮曰都釋名都者國君所居考之經則書之云大都小伯詩之云在浚之都作都于向者皆下邑也左傳曰先王之制大都不過參國之一中五之一小九之一隱公元年又曰邑有宗廟先君之主曰都無曰邑莊公二十八年故晉二五言于獻公曰狄之廣莫於晉爲都謂蒲也屈也士伯謂叔孫昭子曰將館子於都謂箕也公孫朝謂季平子曰有都以衛國也謂成也仲由爲季氏宰將堕三都謂郈也費也成也萊章曰往歲克敵今又勝都謂廩邱也孟子王之爲都者臣知五人焉謂平陸也韓子衛嗣君以一都買一胥靡謂左氏也史記趙良勸商君歸十五都灌園於鄙秦封鞅商十五邑秦王請藺相如召有司案圖指從此以往十五都予趙齊王令章子將五都之兵因北地之衆以伐燕張儀説楚王請效萬家之都以爲湯沐之邑而陳恢見沛公亦曰宛大郡之都也其名始於周禮小司徒九夫爲井四井爲邑四邑爲丘四丘爲甸四甸爲縣四縣爲都註四縣爲都方四十里而王之子弟所封及公卿之采邑在焉於是乎有都宗人都司馬其後乃爲大邑之稱耳縣士註距王城四百里以外至五百里曰都故詩云彼都人士禮記月令命農勉作毋休于都而宰夫掌郡都縣鄙之治註羣都諸采邑也啇子言百都之尊爵厚祿史記信陵君之諫魏王謂所亡於秦者大縣數十名都數百則皆小邑之稱也三代以上若湯居亳太王居邠竝言居不言都至秦始皇始言吾聞周文王都豐武王都鎬豐鎬之間帝王之都也而項羽分立諸侯王遂各以其所居之地爲都王莽下書言周有東都西都之居而以雒陽爲新室東都常安爲新室西都莽改長安曰常安後世因之遂以古者下邑之名爲帝王京師之號葢習而不察矣史記商君傳築冀闕宮庭於咸陽秦自雍徙都之而集小都鄉邑聚爲縣置令丞凡三十一縣上都國都之都下都都鄙之都史文兼古今語漢書晁錯傳言憂勞百姓列侯就都是以所封國邑爲都後漢書安帝紀徙金城郡都㐮武龎參傳燒當羌種號多等皆降始復得還都令居是以郡治爲都而食貨志言長安及五都以雒陽邯郸臨甾宛成都爲五都而長安不與焉此又所謂通邑大都居一方之㑹者也如張衡南都賦徐幹齊都賦劉邵趙都賦庾闡揚都賦若後世國都之名専於天子而諸侯王不敢稱矣史記孝景中三年軍東都門外此時未有東都其曰東都門猶言東郭門也程大昌以爲自此出雒陽東都者非三輔黄圖長安城東出北頭第一門曰宣平門民間所謂東都門鄉里以縣統鄉以鄉統里備書之者史記老子楚苦縣厲鄉曲仁里人樗里子室在昭王廟西渭南隂鄉樗里是也書縣里而不言鄉史記高祖沛豐邑中陽里人應劭曰沛縣也豐其鄉也聶政軹深井里人淳于意師臨菑元里公乗陽慶漢書衛太子亡至湖泉鳩里是也亦有書鄉而不言里史記陳丞相平陽武户牖鄉人王翦頻陽東鄉人是也古時鄉亦有城漢書朱邑傳其子葬之桐鄉西郭外都鄉集古錄宋宗慤母夫人墓誌湼陽縣都鄉安衆里人又云􅉎于秣陵縣都鄉石泉里都鄉之制前史不載按都鄉葢即今之坊廂也漢濟陰太守孟郁堯廟碑成陽仲氏居都鄉高相里都鄉侯後漢封國之制有鄉侯有都鄉侯傳中言都鄉侯者甚多皇甫嵩封槐里侯忤中常侍趙忠張譲削户六千更封都鄉侯具瑗有罪詣獄謝上還東武侯印綬上文作東武陽侯詔貶爲都鄉侯是都鄉侯在列侯之下也趙忠以與誅梁冀功封都鄉侯單超傳但言鄉侯今從本傳延熹八年貶爲關内侯本傳作關中侯今從單超傳是都鄉侯在關内侯之上也關内侯無食邑如淳以爲但爵其身見史記高后紀註在呉志孫賁封都亭侯子鄰嗣進封都鄉侯是都鄉侯都亭侯之上良賀卒帝封其養子爲都鄉侯三百户是都鄉侯所食之户數也梁冀得罪徙封比景都鄉侯是都鄉侯亦必有所封之地而不言者史畧之也鄉侯都亭侯亭侯或言地或不言地亦同此皇后紀都亭侯註凡言都亭者並城内亭也宋書百官志縣侯第三品鄉侯第四品亭侯第五品關内侯第六品而無都鄉侯都亭侯封君七國雖稱王而其臣不過稱君孟嘗君平原君信陵君春申君是也秦則有稱侯者如穣侯應侯文信侯而蔡澤但爲剛成君漢興列侯曰侯關内侯曰君孔霸以師賜爵關内侯號褒成君其薨也謚曰烈君孔光傳圖宋時登科錄必書某縣某鄉某里人蕭山縣志曰改鄉爲都改里爲圖自元始嘉定縣志曰圖即里也不曰里而曰圖者以毎里册籍首列一圖故名曰圖是矣今俗省作啚謝少連作歙志乃曰啚音鄙左傳都鄙有章即其立名之始趙宦光亦曰都鄙本作啚俗誤讀圖其説鑿矣亭秦制十里一亭十亭一鄉風俗通曰漢家因秦大率十里一亭亭留也葢行旅宿會之所以今度之葢必有居舍如今之公署鄭康成周禮遺人註曰若今亭有室矣故霸陵尉止李廣宿亭下張禹奏請平陵肥牛亭部處上以賜禹徙亭它所而漢書註云亭有兩卒一爲亭父掌開閉掃除一爲求盜掌逐捕盜賊任安先爲求盗亭父後爲亭長是也晉時有亭子劉卞爲縣小吏功曹銜之以他事補亭子又必有城池如今之村堡今福建廣東凡廵司皆有城韓非子呉起爲魏西河守秦有小亭臨境起攻亭一朝而㧞之漢書息夫躬歸國未有第宅寄居邱亭姦人以爲侯家富常夜守之匈奴傳見畜布野而無人牧者怪之乃攻亭後漢書公孫瓉傳卒逢鮮卑數百騎乃退入空亭是也減宣怒其吏成信信亡藏上林中宣使􅔛令將吏卒闌入上林中蠶室門攻亭格殺信是上林中亦有亭也又必有人民如今之鎮集漢封功臣有亭侯是也亦謂之下亭風俗通鮑宣州牧行部多宿下亭是也其都亭則如今之關廂司馬相如往臨邛舍都亭史記索隱曰郭下之亭也漢書註師古曰臨邛所治都之亭後漢陳實嘗爲都亭刺佐嚴延年母止都亭不肯入府何竝斬王林卿奴頭并所剝建皷置都亭下後漢書陳王􅃂有彊弩數千張出軍都亭會稽太守尹興使陸續於都亭賦民饘粥酒泉龎娥刺殺讐人於都亭呉志魏使邢貞拜權爲呉王權出都亭候貞是也京師亦有都亭後漢書張綱埋其車輪於雒陽都亭竇武召㑹北軍五校士屯都亭何進率左右羽林五營士屯都亭王喬爲葉令帝迎取其皷置都亭下是也蔡質漢儀雒陽二十四街街一亭十二城門門一亭人謂之旗亭史記三代世表褚先生言與方士考功㑹旗亭下是也西京賦曰旗亭五重薛綜註旗亭市門樓也立旗於其上故取名焉後代則但有郵亭驛亭之名而失古者居民之義矣晉書載記慕容埀請入鄴城拜廟苻丕不許乃潜服而入亭吏禁之埀怒斬吏燒亭而去是晉時尚有亭名亭侯通典獻帝建安初封曹操爲費亭侯亭侯之制自此始也恐不然靈帝以解瀆亭侯入繼桓帝紀封單超等五人爲縣侯尹勲等七人爲亭侯列傳中爲亭侯者甚多大抵皆在章和以後丁綝言能薄功㣲得鄉亭厚矣樊宏願還夀張食小鄉亭則建武中似已有亭侯矣楚漢春秋髙祖封許負爲鳴雌亭侯裴松之曰高祖時封皆列侯未有鄉亭之爵疑爲不然蜀志中山靖王子貞元狩六年封涿縣陸城亭侯按漢書作陸城侯志文衍一亭字漢書王莽傳改大郡至分爲五郡縣以亭爲名者三百六十以應符命文社社之名起於古之國社里社故古人以鄉爲社大戴禮千乘之國受命於天子通其四疆教其書社管子方六里名之曰社是也左傳昭公二十五年齊侯唁公曰自莒疆以西請致千社註二十五家爲社千社二萬五千家史記孔子世家冉有曰雖累千社夫子不利也索隱曰二十五家爲社哀公十五年齊與衛地自濟以西禚媚杏以南書社五百晏子景公予魯君地山隂数百社又曰景公祿晏子以平隂與槀邑反市者十一社又曰昔吾先君桓公以書社五百封管仲不辭而受荀子與之書社三百而富人莫之敢距戰國䇿秦王使公子他謂趙王曰大國不義以告敝邑而賜之二社之地商子湯武之戰士卒坐陳者里有書社吕氏春秋武王勝殷諸大夫賞以書社又曰衛公子啟方以書社四十下衛又曰越王請以故呉之地隂江之浦書社三百以封墨子今河南太原青州鄉鎮猶以社爲稱古者春秋祭社一鄉之人無不㑹集三國志注蔣濟爲太尉嘗與桓範㑹社下是也漢書五行志兗州刺史浩賞禁民私所自立社臣瓚曰舊制二十五家爲一社而民或十家五家共爲田社是私社隋書禮儀志百姓二十五家爲一社其舊社及人稀者不限後人聚徒結會亦謂之社萬厯末士人相㑹課文各立名號亦曰某社某社崇禎中有陸文升奏訐張溥等復社一事至奉㫖察勘在事之官多被降罰宋史薛顔傳耀州豪姓李甲結客數十人號没命社會鞏傳章丘民聚黨村落間號霸王社石公弼傳揚州羣不逞爲俠於閭里號亡命社而隋末譙郡賊有黒社白社之名元史泰定帝紀禁饑民結扁擔社傷人者杖一百不知後之士人何取而名此也天啟以後士子書刺往來社字猶以爲汎而曰盟曰社盟此遼史之所謂刺血友也今日人情相與惟年社鄉宗四者而已除却四者便同秦越歷代帝王陵寢宋太祖乾德四年十月癸亥詔歷代帝王陵寢太昊以下十六帝各給守陵五户蠲其他役長吏春秋奉祀啇中宗以下十帝各給三户歲一享秦始皇以下十五帝各給二户三歲一祭周桓王以下三十八帝州縣常禁樵采仍詔呉越國王錢俶修奉禹墓其時天下未一而首發此詔可謂盛德之事惜當日儒臣考之不審以致傳訛後世如云周文王武王成王康王竝葬京兆咸陽縣者按劉向曰文武周公葬于畢史記周本紀太史公曰畢在鎬東南杜中皇覧曰文王武王周公冢皆在京兆長安鎬聚柬杜中後漢志鎬在上林苑東孟康曰長安西南有鎬池郭璞山海經註同書序周公薨成王葬于畢傳曰不敢臣周公故使近文武之墓正義曰案帝王世紀曰文武葬于畢畢在杜南晉書地道記亦云畢在杜南與畢陌别史記周本紀正義引括地志曰文王武王墓在雍州萬年縣西南二十八里畢原上此其在渭水之南杜縣之中甚明雍錄曰文都豐武都鎬豐鎬與杜相属則皇覧謂文王葬于渭南者其理順也文王既葬渭南則周公葬畢必附文墓矣而今乃祭於渭北咸陽縣之北十五里葢據顔師古劉向傳註畢陌在長安西北四十里之誤地道記已明言與畢陌别矣按史記秦本紀集解引皇覧曰秦武王冡在扶風安陵縣西北畢陌中大冡是也人以爲周文王冡非也周文王冡在杜中又秦始皇本紀末正義曰括地志云秦惠文王陵在雍州咸陽縣西北一十四里又云秦悼武王陵在雍州咸陽縣西十里俗名周武王陵非也是昔人已辯之甚明今祭周之文王武王而于秦惠文王悼武王之墓不亦誣乎雍錄言元和一志皆李吉甫為之而周公之墓亦遂兩出一云在萬年縣西南二十八里一云在咸陽縣北十三里則是自相殊異原其誤皆起於畢名之有兩也至云後魏孝文帝長陵在耀州富平縣東南尤謬魏書言帝孝於文明太后乃於永固陵東北里餘營夀宫遂有終焉之志及遷雒陽乃自表瀍西以為山陵之所而方山虛宫號曰萬年堂云其曰方山者代都也瀍西者雒陽也孝文自代遷雒安得葬富平哉葬富平者西魏之文帝乃孝文之孫名寳炬以南陽王爲宇文泰所立在位十七年葬永陵魏書出於東朝不載其事而北史為立本紀且曰嘗登逍遥觀望嵯峨山謂左右曰望此令人有脱屣之意然則今富平縣東南三十里之陵即永陵也后妃傳文帝悼皇后郁乆閭氏大統六年崩葬于少陵原十七年合葬永陵當㑹横橋北后梓宫先至鹿苑帝輼輬後來將就次所􅁤折不進上有宋碑乃謬指爲孝文之葬而歷代因之豈非五代䘮亂之餘在朝罕淹通之士而率爾頒行不遑尋究以至於今日乎宋游師雄紹聖元年普寧寺題名亦指此為西魏文帝陵嗟乎近事之著在史書灼然如此而世之儒生且不能知乃欲與之考橋山訂蒼梧其茫然而失據也宜矣又考册府元龜唐髙宗顯慶二年二月帝在雒陽宫遣使以少牢祭漢光武後魏孝文帝陵則孝文之祭在雒陽於唐時未誤又曰憲宗元和十四年正月詔以周文王武王祠在咸陽縣俾有司修飾則似已在渭北矣魏書孝文太和二十一年五月遣使者以太牢祭周文王于酆武王于鎬隋書祀周文王武王于灃渭之郊舊唐書周文王太公配祭于酆周武王周公召公配祭于鎬竝與皇覧之言合自古所傳當在渭南又韓文公南山詩前尋徑杜墅坌蔽畢原陋亦謂其在杜中韓即元和間人或其遺跡未泯憲宗之詔言祠不言墓非一地也乾德四年詔誤以魏孝文文帝爲一人淳化閣帖誤以梁高祖武帝爲二人宋史黄伯思病淳化閣帖乖譌龎襍作刋誤二卷堯冢靈臺漢書地理志濟隂成陽有堯冡靈臺後漢書章帝紀元和二年二月東巡狩使使者祠唐堯于成陽靈臺安帝紀延􅊍三年二月庚寅使使者祠唐堯于成陽皇覧云堯冡在濟隂成陽皇甫謐帝王世紀云堯葬濟隂成陽西北四十里是爲榖林水經注城陽西二里有堯陵陵南一里有堯母慶都陵於城爲西南稱曰靈臺後漢堯母碑曰慶都僊殁葢葬于兹欲人莫知名曰靈臺鄉曰崇仁邑號修義皆立廟四周列水潭而不流水澤通泉泉不耗竭至豐魚筍不敢採捕廟前竝列數碑栝柏成林二陵南北列馳道逕通皆以磚砌之尚修整堯陵東城西五十餘歩中山夫人祠堯妃也石壁階墀仍舊南西北三面長櫟聫䕃扶疏里餘中山夫人祠南有仲山甫冡冡西有石廟羊虎破碎畧盡於城爲西南在靈臺之東北宋史神宗熈寕元年七月己卯知濮州韓鐸言堯陵在雷澤縣東穀林山陵南有堯母慶都靈臺廟請敕本州春秋致祭置守陵五户免其租奉洒埽從之成陽在漢為濟隂屬縣北齊廢隋復置為雷澤縣唐宋因之金復廢今曹州東北六十里故雷澤城是也而集古錄有漢堯祠及堯母祠碑是廟與碑宋時猶在也然開寳之詔帝堯之祠乃在鄆州今在東平州東北三十里蘆泉山之陽意者自石晉開運之初黄河决于曹濮堯陵爲水所浸乃移之髙地乎而後代因之不復考正矣元史泰定帝紀泰定二年四月丁酉􅗛州鄄城縣言城西堯冢上有佛寺請徙之不報舜陟方乃死見於書禹會諸侯於塗山見於傳惟堯不聞有巡狩之事墨子曰堯北教乎八狄道死葬蛩山之隂舜西教乎七戎道死葬南已之市禹柬教乎九夷道死葬㑹稽之山此戰國時人之説也自此以後吕氏春秋則曰堯葬于榖林太史公則曰堯作游成陽劉向則曰堯葬濟隂竹書紀年則曰帝堯八十九年作游宫于陶九十年帝游居于陶一百年帝陟于陶説文陶再成邱也在濟隂有堯城堯嘗所居故堯號陶唐氏而堯之冡始定于成陽矣但堯都平陽相去甚遠耄期之年禪位之後豈復有巡游之事哉囚堯偃朱之説竝出於竹書而鄄城之跡亦復相近括地志曰故堯城在濮州鄄城縣柬北十五里竹書云昔堯德衰為舜所囚也又有偃朱故城在縣西北十五里竹書云舜囚堯復偃塞丹朱使不與父相見也按此皆戰國人所造之説或人告燕王謂啟攻益而奪之天下韓非子言湯使人説務光自投于河大抵類此詩書所不載千世之遠其安能信之山海經海外南經狄山帝堯葬于陽註吕氏春秋曰堯葬穀林今成陽縣西柬阿縣城次鄉中赭陽縣湘亭南皆有堯冡臨汾縣志曰堯陵在城柬七十里俗謂之神林高一百五十尺廣二百餘步旁皆山石惟此地爲平土深丈餘其廟正殿三間廡十間山後有河一道有金泰和二年碑記竊考舜陟方乃死其陵在九疑禹㑹諸侯於江南計功而崩其陵在㑹稽惟堯之巡狩不見經傳而此其國都之地則此陵爲堯陵無疑也按志所論似為近理但自漢以來皆云堯葬濟隂成陽未敢以後人之言爲信生祠漢書萬石君傳石慶爲齊相齊人爲立石相祠于定國傳父于公爲縣獄吏郡中爲之立生祠號曰于公祠漢紀欒布爲燕相有治迹民爲之立生祠此後世生祠之始後世無官不建生祠然有去任未幾而毁其像易其主者舊唐書狄仁傑爲魏州刺史人吏爲立生祠及去職其子暉爲魏州司功參軍貪暴為人所惡乃毁仁傑之祠則唐時已有之矣後漢書張翕爲越嶲太守有遺愛其子湍復爲太守蠻人懽喜奉迎道路曰即君儀貎類我府君後湍頗失其心有欲叛者諸蠻耆老相曉語曰當爲先府君故遂以得安然則魏人之因子而毁其父祠曽越嶲蠻人之不若邪生碑西京襍記平陵曹敞其師呉章爲王莽所殺人無敢収葬者弟子皆更名他師敞時爲司徒椽獨稱呉章弟子収葬其屍平陵人生爲立碑於呉章墓側此生立碑之始晉書南陽王模爲公師藩等所攻廣平太守丁邵率衆救模模感邵德勑國人爲邵生立碑唐彬爲使持節監幽州諸軍事百姓追慕彬功德生為立碑作頌史之所書居官而生立碑者有此二事唐武后聖厯二年制州縣長吏非奉有勑㫖毋得擅立碑劉禹錫髙陵令劉君遺愛碑序曰太和四年高陵人李仕清等六十三人具前令劉君之德詣縣請以金石刻縣令以狀申于府府以狀考于明法吏吏上言謹按寳應詔書凡以政績將立碑者具所紀之文上尚書考功有司考其詞宜有紀者乃奏明年八月庚午詔曰可舊唐書鄭瀚傳改考功員外即刺史有驅廹人吏上言政績請刋石紀德者瀚探得其情條責亷使巧跡遂露人服其敏識是唐時頌官長德政之碑必上考功奉㫖乃得立宋史言太祖建隆元年十月戊子詔諸道長貳有異政請立碑者委參軍驗實以聞今世立碑不必請㫖而􅂠衮之權操之自下不但溢美之文無以風勸而植於道旁亦無過而視之者不旋踵而與他人作鎮石矣册府元龜宋璟爲相奏言臣伏見韶州奏事云廣州與臣立遺愛頌璟嘗爲廣州都督夫碑所以頌德紀功臣在郡日課無所稱幸免罪戾一介俗吏何足書能濫承㤙施見在樞宻以臣光寵成彼謟䛕欲革此風望自臣始請勅廣府即停從之時鄭州百姓亦爲前刺史孟温禮樹碑因是亦命罷之張籍送裴相公赴鎮太原詩明年塞北平蕃落應建生祠請立碑以晉公之勲名而頌祝之辭止此當日碑祠之難得可知矣張公素前明一統志永平府名宦有唐張仲素德宗時以列將事盧龍軍節度使張允伸擢平州刺史允伸卒詔仲素代為節度使同平章事考之新舊唐書列𫝊則云張仲武為盧龍節度使破降回鶻又破奚北部及山奚威加北翟擢累檢校司徒同中書門下平章事卒一統志亦有張仲武列於仲素之後子直方多不法畏下變起奔京師軍中以張允伸總後務詔賜旌節在鎮二十三年比嵗豐登邉鄙無虞張公素以軍校事允伸擢平州刺史允伸卒子簡會為副大使公素以兵來會喪簡會出奔詔以公素為節度使性暴厲眸子多白燕人號白眼相公為李茂勲所襲奔京師貶復州司户參軍按盧龍節度使前後三人皆張姓曰仲武曰允伸曰公素今乃合二名而曰仲素及詳其歴官即公素也又其逐簡會在懿宗咸通十二年距徳宗時甚逺且又安取此簒奪暴戾之人而載之名宦乎今灤州乃祀之名宦祠吁皆當時修書者不學之過也又考唐時别有一張仲素字繪之元和中為翰林學士有詩名舊唐書楊於陵𫝊所謂屯田員外郎張仲素白居易燕子樓詩序所謂司勲員外郎張仲素繢之今本長􅂟集誤作績之即其人也然非盧龍節度使張濬傳祖仲素位至中書舍人王亘肇慶府志宋王亘淳熈中爲博羅令築隨龍蘓村二堤民頼其利後知南㤙一統志誤作王旦今博羅名宦稱宋丞相文正公前博羅令而不知文正未嘗爲此官宋史王旦傳起家以大理評事知平江縣淳熈又孝宗年號也葢士不讀書而祀典之荒唐也久矣日知錄卷二十二
