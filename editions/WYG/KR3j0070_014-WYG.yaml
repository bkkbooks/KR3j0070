body:
  text: 日知錄卷十四崑山顧炎武撰兄弟不相為後商之世兄終弟及故十六世而有二十八王如仲丁外壬河亶甲兄弟三王陽甲盤庚小辛小乙兄弟四王未知其廟制何如商書言七世之廟賀循謂殷世有二祖三宗若拘七室則當祭禰而已徐邈亦云若兄弟昭穆者設兄弟六人為君至其後世當祀不及祖禰唐書禮樂志自憲宗穆宗敬宗文宗四世附廟睿𤣥肅代以次遷至武宗崩德宗以次當遷而於世次為髙祖禮官始覺其非以謂兄弟不相為後不得為昭穆乃議復祔代宗而議者言已祧之主不得復入太廟禮官舊史亦但言禮儀使不載其名曰昔晉元明之世已遷豫章潁川豫章府君宣帝之曽祖潁川府君宣帝之祖惠帝崩遷豫章元帝即位江左升懷帝乂遷潁川位雖七室其實五世蓋從刁協以兄弟為世數故也後皆復祔元帝時已遷豫章潁川尋從溫嶠議復故明帝崩又遷潁川簡文帝立復故此故事也議者又言廟室有定數而無後之主當置别廟開元初奉中宗别廟升睿宗為第七室禮官曰晉武帝時景文同廟廟雖六代其實七主至元帝明帝廟皆十室故賀循曰廟以容主為限而無常數也於是復祔代宗而以敬宗文宗武宗同為一代何休解公羊傳文公二年躋僖公謂惠公與莊公當同南面西上隠桓與閔僖當同北面西上據大祫如此則廟中昭穆之序亦從之而不易矣鄞萬斯大本之立説謂廟制當一準王制之言太祖而下其為父死子繼之常也則一廟一主三昭三穆而不得少其為兄弟相繼之變也則同廟異室亦三昭三穆而不得多觀考工記匠人營國所載世室明堂皆五室則知同廟異室古人或已有通其變者正不可指為後人之臆見也記曰協諸義而協則禮雖先王未之有可以義起也然則賀循之論可為後王之式矣立叔父左傳昭十九年鄭駟偃卒生絲弱其父兄立子瑕子游叔父駟乞子産對晉人謂私族於謀而立長親是叔父繼其兄子唐宣宗之為皇太叔蓋昉於此矣繼兄子為君晉元帝大興三年正月乙卯詔曰吾雖上繼世祖然於懷愍皇帝皆北面稱臣今祠太廟不親執觴酌而令有司行事於情理不安乃行親獻可謂得春秋之意者矣太上皇秦始皇本紀追尊莊襄王為太上皇是死而追尊之號猶周曰太王也漢則以為生號而後代並因之矣曲禮已孤暴貴不為父作諡或舉武王為難鄭康成答趙商曰周道之基隆於二王功德繇之王迹興焉不可以一概論也若夏禹殷湯則不然矣據此則漢高帝於太上皇尊而不諡乃為得禮其追尊先媼為昭靈夫人當亦號而非諡也皇伯考魏孝莊帝追尊其父彭城武宣王為文穆皇帝廟號肅祖母李妃為文穆皇后將遷神主於太廟以髙祖為伯考臨淮王彧表諫曰漢祖創業香街有太上之廟光武中興南頓立舂陵之寢元帝之於光武疏為絶服猶身奉子道入繼大宗髙祖之於聖躬親實猶子陛下既纂洪緒豈宜加伯考之名且漢宣之繼孝昭斯乃上後叔祖豈忘宗承考妣蓋以大義所奪及金德將興宣王受寄自兹而降世秉盛權景文二王實傾曹氏故晉武繼文祖宣於景王有伯考之稱以今類古恐或非儔又臣子一例義彰舊典祫禘失序致譏前經髙祖德溢寰中道超無外肅祖雖勲格宇宙猶曽奉贄稱臣穆皇后禀德坤元復將配享乾位此乃君臣並筵嫂叔同室厯觀墳籍未有其事又表言爰自上古迄於下葉崇尚君親褒明功㦤乃有皇號終無帝名若去帝稱皇求之古義少有依準不納先朝嘉靖中追崇之典與此正同襲典午之稱名用孝莊之故事蓋并非張桂諸臣之初意矣除去祖宗廟諡漢惠帝從叔孫通之言郡國多置原廟元帝時貢禹以為不應古禮永光四年下丞相韋𤣥成等議以春秋之義父不祭於支庶之宅君不祭於臣僕之家王不祭於下土諸侯請勿復修奏可因罷昭靈后武哀王昭哀后衞思后戾太子戾后園皆不奉祠後魏明元貴嬪杜氏魏郡鄴人生世祖及即位追尊為穆皇后配享太廟又立后廟於鄴髙宗時相州刺史髙閭表修后廟詔曰婦人外成理無獨祀陰必配陽以成天地未聞有莘之國立太姒之饗此乃先皇所立一時之至感非經世之遠制便可罷祠是古人罷祖宗之廟而不以為嫌也王莽尊元帝廟號髙宗成帝號統宗平帝號元宗中興皆去之後漢和帝號穆宗安帝號恭宗順帝號敬宗桓帝號威宗桓帝尊母梁貴人曰恭懷皇后安帝尊祖母宋貴人曰敬隱皇后順帝尊母李氏曰恭愍皇后獻帝初平元年左中郞將蔡邕議孝和以下政事多釁權移臣下嗣帝殷勤各欲褒崇至親而已臣下懦弱莫能執正據禮和安順桓四帝不宜稱宗又恭懷敬隠恭愍三皇后並非正嫡不合稱后皆請除尊號制曰可唐髙宗太子𢎞追諡孝敬皇帝廟號義宗開元六年將作大匠韋湊上言準禮不合稱宗於是停義宗之號是古人除祖宗之號而不以為忌也後世浮文日盛有增無損德宗初立禮儀使吏部尚書顔真卿上言上元中政在宮壼始増祖宗之諡𤣥宗末姦臣竊命列聖之諡有加至十一字者按周之文武言文不稱武言武不稱文豈盛德所不優乎蓋稱其至者故也故諡多不為褒少不為貶今列聖諡號太廣有踰古制請自中宗以上皆從初諡睿宗曰聖真皇帝𤣥宗曰孝明皇帝肅宗曰宣皇帝以省文尚質正名敦本上命百官集議儒學之士皆從真卿議獨兵部侍郞袁傪官以兵進奏言陵廟玉册木主皆已刋勒不可輕改事遂寢不知陵中玉册所刻乃初諡也自此宗廟之廣諡號之繁沿至勝朝遂成故典而人臣不敢議矣稱宗之濫始於王莽之三宗稱祖之濫始於曹魏之三祖唐王彦威所謂叔世亂象不可以訓者也漢人追尊之禮太上皇高帝父也皇而不帝師古曰皇君也天子之父故號曰皇不預治國故不言帝也又引蔡邕曰不言帝非天子也戾太子悼皇考孝宣之祖若父也太子皇考而不帝舂陵節侯鬱林太守鉅鹿都尉南頓令光武之髙曽若祖父也侯而不帝太守都尉而不帝君而不帝此皆漢人近古而作俑者定陶共皇一議也諡法孝宣即位思戾悼之名不為隠諱亦無一人更言泉鳩里事此見漢人醇厚後代因之而恩怨相尋反復之報中於國家者多矣季孫問於榮駕鵞曰吾欲為君諡使子孫知之對曰生弗能事死又惡之以自信也將焉用之乃止然諡之曰昭亦但取其習於威儀爾諡法容儀恭美曰昭按周之昭王南征不復晉昭侯鄭昭公宋昭公蔡昭侯皆見弑於其臣是昭非饗國克終之諡也此外齊晉曹許皆有昭公亦無可稱而周之甘昭公以罪見殺至楚昭王燕昭王秦昭襄王漢孝昭帝始以為美諡而唐之昭宗亦見弑追尊子弟古人主但有追尊其父兄無尊其子弟者惟秦文公太子卒賜諡為竫公唐代宗追諡其弟故齊王倓為承天皇帝内禪左傳齊景公有疾立太子州蒲為君㑹諸侯伐鄭史記趙武靈王傳國於子惠文王自稱主父此内禪之始竹書紀年夏帝不降五十九年遜位于弟扄帝扄十年帝不降陟然不可考矣御容唐𤣥宗於别殿安置太宗髙宗睿宗御容每日侵早具服朝謁見册府元龜城門郞獨孤晏奏此明初奉先殿之所自立也宗廟之禮人臣不敢輕議然竊以為兩廟二主非嚴敬之義蓋唐書所謂王璵緣生事亡韋彤傳而未察乎神人之道者乎封國唐宋以下封國但取空名而不有其地明代亦然然名不可不慎趙府有江寧王代府有溧陽王遼府有句容王韓府有髙淳王而楊洪封昌平伯石亨李偉封武清伯張輗封文安伯曹義封豐潤伯施聚封懷柔伯金順羅秉忠封順義伯谷大亮封永清伯蔣輪封玉田伯此皆赤畿縣名而以為諸王臣下之封何也南齊書文惠太子子昭秀封臨海郡王通直常侍庾曇隆啟曰周定雒邑天子置畿内之民漢都咸陽三輔為社稷之衞中晉南遷事移威弛近郡名邦多有國食宋武創業依擬古典神州部内不復别封而孝武末年分樹寵子茍申私愛有乖訓準隆昌之元特開母弟之貴竊謂非古聖明御㝢禮舊為先畿内限斷宜遵昔制賜茅授土一出外州遂改封昭秀為巴陵王當時臨海郡屬揚州王畿故也豈有以神臯赤縣之名而加之支庶者乎宋時封國大小之名皆有準式而陸務觀謂曽子開封曲阜縣子謝任伯封夏陽縣伯曲阜今仙源縣夏陽今城父縣方疏封時已無此二縣以為司封之失職有明則草略殊甚即郡王封號而或以府或以州或以縣或以古縣或但取美名初無一定之例名之不正莫甚於今代乳母舊唐書哀帝天祐二年九月内出宣旨妳婆楊氏可賜號昭儀妳婆王氏可封郡夫人第二妳婆王氏先帝已封郡夫人今准楊氏例改封中書門下奏曰臣聞周制宫職夫人只列三人漢氏後宮之號十有四位元帝特置昭儀位視丞相爵比諸侯王至於列妾縱稱夫人亦無裂土割郡之號以胡組郭徵卿保養宣帝之功子孫但受厚賞而無封爵後漢順帝封阿母宋氏為山陽君則致漢陽地震安帝封乳母王聖為野王君亦致地震京師晋室中興乳母阿蘇有保元帝之功賜號保聖君初無爵邑但擇美名至髙齊陸令萱以乾阿妳授封郡君尋亂制度中宗神龍元年封乳母于氏為平恩郡夫人景龍四年封尚食髙氏為蓚國夫人封爵之失始自於此後睿宗下詔封𤣥宗乳母蔣氏為呉國夫人莫氏為燕國夫人厯載以來寖為訛弊伏以陛下重興寶運再闡丕圖奉髙祖太宗舊章行往代賢君故事今則宣授乳母為郡夫人竊意四海九州之内有功勞安社稷者得不對室家而慙於所命之爵乎臣等參詳妳婆楊氏王氏雖居濕推燥並彰保養之勤而胙土分茅且異疏封之例況昭儀内侍燕寢位列宫嬪夫人則亞列妃嬙供奉左右豈可以嬪御之號増榮於阿保揆之典禮良有乖違其楊氏望賜號安聖君王氏望賜號福聖君第二王氏望賜號康聖君從之參用册府元龜當國命贅旒權臣問鼎之日而執議若此有明自永樂中封乳母馮氏為保聖賢順夫人實錄永樂七年三月戊辰遣官祭乳母保聖賢順夫人馮氏列宗因之遂為成例而奉聖夫人客氏遂與魏忠賢表裏擅權甚於漢之王聖矣聖節舊唐書太宗貞觀二十年十二月癸未上謂司徒長孫無忌等曰今日是朕生日世俗皆為歡樂在朕翻成傷感今君臨天下富有四海而承歡膝下永不可得此子路所以有負米之恨也詩云哀哀父母生我劬勞奈何以劬勞之日更為宴樂乎因泣數行下左右皆悲其時無所謂聖節也𤣥宗開元十七年八月癸亥上以降誕日宴百寮於花蕚樓下百寮表請以每年八月五日為千秋節王公以下獻鏡及承露囊天下諸州咸令宴樂休假三日仍編為令從之十八年閏六月辛卯禮部奏請千歲節休假三日及村閭社㑹竝就千歲節先賽白帝報田祖然後坐飲散之八月丁亥上御花蕚樓以千秋節百官獻賀賜四品已上金鏡珠囊縑彩五品已上束帛有差上賦八韻詩又制秋景詩此節名酺宴之所起也杜甫詩自罷千秋節頻傷八月來謂此因新唐書禮樂志千秋節者𤣥宗以八月五日生以其日名節而君臣共為荒樂當時流俗多傳其事以為盛其後巨盜起䧟兩京自此天下用兵不息而離宮苑囿遂以埋堙獨其餘聲遺曲傳人間聞者為之悲凉感動蓋其事適足為戒而不足考法故不復著其詳肅宗上元二年九月甲申天成地平節史不書置節年月上於三殿置道塲以宫人為佛菩薩力士為金剛神王召大臣膜拜圍繞自後相沿以為故事命沙門道士講論於麟德殿德宗貞元十二年復命以儒士參之此齋醮之所起也册府元龜開元二十三年八月癸巳千秋節命諸學士及僧道講論三教同異則𤣥宗時先行之代宗永泰二年十月上降誕日諸道節度使獻金帛器用珍玩名馬計二十餘萬自是歲以為常後增至百餘萬此進獻之所起也穆宗元和十五年七月乙巳勅以今月六日是朕載誕之辰奉迎皇太后於宮中上壽其日百寮命婦宜於光順門進名參賀宰臣以古無降誕受賀之禮奏罷之韋綬傳綬以七月六日是穆宗載誕節請以是日百官詣光順門賀太后然後上皇帝壽從之宰臣奏古無生日稱賀之儀其事遂寢元稹長慶集有賀降誕日德音狀考册府元龜次年長慶元年七月庚子仍行此禮而史遺之也又云敬宗寶厯元年六月勅停此禮文宗太和七年十月壬辰上降誕日僧徒道士講論於麟德殿翼日御延英上謂宰臣曰降誕日設齋相承已久未可便革朕雖置齋㑹惟對王源中等暫入殿源中為翰林學士至僧道講論都不臨聽宰臣路隨等奏誕日齋㑹本非中國教法臣伏見開元十七年張説源乾曜請以誕日為千秋即内外宴樂以慶昌期頗為得禮上深然之宰臣因請以十月十日為慶成節從之開成二年九月甲申詔曰慶成節朕之生辰天下錫宴庶同歡泰不欲屠宰用表好生自今㑹宴蔬食任陳脯醢永為常例又勅慶成節宜令京兆尹准上巳重陽例於曲江會文武百寮其延英奉觴權停太和九年浚曲江作紫雲樓仍許公卿士大夫之家於江頭立亭館自是武宗為慶陽節宣宗為壽昌節懿宗為延慶節僖宗為應天節昭宗為嘉㑹節哀帝為乾和節並册府元龜然則此禮剏於𤣥文二宗成於張説源乾曜路隨三人之奏而後遂編於令甲傳之百代矣册府元龜載開元十七年尚書左丞相乾源曜右丞相張説率文武百官等上表曰臣聞聖人出則日月記其初王澤深則風俗傳其後故少昊著流虹之感商湯本𤣥鳥之命孟夏有佛生之供仲春修道祖之籙追始樂原其義一也伏惟開元神武皇帝陛下二氣合神九龍浴聖清明總於玉露爽朗冠於金天月惟仲秋日在端午常星不見之夜祥光照室之期羣臣相賀曰誕聖之辰也焉可不以為嘉節乎比夫曲水禊亭重陽射圃五日綵線七夕粉筵豈同年而語也臣等不勝大願請以八月五日為千秋節著之令甲布於天下咸令宴樂休假三日羣臣以是日獻甘露醇酎上萬歲壽酒王公戚里進金鏡綬帶士庶以絲結承露囊更相遺問村社將壽酒宴樂名為賽白帝報田神上明𤣥天光啟大聖下彰皇化􅂷裕無窮異域占風同見美俗帝手詔報曰凡是節日或以天氣推移或因人事表記八月五日當朕生辰感先聖之慶靈荷皇天之眷命卿等請為令節上獻嘉名勝地良游清秋髙興百穀方熟萬寶以成自我作古舉無越禮朝野同歡是為美事依卿來請宣付所司路隨奏不錄太祖實録洪武五年八月庚辰罷天下進賀聖節冬至表箋上曰正旦為歲之首天運維新人君法天出治臣下進表稱賀禮亦宜之生辰冬至於文繁矣昔唐太宗謂生辰是父母劬勞之日況朕皇考皇妣早逝每於是日不勝悲悼忍受天下賀乎宜皆罷之自是每聖節之日齋居素食不受朝賀十三年七月韓國公李善長等累表上請然後許之其年九月乙巳上御奉先殿受朝賀宴羣臣於謹身殿歲以為常然而不受獻不賦詩不賜酺不齋醮則聖諭所云勉從中制者也君喪世謂漢文帝之喪以日易月考之於史但行於吏民而未嘗槩之臣子也詔曰令到吏民三日釋服天子之喪當齊衰三月而今以三日故謂之以日易月也又曰殿中當臨者旦夕各十五舉音已下服大紅十五日小紅十四日纎七日釋服已下者下棺謂已葬也自始崩至於葬皆衰及葬已而大功而小功而纎以示變除之漸自始崩至於葬既無定日劉攽曰文帝制此喪服斷自已葬之後其未葬之前則服斬衰漢諸帝自崩至葬有百餘日者未葬則服不除矣後世遂以日易月又不通計葬之日皆大謬也而已葬之後變為輕服則又三十六日總而計之則又百餘日矣此所以制其臣子者未嘗以日易月也至於臣庶之喪不為制禮而聽其自行或厚或薄魏其武安傳言欲以禮為服制以興太平是知漢初未立服制然三年之喪其能行者鮮矣孟子滕文公定為三年之喪父兄百官皆不欲曰吾宗國魯先君莫之行吾先君亦莫之行也是喪紀之廢已久史書所記公孫𢎞後母卒服喪三年史記本傳哀帝時河間王良喪太后三年為宗室儀表益封萬戸漢書本紀原渉父死行喪冢廬三年繇是顯名京師游俠傳銚期父卒服喪三年韋彪父母卒哀毁三年不出廬寢服竟羸􅇤骨立並後漢書本傳鮑昻處喪毁􅇤三年服闋遂潛於墓次鮑永傳薛包為父及後母行六年服喪過乎哀劉趙淳于傳此從其厚者矣翟方進後母終既葬三十六日除服起視事以為身備漢相不敢踰國家之制漢書本傳此從其薄者矣東海王臻及弟蒸鄉侯儉母卒皆吐血毁眥至服練紅追念初喪父幼小哀禮有闕因復重行喪制後漢書本傳袁紹生而父死弱冠除濮陽長遭母喪服竟又追行父服凡在冢廬六年三國志注引英雄記後漢書同此失之前而追行於後者矣薛宣為丞相弟修為臨菑令後母病死修去官持服宣謂修三年服少能行之者兄弟相駁不可修遂竟服此一門之内而厚薄各從其意者矣漢書本傳然而哀帝綏和二年詔博士弟子父母死予寧三年師古曰寜謂處家持喪服漢書本紀而應劭言漢律不為親行三年服不得選舉揚雄傳註是其所以訓之臣庶者未嘗不以三年為制也若夫君喪之禮自戰國以來固已久廢文帝乃特著之為令以干百姓之譽而反以蒙後代無窮之譏平帝時王莽令吏六百石以上皆服喪三年至唐𤣥宗肅宗之喪遂改為初崩之後二十七日唐書崔祐甫傳載常袞之議云禮為君斬衰三年漢文帝權制三十六日我太宗文皇帝崩遺詔亦三十六日羣臣不忍既葬而除略盡四月髙宗崩如漢故事武太后崩亦然及𤣥宗肅宗崩始變天子喪為二十七日蓋變而逾短而亦不無追咎夫漢文之作俑矣晉書羊祜傳文帝崩祜謂傅𤣥曰三年之喪雖貴遂服自天子達漢文除之今主上天縱至孝雖奪服實行喪禮若因此革漢魏之薄而興先王之法不亦善乎𤣥曰漢文以末世淺薄不能行國君之喪故因而除之除之數百年一旦復古難行也祜曰不能使天下如禮且使人主遂服不猶善乎𤣥曰此為有父子而無君臣三綱之道虧矣祜乃止傅𤣥之言所謂禦人以口給者也不能緣人主之孝思善推其所為以立一王之制而徒以徇流俗之失未幾而賈后殺姑劉石更帝豈非詒謀之不裕哉後秦姚興母虵氏卒興哀毁過禮不親庶政羣臣請依漢魏故事既葬即吉尚書郞李嵩上疏言既葬之後應素服臨朝率先天下仁孝之舉也興從之若傅𤣥羊祜之見其不及姚興之臣遠矣宋神宗崩范祖禹上疏論喪服之制曰先王制禮君服同於父斬衰三年蓋恐為人臣者不以父事其君自漢以來不惟人臣無服人君遂不為三年之喪國朝自祖宗以來外廷雖用易月之制宫中實行三年服君服如古典而臣下猶依漢制故十二日而小祥期而又小祥二十四日而大祥再期而又大祥按此唐制非漢制范誤既以日為之又以月為之此禮之無據者也古者再期而大祥中月而禫禫祭之名非服之色今乃為之慘服三日然後禫此禮之不經者也服既除至葬又服之祔廟後即吉纔八月而遽純吉無所不佩此又禮之無漸者也朔望羣臣朝服以造殯宫是以吉服臨喪人主衰服在上是以先帝之服為人主之私喪此二者皆禮之所不安也寧宗小祥詔羣臣服純吉真德秀爭之曰自漢文帝率情變古惟我孝宗衰服三年朝衣朝冠皆以大布惜當時不并定臣下執喪之禮此千載無窮之憾孝宗崩從臣羅㸃等議令羣臣易月之後未釋衰服惟㑹朝治事權用黒帶公服時序仍臨慰至大祥始除侂胄枋政始以小祥從吉且帶不以金鞓不以紅佩不以魚鞍轎不以文繡此於羣臣何損朝儀何傷議遂止然迄未有能酌三代聖王之遺意而立為中制者楊用修曰舜典二十有八載帝乃殂落百姓如喪考妣三年百姓有爵命者也為君斬衰三年禮也四海遏密八音禮不下庶人且有農畝服賈力役之事豈能皆服斬衰但遏密八音而已此當時君喪禮制朱子作君臣服議曰古之所謂方喪三年者蓋曰比方於父母之喪云爾蓋事親者親死而致喪三年情之至義之盡也事師者師死而心喪三年謂其哀如父母而無服情之至而義有所不得盡者也事君者君死而方喪三年謂其服如父母而分有親疎此義之至而情或有不至於其盡者也當參度人情斟酌古今之宜分别貴賤親疏之等以為降殺之節且以嫁娶一事言之則宜自一月之外許軍民三月之外許士吏復土之後許選人祔廟之後許承議郞以下小祥之後許朝請大夫以下大祥之後許中大夫以下各借吉三日其大中大夫以上則並湏禫祭然後行吉禮焉官卑而差遣職事髙者從髙遷官者從新貶官者從舊如此則亦不悖於古無害於今庶乎其可行矣太倉陸道威世儀嘗剏為君喪五服之圖其略為嗣君及勲戚大臣斬衰三年文武臣一品以下斬衰期年四品以下斬衰九月七品以下斬衰五月士庶人斬衰三月庶君臣之情不至邈焉相絶而服有降殺亦不至捍格難行蓋本朱子之意而實出於魏孝文所云羣臣各以親疎貴賤遠近為除服之差庶幾稍近於古易行於今之説然三代之制亦未嘗不然所謂為君斬衰三年者諸侯為天子卿大夫為其國君家臣為其主若庶人之為其國君但齊衰三月白虎通曰王者崩京師之民喪三月何民賤故三月而已又曰王者崩臣下服之有先後何恩有深淺遠近故制有日月服問曰君為天子三年夫人如外宗之為君也世子不為天子服註曰不服與畿外之民同而諸侯之大夫以時接見乎天子則繐衰裳牡麻絰既葬除之雜記曰大夫次於公館以終喪士練而歸大夫居廬士居堊室此言國君之喪正義以為位尊恩重位卑恩輕之等檀弓曰公之喪諸達官之長杖是其所以别親疏明貴賤者則固有不同矣今自天子之外别無所謂國君而等威之辨則未嘗有異於古茍稱情而制服使三代之禮復見於今日而人知尊君親上之義亦厚俗之一端也朱子曰百官如喪考妣此其本分四海遏密八音以禮論之則為過也為天子服三年之喪則是畿内諸侯之國則不然禮為君為父但服斬衰君謂天子諸侯及大夫之有地者大夫之邑以大夫為君大夫以諸侯為君諸侯以天子為君各為其君服斬衰諸侯之大夫却為天子服齊衰三月禮無二斬故也民則畿内者為天子齊衰三月畿外無服公之喪諸達官之長杖達官謂通於君得奏事者各以其長其長杖其下者不杖可知問後世不封建諸侯天下一統百姓當為天子何服曰三月天下服地雖有遠近聞喪有先後然亦不過三月喪禮主人不得升堂濟陽張爾岐言今人受弔之位主人伏哭於柩東賔入門北面而弔拜畢主人下堂北面拜賔相習以為定位鮮有知其非者不知方伏哭柩東時婦女當在何所乎女賔至主人避之否乎主人避而賔又至又將何所伏而待乎既失男女内外之位又妨主賔拜謝之節考之士喪禮主人入坐於牀東衆主人在其後西面婦人俠牀東面此未斂以前主人室中之哭位也其拜賔則升降自西階即位於西階東南面拜之固已不待賔於堂上矣及其既斂而殯也居門外倚廬惟朝夕哭乃入門而奠其入門也主人堂下直東序西面北上外兄弟在其南南上賔繼之北上門東北面西上門西北面東上西方東面北上主人固不復在堂上矣所以然者其時即位於堂南上者惟婦人故主人不得升堂也今主人柩東拜伏之位正古人主婦之位也若依周公孔子之故未斂以前則以柩東為位既斂而殯則堂下直東序西面是其位也主人正位於此則内外之辨賔主之儀無適而不當矣南史孔秀之遺令曰世俗以僕妾直靈助哭當繇喪主不能淳至欲以多聲相亂魂而有靈吾當笑之居喪不弔人禮父母之喪不弔人情有所專而不及乎他也孔子曰三年之喪練不羣立不旅行君子禮以飾情三年之喪而弔哭不亦虛乎穀梁子曰周人有喪魯人有喪周人弔魯人不弔天子之喪猶可以不弔而況朋友故人之喪乎孔氏曰若有服者則往哭或疑末世政重事繁有喪之人不能不出獨廢此禮有所難行是亦必待既葬卒哭之後或庶乎其可耳像設古之於喪也有重於祔也有主以依神於祭也有尸以象神而無所謂像也左傳言嘗於太公之廟麻嬰為尸孟子亦曰弟為尸而春秋以後不聞有尸之事宋玉招魂始有像設君室之文尸禮廢而像事興蓋在戰國之時矣漢文翁成都石室設孔子坐像其坐斂蹠向後屈膝當前七十二弟子侍於兩旁朱子白鹿洞書院只作禮殿依開元禮臨祭設席不立像正統三年巡按湖廣監察御史陳祚奏南嶽衡山神廟嵗久頽壞塑像剥落請重修立依祭祀山川制度内築壇壝外立廚庫繚以周垣附以齋室而去其廟宇塑像則禮制合經神祗不瀆事下禮部尚書胡濙以為國初更定神號不除像設必有明見難以准行今按鳳陽縣志言洪武三年詔天下城隍止立神主稱某府某州某縣城隍之神前時爵號一皆革去未幾又令城隍神有泥塑像在正中者以水浸之泥在正中壁上却畵雲山圖像在兩廊者泥在兩廊壁上千載之陋習為之一變後人多未之知嘉靖九年詔革先師孔子封爵塑像有司依違多於殿内添砌一牆置像於中以塞明詔甚矣愚俗之難曉也宋文恪訥國子監碑言夫子而下像不土繪祀以神主數百年陋習乃革是則太祖已先定此制獨未通行天下爾從祀周程張朱五子之從祀定於理宗淳祐元年顔曽思孟四子之配享定於度宗咸淳三年自此之後國無異論士無異習厯元至明先王之統亡而先王之道存理宗之功大矣宋史賛言身當季運弗獲大效後世有以理學復古帝王之治者考論匡直輔翼之功實自帝始十哲孟子言他日子夏子張子游以有若似聖人欲以所事孔子事之彊曽子曽子曰不可江漢以濯之秋陽以暴之皜皜乎不可尚已慈谿黃氏震曰門人以有若言行氣象類孔子而欲以事孔子之禮事之有若之所學何如也曽子以孔子自生民以來未之有非有若之所可繼而止之而非貶有若也有若雖不足以比孔子而孔門之所推尚一時無及有若可知咸淳三年升從祀以補十哲衆議必有若也祭酒為書力詆有若不當升而升子張宋史禮志度宗咸淳三年正月戊申封顓孫師陳國公升十哲位不知論語一書孔子未嘗深許子張按理宗作顓孫子贊其末語云色取行違作戒後人似亦不足之辭據孟子此章則子張正欲事有若者也陸象山天資髙明指心頓悟不欲人從事學問故嘗斥有子孝弟之説為支離奈何習其説者不察而剏攻之於千載之下耶當時之論如此愚按論語首篇即錄有子之言者三而與曽子並稱曰子門人實欲以二子接孔子之傳者傳記言孔子之卒哀公誄之有若之喪悼公弔焉其為魯人所重又可知矣十哲之祀允宜釐正孟子不曰有若似孔子而曰有若似聖人史記乃云有若狀似孔子謬甚嘉靖更定從祀古人每事必祭其始之人耕之祭先農也桑之祭先蠶也學之祭先師也一也舊唐書太宗貞觀二十一年二月壬申詔以左丘明卜子夏公羊髙穀梁赤伏勝髙堂生戴聖毛萇孔安國劉向鄭衆杜子春馬融盧植鄭𤣥服䖍賈逵何休王肅王弼杜預范甯等二十二人太宗紀無賈逵止二十一人今依禮儀志増又按唐六典祠部名有賈逵然貞觀時未祀七十二弟子則為二十二人開元八年勅七十二子並許從祀則卜子夏已在其中而先儒止二十一人六典國子祭酒司業條云七十二弟子及先儒二十二賢則亦誤也代用其書􅂷於國冑自今有事於太學並令配享宣尼廟堂蓋所以報其傳註之功迄乎宋之仁英未有改易可謂得古人敬學尊師之意者矣神宗元豐七年始進荀况楊雄韓愈三人此三人之書雖有合於聖人而無傳註之功不當祀也祀之者為王安石配享王雱從祀地也宋史禮志神宗熈寧七年從晉州州學教授陸長愈言以孟子同顔子配享殿上封荀况蘭陵伯楊雄成都伯韓愈昌黎伯並從祀於左丘明等二十二賢之間徽宗政和三年封王安石舒王同顔子孟子配享殿上安石子雱臨川伯從祀諸賢之末此封三人為増入從祀之始而不及董仲舒至元文宗至順元年方進仲舒從祀理宗寶慶三年進朱熹淳祐元年進周頤避光廟諱去惇字張載程顥程頤景定二年進張栻呂祖謙度宗咸淳三年進邵雍司馬光以今論之惟程子之易傳朱子之四書章句集註易本義詩傳及蔡氏之尚書集傳胡氏之春秋傳陳氏之禮記集説是所謂代用其書􅂷於國胄者爾成化三年五月乙卯太常寺少卿兼翰林院侍讀學士劉定之請以元儒陳澔以胡安國蔡沈例從祀勅下江西考其行事以聞南軒之論語解東萊之讀書記抑又次之而太極圖通書西銘正蒙亦羽翼六經之作也至有明嘉靖九年欲以制禮之功蓋其豐昵之失而逞私妄議輙為出入殊乖古人之旨去戴聖劉向馬融賈逵何休王肅王弼杜預又改鄭衆盧植鄭𤣥服䖍范甯祀於其鄉二十二人之中惟存九人成化初劉定之議以為左丘明以下經師二十二人雖其中不無可議然當世衰道微火於秦黃老於漢佛於魏晉之時而此二十二人者守其遺經轉相付授講説注釋各竭其才以待後之學者則其為功殆亦猶文武成康之子孫雖衰替微弱無所振作尚能保守姬姓之宗祀譜牒以閲厯春秋戰國不亡而幸存者也雖有大過亦當宥之況小失乎也又曰愚竊以為仲尼素王也七十子助其創業者二十二經師助其垂統者也夫以一事之瑕而廢傳經之祀則宰我之短喪冉有之聚歛亦不當列於十哲乎棄漢儒保殘守缺之功而奬末流論性談天之學於是語録之書日増月益而五經之義委之榛蕪自明人之議從祀始也有王者作其必遵貞觀之制乎嘉靖之從祀進歐陽修者為大禮也出於在上之私意也進陸九淵者為王守仁也出於在下之私意也與宋人之進荀楊韓三子而安石封舒王配享同一道也成化四年彭時奏謂漢晉之時道統無傳所幸有專門之師講誦聖經以詔學者斯文頼以不墜此馬融范甯諸人雖學行未純亦不得而廢祭禮陸道威著思辨録欲於祭禮之中而寓立宗之意謂古人最重宗子然宗子欲統一族衆無如祭法文公家禮所載祭禮雖詳整有法顧惟宗子而有官爵及富厚者方得行之不能通諸貧士又一歲四合族衆繁重難舉無差等隆殺之别愚意欲倣古族食世降一等之意定為宗祭法歲始則祭始祖凡五服之外皆與大宗主之仲春則祭四代以髙祖為主曽祖以下分昭穆居左右合同髙祖之衆繼髙之宗主之仲夏則祭三代以曽祖為主祖考則分昭穆居左右合同曽祖之衆繼曽之宗主之仲秋則祭二代以祖為主考妣居左昭位合同祖之衆繼祖之宗主之仲冬則祭一代以考為主合同父昆弟繼禰之宗主之皆宗子主祭而其餘子則獻物以助祭不惟愛敬各盡而祖考髙曽隆殺有等一從再從遠近有别似於古禮初無所倍或曰髙曽祖考祭則俱祭古人具有成法不當隨時加損答之曰凡禮皆以義起耳禮有云上殺旁殺下殺中庸言親親之殺是古人於禮凡事皆有等殺況喪禮服制父母皆服三年而髙祖則齊衰三月此今律文是喪禮已有等殺何獨於祭禮不可行乎此雖剏舉恐不無補於風教也女巫周禮女巫舞雩但用之旱暵之時使女巫舞旱祭者崇陰也禮記檀弓歲旱穆公召縣子而問曰吾欲暴巫而奚若曰天則不雨而望之愚婦人無乃已疏乎此用女巫之證也漢因秦滅學祠祀用女巫後魏郊天之禮女巫升壇揺鼔帝拜后肅拜杜岐公曰道武帝南平姑臧東下山東足為雄武之主其時用事大臣崔浩李順李孝伯等多是謀猷之士少有通儒碩學所以郊祀上帝六宮及女巫預焉魏書髙祖紀延興二年二月乙巳詔曰尼父稟達聖之姿體生知之量窮理盡性道光四海頃者淮徐未賔廟隔非所致令祀典寝頓禮章殄滅遂使女巫妖覡淫進非禮殺牲歌舞倡優媟狎豈所以尊明神敬聖道者也自今以後有祭孔子廟制用酒脯而已不聽婦女合雜以祈非望之福犯者以違制論大金國志世宗大定二十六年二月詔曰曩者邊塲多事南方未賔致令孔廟頽落禮典凌遲女巫雜覡淫祀違禮自今有祭孔廟制用酒脯而已犯者以違制論唐書黎幹傳代宗時為京兆尹時大旱幹造土龍自與巫覡對舞彌月不應又禱孔子廟帝笑曰丘之禱久矣使毁土龍日知錄卷十四
