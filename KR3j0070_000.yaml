body:
  text: 日知録目録雜家類二雜考之屬卷一三易重卦不始文王朱子周易本義卦爻外無别象卦變互體六爻言位九二君德師出以律既雨既處武人為于大君自邑告命成有渝旡咎童觀不逺復不耕穫不災畬天在山中罔孚裕旡咎有孚于小人損其疾使遄有喜上九弗損益之利用為依遷國姤包旡魚以杞包瓜巳日改命吉艮艮其限鴻漸于陸君子以永終知敝鳥焚其巢巽在牀下翰音登于天山下有雷小過妣東鄰遊魂為變通乎晝夜之道而知繼之者善也成之者性也形而下者謂之器垂衣裳而天下治過此以往未之或知也困德之辨也凡易之情易逆數也説卦雜卦互文兌為口舌序卦雜卦晉晝也明夷誅也孔子論易七八九六卜筮卷二帝王名號九族舜典惠迪吉從逆凶懋遷有無化居三江錫土姓厥弟五人惟彼陶唐有此冀方胤征惟元祀十有二月西伯戡黎少師殷紂之所以亡武王伐紂泰誓百姓有過在子一人王朝步自周大王王季彞倫龜從筮逆周公居東微子之命酒誥召誥元子其稽我古人之德節性汝其敬識百辟享惟爾王家我適王來自奄建官惟百司空顧命矯虔罔中于信以覆詛盟文侯之命秦誓古文尚書書序豐熙偽尚書卷三詩有入樂不入樂之分四詩孔子刪詩何彼穠矣弼鄘衛黎許二國諸姑伯姊王事朝隮于西王日之夕矣大車鄭楚吳諸國無詩豳言私其豵承筐是將罄無不宜民之質矣日用飲食小人所腓變雅大原莠言自口皇父握粟出卜私人之子百僚是試不醉反恥上天之載王欲玉汝夸毗流言以對申伯德輶如毛韓城如山之苞如川之流不弔不祥駉實始翦商玄鳥敷奏其勇魯頌商頌詩序卷四魯之春秋春秋闕疑之書三正閏月王正月春秋時月並書謂一為元改月天王邾儀父仲子成風敬嬴君氏卒滕子薛伯杞伯闕文夫人孫于齊公及齊人狩于禚楚吳書君書大夫亡國書葬許男新臣卒禘于太廟用致夫人及其大夫荀息邢人狄人伐衛王入于王城不書星孛子卒納公孫寧儀行父于陳三國來媵殺或不稱大夫邾子來會公葬用柔日諸侯在喪稱子未踰年書爵姒氏卒卿不書族大夫稱子有諡則不稱字人君稱大夫字王二于虢星隕如雨築郿城小穀齊人殺哀薑微子啓襄仲如齊納幣子叔姬卒齊昭公趙盾弒其君臨于周廟欒懷子子太叔之廟城成周五伯占法之多以日同為占天道逺一事兩占春秋言天之學左氏不必盡信列國官名地名昌􅩃文字不同所見異辭紀履緰來逆女母弟稱弟子沈子穀伯鄧侯書名鄭忽書名祭公來遂逆王后于紀爭門仲嬰齊卒隱十年無正戎菽隕石于宋五王子虎卒穀梁日誤作曰卷五閽人寺人正月之吉木鐸稽其功緒六牲邦饗耆老孤子醫師造言之刑國子死政之老凶禮不入兆域樂章斗與辰合凶聲八音用火涖戮于社邦朋王公六職之一奠摯見于君主人辭無不腆無辱某子受酬辨須臾飱不致三年之喪繼母如母為所後者之祖父母妻妻之父母昆弟昆弟之子若子女子子在室為父慈母如母出妻之子為母父卒繼母嫁有適子者無適孫為人後者為其父母繼父同居者宗子之母在則不為宗子之妻服也君之母妻齊衰三月不言曾祖巳上兄弟之妻無服先君餘尊之所厭貴臣貴妾外親之服皆緦唐人增改服制報於所為後之兄弟之子若子庶子為後者為其外祖父母從母舅無服考降噫歆卷六母不敬女子子取妻不取同姓父不祭子夫不祭妻檀弓大公五世反葬于周扶君二夫人相為服同母異父之昆弟子卯不樂君有饋焉曰獻邾婁考公因國文王世子武王帥而行之用日干支社日用甲不齒之服為父母妻長子禫為殤後者以其服服之庶子不以杖即位婦人不為主而杖者庶姓别於上愛百姓故刑罰中庶民安故財用足術有序師也者所以學為君肅肅敬也以其綏復親喪外除兄弟之喪內除十五日而禫妻之黨雖親弗主吉祭而復寢如欲色然先古博愛以養父母日嚴致知顧諟天之明命桀紂帥天下以暴財者末也未有上好仁而下不好義者也君子而時中子路問強鬼神期之喪達乎大夫三年之喪達乎天子達孝思事親不可以不知人誠者天之道也肫肫其仁卷七孝弟為仁之本察其所安子張問十世媚奧武未盡善朝聞道夕死可矣忠恕夫子之言性與天道變齊變魯博學於文三以天下讓有婦人焉季路問事鬼神不踐迹異乎三子者之撰去兵去食奡蕩舟管仲不死子紏豫一以貫之君子疾沒世而名不稱焉性相近也虞仲聽其言也厲有始有卒者其惟聖人乎梁惠王未有義而後其君者也不動心市朝必有事焉而勿正心文王以百里廛無夫里之布孟子自齊葬於魯其實皆什一也莊嶽古者不為臣不見公行子有子之喪為不順於父母象封有庳周室班爵祿費惠公行吾敬故謂之內也以紂為兄之子才求其放心所去三自視欿然士何事飯糗茹草孟子外篇孟子引論語孟子字樣孟子弟子荼鴚九經考次經文卷八州縣賦稅屬縣州縣品秩府鄉亭之職里甲掾屬都令史吏胥法制省官選補停年格銓選之害員缺卷九人材保舉關防封駮部刺史六條之外不察隋以後刺史知縣知州知府守令刺史守相得召見漢令長京官必用守令宗室藩鎮輔郡邊縣宦官禁自宮卷十治地斗斛丈尺地畝大小州縣界域後魏田制開墾荒地蘇松二府田賦之重豫借紡織之利馬政驛傳漕程行鹽卷十一權量大斗大兩漢祿言石以錢代銖十分為錢黃金銀以錢為賦五銖錢開元錢錢法之變銅錢面短陌鈔偽銀卷十二財用言利之臣俸祿助餉館舍街道官樹橋梁人聚訪惡盜賊課禁兵器水利雨澤河渠卷十三周末風俗秦紀會稽山刻石兩漢風俗正始宋世風俗清議名教廉恥流品重厚耿介鄉原儉約大臣除貪貴廉禁錮姦臣子孫家事奴僕閽人田宅三反召殺南北風化之失南北學者之病范文正公辛幼安士大夫晚年之學士大夫家容僧尼貧者事人分居父子異部生日陳思王植降臣本朝書前代官卷十四兄弟不相為後立叔父繼兄子為君太上皇皇伯考除去祖宗廟諡漢人追尊之禮諡法追尊子弟內禪御容封國乳母聖節君喪喪禮主人不得升堂居喪不弔人像設從祀十哲嘉靖更定從祀祭禮女巫卷十五陵墓祭厚葬前代陵墓停喪假葬改殯火葬期功喪去官緦喪不得赴舉喪娶衫帽入見奔喪守制丁憂交代武官丁憂居喪宴飲匿喪國恤宴飲宋朝家法卷十六明經秀才舉人進士科目制科甲科十八房經義論策三場擬題題切時事試文格式程文判經文字體史學卷十七生員額數中式額數通場下第御筆黜落殿舉進士得人大臣子弟北卷糊名搜索座主門生舉主制服同年先輩出身授官恩科年齒教官武學雜流通經為吏卷十八祕書國史十三經注疏監本二十一史張參五經文字别字三朝要典密疏貼黃記注四書五經大全書傳會選內典心學舉業破題用莊子科場禁約朱子晚年定論竊書勘書改書易林卷十九文須有益於天下文不貴多著書之難直言立言不為一時文人之多巧言文辭欺人修辭文人摹倣之病文章繁簡文人求古之病古人集中無冗復書不當兩序古人不為人立傳志狀不可妄作作文潤筆文非其人假設之辭古文未正之隱卷二十非三公不得稱公古人不以甲子名嵗史家追紀月日之法史家月日不必順序重書日古人必以月日繫年古無一日分為十二時年月朔甲子年號當從實書史書一年兩號年號古今相同割併年號孫氏西齋録通鑑書改元後元年李茂貞用天祐年號通鑑書葬通鑑書閏月史書人君未即位史書一人先後厯官史書郡縣同名郡國改名史書人同姓名述古引古必用元文引書用意文章推服古人史書下兩曰字書家凡例分題卷二十一作詩之旨詩不必人人皆作詩題古人用韻無過十字詩有無韻之句五經中多有用韻易韻古詩用韻之法古人不忌重韻七言之始一言古人未有之格古人不用長句成篇詩用疊字次韻柏梁臺詩詩體代降書法詩格詩人改古事庾子山賦誤于仲文詩誤李太白詩誤郭璞賦誤陸機文誤字古文説文説文長箋五經古文急就篇千字文草書金石録鑄印作減筆字畫古器卷二十二四海九州六國獨燕無後郡縣秦始皇未滅二國漢王子侯漢侯國都鄉里都鄉都鄉侯封君圖亭亭侯社厯代帝王陵寢堯冢靈臺生祠生碑張公素王亘卷二十三姓氏族氏族相傳之訛孔顔孟三氏仲氏以國為氏姓氏書通譜二字姓改一字北方門族冒姓兩姓古人二名止用一字古人諡止稱一字稱人或字或爵子孫稱祖父字已祧不諱皇太子名不諱二名不偏諱嫌名以諱改年號前代諱名父名君名祖弟子名師同輩稱名以字為諱自稱字人主呼人臣字兩名假名甲乙以姓取名以父名子以夫名妻兼舉名字排行二人同名字同其名變姓名生而曰諱生稱諡稱王公為君卷二十四祖孫髙祖藝祖沖帝考伯父叔父族兄弟親戚哥妻子稱某互辭豫名重言后王君主陛下足下閣下相將軍相公司業翰林洗馬比部員外主事主簿郎中待詔外郎門子快手火長樓羅白衣郎門生府君官人對人稱臣先卿先妾稱臣下為父母人臣稱人君上下通稱人臣稱萬嵗卷二十五重黎巫咸河伯湘君共和介子推杞梁妻池魚莊安李廣射石大小山丁外人毛延夀名以同事而晦名以同事而章人以相類而誤傳記不考世代卷二十六史記通鑑兵事史記于序事中寓論斷史記漢書漢書二志小字漢書不如史記荀悅漢紀後漢書三國志作史不立表志史文重出史文衍字史家誤承舊文晉書宋書魏書梁書後周書隋書北史一事兩見宋齊梁書南史一事互異舊唐書新唐書宋史阿魯圖進宋史表遼史金史元史通鑑通鑑不載文人卷二十七漢人注經注疏中引書之誤姓氏之誤左傳注考工記注爾雅注國語注楚辭注荀子注淮南子注史記注漢書注後漢書注文選注陶淵明詩注李太白詩注杜子美詩注韓文公詩注通鑑注卷二十八拜稽首稽首頓首百拜九頓首三拜東向坐坐土炕冠服􅙳衣對襟衣行幐襪樂府寺省職官受杖押字邸報酒禁賭博京債居官負債卷二十九騎馹驢騾軍行遲速木罌渡軍海師海運燒荒家兵少林僧兵毛葫蘆兵方音國語外國風俗徙戎樓煩吐蕃回紇西域天文三韓大秦干陀利卷三十天文日食月食嵗星五星聚海中五星二十八宿星名人事感天黃河清妖人闌入宮禁詐稱太子外國應天象星事多凶圖讖孔子閉房記百刻雨水五行建除艮巽坤乾太一正五九月古今神祠佛寺泰山治鬼蕃俗信鬼卷三十一河東山西陜西山東河內吳會江西廣東廣西四川史記災川國薛縣之誤曾子南武城人漢書二燕王傳徐樂傳水經注大梁靈丘之誤三輔皇圖大明一統志交址薊夏謙澤石門無終栁城昌黎石城木刀溝江乘郭璞墓蟂磯胥門潮信晉國綿上箕唐晉都瑕九原昔陽太原代闕里杏壇徐州向小穀泰山立石泰山都尉濟南都尉鄒平臺二縣夾谷濰水勞山楚丘東昏長城卷三十二而奈何語急嵗月半巳里仞不淑不弔亡乾沒辱姦訛誰何信出鰥寡丁中阿么元寫行李耗量移罘罳場屋豆陘豸關宙石炭終葵魁桑梓草馬草驢女貓雌雄牝牡臣等謹案日知録三十二卷國朝顧炎武撰前有自記稱自少讀書有所得輒記之其有不合時復改定或古人先我而有者則遂削之積三十餘年乃成一編其書前七卷皆論經義八卷至十二卷皆論政事十三卷論世風十四卷十五卷論禮制十六卷十七卷皆論科舉十八卷至二十一卷皆論藝文二十二卷至二十四卷雜論名義二十五卷論古事真妄二十六卷論史法二十七卷論注書二十八卷論雜事二十九卷論兵及外國事三十卷論天象術數三十一卷論地里三十二卷為雜考證炎武學有本原博贍而能通貫每一事必詳其始末參其證佐而後筆之書故引據浩繁而抵牾者少非如楊慎焦竑諸人偶然涉獵得一義之異同知其一而不知其二惟其生於明末喜談經世之務激於時事慨然以復古為志故其説或迂而難行或愎而過鋭所作音學五書後序至謂聖人復起必舉今日之音而還之淳古則其他可知矣其門人潘耒作是書序盛稱其經濟而以考據精詳為末務非篤論也乾隆四十二年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀日知録自記愚自少讀書有所得輒記之其有不合時復改定或古人先我而有者則遂削之積三十餘年乃成一編取子夏之言名曰日知録以正後之君子東吳顧炎武日知録原序有通儒之學有俗儒之學學者將以明體適用也綜貫百家上下千載詳考其得失之故而斷之於心筆之於書朝章國典民風土俗元元本本無不洞悉其術足以匡時其言足以救世是謂通儒之學若夫雕琢辭章綴輯故實或髙談而不根或勦説而無當淺深不同同為俗學而已矣自宋迄元人尚實學若鄭漁仲王伯厚魏鶴山馬貴與之流著述具在皆博極古今通達治體曷嘗有空疏無本之學哉明代人才輩出而學問逺不如古自其少時鼓篋讀書規模次第己大失古人之意名成年長雖欲學而無及間有豪雋之士不安於固陋而思嶄焉自見者又或採其華而棄其實識其小而遺其大若唐荆川楊用修王弇州鄭端簡號稱博通者可屈指數然其去古人有間矣崑山顧寧人先生生長世族少負絶異之資潛心古學九經諸史略能背誦尤留心當世之故實録奏報手自抄節經世要務一一講求當明末年奮欲有所自樹而迄不得試窮約以老然憂天閔人之志未嘗少衰事關民生國命者必窮源溯本討論其所以然足迹半天下所至交其賢豪長者考其山川風俗疾苦利病如指諸掌精力絶人無他嗜好自少至老未嘗一日廢書出必載書數簏自隨旅店少休披尋搜討曾無倦色有一疑義反覆參考必歸於至當有一獨見援古證今必暢其説而後止當代文人才士甚多然語學問必斂衽推顧先生凡制度典禮有不能明者必質諸先生墜文軼事有不知者必徵諸先生先生手畫口誦探源竟委人人各得其意去天下無賢不肖皆知先生為通儒也先生著書不一種此日知録則其稽古有得隨時劄記久而類次成書者凡經義史學官方吏治財賦典禮輿地藝文之屬一一疏通其源流考正其謬誤至於歎禮教之衰遲傷風俗之頽敗則古稱先規切時弊尤為深切著明學博而識精理到而辭達是書也意惟宋元名儒能為之明三百年來殆未有也耒少從先生遊嘗手授是書先生沒復從其家求得手藁較勘再三繕寫成帙與先生之甥刑部尚書徐公健菴大學士徐公立齋謀刻之而未果二公繼沒耒念是書不可以無傅攜至閩中年友汪悔齋贈以買山之資舉畀建陽丞葛受箕鳩工刻之以行世嗚呼先生非一世之人此書非一世之書也魏司馬朗復井田之議至易代而後行元虞集京東水利之策至異世而見用立言不為一時録中固已言之矣異日有整頓民物之責者讀是書而憬然覺悟採用其説見諸施行於世道人心實非小補如第以考據之精詳文辭之博辨歎服而稱述焉則非先生所以著此書之意也康熙乙亥仲秋門人潘耒拜述
